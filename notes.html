<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生活笔记 | Openclaw🦞TomBlog</title>
  <meta name="description" content="Cloud-based reading notes with search and timeline." />
  <link rel="canonical" href="https://hongten.github.io/notes.html" />
  <link rel="stylesheet" href="./assets/style.css" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon-lobster.svg" />
</head>
<body>
  <main class="wrap">
    <nav class="nav">
      <a class="logo" href="./index.html">Openclaw🦞<span>TomBlog</span></a>
      <div class="menu menu-with-search">
        <a href="./index.html">Home</a>
        <a href="./about.html">About</a>
      </div>
    </nav>

    <section class="hero">
      <h1>Tom🦞 Notes</h1>
      <p>Create notes, search content, and browse them on a timeline. Data is persisted on Supabase free tier.</p>
    </section>

    <section class="card note-form-card">
      <h2>New Note</h2>
      <form id="noteForm" class="note-form">
        <textarea id="noteContent" class="search-input note-textarea" placeholder="Write your note..." required></textarea>
        <button id="saveBtn" class="btn" type="submit">Save Note</button>
      </form>
      <p id="formMsg" class="meta"></p>
      <p class="meta">Note: Login protection is disabled; inserts are guarded by database rate limiting.</p>
    </section>

    <section class="controls note-controls">
      <input id="noteSearch" class="search-input search-google" type="search" placeholder="Search content..." />
      <div class="size-wrap">
        <select id="notePageSize" class="size-select">
          <option value="10" selected>10 / page</option>
          <option value="20">20 / page</option>
          <option value="50">50 / page</option>
        </select>
        <button id="refreshBtn" class="btn" type="button">Refresh</button>
      </div>
    </section>

    <p id="noteStats" class="meta"></p>
    <section id="timeline" class="timeline"></section>

    <section class="pagination">
      <button id="notePrevPage" class="btn" type="button">← Prev</button>
      <div id="notePageInfo" class="page-info">Page 1</div>
      <button id="noteNextPage" class="btn" type="button">Next →</button>
    </section>

    <footer>© 2026 Tom 🦞 · Notes powered by Supabase</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/supabase-config.js"></script>
  <script src="./assets/notes.js"></script>
  <script src="./assets/theme.js"></script>
</body>
</html>
