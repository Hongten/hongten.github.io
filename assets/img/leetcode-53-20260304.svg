<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 53 Kadane algorithm diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 38px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb}
      .small{font:500 17px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#475569;stroke-width:2;rx:14}
      .active{fill:#0b3b2e;stroke:#10b981;stroke-width:3;rx:14}
      .arrow{stroke:#60a5fa;stroke-width:3;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="50" y="60" class="title">LeetCode 53 · Maximum Subarray</text>
  <text x="50" y="95" class="sub">Kadane's Algorithm: local best → global best</text>

  <rect x="50" y="140" width="130" height="72" class="box"/>
  <text x="95" y="185" class="txt">-2</text>

  <rect x="200" y="140" width="130" height="72" class="active"/>
  <text x="245" y="185" class="txt">1</text>

  <rect x="350" y="140" width="130" height="72" class="active"/>
  <text x="395" y="185" class="txt">-3</text>

  <rect x="500" y="140" width="130" height="72" class="active"/>
  <text x="545" y="185" class="txt">4</text>

  <rect x="650" y="140" width="130" height="72" class="active"/>
  <text x="695" y="185" class="txt">-1</text>

  <rect x="800" y="140" width="130" height="72" class="active"/>
  <text x="845" y="185" class="txt">2</text>

  <rect x="950" y="140" width="130" height="72" class="active"/>
  <text x="995" y="185" class="txt">1</text>

  <line x1="115" y1="240" x2="1015" y2="240" class="arrow"/>
  <text x="420" y="272" class="small">current = max(nums[i], current + nums[i])</text>

  <rect x="50" y="320" width="520" height="140" class="box"/>
  <text x="75" y="360" class="txt">At each index:</text>
  <text x="75" y="395" class="small">1) Either start a new subarray at nums[i]</text>
  <text x="75" y="425" class="small">2) Or extend previous best-ending-here</text>

  <rect x="610" y="320" width="540" height="140" class="box"/>
  <text x="635" y="360" class="txt">Track global answer:</text>
  <text x="635" y="395" class="small">best = max(best, current)</text>
  <text x="635" y="425" class="small">Example max subarray: [4, -1, 2, 1] = 6</text>
</svg>
