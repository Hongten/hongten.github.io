<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 22 backtracking tree diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#93c5fd}
      .node{fill:#0b1220;stroke:#334155;stroke-width:2}
      .edge{stroke:#475569;stroke-width:2}
      .ok{fill:#052e16;stroke:#16a34a}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="t" font-size="40" font-weight="700">LeetCode 22 · Generate Parentheses</text>
  <text x="60" y="110" class="t" font-size="24">Backtracking: add '(' when open &lt; n, add ')' when close &lt; open</text>

  <line x1="600" y1="180" x2="420" y2="260" class="edge"/>
  <line x1="600" y1="180" x2="780" y2="260" class="edge"/>
  <line x1="420" y1="260" x2="330" y2="340" class="edge"/>
  <line x1="420" y1="260" x2="510" y2="340" class="edge"/>
  <line x1="780" y1="260" x2="690" y2="340" class="edge"/>
  <line x1="780" y1="260" x2="870" y2="340" class="edge"/>

  <rect x="540" y="150" width="120" height="44" rx="10" class="node"/>
  <text x="565" y="179" class="m" font-size="22">""</text>

  <rect x="360" y="238" width="120" height="44" rx="10" class="node"/>
  <text x="386" y="267" class="m" font-size="22">"("</text>

  <rect x="720" y="238" width="120" height="44" rx="10" class="node"/>
  <text x="744" y="267" class="m" font-size="22">")" ✗</text>

  <rect x="270" y="318" width="120" height="44" rx="10" class="node"/>
  <text x="293" y="347" class="m" font-size="22">"(("</text>

  <rect x="450" y="318" width="120" height="44" rx="10" class="node"/>
  <text x="474" y="347" class="m" font-size="22">"()"</text>

  <rect x="630" y="318" width="120" height="44" rx="10" class="node"/>
  <text x="654" y="347" class="m" font-size="22">")(" ✗</text>

  <rect x="810" y="318" width="120" height="44" rx="10" class="node"/>
  <text x="834" y="347" class="m" font-size="22">"))" ✗</text>

  <rect x="180" y="430" width="180" height="52" rx="12" class="ok"/>
  <text x="205" y="463" class="m" font-size="24">"((()))"</text>
  <rect x="380" y="430" width="180" height="52" rx="12" class="ok"/>
  <text x="406" y="463" class="m" font-size="24">"(()())"</text>
  <rect x="580" y="430" width="180" height="52" rx="12" class="ok"/>
  <text x="606" y="463" class="m" font-size="24">"(())()"</text>
  <rect x="780" y="430" width="180" height="52" rx="12" class="ok"/>
  <text x="806" y="463" class="m" font-size="24">"()(())"</text>
  <rect x="980" y="430" width="160" height="52" rx="12" class="ok"/>
  <text x="997" y="463" class="m" font-size="24">"()()()"</text>

  <text x="60" y="580" class="t" font-size="22">Prune invalid branches early: never allow close &gt; open.</text>
</svg>
