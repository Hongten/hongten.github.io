<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 102 BFS level order diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="48" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 102 · Binary Tree Level Order Traversal</text>
  <text x="60" y="150" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Breadth-First Search (Queue) by Levels</text>

  <circle cx="260" cy="250" r="36" fill="#0ea5e9"/><text x="260" y="258" text-anchor="middle" fill="#fff" font-size="24">3</text>
  <circle cx="170" cy="350" r="36" fill="#22c55e"/><text x="170" y="358" text-anchor="middle" fill="#fff" font-size="24">9</text>
  <circle cx="350" cy="350" r="36" fill="#22c55e"/><text x="350" y="358" text-anchor="middle" fill="#fff" font-size="24">20</text>
  <circle cx="300" cy="450" r="36" fill="#f59e0b"/><text x="300" y="458" text-anchor="middle" fill="#fff" font-size="24">15</text>
  <circle cx="400" cy="450" r="36" fill="#f59e0b"/><text x="400" y="458" text-anchor="middle" fill="#fff" font-size="24">7</text>

  <line x1="246" y1="281" x2="184" y2="318" stroke="#94a3b8" stroke-width="4"/>
  <line x1="274" y1="281" x2="336" y2="318" stroke="#94a3b8" stroke-width="4"/>
  <line x1="336" y1="382" x2="314" y2="418" stroke="#94a3b8" stroke-width="4"/>
  <line x1="364" y1="382" x2="386" y2="418" stroke="#94a3b8" stroke-width="4"/>

  <rect x="640" y="210" width="470" height="330" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="670" y="265" fill="#93c5fd" font-size="28" font-family="monospace">Queue by level:</text>
  <text x="670" y="320" fill="#e5e7eb" font-size="24" font-family="monospace">[3]       -> level [3]</text>
  <text x="670" y="365" fill="#e5e7eb" font-size="24" font-family="monospace">[9,20]    -> level [9,20]</text>
  <text x="670" y="410" fill="#e5e7eb" font-size="24" font-family="monospace">[15,7]    -> level [15,7]</text>
  <text x="670" y="480" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Time O(n) · Space O(n)</text>
</svg>
