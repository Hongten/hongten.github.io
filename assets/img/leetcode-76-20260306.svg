<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 76 minimum window substring sliding window diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 52px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 28px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .label{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .txt{font:700 26px 'Consolas',monospace;fill:#f8fafc}
      .ok{fill:#22c55e}
      .need{fill:#ef4444}
      .box{fill:#334155;stroke:#64748b;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 76 · Minimum Window Substring</text>
  <text x="60" y="132" class="sub">Sliding Window + Frequency Count</text>

  <text x="60" y="200" class="label">s = ADOBECODEBANC, t = ABC</text>
  <g transform="translate(60,240)">
    <rect class="box" x="0" y="0" width="70" height="70"/><text class="txt" x="24" y="45">A</text>
    <rect class="box" x="72" y="0" width="70" height="70"/><text class="txt" x="96" y="45">D</text>
    <rect class="box" x="144" y="0" width="70" height="70"/><text class="txt" x="168" y="45">O</text>
    <rect class="box" x="216" y="0" width="70" height="70"/><text class="txt" x="240" y="45">B</text>
    <rect class="box" x="288" y="0" width="70" height="70"/><text class="txt" x="312" y="45">E</text>
    <rect class="box" x="360" y="0" width="70" height="70"/><text class="txt" x="384" y="45">C</text>
    <rect class="box" x="432" y="0" width="70" height="70"/><text class="txt" x="456" y="45">O</text>
    <rect class="box" x="504" y="0" width="70" height="70"/><text class="txt" x="528" y="45">D</text>
    <rect class="box" x="576" y="0" width="70" height="70"/><text class="txt" x="600" y="45">E</text>
    <rect class="box" x="648" y="0" width="70" height="70"/><text class="txt" x="672" y="45">B</text>
    <rect class="box" x="720" y="0" width="70" height="70"/><text class="txt" x="744" y="45">A</text>
    <rect class="box" x="792" y="0" width="70" height="70"/><text class="txt" x="816" y="45">N</text>
    <rect class="ok" x="864" y="0" width="70" height="70"/><text class="txt" x="888" y="45">C</text>

    <rect x="648" y="84" width="286" height="8" fill="#22c55e"/>
    <text x="700" y="125" class="label">Best window: "BANC"</text>
  </g>

  <text x="60" y="500" class="label">Need: A=1, B=1, C=1</text>
  <text x="60" y="540" class="label">Expand right to satisfy all chars, then shrink left greedily.</text>
  <circle cx="1080" cy="510" r="58" class="need"/>
  <text x="1052" y="518" class="txt">O(n)</text>
</svg>