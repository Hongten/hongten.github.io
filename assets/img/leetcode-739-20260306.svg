<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 739 monotonic stack diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="url(#card)" stroke="#334155"/>

  <text x="90" y="120" fill="#f8fafc" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 739 — Daily Temperatures</text>
  <text x="90" y="162" fill="#cbd5e1" font-size="26" font-family="Arial, sans-serif">Monotonic Decreasing Stack (store indices)</text>

  <text x="90" y="230" fill="#94a3b8" font-size="22" font-family="monospace">temps: [73, 74, 75, 71, 69, 72, 76, 73]</text>
  <text x="90" y="265" fill="#94a3b8" font-size="22" font-family="monospace">ans:   [ 1,  1,  4,  2,  1,  1,  0,  0]</text>

  <rect x="90" y="310" width="460" height="220" rx="12" fill="#020617" stroke="#334155"/>
  <text x="110" y="345" fill="#e2e8f0" font-size="22" font-family="Arial, sans-serif" font-weight="700">Loop Invariant</text>
  <text x="110" y="380" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">Stack indices correspond to temps in</text>
  <text x="110" y="410" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">strictly decreasing order (top is latest).</text>
  <text x="110" y="450" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">When current temp is warmer:</text>
  <text x="110" y="480" fill="#facc15" font-size="20" font-family="monospace">ans[prev] = i - prev</text>

  <rect x="610" y="310" width="500" height="220" rx="12" fill="#020617" stroke="#334155"/>
  <text x="630" y="345" fill="#e2e8f0" font-size="22" font-family="Arial, sans-serif" font-weight="700">Pseudo Steps</text>
  <text x="630" y="380" fill="#cbd5e1" font-size="20" font-family="monospace">for i in [0..n-1]:</text>
  <text x="630" y="410" fill="#cbd5e1" font-size="20" font-family="monospace">  while stack and T[i] &gt; T[stack.top]:</text>
  <text x="630" y="440" fill="#cbd5e1" font-size="20" font-family="monospace">    prev = stack.pop()</text>
  <text x="630" y="470" fill="#cbd5e1" font-size="20" font-family="monospace">    ans[prev] = i - prev</text>
  <text x="630" y="500" fill="#cbd5e1" font-size="20" font-family="monospace">  stack.push(i)</text>

  <text x="90" y="565" fill="#64748b" font-size="18" font-family="Arial, sans-serif">O(n) time, O(n) stack space · Each index pushed/popped at most once</text>
</svg>
