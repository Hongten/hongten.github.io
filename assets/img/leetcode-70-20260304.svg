<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="LeetCode 70 climbing stairs dynamic programming diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .txt { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .num { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .formula { font: 600 24px 'Segoe UI', Arial, sans-serif; fill: #fcd34d; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)" />
  <text x="48" y="62" class="title">LeetCode 70 · Climbing Stairs</text>
  <text x="48" y="96" class="sub">DP transition: ways[i] = ways[i - 1] + ways[i - 2]</text>

  <g transform="translate(52,132)">
    <rect x="0" y="0" width="1090" height="230" rx="18" fill="url(#card)" stroke="#334155" />

    <g transform="translate(38,62)">
      <rect x="0" y="0" width="140" height="96" rx="12" fill="#0b1220" stroke="#475569" />
      <text x="20" y="34" class="txt">step 1</text>
      <text x="20" y="74" class="num">1</text>

      <line x1="146" y1="48" x2="210" y2="48" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

      <rect x="220" y="0" width="140" height="96" rx="12" fill="#0b1220" stroke="#475569" />
      <text x="240" y="34" class="txt">step 2</text>
      <text x="240" y="74" class="num">2</text>

      <line x1="366" y1="48" x2="430" y2="48" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

      <rect x="440" y="0" width="140" height="96" rx="12" fill="#0b1220" stroke="#475569" />
      <text x="460" y="34" class="txt">step 3</text>
      <text x="460" y="74" class="num">3</text>

      <line x1="586" y1="48" x2="650" y2="48" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

      <rect x="660" y="0" width="180" height="96" rx="12" fill="#0b1220" stroke="#475569" />
      <text x="680" y="34" class="txt">step n</text>
      <text x="680" y="74" class="num">f(n)</text>
    </g>

    <text x="74" y="196" class="formula">f(1)=1, f(2)=2, f(n)=f(n-1)+f(n-2)</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
