<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 84 Largest Rectangle in Histogram</title>
  <desc id="desc">Monotonic increasing stack computes max rectangle by finding first smaller bar on left and right.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .axis{stroke:#475569;stroke-width:2}
      .bar{fill:#60a5fa;opacity:.88}
      .bar2{fill:#38bdf8;opacity:.88}
      .rect{fill:#f59e0b;opacity:.38;stroke:#fbbf24;stroke-width:3}
      .note{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#fde68a}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 84 · Largest Rectangle in Histogram</text>
  <text x="60" y="118" class="sub">Monotonic Stack · O(n) time · O(n) space</text>

  <line x1="90" y1="520" x2="1110" y2="520" class="axis"/>
  <line x1="90" y1="200" x2="90" y2="520" class="axis"/>

  <rect x="160" y="440" width="90" height="80" class="bar"/>
  <rect x="270" y="360" width="90" height="160" class="bar2"/>
  <rect x="380" y="280" width="90" height="240" class="bar"/>
  <rect x="490" y="320" width="90" height="200" class="bar2"/>
  <rect x="600" y="400" width="90" height="120" class="bar"/>
  <rect x="710" y="360" width="90" height="160" class="bar2"/>
  <rect x="820" y="480" width="90" height="40" class="bar"/>

  <rect x="270" y="320" width="420" height="200" class="rect"/>
  <text x="285" y="305" class="note">Best area = height 5 × width 2 = 10</text>

  <text x="160" y="565" class="label">Push increasing bars into stack</text>
  <text x="160" y="595" class="label">Pop when current bar is lower, compute area immediately</text>
</svg>