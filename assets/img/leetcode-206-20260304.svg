<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="LeetCode 206 reverse linked list diagram">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .title { fill: #e2e8f0; font: 700 34px 'Segoe UI', Arial, sans-serif; }
      .label { fill: #94a3b8; font: 600 20px 'Segoe UI', Arial, sans-serif; }
      .node { fill: #1e293b; stroke: #38bdf8; stroke-width: 3; rx: 12; }
      .text { fill: #f8fafc; font: 700 28px 'JetBrains Mono', Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #f59e0b; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #22c55e; stroke-width: 4; fill: none; marker-end: url(#arrowhead2); }
      .note { fill: #cbd5e1; font: 500 18px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" />
  <text class="title" x="40" y="56">LeetCode 206 · Reverse Linked List (Iterative Pointer Flip)</text>

  <text class="label" x="80" y="120">Original:</text>
  <rect class="node" x="180" y="88" width="110" height="64" /><text class="text" x="235" y="120">1</text>
  <rect class="node" x="360" y="88" width="110" height="64" /><text class="text" x="415" y="120">2</text>
  <rect class="node" x="540" y="88" width="110" height="64" /><text class="text" x="595" y="120">3</text>
  <rect class="node" x="720" y="88" width="110" height="64" /><text class="text" x="775" y="120">4</text>
  <path class="arrow" d="M290 120 L360 120" />
  <path class="arrow" d="M470 120 L540 120" />
  <path class="arrow" d="M650 120 L720 120" />
  <text class="note" x="865" y="126">null</text>

  <text class="label" x="80" y="270">Reversed:</text>
  <rect class="node" x="180" y="238" width="110" height="64" /><text class="text" x="235" y="270">1</text>
  <rect class="node" x="360" y="238" width="110" height="64" /><text class="text" x="415" y="270">2</text>
  <rect class="node" x="540" y="238" width="110" height="64" /><text class="text" x="595" y="270">3</text>
  <rect class="node" x="720" y="238" width="110" height="64" /><text class="text" x="775" y="270">4</text>
  <path class="arrow2" d="M360 270 L290 270" />
  <path class="arrow2" d="M540 270 L470 270" />
  <path class="arrow2" d="M720 270 L650 270" />
  <text class="note" x="120" y="276">null</text>

  <text class="note" x="40" y="365">At each step: next = curr.next, curr.next = prev, then move prev and curr forward.</text>
</svg>
