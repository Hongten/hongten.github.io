<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 21 merge two sorted lists pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:44px;font-weight:700}
      .s{font-size:26px;fill:#93c5fd}
      .n{font-size:24px;font-weight:700;fill:#0f172a}
      .lbl{font-size:22px;fill:#cbd5e1}
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 21 · Merge Two Sorted Lists</text>
  <text x="60" y="132" class="t s">Dummy head + two pointers · O(m+n)</text>

  <text x="80" y="220" class="t lbl">list1</text>
  <rect x="180" y="180" width="90" height="60" rx="12" fill="#93c5fd"/><text x="218" y="220" class="n">1</text>
  <rect x="320" y="180" width="90" height="60" rx="12" fill="#93c5fd"/><text x="358" y="220" class="n">2</text>
  <rect x="460" y="180" width="90" height="60" rx="12" fill="#93c5fd"/><text x="498" y="220" class="n">4</text>
  <line x1="270" y1="210" x2="320" y2="210" stroke="#38bdf8" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="410" y1="210" x2="460" y2="210" stroke="#38bdf8" stroke-width="4" marker-end="url(#arr)"/>

  <text x="80" y="350" class="t lbl">list2</text>
  <rect x="180" y="310" width="90" height="60" rx="12" fill="#86efac"/><text x="218" y="350" class="n">1</text>
  <rect x="320" y="310" width="90" height="60" rx="12" fill="#86efac"/><text x="358" y="350" class="n">3</text>
  <rect x="460" y="310" width="90" height="60" rx="12" fill="#86efac"/><text x="498" y="350" class="n">4</text>
  <line x1="270" y1="340" x2="320" y2="340" stroke="#22c55e" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="410" y1="340" x2="460" y2="340" stroke="#22c55e" stroke-width="4" marker-end="url(#arr)"/>

  <text x="80" y="500" class="t lbl">merged</text>
  <rect x="180" y="460" width="90" height="60" rx="12" fill="#fcd34d"/><text x="218" y="500" class="n">1</text>
  <rect x="300" y="460" width="90" height="60" rx="12" fill="#fcd34d"/><text x="338" y="500" class="n">1</text>
  <rect x="420" y="460" width="90" height="60" rx="12" fill="#fcd34d"/><text x="458" y="500" class="n">2</text>
  <rect x="540" y="460" width="90" height="60" rx="12" fill="#fcd34d"/><text x="578" y="500" class="n">3</text>
  <rect x="660" y="460" width="90" height="60" rx="12" fill="#fcd34d"/><text x="698" y="500" class="n">4</text>
  <rect x="780" y="460" width="90" height="60" rx="12" fill="#fcd34d"/><text x="818" y="500" class="n">4</text>
</svg>
