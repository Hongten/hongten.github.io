<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeetCode 98 BST validation bounds diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:28px;font-weight:700}
      .s{font-size:22px;fill:#93c5fd}
      .n{font-size:20px;font-weight:700;fill:#0f172a}
      .b{font-size:18px;fill:#cbd5e1}
      .ok{fill:#34d399}
      .bad{fill:#f87171}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 98 · Validate Binary Search Tree</text>
  <text x="60" y="130" class="t s">DFS with (lower, upper) bounds</text>

  <line x1="600" y1="210" x2="420" y2="310" stroke="#94a3b8" stroke-width="4"/>
  <line x1="600" y1="210" x2="780" y2="310" stroke="#94a3b8" stroke-width="4"/>
  <line x1="420" y1="310" x2="330" y2="420" stroke="#94a3b8" stroke-width="4"/>
  <line x1="420" y1="310" x2="510" y2="420" stroke="#94a3b8" stroke-width="4"/>
  <line x1="780" y1="310" x2="690" y2="420" stroke="#94a3b8" stroke-width="4"/>
  <line x1="780" y1="310" x2="870" y2="420" stroke="#94a3b8" stroke-width="4"/>

  <circle cx="600" cy="200" r="42" fill="#93c5fd"/>
  <text x="586" y="207" class="n">8</text>

  <circle cx="420" cy="300" r="40" fill="#a7f3d0"/>
  <text x="406" y="307" class="n">3</text>

  <circle cx="780" cy="300" r="40" fill="#a7f3d0"/>
  <text x="766" y="307" class="n">10</text>

  <circle cx="330" cy="430" r="36" fill="#bbf7d0"/>
  <text x="316" y="437" class="n">1</text>

  <circle cx="510" cy="430" r="36" fill="#bbf7d0"/>
  <text x="496" y="437" class="n">6</text>

  <circle cx="690" cy="430" r="36" fill="#fecaca"/>
  <text x="676" y="437" class="n">7</text>

  <circle cx="870" cy="430" r="36" fill="#bbf7d0"/>
  <text x="856" y="437" class="n">14</text>

  <text x="250" y="520" class="t b">Left subtree must be &lt; root, right subtree must be &gt; root.</text>
  <text x="250" y="548" class="t b">Node 7 in right subtree of 8 violates lower bound (should be &gt; 8).</text>
  <text x="930" y="438" class="t bad">✗</text>
  <text x="934" y="304" class="t ok">✓</text>
</svg>
