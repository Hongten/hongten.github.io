<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 560 prefix sum and hash map diagram">
  <defs>
    <style>
      .bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.text{fill:#e5e7eb;font-family:Arial,sans-serif}.muted{fill:#94a3b8;font-family:Arial,sans-serif}.accent{fill:#22d3ee}.ok{fill:#34d399}.warn{fill:#fbbf24}
    </style>
  </defs>
  <rect class="bg" width="960" height="420"/>
  <text x="40" y="48" class="text" font-size="28" font-weight="700">LeetCode 560 · Prefix Sum + Frequency Map</text>
  <rect x="40" y="72" width="880" height="130" rx="12" class="panel"/>
  <text x="64" y="108" class="muted" font-size="20">nums = [1, 2, 1, 2, 1], k = 3</text>
  <text x="64" y="148" class="text" font-size="20">Running prefix: 1 → 3 → 4 → 6 → 7</text>
  <text x="64" y="182" class="text" font-size="20">At each step, add count[prefix - k] to answer</text>

  <rect x="40" y="224" width="420" height="156" rx="12" class="panel"/>
  <text x="64" y="258" class="accent" font-size="20" font-weight="700">Key Equation</text>
  <text x="64" y="294" class="text" font-size="22">if prefix[i] - prefix[j] = k</text>
  <text x="64" y="326" class="text" font-size="22">then prefix[j] = prefix[i] - k</text>
  <text x="64" y="358" class="ok" font-size="18">Lookup previous (prefix-k) in O(1)</text>

  <rect x="500" y="224" width="420" height="156" rx="12" class="panel"/>
  <text x="524" y="258" class="warn" font-size="20" font-weight="700">Map State Example</text>
  <text x="524" y="294" class="text" font-size="20">freq = {0:1, 1:1, 3:1, 4:1, 6:1 ...}</text>
  <text x="524" y="326" class="text" font-size="20">prefix = 6, need 3, freq[3] = 1</text>
  <text x="524" y="358" class="ok" font-size="18">Found 1 new subarray ending here</text>
</svg>
