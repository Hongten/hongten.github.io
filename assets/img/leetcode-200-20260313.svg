<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 200 Number of Islands DFS traversal diagram</title>
  <desc id="desc">Grid map with islands and DFS flood-fill traversal arrows</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="70" y="92" fill="#e2e8f0" font-size="48" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">LeetCode 200 · Number of Islands</text>
  <text x="70" y="134" fill="#93c5fd" font-size="28" font-family="Inter,Segoe UI,Arial,sans-serif">DFS/BFS Flood Fill on Grid</text>

  <g transform="translate(100,180)" filter="url(#shadow)">
    <rect x="0" y="0" width="560" height="420" rx="20" fill="#0f172a" stroke="#334155"/>
    <g transform="translate(35,35)" font-family="monospace" font-size="28" text-anchor="middle" dominant-baseline="middle">
      <script type="application/ecmascript"><![CDATA[]]></script>
      <g>
        <rect x="0" y="0" width="80" height="80" fill="#22d3ee"/><text x="40" y="40" fill="#082f49">1</text>
        <rect x="80" y="0" width="80" height="80" fill="#22d3ee"/><text x="120" y="40" fill="#082f49">1</text>
        <rect x="160" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="200" y="40" fill="#64748b">0</text>
        <rect x="240" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="280" y="40" fill="#64748b">0</text>
        <rect x="320" y="0" width="80" height="80" fill="#22d3ee"/><text x="360" y="40" fill="#082f49">1</text>
        <rect x="400" y="0" width="80" height="80" fill="#22d3ee"/><text x="440" y="40" fill="#082f49">1</text>
      </g>
      <g transform="translate(0,80)">
        <rect x="0" y="0" width="80" height="80" fill="#22d3ee"/><text x="40" y="40" fill="#082f49">1</text>
        <rect x="80" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="120" y="40" fill="#64748b">0</text>
        <rect x="160" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="200" y="40" fill="#64748b">0</text>
        <rect x="240" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="280" y="40" fill="#64748b">0</text>
        <rect x="320" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="360" y="40" fill="#64748b">0</text>
        <rect x="400" y="0" width="80" height="80" fill="#22d3ee"/><text x="440" y="40" fill="#082f49">1</text>
      </g>
      <g transform="translate(0,160)">
        <rect x="0" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="40" y="40" fill="#64748b">0</text>
        <rect x="80" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="120" y="40" fill="#64748b">0</text>
        <rect x="160" y="0" width="80" height="80" fill="#22d3ee"/><text x="200" y="40" fill="#082f49">1</text>
        <rect x="240" y="0" width="80" height="80" fill="#22d3ee"/><text x="280" y="40" fill="#082f49">1</text>
        <rect x="320" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="360" y="40" fill="#64748b">0</text>
        <rect x="400" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="440" y="40" fill="#64748b">0</text>
      </g>
      <g transform="translate(0,240)">
        <rect x="0" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="40" y="40" fill="#64748b">0</text>
        <rect x="80" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="120" y="40" fill="#64748b">0</text>
        <rect x="160" y="0" width="80" height="80" fill="#22d3ee"/><text x="200" y="40" fill="#082f49">1</text>
        <rect x="240" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="280" y="40" fill="#64748b">0</text>
        <rect x="320" y="0" width="80" height="80" fill="#0b1220" stroke="#1e293b"/><text x="360" y="40" fill="#64748b">0</text>
        <rect x="400" y="0" width="80" height="80" fill="#22d3ee"/><text x="440" y="40" fill="#082f49">1</text>
      </g>
    </g>
  </g>

  <g transform="translate(760,220)">
    <rect x="0" y="0" width="420" height="320" rx="20" fill="#0f172a" stroke="#334155"/>
    <text x="32" y="58" fill="#f8fafc" font-size="32" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Core idea</text>
    <text x="32" y="106" fill="#cbd5e1" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif">Scan every cell.</text>
    <text x="32" y="146" fill="#cbd5e1" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif">When a '1' appears,</text>
    <text x="32" y="186" fill="#cbd5e1" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif">start DFS/BFS flood fill</text>
    <text x="32" y="226" fill="#cbd5e1" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif">to mark the whole island.</text>
    <text x="32" y="276" fill="#22d3ee" font-size="26" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Each new start = +1 island</text>
  </g>

  <path d="M662 346 C720 330, 730 300, 760 286" stroke="#38bdf8" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
