<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 3 sliding window diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 38px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .cell{fill:#334155;stroke:#64748b;stroke-width:2;rx:10}
      .cellActive{fill:#0ea5e9;stroke:#38bdf8;stroke-width:3;rx:10}
      .txt{font:700 30px 'Consolas',monospace;fill:#f8fafc}
      .idx{font:500 18px 'Consolas',monospace;fill:#94a3b8}
      .note{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#a5f3fc}
      .arrow{stroke:#f59e0b;stroke-width:6;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="50" y="70" class="title">LeetCode 3 · Longest Substring Without Repeating Characters</text>

  <text x="80" y="130" class="label">String: "a b c a b c b b"</text>

  <g transform="translate(80,170)">
    <rect class="cellActive" x="0" y="0" width="95" height="80"/>
    <rect class="cellActive" x="105" y="0" width="95" height="80"/>
    <rect class="cellActive" x="210" y="0" width="95" height="80"/>
    <rect class="cell" x="315" y="0" width="95" height="80"/>
    <rect class="cell" x="420" y="0" width="95" height="80"/>
    <rect class="cell" x="525" y="0" width="95" height="80"/>
    <rect class="cell" x="630" y="0" width="95" height="80"/>
    <rect class="cell" x="735" y="0" width="95" height="80"/>

    <text class="txt" x="38" y="50">a</text>
    <text class="txt" x="143" y="50">b</text>
    <text class="txt" x="248" y="50">c</text>
    <text class="txt" x="353" y="50">a</text>
    <text class="txt" x="458" y="50">b</text>
    <text class="txt" x="563" y="50">c</text>
    <text class="txt" x="668" y="50">b</text>
    <text class="txt" x="773" y="50">b</text>

    <text class="idx" x="40" y="110">0</text>
    <text class="idx" x="145" y="110">1</text>
    <text class="idx" x="250" y="110">2</text>
    <text class="idx" x="355" y="110">3</text>
    <text class="idx" x="460" y="110">4</text>
    <text class="idx" x="565" y="110">5</text>
    <text class="idx" x="670" y="110">6</text>
    <text class="idx" x="775" y="110">7</text>
  </g>

  <line class="arrow" x1="130" y1="360" x2="130" y2="275"/>
  <line class="arrow" x1="340" y1="360" x2="340" y2="275"/>

  <text x="92" y="398" class="note">left = 0</text>
  <text x="302" y="398" class="note">right = 2</text>
  <text x="80" y="450" class="label">Window "abc" has no duplicates → current best length = 3</text>
  <text x="80" y="485" class="label">When duplicate appears, move left to max(left, lastSeen[char] + 1)</text>
</svg>
