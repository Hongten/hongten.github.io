<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 49 Group Anagrams diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Inter', 'Segoe UI', sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Inter', 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .box { fill: #111827; stroke: #475569; stroke-width: 2; rx: 14; }
      .key { font: 700 22px 'JetBrains Mono', monospace; fill: #f8fafc; }
      .item { font: 500 20px 'JetBrains Mono', monospace; fill: #93c5fd; }
      .arrow { stroke: #38bdf8; stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 49 · Group Anagrams</text>
  <text x="60" y="130" class="sub">Canonical key = sorted characters, then hash-group</text>

  <rect x="60" y="180" width="310" height="360" class="box"/>
  <text x="85" y="225" class="key">Input strs</text>
  <text x="85" y="270" class="item">"eat"</text>
  <text x="85" y="305" class="item">"tea"</text>
  <text x="85" y="340" class="item">"tan"</text>
  <text x="85" y="375" class="item">"ate"</text>
  <text x="85" y="410" class="item">"nat"</text>
  <text x="85" y="445" class="item">"bat"</text>

  <line x1="390" y1="300" x2="520" y2="300" class="arrow"/>

  <rect x="540" y="180" width="600" height="360" class="box"/>
  <text x="565" y="225" class="key">HashMap&lt;sortedKey, List&gt;</text>

  <text x="565" y="275" class="key">"aet"</text>
  <text x="700" y="275" class="item">→ ["eat", "tea", "ate"]</text>

  <text x="565" y="330" class="key">"ant"</text>
  <text x="700" y="330" class="item">→ ["tan", "nat"]</text>

  <text x="565" y="385" class="key">"abt"</text>
  <text x="700" y="385" class="item">→ ["bat"]</text>

  <text x="60" y="590" class="sub">Result: [["eat","tea","ate"],["tan","nat"],["bat"]]</text>
</svg>
