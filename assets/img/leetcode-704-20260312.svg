<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 704 binary search interval shrinking diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 48px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 400 26px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .idx { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .txt { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 704 · Binary Search</text>
  <text x="60" y="132" class="sub">Shrink [left, right] until nums[mid] == target</text>

  <g transform="translate(90,220)">
    <rect x="0" y="0" width="130" height="90" rx="12" fill="#334155"/>
    <rect x="140" y="0" width="130" height="90" rx="12" fill="#334155"/>
    <rect x="280" y="0" width="130" height="90" rx="12" fill="#22d3ee"/>
    <rect x="420" y="0" width="130" height="90" rx="12" fill="#334155"/>
    <rect x="560" y="0" width="130" height="90" rx="12" fill="#334155"/>
    <rect x="700" y="0" width="130" height="90" rx="12" fill="#334155"/>
    <rect x="840" y="0" width="130" height="90" rx="12" fill="#334155"/>

    <text x="55" y="56" class="txt">-1</text>
    <text x="195" y="56" class="txt">0</text>
    <text x="335" y="56" class="txt">3</text>
    <text x="475" y="56" class="txt">5</text>
    <text x="615" y="56" class="txt">9</text>
    <text x="745" y="56" class="txt">12</text>
    <text x="875" y="56" class="txt">18</text>

    <text x="55" y="122" class="idx">0</text>
    <text x="195" y="122" class="idx">1</text>
    <text x="335" y="122" class="idx">2</text>
    <text x="475" y="122" class="idx">3</text>
    <text x="615" y="122" class="idx">4</text>
    <text x="755" y="122" class="idx">5</text>
    <text x="895" y="122" class="idx">6</text>

    <text x="20" y="-20" class="small">left</text>
    <line x1="40" y1="-10" x2="65" y2="-2" stroke="#38bdf8" stroke-width="4"/>

    <text x="315" y="-20" class="small">mid</text>
    <line x1="335" y1="-10" x2="345" y2="-2" stroke="#22d3ee" stroke-width="4"/>

    <text x="905" y="-20" class="small">right</text>
    <line x1="945" y1="-10" x2="905" y2="-2" stroke="#f472b6" stroke-width="4"/>
  </g>

  <rect x="60" y="500" width="1080" height="80" rx="16" fill="#111827" opacity="0.8"/>
  <text x="90" y="550" class="sub">If nums[mid] &lt; target → search right half; else search left half.</text>
</svg>
