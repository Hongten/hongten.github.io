<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a"/>
  <text x="60" y="70" fill="#e2e8f0" font-size="34" font-family="Arial">LeetCode 3926 · Prefix/Suffix XOR</text>
  <text x="60" y="115" fill="#94a3b8" font-size="22" font-family="Arial">ans[i] = prefix[i-1] XOR suffix[i+1]</text>
  <g transform="translate(60,170)">
    <rect x="0" y="0" width="120" height="60" rx="8" fill="#1d4ed8"/><text x="46" y="38" fill="white" font-size="26">a0</text>
    <rect x="140" y="0" width="120" height="60" rx="8" fill="#1d4ed8"/><text x="186" y="38" fill="white" font-size="26">a1</text>
    <rect x="280" y="0" width="120" height="60" rx="8" fill="#dc2626"/><text x="326" y="38" fill="white" font-size="26">ai</text>
    <rect x="420" y="0" width="120" height="60" rx="8" fill="#1d4ed8"/><text x="466" y="38" fill="white" font-size="26">a3</text>
    <rect x="560" y="0" width="120" height="60" rx="8" fill="#1d4ed8"/><text x="606" y="38" fill="white" font-size="26">a4</text>
  </g>
  <text x="60" y="290" fill="#22c55e" font-size="24">leftXor = a0 ^ a1</text>
  <text x="60" y="330" fill="#22c55e" font-size="24">rightXor = a3 ^ a4</text>
  <text x="420" y="330" fill="#f59e0b" font-size="24">answer[i] = leftXor ^ rightXor</text>
</svg>
