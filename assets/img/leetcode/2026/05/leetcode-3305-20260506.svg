<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs><rect width="1200" height="630" fill="url(#g)"/><text x="60" y="120" fill="#e2e8f0" font-size="52" font-family="Arial">LeetCode 3305</text><text x="60" y="180" fill="#93c5fd" font-size="34" font-family="Arial">Find the K-th Character in String Game II</text><rect x="60" y="240" width="1080" height="300" rx="18" fill="#111827" stroke="#334155"/><text x="90" y="295" fill="#f8fafc" font-size="28" font-family="monospace">k - 1 = b4 b3 b2 b1 b0</text><text x="90" y="345" fill="#cbd5e1" font-size="24" font-family="monospace">bit i == 1  => take right half at step i</text><text x="90" y="390" fill="#cbd5e1" font-size="24" font-family="monospace">shift += operations[i]</text><text x="90" y="450" fill="#86efac" font-size="28" font-family="monospace">answer = 'a' + (sum shifts mod 26)</text></svg>