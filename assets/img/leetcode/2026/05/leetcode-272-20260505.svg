<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial">LeetCode 272 - Closest BST Value II</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Arial">Inorder(sorted) + sliding window(k)</text>
  <rect x="70" y="190" width="1060" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <text x="100" y="250" fill="#cbd5e1" font-size="26" font-family="monospace">inorder: [1,2,3,4,5,6], target=3.714, k=2</text>
  <text x="100" y="300" fill="#a7f3d0" font-size="24" font-family="monospace">window: [1] -&gt; [1,2] -&gt; [2,3] -&gt; [3,4] -&gt; stop</text>
  <text x="100" y="350" fill="#fde68a" font-size="24" font-family="monospace">compare |x-target| with oldest candidate</text>
  <text x="100" y="400" fill="#fca5a5" font-size="24" font-family="monospace">if farther and sorted order keeps increasing, break early</text>
</svg>
