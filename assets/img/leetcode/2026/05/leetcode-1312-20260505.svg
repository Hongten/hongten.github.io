<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 1312 · Interval DP</text>
  <rect x="60" y="140" width="1080" height="420" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="210" fill="#93c5fd" font-size="30" font-family="monospace">dp[i][j] = min insertions for s[i..j]</text>
  <text x="90" y="280" fill="#cbd5e1" font-size="28" font-family="monospace">if s[i] == s[j]: dp[i][j] = dp[i+1][j-1]</text>
  <text x="90" y="340" fill="#cbd5e1" font-size="28" font-family="monospace">else: dp[i][j] = min(dp[i+1][j], dp[i][j-1]) + 1</text>
  <text x="90" y="420" fill="#86efac" font-size="26" font-family="monospace">Fill intervals by length: 2 .. n</text>
</svg>