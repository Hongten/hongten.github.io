<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 2605</text><text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial">Form Smallest Number From Two Digit Arrays</text><rect x="60" y="190" width="500" height="160" rx="16" fill="#1e293b"/><text x="90" y="245" fill="#cbd5e1" font-size="28" font-family="Arial">nums1: [4, 1, 3]</text><text x="90" y="295" fill="#cbd5e1" font-size="28" font-family="Arial">nums2: [5, 7]</text><rect x="640" y="190" width="500" height="160" rx="16" fill="#1e293b"/><text x="670" y="245" fill="#cbd5e1" font-size="28" font-family="Arial">No common digit</text><text x="670" y="295" fill="#cbd5e1" font-size="28" font-family="Arial">min1=1, min2=5 → 15</text><text x="60" y="420" fill="#f8fafc" font-size="30" font-family="Arial">Rule 1: If common digit exists, answer = smallest common digit.</text><text x="60" y="470" fill="#f8fafc" font-size="30" font-family="Arial">Rule 2: Else build two-digit number with smaller digit in tens place.</text></svg>