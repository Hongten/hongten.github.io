<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 293 Flip Game diagram"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0b1020"/><stop offset="100%" stop-color="#1f2937"/></linearGradient></defs><rect width="1200" height="630" fill="url(#bg)"/><text x="60" y="110" fill="#e5e7eb" font-size="48" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 293: Flip Game</text><text x="60" y="165" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Scan all "++" pairs, flip one pair to "--" each move</text><rect x="60" y="220" width="1080" height="330" rx="18" fill="#111827" stroke="#374151"/><text x="95" y="285" fill="#f9fafb" font-size="34" font-family="Menlo,Consolas,monospace">currentState = "++++"</text><text x="95" y="350" fill="#86efac" font-size="30" font-family="Menlo,Consolas,monospace">i=0  ++ ++  -+ ++  =&gt; "--++"</text><text x="95" y="405" fill="#86efac" font-size="30" font-family="Menlo,Consolas,monospace">i=1  + ++ +  +--+  =&gt; "+--+"</text><text x="95" y="460" fill="#86efac" font-size="30" font-family="Menlo,Consolas,monospace">i=2  ++ ++  ++ --  =&gt; "++--"</text><text x="95" y="525" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Collect every valid one-step next state</text></svg>