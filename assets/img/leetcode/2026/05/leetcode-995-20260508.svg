<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<rect width="1200" height="520" fill="#0b1020"/><text x="40" y="70" fill="#e6edf3" font-size="34" font-family="Arial">LeetCode 995 - Flip Parity Timeline</text>
<text x="40" y="110" fill="#9fb3c8" font-size="22" font-family="Arial">Greedy: if effective bit is 0 at i, must flip [i, i+k-1]</text>
<line x1="60" y1="220" x2="1140" y2="220" stroke="#36506b" stroke-width="3"/>
<rect x="120" y="180" width="260" height="80" fill="#1f6feb" rx="10"/><text x="150" y="228" fill="white" font-size="24" font-family="Arial">flip window</text>
<rect x="420" y="180" width="260" height="80" fill="#238636" rx="10"/><text x="446" y="228" fill="white" font-size="24" font-family="Arial">parity ^= 1</text>
<rect x="720" y="180" width="360" height="80" fill="#8957e5" rx="10"/><text x="748" y="228" fill="white" font-size="24" font-family="Arial">diff[i+k] marks expiry</text>
<text x="60" y="330" fill="#e6edf3" font-size="24" font-family="Arial">effective = nums[i] XOR activeFlipParity</text>
<text x="60" y="370" fill="#e6edf3" font-size="24" font-family="Arial">if effective == 0: forced flip, else continue</text>
</svg>