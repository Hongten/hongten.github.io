<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="88" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 713: Sliding Window</text><rect x="70" y="150" width="1060" height="410" rx="16" fill="#1e293b"/><text x="100" y="210" fill="#93c5fd" font-size="28" font-family="Arial">nums = [10, 5, 2, 6], k = 100</text><rect x="110" y="270" width="130" height="90" fill="#334155"/><rect x="250" y="270" width="130" height="90" fill="#334155"/><rect x="390" y="270" width="130" height="90" fill="#334155"/><rect x="530" y="270" width="130" height="90" fill="#334155"/><text x="155" y="325" fill="#fff" font-size="36" font-family="Arial">10</text><text x="300" y="325" fill="#fff" font-size="36" font-family="Arial">5</text><text x="440" y="325" fill="#fff" font-size="36" font-family="Arial">2</text><text x="580" y="325" fill="#fff" font-size="36" font-family="Arial">6</text><rect x="110" y="250" width="550" height="130" fill="none" stroke="#22c55e" stroke-width="6"/><text x="100" y="445" fill="#f8fafc" font-size="30" font-family="Arial">When product ≥ k, move left pointer to shrink window.</text></svg>