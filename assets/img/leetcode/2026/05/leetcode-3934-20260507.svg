<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="90" fill="#e6edf3" font-size="42" font-family="Arial">LeetCode 3934 · Prefix/Suffix XOR</text><rect x="60" y="140" width="1080" height="420" rx="16" fill="#111a2c" stroke="#2f3b55"/><text x="90" y="210" fill="#9ecbff" font-size="28" font-family="monospace">nums:   [a0, a1, a2, a3, a4]</text><text x="90" y="270" fill="#7ee787" font-size="28" font-family="monospace">pre[i]: xor(nums[0..i-1])</text><text x="90" y="330" fill="#f2cc60" font-size="28" font-family="monospace">suf[i]: xor(nums[i..n-1])</text><text x="90" y="390" fill="#ffb86b" font-size="28" font-family="monospace">ans[i] = pre[i] ^ suf[i+1]</text><text x="90" y="470" fill="#c9d1d9" font-size="24" font-family="Arial">Compute all-except-self XOR in O(n)</text></svg>