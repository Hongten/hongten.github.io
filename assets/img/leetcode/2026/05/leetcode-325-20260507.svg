<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="100" fill="#7dd3fc" font-size="42" font-family="Arial">LeetCode 325 - Prefix Sum + Earliest Index</text><rect x="70" y="150" width="1060" height="390" rx="16" fill="#111827" stroke="#334155"/><text x="100" y="230" fill="#e2e8f0" font-size="30" font-family="monospace">if first contains (pre-k): ans = max(ans, i-first[pre-k])</text><text x="100" y="290" fill="#e2e8f0" font-size="30" font-family="monospace">store first occurrence only: first.putIfAbsent(pre, i)</text></svg>