<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><style>.t{font:28px Arial,sans-serif;fill:#e6edf3}.s{font:22px Arial,sans-serif;fill:#9fb3c8}</style></defs>
  <rect width="1200" height="630" fill="#0d1117"/>
  <text x="60" y="90" class="t">LeetCode 560 - Prefix Sum + Hash Map</text>
  <text x="60" y="140" class="s">Count subarrays ending at i by looking up (prefixSum-k) frequency</text>
  <rect x="60" y="190" width="1080" height="320" rx="14" fill="#161b22" stroke="#30363d"/>
  <text x="90" y="250" class="s">nums: [1, 2, 3], k = 3</text>
  <text x="90" y="300" class="s">prefix: 0 -&gt; 1 -&gt; 3 -&gt; 6</text>
  <text x="90" y="350" class="s">at prefix=3, need 0, count[0]=1  => +1 ([1,2])</text>
  <text x="90" y="400" class="s">at prefix=6, need 3, count[3]=1  => +1 ([3])</text>
  <text x="90" y="460" class="t">Answer = 2</text>
</svg>
