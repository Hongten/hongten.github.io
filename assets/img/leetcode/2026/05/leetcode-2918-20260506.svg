<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2918 diagram"><rect width="1200" height="630" fill="#0f172a"/><rect x="70" y="170" width="1060" height="360" rx="20" fill="#111827" stroke="#334155"/><text x="70" y="110" fill="#e5e7eb" font-size="44" font-family="Arial">LeetCode 2918</text><text x="110" y="260" fill="#93c5fd" font-size="34" font-family="Arial">min1 = sum(nums1) + zeros1</text><text x="110" y="320" fill="#93c5fd" font-size="34" font-family="Arial">min2 = sum(nums2) + zeros2</text><text x="110" y="390" fill="#86efac" font-size="34" font-family="Arial">if fixed side &lt; other minimum: impossible (-1)</text><text x="110" y="450" fill="#fcd34d" font-size="34" font-family="Arial">answer = max(min1, min2)</text></svg>