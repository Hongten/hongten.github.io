<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420"><rect width="960" height="420" fill="#0b1020"/><text x="40" y="52" fill="#e6edf3" font-size="28" font-family="Arial">LeetCode 909 - BFS by Dice Layers</text><rect x="40" y="90" width="160" height="70" rx="10" fill="#1f6feb"/><text x="120" y="132" text-anchor="middle" fill="white" font-size="26">1</text><rect x="280" y="90" width="160" height="70" rx="10" fill="#238636"/><text x="360" y="132" text-anchor="middle" fill="white" font-size="26">2..7</text><rect x="520" y="90" width="160" height="70" rx="10" fill="#a371f7"/><text x="600" y="132" text-anchor="middle" fill="white" font-size="26">next layer</text><rect x="760" y="90" width="160" height="70" rx="10" fill="#f85149"/><text x="840" y="132" text-anchor="middle" fill="white" font-size="26">n*n</text><path d="M200 125 L280 125" stroke="#8b949e" stroke-width="4" marker-end="url(#a)"/><path d="M440 125 L520 125" stroke="#8b949e" stroke-width="4" marker-end="url(#a)"/><path d="M680 125 L760 125" stroke="#8b949e" stroke-width="4" marker-end="url(#a)"/><text x="40" y="230" fill="#c9d1d9" font-size="20">Each BFS edge = one dice roll (cost 1)</text><text x="40" y="265" fill="#c9d1d9" font-size="20">If landing on snake/ladder: jump immediately before enqueue</text><text x="40" y="300" fill="#c9d1d9" font-size="20">First time reaching target is the minimum moves</text><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker></defs></svg>