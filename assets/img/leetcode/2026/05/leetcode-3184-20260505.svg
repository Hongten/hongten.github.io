<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="100" fill="#93c5fd" font-size="42" font-family="Arial">LeetCode 3184</text><text x="60" y="160" fill="#e2e8f0" font-size="30" font-family="Arial">Count Pairs That Form a Complete Day I</text><rect x="60" y="220" width="520" height="320" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="270" fill="#cbd5e1" font-size="24" font-family="monospace">hours[i] % 24 = r</text><text x="90" y="310" fill="#cbd5e1" font-size="24" font-family="monospace">need = (24 - r) % 24</text><text x="90" y="350" fill="#cbd5e1" font-size="24" font-family="monospace">ans += count[need]</text><text x="90" y="390" fill="#cbd5e1" font-size="24" font-family="monospace">count[r]++</text><text x="90" y="450" fill="#86efac" font-size="22" font-family="Arial">O(n) time, O(1) space</text></svg>