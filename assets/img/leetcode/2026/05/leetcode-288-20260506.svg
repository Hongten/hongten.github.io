<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b1020"/>
  <text x="56" y="88" fill="#e6edf3" font-size="42" font-family="Arial">LeetCode 288: Peeking Iterator</text>
  <text x="56" y="130" fill="#9fb0c3" font-size="26" font-family="Arial">Cache next value so peek() is O(1)</text>
  <rect x="70" y="190" width="1060" height="360" rx="16" fill="#111a2e" stroke="#2b3a5a"/>
  <text x="110" y="255" fill="#7dd3fc" font-size="28" font-family="Courier New">iterator: [1, 2, 3]</text>
  <text x="110" y="305" fill="#facc15" font-size="28" font-family="Courier New">nextVal = 1</text>
  <text x="110" y="355" fill="#86efac" font-size="28" font-family="Courier New">peek() -> 1 (no consume)</text>
  <text x="110" y="405" fill="#fda4af" font-size="28" font-family="Courier New">next() -> 1, nextVal = 2</text>
  <text x="110" y="455" fill="#c4b5fd" font-size="28" font-family="Courier New">hasNext() -> nextVal != null</text>
</svg>