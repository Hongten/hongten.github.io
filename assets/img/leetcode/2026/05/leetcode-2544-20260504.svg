<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><rect x="70" y="160" width="1060" height="380" rx="20" fill="#111827" stroke="#334155"/><text x="70" y="95" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 2544 Alternating Digit Sum</text><text x="120" y="240" fill="#93c5fd" font-size="38" font-family="Arial">n = 521</text><text x="120" y="300" fill="#e2e8f0" font-size="34" font-family="Arial">(+5) + (-2) + (+1) = 4</text><text x="120" y="380" fill="#86efac" font-size="30" font-family="Arial">sign sequence: +, -, +, -, ...</text><text x="120" y="450" fill="#fcd34d" font-size="30" font-family="Arial">Scan left to right and flip sign each step</text></svg>