<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="100" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3919 - Minimum Cost to Move Between Indices</text><text x="60" y="160" fill="#94a3b8" font-size="30" font-family="Arial">Maintain prefixMin and minimize nums[i] + prefixMin</text><rect x="70" y="220" width="1060" height="320" rx="14" fill="#111827" stroke="#334155"/><text x="100" y="280" fill="#22d3ee" font-size="28" font-family="monospace">prefixMin = nums[0]</text><text x="100" y="330" fill="#cbd5e1" font-size="26" font-family="monospace">for i = 1..n-1:</text><text x="140" y="375" fill="#f59e0b" font-size="26" font-family="monospace">ans = min(ans, nums[i] + prefixMin)</text><text x="140" y="420" fill="#a3e635" font-size="26" font-family="monospace">prefixMin = min(prefixMin, nums[i])</text><text x="100" y="490" fill="#94a3b8" font-size="22" font-family="Arial">Time: O(n)   Space: O(1)</text></svg>