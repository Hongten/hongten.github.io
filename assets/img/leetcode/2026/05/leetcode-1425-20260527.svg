<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1425 monotonic deque DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="85" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1425 Constrained Subsequence Sum</text>
  <text x="50" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">DP transition: dp[i] = nums[i] + max(0, best in last k)</text>

  <rect x="50" y="170" width="1100" height="390" rx="16" fill="#111827" stroke="#334155"/>

  <text x="90" y="230" fill="#a7f3d0" font-size="24" font-family="monospace">indices:  0   1   2   3   4   5   6</text>
  <text x="90" y="270" fill="#fca5a5" font-size="24" font-family="monospace">nums:     10   2  -10   5  20  -2   4</text>
  <text x="90" y="310" fill="#fcd34d" font-size="24" font-family="monospace">dp:       10  12    2  17  37  35  41</text>

  <rect x="90" y="350" width="420" height="150" rx="12" fill="#0f172a" stroke="#475569"/>
  <text x="110" y="390" fill="#e2e8f0" font-size="22" font-family="Inter,Arial,sans-serif">Monotonic deque stores indices</text>
  <text x="110" y="425" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">in decreasing dp order.</text>
  <text x="110" y="460" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">Front = max dp in window [i-k, i-1].</text>

  <rect x="560" y="350" width="550" height="150" rx="12" fill="#0f172a" stroke="#475569"/>
  <text x="580" y="390" fill="#e2e8f0" font-size="22" font-family="Inter,Arial,sans-serif">For each i:</text>
  <text x="580" y="425" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">1) Pop out-of-range indices (&lt; i-k)</text>
  <text x="580" y="455" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">2) Transition using deque front</text>
  <text x="580" y="485" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">3) Pop smaller dp from back, push i</text>
</svg>
