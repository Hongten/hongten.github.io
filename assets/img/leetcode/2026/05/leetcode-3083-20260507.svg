<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><rect x="60" y="70" width="1080" height="490" rx="18" fill="#121a33" stroke="#2a3a6a"/><text x="90" y="130" fill="#e6edf7" font-size="38" font-family="Arial">LeetCode 3083 - Substring in Reverse</text><text x="90" y="180" fill="#9fb3d9" font-size="24" font-family="Arial">Check all length-2 substrings in s and reverse(s)</text><rect x="90" y="230" width="460" height="90" rx="10" fill="#1d2a4d"/><text x="110" y="285" fill="#d6e4ff" font-size="34" font-family="Courier New">s = a b c d</text><rect x="650" y="230" width="460" height="90" rx="10" fill="#1d2a4d"/><text x="670" y="285" fill="#d6e4ff" font-size="34" font-family="Courier New">r = d c b a</text><text x="90" y="380" fill="#8be9fd" font-size="26" font-family="Arial">Set(s): ab, bc, cd</text><text x="90" y="425" fill="#8be9fd" font-size="26" font-family="Arial">Scan(r): dc, cb, ba  -> hit? yes => true</text></svg>