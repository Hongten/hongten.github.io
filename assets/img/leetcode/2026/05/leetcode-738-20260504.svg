<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#111827"/><text x="60" y="100" fill="#f8fafc" font-size="44" font-family="Arial">LeetCode 738: Monotone Increasing Digits</text><text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Arial">Greedy: decrease pivot, suffix to 9</text><text x="80" y="260" fill="#e5e7eb" font-size="32" font-family="Arial">n = 332</text><text x="80" y="320" fill="#fca5a5" font-size="32" font-family="Arial">3 3 2  -> violation at 3&gt;2</text><text x="80" y="380" fill="#86efac" font-size="32" font-family="Arial">3 2 9  -> still violation at 3&gt;2</text><text x="80" y="440" fill="#22d3ee" font-size="32" font-family="Arial">2 9 9  (answer)</text></svg>