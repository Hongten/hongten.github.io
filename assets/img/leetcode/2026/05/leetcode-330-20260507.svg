<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 330 - Patching Array</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Arial">Greedy coverage expansion: [1, miss)</text>
  <rect x="70" y="220" width="380" height="70" rx="12" fill="#1d4ed8"/>
  <text x="90" y="264" fill="#fff" font-size="28" font-family="Arial">covered: [1, miss)</text>
  <rect x="500" y="220" width="300" height="70" rx="12" fill="#16a34a"/>
  <text x="520" y="264" fill="#fff" font-size="28" font-family="Arial">use nums[i] ≤ miss</text>
  <text x="840" y="264" fill="#fbbf24" font-size="42" font-family="Arial">→</text>
  <rect x="900" y="220" width="250" height="70" rx="12" fill="#0891b2"/>
  <text x="920" y="264" fill="#fff" font-size="28" font-family="Arial">[1, miss+num)</text>
  <text x="70" y="370" fill="#cbd5e1" font-size="30" font-family="Arial">If nums[i] &gt; miss, patch miss itself</text>
  <rect x="70" y="410" width="500" height="80" rx="12" fill="#b91c1c"/>
  <text x="95" y="460" fill="#fff" font-size="32" font-family="Arial">add patch = miss  ⇒ new miss = 2*miss</text>
</svg>
