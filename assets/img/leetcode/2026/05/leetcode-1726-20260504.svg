<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b1020"/><stop offset="100%" stop-color="#172554"/></linearGradient></defs><rect width="1200" height="630" fill="url(#g)"/><text x="60" y="100" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 1726: Tuple with Same Product</text><rect x="80" y="170" width="480" height="360" rx="16" fill="#111827" stroke="#60a5fa"/><text x="110" y="230" fill="#93c5fd" font-size="30" font-family="monospace">Pairs -> Product Count</text><text x="110" y="280" fill="#e5e7eb" font-size="28" font-family="monospace">(2,6)=12</text><text x="110" y="320" fill="#e5e7eb" font-size="28" font-family="monospace">(3,4)=12</text><text x="110" y="370" fill="#e5e7eb" font-size="28" font-family="monospace">c=2, add c*(c-1)*4 = 8</text><text x="110" y="420" fill="#e5e7eb" font-size="28" font-family="monospace">Answer = sum over products</text></svg>