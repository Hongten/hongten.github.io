<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="1200" height="630" fill="#0b1020"/><text x="70" y="120" fill="#93c5fd" font-size="42" font-family="Arial">LeetCode 3928: Find X Value of Array VIII</text><text x="70" y="190" fill="#e5e7eb" font-size="30" font-family="Arial">Prefix/Suffix aggregation idea</text><rect x="70" y="250" width="1060" height="280" rx="16" fill="#111827" stroke="#334155"/><text x="100" y="320" fill="#a7f3d0" font-size="24" font-family="Courier New">pre[i]  = combine(pre[i-1], nums[i])</text><text x="100" y="380" fill="#fcd34d" font-size="24" font-family="Courier New">suf[i]  = combine(nums[i], suf[i+1])</text><text x="100" y="440" fill="#fca5a5" font-size="24" font-family="Courier New">ans[i]  = merge(pre[i-1], suf[i+1])</text></svg>