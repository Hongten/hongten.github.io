<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3226: Bit Changes (1 → 0 only)</text><rect x="60" y="150" width="1080" height="360" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="220" fill="#93c5fd" font-size="30" font-family="monospace">n = 11011010</text><text x="90" y="270" fill="#fde68a" font-size="30" font-family="monospace">k = 10010010</text><text x="90" y="330" fill="#fca5a5" font-size="28" font-family="monospace">invalid if (k &amp; ~n) != 0</text><text x="90" y="390" fill="#86efac" font-size="28" font-family="monospace">changes = popcount(n ^ k) = 2</text></svg>