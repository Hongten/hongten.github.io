<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 362 · Design Hit Counter</text><rect x="80" y="140" width="1040" height="360" rx="16" fill="#111827" stroke="#334155"/><text x="120" y="200" fill="#93c5fd" font-size="30" font-family="Arial">Queue keeps timestamps in last 300 seconds</text><text x="120" y="250" fill="#cbd5e1" font-size="26" font-family="Arial">hit(t): append t</text><text x="120" y="295" fill="#cbd5e1" font-size="26" font-family="Arial">getHits(t): pop while front &lt;= t - 300</text><text x="120" y="340" fill="#cbd5e1" font-size="26" font-family="Arial">answer = queue size</text><rect x="120" y="390" width="900" height="70" rx="10" fill="#1e293b"/><text x="145" y="435" fill="#f8fafc" font-size="24" font-family="monospace">[301, 302, 305, 420] at t=600  =&gt; remove &lt;=300, keep 301,302,305,420</text></svg>