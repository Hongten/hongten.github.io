<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="100%" height="100%" fill="#0f172a"/><text x="60" y="110" fill="#e2e8f0" font-size="42">LeetCode 3917</text><text x="60" y="170" fill="#93c5fd" font-size="34">Count Indices With Opposite Parity</text><text x="60" y="250" fill="#cbd5e1" font-size="28">Count mismatches on even/odd indices</text><text x="60" y="300" fill="#cbd5e1" font-size="28">answer = evenMismatch * oddMismatch</text><circle cx="920" cy="240" r="36" fill="#22c55e"/><circle cx="980" cy="240" r="36" fill="#ef4444"/><text x="885" y="330" fill="#94a3b8" font-size="22">pair one even-side mismatch with one odd-side mismatch</text></svg>