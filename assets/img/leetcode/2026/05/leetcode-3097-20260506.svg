<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="100%" height="100%" fill="#0b1020"/><text x="60" y="110" fill="#8be9fd" font-size="42" font-family="Arial">LeetCode 3097</text><text x="60" y="170" fill="#f8f8f2" font-size="30" font-family="Arial">Sliding Window + Bit Counts</text><rect x="60" y="220" width="1080" height="320" rx="16" fill="#1b2440" stroke="#50fa7b"/><text x="90" y="280" fill="#f1fa8c" font-size="26" font-family="Arial">[left ... right] window</text><text x="90" y="330" fill="#f8f8f2" font-size="24" font-family="Arial">bitCount[b] > 0  =>  OR has bit b</text><text x="90" y="380" fill="#f8f8f2" font-size="24" font-family="Arial">Expand right, shrink left while OR >= k</text><text x="90" y="430" fill="#f8f8f2" font-size="24" font-family="Arial">Update minimum length during shrinking</text></svg>