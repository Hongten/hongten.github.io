<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><rect width="1200" height="520" fill="#0f172a"/><text x="60" y="80" fill="#e2e8f0" font-size="36">LeetCode 3931: Prefix/Suffix XOR Layout</text><rect x="70" y="140" width="1060" height="280" rx="16" fill="#111827" stroke="#334155"/><text x="100" y="200" fill="#93c5fd" font-size="28" font-family="monospace">nums: [a0, a1, a2, ...]</text><text x="100" y="250" fill="#86efac" font-size="28" font-family="monospace">prefix: [0, a0, a0^a1, ...]</text><text x="100" y="300" fill="#fca5a5" font-size="28" font-family="monospace">suffix: [..., a(i+1)^...^a(n-1), 0]</text><text x="100" y="350" fill="#fde68a" font-size="28" font-family="monospace">ans[i] = prefix[i] ^ suffix[i+1]</text></svg>