<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs><rect width="1200" height="630" fill="url(#g)"/><text x="60" y="110" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3392</text><text x="60" y="165" fill="#93c5fd" font-size="32" font-family="Arial">Count Subarrays of Length Three With a Condition</text><rect x="60" y="230" width="1080" height="300" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="290" fill="#f8fafc" font-size="30" font-family="Courier New">Window [a, b, c]</text><text x="90" y="350" fill="#fbbf24" font-size="36" font-family="Courier New">Valid if: 2 * (a + c) == b</text><text x="90" y="420" fill="#cbd5e1" font-size="28" font-family="Courier New">Scan i = 1..n-2 and count matches</text></svg>