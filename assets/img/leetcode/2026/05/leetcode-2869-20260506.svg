<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 2869 · Minimum Operations to Collect Elements</text>
  <rect x="70" y="140" width="1060" height="420" rx="16" fill="#111827" stroke="#334155"/>
  <text x="110" y="210" fill="#93c5fd" font-size="30" font-family="Arial">Scan from right, collect values in [1..k]</text>
  <text x="110" y="270" fill="#f8fafc" font-size="28" font-family="monospace">nums = [3,1,5,4,2], k=2</text>
  <text x="110" y="320" fill="#86efac" font-size="28" font-family="monospace">i=4 -> seen={2}</text>
  <text x="110" y="365" fill="#86efac" font-size="28" font-family="monospace">i=3 -> seen={2}</text>
  <text x="110" y="410" fill="#86efac" font-size="28" font-family="monospace">i=2 -> seen={2}</text>
  <text x="110" y="455" fill="#86efac" font-size="28" font-family="monospace">i=1 -> seen={1,2}  (done)</text>
  <text x="110" y="510" fill="#fbbf24" font-size="30" font-family="Arial">answer = n - i = 5 - 1 = 4</text>
</svg>
