<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="90" fill="#e6edf3" font-size="44" font-family="Arial">LeetCode 456 - 132 Pattern</text><text x="60" y="150" fill="#8b949e" font-size="28" font-family="Arial">Reverse scan + decreasing stack + mid tracker</text><rect x="60" y="210" width="1080" height="330" rx="14" fill="#161b22" stroke="#30363d"/><text x="90" y="270" fill="#58a6ff" font-size="26" font-family="monospace">nums = [3, 1, 4, 2]</text><text x="90" y="320" fill="#c9d1d9" font-size="24" font-family="monospace">scan right -> left: 2, 4, 1, 3</text><text x="90" y="370" fill="#7ee787" font-size="24" font-family="monospace">stack keeps candidates for '3' (decreasing)</text><text x="90" y="420" fill="#ffa657" font-size="24" font-family="monospace">mid stores popped value as candidate '2'</text><text x="90" y="470" fill="#ff7b72" font-size="24" font-family="monospace">if current &lt; mid => found 1-3-2</text></svg>