<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1283 binary search on divisor">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 1283 • Binary Search on Divisor</text>
  <text x="60" y="145" fill="#94a3b8" font-size="26" font-family="Arial">f(d) = Σ ceil(nums[i] / d), find min d with f(d) ≤ threshold</text>
  <rect x="70" y="200" width="500" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <text x="95" y="245" fill="#cbd5e1" font-size="24" font-family="monospace">Example: nums = [1,2,5,9], threshold = 6</text>
  <text x="95" y="290" fill="#a7f3d0" font-size="24" font-family="monospace">d=3 → 1+1+2+3 = 7 (too big)</text>
  <text x="95" y="335" fill="#bfdbfe" font-size="24" font-family="monospace">d=5 → 1+1+1+2 = 5 (ok)</text>
  <text x="95" y="380" fill="#fef08a" font-size="24" font-family="monospace">Monotonic: larger d ⇒ smaller/equal f(d)</text>
  <text x="95" y="425" fill="#fda4af" font-size="24" font-family="monospace">Binary search answer in [1, max(nums)]</text>
  <polyline points="700,450 760,380 820,340 880,300 940,285 1000,270" fill="none" stroke="#38bdf8" stroke-width="6"/>
  <text x="705" y="485" fill="#e2e8f0" font-size="22" font-family="Arial">f(d) decreases as d increases</text>
</svg>
