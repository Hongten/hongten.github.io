<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><rect x="60" y="70" width="1080" height="490" rx="20" fill="#111827" stroke="#334155"/><text x="90" y="150" fill="#93c5fd" font-size="38" font-family="Arial">LeetCode 1880</text><text x="90" y="220" fill="#e5e7eb" font-size="30" font-family="Arial">firstWord + secondWord == targetWord</text><text x="90" y="290" fill="#cbd5e1" font-size="26" font-family="monospace">"acb" -> 021 -> 21</text><text x="90" y="340" fill="#cbd5e1" font-size="26" font-family="monospace">"cba" -> 210</text><text x="90" y="390" fill="#fde68a" font-size="28" font-family="monospace">21 + 210 = 231 == "cdb"</text><text x="90" y="470" fill="#94a3b8" font-size="22" font-family="Arial">String to number mapping, linear scan accumulation</text></svg>