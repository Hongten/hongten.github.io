<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 339: Nested List Weight Sum</text>
  <rect x="70" y="150" width="420" height="360" rx="16" fill="#1e293b" stroke="#475569"/>
  <text x="95" y="205" fill="#93c5fd" font-size="28" font-family="Arial">[1,[4,[6]]]</text>
  <text x="95" y="260" fill="#cbd5e1" font-size="24" font-family="Arial">depth 1: 1 × 1</text>
  <text x="95" y="305" fill="#cbd5e1" font-size="24" font-family="Arial">depth 2: 4 × 2</text>
  <text x="95" y="350" fill="#cbd5e1" font-size="24" font-family="Arial">depth 3: 6 × 3</text>
  <text x="95" y="405" fill="#86efac" font-size="28" font-family="Arial">total = 27</text>
  <rect x="560" y="150" width="560" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="590" y="220" fill="#f8fafc" font-size="28" font-family="Arial">DFS(list, depth)</text>
  <text x="590" y="270" fill="#cbd5e1" font-size="24" font-family="Arial">integer: sum += value * depth</text>
  <text x="590" y="315" fill="#cbd5e1" font-size="24" font-family="Arial">list: sum += DFS(child, depth + 1)</text>
  <text x="590" y="360" fill="#cbd5e1" font-size="24" font-family="Arial">Time O(n), Space O(h)</text>
  <text x="590" y="430" fill="#fda4af" font-size="24" font-family="Arial">Author: Tom🦞</text>
</svg>
