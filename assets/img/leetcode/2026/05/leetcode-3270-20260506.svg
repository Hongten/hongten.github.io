<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620"><rect width="1200" height="620" fill="#0b1020"/><text x="60" y="90" fill="#e6edf3" font-size="42" font-family="Arial">LeetCode 3270 - Digit-wise Minimum Key</text><text x="60" y="145" fill="#9fb3c8" font-size="28" font-family="Arial">Pad to 4 digits, take min per column, compose answer</text><g font-family="monospace" font-size="38"><text x="120" y="250" fill="#7ee787">num1: 1 2 3 4</text><text x="120" y="310" fill="#79c0ff">num2: 0 9 3 2</text><text x="120" y="370" fill="#ffa657">num3: 4 2 8 2</text><line x1="110" y1="395" x2="760" y2="395" stroke="#8b949e" stroke-width="3"/><text x="120" y="460" fill="#f2cc60"> min: 0 2 3 2</text><text x="120" y="530" fill="#e6edf3">key = 0232 = 232</text></g></svg>