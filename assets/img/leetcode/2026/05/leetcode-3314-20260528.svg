<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0b1020"/><text x="60" y="90" fill="#7dd3fc" font-size="42" font-family="Arial">LeetCode 3314 - Bit Trick</text>
<text x="60" y="150" fill="#e2e8f0" font-size="28" font-family="Arial">p = ...01111 (t trailing ones)</text>
<text x="60" y="200" fill="#e2e8f0" font-size="28" font-family="Arial">min y = p - 2^(t-1)</text>
<rect x="60" y="250" width="1080" height="280" rx="16" fill="#111827" stroke="#334155"/>
<text x="100" y="320" fill="#f8fafc" font-size="30" font-family="monospace">Example: p = 31 (11111₂), t = 5</text>
<text x="100" y="380" fill="#f8fafc" font-size="30" font-family="monospace">y = 31 - 2^(5-1) = 15 (01111₂)</text>
<text x="100" y="440" fill="#86efac" font-size="30" font-family="monospace">y | (y+1) = 15 | 16 = 31 ✓</text>
</svg>