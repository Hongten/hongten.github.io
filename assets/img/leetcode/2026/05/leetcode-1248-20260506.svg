<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#1f2a44"/></linearGradient></defs><rect width="1200" height="630" fill="url(#g)"/><text x="60" y="95" fill="#e6edf3" font-size="42" font-family="Arial">LeetCode 1248</text><text x="60" y="145" fill="#9fb3c8" font-size="30" font-family="Arial">Count Number of Nice Subarrays</text><rect x="80" y="210" width="1040" height="340" rx="20" fill="#111827" stroke="#374151"/><text x="120" y="300" fill="#86efac" font-size="30" font-family="Arial">exactly(k) = atMost(k) - atMost(k-1)</text><text x="120" y="370" fill="#cbd5e1" font-size="24" font-family="Arial">Sliding window counts subarrays ending at r</text><text x="120" y="430" fill="#93c5fd" font-size="24" font-family="Arial">Window keeps oddCount ≤ k</text></svg>