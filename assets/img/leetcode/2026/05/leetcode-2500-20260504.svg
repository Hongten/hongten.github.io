<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1220"/><rect x="60" y="70" width="1080" height="490" rx="18" fill="#111827" stroke="#334155"/><text x="90" y="140" fill="#e5e7eb" font-size="44" font-family="Arial">LeetCode 2500</text><text x="90" y="190" fill="#93c5fd" font-size="30" font-family="Arial">Delete Greatest Value in Each Row</text><text x="90" y="240" fill="#9ca3af" font-size="26" font-family="Arial">Sort each row ascending, then scan columns</text><g transform="translate(90,290)"><rect x="0" y="0" width="240" height="180" fill="#1f2937" stroke="#475569"/><rect x="280" y="0" width="240" height="180" fill="#1f2937" stroke="#475569"/><rect x="560" y="0" width="240" height="180" fill="#1f2937" stroke="#475569"/><text x="25" y="45" fill="#e2e8f0" font-size="24">1 2 4</text><text x="25" y="85" fill="#e2e8f0" font-size="24">1 3 3</text><text x="25" y="125" fill="#e2e8f0" font-size="24">2 2 1</text><text x="310" y="45" fill="#fca5a5" font-size="24">Round 1 max=2</text><text x="310" y="85" fill="#fca5a5" font-size="24">Round 2 max=3</text><text x="310" y="125" fill="#fca5a5" font-size="24">Round 3 max=4</text><text x="590" y="85" fill="#86efac" font-size="36">sum = 9</text></g><text x="90" y="530" fill="#86efac" font-size="26" font-family="Arial">Author: Tom🦞</text></svg>