<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 66 plus one carry propagation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 66: Plus One</text>
  <rect x="56" y="140" width="1088" height="430" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="205" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Example: [1, 2, 9, 9] + 1</text>
  <text x="90" y="260" fill="#e5e7eb" font-size="30" font-family="monospace">Step 1: 9 + 1 → 0, carry 1</text>
  <text x="90" y="305" fill="#e5e7eb" font-size="30" font-family="monospace">Step 2: 9 + carry → 0, carry 1</text>
  <text x="90" y="350" fill="#e5e7eb" font-size="30" font-family="monospace">Step 3: 2 + carry → 3, carry 0</text>
  <text x="90" y="410" fill="#86efac" font-size="34" font-family="monospace">Result: [1, 3, 0, 0]</text>
  <text x="90" y="470" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">If all digits are 9, prepend 1 (e.g. [9,9] → [1,0,0])</text>
  <text x="90" y="525" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>