<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Arial">LeetCode 3940 · Limit Occurrences in Sorted Array</text><rect x="70" y="150" width="1060" height="360" rx="18" fill="#111827" stroke="#374151"/><text x="95" y="210" fill="#93c5fd" font-size="30" font-family="monospace">scan x: [1,1,1,2,2,3]</text><text x="95" y="260" fill="#f9a8d4" font-size="30" font-family="monospace">write w if w&lt;2 or x!=nums[w-2]</text><text x="95" y="320" fill="#86efac" font-size="30" font-family="monospace">result prefix: [1,1,2,2,3]</text><text x="95" y="380" fill="#fde68a" font-size="30" font-family="monospace">each value appears at most twice</text></svg>