<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3211 · DFS Backtracking</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Arial">Generate Binary Strings Without Adjacent Zeros</text>
  <rect x="60" y="190" width="1080" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="250" fill="#f8fafc" font-size="24" font-family="monospace">start</text>
  <text x="220" y="250" fill="#f8fafc" font-size="24" font-family="monospace">/   \</text>
  <text x="190" y="300" fill="#86efac" font-size="22" font-family="monospace">1</text>
  <text x="260" y="300" fill="#fca5a5" font-size="22" font-family="monospace">0 (only if prev != 0)</text>
  <text x="90" y="370" fill="#cbd5e1" font-size="22" font-family="monospace">Rule: never place 0 after 0</text>
  <text x="90" y="420" fill="#cbd5e1" font-size="22" font-family="monospace">Always place 1, conditionally place 0</text>
  <text x="90" y="470" fill="#cbd5e1" font-size="22" font-family="monospace">Collect path when length == n</text>
</svg>