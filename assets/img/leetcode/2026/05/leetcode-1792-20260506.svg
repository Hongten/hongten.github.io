<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1792 marginal gain max heap diagram">
  <rect width="1200" height="630" fill="#0b1220"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Arial" font-weight="700">LeetCode 1792: Maximum Average Pass Ratio</text>
  <text x="60" y="145" fill="#93c5fd" font-size="30" font-family="Arial">Greedy by marginal gain + max heap</text>
  <rect x="60" y="190" width="520" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="95" y="245" fill="#cbd5e1" font-size="26" font-family="Arial">Class A: p/t = 2/4</text>
  <text x="95" y="285" fill="#86efac" font-size="24" font-family="Arial">gain = 3/5 - 2/4 = 0.10</text>
  <text x="95" y="335" fill="#cbd5e1" font-size="26" font-family="Arial">Class B: p/t = 3/9</text>
  <text x="95" y="375" fill="#86efac" font-size="24" font-family="Arial">gain = 4/10 - 3/9 = 0.0667</text>
  <text x="95" y="425" fill="#cbd5e1" font-size="26" font-family="Arial">Pick max gain first, then recompute</text>
  <rect x="650" y="190" width="490" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="690" y="250" fill="#f9a8d4" font-size="28" font-family="Arial">Max-Heap (top = best gain)</text>
  <text x="690" y="310" fill="#e5e7eb" font-size="24" font-family="Arial">1) pop best class</text>
  <text x="690" y="350" fill="#e5e7eb" font-size="24" font-family="Arial">2) add one passing student</text>
  <text x="690" y="390" fill="#e5e7eb" font-size="24" font-family="Arial">3) push updated class back</text>
  <text x="690" y="430" fill="#e5e7eb" font-size="24" font-family="Arial">Repeat extraStudents times</text>
  <text x="60" y="600" fill="#94a3b8" font-size="22" font-family="Arial">Author: Tom🦞</text>
</svg>
