<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420"><rect width="1200" height="420" fill="#0f172a"/><text x="60" y="70" fill="#e2e8f0" font-size="34" font-family="Arial">LeetCode 1578 - Minimum Time to Make Rope Colorful</text><text x="60" y="115" fill="#94a3b8" font-size="24" font-family="Arial">Greedy per same-color block: remove sum(block) - max(block)</text><rect x="60" y="160" width="1080" height="180" rx="14" fill="#111827" stroke="#334155"/><text x="90" y="205" fill="#f8fafc" font-size="24" font-family="monospace">colors:  a a a b b a</text><text x="90" y="245" fill="#f8fafc" font-size="24" font-family="monospace">time:    1 2 3 4 1 5</text><text x="90" y="285" fill="#22c55e" font-size="24" font-family="monospace">group aaa: sum=6, max=3 => remove 3</text><text x="90" y="320" fill="#22c55e" font-size="24" font-family="monospace">group bb : sum=5, max=4 => remove 1   total=4</text></svg>