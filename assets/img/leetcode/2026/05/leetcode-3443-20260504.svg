<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420"><rect width="960" height="420" fill="#0b1020"/><text x="40" y="60" fill="#e5e7eb" font-size="28" font-family="Arial">LeetCode 3443 - Prefix Greedy Insight</text><text x="40" y="110" fill="#93c5fd" font-size="22" font-family="Arial">base = |E-W| + |N-S|</text><text x="40" y="150" fill="#86efac" font-size="22" font-family="Arial">best(prefix) = min(prefixLen, base + 2k)</text><line x1="40" y1="180" x2="920" y2="180" stroke="#334155"/><text x="40" y="230" fill="#f9a8d4" font-size="20" font-family="Arial">Each change can improve Manhattan distance by at most 2.</text><text x="40" y="270" fill="#f9a8d4" font-size="20" font-family="Arial">Scan all prefixes and take max best(prefix).</text></svg>