<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="95" fill="#e5e7eb" font-size="42" font-family="Arial">LeetCode 271: Encode and Decode Strings</text><rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#334155"/><text x="90" y="230" fill="#93c5fd" font-size="30" font-family="Arial">Encode: ["lint","code"]</text><text x="90" y="285" fill="#86efac" font-size="34" font-family="monospace">4#lint4#code</text><text x="90" y="360" fill="#93c5fd" font-size="30" font-family="Arial">Decode: read length until '#', then read exact payload</text><text x="90" y="430" fill="#e5e7eb" font-size="28" font-family="Arial">No delimiter ambiguity, linear scan O(total_chars)</text></svg>