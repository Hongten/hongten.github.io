<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="60" y="70" width="1080" height="490" rx="20" fill="#111827" stroke="#334155"/>
  <text x="90" y="140" fill="#93c5fd" font-size="40" font-family="Arial">LeetCode 3932 · Prefix/Suffix XOR</text>
  <text x="90" y="205" fill="#e5e7eb" font-size="28" font-family="Arial">pre[i-1] XOR suf[i+1] = XOR of all except nums[i]</text>
  <rect x="90" y="250" width="1020" height="260" rx="14" fill="#0b1220" stroke="#475569"/>
  <text x="120" y="305" fill="#f8fafc" font-size="24" font-family="Courier New">nums: [a0, a1, a2, a3, a4]</text>
  <text x="120" y="355" fill="#86efac" font-size="24" font-family="Courier New">pre:  [a0, a0^a1, ..., a0^...^a4]</text>
  <text x="120" y="405" fill="#fca5a5" font-size="24" font-family="Courier New">suf:  [a0^...^a4, ..., a3^a4, a4]</text>
  <text x="120" y="455" fill="#fde68a" font-size="24" font-family="Courier New">ans[i] = pre[i-1] ^ suf[i+1]</text>
</svg>