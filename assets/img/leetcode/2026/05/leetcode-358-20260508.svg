<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#0b132b"/><stop offset="1" stop-color="#1c2541"/></linearGradient></defs><rect width="1200" height="630" fill="url(#bg)"/><text x="56" y="90" fill="#e0e7ff" font-size="42" font-family="Arial">LeetCode 358</text><text x="56" y="138" fill="#93c5fd" font-size="30" font-family="Arial">Rearrange String k Distance Apart</text><rect x="70" y="190" width="1060" height="360" rx="16" fill="#111827" stroke="#334155"/><text x="110" y="260" fill="#f8fafc" font-size="28" font-family="monospace">maxHeap:  [a:3, b:2, c:1]</text><text x="110" y="320" fill="#a7f3d0" font-size="28" font-family="monospace">step 0 -> pick a, cooldown until 0+k</text><text x="110" y="380" fill="#fca5a5" font-size="28" font-family="monospace">step 1 -> pick b, cooldown until 1+k</text><text x="110" y="440" fill="#fde68a" font-size="28" font-family="monospace">step 2 -> pick c ... then released chars return</text><text x="110" y="500" fill="#c4b5fd" font-size="28" font-family="monospace">heap + cooldown queue => keep distance >= k</text></svg>