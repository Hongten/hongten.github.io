<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><rect x="40" y="40" width="1120" height="550" rx="20" fill="#121a33" stroke="#2a3a66"/><text x="70" y="110" fill="#9ecbff" font-size="34" font-family="Arial">LeetCode 3306</text><text x="70" y="165" fill="#ffffff" font-size="40" font-family="Arial">Count of Substrings Containing Every Vowel and K Consonants II</text><text x="70" y="230" fill="#c9d6ff" font-size="28" font-family="Arial">Sliding window: exact(k) = atLeast(k) - atLeast(k+1)</text><rect x="70" y="280" width="1060" height="250" rx="14" fill="#0d1428" stroke="#334b88"/><text x="90" y="330" fill="#7ee787" font-size="24" font-family="Courier New">left ...... right</text><text x="90" y="370" fill="#c9d1d9" font-size="24" font-family="Courier New">Track vowel frequencies + consonant count</text><text x="90" y="410" fill="#c9d1d9" font-size="24" font-family="Courier New">When all 5 vowels present and consonants &gt;= k:</text><text x="90" y="450" fill="#c9d1d9" font-size="24" font-family="Courier New">  add n-right (all extensions valid), then shrink left</text></svg>