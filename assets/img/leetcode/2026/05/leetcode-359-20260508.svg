<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="100%" height="100%" fill="#0f172a"/><text x="60" y="120" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 359: Logger Rate Limiter</text><text x="60" y="190" fill="#94a3b8" font-size="28" font-family="Arial">Allow print if first time or timestamp - last &gt;= 10</text><line x1="80" y1="320" x2="1120" y2="320" stroke="#475569" stroke-width="4"/><circle cx="180" cy="320" r="12" fill="#22c55e"/><text x="160" y="360" fill="#cbd5e1" font-size="24">t=1 print foo</text><circle cx="420" cy="320" r="12" fill="#ef4444"/><text x="390" y="360" fill="#cbd5e1" font-size="24">t=2 skip foo</text><circle cx="900" cy="320" r="12" fill="#22c55e"/><text x="860" y="360" fill="#cbd5e1" font-size="24">t=11 print foo</text></svg>