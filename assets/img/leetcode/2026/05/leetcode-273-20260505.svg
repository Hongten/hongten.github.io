<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1220"/><rect x="50" y="80" width="1100" height="500" rx="20" fill="#111827" stroke="#334155"/><text x="80" y="150" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 273 · Integer to English Words</text><text x="80" y="230" fill="#93c5fd" font-size="34" font-family="Arial">1,234,567,891</text><text x="80" y="290" fill="#a7f3d0" font-size="30" font-family="Arial">= 1 Billion + 234 Million + 567 Thousand + 891</text><text x="80" y="360" fill="#fcd34d" font-size="30" font-family="Arial">Each chunk: convert [0..999] recursively</text><text x="80" y="430" fill="#cbd5e1" font-size="28" font-family="Arial">Below 20, tens, hundreds, then append unit names</text></svg>