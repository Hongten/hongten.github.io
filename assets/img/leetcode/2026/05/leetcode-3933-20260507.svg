<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="120" fill="#e5e7eb" font-size="44">LeetCode 3933</text><text x="60" y="190" fill="#93c5fd" font-size="34">Prefix XOR + Suffix XOR</text><rect x="60" y="250" width="1080" height="280" rx="18" fill="#1f2937"/><text x="90" y="320" fill="#86efac" font-size="30">ans[i] = pre[i] XOR suf[i+1]</text><text x="90" y="380" fill="#e5e7eb" font-size="26">remove self, merge left and right XOR parts</text></svg>