<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#111827"/><text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Arial">LeetCode 2194: Cells in a Range on an Excel Sheet</text><rect x="70" y="140" width="1060" height="420" rx="16" fill="#1f2937" stroke="#374151"/><text x="100" y="230" fill="#93c5fd" font-size="34" font-family="Arial">Input: K1:L2</text><text x="100" y="300" fill="#e5e7eb" font-size="30" font-family="Arial">Columns: K -&gt; L, Rows: 1 -&gt; 2</text><text x="100" y="370" fill="#86efac" font-size="30" font-family="Arial">Output: [K1, K2, L1, L2]</text><text x="100" y="450" fill="#cbd5e1" font-size="28" font-family="Arial">Iterate column first, then row for each column.</text><text x="100" y="520" fill="#fda4af" font-size="26" font-family="Arial">Author: Tom🦞</text></svg>