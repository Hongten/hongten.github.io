<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><rect x="60" y="60" width="1080" height="510" rx="24" fill="#111827" stroke="#334155"/><text x="100" y="140" fill="#93c5fd" font-size="36" font-family="Arial">LeetCode 2790 · Greedy</text><text x="100" y="200" fill="#e5e7eb" font-size="30" font-family="Arial">Maximum Number of Groups With Increasing Length</text><text x="100" y="280" fill="#a7f3d0" font-size="26" font-family="Arial">Sort usageLimits → accumulate available capacity</text><text x="100" y="330" fill="#a7f3d0" font-size="26" font-family="Arial">Build groups of size 1, 2, 3, ... whenever available ≥ need</text><text x="100" y="380" fill="#fcd34d" font-size="24" font-family="Arial">need = groups + 1; if available ≥ need: groups++, available -= need</text><text x="100" y="460" fill="#cbd5e1" font-size="24" font-family="Arial">Author: Tom🦞</text></svg>