<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0b1020"/>
<text x="60" y="90" fill="#e6edf3" font-size="42" font-family="Arial">LeetCode 442 - In-place Sign Marking</text>
<rect x="60" y="140" width="1080" height="430" rx="16" fill="#111a33" stroke="#2f3b66"/>
<text x="90" y="200" fill="#9ecbff" font-size="30" font-family="Arial">nums = [4,3,2,7,8,2,3,1]</text>
<text x="90" y="260" fill="#e6edf3" font-size="26" font-family="Arial">visit 4 -> mark index 3 negative</text>
<text x="90" y="310" fill="#e6edf3" font-size="26" font-family="Arial">visit 2 -> mark index 1 negative</text>
<text x="90" y="360" fill="#e6edf3" font-size="26" font-family="Arial">visit 2 again -> index 1 already negative => duplicate 2</text>
<text x="90" y="410" fill="#e6edf3" font-size="26" font-family="Arial">visit 3 again -> index 2 already negative => duplicate 3</text>
<text x="90" y="490" fill="#7ee787" font-size="32" font-family="Arial">Output: [2, 3]</text>
</svg>