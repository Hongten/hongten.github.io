<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="90" fill="#e6edf3" font-size="42" font-family="Arial">LeetCode 373 · Min-Heap Frontier Expansion</text><rect x="60" y="140" width="480" height="420" rx="16" fill="#111a2e" stroke="#2f81f7"/><text x="90" y="190" fill="#9ecbff" font-size="30" font-family="Arial">nums1 = [1,7,11]</text><text x="90" y="240" fill="#9ecbff" font-size="30" font-family="Arial">nums2 = [2,4,6]</text><text x="90" y="300" fill="#e6edf3" font-size="28" font-family="Arial">Start heap with (0,0)=3</text><text x="90" y="350" fill="#e6edf3" font-size="28" font-family="Arial">Pop min, push right/down neighbors</text><text x="90" y="400" fill="#e6edf3" font-size="28" font-family="Arial">Stop after k pops</text><rect x="620" y="140" width="520" height="420" rx="16" fill="#111a2e" stroke="#3fb950"/><text x="650" y="200" fill="#3fb950" font-size="30" font-family="Arial">Output order (k=4)</text><text x="650" y="260" fill="#e6edf3" font-size="30" font-family="Arial">[1,2] -> 3</text><text x="650" y="310" fill="#e6edf3" font-size="30" font-family="Arial">[1,4] -> 5</text><text x="650" y="360" fill="#e6edf3" font-size="30" font-family="Arial">[1,6] -> 7</text><text x="650" y="410" fill="#e6edf3" font-size="30" font-family="Arial">[7,2] -> 9</text></svg>