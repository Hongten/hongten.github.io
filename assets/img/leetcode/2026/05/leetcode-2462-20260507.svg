<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420"><rect width="1200" height="420" fill="#0b1020"/><text x="40" y="70" fill="#e6edf3" font-size="34" font-family="Arial">LeetCode 2462 - Total Cost to Hire K Workers</text><rect x="70" y="120" width="330" height="220" rx="14" fill="#16213e" stroke="#4fa3ff"/><text x="95" y="170" fill="#9ecbff" font-size="24" font-family="Arial">Left Min-Heap</text><text x="95" y="215" fill="#e6edf3" font-size="20" font-family="Arial">candidates from left</text><rect x="800" y="120" width="330" height="220" rx="14" fill="#16213e" stroke="#4fa3ff"/><text x="825" y="170" fill="#9ecbff" font-size="24" font-family="Arial">Right Min-Heap</text><text x="825" y="215" fill="#e6edf3" font-size="20" font-family="Arial">candidates from right</text><line x1="430" y1="230" x2="770" y2="230" stroke="#ffd166" stroke-width="6"/><polygon points="770,230 740,215 740,245" fill="#ffd166"/><text x="490" y="205" fill="#ffd166" font-size="21" font-family="Arial">pick smaller top each round</text><text x="360" y="375" fill="#8be9a8" font-size="24" font-family="Arial">Hire -> Refill from same side -> Repeat k times</text></svg>