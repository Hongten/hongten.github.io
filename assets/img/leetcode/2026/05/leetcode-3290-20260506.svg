<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3290 DP picks diagram"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs><rect width="1200" height="630" fill="url(#g)"/><text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 3290 · Maximum Multiplication Score</text><rect x="60" y="140" width="1080" height="430" rx="18" fill="#111827" stroke="#334155"/><text x="90" y="200" fill="#93c5fd" font-size="30" font-family="Arial">DP[k] = best score after picking k numbers from processed b prefix</text><text x="90" y="250" fill="#f8fafc" font-size="28" font-family="Arial">For each x in b, update k from 4 down to 1:</text><text x="110" y="300" fill="#86efac" font-size="34" font-family="Courier New">dp[k] = max(dp[k], dp[k-1] + a[k-1] * x)</text><text x="90" y="360" fill="#cbd5e1" font-size="26" font-family="Arial">Reverse order prevents reusing the same x twice.</text><text x="90" y="430" fill="#fcd34d" font-size="26" font-family="Arial">State count is constant (5 values), total complexity O(n).</text><text x="90" y="500" fill="#e2e8f0" font-size="24" font-family="Arial">Author: Tom🦞</text></svg>