<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0b1020"/>
<text x="60" y="90" fill="#7dd3fc" font-size="42" font-family="Arial">LeetCode 3924 · Prefix/Suffix XOR</text>
<rect x="80" y="170" width="1040" height="320" rx="18" fill="#111827" stroke="#334155"/>
<text x="110" y="230" fill="#e5e7eb" font-size="30" font-family="monospace">nums:   [a0, a1, a2, a3, a4]</text>
<text x="110" y="290" fill="#a7f3d0" font-size="28" font-family="monospace">prefix: [a0, a0^a1, ..., a0^...^a4]</text>
<text x="110" y="350" fill="#fcd34d" font-size="28" font-family="monospace">suffix: [..., a2^a3^a4, a3^a4, a4]</text>
<text x="110" y="410" fill="#f9a8d4" font-size="28" font-family="monospace">ans[i] = (i&gt;0?pre[i-1]:0) ^ (i+1&lt;n?suf[i+1]:0)</text>
<text x="60" y="570" fill="#94a3b8" font-size="24" font-family="Arial">Author: Tom🦞</text>
</svg>