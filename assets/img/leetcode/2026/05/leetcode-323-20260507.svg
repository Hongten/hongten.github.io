<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><rect x="60" y="170" width="1080" height="380" rx="20" fill="#111827" stroke="#334155"/><text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Arial">LeetCode 323 - Connected Components</text><circle cx="220" cy="300" r="18" fill="#38bdf8"/><circle cx="320" cy="260" r="18" fill="#38bdf8"/><circle cx="390" cy="340" r="18" fill="#38bdf8"/><line x1="220" y1="300" x2="320" y2="260" stroke="#93c5fd" stroke-width="4"/><line x1="320" y1="260" x2="390" y2="340" stroke="#93c5fd" stroke-width="4"/><circle cx="650" cy="280" r="18" fill="#34d399"/><circle cx="740" cy="340" r="18" fill="#34d399"/><line x1="650" y1="280" x2="740" y2="340" stroke="#6ee7b7" stroke-width="4"/><circle cx="980" cy="310" r="18" fill="#f59e0b"/><text x="90" y="500" fill="#cbd5e1" font-size="30" font-family="Arial">Union each edge, decrement components only when roots differ.</text><text x="90" y="540" fill="#86efac" font-size="30" font-family="Arial">Final number of disjoint sets = connected components.</text></svg>