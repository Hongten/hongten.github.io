<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a"/>
  <text x="40" y="60" fill="#e2e8f0" font-size="28" font-family="Arial">LeetCode 1438: Sliding Window + Monotonic Deques</text>
  <rect x="40" y="100" width="1120" height="220" rx="12" fill="#111827" stroke="#334155"/>
  <text x="60" y="145" fill="#93c5fd" font-size="22" font-family="Arial">maxDeque (decreasing): keeps candidate maximum indices</text>
  <text x="60" y="185" fill="#86efac" font-size="22" font-family="Arial">minDeque (increasing): keeps candidate minimum indices</text>
  <text x="60" y="225" fill="#fca5a5" font-size="22" font-family="Arial">while nums[maxDeque.front] - nums[minDeque.front] &gt; limit: move left</text>
  <text x="60" y="265" fill="#fcd34d" font-size="22" font-family="Arial">answer = max(answer, right - left + 1)</text>
  <text x="40" y="370" fill="#94a3b8" font-size="18" font-family="Arial">Window always valid when measured by deque fronts, O(n) time</text>
</svg>
