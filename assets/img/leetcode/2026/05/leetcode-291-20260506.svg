<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="110" fill="#e2e8f0" font-size="44" font-family="Arial" font-weight="700">LeetCode 291 · Word Pattern II</text>
  <text x="60" y="165" fill="#93c5fd" font-size="28" font-family="Arial">Backtracking with two hash maps (char→word, word→char)</text>
  <rect x="60" y="210" width="1080" height="340" rx="14" fill="#111827" stroke="#334155"/>
  <text x="90" y="265" fill="#f8fafc" font-size="26" font-family="Courier New">pattern:  a   b   b   a</text>
  <text x="90" y="315" fill="#f8fafc" font-size="26" font-family="Courier New">string : red blue blue red</text>
  <text x="90" y="375" fill="#86efac" font-size="24" font-family="Arial">Step: assign substring to each pattern char, recurse, and backtrack on conflict.</text>
  <text x="90" y="430" fill="#fca5a5" font-size="24" font-family="Arial">Bijective rule: no two chars map to same word.</text>
  <text x="90" y="485" fill="#cbd5e1" font-size="22" font-family="Arial">Pruning: remaining pattern length cannot exceed remaining string length.</text>
</svg>