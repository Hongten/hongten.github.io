<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial">LeetCode 3402 · Column Greedy</text><text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Arial">Make each column strictly increasing with minimal increments</text><g transform="translate(70,190)"><rect width="260" height="300" fill="#1e293b" rx="12"/><rect x="320" width="260" height="300" fill="#1e293b" rx="12"/><text x="20" y="40" fill="#cbd5e1" font-size="24" font-family="Arial">Before</text><text x="340" y="40" fill="#cbd5e1" font-size="24" font-family="Arial">After</text><g fill="#334155"><rect x="20" y="70" width="220" height="55" rx="8"/><rect x="20" y="135" width="220" height="55" rx="8"/><rect x="20" y="200" width="220" height="55" rx="8"/></g><g fill="#334155"><rect x="340" y="70" width="220" height="55" rx="8"/><rect x="340" y="135" width="220" height="55" rx="8"/><rect x="340" y="200" width="220" height="55" rx="8"/></g><text x="45" y="106" fill="#f8fafc" font-size="26" font-family="monospace">3</text><text x="45" y="171" fill="#f8fafc" font-size="26" font-family="monospace">3</text><text x="45" y="236" fill="#f8fafc" font-size="26" font-family="monospace">2</text><text x="365" y="106" fill="#86efac" font-size="26" font-family="monospace">3</text><text x="365" y="171" fill="#86efac" font-size="26" font-family="monospace">4</text><text x="365" y="236" fill="#86efac" font-size="26" font-family="monospace">5</text></g><path d="M660 330 h120" stroke="#38bdf8" stroke-width="8" marker-end="url(#a)"/><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/></marker></defs><text x="810" y="337" fill="#e2e8f0" font-size="26" font-family="Arial">if curr ≤ prev, raise to prev + 1</text></svg>