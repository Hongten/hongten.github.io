<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3201 - Parity DP</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Arial">Find the Maximum Length of Valid Subsequence I</text>
  <rect x="60" y="200" width="1080" height="340" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="255" fill="#f8fafc" font-size="24" font-family="monospace">State: dp[k][p] = longest length</text>
  <text x="90" y="295" fill="#cbd5e1" font-size="22" font-family="monospace">k: required parity of adjacent sum (0 even, 1 odd)</text>
  <text x="90" y="335" fill="#cbd5e1" font-size="22" font-family="monospace">p: parity of current ending value</text>
  <text x="90" y="390" fill="#86efac" font-size="24" font-family="monospace">need = k XOR p</text>
  <text x="90" y="430" fill="#86efac" font-size="24" font-family="monospace">dp[k][p] = max(dp[k][p], dp[k][need] + 1, 1)</text>
  <text x="90" y="490" fill="#fda4af" font-size="22" font-family="monospace">Answer = max over all dp states</text>
</svg>
