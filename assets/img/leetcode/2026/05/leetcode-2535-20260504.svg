<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>
<text x="50" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 2535</text>
<text x="50" y="145" fill="#93c5fd" font-size="32" font-family="Arial">Difference Between Element Sum and Digit Sum</text>
<rect x="60" y="210" width="500" height="300" rx="16" fill="#1e293b" stroke="#334155"/>
<text x="90" y="260" fill="#a7f3d0" font-size="30" font-family="Arial">nums = [1,15,6,3]</text>
<text x="90" y="320" fill="#e2e8f0" font-size="30" font-family="Arial">elementSum = 25</text>
<text x="90" y="380" fill="#e2e8f0" font-size="30" font-family="Arial">digitSum = 1+1+5+6+3 = 16</text>
<text x="90" y="440" fill="#fca5a5" font-size="34" font-family="Arial">answer = |25 - 16| = 9</text>
</svg>
