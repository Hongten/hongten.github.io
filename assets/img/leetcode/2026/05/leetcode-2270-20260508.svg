<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2270 split array prefix sum diagram"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 2270 · Prefix Sum Split Check</text><rect x="60" y="140" width="1080" height="420" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="210" fill="#93c5fd" font-size="30" font-family="Arial">left = nums[0..i], right = nums[i+1..n-1]</text><text x="90" y="260" fill="#86efac" font-size="30" font-family="Arial">valid split if left &gt;= right</text><line x1="240" y1="360" x2="880" y2="360" stroke="#64748b" stroke-width="8"/><rect x="240" y="320" width="300" height="80" fill="#1d4ed8" rx="8"/><rect x="540" y="320" width="340" height="80" fill="#7c3aed" rx="8"/><line x1="540" y1="300" x2="540" y2="420" stroke="#f8fafc" stroke-width="4"/><text x="320" y="370" fill="#f8fafc" font-size="28" font-family="Arial">Left Sum</text><text x="640" y="370" fill="#f8fafc" font-size="28" font-family="Arial">Right Sum</text></svg>