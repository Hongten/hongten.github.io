<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0f172a"/>
  <text x="60" y="70" fill="#e2e8f0" font-size="34" font-family="Arial">LeetCode 2843 · Count Symmetric Integers</text>
  <text x="60" y="120" fill="#93c5fd" font-size="24" font-family="Arial">Even digits only, compare half sums</text>
  <rect x="60" y="170" width="500" height="180" rx="14" fill="#111827" stroke="#334155"/>
  <text x="90" y="220" fill="#f8fafc" font-size="24" font-family="Consolas, monospace">x = 1221</text>
  <text x="90" y="260" fill="#22c55e" font-size="22" font-family="Consolas, monospace">left: 1 + 2 = 3</text>
  <text x="90" y="300" fill="#22c55e" font-size="22" font-family="Consolas, monospace">right: 2 + 1 = 3</text>
  <text x="90" y="335" fill="#f59e0b" font-size="22" font-family="Consolas, monospace">symmetric ✓</text>
  <rect x="640" y="170" width="500" height="180" rx="14" fill="#111827" stroke="#334155"/>
  <text x="670" y="220" fill="#f8fafc" font-size="24" font-family="Consolas, monospace">x = 1234</text>
  <text x="670" y="260" fill="#ef4444" font-size="22" font-family="Consolas, monospace">left: 1 + 2 = 3</text>
  <text x="670" y="300" fill="#ef4444" font-size="22" font-family="Consolas, monospace">right: 3 + 4 = 7</text>
  <text x="670" y="335" fill="#ef4444" font-size="22" font-family="Consolas, monospace">not symmetric ✗</text>
</svg>
