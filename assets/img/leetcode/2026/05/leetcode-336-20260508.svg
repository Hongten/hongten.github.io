<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial">LeetCode 336 · Palindrome Pairs</text><rect x="60" y="140" width="1080" height="420" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="200" fill="#93c5fd" font-size="28" font-family="monospace">words = ["bat","tab","cat"]</text><text x="90" y="250" fill="#cbd5e1" font-size="26" font-family="monospace">split: left | right</text><text x="90" y="300" fill="#cbd5e1" font-size="26" font-family="monospace">if left is palindrome, find reverse(right)</text><text x="90" y="350" fill="#cbd5e1" font-size="26" font-family="monospace">if right is palindrome, find reverse(left)</text><text x="90" y="420" fill="#86efac" font-size="28" font-family="monospace">pairs: [0,1], [1,0]</text></svg>