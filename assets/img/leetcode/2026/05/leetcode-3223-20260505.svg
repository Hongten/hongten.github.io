<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="100%" height="100%" fill="#0b1020"/><text x="60" y="120" fill="#8be9fd" font-size="46" font-family="Arial">LeetCode 3223 - Parity Frequency Insight</text><text x="60" y="210" fill="#f8f8f2" font-size="34" font-family="Arial">Final length = sum(odd ? 1 : 2) over letters with freq &gt; 0</text><rect x="60" y="270" width="1080" height="260" rx="16" fill="#1b2440"/><text x="90" y="340" fill="#50fa7b" font-size="30" font-family="monospace">count[a]=5 -&gt; contributes 1</text><text x="90" y="390" fill="#ffb86c" font-size="30" font-family="monospace">count[b]=4 -&gt; contributes 2</text><text x="90" y="440" fill="#bd93f9" font-size="30" font-family="monospace">count[c]=1 -&gt; contributes 1</text><text x="90" y="490" fill="#f1fa8c" font-size="30" font-family="monospace">answer = 1 + 2 + 1 + ...</text></svg>