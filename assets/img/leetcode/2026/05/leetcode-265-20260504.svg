<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="90" fill="#7dd3fc" font-size="42" font-family="Arial">LeetCode 265 - Paint House II</text><text x="60" y="150" fill="#e5e7eb" font-size="28" font-family="Arial">DP transition with previous row min1/min2</text><rect x="70" y="210" width="1060" height="320" rx="16" fill="#111827" stroke="#374151"/><text x="110" y="280" fill="#f9fafb" font-size="26" font-family="monospace">dp[i][c] = costs[i][c] + (c == min1Color ? prevMin2 : prevMin1)</text><text x="110" y="340" fill="#93c5fd" font-size="24" font-family="monospace">Track smallest and second smallest of each row in O(k)</text><text x="110" y="400" fill="#93c5fd" font-size="24" font-family="monospace">Total: O(nk) time, O(1) extra space</text></svg>