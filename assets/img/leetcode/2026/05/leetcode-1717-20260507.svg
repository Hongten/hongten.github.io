<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs><rect width="1200" height="630" fill="url(#bg)"/><text x="60" y="100" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 1717 - Greedy Remove Order</text><rect x="80" y="150" width="1040" height="170" rx="16" fill="#111827" stroke="#38bdf8"/><text x="120" y="210" fill="#93c5fd" font-size="34" font-family="Arial">Pass 1: remove higher score pair first</text><text x="120" y="270" fill="#e5e7eb" font-size="30" font-family="Arial">if x &gt;= y: remove "ab" first, else remove "ba" first</text><rect x="80" y="360" width="1040" height="180" rx="16" fill="#111827" stroke="#34d399"/><text x="120" y="420" fill="#6ee7b7" font-size="34" font-family="Arial">Pass 2: remove the other pair from remainder</text><text x="120" y="480" fill="#e5e7eb" font-size="30" font-family="Arial">stack simulation keeps O(n), maximum total score</text></svg>