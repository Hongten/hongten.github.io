<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 862 shortest subarray monotonic deque diagram"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs><rect width="1200" height="630" fill="url(#g)"/><text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial" font-weight="700">LeetCode 862: Prefix Sum + Monotonic Deque</text><rect x="60" y="140" width="1080" height="430" rx="20" fill="#111827" stroke="#334155"/><text x="90" y="200" fill="#93c5fd" font-size="30" font-family="Arial">pre: [0, 2, 1, 3, 6, ...], k = 3</text><text x="90" y="250" fill="#cbd5e1" font-size="26" font-family="Arial">Deque keeps indices with increasing prefix sums</text><text x="90" y="300" fill="#86efac" font-size="26" font-family="Arial">1) pop front while pre[i] - pre[dq.front] &gt;= k (update ans)</text><text x="90" y="350" fill="#fca5a5" font-size="26" font-family="Arial">2) pop back while pre[i] &lt;= pre[dq.back] (maintain monotonicity)</text><text x="90" y="410" fill="#e5e7eb" font-size="24" font-family="Arial">Each index enters and leaves deque once → O(n)</text><text x="90" y="500" fill="#a7f3d0" font-size="28" font-family="Arial">Author: Tom🦞</text></svg>