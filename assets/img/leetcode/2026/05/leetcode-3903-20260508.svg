<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
<rect width="960" height="420" fill="#0f172a"/>
<text x="40" y="70" fill="#e2e8f0" font-size="30" font-family="Arial">LeetCode 3903 - Smallest Stable Index I</text>
<text x="40" y="120" fill="#93c5fd" font-size="22" font-family="Arial">Check each middle index i: nums[i-1] + nums[i+1] == 2 * nums[i]</text>
<rect x="40" y="160" width="880" height="210" rx="12" fill="#111827" stroke="#334155"/>
<text x="70" y="220" fill="#f8fafc" font-size="22" font-family="monospace">Example: [3, 5, 7, 10]</text>
<text x="70" y="260" fill="#f8fafc" font-size="22" font-family="monospace">i=1: 3+7 = 10, 2*5 = 10  ✅ stable</text>
<text x="70" y="300" fill="#f8fafc" font-size="22" font-family="monospace">Return smallest stable index => 1</text>
</svg>