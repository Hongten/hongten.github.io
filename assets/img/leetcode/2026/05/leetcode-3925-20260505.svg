<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 3925 - Prefix/Suffix XOR</text><rect x="60" y="140" width="1080" height="420" rx="20" fill="#111827" stroke="#334155"/><text x="90" y="200" fill="#93c5fd" font-size="30" font-family="Arial">answer[i] = prefix[i-1] XOR suffix[i+1]</text><text x="90" y="255" fill="#cbd5e1" font-size="24" font-family="Arial">prefix: XOR from left to right</text><text x="90" y="295" fill="#cbd5e1" font-size="24" font-family="Arial">suffix: XOR from right to left</text><text x="90" y="355" fill="#a7f3d0" font-size="24" font-family="Arial">Time: O(n), Space: O(n)</text><text x="90" y="410" fill="#fca5a5" font-size="24" font-family="Arial">Remove current index, combine both sides</text></svg>