<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500"><rect width="1200" height="500" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial">LeetCode 3921 - Find X Value of Array I</text><text x="60" y="150" fill="#93c5fd" font-size="30" font-family="Arial">Invariant: final x equals bitwise OR of all elements</text><rect x="60" y="210" width="1080" height="220" rx="18" fill="#111827" stroke="#334155"/><text x="90" y="275" fill="#f8fafc" font-size="34" font-family="monospace">nums = [5, 2, 8, 3]</text><text x="90" y="330" fill="#86efac" font-size="34" font-family="monospace">ans = 0 | 5 | 2 | 8 | 3 = 15</text><text x="90" y="385" fill="#fcd34d" font-size="30" font-family="monospace">0101 | 0010 | 1000 | 0011 = 1111</text></svg>