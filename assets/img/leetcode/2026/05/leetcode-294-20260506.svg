<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 294 · Flip Game II</text><text x="60" y="140" fill="#94a3b8" font-size="28" font-family="Arial">Winning state if any next move leads opponent to losing state</text><rect x="120" y="220" width="220" height="80" rx="12" fill="#1e293b" stroke="#38bdf8"/><text x="160" y="268" fill="#e2e8f0" font-size="34" font-family="monospace">++++</text><text x="210" y="320" fill="#22c55e" font-size="24" font-family="Arial">Win?</text><rect x="500" y="140" width="220" height="80" rx="12" fill="#1e293b" stroke="#f59e0b"/><text x="540" y="188" fill="#e2e8f0" font-size="34" font-family="monospace">--++</text><text x="560" y="238" fill="#ef4444" font-size="22" font-family="Arial">Lose</text><rect x="500" y="320" width="220" height="80" rx="12" fill="#1e293b" stroke="#f59e0b"/><text x="540" y="368" fill="#e2e8f0" font-size="34" font-family="monospace">+--+</text><text x="560" y="418" fill="#ef4444" font-size="22" font-family="Arial">Lose</text><rect x="500" y="500" width="220" height="80" rx="12" fill="#1e293b" stroke="#f59e0b"/><text x="540" y="548" fill="#e2e8f0" font-size="34" font-family="monospace">++--</text><text x="560" y="598" fill="#ef4444" font-size="22" font-family="Arial">Lose</text><line x1="340" y1="250" x2="500" y2="180" stroke="#64748b" stroke-width="4"/><line x1="340" y1="260" x2="500" y2="360" stroke="#64748b" stroke-width="4"/><line x1="340" y1="270" x2="500" y2="540" stroke="#64748b" stroke-width="4"/></svg>