<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1048 longest string chain diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1048 · Longest String Chain</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">DP idea: dp[word] = 1 + max(dp[pred]) where pred is word after deleting one char</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30" text-anchor="middle">
    <rect x="90" y="250" width="120" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="150" y="295" fill="#f9fafb">a</text>

    <rect x="300" y="250" width="120" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="360" y="295" fill="#f9fafb">ba</text>

    <rect x="510" y="250" width="140" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="580" y="295" fill="#f9fafb">bda</text>

    <rect x="760" y="250" width="170" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="845" y="295" fill="#f9fafb">bdca</text>

    <line x1="210" y1="285" x2="295" y2="285" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="420" y1="285" x2="505" y2="285" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="650" y1="285" x2="755" y2="285" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="60" y="420" fill="#a7f3d0" font-size="28" font-family="Inter,Arial,sans-serif">Sort words by length first, then transition from all length-1 predecessors.</text>
  <text x="60" y="470" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
