<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 315 Fenwick tree diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 315: Count of Smaller Numbers After Self</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Right-to-left scan + coordinate compression + Fenwick Tree</text>

  <rect x="60" y="190" width="1080" height="380" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="245" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Example: nums = [5, 2, 6, 1]</text>
  <text x="90" y="285" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Compressed ranks: 1→1, 2→2, 5→3, 6→4</text>

  <text x="90" y="335" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">i=3, val=1, query(rank-1=0)=0, add(1)</text>
  <text x="90" y="375" fill="#fcd34d" font-size="22" font-family="Inter,Arial,sans-serif">i=2, val=6, query(3)=1, add(4)</text>
  <text x="90" y="415" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">i=1, val=2, query(1)=1, add(2)</text>
  <text x="90" y="455" fill="#c4b5fd" font-size="22" font-family="Inter,Arial,sans-serif">i=0, val=5, query(2)=2, add(3)</text>

  <text x="90" y="525" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">Answer: [2, 1, 1, 0]</text>
  <text x="860" y="560" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
