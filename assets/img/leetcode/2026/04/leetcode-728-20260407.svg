<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 728 self dividing numbers diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 728 · Self Dividing Numbers</text>
  <text x="60" y="130" fill="#94a3b8" font-size="24" font-family="Arial, Helvetica, sans-serif">Digit check: no zero and n % digit == 0 for every digit</text>

  <rect x="60" y="180" width="1080" height="380" rx="20" fill="#111827" stroke="#334155"/>

  <text x="100" y="240" fill="#f8fafc" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Example: 128 is self-dividing</text>

  <rect x="100" y="275" width="300" height="80" rx="12" fill="#1d4ed8"/>
  <text x="250" y="325" text-anchor="middle" fill="#ffffff" font-size="36" font-family="monospace" font-weight="700">128</text>

  <text x="440" y="323" fill="#cbd5e1" font-size="28" font-family="monospace">digits: 8, 2, 1</text>

  <rect x="100" y="390" width="1000" height="130" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="130" y="435" fill="#22c55e" font-size="28" font-family="monospace">128 % 8 = 0 ✓</text>
  <text x="430" y="435" fill="#22c55e" font-size="28" font-family="monospace">128 % 2 = 0 ✓</text>
  <text x="730" y="435" fill="#22c55e" font-size="28" font-family="monospace">128 % 1 = 0 ✓</text>
  <text x="130" y="485" fill="#fbbf24" font-size="26" font-family="Arial, Helvetica, sans-serif">Rule: if any digit is 0 or does not divide n, reject immediately.</text>
</svg>
