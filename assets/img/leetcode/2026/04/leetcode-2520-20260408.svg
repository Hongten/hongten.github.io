<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2520 digit divisibility diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2520 · Count the Digits That Divide a Number</text>
  <rect x="60" y="140" width="1080" height="430" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="95" y="205" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">num = 1248</text>
  <text x="95" y="248" fill="#d1d5db" font-size="25" font-family="Inter,Arial,sans-serif">Extract digit d from right to left: 8, 4, 2, 1</text>

  <rect x="90" y="285" width="240" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="110" y="330" fill="#86efac" font-size="28" font-family="JetBrains Mono,monospace">1248 % 8 = 0 ✓</text>

  <rect x="350" y="285" width="240" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="370" y="330" fill="#86efac" font-size="28" font-family="JetBrains Mono,monospace">1248 % 4 = 0 ✓</text>

  <rect x="610" y="285" width="240" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="630" y="330" fill="#86efac" font-size="28" font-family="JetBrains Mono,monospace">1248 % 2 = 0 ✓</text>

  <rect x="870" y="285" width="240" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="890" y="330" fill="#86efac" font-size="28" font-family="JetBrains Mono,monospace">1248 % 1 = 0 ✓</text>

  <text x="95" y="425" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">Rule: count digit d only when d != 0 and num % d == 0</text>
  <text x="95" y="475" fill="#e5e7eb" font-size="32" font-family="Inter,Arial,sans-serif" font-weight="700">Answer for this example: 4</text>
  <text x="95" y="525" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first / 中文后置 · full code tabs in both sections</text>
</svg>
