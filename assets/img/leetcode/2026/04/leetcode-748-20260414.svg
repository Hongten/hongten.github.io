<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 748 shortest completing word frequency coverage diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="78" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 748 · Shortest Completing Word</text>
  <text x="52" y="118" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Build required letter frequencies from licensePlate, then verify each word covers them.</text>

  <rect x="52" y="160" width="1096" height="430" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="86" y="208" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">licensePlate = "1s3 PSt"</text>
  <text x="86" y="244" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">need: s×2, p×1, t×1</text>

  <rect x="76" y="272" width="1020" height="56" rx="10" fill="#1e293b"/>
  <text x="96" y="307" fill="#e2e8f0" font-size="22" font-family="JetBrains Mono,Consolas,monospace">step=1  word="step"      have: s×1 p×1 t×1   ✗ missing one 's'</text>

  <rect x="76" y="344" width="1020" height="56" rx="10" fill="#1e293b"/>
  <text x="96" y="379" fill="#e2e8f0" font-size="22" font-family="JetBrains Mono,Consolas,monospace">step=2  word="steps"     have: s×2 p×1 t×1   ✓ valid (len=5)</text>

  <rect x="76" y="416" width="1020" height="56" rx="10" fill="#1e293b"/>
  <text x="96" y="451" fill="#e2e8f0" font-size="22" font-family="JetBrains Mono,Consolas,monospace">step=3  word="stripe"    have: s×1 p×1 t×1   ✗ missing one 's'</text>

  <rect x="76" y="488" width="1020" height="74" rx="10" fill="#052e16" stroke="#22c55e"/>
  <text x="96" y="532" fill="#bbf7d0" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = "steps" (shortest word that covers all required letter counts)</text>

  <text x="52" y="610" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
