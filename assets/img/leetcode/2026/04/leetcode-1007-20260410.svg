<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1007 minimum domino rotations feasibility diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1007 · Minimum Domino Rotations</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Try only candidates: tops[0] or bottoms[0]</text>

  <rect x="60" y="190" width="1080" height="330" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="245" fill="#f9fafb" font-size="26" font-family="Inter,Arial,sans-serif">Domino i:</text>
  <rect x="260" y="215" width="120" height="60" rx="8" fill="#0f172a" stroke="#64748b"/>
  <rect x="382" y="215" width="120" height="60" rx="8" fill="#0f172a" stroke="#64748b"/>
  <text x="315" y="253" text-anchor="middle" fill="#fbbf24" font-size="30" font-family="monospace">tops[i]</text>
  <text x="442" y="253" text-anchor="middle" fill="#34d399" font-size="30" font-family="monospace">bottoms[i]</text>

  <text x="100" y="335" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Candidate x is feasible iff every domino contains x on at least one side.</text>
  <text x="100" y="390" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">rotateTop += (tops[i] != x), rotateBottom += (bottoms[i] != x)</text>
  <text x="100" y="445" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">answer = min(rotateTop, rotateBottom) among feasible candidates</text>

  <text x="60" y="585" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文 + full code tabs</text>
</svg>
