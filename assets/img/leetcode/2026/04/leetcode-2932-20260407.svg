<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2932 strong pair XOR diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="86" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2932 · Maximum Strong Pair XOR I</text>
  <text x="56" y="126" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Strong pair condition: |x - y| ≤ min(x, y)</text>

  <rect x="56" y="170" width="520" height="390" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="84" y="218" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Condition Rewrite</text>
  <text x="84" y="262" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">a = min(x, y), b = max(x, y)</text>
  <text x="84" y="304" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">|x-y| = b-a ≤ a</text>
  <text x="84" y="346" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">⇔ b ≤ 2a</text>

  <text x="84" y="410" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">For each pair (x, y):</text>
  <text x="84" y="446" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">1) Check strong-pair condition</text>
  <text x="84" y="480" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">2) Compute x XOR y</text>
  <text x="84" y="514" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">3) Keep maximum</text>

  <rect x="620" y="170" width="524" height="390" rx="16" fill="#111827" stroke="#374151"/>
  <text x="648" y="218" fill="#a5b4fc" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Example (nums = [1,2,3,4,5])</text>

  <rect x="648" y="248" width="468" height="82" rx="10" fill="#1e293b"/>
  <text x="676" y="294" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">Pair (2,3): |2-3|=1 ≤ 2 ✅</text>

  <rect x="648" y="346" width="468" height="82" rx="10" fill="#1e293b"/>
  <text x="676" y="392" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">XOR = 2 ⊕ 3 = 1</text>

  <rect x="648" y="444" width="468" height="82" rx="10" fill="#1e293b"/>
  <text x="676" y="490" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">Enumerate all pairs → Max XOR</text>

  <text x="56" y="600" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual post with full code-tabs</text>
</svg>
