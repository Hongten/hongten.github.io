<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3370 smallest all-set-bits number diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3370 · Smallest Number With All Set Bits</text>
  <text x="56" y="138" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Build sequence: 1, 3, 7, 15, 31, ... (2^k - 1)</text>

  <rect x="56" y="182" width="1088" height="372" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="250" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">n = 10</text>
  <text x="90" y="308" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">x = 1   (0001)</text>
  <text x="90" y="354" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">x = 3   (0011)</text>
  <text x="90" y="400" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">x = 7   (0111)</text>
  <text x="90" y="446" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,Consolas,monospace">x = 15  (1111)  ✓ first x &gt;= n</text>

  <text x="680" y="286" fill="#93c5fd" font-size="28" font-family="JetBrains Mono,Consolas,monospace">transition:</text>
  <text x="680" y="334" fill="#e5e7eb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">x = (x &lt;&lt; 1) | 1</text>
  <text x="680" y="382" fill="#e5e7eb" font-size="26" font-family="JetBrains Mono,Consolas,monospace">append one more trailing '1'</text>

  <text x="56" y="598" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
