<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1281 digit product and sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:2;rx:14}
      .digit{font:700 46px 'Consolas',monospace;fill:#f8fafc}
      .expr{font:600 30px 'Consolas',monospace;fill:#a7f3d0}
      .note{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#fcd34d}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 1281 — Digit Decomposition</text>
  <text x="60" y="130" class="sub">n = 234  → digits: 2, 3, 4</text>

  <rect x="60" y="180" width="180" height="120" class="box"/>
  <rect x="270" y="180" width="180" height="120" class="box"/>
  <rect x="480" y="180" width="180" height="120" class="box"/>
  <text x="135" y="255" class="digit">2</text>
  <text x="345" y="255" class="digit">3</text>
  <text x="555" y="255" class="digit">4</text>

  <text x="60" y="380" class="expr">product = 2 × 3 × 4 = 24</text>
  <text x="60" y="430" class="expr">sum = 2 + 3 + 4 = 9</text>
  <text x="60" y="490" class="note">answer = product - sum = 24 - 9 = 15</text>

  <text x="60" y="560" class="sub">Single pass: digit = n % 10, n = n / 10</text>
</svg>
