<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1816 truncating after k words">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1816 · Truncate Sentence</text>
  <text x="60" y="135" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Scan characters, count spaces, stop after k words.</text>

  <rect x="60" y="190" width="1080" height="90" rx="14" fill="#111827" stroke="#334155"/>
  <text x="85" y="245" fill="#f8fafc" font-size="30" font-family="Consolas, monospace">Input: "Hello how are you Contestant" , k = 4</text>

  <rect x="60" y="320" width="1080" height="90" rx="14" fill="#052e16" stroke="#22c55e"/>
  <text x="85" y="375" fill="#dcfce7" font-size="34" font-family="Consolas, monospace">Output: "Hello how are you"</text>

  <line x1="775" y1="214" x2="775" y2="264" stroke="#f59e0b" stroke-width="6"/>
  <text x="790" y="248" fill="#fbbf24" font-size="22" font-family="Arial, sans-serif">stop at 4th space boundary</text>

  <text x="60" y="560" fill="#64748b" font-size="22" font-family="Arial, sans-serif">One pass · O(n) time · O(1) extra space (excluding output)</text>
</svg>
