<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1020 border flood fill diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="78" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1020: Number of Enclaves</text>
  <text x="52" y="116" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Border Flood Fill, remove boundary-connected land first</text>

  <rect x="60" y="160" width="500" height="390" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="86" y="195" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Grid sketch</text>

  <g transform="translate(88,220)">
    <rect x="0" y="0" width="54" height="54" fill="#0ea5e9"/>
    <rect x="58" y="0" width="54" height="54" fill="#22c55e"/>
    <rect x="116" y="0" width="54" height="54" fill="#22c55e"/>
    <rect x="174" y="0" width="54" height="54" fill="#0ea5e9"/>
    <rect x="232" y="0" width="54" height="54" fill="#0ea5e9"/>

    <rect x="0" y="58" width="54" height="54" fill="#0ea5e9"/>
    <rect x="58" y="58" width="54" height="54" fill="#22c55e"/>
    <rect x="116" y="58" width="54" height="54" fill="#f59e0b"/>
    <rect x="174" y="58" width="54" height="54" fill="#22c55e"/>
    <rect x="232" y="58" width="54" height="54" fill="#0ea5e9"/>

    <rect x="0" y="116" width="54" height="54" fill="#0ea5e9"/>
    <rect x="58" y="116" width="54" height="54" fill="#f59e0b"/>
    <rect x="116" y="116" width="54" height="54" fill="#f59e0b"/>
    <rect x="174" y="116" width="54" height="54" fill="#22c55e"/>
    <rect x="232" y="116" width="54" height="54" fill="#0ea5e9"/>

    <rect x="0" y="174" width="54" height="54" fill="#0ea5e9"/>
    <rect x="58" y="174" width="54" height="54" fill="#22c55e"/>
    <rect x="116" y="174" width="54" height="54" fill="#0ea5e9"/>
    <rect x="174" y="174" width="54" height="54" fill="#0ea5e9"/>
    <rect x="232" y="174" width="54" height="54" fill="#0ea5e9"/>

    <text x="310" y="34" fill="#22c55e" font-size="20" font-family="Inter,Arial,sans-serif">Border-reachable land → remove</text>
    <text x="310" y="94" fill="#f59e0b" font-size="20" font-family="Inter,Arial,sans-serif">Enclave land → count</text>
    <text x="310" y="154" fill="#0ea5e9" font-size="20" font-family="Inter,Arial,sans-serif">Sea</text>
  </g>

  <rect x="610" y="160" width="530" height="390" rx="16" fill="#111827" stroke="#374151"/>
  <text x="640" y="212" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Steps</text>
  <text x="640" y="258" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">1) DFS/BFS from all border land cells</text>
  <text x="640" y="304" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">2) Mark visited land as sea (0)</text>
  <text x="640" y="350" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">3) Count remaining land cells (1)</text>
  <text x="640" y="420" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = number of enclaves</text>
  <text x="640" y="470" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
