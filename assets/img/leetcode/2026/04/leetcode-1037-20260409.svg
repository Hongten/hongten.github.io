<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1037 valid boomerang cross product diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="72" fill="#e5e7eb" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 1037: Valid Boomerang</text>
  <text x="48" y="116" fill="#9ca3af" font-size="24" font-family="Inter, Arial, sans-serif">Check non-collinearity with 2D cross product</text>

  <rect x="48" y="150" width="1104" height="430" rx="20" fill="#111827" stroke="#374151"/>

  <line x1="150" y1="510" x2="1040" y2="510" stroke="#374151" stroke-width="2"/>
  <line x1="150" y1="510" x2="150" y2="220" stroke="#374151" stroke-width="2"/>

  <line x1="260" y1="470" x2="560" y2="330" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="260" y1="470" x2="860" y2="420" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>

  <circle cx="260" cy="470" r="9" fill="#fbbf24"/>
  <circle cx="560" cy="330" r="9" fill="#f87171"/>
  <circle cx="860" cy="420" r="9" fill="#a78bfa"/>

  <text x="235" y="500" fill="#fbbf24" font-size="24" font-family="Inter, Arial, sans-serif">P1(x1,y1)</text>
  <text x="575" y="322" fill="#f87171" font-size="24" font-family="Inter, Arial, sans-serif">P2(x2,y2)</text>
  <text x="875" y="415" fill="#a78bfa" font-size="24" font-family="Inter, Arial, sans-serif">P3(x3,y3)</text>

  <text x="520" y="250" fill="#93c5fd" font-size="26" font-family="JetBrains Mono, Consolas, monospace">cross = (x2-x1)(y3-y1) - (y2-y1)(x3-x1)</text>
  <text x="520" y="285" fill="#86efac" font-size="26" font-family="JetBrains Mono, Consolas, monospace">cross ≠ 0  ⇒  non-collinear  ⇒  valid boomerang</text>

  <text x="56" y="608" fill="#9ca3af" font-size="20" font-family="Inter, Arial, sans-serif">Author: Tom🦞</text>
</svg>
