<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2315 Count Asterisks diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 26px 'Consolas','Menlo',monospace;fill:#f8fafc}
      .cap{font:400 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .ok{fill:#22c55e}
      .mute{fill:#64748b}
      .star{fill:#facc15}
      .pipe{fill:#38bdf8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" class="title">LeetCode 2315 · Count Asterisks</text>
  <text x="60" y="130" class="sub">Toggle state on each '|' ; count '*' only when outside pipe pairs</text>

  <rect x="60" y="180" width="1080" height="320" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="245" class="txt">Example:  l | * e * e t | c * o * d e | * |</text>

  <circle cx="210" cy="300" r="14" class="pipe"/>
  <circle cx="610" cy="300" r="14" class="pipe"/>
  <circle cx="990" cy="300" r="14" class="pipe"/>
  <circle cx="1060" cy="300" r="14" class="pipe"/>

  <text x="130" y="360" class="cap">Outside zone</text>
  <text x="350" y="360" class="cap">Inside pair (ignored *)</text>
  <text x="690" y="360" class="cap">Outside zone (count *)</text>
  <text x="920" y="360" class="cap">Inside pair (ignored *)</text>

  <text x="150" y="420" class="txt ok">Counted:  *      *</text>
  <text x="360" y="420" class="txt mute">Ignored:  *   *</text>
  <text x="940" y="420" class="txt mute">Ignored:  *</text>

  <text x="60" y="565" class="cap">Single pass O(n), constant space O(1)</text>
</svg>
