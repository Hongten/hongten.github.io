<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1122 relative sort array workflow diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 1122 · Relative Sort Array</text>
  <text x="60" y="130" fill="#94a3b8" font-size="26" font-family="Inter, Arial, sans-serif">Order by arr2 first, then ascending leftovers</text>

  <rect x="60" y="180" width="1080" height="380" rx="16" fill="#111827" stroke="#334155"/>

  <text x="90" y="235" fill="#93c5fd" font-size="28" font-family="Inter, Arial, sans-serif">arr1: [2,3,1,3,2,4,6,7,9,2,19]</text>
  <text x="90" y="275" fill="#86efac" font-size="28" font-family="Inter, Arial, sans-serif">arr2: [2,1,4,3,9,6]</text>

  <text x="90" y="335" fill="#fcd34d" font-size="26" font-family="Inter, Arial, sans-serif">Step 1: output by arr2 order → [2,2,2,1,4,3,3,9,6]</text>
  <text x="90" y="380" fill="#fca5a5" font-size="26" font-family="Inter, Arial, sans-serif">Step 2: append leftovers ascending → [7,19]</text>

  <text x="90" y="450" fill="#e2e8f0" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">Final: [2,2,2,1,4,3,3,9,6,7,19]</text>
  <text x="90" y="505" fill="#cbd5e1" font-size="24" font-family="Inter, Arial, sans-serif">Counting array (0..1000) makes this O(n + 1001)</text>

  <text x="860" y="595" fill="#86efac" font-size="24" font-family="Inter, Arial, sans-serif">Author: Tom🦞</text>
</svg>
