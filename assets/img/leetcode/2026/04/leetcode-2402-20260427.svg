<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2402 two-heaps meeting room scheduling diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2402: Meeting Rooms III</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Two Heaps: Idle Rooms + Busy Rooms</text>

  <rect x="56" y="170" width="520" height="380" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="82" y="214" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Idle Heap (room id)</text>
  <rect x="82" y="238" width="468" height="68" rx="12" fill="#0b1220" stroke="#374151"/>
  <text x="104" y="282" fill="#e5e7eb" font-size="26" font-family="JetBrains Mono,Consolas,monospace">[0, 2, 4]</text>
  <text x="82" y="338" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Pick smallest available room first</text>

  <rect x="624" y="170" width="520" height="380" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="650" y="214" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Busy Heap (endTime, room)</text>
  <rect x="650" y="238" width="468" height="68" rx="12" fill="#0b1220" stroke="#374151"/>
  <text x="672" y="282" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">[(12,1), (12,3), (15,5)]</text>
  <text x="650" y="338" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Release all with endTime ≤ start</text>
  <text x="650" y="374" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">If none idle, delay meeting on earliest finish</text>

  <path d="M576 272 L624 272" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="56" y="596" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
