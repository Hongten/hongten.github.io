<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 2068 letter frequency difference">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>
  <text x="40" y="56" fill="#e2e8f0" font-size="30" font-family="Arial, Helvetica, sans-serif">LeetCode 2068 - Frequency Delta Check</text>
  <text x="40" y="92" fill="#94a3b8" font-size="20" font-family="Arial, Helvetica, sans-serif">For each letter: |count(word1) - count(word2)| ≤ 3</text>

  <rect x="60" y="130" width="360" height="230" rx="14" fill="#111827" stroke="#334155"/>
  <rect x="540" y="130" width="360" height="230" rx="14" fill="#111827" stroke="#334155"/>
  <text x="80" y="168" fill="#38bdf8" font-size="22" font-family="monospace">word1</text>
  <text x="560" y="168" fill="#22c55e" font-size="22" font-family="monospace">word2</text>

  <text x="80" y="208" fill="#e5e7eb" font-size="18" font-family="monospace">a: 6   b: 1   c: 0</text>
  <text x="80" y="238" fill="#e5e7eb" font-size="18" font-family="monospace">d: 4   e: 2   ...</text>
  <text x="560" y="208" fill="#e5e7eb" font-size="18" font-family="monospace">a: 3   b: 0   c: 2</text>
  <text x="560" y="238" fill="#e5e7eb" font-size="18" font-family="monospace">d: 6   e: 2   ...</text>

  <line x1="440" y1="245" x2="520" y2="245" stroke="#f59e0b" stroke-width="4" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker></defs>

  <text x="390" y="290" fill="#fbbf24" font-size="18" font-family="monospace">compare per letter</text>
  <text x="290" y="350" fill="#cbd5e1" font-size="24" font-family="Arial, Helvetica, sans-serif">If any absolute difference &gt; 3 ⇒ false, else true</text>
</svg>
