<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 821 two-pass nearest target distance illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .cell{fill:#111827;stroke:#334155;stroke-width:2;rx:10}
      .txt{font:600 30px 'Consolas','Courier New',monospace;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .idx{font:500 18px 'Consolas','Courier New',monospace;fill:#94a3b8;text-anchor:middle}
      .dist{font:600 22px 'Consolas','Courier New',monospace;fill:#22d3ee;text-anchor:middle}
      .hit{fill:#1d4ed8;stroke:#60a5fa}
      .arrowL{stroke:#f59e0b;stroke-width:4;fill:none;marker-end:url(#mL)}
      .arrowR{stroke:#22c55e;stroke-width:4;fill:none;marker-end:url(#mR)}
      .legend{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
    </style>
    <marker id="mL" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="mR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">LeetCode 821 — Shortest Distance to a Character</text>
  <text x="60" y="108" class="sub">Two-pass idea: distance to nearest target = min(left-hit, right-hit)</text>

  <g transform="translate(90,190)">
    <!-- string: l o v e l e e t c o d e ; c = e -->
    <g>
      <rect class="cell" x="0" y="0" width="70" height="70"/><text class="txt" x="35" y="35">l</text><text class="idx" x="35" y="95">0</text>
      <rect class="cell" x="80" y="0" width="70" height="70"/><text class="txt" x="115" y="35">o</text><text class="idx" x="115" y="95">1</text>
      <rect class="cell" x="160" y="0" width="70" height="70"/><text class="txt" x="195" y="35">v</text><text class="idx" x="195" y="95">2</text>
      <rect class="cell hit" x="240" y="0" width="70" height="70"/><text class="txt" x="275" y="35">e</text><text class="idx" x="275" y="95">3</text>
      <rect class="cell" x="320" y="0" width="70" height="70"/><text class="txt" x="355" y="35">l</text><text class="idx" x="355" y="95">4</text>
      <rect class="cell hit" x="400" y="0" width="70" height="70"/><text class="txt" x="435" y="35">e</text><text class="idx" x="435" y="95">5</text>
      <rect class="cell hit" x="480" y="0" width="70" height="70"/><text class="txt" x="515" y="35">e</text><text class="idx" x="515" y="95">6</text>
      <rect class="cell" x="560" y="0" width="70" height="70"/><text class="txt" x="595" y="35">t</text><text class="idx" x="595" y="95">7</text>
      <rect class="cell" x="640" y="0" width="70" height="70"/><text class="txt" x="675" y="35">c</text><text class="idx" x="675" y="95">8</text>
      <rect class="cell" x="720" y="0" width="70" height="70"/><text class="txt" x="755" y="35">o</text><text class="idx" x="755" y="95">9</text>
      <rect class="cell" x="800" y="0" width="70" height="70"/><text class="txt" x="835" y="35">d</text><text class="idx" x="835" y="95">10</text>
      <rect class="cell hit" x="880" y="0" width="70" height="70"/><text class="txt" x="915" y="35">e</text><text class="idx" x="915" y="95">11</text>
    </g>

    <text class="sub" x="0" y="150">Result distances: [3,2,1,0,1,0,0,1,2,2,1,0]</text>

    <path class="arrowL" d="M35,185 C120,145 210,145 275,185"/>
    <text class="legend" x="150" y="215">Left pass tracks last seen 'e'</text>

    <path class="arrowR" d="M835,255 C760,295 680,295 595,255"/>
    <text class="legend" x="690" y="330">Right pass tracks next seen 'e'</text>
  </g>

  <text x="60" y="590" class="sub">Target character c = 'e' (blue cells). For each index i, answer[i] = min(i-leftE, rightE-i).</text>
</svg>
