<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="120" fill="#e5e7eb" font-size="46">LeetCode 2825</text><text x="60" y="190" fill="#93c5fd" font-size="34">Greedy two pointers: match or +1 cyclic increment</text><line x1="80" y1="300" x2="1120" y2="300" stroke="#334155"/><text x="80" y="360" fill="#86efac" font-size="30">str1: a b z c d</text><text x="80" y="420" fill="#fcd34d" font-size="30">str2: b a d</text><text x="80" y="490" fill="#e5e7eb" font-size="28">z can become a, consume characters in order</text></svg>