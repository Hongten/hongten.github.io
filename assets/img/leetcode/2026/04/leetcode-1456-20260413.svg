<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1456 sliding window diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1456 · Fixed-Size Sliding Window</text>
  <text x="60" y="130" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Maximum Number of Vowels in a Substring of Given Length</text>

  <rect x="60" y="190" width="1080" height="220" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="245" fill="#93c5fd" font-size="28" font-family="monospace">s = a b c i i d e f</text>

  <rect x="210" y="275" width="360" height="70" rx="12" fill="#0f766e" opacity="0.85"/>
  <text x="235" y="320" fill="#ecfeff" font-size="30" font-family="Inter,Arial,sans-serif">window size k = 3</text>

  <text x="90" y="375" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">move right: +isVowel(s[right]) - isVowel(s[left])</text>

  <rect x="60" y="450" width="1080" height="120" rx="16" fill="#111827" stroke="#374151"/>
  <text x="90" y="500" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">Track current vowel count, update max at each step → O(n) time, O(1) space</text>
  <text x="90" y="540" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
