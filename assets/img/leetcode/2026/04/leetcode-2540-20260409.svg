<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 2540 two-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="70" fill="#e2e8f0" font-size="34" font-family="Arial, sans-serif" font-weight="700">LeetCode 2540 · Minimum Common Value</text>
  <text x="60" y="108" fill="#93c5fd" font-size="22" font-family="Arial, sans-serif">Two pointers on sorted arrays: move the smaller side</text>

  <rect x="70" y="180" width="1060" height="130" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="215" fill="#cbd5e1" font-size="24" font-family="monospace">nums1: [1, 2, 3, 6, 10]</text>
  <circle cx="410" cy="250" r="18" fill="#2563eb"/>
  <text x="405" y="257" fill="#fff" font-size="16" font-family="Arial">i</text>

  <rect x="70" y="350" width="1060" height="130" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="385" fill="#cbd5e1" font-size="24" font-family="monospace">nums2: [2, 4, 6, 8, 10]</text>
  <circle cx="316" cy="420" r="18" fill="#16a34a"/>
  <text x="311" y="427" fill="#fff" font-size="16" font-family="Arial">j</text>

  <line x1="430" y1="250" x2="620" y2="250" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="445" y="235" fill="#bfdbfe" font-size="18" font-family="Arial">nums1[i] = 3 &lt; 4, move i</text>

  <line x1="334" y1="420" x2="520" y2="420" stroke="#86efac" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="342" y="405" fill="#bbf7d0" font-size="18" font-family="Arial">then 6 == 6, return 6</text>

  <text x="70" y="560" fill="#e2e8f0" font-size="24" font-family="Arial" font-weight="700">Invariant: discarded smaller values can never be the minimum common value.</text>
</svg>
