<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 824 Goat Latin transformation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="88" fill="#e2e8f0" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 824: Goat Latin</text>
  <text x="60" y="125" fill="#93c5fd" font-size="24" font-family="Arial, Helvetica, sans-serif">Word transform + growing suffix of 'a'</text>

  <rect x="60" y="180" width="320" height="140" rx="16" fill="#111827" stroke="#334155"/>
  <text x="84" y="225" fill="#f8fafc" font-size="28" font-family="monospace">I speak Goat Latin</text>
  <text x="84" y="268" fill="#cbd5e1" font-size="20" font-family="Arial">Split into words by spaces</text>

  <line x1="390" y1="250" x2="470" y2="250" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="480" y="150" width="290" height="190" rx="16" fill="#0b1220" stroke="#475569"/>
  <text x="505" y="190" fill="#f8fafc" font-size="24" font-family="Arial" font-weight="700">Rule per word</text>
  <text x="505" y="225" fill="#cbd5e1" font-size="19" font-family="Arial">Starts with vowel:</text>
  <text x="525" y="252" fill="#86efac" font-size="19" font-family="monospace">word + "ma"</text>
  <text x="505" y="285" fill="#cbd5e1" font-size="19" font-family="Arial">Starts with consonant:</text>
  <text x="525" y="312" fill="#fca5a5" font-size="19" font-family="monospace">word[1:] + word[0] + "ma"</text>

  <line x1="780" y1="250" x2="860" y2="250" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="870" y="180" width="270" height="140" rx="16" fill="#111827" stroke="#334155"/>
  <text x="895" y="222" fill="#f8fafc" font-size="22" font-family="Arial" font-weight="700">Index suffix</text>
  <text x="895" y="255" fill="#cbd5e1" font-size="19" font-family="Arial">1st word: + "a"</text>
  <text x="895" y="282" fill="#cbd5e1" font-size="19" font-family="Arial">2nd word: + "aa"</text>
  <text x="895" y="309" fill="#cbd5e1" font-size="19" font-family="Arial">3rd word: + "aaa"</text>

  <rect x="60" y="390" width="1080" height="170" rx="16" fill="#020617" stroke="#334155"/>
  <text x="85" y="440" fill="#f1f5f9" font-size="24" font-family="monospace">Imaa peaksmaaa oatGmaaaa atinLmaaaaa</text>
  <text x="85" y="485" fill="#93c5fd" font-size="20" font-family="Arial">Example output after applying rules word-by-word</text>
  <text x="85" y="523" fill="#64748b" font-size="18" font-family="Arial">Author: Tom🦞 · hongten.github.io</text>
</svg>
