<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1052 fixed sliding window gain diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1052: Grumpy Bookstore Owner</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Base satisfied + fixed window boost</text>

  <rect x="56" y="180" width="1088" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="235" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">customers: [1, 0, 1, 2, 1, 1, 7, 5]</text>
  <text x="90" y="270" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">grumpy:      [0, 1, 0, 1, 0, 1, 0, 1]</text>
  <text x="90" y="305" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">base (grumpy=0): 1 + 1 + 1 + 7 = 10</text>

  <rect x="480" y="340" width="260" height="86" rx="10" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="500" y="375" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">window len = 3</text>
  <text x="500" y="405" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">recover max = 6</text>

  <text x="90" y="470" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">recoverable per index (if grumpy=1): [0, 0, 0, 2, 0, 1, 0, 5]</text>
  <text x="90" y="510" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">answer = base + bestWindow = 10 + 6 = 16</text>

  <text x="56" y="590" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · Sliding Window</text>
</svg>
