<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}}
      .m{{font-size:38px;font-weight:700}}
      .s{{font-size:24px;fill:#93c5fd}}
      .b{{fill:#111827;stroke:#38bdf8;stroke-width:3;rx:16}}
      .k{{font-size:28px;font-weight:700;fill:#f8fafc}}
      .a{{font-size:24px;fill:#cbd5e1}}
      .arrow{{stroke:#f59e0b;stroke-width:4;marker-end:url(#arr)}}
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 1979 · Find GCD of Array</text>
  <text x="60" y="130" class="t s">Take min and max, then run Euclidean algorithm</text>

  <rect x="90" y="200" width="260" height="120" class="b"/>
  <text x="130" y="255" class="t k">min = 2</text>
  <text x="130" y="292" class="t a">from nums</text>

  <rect x="470" y="200" width="260" height="120" class="b"/>
  <text x="510" y="255" class="t k">max = 14</text>
  <text x="510" y="292" class="t a">from nums</text>

  <rect x="850" y="200" width="260" height="180" class="b"/>
  <text x="885" y="255" class="t k">gcd(14,2)</text>
  <text x="885" y="298" class="t a">14 % 2 = 0</text>
  <text x="885" y="338" class="t a">answer = 2</text>

  <line x1="350" y1="260" x2="460" y2="260" class="arrow"/>
  <line x1="730" y1="260" x2="840" y2="260" class="arrow"/>

  <text x="60" y="560" class="t s">Author: Tom🦞 · EN + 中文 · Java/Go/C++/Python/JavaScript</text>
</svg>
