<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1304 symmetric pair construction diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1304</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Find N Unique Integers Sum up to Zero</text>

  <rect x="70" y="190" width="1060" height="340" rx="20" fill="#111827" stroke="#334155"/>
  <text x="120" y="250" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">Pair construction:</text>
  <text x="120" y="305" fill="#86efac" font-size="34" font-family="JetBrains Mono,Consolas,monospace">+1   +2   +3   ...   +k</text>
  <text x="120" y="355" fill="#fca5a5" font-size="34" font-family="JetBrains Mono,Consolas,monospace">-1   -2   -3   ...   -k</text>
  <text x="120" y="415" fill="#e2e8f0" font-size="30" font-family="Inter,Arial,sans-serif">Each pair sums to 0, if n is odd append one 0.</text>
  <text x="120" y="475" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Time O(n), Space O(n)</text>
</svg>
