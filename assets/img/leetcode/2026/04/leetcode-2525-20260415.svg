<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2525 bulky heavy decision matrix">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2525</text>
  <text x="60" y="140" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Categorize Box According to Criteria</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="110" y="250" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">Bulky = (max dimension ≥ 10,000) OR (volume ≥ 1,000,000,000)</text>
  <text x="110" y="300" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">Heavy = (mass ≥ 100)</text>

  <text x="110" y="370" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Bulky + Heavy → Both</text>
  <text x="110" y="410" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Bulky only → Bulky</text>
  <text x="110" y="450" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Heavy only → Heavy</text>
  <text x="110" y="490" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Neither → Neither</text>

  <text x="60" y="590" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文后置</text>
</svg>
