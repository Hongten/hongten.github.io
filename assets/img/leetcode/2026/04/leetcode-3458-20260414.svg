<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3458 interval expansion and greedy disjoint selection">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="86" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3458 · Select K Disjoint Special Substrings</text>

  <rect x="60" y="130" width="1080" height="430" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="182" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">1) Build valid intervals by first/last occurrence expansion</text>

  <rect x="90" y="212" width="300" height="56" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="110" y="248" fill="#e5e7eb" font-size="26" font-family="Menlo,Consolas,monospace">[0, 4]</text>
  <rect x="430" y="212" width="250" height="56" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="450" y="248" fill="#e5e7eb" font-size="26" font-family="Menlo,Consolas,monospace">[6, 8]</text>
  <rect x="710" y="212" width="360" height="56" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="730" y="248" fill="#e5e7eb" font-size="26" font-family="Menlo,Consolas,monospace">[10, 14]</text>

  <text x="90" y="320" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">2) Sort by right endpoint, greedily pick non-overlapping intervals</text>

  <line x1="90" y1="370" x2="1090" y2="370" stroke="#6b7280" stroke-width="2"/>
  <circle cx="190" cy="370" r="8" fill="#60a5fa"/>
  <circle cx="430" cy="370" r="8" fill="#60a5fa"/>
  <circle cx="650" cy="370" r="8" fill="#60a5fa"/>
  <circle cx="910" cy="370" r="8" fill="#60a5fa"/>

  <rect x="155" y="398" width="220" height="44" rx="10" fill="#14532d"/>
  <text x="172" y="427" fill="#dcfce7" font-size="22" font-family="Inter,Arial,sans-serif">pick [0,4]</text>
  <rect x="615" y="398" width="220" height="44" rx="10" fill="#14532d"/>
  <text x="632" y="427" fill="#dcfce7" font-size="22" font-family="Inter,Arial,sans-serif">pick [6,8]</text>

  <text x="90" y="510" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif">Max disjoint count >= k  ?  true : false</text>
