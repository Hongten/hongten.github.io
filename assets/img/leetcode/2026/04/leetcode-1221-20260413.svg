<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1221 balance split illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1221 · Split a String in Balanced Strings</text>
  <text x="60" y="145" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Greedy balance counter: +1 for L, -1 for R, split when balance returns to 0</text>

  <rect x="60" y="190" width="1080" height="360" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="245" fill="#93c5fd" font-size="24" font-family="monospace">Input: R L R R L L R L</text>
  <line x1="90" y1="260" x2="1110" y2="260" stroke="#374151"/>

  <text x="90" y="305" fill="#86efac" font-size="22" font-family="monospace">balance: -1 0 -1 -2 -1 0 -1 0</text>

  <line x1="238" y1="318" x2="238" y2="385" stroke="#f59e0b" stroke-width="3"/>
  <line x1="642" y1="318" x2="642" y2="385" stroke="#f59e0b" stroke-width="3"/>
  <line x1="986" y1="318" x2="986" y2="385" stroke="#f59e0b" stroke-width="3"/>

  <text x="180" y="420" fill="#fcd34d" font-size="20" font-family="Inter,Arial,sans-serif">Split #1</text>
  <text x="585" y="420" fill="#fcd34d" font-size="20" font-family="Inter,Arial,sans-serif">Split #2</text>
  <text x="930" y="420" fill="#fcd34d" font-size="20" font-family="Inter,Arial,sans-serif">Split #3</text>

  <text x="90" y="480" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Each time balance == 0, one balanced substring is completed.</text>
  <text x="90" y="520" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Greedy cut at every zero gives the maximum number of substrings.</text>

  <text x="90" y="575" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
