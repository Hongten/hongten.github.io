<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 275 H-Index II binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 275: H-Index II</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Binary Search Boundary: first i with citations[i] ≥ n - i</text>
  <rect x="56" y="190" width="1088" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="86" y="246" fill="#f9fafb" font-size="26" font-family="monospace">index:      0   1   2   3   4</text>
  <text x="86" y="290" fill="#f9fafb" font-size="26" font-family="monospace">citations:  0   1   3   5   6</text>
  <text x="86" y="334" fill="#f9fafb" font-size="26" font-family="monospace">n - i:      5   4   3   2   1</text>
  <line x1="515" y1="358" x2="515" y2="505" stroke="#22c55e" stroke-width="4"/>
  <text x="534" y="404" fill="#22c55e" font-size="28" font-family="Inter,Arial,sans-serif">First feasible i = 2</text>
  <text x="534" y="444" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">h = n - i = 3</text>
  <text x="86" y="500" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Monotonic condition enables O(log n) search</text>
  <text x="86" y="588" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
