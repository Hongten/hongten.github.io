<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 418 sentence screen fitting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 418: Sentence Screen Fitting</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Precompute next start index and sentence count per row</text>

  <rect x="60" y="190" width="520" height="340" rx="16" fill="#111827" stroke="#374151"/>
  <text x="90" y="235" fill="#f9fafb" font-size="24" font-family="monospace">rows x cols screen</text>
  <text x="90" y="280" fill="#d1d5db" font-size="22" font-family="monospace">i = start word index</text>
  <text x="90" y="320" fill="#d1d5db" font-size="22" font-family="monospace">nextIdx[i] = next start</text>
  <text x="90" y="360" fill="#d1d5db" font-size="22" font-family="monospace">addCount[i] = full loops</text>
  <text x="90" y="420" fill="#86efac" font-size="22" font-family="monospace">ans += addCount[cur]</text>
  <text x="90" y="460" fill="#86efac" font-size="22" font-family="monospace">cur = nextIdx[cur]</text>

  <rect x="640" y="190" width="500" height="340" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="670" y="240" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Row transition example</text>
  <text x="670" y="290" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">start 0 -> next 2, +0 sentence</text>
  <text x="670" y="330" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">start 2 -> next 1, +1 sentence</text>
  <text x="670" y="370" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">start 1 -> next 0, +0 sentence</text>
  <text x="670" y="430" fill="#fde68a" font-size="24" font-family="Inter,Arial,sans-serif">Total = sum of per-row loops</text>

  <text x="60" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
