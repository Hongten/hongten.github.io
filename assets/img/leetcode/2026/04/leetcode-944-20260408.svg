<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 944 column check illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:42px;font-weight:700}
      .s{font-size:24px;fill:#93c5fd}
      .c{font-size:30px;font-weight:700}
      .ok{fill:#22c55e}
      .bad{fill:#ef4444}
      .box{fill:#334155;stroke:#64748b;stroke-width:2}
      .arr{stroke:#f59e0b;stroke-width:4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 944 · Delete Columns to Make Sorted</text>
  <text x="60" y="130" class="t s">Scan each column independently; if any row pair decreases, delete that column.</text>

  <g transform="translate(90,190)">
    <rect x="0" y="0" width="120" height="70" class="box"/><rect x="120" y="0" width="120" height="70" class="box"/><rect x="240" y="0" width="120" height="70" class="box"/><rect x="360" y="0" width="120" height="70" class="box"/>
    <rect x="0" y="70" width="120" height="70" class="box"/><rect x="120" y="70" width="120" height="70" class="box"/><rect x="240" y="70" width="120" height="70" class="box"/><rect x="360" y="70" width="120" height="70" class="box"/>
    <rect x="0" y="140" width="120" height="70" class="box"/><rect x="120" y="140" width="120" height="70" class="box"/><rect x="240" y="140" width="120" height="70" class="box"/><rect x="360" y="140" width="120" height="70" class="box"/>

    <text x="52" y="45" class="t c">c</text><text x="172" y="45" class="t c">b</text><text x="292" y="45" class="t c">a</text><text x="412" y="45" class="t c">x</text>
    <text x="52" y="115" class="t c">d</text><text x="172" y="115" class="t c">a</text><text x="292" y="115" class="t c">f</text><text x="412" y="115" class="t c">x</text>
    <text x="52" y="185" class="t c">g</text><text x="172" y="185" class="t c">h</text><text x="292" y="185" class="t c">i</text><text x="412" y="185" class="t c">x</text>

    <line x1="300" y1="-30" x2="300" y2="220" class="arr"/>
    <text x="250" y="-45" class="t bad">a &gt; f? no</text>
    <text x="500" y="40" class="t ok">col 0 ✅</text>
    <text x="500" y="110" class="t bad">col 1 ❌ (b &gt; a)</text>
    <text x="500" y="180" class="t ok">col 2 ✅</text>
  </g>

  <text x="60" y="575" class="t s">Answer = number of bad columns</text>
</svg>
