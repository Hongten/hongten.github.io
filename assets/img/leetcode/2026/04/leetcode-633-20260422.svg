<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 633 two pointers on squares">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <style>
      .title { font: 700 46px 'Segoe UI', Arial, sans-serif; fill: #eaf2ff; }
      .sub { font: 400 24px 'Segoe UI', Arial, sans-serif; fill: #c9d6ff; }
      .label { font: 600 24px 'Segoe UI', Arial, sans-serif; fill: #e6eeff; }
      .mono { font: 600 20px 'JetBrains Mono', Consolas, monospace; fill: #d7e6ff; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #cfe0ff; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" class="title">LeetCode 633: Sum of Square Numbers</text>
  <text x="56" y="124" class="sub">Two pointers on monotonic square values</text>

  <line x1="120" y1="520" x2="1080" y2="520" stroke="#8eb2ff" stroke-width="3" />

  <g transform="translate(120,0)">
    <circle cx="0" cy="520" r="10" fill="#7aa2ff"/>
    <text x="-8" y="555" class="mono">0</text>

    <circle cx="120" cy="500" r="10" fill="#7aa2ff"/>
    <text x="106" y="555" class="mono">1²</text>

    <circle cx="240" cy="440" r="10" fill="#7aa2ff"/>
    <text x="226" y="555" class="mono">2²</text>

    <circle cx="360" cy="340" r="10" fill="#7aa2ff"/>
    <text x="346" y="555" class="mono">3²</text>

    <circle cx="480" cy="200" r="10" fill="#7aa2ff"/>
    <text x="466" y="555" class="mono">4²</text>

    <circle cx="600" cy="20" r="10" fill="#7aa2ff"/>
    <text x="586" y="555" class="mono">5²</text>
  </g>

  <g>
    <circle cx="240" cy="440" r="20" fill="#32d296"/>
    <text x="212" y="406" class="label">left = a</text>
    <path d="M260 430 C300 390, 340 360, 390 340" fill="none" stroke="#32d296" stroke-width="4" marker-end="url(#arrowG)"/>

    <circle cx="720" cy="20" r="20" fill="#ff8a65"/>
    <text x="742" y="48" class="label">right = b</text>
    <path d="M700 34 C650 90, 600 140, 560 200" fill="none" stroke="#ff8a65" stroke-width="4" marker-end="url(#arrowO)"/>
  </g>

  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#32d296"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff8a65"/>
    </marker>
  </defs>

  <rect x="740" y="350" width="390" height="170" rx="14" fill="#111a30" stroke="#4363a8"/>
  <text x="770" y="392" class="small">Compare:</text>
  <text x="770" y="430" class="mono">sum = a² + b²</text>
  <text x="770" y="462" class="small">sum &lt; c  → left++</text>
  <text x="770" y="490" class="small">sum &gt; c  → right--</text>
</svg>
