<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2352 Equal Row and Column Pairs diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 42px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .num{font:700 24px 'JetBrains Mono',Consolas,monospace;fill:#f8fafc}
      .lab{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#a7f3d0}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 2352: Equal Row and Column Pairs</text>
  <text x="60" y="120" class="sub">Count row signatures, match with column signatures</text>

  <g transform="translate(120,180)">
    <rect x="0" y="0" width="360" height="360" rx="14" fill="#111827" stroke="#334155"/>
    <g>
      <rect x="20" y="20" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="130" y="20" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="240" y="20" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="20" y="130" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="130" y="130" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="240" y="130" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="20" y="240" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="130" y="240" width="100" height="100" fill="#1f2937" stroke="#475569"/>
      <rect x="240" y="240" width="100" height="100" fill="#1f2937" stroke="#475569"/>
    </g>
    <g class="num" text-anchor="middle" dominant-baseline="middle">
      <text x="70" y="70">3</text><text x="180" y="70">2</text><text x="290" y="70">1</text>
      <text x="70" y="180">1</text><text x="180" y="180">7</text><text x="290" y="180">6</text>
      <text x="70" y="290">2</text><text x="180" y="290">7</text><text x="290" y="290">7</text>
    </g>
    <rect x="20" y="130" width="320" height="100" fill="none" stroke="#22c55e" stroke-width="4"/>
    <rect x="130" y="20" width="100" height="320" fill="none" stroke="#38bdf8" stroke-width="4"/>
    <text x="30" y="380" class="lab">Row 1: 1#7#6#</text>
    <text x="210" y="380" class="lab">Col 1: 2#7#7#</text>
  </g>

  <g transform="translate(560,220)">
    <text x="0" y="0" class="txt">1) Hash all rows:</text>
    <text x="0" y="44" class="num">"3#2#1#" → 1</text>
    <text x="0" y="84" class="num">"1#7#6#" → 1</text>
    <text x="0" y="124" class="num">"2#7#7#" → 1</text>
    <text x="0" y="184" class="txt">2) Build each column key</text>
    <text x="0" y="224" class="txt">3) answer += rowCount[colKey]</text>
    <text x="0" y="284" class="lab">Result: 1 equal pair</text>
  </g>
</svg>
