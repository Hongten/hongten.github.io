<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1337 weak rows ranking diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="86" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1337 · The K Weakest Rows in a Matrix</text>
  <text x="50" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Rank by (soldier count, row index)</text>

  <rect x="60" y="180" width="1080" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="110" y="250" fill="#e5e7eb" font-size="24" font-family="monospace">row 0: [1 1 0 0 0]  soldiers=2  key=(2,0)</text>
  <text x="110" y="295" fill="#e5e7eb" font-size="24" font-family="monospace">row 1: [1 1 1 1 0]  soldiers=4  key=(4,1)</text>
  <text x="110" y="340" fill="#e5e7eb" font-size="24" font-family="monospace">row 2: [1 0 0 0 0]  soldiers=1  key=(1,2)</text>
  <text x="110" y="385" fill="#e5e7eb" font-size="24" font-family="monospace">row 3: [1 1 0 0 0]  soldiers=2  key=(2,3)</text>

  <text x="110" y="455" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Sorted keys: (1,2), (2,0), (2,3), (4,1)</text>
  <text x="110" y="500" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">k=2 → answer: [2, 0]</text>
  <text x="110" y="545" fill="#c4b5fd" font-size="24" font-family="Inter,Arial,sans-serif">Binary search each row to find first 0, then sort pairs.</text>
</svg>
