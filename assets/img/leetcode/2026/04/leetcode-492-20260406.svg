<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 492 closest factor pair around square root diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="94" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 492 · Construct the Rectangle</text>
  <text x="56" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Find the closest factor pair around √area</text>

  <rect x="90" y="200" width="480" height="300" rx="18" fill="#1f2937" stroke="#60a5fa" stroke-width="3"/>
  <text x="320" y="356" text-anchor="middle" fill="#e5e7eb" font-size="52" font-family="Inter,Arial,sans-serif">L = 37</text>
  <text x="320" y="412" text-anchor="middle" fill="#86efac" font-size="38" font-family="Inter,Arial,sans-serif">W = 32</text>

  <line x1="620" y1="250" x2="1120" y2="250" stroke="#6b7280" stroke-width="4"/>
  <line x1="620" y1="430" x2="1120" y2="430" stroke="#6b7280" stroke-width="4"/>
  <text x="870" y="220" text-anchor="middle" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">area = 1184</text>
  <text x="870" y="295" text-anchor="middle" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">start at floor(√1184)=34</text>
  <text x="870" y="350" text-anchor="middle" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">34 ✗, 33 ✗, 32 ✓</text>
  <text x="870" y="405" text-anchor="middle" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">L = 1184 / 32 = 37</text>
  <text x="870" y="470" text-anchor="middle" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Closest pair minimizes L − W</text>

  <text x="56" y="584" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second · Java default tabs</text>
</svg>
