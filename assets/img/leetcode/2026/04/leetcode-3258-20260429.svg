<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial">LeetCode 3258 · K-Constraint Substrings</text><text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Arial">Expand from each left index, count zero/one, break when both exceed k</text><rect x="60" y="210" width="1080" height="300" rx="20" fill="#111827" stroke="#334155"/><text x="90" y="270" fill="#f8fafc" font-size="24" font-family="monospace">s = 0 1 0 1 1,  k = 1</text><text x="90" y="320" fill="#cbd5e1" font-size="22" font-family="monospace">i=0: 0 ✓, 01 ✓, 010 ✓, 0101 ✗ (zero=2, one=2)</text><text x="90" y="360" fill="#cbd5e1" font-size="22" font-family="monospace">i=1: 1 ✓, 10 ✓, 101 ✓, 1011 ✗</text><text x="90" y="400" fill="#cbd5e1" font-size="22" font-family="monospace">Invalid condition: zero &gt; k AND one &gt; k</text><text x="90" y="440" fill="#86efac" font-size="22" font-family="monospace">Monotonic counts ⇒ invalid once, invalid forever (for same i)</text></svg>