<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2185 prefix counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2185 · Counting Words With a Given Prefix</text>

  <rect x="60" y="140" width="1080" height="430" rx="18" fill="#111827" stroke="#334155"/>

  <text x="95" y="195" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">pref = "at"</text>

  <rect x="95" y="225" width="980" height="65" rx="10" fill="#1f2937"/>
  <text x="120" y="267" fill="#e5e7eb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">words = ["pay", "attention", "practice", "attend"]</text>

  <line x1="95" y1="330" x2="1075" y2="330" stroke="#334155" stroke-width="2"/>

  <text x="120" y="380" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">attention</text>
  <text x="420" y="380" fill="#34d399" font-size="26" font-family="Inter,Arial,sans-serif">startsWith("at") ✓</text>

  <text x="120" y="430" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">attend</text>
  <text x="420" y="430" fill="#34d399" font-size="26" font-family="Inter,Arial,sans-serif">startsWith("at") ✓</text>

  <text x="120" y="480" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">pay, practice</text>
  <text x="420" y="480" fill="#f87171" font-size="26" font-family="Inter,Arial,sans-serif">startsWith("at") ✗</text>

  <text x="95" y="540" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">count = 2</text>
  <text x="980" y="590" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
