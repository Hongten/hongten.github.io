<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3075 greedy illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3075</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial">Maximize Happiness of Selected Children</text>
  <text x="60" y="190" fill="#cbd5e1" font-size="24" font-family="Arial">Greedy: sort desc, gain = max(h[i] - i, 0)</text>
  <g transform="translate(60,260)">
    <rect x="0" y="120" width="120" height="180" fill="#22c55e"/><text x="42" y="330" fill="#e2e8f0" font-size="24" font-family="Arial">9</text>
    <rect x="150" y="160" width="120" height="140" fill="#38bdf8"/><text x="192" y="330" fill="#e2e8f0" font-size="24" font-family="Arial">7</text>
    <rect x="300" y="200" width="120" height="100" fill="#60a5fa"/><text x="342" y="330" fill="#e2e8f0" font-size="24" font-family="Arial">5</text>
    <rect x="450" y="240" width="120" height="60" fill="#818cf8"/><text x="492" y="330" fill="#e2e8f0" font-size="24" font-family="Arial">3</text>
    <text x="0" y="380" fill="#cbd5e1" font-size="22" font-family="Arial">Pick order penalties: -0, -1, -2, -3 ...</text>
    <text x="0" y="415" fill="#fcd34d" font-size="22" font-family="Arial">Take largest early to minimize loss</text>
  </g>
</svg>
