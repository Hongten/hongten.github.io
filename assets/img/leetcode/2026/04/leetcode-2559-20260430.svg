<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="120" fill="#7dd3fc" font-size="48" font-family="Arial">LeetCode 2559 - Prefix Sum</text><text x="60" y="190" fill="#e2e8f0" font-size="30" font-family="Arial">Count vowel-strings in any [l, r] quickly</text><rect x="60" y="240" width="1080" height="300" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="300" fill="#a7f3d0" font-size="28" font-family="monospace">isVowelWord: [1,0,1,1,0,1]</text><text x="90" y="350" fill="#fcd34d" font-size="28" font-family="monospace">prefix:      [0,1,1,2,3,3,4]</text><text x="90" y="400" fill="#e5e7eb" font-size="28" font-family="monospace">query [1,4] =&gt; pre[5]-pre[1] = 2</text><text x="90" y="450" fill="#e5e7eb" font-size="28" font-family="monospace">query [0,5] =&gt; pre[6]-pre[0] = 4</text></svg>