<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2206 Divide Array Into Equal Pairs diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2206: Divide Array Into Equal Pairs</text>
  <text x="60" y="145" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Count frequency of each number, every count must be even</text>

  <rect x="60" y="190" width="1080" height="360" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="245" fill="#f3f4f6" font-size="28" font-family="JetBrains Mono,Consolas,monospace">nums = [3,2,3,2,2,2]</text>

  <rect x="100" y="280" width="300" height="70" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="125" y="325" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">count(3) = 2 ✓</text>

  <rect x="430" y="280" width="300" height="70" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="455" y="325" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">count(2) = 4 ✓</text>

  <path d="M 260 390 L 260 455 L 560 455 L 560 390" fill="none" stroke="#22c55e" stroke-width="4"/>
  <text x="300" y="430" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">all even → true</text>

  <text x="60" y="595" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · Array / Hash Map · Parity Check</text>
</svg>
