<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1056 Confusing Number rotate and compare diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1056: Confusing Number</text>
  <text x="60" y="135" fill="#94a3b8" font-size="28" font-family="Arial, sans-serif">Rotate each digit (180°), rebuild reversed, compare with original</text>

  <rect x="80" y="200" width="420" height="280" rx="16" fill="#111827" stroke="#334155"/>
  <text x="110" y="255" fill="#f8fafc" font-size="30" font-family="monospace">Input: 89</text>
  <text x="110" y="315" fill="#cbd5e1" font-size="26" font-family="monospace">take 9 -&gt; 6</text>
  <text x="110" y="355" fill="#cbd5e1" font-size="26" font-family="monospace">take 8 -&gt; 8</text>
  <text x="110" y="425" fill="#22c55e" font-size="30" font-family="monospace">rotated = 68</text>

  <line x1="520" y1="340" x2="700" y2="340" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="730" y="200" width="390" height="280" rx="16" fill="#111827" stroke="#334155"/>
  <text x="760" y="255" fill="#f8fafc" font-size="30" font-family="monospace">Compare</text>
  <text x="760" y="330" fill="#fbbf24" font-size="40" font-family="monospace">68 != 89</text>
  <text x="760" y="410" fill="#22c55e" font-size="34" font-family="monospace">Confusing ✓</text>

  <text x="80" y="560" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Valid digits only: 0,1,6,8,9 (2,3,4,5,7 are invalid)</text>
</svg>
