<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 637 level average diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .cap{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .node{fill:#334155;stroke:#93c5fd;stroke-width:3}
      .edge{stroke:#64748b;stroke-width:4}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="80" class="title">LeetCode 637: Average of Levels in Binary Tree</text>
  <text x="70" y="120" class="sub">BFS by level, sum then divide by level width</text>

  <line x1="600" y1="210" x2="450" y2="300" class="edge"/>
  <line x1="600" y1="210" x2="750" y2="300" class="edge"/>
  <line x1="450" y1="300" x2="360" y2="390" class="edge"/>
  <line x1="450" y1="300" x2="540" y2="390" class="edge"/>
  <line x1="750" y1="300" x2="840" y2="390" class="edge"/>

  <circle cx="600" cy="190" r="34" class="node"/><text x="588" y="199" class="txt">3</text>
  <circle cx="450" cy="300" r="34" class="node"/><text x="438" y="309" class="txt">9</text>
  <circle cx="750" cy="300" r="34" class="node"/><text x="731" y="309" class="txt">20</text>
  <circle cx="360" cy="410" r="34" class="node"/><text x="345" y="419" class="txt">15</text>
  <circle cx="540" cy="410" r="34" class="node"/><text x="527" y="419" class="txt">7</text>
  <circle cx="840" cy="410" r="34" class="node"/><text x="827" y="419" class="txt">8</text>

  <text x="70" y="250" class="cap">Level 0: [3]  → average = 3.0</text>
  <text x="70" y="320" class="cap">Level 1: [9, 20]  → average = 14.5</text>
  <text x="70" y="390" class="cap">Level 2: [15, 7, 8]  → average = 10.0</text>

  <rect x="70" y="470" width="1060" height="95" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="95" y="525" class="cap">Queue snapshot idea: process exact queue size each round, collect sum, append sum / size.</text>
</svg>
