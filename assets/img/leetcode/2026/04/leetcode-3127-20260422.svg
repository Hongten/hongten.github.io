<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3127 2x2 window counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="54" y="86" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3127 - Make a Square with the Same Color</text>
  <text x="54" y="130" fill="#93c5fd" font-size="27" font-family="Inter,Arial,sans-serif">Check each 2x2 block, if black count != 2 then answer is true</text>

  <g transform="translate(110,190)">
    <rect x="0" y="0" width="300" height="300" fill="none" stroke="#9ca3af" stroke-width="3"/>
    <rect x="0" y="0" width="100" height="100" fill="#0f172a" stroke="#334155"/>
    <rect x="100" y="0" width="100" height="100" fill="#f8fafc" stroke="#334155"/>
    <rect x="200" y="0" width="100" height="100" fill="#0f172a" stroke="#334155"/>
    <rect x="0" y="100" width="100" height="100" fill="#0f172a" stroke="#334155"/>
    <rect x="100" y="100" width="100" height="100" fill="#0f172a" stroke="#334155"/>
    <rect x="200" y="100" width="100" height="100" fill="#f8fafc" stroke="#334155"/>
    <rect x="0" y="200" width="100" height="100" fill="#f8fafc" stroke="#334155"/>
    <rect x="100" y="200" width="100" height="100" fill="#0f172a" stroke="#334155"/>
    <rect x="200" y="200" width="100" height="100" fill="#f8fafc" stroke="#334155"/>

    <rect x="0" y="0" width="200" height="200" fill="none" stroke="#22c55e" stroke-width="6"/>
    <text x="8" y="-16" fill="#22c55e" font-size="22" font-family="Inter,Arial,sans-serif">sample 2x2: B=3, W=1 → can fix in ≤1 move</text>
  </g>

  <g transform="translate(520,220)">
    <rect x="0" y="0" width="620" height="250" rx="16" fill="#1f2937" stroke="#374151"/>
    <text x="30" y="56" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Rule:</text>
    <text x="125" y="56" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">for every 2x2 block, count black cells</text>
    <text x="30" y="106" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">If black != 2, return true</text>
    <text x="30" y="156" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Only 4 blocks in a 3x3 grid, so O(1)</text>
    <text x="30" y="210" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
  </g>
</svg>
