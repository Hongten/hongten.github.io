<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3069 distribution simulation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#334155;stroke-width:2;rx:14}
      .lbl{font:700 26px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 22px 'Consolas','Courier New',monospace;fill:#f8fafc}
      .note{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#a7f3d0}
      .arrow{stroke:#22d3ee;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="78" class="title">LeetCode 3069 · Distribute Elements Into Two Arrays I</text>
  <text x="60" y="118" class="sub">Compare tails: arr1.back() vs arr2.back(), then append current number.</text>

  <rect x="60" y="170" width="1080" height="110" class="box"/>
  <text x="90" y="215" class="lbl">Input stream</text>
  <text x="300" y="217" class="txt">nums = [5, 4, 3, 8, 2, 7]</text>
  <text x="300" y="250" class="note">Start: arr1=[5], arr2=[4]</text>

  <rect x="60" y="320" width="500" height="220" class="box"/>
  <text x="90" y="365" class="lbl">arr1</text>
  <text x="90" y="410" class="txt">[5, 3, 8, 2, 7]</text>
  <text x="90" y="452" class="note">When tail1 &gt; tail2, append here</text>

  <rect x="640" y="320" width="500" height="220" class="box"/>
  <text x="670" y="365" class="lbl">arr2</text>
  <text x="670" y="410" class="txt">[4]</text>
  <text x="670" y="452" class="note">Otherwise append to arr2</text>

  <line x1="480" y1="280" x2="310" y2="318" class="arrow"/>
  <line x1="740" y1="280" x2="890" y2="318" class="arrow"/>
  <text x="60" y="592" class="sub">Answer = arr1 + arr2 = [5,3,8,2,7,4] (simulation in O(n))</text>
</svg>
