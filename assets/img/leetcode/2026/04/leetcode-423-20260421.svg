<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 423 unique-letter mapping diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:2;rx:14}
      .txt{font:600 28px 'Consolas','Menlo',monospace;fill:#e2e8f0}
      .note{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#a5f3fc}
      .arrow{stroke:#94a3b8;stroke-width:3;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 423: Reconstruct Original Digits from English</text>
  <text x="60" y="130" class="sub">Unique letters first, then deduct dependent digits</text>

  <rect x="60" y="180" width="500" height="360" class="box"/>
  <text x="90" y="230" class="txt">z → 0 (zero)</text>
  <text x="90" y="275" class="txt">w → 2 (two)</text>
  <text x="90" y="320" class="txt">u → 4 (four)</text>
  <text x="90" y="365" class="txt">x → 6 (six)</text>
  <text x="90" y="410" class="txt">g → 8 (eight)</text>
  <text x="90" y="470" class="note">Direct anchors from unique letters</text>

  <line x1="580" y1="300" x2="690" y2="300" class="arrow"/>

  <rect x="710" y="180" width="430" height="360" class="box"/>
  <text x="740" y="230" class="txt">3 = h - 8</text>
  <text x="740" y="275" class="txt">5 = f - 4</text>
  <text x="740" y="320" class="txt">7 = s - 6</text>
  <text x="740" y="365" class="txt">1 = o - 0 - 2 - 4</text>
  <text x="740" y="410" class="txt">9 = i - 5 - 6 - 8</text>
  <text x="740" y="470" class="note">Build answer by repeating digits 0..9</text>
</svg>
