<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1450 interval containment counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1450 · Interval Containment Counting</text>
  <line x1="120" y1="320" x2="1080" y2="320" stroke="#9ca3af" stroke-width="3"/>
  <text x="110" y="355" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">time axis</text>

  <rect x="220" y="250" width="380" height="22" rx="11" fill="#60a5fa" opacity="0.95"/>
  <text x="220" y="240" fill="#bfdbfe" font-size="22" font-family="Inter,Arial,sans-serif">student A: [1, 7]</text>

  <rect x="420" y="290" width="260" height="22" rx="11" fill="#34d399" opacity="0.95"/>
  <text x="420" y="280" fill="#a7f3d0" font-size="22" font-family="Inter,Arial,sans-serif">student B: [4, 8]</text>

  <rect x="700" y="330" width="220" height="22" rx="11" fill="#f59e0b" opacity="0.95"/>
  <text x="700" y="320" fill="#fde68a" font-size="22" font-family="Inter,Arial,sans-serif">student C: [9, 12]</text>

  <line x1="620" y1="180" x2="620" y2="430" stroke="#f43f5e" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="642" y="210" fill="#fecdd3" font-size="24" font-family="Inter,Arial,sans-serif">queryTime = 6</text>
  <text x="642" y="245" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">count intervals covering this point</text>

  <text x="60" y="575" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Answer here: 2 students active at time 6</text>
</svg>
