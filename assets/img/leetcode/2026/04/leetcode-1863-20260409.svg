<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1863 subset xor contribution diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f3b73"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e8f0ff" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1863 · Sum of All Subset XOR Totals</text>
  <text x="60" y="140" fill="#b9ccff" font-size="28" font-family="Arial, sans-serif">Bit Contribution: answer = (nums[0] | nums[1] | ... | nums[n-1]) * 2^(n-1)</text>

  <rect x="60" y="190" width="500" height="360" rx="18" fill="#111a33" stroke="#4a74d6"/>
  <text x="90" y="240" fill="#d9e6ff" font-size="30" font-family="Consolas, monospace">Example nums = [1, 3]</text>
  <text x="90" y="290" fill="#9fc0ff" font-size="26" font-family="Consolas, monospace">Subsets: {} {1} {3} {1,3}</text>
  <text x="90" y="335" fill="#9fc0ff" font-size="26" font-family="Consolas, monospace">XORs:    0   1   3    2</text>
  <text x="90" y="380" fill="#ffd166" font-size="26" font-family="Consolas, monospace">Sum = 0 + 1 + 3 + 2 = 6</text>
  <text x="90" y="430" fill="#9fc0ff" font-size="24" font-family="Consolas, monospace">orAll = 1 | 3 = 3</text>
  <text x="90" y="470" fill="#9fc0ff" font-size="24" font-family="Consolas, monospace">2^(n-1) = 2^(2-1) = 2</text>
  <text x="90" y="510" fill="#7dffb3" font-size="30" font-family="Consolas, monospace">3 * 2 = 6 ✓</text>

  <rect x="620" y="190" width="520" height="360" rx="18" fill="#111a33" stroke="#4a74d6"/>
  <text x="650" y="245" fill="#d9e6ff" font-size="30" font-family="Arial, sans-serif">Why each bit contributes half</text>
  <text x="650" y="295" fill="#9fc0ff" font-size="24" font-family="Arial, sans-serif">Pick an element with bit k = 1.</text>
  <text x="650" y="335" fill="#9fc0ff" font-size="24" font-family="Arial, sans-serif">Pair every subset S (without it)</text>
  <text x="650" y="370" fill="#9fc0ff" font-size="24" font-family="Arial, sans-serif">with S ∪ {x} (with it).</text>
  <text x="650" y="410" fill="#9fc0ff" font-size="24" font-family="Arial, sans-serif">Bit k in XOR flips 0 ↔ 1, so exactly half are 1.</text>
  <text x="650" y="465" fill="#ffd166" font-size="26" font-family="Consolas, monospace">Each active bit appears 2^(n-1) times</text>
  <text x="650" y="510" fill="#7dffb3" font-size="28" font-family="Consolas, monospace">Total = OR(all nums) × 2^(n-1)</text>
</svg>
