<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0b1020"/>
<text x="60" y="110" fill="#8be9fd" font-size="46" font-family="Arial">LeetCode 2974 · Minimum Number Game</text>
<text x="60" y="165" fill="#f8f8f2" font-size="30" font-family="Arial">Sort, then swap each adjacent pair</text>
<g font-family="monospace" font-size="34" fill="#f1fa8c">
  <text x="60" y="280">sorted nums: [2, 3, 4, 5]</text>
  <text x="60" y="345">pairs      : (2,3) (4,5)</text>
  <text x="60" y="410">swap pair  : (3,2) (5,4)</text>
  <text x="60" y="475">answer     : [3, 2, 5, 4]</text>
</g>
</svg>