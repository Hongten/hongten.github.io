<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 929 normalization diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#16213a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="80" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 929 · Unique Email Addresses</text>

  <rect x="50" y="130" width="1100" height="450" rx="20" fill="#111827" stroke="#334155"/>
  <text x="90" y="190" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Normalize local name, keep domain unchanged</text>

  <rect x="90" y="230" width="1020" height="70" rx="12" fill="#1f2937"/>
  <text x="115" y="275" fill="#f8fafc" font-size="28" font-family="JetBrains Mono,Consolas,monospace">test.email+alex@leetcode.com</text>

  <text x="560" y="335" fill="#86efac" font-size="30" text-anchor="middle" font-family="Inter,Arial,sans-serif">remove '.' and ignore after '+'</text>
  <path d="M560 345 L560 390" stroke="#86efac" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#86efac" />
    </marker>
  </defs>

  <rect x="90" y="410" width="1020" height="70" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="115" y="455" fill="#fef08a" font-size="28" font-family="JetBrains Mono,Consolas,monospace">testemail@leetcode.com</text>

  <text x="90" y="535" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Store canonical strings in a HashSet, answer = set size.</text>
</svg>
