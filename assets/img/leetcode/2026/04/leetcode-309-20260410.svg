<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 309 cooldown state diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 309 · Best Time to Buy and Sell Stock with Cooldown</text>
  <text x="60" y="130" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">State DP: Hold / Sold / Rest</text>

  <rect x="90" y="220" width="280" height="150" rx="16" fill="#1f2937" stroke="#60a5fa"/>
  <text x="130" y="275" fill="#bfdbfe" font-size="34" font-family="Inter,Arial,sans-serif">HOLD</text>
  <text x="118" y="318" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">max(hold, rest-price)</text>

  <rect x="460" y="220" width="280" height="150" rx="16" fill="#1f2937" stroke="#34d399"/>
  <text x="510" y="275" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif">SOLD</text>
  <text x="500" y="318" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">hold + price</text>

  <rect x="830" y="220" width="280" height="150" rx="16" fill="#1f2937" stroke="#fbbf24"/>
  <text x="885" y="275" fill="#fde68a" font-size="34" font-family="Inter,Arial,sans-serif">REST</text>
  <text x="860" y="318" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">max(rest, sold)</text>

  <line x1="370" y1="295" x2="460" y2="295" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="382" y="280" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">sell</text>

  <line x1="740" y1="295" x2="830" y2="295" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="745" y="280" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">cooldown/rest</text>

  <line x1="970" y1="220" x2="250" y2="170" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="560" y="165" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">buy allowed only from REST</text>

  <text x="60" y="560" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>