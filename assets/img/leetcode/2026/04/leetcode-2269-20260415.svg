<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2269 sliding window divisibility diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2269 · Find the K-Beauty of a Number</text>
  <text x="60" y="136" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Fixed-length window over digits + non-zero divisor check</text>
  <rect x="60" y="180" width="1080" height="380" rx="20" fill="#111827" stroke="#334155"/>
  <text x="90" y="240" fill="#cbd5e1" font-size="26" font-family="JetBrains Mono,Consolas,monospace">num = 430043, k = 2</text>
  <text x="90" y="292" fill="#f8fafc" font-size="30" font-family="JetBrains Mono,Consolas,monospace">43 30 00 04 43</text>
  <rect x="86" y="258" width="86" height="46" rx="8" fill="none" stroke="#22d3ee" stroke-width="3"/>
  <text x="90" y="350" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">valid if x != 0 and num % x == 0</text>
  <text x="90" y="392" fill="#fde68a" font-size="24" font-family="Inter,Arial,sans-serif">skip x = 0 to avoid division by zero</text>
  <text x="90" y="438" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">count all valid windows</text>
  <text x="90" y="520" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
