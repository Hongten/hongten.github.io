<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1217 parity counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 1217 · Parity Counting Greedy</text>
  <rect x="70" y="150" width="500" height="350" rx="20" fill="#111827" stroke="#22c55e" stroke-width="3"/>
  <text x="100" y="205" fill="#86efac" font-size="34" font-family="Arial, sans-serif" font-weight="700">Odd positions (free merge)</text>
  <text x="100" y="260" fill="#d1fae5" font-size="30" font-family="Arial, sans-serif">1, 3, 5, ...</text>
  <text x="100" y="320" fill="#d1fae5" font-size="30" font-family="Arial, sans-serif">Cost inside group = 0</text>
  <rect x="630" y="150" width="500" height="350" rx="20" fill="#111827" stroke="#60a5fa" stroke-width="3"/>
  <text x="660" y="205" fill="#93c5fd" font-size="34" font-family="Arial, sans-serif" font-weight="700">Even positions (free merge)</text>
  <text x="660" y="260" fill="#dbeafe" font-size="30" font-family="Arial, sans-serif">2, 4, 6, ...</text>
  <text x="660" y="320" fill="#dbeafe" font-size="30" font-family="Arial, sans-serif">Cost inside group = 0</text>
  <path d="M560 420 L640 420" stroke="#fbbf24" stroke-width="6" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#fbbf24"/></marker></defs>
  <text x="410" y="560" fill="#fde68a" font-size="34" font-family="Arial, sans-serif" font-weight="700">Answer = min(oddCount, evenCount)</text>
</svg>
