<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2962 sliding window contribution diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5bc0be"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="78" fill="#e0fbfc" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2962 · Sliding Window Contribution</text>
  <text x="56" y="120" fill="#9ad1d4" font-size="24" font-family="Inter,Arial,sans-serif">Count subarrays where global max appears at least k times</text>

  <rect x="56" y="170" width="1088" height="360" rx="20" fill="#0f1b3d" stroke="#3a506b" stroke-width="2"/>

  <text x="90" y="220" fill="#e0fbfc" font-size="26" font-family="JetBrains Mono,Consolas,monospace">nums: [1, 3, 2, 3, 3],   mx = 3,   k = 2</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="34" fill="#ffffff">
    <text x="130" y="320">1</text>
    <text x="250" y="320">3</text>
    <text x="370" y="320">2</text>
    <text x="490" y="320">3</text>
    <text x="610" y="320">3</text>
  </g>

  <g fill="#5bc0be" font-family="Inter,Arial,sans-serif" font-size="22">
    <text x="232" y="355">mx</text>
    <text x="472" y="355">mx</text>
    <text x="592" y="355">mx</text>
  </g>

  <line x1="122" y1="380" x2="640" y2="380" stroke="#ffd166" stroke-width="6" stroke-linecap="round"/>
  <text x="120" y="410" fill="#ffd166" font-size="22" font-family="Inter,Arial,sans-serif">Current right endpoint r</text>

  <line x1="122" y1="450" x2="250" y2="450" stroke="#ef476f" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="90" y="485" fill="#ef476f" font-size="22" font-family="Inter,Arial,sans-serif">Shrink left until cnt(mx) &lt; k</text>

  <text x="760" y="300" fill="#e0fbfc" font-size="28" font-family="Inter,Arial,sans-serif">Contribution at this r:</text>
  <text x="760" y="345" fill="#06d6a0" font-size="34" font-family="JetBrains Mono,Consolas,monospace">answer += left</text>
  <text x="760" y="395" fill="#9ad1d4" font-size="22" font-family="Inter,Arial,sans-serif">All starts in [0 .. left-1] are valid</text>

  <text x="56" y="592" fill="#9ad1d4" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual post with Java-default code tabs</text>
</svg>
