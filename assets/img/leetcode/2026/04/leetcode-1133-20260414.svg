<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1133 largest unique number frequency and reverse scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="86" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1133 · Largest Unique Number</text>
  <text x="52" y="130" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Count frequencies, then scan from 1000 ↓ to find the first count == 1</text>

  <rect x="52" y="170" width="1096" height="390" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="225" fill="#f9fafb" font-size="24" font-family="monospace">nums = [5, 7, 3, 9, 4, 9, 8, 3, 1]</text>

  <rect x="90" y="255" width="460" height="260" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="110" y="290" fill="#86efac" font-size="22" font-family="monospace">frequency table (non-zero)</text>
  <text x="110" y="330" fill="#e5e7eb" font-size="20" font-family="monospace">1 → 1</text>
  <text x="110" y="360" fill="#e5e7eb" font-size="20" font-family="monospace">3 → 2</text>
  <text x="110" y="390" fill="#e5e7eb" font-size="20" font-family="monospace">4 → 1</text>
  <text x="110" y="420" fill="#e5e7eb" font-size="20" font-family="monospace">5 → 1</text>
  <text x="110" y="450" fill="#e5e7eb" font-size="20" font-family="monospace">7 → 1</text>
  <text x="110" y="480" fill="#e5e7eb" font-size="20" font-family="monospace">8 → 1</text>
  <text x="300" y="480" fill="#e5e7eb" font-size="20" font-family="monospace">9 → 2</text>

  <rect x="600" y="255" width="510" height="260" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="620" y="290" fill="#fcd34d" font-size="22" font-family="monospace">reverse scan:</text>
  <text x="620" y="330" fill="#e5e7eb" font-size="20" font-family="monospace">v = 9, freq[9] = 2  ✗</text>
  <text x="620" y="365" fill="#e5e7eb" font-size="20" font-family="monospace">v = 8, freq[8] = 1  ✓ stop</text>
  <text x="620" y="430" fill="#34d399" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">answer = 8</text>

  <text x="52" y="603" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual solution</text>
</svg>
