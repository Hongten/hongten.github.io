<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="Hamming distance XOR illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:28px;font-weight:700}
      .s{font-size:22px}
      .bit{font-size:30px;font-weight:700}
    </style>
  </defs>
  <rect width="960" height="420" fill="url(#bg)" rx="16"/>
  <text x="40" y="56" class="t m">LeetCode 461 · Hamming Distance = count of 1s in (x XOR y)</text>

  <text x="80" y="130" class="t s">x = 1</text>
  <text x="80" y="190" class="t s">y = 4</text>
  <text x="80" y="250" class="t s">x ^ y</text>

  <g class="t bit" text-anchor="middle">
    <rect x="230" y="96" width="72" height="46" rx="8" fill="#334155"/><text x="266" y="129">0</text>
    <rect x="318" y="96" width="72" height="46" rx="8" fill="#334155"/><text x="354" y="129">0</text>
    <rect x="406" y="96" width="72" height="46" rx="8" fill="#334155"/><text x="442" y="129">1</text>

    <rect x="230" y="156" width="72" height="46" rx="8" fill="#334155"/><text x="266" y="189">1</text>
    <rect x="318" y="156" width="72" height="46" rx="8" fill="#334155"/><text x="354" y="189">0</text>
    <rect x="406" y="156" width="72" height="46" rx="8" fill="#334155"/><text x="442" y="189">0</text>

    <rect x="230" y="216" width="72" height="46" rx="8" fill="#7c3aed"/><text x="266" y="249">1</text>
    <rect x="318" y="216" width="72" height="46" rx="8" fill="#334155"/><text x="354" y="249">0</text>
    <rect x="406" y="216" width="72" height="46" rx="8" fill="#7c3aed"/><text x="442" y="249">1</text>
  </g>

  <text x="560" y="160" class="t s">diff = 101₂</text>
  <text x="560" y="210" class="t s">set bits = 2</text>
  <text x="560" y="270" class="t m" fill="#a78bfa">Hamming Distance = 2</text>
</svg>
