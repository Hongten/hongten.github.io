<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 3151 - Special Array I</title>
  <desc id="desc">Diagram showing adjacent elements must alternate parity: odd-even-odd-even.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 3151: Special Array I</text>
  <text x="60" y="132" fill="#94a3b8" font-size="26" font-family="Arial, Helvetica, sans-serif">Adjacent numbers must have different parity</text>

  <g transform="translate(80,220)">
    <rect x="0" y="0" width="190" height="110" rx="16" fill="#1d4ed8"/>
    <text x="95" y="47" text-anchor="middle" fill="#dbeafe" font-size="24" font-family="Arial" font-weight="700">3</text>
    <text x="95" y="80" text-anchor="middle" fill="#bfdbfe" font-size="20" font-family="Arial">Odd</text>

    <rect x="230" y="0" width="190" height="110" rx="16" fill="#0f766e"/>
    <text x="325" y="47" text-anchor="middle" fill="#ccfbf1" font-size="24" font-family="Arial" font-weight="700">8</text>
    <text x="325" y="80" text-anchor="middle" fill="#99f6e4" font-size="20" font-family="Arial">Even</text>

    <rect x="460" y="0" width="190" height="110" rx="16" fill="#1d4ed8"/>
    <text x="555" y="47" text-anchor="middle" fill="#dbeafe" font-size="24" font-family="Arial" font-weight="700">1</text>
    <text x="555" y="80" text-anchor="middle" fill="#bfdbfe" font-size="20" font-family="Arial">Odd</text>

    <rect x="690" y="0" width="190" height="110" rx="16" fill="#0f766e"/>
    <text x="785" y="47" text-anchor="middle" fill="#ccfbf1" font-size="24" font-family="Arial" font-weight="700">6</text>
    <text x="785" y="80" text-anchor="middle" fill="#99f6e4" font-size="20" font-family="Arial">Even</text>

    <path d="M190 55 H230" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arrow)"/>
    <path d="M420 55 H460" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arrow)"/>
    <path d="M650 55 H690" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arrow)"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <text x="80" y="410" fill="#e2e8f0" font-size="30" font-family="Arial" font-weight="700">Check rule for each i:</text>
  <text x="80" y="455" fill="#cbd5e1" font-size="28" font-family="Courier New, monospace">(nums[i] % 2) != (nums[i - 1] % 2)</text>
  <text x="80" y="520" fill="#86efac" font-size="30" font-family="Arial" font-weight="700">If all adjacent pairs pass → return true</text>
</svg>
