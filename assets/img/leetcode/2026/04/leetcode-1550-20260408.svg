<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="LeetCode 1550 three consecutive odds sliding window illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <text x="60" y="70" fill="#e2e8f0" font-size="34" font-family="Arial, sans-serif" font-weight="700">LeetCode 1550 · Three Consecutive Odds</text>
  <text x="60" y="108" fill="#93c5fd" font-size="22" font-family="Arial, sans-serif">Count consecutive odd values; reset to 0 when even appears.</text>

  <g transform="translate(60,150)">
    <rect x="0" y="0" width="130" height="90" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="145" y="0" width="130" height="90" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="290" y="0" width="130" height="90" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="435" y="0" width="130" height="90" rx="12" fill="#1e293b" stroke="#334155"/>
    <rect x="580" y="0" width="130" height="90" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="3"/>
    <rect x="725" y="0" width="130" height="90" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="3"/>
    <rect x="870" y="0" width="130" height="90" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="3"/>

    <text x="52" y="55" fill="#f8fafc" font-size="34" font-family="monospace">2</text>
    <text x="197" y="55" fill="#f8fafc" font-size="34" font-family="monospace">6</text>
    <text x="342" y="55" fill="#f8fafc" font-size="34" font-family="monospace">4</text>
    <text x="487" y="55" fill="#f8fafc" font-size="34" font-family="monospace">1</text>
    <text x="632" y="55" fill="#dcfce7" font-size="34" font-family="monospace">3</text>
    <text x="777" y="55" fill="#dcfce7" font-size="34" font-family="monospace">5</text>
    <text x="922" y="55" fill="#dcfce7" font-size="34" font-family="monospace">7</text>

    <text x="445" y="130" fill="#86efac" font-size="22" font-family="Arial, sans-serif">odd streak = 1 → 2 → 3 ⇒ return true</text>
  </g>
</svg>
