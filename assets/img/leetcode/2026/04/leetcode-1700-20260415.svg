<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1700 queue and counting strategy diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="78" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700">LeetCode 1700 · Number of Students Unable to Eat Lunch</text>
  <text x="50" y="118" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="24">Queue Rotation View  →  Preference Counting Optimization</text>

  <rect x="50" y="160" width="520" height="390" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="76" y="200" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="700">Queue Simulation</text>
  <circle cx="120" cy="250" r="26" fill="#34d399"/><text x="112" y="257" fill="#052e16" font-size="20" font-family="Inter,Arial,sans-serif">0</text>
  <circle cx="190" cy="250" r="26" fill="#fbbf24"/><text x="182" y="257" fill="#422006" font-size="20" font-family="Inter,Arial,sans-serif">1</text>
  <circle cx="260" cy="250" r="26" fill="#34d399"/><text x="252" y="257" fill="#052e16" font-size="20" font-family="Inter,Arial,sans-serif">0</text>
  <circle cx="330" cy="250" r="26" fill="#fbbf24"/><text x="322" y="257" fill="#422006" font-size="20" font-family="Inter,Arial,sans-serif">1</text>
  <path d="M360 250 C430 250, 430 330, 130 330" fill="none" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="386" y="312" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="18">dislike top → move to end</text>

  <rect x="80" y="370" width="220" height="130" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="100" y="404" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="20">Top sandwiches</text>
  <text x="100" y="438" fill="#fbbf24" font-family="Inter,Arial,sans-serif" font-size="30">1  0  0  1</text>
  <text x="100" y="472" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="16">order is fixed</text>

  <rect x="640" y="160" width="510" height="390" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="668" y="200" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="700">Counting Strategy</text>
  <rect x="680" y="240" width="430" height="90" rx="12" fill="#0f172a" stroke="#4b5563"/>
  <text x="705" y="275" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="24">count[0] = 2,  count[1] = 2</text>
  <text x="705" y="308" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="18">consume by sandwich stack top</text>

  <rect x="680" y="355" width="430" height="150" rx="12" fill="#0f172a" stroke="#4b5563"/>
  <text x="705" y="390" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="22">If count[top] == 0 → stop immediately</text>
  <text x="705" y="428" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="22">answer = count[0] + count[1]</text>
  <text x="705" y="466" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="20">Time O(n), Space O(1)</text>

  <text x="50" y="595" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="20">Author: Tom🦞</text>
</svg>
