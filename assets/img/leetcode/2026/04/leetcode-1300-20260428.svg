<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1300 threshold mutation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .lbl{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .txt{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .num{font:700 20px 'Consolas',monospace;fill:#f8fafc}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="80" class="title">LeetCode 1300 - Sum of Mutated Array Closest to Target</text>
  <text x="60" y="118" class="sub">Sort + Prefix Sum + Boundary Value Check</text>

  <rect x="60" y="170" width="520" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="215" class="lbl">Example: arr = [2, 3, 5], target = 10</text>

  <text x="90" y="265" class="txt">Choose value = 5:</text>
  <text x="290" y="265" class="num">[2, 3, 5]  sum = 10</text>

  <text x="90" y="315" class="txt">Choose value = 4:</text>
  <text x="290" y="315" class="num">[2, 3, 4]  sum = 9</text>

  <text x="90" y="365" class="txt">Choose value = 3:</text>
  <text x="290" y="365" class="num">[2, 3, 3]  sum = 8</text>

  <text x="90" y="435" class="lbl">Closest to target 10  ->  answer = 5</text>

  <rect x="640" y="170" width="500" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="670" y="220" class="lbl">Prefix + Capped Suffix</text>
  <text x="670" y="270" class="num">sum(value) = prefix(i) + value * (n - i)</text>
  <text x="670" y="325" class="txt">Check boundary where value just reaches arr[i].</text>
  <text x="670" y="365" class="txt">Compare value and value + 1.</text>
  <text x="670" y="405" class="txt">Tie -> choose smaller value.</text>

  <circle cx="1010" cy="470" r="54" fill="#2563eb"/>
  <text x="980" y="478" class="num">O(n log n)</text>
</svg>
