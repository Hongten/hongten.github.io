<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 530 inorder adjacent difference diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="80" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 530 · Minimum Absolute Difference in BST</text>
  <text x="50" y="125" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Inorder of BST is sorted → only adjacent differences matter</text>

  <rect x="60" y="170" width="1080" height="400" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="120" y="250" fill="#f9fafb" font-size="28" font-family="monospace">BST nodes:        4, 2, 6, 1, 3</text>
  <text x="120" y="305" fill="#f9fafb" font-size="28" font-family="monospace">Inorder values:   [1, 2, 3, 4, 6]</text>
  <text x="120" y="360" fill="#86efac" font-size="28" font-family="monospace">Adjacent diffs:   [1, 1, 1, 2]</text>
  <text x="120" y="415" fill="#fca5a5" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = min adjacent diff = 1</text>

  <text x="120" y="500" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">DFS inorder: left → node → right</text>
  <text x="120" y="538" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Track prev value and update ans = min(ans, cur - prev)</text>
</svg>
