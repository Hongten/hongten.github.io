<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1027 longest arithmetic subsequence DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="82" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1027 - Longest Arithmetic Subsequence</text>
  <text x="56" y="124" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">State: dp[i][d] = best length ending at index i with difference d</text>

  <rect x="56" y="168" width="1088" height="392" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="96" y="220" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Example nums: [3, 6, 9, 12, 15]</text>

  <circle cx="180" cy="320" r="34" fill="#0b1220" stroke="#475569"/>
  <text x="170" y="328" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">3</text>

  <circle cx="360" cy="320" r="34" fill="#0b1220" stroke="#475569"/>
  <text x="350" y="328" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">6</text>

  <circle cx="540" cy="320" r="34" fill="#0b1220" stroke="#475569"/>
  <text x="530" y="328" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">9</text>

  <circle cx="720" cy="320" r="34" fill="#0b1220" stroke="#475569"/>
  <text x="705" y="328" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">12</text>

  <circle cx="900" cy="320" r="34" fill="#0b1220" stroke="#475569"/>
  <text x="885" y="328" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">15</text>

  <line x1="214" y1="320" x2="326" y2="320" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="394" y1="320" x2="506" y2="320" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="574" y1="320" x2="686" y2="320" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="754" y1="320" x2="866" y2="320" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="255" y="300" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">d = 3</text>
  <text x="435" y="300" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">d = 3</text>
  <text x="615" y="300" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">d = 3</text>
  <text x="795" y="300" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">d = 3</text>

  <text x="96" y="420" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Transition: dp[i][d] = max(dp[i][d], dp[j][d] + 1), where j &lt; i and d = nums[i] - nums[j]</text>
  <text x="96" y="462" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Answer = max over all dp[i][d]</text>
  <text x="96" y="522" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">Time O(n²), Space O(n²)</text>

  <text x="956" y="586" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
