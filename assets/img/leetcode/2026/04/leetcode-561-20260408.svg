<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 561 array partition sorted pairing diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 561: Array Partition</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Sort and pair adjacent numbers, sum minima at even indices</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="245" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Input: [1,4,3,2]</text>
  <text x="90" y="285" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Sorted: [1,2,3,4]</text>

  <rect x="90" y="320" width="140" height="70" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="240" y="320" width="140" height="70" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="450" y="320" width="140" height="70" rx="10" fill="#111827" stroke="#334155"/>
  <rect x="600" y="320" width="140" height="70" rx="10" fill="#111827" stroke="#334155"/>

  <text x="145" y="365" text-anchor="middle" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">1</text>
  <text x="295" y="365" text-anchor="middle" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">2</text>
  <text x="505" y="365" text-anchor="middle" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">3</text>
  <text x="655" y="365" text-anchor="middle" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">4</text>

  <text x="165" y="425" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">pair 1 → min = 1</text>
  <text x="525" y="425" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">pair 2 → min = 3</text>
  <text x="90" y="475" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = 1 + 3 = 4</text>

  <text x="90" y="525" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Take indices 0,2,4,... after sorting</text>
  <text x="90" y="565" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
