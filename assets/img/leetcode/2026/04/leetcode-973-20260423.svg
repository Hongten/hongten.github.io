<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 973 K Closest Points to Origin diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 973: K Closest Points to Origin</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Keep a max-heap of size k by squared distance</text>

  <rect x="80" y="180" width="620" height="380" rx="16" fill="#0f172a" stroke="#334155"/>
  <line x1="390" y1="220" x2="390" y2="530" stroke="#475569" stroke-width="2"/>
  <line x1="140" y1="375" x2="640" y2="375" stroke="#475569" stroke-width="2"/>
  <circle cx="390" cy="375" r="7" fill="#fbbf24"/>
  <text x="402" y="370" fill="#fbbf24" font-size="20" font-family="Inter,Arial,sans-serif">origin (0,0)</text>

  <circle cx="470" cy="315" r="9" fill="#22d3ee"/>
  <circle cx="520" cy="430" r="9" fill="#22d3ee"/>
  <circle cx="300" cy="300" r="9" fill="#22d3ee"/>
  <circle cx="245" cy="460" r="9" fill="#22d3ee"/>
  <circle cx="590" cy="250" r="9" fill="#f87171"/>
  <circle cx="610" cy="490" r="9" fill="#f87171"/>

  <circle cx="390" cy="375" r="150" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="86" y="580" fill="#22c55e" font-size="24" font-family="Inter,Arial,sans-serif">Inside dashed circle = candidates kept after heap pruning</text>

  <rect x="760" y="210" width="360" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="790" y="260" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Heap Invariant</text>
  <text x="790" y="310" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">size ≤ k</text>
  <text x="790" y="350" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">top = farthest of kept points</text>
  <text x="790" y="390" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">new closer point ⇒ pop top</text>
  <text x="790" y="430" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n log k), Space O(k)</text>
  <text x="790" y="490" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
