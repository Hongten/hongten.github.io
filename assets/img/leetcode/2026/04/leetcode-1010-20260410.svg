<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1010 remainder complement pairing diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1010 · Remainder Complement Pairing</text>
  <text x="56" y="138" fill="#94a3b8" font-size="28" font-family="Inter,Arial,sans-serif">(a + b) % 60 = 0  ⇒  remainder(b) = (60 - remainder(a)) % 60</text>

  <rect x="60" y="190" width="1080" height="360" rx="20" fill="#111827" stroke="#334155"/>

  <rect x="100" y="240" width="260" height="96" rx="12" fill="#1d4ed8"/>
  <text x="130" y="298" fill="#eff6ff" font-size="34" font-family="JetBrains Mono,Consolas,monospace">r = 20</text>

  <text x="400" y="298" fill="#93c5fd" font-size="38" font-family="Inter,Arial,sans-serif">needs</text>
  <path d="M520 285 L690 285" stroke="#60a5fa" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="720" y="240" width="320" height="96" rx="12" fill="#059669"/>
  <text x="752" y="298" fill="#ecfdf5" font-size="32" font-family="JetBrains Mono,Consolas,monospace">need = 40</text>

  <text x="100" y="390" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">Count array cnt[0..59] stores seen remainders.</text>
  <text x="100" y="432" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">For each song: ans += cnt[need], then cnt[r]++.</text>
  <text x="100" y="486" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 + full code tabs</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
</svg>
