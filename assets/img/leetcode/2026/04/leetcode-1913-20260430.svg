<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="100" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 1913</text>
  <text x="60" y="155" fill="#93c5fd" font-size="34" font-family="Arial">Maximum Product Difference Between Two Pairs</text>
  <rect x="60" y="210" width="1080" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="270" fill="#cbd5e1" font-size="28" font-family="monospace">nums = [5, 6, 2, 7, 4]</text>
  <text x="90" y="330" fill="#22c55e" font-size="30" font-family="monospace">max pair: 7 * 6 = 42</text>
  <text x="90" y="380" fill="#f97316" font-size="30" font-family="monospace">min pair: 2 * 4 = 8</text>
  <text x="90" y="440" fill="#facc15" font-size="34" font-family="monospace">answer = 42 - 8 = 34</text>
</svg>