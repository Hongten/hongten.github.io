<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 304 2D Prefix Sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .m{font-family:'JetBrains Mono','Consolas',monospace;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" class="t" font-size="42" font-weight="700">LeetCode 304 · Range Sum Query 2D - Immutable</text>
  <text x="60" y="125" class="t" font-size="26">2D Prefix Sum + Inclusion-Exclusion</text>

  <g transform="translate(80,180)">
    <rect x="0" y="0" width="420" height="320" rx="12" fill="#111827" stroke="#334155"/>
    <text x="20" y="34" class="t" font-size="22">matrix</text>
    <g class="m" font-size="24" text-anchor="middle">
      <rect x="30" y="60" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="70" y="98">3</text>
      <rect x="110" y="60" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="150" y="98">0</text>
      <rect x="190" y="60" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="230" y="98">1</text>
      <rect x="270" y="60" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="310" y="98">4</text>

      <rect x="30" y="120" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="70" y="158">5</text>
      <rect x="110" y="120" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="150" y="158">6</text>
      <rect x="190" y="120" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="230" y="158">3</text>
      <rect x="270" y="120" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="310" y="158">2</text>

      <rect x="30" y="180" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="70" y="218">1</text>
      <rect x="110" y="180" width="80" height="60" fill="#f59e0b" opacity="0.35" stroke="#f59e0b"/><text x="150" y="218">2</text>
      <rect x="190" y="180" width="80" height="60" fill="#f59e0b" opacity="0.35" stroke="#f59e0b"/><text x="230" y="218">0</text>
      <rect x="270" y="180" width="80" height="60" fill="#f59e0b" opacity="0.35" stroke="#f59e0b"/><text x="310" y="218">1</text>

      <rect x="30" y="240" width="80" height="60" fill="#1f2937" stroke="#475569"/><text x="70" y="278">4</text>
      <rect x="110" y="240" width="80" height="60" fill="#f59e0b" opacity="0.35" stroke="#f59e0b"/><text x="150" y="278">1</text>
      <rect x="190" y="240" width="80" height="60" fill="#f59e0b" opacity="0.35" stroke="#f59e0b"/><text x="230" y="278">0</text>
      <rect x="270" y="240" width="80" height="60" fill="#f59e0b" opacity="0.35" stroke="#f59e0b"/><text x="310" y="278">1</text>
    </g>
    <text x="30" y="315" class="t" font-size="18">Highlighted query region: (2,1) to (3,3)</text>
  </g>

  <g transform="translate(560,190)">
    <rect x="0" y="0" width="560" height="280" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="24" y="46" class="t" font-size="24">sumRegion(r1,c1,r2,c2)</text>
    <text x="24" y="92" class="m" font-size="28">= pre[r2+1][c2+1]</text>
    <text x="24" y="132" class="m" font-size="28">- pre[r1][c2+1] - pre[r2+1][c1]</text>
    <text x="24" y="172" class="m" font-size="28">+ pre[r1][c1]</text>
    <text x="24" y="230" class="t" font-size="21">Build once in O(mn), answer each query in O(1)</text>
  </g>
</svg>
