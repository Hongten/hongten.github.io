<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 819 Most Common Word Diagram</title>
  <desc id="desc">Pipeline: normalize paragraph, remove punctuation, filter banned words, count frequencies, pick max.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 819 · Most Common Word</text>
  <rect x="60" y="130" width="250" height="90" rx="12" fill="#1d4ed8"/>
  <text x="185" y="183" text-anchor="middle" fill="#fff" font-size="24" font-family="Arial">Paragraph</text>
  <rect x="360" y="130" width="250" height="90" rx="12" fill="#2563eb"/>
  <text x="485" y="183" text-anchor="middle" fill="#fff" font-size="24" font-family="Arial">Normalize</text>
  <rect x="660" y="130" width="250" height="90" rx="12" fill="#3b82f6"/>
  <text x="785" y="183" text-anchor="middle" fill="#fff" font-size="24" font-family="Arial">Filter Banned</text>
  <rect x="960" y="130" width="180" height="90" rx="12" fill="#60a5fa"/>
  <text x="1050" y="183" text-anchor="middle" fill="#0b1020" font-size="24" font-family="Arial" font-weight="700">Max Freq</text>
  <path d="M310 175H360 M610 175H660 M910 175H960" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/></marker></defs>
  <text x="60" y="320" fill="#cbd5e1" font-size="28" font-family="Courier New">"Bob hit a ball, the hit BALL flew far after it was hit."</text>
  <text x="60" y="380" fill="#93c5fd" font-size="26" font-family="Courier New">normalized: "bob hit a ball  the hit ball flew far after it was hit "</text>
  <text x="60" y="440" fill="#86efac" font-size="26" font-family="Courier New">banned = {"hit"}  → count(bob:1, ball:2, the:1, flew:1, ...)</text>
  <text x="60" y="500" fill="#facc15" font-size="32" font-family="Arial" font-weight="700">answer = "ball"</text>
</svg>
