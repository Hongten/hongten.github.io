<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 978 Longest Turbulent Subarray diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 978: Longest Turbulent Subarray</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Alternating comparison signs: &gt; &lt; &gt; &lt; ... or &lt; &gt; &lt; &gt; ...</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="95" y="260" fill="#cbd5e1" font-size="30" font-family="JetBrains Mono,Consolas,monospace">arr = [9, 4, 2, 10, 7, 8, 8, 1, 9]</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="36" font-weight="700">
    <text x="100" y="350" fill="#f8fafc">9</text>
    <text x="210" y="350" fill="#f8fafc">4</text>
    <text x="320" y="350" fill="#f8fafc">2</text>
    <text x="430" y="350" fill="#f8fafc">10</text>
    <text x="560" y="350" fill="#f8fafc">7</text>
    <text x="670" y="350" fill="#f8fafc">8</text>
    <text x="780" y="350" fill="#f8fafc">8</text>
    <text x="890" y="350" fill="#f8fafc">1</text>
    <text x="1000" y="350" fill="#f8fafc">9</text>
  </g>

  <g stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)" fill="none">
    <line x1="125" y1="380" x2="225" y2="380"/>
    <line x1="235" y1="380" x2="335" y2="380"/>
    <line x1="345" y1="380" x2="475" y2="380"/>
    <line x1="485" y1="380" x2="585" y2="380"/>
    <line x1="595" y1="380" x2="705" y2="380"/>
  </g>

  <g font-family="Inter,Arial,sans-serif" font-size="26" font-weight="700">
    <text x="160" y="430" fill="#f87171">&gt;</text>
    <text x="270" y="430" fill="#f87171">&gt;</text>
    <text x="395" y="430" fill="#34d399">&lt;</text>
    <text x="525" y="430" fill="#f87171">&gt;</text>
    <text x="635" y="430" fill="#34d399">&lt;</text>
  </g>

  <text x="100" y="500" fill="#a7f3d0" font-size="30" font-family="Inter,Arial,sans-serif">Longest turbulent length = 5</text>
  <text x="100" y="535" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">State DP: up = down + 1, down = up + 1, reset on equality</text>
  <text x="980" y="590" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
