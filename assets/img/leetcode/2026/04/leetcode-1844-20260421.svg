<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1844 shift example">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="110" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1844</text>
  <text x="60" y="160" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Replace All Digits with Characters</text>

  <rect x="60" y="220" width="1080" height="320" rx="18" fill="#111827" stroke="#334155"/>
  <text x="90" y="280" fill="#cbd5e1" font-size="30" font-family="Consolas, monospace">Input:  a1c1e1</text>
  <text x="90" y="340" fill="#f8fafc" font-size="30" font-family="Consolas, monospace">odd index 1: 'a' + 1 = 'b'</text>
  <text x="90" y="390" fill="#f8fafc" font-size="30" font-family="Consolas, monospace">odd index 3: 'c' + 1 = 'd'</text>
  <text x="90" y="440" fill="#f8fafc" font-size="30" font-family="Consolas, monospace">odd index 5: 'e' + 1 = 'f'</text>
  <text x="90" y="500" fill="#86efac" font-size="34" font-family="Consolas, monospace" font-weight="700">Output: abcdef</text>
</svg>
