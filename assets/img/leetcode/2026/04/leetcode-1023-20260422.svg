<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628" role="img" aria-label="LeetCode 1023 camelcase matching two-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e2e8f0" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 1023 - Camelcase Matching</text>
  <text x="60" y="132" fill="#94a3b8" font-size="28" font-family="Arial, Helvetica, sans-serif">Two pointers on query and pattern</text>

  <rect x="60" y="190" width="1080" height="160" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="240" fill="#cbd5e1" font-size="30" font-family="monospace">query:   FooBarTest</text>
  <text x="90" y="298" fill="#f8fafc" font-size="30" font-family="monospace">pattern: F B T</text>

  <circle cx="215" cy="224" r="24" fill="#22c55e"/>
  <text x="207" y="233" fill="#052e16" font-size="24" font-family="monospace" font-weight="700">i</text>
  <circle cx="252" cy="280" r="24" fill="#38bdf8"/>
  <text x="243" y="289" fill="#082f49" font-size="24" font-family="monospace" font-weight="700">j</text>

  <path d="M300 244 L360 244" stroke="#22c55e" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M300 300 L360 300" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e2e8f0"/>
    </marker>
  </defs>

  <rect x="60" y="390" width="1080" height="170" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="438" fill="#e2e8f0" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Rules</text>
  <text x="90" y="482" fill="#cbd5e1" font-size="26" font-family="Arial, Helvetica, sans-serif">1) Match character: move both pointers.</text>
  <text x="90" y="518" fill="#cbd5e1" font-size="26" font-family="Arial, Helvetica, sans-serif">2) Unmatched lowercase in query: skip.</text>
  <text x="90" y="554" fill="#fca5a5" font-size="26" font-family="Arial, Helvetica, sans-serif">3) Unmatched UPPERCASE in query: fail immediately.</text>
</svg>
