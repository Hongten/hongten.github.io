<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 540 parity binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 540: Single Element in a Sorted Array</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter, Arial, sans-serif">Parity Binary Search on Pair Start Index</text>

  <g transform="translate(60,200)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#334155"/>
    <rect x="130" y="0" width="120" height="80" rx="10" fill="#334155"/>
    <rect x="260" y="0" width="120" height="80" rx="10" fill="#334155"/>
    <rect x="390" y="0" width="120" height="80" rx="10" fill="#334155"/>
    <rect x="520" y="0" width="120" height="80" rx="10" fill="#f59e0b"/>
    <rect x="650" y="0" width="120" height="80" rx="10" fill="#334155"/>
    <rect x="780" y="0" width="120" height="80" rx="10" fill="#334155"/>
    <rect x="910" y="0" width="120" height="80" rx="10" fill="#334155"/>

    <text x="50" y="48" fill="#e2e8f0" font-size="28" font-family="monospace">1</text>
    <text x="180" y="48" fill="#e2e8f0" font-size="28" font-family="monospace">1</text>
    <text x="310" y="48" fill="#e2e8f0" font-size="28" font-family="monospace">2</text>
    <text x="440" y="48" fill="#e2e8f0" font-size="28" font-family="monospace">2</text>
    <text x="570" y="48" fill="#111827" font-size="28" font-family="monospace">3</text>
    <text x="700" y="48" fill="#e2e8f0" font-size="28" font-family="monospace">4</text>
    <text x="830" y="48" fill="#e2e8f0" font-size="28" font-family="monospace">4</text>
    <text x="960" y="48" fill="#e2e8f0" font-size="28" font-family="monospace">5</text>

    <text x="15" y="115" fill="#94a3b8" font-size="20" font-family="monospace">0</text>
    <text x="145" y="115" fill="#94a3b8" font-size="20" font-family="monospace">1</text>
    <text x="275" y="115" fill="#94a3b8" font-size="20" font-family="monospace">2</text>
    <text x="405" y="115" fill="#94a3b8" font-size="20" font-family="monospace">3</text>
    <text x="535" y="115" fill="#fcd34d" font-size="20" font-family="monospace">4</text>
    <text x="665" y="115" fill="#94a3b8" font-size="20" font-family="monospace">5</text>
    <text x="795" y="115" fill="#94a3b8" font-size="20" font-family="monospace">6</text>
    <text x="925" y="115" fill="#94a3b8" font-size="20" font-family="monospace">7</text>

    <path d="M320 150 C 430 210, 530 210, 640 150" stroke="#22d3ee" stroke-width="5" fill="none"/>
    <text x="350" y="245" fill="#22d3ee" font-size="22" font-family="Inter, Arial, sans-serif">Pair alignment breaks after single element</text>
  </g>

  <text x="60" y="585" fill="#cbd5e1" font-size="24" font-family="Inter, Arial, sans-serif">Use even mid: if nums[mid] == nums[mid+1], move right; else move left.</text>
