<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2395 adjacent pair sum duplicate detection">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#eaf2ff" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 2395 · Find Subarrays With Equal Sum</text>
  <text x="60" y="135" fill="#a7c0ff" font-size="26" font-family="Inter, Arial, sans-serif">Scan adjacent pair sums and detect duplicates with a hash set</text>

  <rect x="70" y="180" width="1060" height="360" rx="20" fill="#0f172a" stroke="#334155"/>

  <text x="110" y="240" fill="#f8fafc" font-size="28" font-family="JetBrains Mono, Consolas, monospace">nums = [4, 2, 4]</text>
  <text x="110" y="290" fill="#93c5fd" font-size="24" font-family="JetBrains Mono, Consolas, monospace">i=0: (4,2) → sum = 6 → seen = {6}</text>
  <text x="110" y="330" fill="#93c5fd" font-size="24" font-family="JetBrains Mono, Consolas, monospace">i=1: (2,4) → sum = 6 → already in seen ✅</text>

  <rect x="100" y="380" width="500" height="120" rx="14" fill="#1e293b" stroke="#475569"/>
  <text x="130" y="430" fill="#86efac" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">Duplicate sum found → return true</text>
  <text x="130" y="468" fill="#cbd5e1" font-size="20" font-family="Inter, Arial, sans-serif">Time O(n), Space O(n)</text>

  <text x="860" y="505" fill="#fda4af" font-size="24" font-family="Inter, Arial, sans-serif">Author: Tom🦞</text>
</svg>
