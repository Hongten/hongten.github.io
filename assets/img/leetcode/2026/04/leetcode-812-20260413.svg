<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 812 largest triangle area shoelace formula diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 812: Largest Triangle Area</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Enumerate point triples + shoelace formula</text>

  <rect x="56" y="170" width="1088" height="390" rx="16" fill="#1f2937" stroke="#334155"/>

  <line x1="170" y1="500" x2="170" y2="230" stroke="#64748b" stroke-width="2"/>
  <line x1="170" y1="500" x2="560" y2="500" stroke="#64748b" stroke-width="2"/>

  <polygon points="220,470 360,280 520,430" fill="#22c55e33" stroke="#22c55e" stroke-width="4"/>
  <circle cx="220" cy="470" r="7" fill="#f8fafc"/>
  <circle cx="360" cy="280" r="7" fill="#f8fafc"/>
  <circle cx="520" cy="430" r="7" fill="#f8fafc"/>
  <text x="198" y="495" fill="#f8fafc" font-size="22" font-family="Inter,Arial,sans-serif">A(x1,y1)</text>
  <text x="336" y="264" fill="#f8fafc" font-size="22" font-family="Inter,Arial,sans-serif">B(x2,y2)</text>
  <text x="528" y="430" fill="#f8fafc" font-size="22" font-family="Inter,Arial,sans-serif">C(x3,y3)</text>

  <text x="640" y="290" fill="#e2e8f0" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Area formula</text>
  <text x="640" y="338" fill="#cbd5e1" font-size="25" font-family="Inter,Arial,sans-serif">|x1(y2-y3)+x2(y3-y1)+x3(y1-y2)| / 2</text>
  <text x="640" y="400" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Try all i &lt; j &lt; k, keep max area</text>
  <text x="640" y="448" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Time: O(n^3), Space: O(1)</text>
  <text x="640" y="502" fill="#f59e0b" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
