<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 763 Partition Labels diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 763 - Partition Labels</text>
  <text x="60" y="130" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Last occurrence decides each partition boundary</text>

  <rect x="60" y="190" width="1080" height="120" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="80" y="235" fill="#e5e7eb" font-size="28" font-family="Courier New, monospace">s = ababcbacadefegdehijhklij</text>
  <line x1="80" y1="260" x2="1110" y2="260" stroke="#334155"/>
  <text x="80" y="290" fill="#a5b4fc" font-size="20" font-family="Arial, sans-serif">Scan i from left to right, keep end = max(last[s[i]])</text>

  <rect x="60" y="350" width="420" height="180" rx="12" fill="#14532d" stroke="#4ade80"/>
  <text x="80" y="390" fill="#dcfce7" font-size="24" font-family="Arial, sans-serif">Partition 1</text>
  <text x="80" y="430" fill="#dcfce7" font-size="28" font-family="Courier New, monospace">ababcbaca</text>
  <text x="80" y="470" fill="#bbf7d0" font-size="22" font-family="Arial, sans-serif">length = 9</text>

  <rect x="510" y="350" width="300" height="180" rx="12" fill="#78350f" stroke="#fbbf24"/>
  <text x="530" y="390" fill="#fef3c7" font-size="24" font-family="Arial, sans-serif">Partition 2</text>
  <text x="530" y="430" fill="#fef3c7" font-size="28" font-family="Courier New, monospace">defegde</text>
  <text x="530" y="470" fill="#fde68a" font-size="22" font-family="Arial, sans-serif">length = 7</text>

  <rect x="840" y="350" width="300" height="180" rx="12" fill="#4c1d95" stroke="#a78bfa"/>
  <text x="860" y="390" fill="#ede9fe" font-size="24" font-family="Arial, sans-serif">Partition 3</text>
  <text x="860" y="430" fill="#ede9fe" font-size="28" font-family="Courier New, monospace">hijhklij</text>
  <text x="860" y="470" fill="#ddd6fe" font-size="22" font-family="Arial, sans-serif">length = 8</text>
</svg>
