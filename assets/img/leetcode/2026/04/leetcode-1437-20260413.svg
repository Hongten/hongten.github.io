<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1437 gap check diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1437 · Check If All 1's Are at Least Length K Places Away</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Track previous 1 index and validate zero-gap >= k</text>

  <rect x="60" y="200" width="1080" height="300" rx="16" fill="#111827" stroke="#334155"/>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30" fill="#e5e7eb">
    <text x="100" y="290">Index:  0  1  2  3  4  5  6  7</text>
    <text x="100" y="350">nums :  1  0  0  0  1  0  0  1</text>
  </g>

  <g stroke="#22d3ee" stroke-width="4" fill="none">
    <line x1="220" y1="380" x2="700" y2="380"/>
    <line x1="700" y1="380" x2="1040" y2="380"/>
  </g>
  <g fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">
    <text x="360" y="415">gap = 4 - 0 - 1 = 3 (must be ≥ k)</text>
    <text x="810" y="415">gap = 7 - 4 - 1 = 2</text>
  </g>

  <text x="60" y="565" fill="#f9a8d4" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual post with full code tabs</text>
</svg>
