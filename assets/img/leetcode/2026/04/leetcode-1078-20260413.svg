<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1078 bigram occurrence diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="80" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1078 · Occurrences After Bigram</text>
  <text x="50" y="125" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Scan 3-word windows: [first, second, third]</text>

  <rect x="60" y="180" width="320" height="90" rx="14" fill="#1f2937" stroke="#475569"/>
  <rect x="420" y="180" width="320" height="90" rx="14" fill="#1f2937" stroke="#475569"/>
  <rect x="780" y="180" width="320" height="90" rx="14" fill="#166534" stroke="#22c55e"/>
  <text x="220" y="235" text-anchor="middle" fill="#f8fafc" font-size="34" font-family="Inter,Arial,sans-serif">first</text>
  <text x="580" y="235" text-anchor="middle" fill="#f8fafc" font-size="34" font-family="Inter,Arial,sans-serif">second</text>
  <text x="940" y="235" text-anchor="middle" fill="#dcfce7" font-size="34" font-family="Inter,Arial,sans-serif">collect third</text>

  <path d="M220 300 L220 380 L940 380 L940 300" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
  <text x="580" y="430" text-anchor="middle" fill="#cbd5e1" font-size="30" font-family="Inter,Arial,sans-serif">if words[i] == first and words[i+1] == second → add words[i+2]</text>
  <text x="580" y="500" text-anchor="middle" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Time O(n) · Space O(n) tokenization</text>
  <text x="50" y="585" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
