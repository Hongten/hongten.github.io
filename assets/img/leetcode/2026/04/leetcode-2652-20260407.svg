<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2652 Sum Multiples diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial,sans-serif" font-weight="700">LeetCode 2652 · Sum Multiples</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Arial,sans-serif">Add numbers in [1..n] divisible by 3, 5, or 7</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#111827" stroke="#334155"/>

  <text x="100" y="245" fill="#f8fafc" font-size="28" font-family="monospace">n = 20</text>
  <text x="100" y="290" fill="#86efac" font-size="26" font-family="monospace">Multiples: 3, 5, 6, 7, 9, 10, 12, 14, 15, 18, 20</text>
  <text x="100" y="340" fill="#fcd34d" font-size="28" font-family="monospace">Sum = 119</text>

  <text x="100" y="410" fill="#cbd5e1" font-size="24" font-family="monospace">for x = 1..n:</text>
  <text x="100" y="448" fill="#cbd5e1" font-size="24" font-family="monospace">  if (x%3==0 || x%5==0 || x%7==0) ans += x</text>

