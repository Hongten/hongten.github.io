<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1201 inclusion exclusion diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="54" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1201 - Ugly Number III</text>
  <text x="54" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Binary Search + Inclusion-Exclusion</text>

  <rect x="54" y="176" width="1092" height="376" rx="16" fill="#111827" stroke="#334155"/>
  <text x="88" y="242" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,Consolas,monospace">count(x) = x/a + x/b + x/c</text>
  <text x="88" y="288" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,Consolas,monospace">          - x/lcm(a,b) - x/lcm(a,c) - x/lcm(b,c)</text>
  <text x="88" y="334" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">          + x/lcm(a,b,c)</text>

  <text x="88" y="408" fill="#fde68a" font-size="30" font-family="JetBrains Mono,Consolas,monospace">if count(mid) &gt;= n, move left; else move right</text>
  <text x="88" y="458" fill="#c4b5fd" font-size="30" font-family="JetBrains Mono,Consolas,monospace">answer = first x with count(x) &gt;= n</text>

  <text x="900" y="594" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
