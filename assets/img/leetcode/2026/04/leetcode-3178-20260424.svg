<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3178 bouncing path diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3178 - Ball Passing Cycle</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">0 → 1 → 2 → ... → n-1 → n-2 → ... → 1 → 0</text>
  <rect x="60" y="190" width="1080" height="350" rx="18" fill="#1f2937" stroke="#374151"/>
  <g font-family="Inter,Arial,sans-serif" font-size="30" fill="#e5e7eb">
    <circle cx="180" cy="360" r="36" fill="#111827" stroke="#60a5fa"/><text x="170" y="370">0</text>
    <circle cx="360" cy="360" r="36" fill="#111827" stroke="#60a5fa"/><text x="350" y="370">1</text>
    <circle cx="540" cy="360" r="36" fill="#111827" stroke="#60a5fa"/><text x="530" y="370">2</text>
    <circle cx="720" cy="360" r="36" fill="#111827" stroke="#60a5fa"/><text x="706" y="370">...</text>
    <circle cx="900" cy="360" r="36" fill="#111827" stroke="#60a5fa"/><text x="884" y="370">n-1</text>
  </g>
  <path d="M220 300 L320 300" stroke="#86efac" stroke-width="6" marker-end="url(#a)"/>
  <path d="M400 300 L500 300" stroke="#86efac" stroke-width="6" marker-end="url(#a)"/>
  <path d="M860 420 L760 420" stroke="#fca5a5" stroke-width="6" marker-end="url(#a2)"/>
  <path d="M680 420 L580 420" stroke="#fca5a5" stroke-width="6" marker-end="url(#a2)"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#86efac"/>
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#fca5a5"/>
    </marker>
  </defs>
  <text x="90" y="500" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Period = 2 × (n - 1)</text>
  <text x="90" y="535" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">Answer: t = k mod period, t &lt; n ? t : period - t</text>
  <text x="890" y="585" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
