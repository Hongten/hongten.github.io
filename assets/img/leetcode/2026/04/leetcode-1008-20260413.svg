<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1008 preorder bounded DFS BST diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#e5e7eb}
      .m{font-family:Inter,Arial,sans-serif;fill:#93c5fd}
      .s{font-family:Inter,Arial,sans-serif;fill:#9ca3af}
      .n{fill:#1f2937;stroke:#60a5fa;stroke-width:2}
      .e{stroke:#6b7280;stroke-width:3}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="78" class="t" font-size="40" font-weight="700">LeetCode 1008 · Construct BST from Preorder</text>
  <text x="52" y="118" class="s" font-size="24">Bounded DFS: build(bound), consume preorder once</text>

  <rect x="52" y="150" width="1096" height="70" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="75" y="194" class="m" font-size="28">preorder = [8, 5, 1, 7, 10, 12]  →  root=8, left(bound=8), right(bound=+∞)</text>

  <line x1="600" y1="290" x2="430" y2="380" class="e"/>
  <line x1="600" y1="290" x2="770" y2="380" class="e"/>
  <line x1="430" y1="420" x2="330" y2="500" class="e"/>
  <line x1="430" y1="420" x2="520" y2="500" class="e"/>
  <line x1="770" y1="420" x2="860" y2="500" class="e"/>

  <circle cx="600" cy="270" r="36" class="n"/><text x="589" y="278" class="t" font-size="28">8</text>
  <circle cx="430" cy="400" r="36" class="n"/><text x="419" y="408" class="t" font-size="28">5</text>
  <circle cx="770" cy="400" r="36" class="n"/><text x="752" y="408" class="t" font-size="28">10</text>
  <circle cx="330" cy="520" r="36" class="n"/><text x="321" y="528" class="t" font-size="28">1</text>
  <circle cx="520" cy="520" r="36" class="n"/><text x="511" y="528" class="t" font-size="28">7</text>
  <circle cx="860" cy="520" r="36" class="n"/><text x="842" y="528" class="t" font-size="28">12</text>

  <text x="52" y="590" class="s" font-size="23">Rule: if preorder[i] &gt; bound, stop this subtree; otherwise create node and recurse.</text>
</svg>
