<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 696 run-length pair minimum diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .note{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .small{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 696 - Count Binary Substrings</text>
  <text x="60" y="135" class="sub">Adjacent run contribution = min(previous run, current run)</text>

  <rect x="60" y="190" width="140" height="90" rx="14" fill="#93c5fd"/>
  <rect x="210" y="190" width="140" height="90" rx="14" fill="#93c5fd"/>
  <rect x="360" y="190" width="210" height="90" rx="14" fill="#60a5fa"/>
  <rect x="580" y="190" width="210" height="90" rx="14" fill="#fca5a5"/>
  <rect x="800" y="190" width="140" height="90" rx="14" fill="#f87171"/>
  <rect x="950" y="190" width="190" height="90" rx="14" fill="#ef4444"/>

  <text x="125" y="245" text-anchor="middle" class="txt">0</text>
  <text x="275" y="245" text-anchor="middle" class="txt">0</text>
  <text x="465" y="245" text-anchor="middle" class="txt">0 0 0</text>
  <text x="685" y="245" text-anchor="middle" class="txt">1 1 1</text>
  <text x="870" y="245" text-anchor="middle" class="txt">1 1</text>
  <text x="1045" y="245" text-anchor="middle" class="txt">0 0 0 0</text>

  <text x="60" y="340" class="note">Groups: [00000], [11111], [0000]</text>
  <text x="60" y="385" class="note">Answer = min(5,5) + min(5,4) = 5 + 4 = 9</text>

  <line x1="220" y1="440" x2="980" y2="440" stroke="#38bdf8" stroke-width="4"/>
  <circle cx="400" cy="440" r="10" fill="#38bdf8"/>
  <circle cx="760" cy="440" r="10" fill="#38bdf8"/>
  <text x="60" y="500" class="small">One pass: track prevRun and currRun, add min(prevRun, currRun) at boundaries.</text>
  <text x="60" y="535" class="small">EN first, 中文后置, full multi-language tabs in both sections.</text>
</svg>
