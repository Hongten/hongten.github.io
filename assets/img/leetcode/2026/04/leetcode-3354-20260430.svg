<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3354 - Prefix Balance Counting</text><rect x="60" y="140" width="1080" height="420" rx="16" fill="#111827" stroke="#334155"/><text x="100" y="210" fill="#93c5fd" font-size="28" font-family="Arial">nums: [2,0,2,0,1,1]</text><text x="100" y="265" fill="#f8fafc" font-size="24" font-family="Arial">at zero index i, compare left sum vs right sum</text><text x="100" y="320" fill="#a7f3d0" font-size="24" font-family="Arial">left == right  => +2 valid directions</text><text x="100" y="370" fill="#fde68a" font-size="24" font-family="Arial">|left-right|=1 => +1 valid direction</text><text x="100" y="420" fill="#fca5a5" font-size="24" font-family="Arial">otherwise => +0</text><text x="100" y="500" fill="#cbd5e1" font-size="22" font-family="Arial">One pass: maintain left prefix, right = total - left</text></svg>