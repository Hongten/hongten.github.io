<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1266 movement diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="52" y="76" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1266 · Minimum Time Visiting All Points</text>
  <text x="52" y="118" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Time between adjacent points = max(|dx|, |dy|)</text>

  <rect x="60" y="160" width="760" height="400" rx="16" fill="#111827" stroke="#374151"/>

  <g stroke="#334155" stroke-width="1">
    <line x1="120" y1="520" x2="760" y2="520"/>
    <line x1="120" y1="520" x2="120" y2="200"/>
    <line x1="180" y1="220" x2="180" y2="520"/>
    <line x1="240" y1="220" x2="240" y2="520"/>
    <line x1="300" y1="220" x2="300" y2="520"/>
    <line x1="360" y1="220" x2="360" y2="520"/>
    <line x1="420" y1="220" x2="420" y2="520"/>
    <line x1="480" y1="220" x2="480" y2="520"/>
    <line x1="540" y1="220" x2="540" y2="520"/>
    <line x1="600" y1="220" x2="600" y2="520"/>
    <line x1="660" y1="220" x2="660" y2="520"/>
    <line x1="720" y1="220" x2="720" y2="520"/>
    <line x1="120" y1="460" x2="760" y2="460"/>
    <line x1="120" y1="400" x2="760" y2="400"/>
    <line x1="120" y1="340" x2="760" y2="340"/>
    <line x1="120" y1="280" x2="760" y2="280"/>
    <line x1="120" y1="220" x2="760" y2="220"/>
  </g>

  <g fill="#f8fafc" font-size="18" font-family="Inter,Arial,sans-serif">
    <text x="104" y="540">0</text>
    <text x="284" y="540">3</text>
    <text x="464" y="540">6</text>
    <text x="644" y="540">9</text>
    <text x="90" y="525">0</text>
    <text x="90" y="405">2</text>
    <text x="90" y="285">4</text>
    <text x="90" y="225">5</text>
  </g>

  <circle cx="240" cy="460" r="8" fill="#34d399"/>
  <text x="252" y="454" fill="#34d399" font-size="18" font-family="Inter,Arial,sans-serif">P1 (2,1)</text>

  <circle cx="480" cy="280" r="8" fill="#60a5fa"/>
  <text x="492" y="274" fill="#60a5fa" font-size="18" font-family="Inter,Arial,sans-serif">P2 (6,4)</text>

  <line x1="240" y1="460" x2="480" y2="280" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="860" y="180" width="280" height="250" rx="14" fill="#1f2937" stroke="#334155"/>
  <text x="884" y="230" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Example Step</text>
  <text x="884" y="276" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">dx = |6-2| = 4</text>
  <text x="884" y="316" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">dy = |4-1| = 3</text>
  <text x="884" y="356" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">time = max(dx, dy) = 4</text>
  <text x="884" y="396" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">3 diagonal + 1 horizontal</text>

  <text x="860" y="500" fill="#f59e0b" font-size="24" font-family="Inter,Arial,sans-serif">Total = Σ max(|Δx|, |Δy|)</text>
  <text x="860" y="550" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
