<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1154 day-of-year prefix-sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1154 · Day of the Year</text>
  <text x="60" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Prefix month sum + leap-year adjustment</text>

  <rect x="60" y="180" width="1080" height="380" rx="18" fill="#111827" stroke="#374151"/>

  <text x="96" y="236" fill="#f9fafb" font-size="26" font-family="JetBrains Mono,Consolas,monospace">Input: 2019-02-10</text>
  <text x="96" y="276" fill="#86efac" font-size="26" font-family="JetBrains Mono,Consolas,monospace">day = 31 (Jan) + 10 = 41</text>

  <text x="96" y="336" fill="#f9fafb" font-size="26" font-family="JetBrains Mono,Consolas,monospace">Input: 2004-03-01</text>
  <text x="96" y="376" fill="#86efac" font-size="26" font-family="JetBrains Mono,Consolas,monospace">day = 31 + 28 + 1 + leap(2004)=1 =&gt; 61</text>

  <text x="96" y="446" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Leap year: (y % 400 == 0) OR (y % 4 == 0 AND y % 100 != 0)</text>
  <text x="96" y="496" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Only add leap day when month &gt; 2.</text>

  <text x="60" y="600" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
