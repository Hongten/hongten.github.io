<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 2965 missing and repeated values frequency diagram">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; }
      .title { fill: #e2e8f0; font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .text { fill: #cbd5e1; font: 500 20px 'Segoe UI', Arial, sans-serif; }
      .mono { fill: #93c5fd; font: 600 21px 'Consolas', 'Courier New', monospace; }
      .good { fill: #22c55e; font: 700 22px 'Segoe UI', Arial, sans-serif; }
      .bad { fill: #ef4444; font: 700 22px 'Segoe UI', Arial, sans-serif; }
      .miss { fill: #f59e0b; font: 700 22px 'Segoe UI', Arial, sans-serif; }
      .cell { fill: #1f2937; stroke: #475569; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="420" />
  <text class="title" x="36" y="52">LeetCode 2965 · Find Missing and Repeated Values</text>

  <rect class="panel" x="34" y="78" width="430" height="306" rx="14" />
  <text class="text" x="58" y="114">Grid (n=3)</text>

  <rect class="cell" x="58" y="132" width="92" height="62" rx="8"/><text class="mono" x="94" y="171">1</text>
  <rect class="cell" x="162" y="132" width="92" height="62" rx="8"/><text class="mono" x="198" y="171">3</text>
  <rect class="cell" x="266" y="132" width="92" height="62" rx="8"/><text class="mono" x="302" y="171">2</text>

  <rect class="cell" x="58" y="206" width="92" height="62" rx="8"/><text class="mono" x="94" y="245">5</text>
  <rect class="cell" x="162" y="206" width="92" height="62" rx="8"/><text class="mono" x="198" y="245">3</text>
  <rect class="cell" x="266" y="206" width="92" height="62" rx="8"/><text class="mono" x="302" y="245">6</text>

  <rect class="cell" x="58" y="280" width="92" height="62" rx="8"/><text class="mono" x="94" y="319">7</text>
  <rect class="cell" x="162" y="280" width="92" height="62" rx="8"/><text class="mono" x="198" y="319">8</text>
  <rect class="cell" x="266" y="280" width="92" height="62" rx="8"/><text class="mono" x="302" y="319">9</text>

  <text class="bad" x="376" y="245">3 repeats</text>

  <rect class="panel" x="500" y="78" width="426" height="306" rx="14" />
  <text class="text" x="524" y="114">Frequency over 1..9</text>
  <text class="mono" x="524" y="156">1:1  2:1  3:2  4:0  5:1</text>
  <text class="mono" x="524" y="196">6:1  7:1  8:1  9:1</text>

  <text class="good" x="524" y="252">count == 2 → repeated = 3</text>
  <text class="miss" x="524" y="292">count == 0 → missing = 4</text>
  <text class="title" x="524" y="344">Answer: [3, 4]</text>
</svg>
