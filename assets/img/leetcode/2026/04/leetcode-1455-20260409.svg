<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1455 prefix matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1455 · Prefix of Word in Sentence</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Scan words left to right, return first 1-indexed prefix hit</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="95" y="250" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">sentence = "i love eating burger"</text>
  <text x="95" y="292" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">searchWord = "burg"</text>

  <rect x="95" y="330" width="180" height="72" rx="10" fill="#334155"/>
  <text x="165" y="375" text-anchor="middle" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">i (1)</text>

  <rect x="300" y="330" width="180" height="72" rx="10" fill="#334155"/>
  <text x="390" y="375" text-anchor="middle" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">love (2)</text>

  <rect x="505" y="330" width="220" height="72" rx="10" fill="#334155"/>
  <text x="615" y="375" text-anchor="middle" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">eating (3)</text>

  <rect x="750" y="330" width="260" height="72" rx="10" fill="#065f46" stroke="#34d399"/>
  <text x="880" y="375" text-anchor="middle" fill="#d1fae5" font-size="28" font-family="Inter,Arial,sans-serif">burger (4)</text>

  <path d="M880 415 L880 468" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="880" y="510" text-anchor="middle" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">prefix match → answer = 4</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#34d399"/>
    </marker>
  </defs>
</svg>
