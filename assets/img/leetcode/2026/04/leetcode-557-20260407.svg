<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 557 reverse words diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 557 · Reverse Words in a String III</text>
  <rect x="60" y="150" width="1080" height="180" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="230" fill="#93c5fd" font-size="32" font-family="Inter,Arial,sans-serif">Input:  Let's take LeetCode contest</text>
  <text x="95" y="285" fill="#86efac" font-size="32" font-family="Inter,Arial,sans-serif">Word-wise reverse: s'teL ekat edoCteeL tsetnoc</text>
