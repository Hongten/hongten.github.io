<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 2103 · Rings and Rods</text>
  <text x="70" y="130" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Bitmask per rod: R=1, G=2, B=4, full set = 7</text>

  <g transform="translate(90,190)">
    <rect x="0" y="0" width="980" height="330" rx="16" fill="#0b1220" stroke="#334155"/>
    <text x="30" y="46" fill="#cbd5e1" font-size="24" font-family="Arial">Example: rings = "B0R0G0R9G9B9R3"</text>

    <g transform="translate(30,80)">
      <rect x="0" y="0" width="220" height="200" rx="12" fill="#111827" stroke="#475569"/>
      <text x="20" y="34" fill="#f8fafc" font-size="22" font-family="Arial" font-weight="700">Rod 0</text>
      <circle cx="50" cy="85" r="18" fill="#ef4444"/>
      <circle cx="105" cy="85" r="18" fill="#22c55e"/>
      <circle cx="160" cy="85" r="18" fill="#3b82f6"/>
      <text x="20" y="145" fill="#93c5fd" font-size="20" font-family="Arial">mask: 1|2|4 = 7 ✓</text>
    </g>

    <g transform="translate(290,80)">
      <rect x="0" y="0" width="220" height="200" rx="12" fill="#111827" stroke="#475569"/>
      <text x="20" y="34" fill="#f8fafc" font-size="22" font-family="Arial" font-weight="700">Rod 9</text>
      <circle cx="50" cy="85" r="18" fill="#ef4444"/>
      <circle cx="105" cy="85" r="18" fill="#22c55e"/>
      <circle cx="160" cy="85" r="18" fill="#3b82f6"/>
      <text x="20" y="145" fill="#93c5fd" font-size="20" font-family="Arial">mask: 1|2|4 = 7 ✓</text>
    </g>

    <g transform="translate(550,80)">
      <rect x="0" y="0" width="220" height="200" rx="12" fill="#111827" stroke="#475569"/>
      <text x="20" y="34" fill="#f8fafc" font-size="22" font-family="Arial" font-weight="700">Rod 3</text>
      <circle cx="50" cy="85" r="18" fill="#ef4444"/>
      <text x="20" y="145" fill="#fda4af" font-size="20" font-family="Arial">mask: 1 ✗</text>
    </g>

    <text x="800" y="180" fill="#e2e8f0" font-size="34" font-family="Arial" font-weight="700">Answer = 2</text>
    <text x="800" y="220" fill="#94a3b8" font-size="20" font-family="Arial">Count rods with mask == 7</text>
  </g>
</svg>
