<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2027 greedy triple-cover diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 2027</text>
  <text x="60" y="138" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Minimum Moves to Convert String</text>
  <text x="60" y="190" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">Greedy: when we hit X, take one move and skip next 2 chars</text>

  <g transform="translate(90,260)">
    <text x="0" y="-20" fill="#f8fafc" font-size="24" font-family="monospace">s = X O X X O X O O</text>
    <rect x="0" y="20" width="110" height="70" rx="10" fill="#ef4444"/>
    <rect x="120" y="20" width="110" height="70" rx="10" fill="#22c55e"/>
    <rect x="240" y="20" width="110" height="70" rx="10" fill="#ef4444"/>
    <rect x="360" y="20" width="110" height="70" rx="10" fill="#ef4444"/>
    <rect x="480" y="20" width="110" height="70" rx="10" fill="#22c55e"/>
    <rect x="600" y="20" width="110" height="70" rx="10" fill="#ef4444"/>
    <rect x="720" y="20" width="110" height="70" rx="10" fill="#22c55e"/>
    <rect x="840" y="20" width="110" height="70" rx="10" fill="#22c55e"/>
    <text x="45" y="65" fill="#fff" font-size="40" font-family="monospace">X</text>
    <text x="165" y="65" fill="#fff" font-size="40" font-family="monospace">O</text>
    <text x="285" y="65" fill="#fff" font-size="40" font-family="monospace">X</text>
    <text x="405" y="65" fill="#fff" font-size="40" font-family="monospace">X</text>
    <text x="525" y="65" fill="#fff" font-size="40" font-family="monospace">O</text>
    <text x="645" y="65" fill="#fff" font-size="40" font-family="monospace">X</text>
    <text x="765" y="65" fill="#fff" font-size="40" font-family="monospace">O</text>
    <text x="885" y="65" fill="#fff" font-size="40" font-family="monospace">O</text>

    <rect x="-8" y="12" width="366" height="86" rx="14" fill="none" stroke="#f59e0b" stroke-width="6"/>
    <text x="120" y="132" fill="#f59e0b" font-size="22" font-family="Arial, sans-serif">move #1 covers i..i+2</text>

    <rect x="352" y="12" width="366" height="86" rx="14" fill="none" stroke="#38bdf8" stroke-width="6"/>
    <text x="478" y="132" fill="#38bdf8" font-size="22" font-family="Arial, sans-serif">move #2 covers next X block</text>
  </g>
</svg>
