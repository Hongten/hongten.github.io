<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2824 two-pointer pair counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="82" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2824 · Count Pairs &lt; Target</text>
  <text x="50" y="125" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Sort + Two Pointers: when sum(left,right) &lt; target, add (right - left)</text>

  <rect x="60" y="180" width="1080" height="360" rx="18" fill="#111827" stroke="#334155"/>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30" text-anchor="middle">
    <rect x="120" y="305" width="110" height="80" rx="10" fill="#1f2937" stroke="#475569"/><text x="175" y="355" fill="#e5e7eb">-2</text>
    <rect x="250" y="305" width="110" height="80" rx="10" fill="#1f2937" stroke="#475569"/><text x="305" y="355" fill="#e5e7eb">0</text>
    <rect x="380" y="305" width="110" height="80" rx="10" fill="#1f2937" stroke="#475569"/><text x="435" y="355" fill="#e5e7eb">1</text>
    <rect x="510" y="305" width="110" height="80" rx="10" fill="#1f2937" stroke="#475569"/><text x="565" y="355" fill="#e5e7eb">3</text>
    <rect x="640" y="305" width="110" height="80" rx="10" fill="#1f2937" stroke="#475569"/><text x="695" y="355" fill="#e5e7eb">5</text>
    <rect x="770" y="305" width="110" height="80" rx="10" fill="#1f2937" stroke="#475569"/><text x="825" y="355" fill="#e5e7eb">7</text>
    <rect x="900" y="305" width="110" height="80" rx="10" fill="#1f2937" stroke="#475569"/><text x="955" y="355" fill="#e5e7eb">9</text>
  </g>

  <text x="175" y="275" fill="#34d399" font-size="24" font-family="Inter,Arial,sans-serif">left</text>
  <text x="955" y="275" fill="#f59e0b" font-size="24" font-family="Inter,Arial,sans-serif">right</text>
  <line x1="175" y1="285" x2="175" y2="305" stroke="#34d399" stroke-width="4"/>
  <line x1="955" y1="285" x2="955" y2="305" stroke="#f59e0b" stroke-width="4"/>

  <line x1="210" y1="430" x2="920" y2="430" stroke="#93c5fd" stroke-width="3" marker-end="url(#arr)"/>
  <text x="560" y="468" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">-2 + 9 = 7 &lt; 10  ⇒ count += (right - left) = 6</text>

  <text x="60" y="590" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
