<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3079 max digit repeat encryption diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3079 · Find the Sum of Encrypted Integers</text>

  <rect x="56" y="132" width="1088" height="444" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="190" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Encrypt rule: repeat the maximum digit for the same digit length</text>

  <text x="90" y="255" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">523  → max=5, len=3 → 555</text>
  <text x="90" y="315" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">213  → max=3, len=3 → 333</text>
  <text x="90" y="375" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">9    → max=9, len=1 → 9</text>

  <line x1="90" y1="420" x2="1110" y2="420" stroke="#4b5563" stroke-width="2"/>

  <text x="90" y="485" fill="#86efac" font-size="38" font-family="JetBrains Mono,Consolas,monospace" font-weight="700">sum = 555 + 333 + 9 = 897</text>
  <text x="90" y="538" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Single pass per number · O(n * digits) time · O(1) extra space</text>
</svg>
