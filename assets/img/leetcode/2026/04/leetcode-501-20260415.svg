<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 501 inorder run-length counting</title>
  <desc id="desc">Inorder traversal of BST yields sorted values where equal values are contiguous; run-length counting identifies mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e0e1dd}
      .m{font-size:42px;font-weight:700}
      .s{font-size:26px}
      .b{fill:#3a506b;stroke:#5bc0be;stroke-width:3}
      .n{fill:#5bc0be;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
      .arr{stroke:#9ad1d4;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .chip{fill:#16213e;stroke:#5bc0be;stroke-width:2;rx:14}
      .chipText{font-size:24px;font-weight:600;fill:#e0e1dd}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#9ad1d4"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="84" class="t m">LeetCode 501 · Find Mode in BST</text>
  <text x="60" y="126" class="t s">Inorder traversal → sorted stream → run-length counting for mode(s)</text>

  <g transform="translate(80,180)">
    <rect x="440" y="0" width="80" height="52" rx="14" class="b"/>
    <text x="480" y="26" class="n">2</text>

    <rect x="260" y="130" width="80" height="52" rx="14" class="b"/>
    <text x="300" y="156" class="n">1</text>

    <rect x="620" y="130" width="80" height="52" rx="14" class="b"/>
    <text x="660" y="156" class="n">2</text>

    <rect x="560" y="260" width="80" height="52" rx="14" class="b"/>
    <text x="600" y="286" class="n">2</text>

    <rect x="740" y="260" width="80" height="52" rx="14" class="b"/>
    <text x="780" y="286" class="n">3</text>

    <path d="M470 52 L325 130" class="arr"/>
    <path d="M510 52 L635 130" class="arr"/>
    <path d="M655 182 L615 260" class="arr"/>
    <path d="M685 182 L760 260" class="arr"/>
  </g>

  <g transform="translate(120,560)">
    <rect x="0" y="-36" width="130" height="48" class="chip"/>
    <text x="65" y="-5" class="chipText" text-anchor="middle">1</text>
    <rect x="150" y="-36" width="130" height="48" class="chip"/>
    <text x="215" y="-5" class="chipText" text-anchor="middle">2</text>
    <rect x="300" y="-36" width="130" height="48" class="chip"/>
    <text x="365" y="-5" class="chipText" text-anchor="middle">2</text>
    <rect x="450" y="-36" width="130" height="48" class="chip"/>
    <text x="515" y="-5" class="chipText" text-anchor="middle">2</text>
    <rect x="600" y="-36" width="130" height="48" class="chip"/>
    <text x="665" y="-5" class="chipText" text-anchor="middle">3</text>

    <text x="760" y="-5" class="t s">max run = value 2 appears 3 times ⇒ mode = [2]</text>
  </g>
</svg>
