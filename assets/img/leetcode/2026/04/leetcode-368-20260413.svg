<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 368 largest divisible subset DP chain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .small{font:500 17px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .arrow{stroke:#f8fafc;stroke-width:3;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f8fafc"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="78" class="title">LeetCode 368 · Largest Divisible Subset</text>
  <text x="60" y="114" class="sub">Sort + DP + Parent Reconstruction</text>

  <rect x="70" y="180" width="180" height="90" rx="16" fill="#bfdbfe"/>
  <text x="140" y="225" text-anchor="middle" class="label">1</text>
  <text x="140" y="252" text-anchor="middle" class="small" fill="#1e3a8a">dp=1</text>

  <rect x="310" y="180" width="180" height="90" rx="16" fill="#93c5fd"/>
  <text x="400" y="225" text-anchor="middle" class="label">2</text>
  <text x="400" y="252" text-anchor="middle" class="small" fill="#1e3a8a">dp=2,parent=1</text>

  <rect x="550" y="180" width="180" height="90" rx="16" fill="#60a5fa"/>
  <text x="640" y="225" text-anchor="middle" class="label">4</text>
  <text x="640" y="252" text-anchor="middle" class="small" fill="#1e3a8a">dp=3,parent=2</text>

  <rect x="790" y="180" width="180" height="90" rx="16" fill="#3b82f6"/>
  <text x="880" y="225" text-anchor="middle" class="label">8</text>
  <text x="880" y="252" text-anchor="middle" class="small" fill="#dbeafe">dp=4,parent=4</text>

  <line x1="250" y1="225" x2="310" y2="225" class="arrow"/>
  <line x1="490" y1="225" x2="550" y2="225" class="arrow"/>
  <line x1="730" y1="225" x2="790" y2="225" class="arrow"/>

  <rect x="70" y="350" width="1030" height="180" rx="14" fill="#111827" stroke="#334155"/>
  <text x="95" y="390" class="small">Transition: if nums[i] % nums[j] == 0, then dp[i] = max(dp[i], dp[j] + 1)</text>
  <text x="95" y="425" class="small">Record parent[i] = j when updating dp[i], so we can reconstruct the chain.</text>
  <text x="95" y="460" class="small">Start from bestEnd (largest dp), follow parent pointers backward, then reverse.</text>
  <text x="95" y="500" class="small">Example output chain: [1, 2, 4, 8]</text>
</svg>
