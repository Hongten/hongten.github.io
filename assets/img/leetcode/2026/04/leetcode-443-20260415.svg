<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 443 string compression read write pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 443 · String Compression</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">In-place run-length encoding with read/write pointers</text>

  <rect x="60" y="180" width="500" height="120" rx="14" fill="#1f2937" stroke="#334155"/>
  <text x="84" y="222" fill="#cbd5e1" font-size="24" font-family="monospace">Input:  [a a a b b c c c c c]</text>
  <text x="84" y="262" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">read groups: aaa | bb | ccccc</text>

  <rect x="60" y="330" width="500" height="120" rx="14" fill="#1f2937" stroke="#334155"/>
  <text x="84" y="372" fill="#cbd5e1" font-size="24" font-family="monospace">Write:  [a 3 b 2 c 5]</text>
  <text x="84" y="412" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">write pointer only moves forward</text>

  <rect x="620" y="180" width="520" height="270" rx="14" fill="#111827" stroke="#334155"/>
  <text x="650" y="226" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Invariant</text>
  <text x="650" y="268" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">chars[0..write-1] is always valid compressed prefix.</text>
  <text x="650" y="314" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Group length = 1  → write only char.</text>
  <text x="650" y="356" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Group length &gt; 1 → write char + decimal digits.</text>
  <text x="650" y="398" fill="#fcd34d" font-size="22" font-family="Inter,Arial,sans-serif">Example: 12 occurrences => '1', '2'</text>

  <text x="60" y="560" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
