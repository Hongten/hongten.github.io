<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 832 flipping and inverting rows diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Inter',Arial,sans-serif;fill:#e5e7eb}
      .sub{font:500 26px 'Inter',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 28px 'JetBrains Mono',Consolas,monospace;fill:#e5e7eb}
      .cap{font:500 22px 'Inter',Arial,sans-serif;fill:#9ca3af}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="84" class="title">LeetCode 832 — Flipping an Image</text>
  <text x="52" y="122" class="sub">Reverse each row, then invert bits (0↔1)</text>

  <rect x="52" y="180" width="320" height="300" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="88" y="220" class="cap">Original</text>
  <text x="92" y="280" class="txt">[1 1 0]</text>
  <text x="92" y="330" class="txt">[1 0 1]</text>
  <text x="92" y="380" class="txt">[0 0 0]</text>

  <path d="M400 325 L510 325" stroke="#60a5fa" stroke-width="8" marker-end="url(#arr)"/>
  <path d="M690 325 L800 325" stroke="#34d399" stroke-width="8" marker-end="url(#arr)"/>

  <rect x="540" y="180" width="320" height="300" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="576" y="220" class="cap">After flip</text>
  <text x="580" y="280" class="txt">[0 1 1]</text>
  <text x="580" y="330" class="txt">[1 0 1]</text>
  <text x="580" y="380" class="txt">[0 0 0]</text>

  <rect x="880" y="180" width="270" height="300" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="908" y="220" class="cap">After invert</text>
  <text x="914" y="280" class="txt">[1 0 0]</text>
  <text x="914" y="330" class="txt">[0 1 0]</text>
  <text x="914" y="380" class="txt">[1 1 1]</text>

  <text x="52" y="560" class="sub">Two pointers per row: swap + XOR 1 in-place</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#93c5fd"/>
    </marker>
  </defs>
</svg>
