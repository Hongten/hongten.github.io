<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2101 directed detonation graph">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2540"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="84" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2101: Detonate the Maximum Bombs</text>
  <text x="56" y="126" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Build directed edges by distance ≤ radius, then DFS from each node</text>

  <circle cx="200" cy="340" r="95" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="8 6"/>
  <circle cx="200" cy="340" r="14" fill="#22d3ee"/>
  <text x="184" y="375" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">A</text>

  <circle cx="430" cy="300" r="70" fill="none" stroke="#34d399" stroke-width="3" stroke-dasharray="8 6"/>
  <circle cx="430" cy="300" r="14" fill="#34d399"/>
  <text x="414" y="335" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">B</text>

  <circle cx="650" cy="370" r="85" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6"/>
  <circle cx="650" cy="370" r="14" fill="#f59e0b"/>
  <text x="634" y="405" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">C</text>

  <circle cx="900" cy="290" r="65" fill="none" stroke="#fb7185" stroke-width="3" stroke-dasharray="8 6"/>
  <circle cx="900" cy="290" r="14" fill="#fb7185"/>
  <text x="884" y="325" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">D</text>

  <line x1="220" y1="334" x2="405" y2="305" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="450" y1="306" x2="626" y2="361" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="670" y1="360" x2="876" y2="298" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="56" y="490" width="1088" height="100" rx="14" fill="#111827" stroke="#374151"/>
  <text x="86" y="548" fill="#d1fae5" font-size="30" font-family="Inter,Arial,sans-serif">Try DFS from every bomb → max reachable chain reaction</text>
</svg>
