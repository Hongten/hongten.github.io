<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><rect x="70" y="120" width="1060" height="420" rx="24" fill="#111827" stroke="#374151"/><text x="100" y="200" fill="#e5e7eb" font-size="44" font-family="Arial">LeetCode 590 · N-ary Postorder</text><text x="100" y="270" fill="#93c5fd" font-size="34" font-family="Arial">Stack visit: Root -> Children, then Reverse</text><text x="100" y="340" fill="#86efac" font-size="30" font-family="Arial">Example: [1,null,3,2,4,null,5,6] -> [5,6,3,2,4,1]</text><text x="100" y="410" fill="#fca5a5" font-size="30" font-family="Arial">Time O(n), Space O(n)</text></svg>