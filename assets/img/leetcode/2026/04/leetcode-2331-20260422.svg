<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2331 Evaluate Boolean Binary Tree diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#132a4a"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#b9d0ff}
      .node{fill:#1e3a63;stroke:#8ab4ff;stroke-width:3}
      .txt{font:700 28px 'Consolas','Courier New',monospace;fill:#f7fbff;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#9fc2ff;stroke-width:4}
      .anno{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#d7e7ff}
      .hi{fill:#6ee7b7}
      .or{fill:#fca5a5}
      .and{fill:#fcd34d}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="82" class="title">LeetCode 2331: Evaluate Boolean Binary Tree</text>
  <text x="60" y="118" class="sub">Postorder: evaluate children, then apply OR / AND at parent</text>

  <line x1="600" y1="220" x2="390" y2="340" class="edge"/>
  <line x1="600" y1="220" x2="810" y2="340" class="edge"/>
  <line x1="390" y1="340" x2="280" y2="470" class="edge"/>
  <line x1="390" y1="340" x2="500" y2="470" class="edge"/>
  <line x1="810" y1="340" x2="700" y2="470" class="edge"/>
  <line x1="810" y1="340" x2="920" y2="470" class="edge"/>

  <circle cx="600" cy="200" r="54" class="node"/>
  <text x="600" y="200" class="txt">2</text>
  <text x="655" y="203" class="anno or">OR</text>

  <circle cx="390" cy="340" r="50" class="node"/>
  <text x="390" y="340" class="txt">3</text>
  <text x="440" y="343" class="anno and">AND</text>

  <circle cx="810" cy="340" r="50" class="node"/>
  <text x="810" y="340" class="txt">2</text>
  <text x="860" y="343" class="anno or">OR</text>

  <circle cx="280" cy="470" r="44" class="node"/>
  <text x="280" y="470" class="txt">1</text>
  <text x="250" y="528" class="anno hi">true</text>

  <circle cx="500" cy="470" r="44" class="node"/>
  <text x="500" y="470" class="txt">0</text>
  <text x="468" y="528" class="anno">false</text>

  <circle cx="700" cy="470" r="44" class="node"/>
  <text x="700" y="470" class="txt">0</text>
  <text x="670" y="528" class="anno">false</text>

  <circle cx="920" cy="470" r="44" class="node"/>
  <text x="920" y="470" class="txt">1</text>
  <text x="892" y="528" class="anno hi">true</text>

  <text x="60" y="586" class="anno">(1 AND 0) OR (0 OR 1) = false OR true = true</text>
</svg>
