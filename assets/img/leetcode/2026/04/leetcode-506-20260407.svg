  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 506 · Relative Ranks</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Sort (score,index) descending → write medals/ranks back by original index</text>

  <rect x="56" y="186" width="1088" height="376" rx="18" fill="#111827" stroke="#374151"/>

  <text x="86" y="242" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Original score array</text>
  <g font-family="Inter,Arial,sans-serif" font-size="24" text-anchor="middle">
    <rect x="86" y="262" width="120" height="58" rx="10" fill="#1f2937" stroke="#4b5563"/><text x="146" y="300" fill="#e5e7eb">10(i0)</text>
