    <rect x="366" y="262" width="120" height="58" rx="10" fill="#1f2937" stroke="#4b5563"/><text x="426" y="300" fill="#e5e7eb">8(i2)</text>
    <rect x="506" y="262" width="120" height="58" rx="10" fill="#1f2937" stroke="#4b5563"/><text x="566" y="300" fill="#e5e7eb">9(i3)</text>
    <rect x="646" y="262" width="120" height="58" rx="10" fill="#1f2937" stroke="#4b5563"/><text x="706" y="300" fill="#e5e7eb">4(i4)</text>
  </g>

  <path d="M88 346 H1110" stroke="#374151" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="86" y="388" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">After sorting by score descending</text>

  <g font-family="Inter,Arial,sans-serif" font-size="23" text-anchor="middle">
    <rect x="86" y="406" width="180" height="66" rx="12" fill="#14532d" stroke="#22c55e"/><text x="176" y="447" fill="#dcfce7">10(i0) Gold</text>
