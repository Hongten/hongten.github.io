<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 684 redundant connection union-find cycle diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 684 - Redundant Connection</text>
  <text x="60" y="130" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Union-Find detects the edge that closes the first cycle</text>

  <g stroke="#64748b" stroke-width="5" fill="none">
    <line x1="220" y1="260" x2="420" y2="200"/>
    <line x1="420" y1="200" x2="620" y2="280"/>
    <line x1="620" y1="280" x2="520" y2="440"/>
    <line x1="520" y1="440" x2="300" y2="430"/>
    <line x1="300" y1="430" x2="220" y2="260"/>
  </g>

  <g stroke="#38bdf8" stroke-width="8" fill="none">
    <line x1="620" y1="280" x2="300" y2="430" marker-end="url(#arrow)"/>
  </g>

  <g fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">
    <circle cx="220" cy="260" r="34" fill="#334155"/><text x="209" y="270">1</text>
    <circle cx="420" cy="200" r="34" fill="#334155"/><text x="409" y="210">2</text>
    <circle cx="620" cy="280" r="34" fill="#334155"/><text x="609" y="290">3</text>
    <circle cx="520" cy="440" r="34" fill="#334155"/><text x="509" y="450">4</text>
    <circle cx="300" cy="430" r="34" fill="#334155"/><text x="289" y="440">5</text>
  </g>

  <rect x="700" y="210" width="430" height="230" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="730" y="260" fill="#cbd5e1" font-size="26" font-family="Arial, sans-serif">Process edges in order:</text>
  <text x="730" y="305" fill="#38bdf8" font-size="24" font-family="Consolas, monospace">(1,2) (2,3) (3,4) (4,5)</text>
  <text x="730" y="350" fill="#f59e0b" font-size="24" font-family="Consolas, monospace">(3,5) -&gt; cycle</text>
  <text x="730" y="395" fill="#e2e8f0" font-size="24" font-family="Arial, sans-serif">Return [3,5]</text>
</svg>
