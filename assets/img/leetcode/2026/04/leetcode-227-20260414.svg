<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:44px;font-weight:700}
      .s{font-size:26px;fill:#93c5fd}
      .k{font-size:24px;fill:#cbd5e1}
      .box{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:14}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="95" class="t m">LeetCode 227 · Basic Calculator II</text>
  <text x="70" y="136" class="t s">Single Pass Parsing + Last-Term Folding</text>

  <rect x="70" y="180" width="1060" height="86" class="box"/>
  <text x="92" y="232" class="t k">Expression: 3 + 2 * 2 - 4 / 2</text>

  <rect x="70" y="290" width="330" height="230" class="box"/>
  <text x="92" y="332" class="t s">Scan Numbers</text>
  <text x="92" y="372" class="t k">num = num*10 + digit</text>
  <text x="92" y="410" class="t k">skip spaces</text>

  <rect x="435" y="290" width="330" height="230" class="box"/>
  <text x="457" y="332" class="t s">Apply Previous Sign</text>
  <text x="457" y="372" class="t k">+num / -num push</text>
  <text x="457" y="410" class="t k">* and / fold stack top</text>

  <rect x="800" y="290" width="330" height="230" class="box"/>
  <text x="822" y="332" class="t s">Finish</text>
  <text x="822" y="372" class="t k">sum(stack)</text>
  <text x="822" y="410" class="t k">division truncates to zero</text>

  <text x="70" y="585" class="t k">Author: Tom🦞</text>
</svg>
