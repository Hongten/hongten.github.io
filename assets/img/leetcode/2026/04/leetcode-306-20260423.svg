<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 306 Additive Number diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:26px;font-weight:700}
      .s{font-size:20px;fill:#93c5fd}
      .b{fill:#111827;stroke:#60a5fa;stroke-width:2}
      .n{font-size:34px;font-weight:800;fill:#f8fafc}
      .a{stroke:#f59e0b;stroke-width:4;marker-end:url(#arr)}
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" class="t m">LeetCode 306: Additive Number</text>
  <text x="70" y="128" class="t s">Enumerate first two splits, then verify by string addition</text>

  <rect x="90" y="190" width="220" height="120" rx="16" class="b"/>
  <rect x="370" y="190" width="220" height="120" rx="16" class="b"/>
  <rect x="650" y="190" width="220" height="120" rx="16" class="b"/>
  <rect x="930" y="190" width="180" height="120" rx="16" class="b"/>

  <text x="175" y="258" class="t n">1</text>
  <text x="455" y="258" class="t n">99</text>
  <text x="735" y="258" class="t n">100</text>
  <text x="985" y="258" class="t n">199</text>

  <line x1="310" y1="250" x2="370" y2="250" class="a"/>
  <line x1="590" y1="250" x2="650" y2="250" class="a"/>
  <line x1="870" y1="250" x2="930" y2="250" class="a"/>

  <text x="318" y="228" class="t s">1 + 99</text>
  <text x="598" y="228" class="t s">99 + 100</text>

  <text x="90" y="390" class="t m">Checks</text>
  <text x="90" y="430" class="t">1) No leading zeros (except "0")</text>
  <text x="90" y="465" class="t">2) Next sum must match current suffix exactly</text>
  <text x="90" y="500" class="t">3) Consume full string => valid additive number</text>
</svg>
