<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 914 frequency gcd diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 914 · X of a Kind in a Deck of Cards</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Count frequencies, then fold with GCD</text>

  <rect x="60" y="190" width="480" height="340" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="240" fill="#f8fafc" font-size="28" font-family="monospace">deck = [1,1,2,2,2,2]</text>
  <text x="90" y="300" fill="#cbd5e1" font-size="28" font-family="monospace">count(1) = 2</text>
  <text x="90" y="350" fill="#cbd5e1" font-size="28" font-family="monospace">count(2) = 4</text>
  <text x="90" y="420" fill="#86efac" font-size="34" font-family="monospace">gcd(2,4) = 2  ✓</text>
  <text x="90" y="480" fill="#facc15" font-size="26" font-family="Inter,Arial,sans-serif">Can split into groups of size X=2</text>

  <rect x="620" y="190" width="520" height="340" rx="16" fill="#111827" stroke="#374151"/>
  <text x="650" y="250" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Invariant</text>
  <text x="650" y="310" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">All frequencies must share a common divisor X ≥ 2</text>
  <text x="650" y="370" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">Equivalent to: gcd(all frequencies) ≥ 2</text>
  <text x="650" y="450" fill="#fda4af" font-size="26" font-family="Inter,Arial,sans-serif">If gcd = 1, impossible to form valid equal groups</text>

  <text x="60" y="590" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual solution post</text>
</svg>
