<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1486 XOR fold diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1486 · XOR Operation in an Array</text>
  <text x="56" y="134" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">nums[i] = start + 2*i, accumulate with XOR</text>

  <rect x="56" y="180" width="1088" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="245" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">start = 3, n = 5</text>
  <text x="90" y="295" fill="#e5e7eb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">nums = [3, 5, 7, 9, 11]</text>
  <text x="90" y="350" fill="#f9a8d4" font-size="28" font-family="JetBrains Mono,Consolas,monospace">ans = 0 ^ 3 ^ 5 ^ 7 ^ 9 ^ 11</text>
  <text x="90" y="405" fill="#fde68a" font-size="34" font-family="JetBrains Mono,Consolas,monospace">ans = 3</text>

  <line x1="90" y1="440" x2="1110" y2="440" stroke="#4b5563" stroke-width="2"/>
  <text x="90" y="490" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">One pass, O(n) time, O(1) space</text>
  <text x="90" y="530" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
