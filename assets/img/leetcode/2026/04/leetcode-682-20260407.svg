<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 682 stack simulation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 682 · Baseball Game</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Stack simulation of operations: integer / C / D / +</text>

  <rect x="70" y="180" width="1060" height="380" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="110" y="235" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="700">Example ops: ["5","2","C","D","+"]</text>

  <g font-family="Consolas, monospace" font-size="24">
    <text x="110" y="285" fill="#fca5a5">1) "5"  → push 5        stack: [5]</text>
    <text x="110" y="330" fill="#fdba74">2) "2"  → push 2        stack: [5, 2]</text>
    <text x="110" y="375" fill="#fcd34d">3) "C"  → pop           stack: [5]</text>
    <text x="110" y="420" fill="#86efac">4) "D"  → 2*top=10      stack: [5, 10]</text>
    <text x="110" y="465" fill="#93c5fd">5) "+"  → top+second=15 stack: [5, 10, 15]</text>
    <text x="110" y="525" fill="#e2e8f0" font-size="30">Total score = 5 + 10 + 15 = 30</text>
  </g>
</svg>
