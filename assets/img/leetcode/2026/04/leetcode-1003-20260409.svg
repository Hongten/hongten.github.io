<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1003 stack reduction diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1003 · Check If Word Is Valid After Substitutions</text>
  <text x="56" y="138" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Stack simulation: push chars, collapse every trailing "abc"</text>

  <rect x="56" y="186" width="1088" height="388" rx="18" fill="#111827" stroke="#374151"/>

  <text x="92" y="246" fill="#93c5fd" font-size="26" font-family="JetBrains Mono,Consolas,monospace">Input: aabcbc</text>
  <text x="92" y="286" fill="#fca5a5" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Stack: [a]</text>
  <text x="92" y="322" fill="#fca5a5" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Stack: [a,a]</text>
  <text x="92" y="358" fill="#fca5a5" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Stack: [a,a,b]</text>
  <text x="92" y="394" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read c → trailing "abc" removed → [a]</text>
  <text x="92" y="430" fill="#fca5a5" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read b → [a,b]</text>
  <text x="92" y="466" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read c → trailing "abc" removed → []</text>
  <text x="92" y="518" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Valid iff final stack is empty.</text>
</svg>
