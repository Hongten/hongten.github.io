<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2160 greedy digit split diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 2160</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Minimum Sum of Four Digit Number After Splitting Digits</text>

  <rect x="60" y="185" width="1080" height="380" rx="18" fill="#111827" stroke="#334155"/>

  <text x="100" y="245" fill="#cbd5e1" font-size="26" font-family="Consolas, monospace">num = 2932 → digits: [2, 9, 3, 2] → sort → [2, 2, 3, 9]</text>

  <rect x="120" y="285" width="220" height="90" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="150" y="340" fill="#f8fafc" font-size="42" font-family="Consolas, monospace">2  2  3  9</text>

  <text x="390" y="340" fill="#94a3b8" font-size="48" font-family="Arial, sans-serif">→</text>

  <rect x="460" y="285" width="270" height="90" rx="12" fill="#0b3b2e" stroke="#34d399"/>
  <text x="490" y="340" fill="#d1fae5" font-size="38" font-family="Consolas, monospace">x = 23</text>

  <rect x="780" y="285" width="270" height="90" rx="12" fill="#3b1a0b" stroke="#fb923c"/>
  <text x="810" y="340" fill="#ffedd5" font-size="38" font-family="Consolas, monospace">y = 29</text>

  <text x="530" y="430" fill="#e2e8f0" font-size="38" font-family="Arial, sans-serif" font-weight="700">23 + 29 = 52 (minimum)</text>
  <text x="160" y="500" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Greedy rule: put the two smallest digits in tens places to minimize weighted sum.</text>
</svg>
