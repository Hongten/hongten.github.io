<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 2894 arithmetic split illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>
  <text x="40" y="58" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">LeetCode 2894 · Divisible vs Non-divisible Sums</text>

  <rect x="45" y="90" width="870" height="70" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="70" y="134" fill="#cbd5e1" font-size="27" font-family="Arial, sans-serif">Total S = 1 + 2 + ... + n = n(n+1)/2</text>

  <rect x="45" y="180" width="420" height="170" rx="12" fill="#052e16" stroke="#22c55e"/>
  <text x="67" y="220" fill="#bbf7d0" font-size="24" font-family="Arial, sans-serif" font-weight="700">Divisible part D</text>
  <text x="67" y="258" fill="#dcfce7" font-size="20" font-family="Arial, sans-serif">m, 2m, 3m, ..., km</text>
  <text x="67" y="290" fill="#dcfce7" font-size="20" font-family="Arial, sans-serif">k = floor(n / m)</text>
  <text x="67" y="322" fill="#dcfce7" font-size="20" font-family="Arial, sans-serif">D = m · k(k+1)/2</text>

  <rect x="495" y="180" width="420" height="170" rx="12" fill="#172554" stroke="#60a5fa"/>
  <text x="517" y="220" fill="#bfdbfe" font-size="24" font-family="Arial, sans-serif" font-weight="700">Result</text>
  <text x="517" y="258" fill="#dbeafe" font-size="22" font-family="Arial, sans-serif">num1 = S - D</text>
  <text x="517" y="290" fill="#dbeafe" font-size="22" font-family="Arial, sans-serif">num2 = D</text>
  <text x="517" y="322" fill="#fef08a" font-size="24" font-family="Arial, sans-serif" font-weight="700">answer = S - 2D</text>
</svg>
