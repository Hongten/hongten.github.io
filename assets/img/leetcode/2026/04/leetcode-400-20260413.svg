<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 400 Nth Digit digit-group diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 400 · Nth Digit</text>
  <text x="60" y="130" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Skip digit-length blocks, then index inside one number</text>

  <rect x="60" y="180" width="330" height="140" rx="16" fill="#1e293b" stroke="#60a5fa"/>
  <text x="85" y="225" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="700">1-digit</text>
  <text x="85" y="260" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">1 ... 9</text>
  <text x="85" y="295" fill="#fbbf24" font-size="22" font-family="Arial, sans-serif">9 × 1 = 9 digits</text>

  <rect x="435" y="180" width="330" height="140" rx="16" fill="#1e293b" stroke="#34d399"/>
  <text x="460" y="225" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="700">2-digit</text>
  <text x="460" y="260" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">10 ... 99</text>
  <text x="460" y="295" fill="#fbbf24" font-size="22" font-family="Arial, sans-serif">90 × 2 = 180 digits</text>

  <rect x="810" y="180" width="330" height="140" rx="16" fill="#1e293b" stroke="#f472b6"/>
  <text x="835" y="225" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="700">3-digit</text>
  <text x="835" y="260" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">100 ... 999</text>
  <text x="835" y="295" fill="#fbbf24" font-size="22" font-family="Arial, sans-serif">900 × 3 = 2700 digits</text>

  <path d="M220 355 L220 430 L980 430" stroke="#94a3b8" stroke-width="4" fill="none"/>
  <circle cx="220" cy="430" r="8" fill="#fbbf24"/>
  <circle cx="600" cy="430" r="8" fill="#fbbf24"/>
  <circle cx="980" cy="430" r="8" fill="#fbbf24"/>

  <text x="60" y="500" fill="#e5e7eb" font-size="28" font-family="Consolas, monospace">num = start + (n - 1) / digitLen</text>
  <text x="60" y="540" fill="#e5e7eb" font-size="28" font-family="Consolas, monospace">offset = (n - 1) % digitLen</text>
  <text x="60" y="585" fill="#93c5fd" font-size="22" font-family="Arial, sans-serif">Then read digit at offset in num.toString()</text>
</svg>
