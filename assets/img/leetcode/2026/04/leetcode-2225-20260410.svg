<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2225 player loss grouping diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2225: Find Players With Zero or One Losses</text>
  <rect x="70" y="160" width="500" height="380" rx="18" fill="#052e16" stroke="#16a34a"/>
  <text x="100" y="215" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Losses = 0</text>
  <text x="100" y="275" fill="#dcfce7" font-size="30" font-family="Inter,Arial,sans-serif">Players: [1, 2, 10]</text>
  <text x="100" y="335" fill="#dcfce7" font-size="26" font-family="Inter,Arial,sans-serif">Never appear as loser</text>

  <rect x="630" y="160" width="500" height="380" rx="18" fill="#3f1d0b" stroke="#f97316"/>
  <text x="660" y="215" fill="#fdba74" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Losses = 1</text>
  <text x="660" y="275" fill="#ffedd5" font-size="30" font-family="Inter,Arial,sans-serif">Players: [4, 5, 7, 8]</text>
  <text x="660" y="335" fill="#ffedd5" font-size="26" font-family="Inter,Arial,sans-serif">Count exactly once</text>

  <text x="60" y="592" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Single pass build map, then split+sort</text>
</svg>
