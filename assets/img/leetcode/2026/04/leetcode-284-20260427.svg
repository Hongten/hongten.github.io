<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 284 Peeking Iterator one-item cache diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="86" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 284: Peeking Iterator</text>
  <text x="56" y="125" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">One-item lookahead cache: peek() reads, next() consumes and refills</text>

  <rect x="60" y="180" width="1080" height="380" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="95" y="236" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Underlying data stream</text>
  <rect x="95" y="265" width="120" height="70" rx="10" fill="#111827" stroke="#4b5563"/>
  <rect x="225" y="265" width="120" height="70" rx="10" fill="#111827" stroke="#4b5563"/>
  <rect x="355" y="265" width="120" height="70" rx="10" fill="#111827" stroke="#4b5563"/>
  <rect x="485" y="265" width="120" height="70" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="145" y="308" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="JetBrains Mono,monospace">1</text>
  <text x="275" y="308" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="JetBrains Mono,monospace">2</text>
  <text x="405" y="308" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="JetBrains Mono,monospace">3</text>
  <text x="545" y="308" fill="#9ca3af" font-size="26" text-anchor="middle" font-family="JetBrains Mono,monospace">...</text>

  <rect x="760" y="245" width="320" height="110" rx="14" fill="#0b1220" stroke="#60a5fa"/>
  <text x="780" y="282" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">Cache</text>
  <text x="780" y="318" fill="#e5e7eb" font-size="28" font-family="JetBrains Mono,monospace">nextVal = 1</text>

  <line x1="215" y1="300" x2="750" y2="300" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="480" y="285" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">prefetch</text>

  <text x="95" y="415" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">peek()</text>
  <text x="210" y="415" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">return cache, iterator does not move</text>

  <text x="95" y="465" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">next()</text>
  <text x="210" y="465" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">return cache, then refill from stream</text>

  <text x="95" y="515" fill="#fde68a" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">hasNext()</text>
  <text x="235" y="515" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">cache valid?</text>

  <text x="1050" y="595" fill="#86efac" font-size="24" text-anchor="end" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
