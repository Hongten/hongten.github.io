<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 806 line wrapping illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 806</text>
  <text x="60" y="132" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Number of Lines To Write String</text>
  <rect x="60" y="180" width="1080" height="90" rx="14" fill="#111827" stroke="#334155"/>
  <text x="90" y="235" fill="#cbd5e1" font-size="28" font-family="monospace">line 1: current + width(ch) &lt;= 100 ? append : wrap</text>
  <rect x="60" y="300" width="1080" height="90" rx="14" fill="#111827" stroke="#334155"/>
  <text x="90" y="355" fill="#cbd5e1" font-size="28" font-family="monospace">if overflow: lines++, current = width(ch)</text>
  <rect x="60" y="420" width="1080" height="120" rx="14" fill="#0b1220" stroke="#475569"/>
  <text x="90" y="475" fill="#f8fafc" font-size="30" font-family="monospace">Return [lines, current]</text>
  <text x="90" y="515" fill="#94a3b8" font-size="24" font-family="monospace">Greedy single pass, O(n) time, O(1) space</text>
</svg>
