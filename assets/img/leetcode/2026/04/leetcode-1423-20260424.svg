<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1423 sliding window complement diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="86" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1423 · Maximum Points You Can Obtain from Cards</text>
  <text x="56" y="126" fill="#93c5fd" font-size="27" font-family="Inter,Arial,sans-serif">Take k from both ends  ⇢  Minimize middle window (length n-k)</text>

  <rect x="56" y="180" width="1088" height="180" rx="16" fill="#1f2937" stroke="#374151"/>

  <rect x="90" y="240" width="90" height="60" rx="10" fill="#22c55e"/>
  <rect x="190" y="240" width="90" height="60" rx="10" fill="#22c55e"/>
  <rect x="290" y="240" width="90" height="60" rx="10" fill="#334155"/>
  <rect x="390" y="240" width="90" height="60" rx="10" fill="#334155"/>
  <rect x="490" y="240" width="90" height="60" rx="10" fill="#334155"/>
  <rect x="590" y="240" width="90" height="60" rx="10" fill="#334155"/>
  <rect x="690" y="240" width="90" height="60" rx="10" fill="#334155"/>
  <rect x="790" y="240" width="90" height="60" rx="10" fill="#22c55e"/>
  <rect x="890" y="240" width="90" height="60" rx="10" fill="#22c55e"/>
  <rect x="990" y="240" width="90" height="60" rx="10" fill="#22c55e"/>

  <text x="102" y="232" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">picked</text>
  <text x="395" y="232" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">middle window (min sum)</text>
  <text x="904" y="232" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">picked</text>

  <text x="56" y="430" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">answer = totalSum - minWindowSum(n-k)</text>
  <text x="56" y="488" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Slide one fixed-size window once: O(n) time, O(1) extra space</text>
  <text x="56" y="556" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
