<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2053 two pass frequency diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa" />
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2053 — Kth Distinct String in an Array</text>
  <text x="56" y="126" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Two Pass: Frequency Count → Ordered Distinct Scan</text>

  <rect x="56" y="170" width="1088" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="92" y="220" fill="#fbbf24" font-size="24" font-family="Inter,Arial,sans-serif">Input order:</text>
  <rect x="92" y="238" width="170" height="52" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="126" y="271" fill="#e2e8f0" font-size="24" font-family="monospace">d</text>
  <rect x="276" y="238" width="170" height="52" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="310" y="271" fill="#e2e8f0" font-size="24" font-family="monospace">b</text>
  <rect x="460" y="238" width="170" height="52" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="494" y="271" fill="#e2e8f0" font-size="24" font-family="monospace">c</text>
  <rect x="644" y="238" width="170" height="52" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="678" y="271" fill="#e2e8f0" font-size="24" font-family="monospace">b</text>
  <rect x="828" y="238" width="170" height="52" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="862" y="271" fill="#e2e8f0" font-size="24" font-family="monospace">c</text>
  <rect x="1012" y="238" width="110" height="52" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="1040" y="271" fill="#e2e8f0" font-size="24" font-family="monospace">a</text>

  <line x1="180" y1="304" x2="180" y2="360" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="560" y1="304" x2="560" y2="360" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="920" y1="304" x2="920" y2="360" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="92" y="400" fill="#34d399" font-size="24" font-family="Inter,Arial,sans-serif">Pass 1 (freq):</text>
  <text x="270" y="400" fill="#e2e8f0" font-size="24" font-family="monospace">{a:1, b:2, c:2, d:1}</text>

  <text x="92" y="446" fill="#34d399" font-size="24" font-family="Inter,Arial,sans-serif">Pass 2 (distinct in order):</text>
  <text x="430" y="446" fill="#e2e8f0" font-size="24" font-family="monospace">d, a</text>

  <rect x="92" y="474" width="620" height="64" rx="12" fill="#0b1220" stroke="#22c55e"/>
  <text x="118" y="516" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">k = 2  → answer = "a"</text>

  <text x="878" y="525" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
