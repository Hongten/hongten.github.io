<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 594 frequency map with adjacent pair aggregation">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <style>
      .title{font:700 44px Inter,Arial,sans-serif;fill:#e5e7eb}
      .sub{font:500 26px Inter,Arial,sans-serif;fill:#cbd5e1}
      .axis{stroke:#64748b;stroke-width:2}
      .bar{fill:#60a5fa}
      .bar2{fill:#34d399}
      .txt{font:600 24px Inter,Arial,sans-serif;fill:#e2e8f0}
      .hint{font:500 22px Inter,Arial,sans-serif;fill:#fbbf24}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" class="title">LeetCode 594 · Longest Harmonious Subsequence</text>
  <text x="56" y="124" class="sub">Count frequencies, then combine adjacent values x and x+1</text>

  <line x1="110" y1="520" x2="1080" y2="520" class="axis"/>
  <line x1="110" y1="210" x2="110" y2="520" class="axis"/>

  <rect x="220" y="380" width="110" height="140" rx="8" class="bar"/>
  <rect x="390" y="300" width="110" height="220" rx="8" class="bar2"/>
  <rect x="560" y="420" width="110" height="100" rx="8" class="bar"/>
  <rect x="730" y="260" width="110" height="260" rx="8" class="bar2"/>

  <text x="252" y="550" class="txt">1</text>
  <text x="422" y="550" class="txt">2</text>
  <text x="592" y="550" class="txt">3</text>
  <text x="762" y="550" class="txt">4</text>

  <text x="386" y="270" class="txt">freq[2]</text>
  <text x="726" y="230" class="txt">freq[4]</text>

  <path d="M448 246 C520 210, 610 210, 785 226" stroke="#fbbf24" stroke-width="4" fill="none" stroke-dasharray="8 8"/>
  <text x="515" y="190" class="hint">candidate = freq[x] + freq[x+1]</text>

  <text x="56" y="590" class="sub">Author: Tom🦞</text>
</svg>
