<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1109 difference array range update diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2440"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="80" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1109 · Corporate Flight Bookings</text>
  <text x="56" y="118" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Difference Array + Prefix Sum</text>

  <rect x="56" y="160" width="1088" height="410" rx="16" fill="#111827" stroke="#334155"/>

  <text x="86" y="210" fill="#cbd5e1" font-size="22" font-family="monospace">Flights:    1    2    3    4    5</text>
  <text x="86" y="250" fill="#fde68a" font-size="22" font-family="monospace">Booking A: [1,2,+10]  => diff[1]+=10, diff[3]-=10</text>
  <text x="86" y="285" fill="#86efac" font-size="22" font-family="monospace">Booking B: [2,3,+20]  => diff[2]+=20, diff[4]-=20</text>
  <text x="86" y="320" fill="#fca5a5" font-size="22" font-family="monospace">Booking C: [2,5,+25]  => diff[2]+=25</text>

  <line x1="86" y1="350" x2="1110" y2="350" stroke="#334155" stroke-width="2"/>

  <text x="86" y="390" fill="#c4b5fd" font-size="22" font-family="monospace">diff array: [10, 45, -10, -20, 0]</text>
  <text x="86" y="430" fill="#67e8f9" font-size="22" font-family="monospace">prefix sum: [10, 55, 45, 25, 25]</text>

  <text x="86" y="480" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">Range updates become O(1) writes, then one O(n) reconstruction pass.</text>
  <text x="86" y="525" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
