<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2255 prefix matching illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 2255 · Count Prefixes of a Given String</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Check each word: s.startsWith(word)</text>

  <rect x="60" y="190" width="1080" height="80" rx="14" fill="#111827" stroke="#334155"/>
  <text x="90" y="240" fill="#f8fafc" font-size="34" font-family="Consolas, monospace">s = "abc"</text>

  <g font-family="Consolas, monospace" font-size="30">
    <rect x="80" y="320" width="240" height="70" rx="12" fill="#064e3b"/>
    <text x="105" y="365" fill="#d1fae5">"a" ✓</text>
    <rect x="360" y="320" width="240" height="70" rx="12" fill="#064e3b"/>
    <text x="385" y="365" fill="#d1fae5">"ab" ✓</text>
    <rect x="640" y="320" width="240" height="70" rx="12" fill="#7f1d1d"/>
    <text x="665" y="365" fill="#fee2e2">"ac" ✗</text>
    <rect x="920" y="320" width="200" height="70" rx="12" fill="#064e3b"/>
    <text x="945" y="365" fill="#d1fae5">"abc" ✓</text>
  </g>

  <text x="60" y="470" fill="#e2e8f0" font-size="34" font-family="Arial, sans-serif">count = 3</text>
  <text x="60" y="530" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Linear scan over words, prefix check per word.</text>
</svg>
