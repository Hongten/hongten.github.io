<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 26px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .txt { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #e5e7eb; }
      .token { font: 700 24px 'Consolas', monospace; fill: #86efac; }
      .muted { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" class="title">LeetCode 2788, Split Strings by Separator</text>
  <text x="56" y="124" class="sub">Linear scan, cut on separator, keep non-empty tokens</text>

  <rect x="56" y="170" rx="14" ry="14" width="1088" height="140" fill="#111827" stroke="#334155"/>
  <text x="82" y="220" class="txt">words = ["one.two.three", "four..five", ".six."] , separator = '.'</text>
  <text x="82" y="270" class="muted">scan chars left to right, flush token on separator</text>

  <path d="M80 340 L1120 340" stroke="#475569" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="560" y="330" class="muted">collect only non-empty pieces</text>

  <rect x="56" y="372" rx="14" ry="14" width="1088" height="190" fill="#0b1220" stroke="#334155"/>
  <text x="82" y="422" class="txt">output:</text>
  <text x="190" y="422" class="token">["one", "two", "three", "four", "five", "six"]</text>

  <text x="82" y="478" class="muted">Complexity: O(N) time, O(N) output space</text>
  <text x="82" y="520" class="muted">Author: Tom🦞</text>
</svg>
