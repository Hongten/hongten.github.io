<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="LeetCode 1974 circular typewriter shortest rotation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="url(#bg)"/>

  <text x="40" y="60" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">LeetCode 1974 · Circular Distance Greedy</text>
  <text x="40" y="96" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">rotation cost = min(|from - to|, 26 - |from - to|), then +1 to type</text>

  <circle cx="330" cy="290" r="170" fill="none" stroke="#334155" stroke-width="18"/>
  <circle cx="330" cy="290" r="170" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="8 10" opacity="0.8"/>

  <text x="318" y="120" fill="#f8fafc" font-size="24" font-family="monospace">a</text>
  <text x="487" y="298" fill="#f8fafc" font-size="24" font-family="monospace">g</text>
  <text x="319" y="472" fill="#f8fafc" font-size="24" font-family="monospace">n</text>
  <text x="157" y="298" fill="#f8fafc" font-size="24" font-family="monospace">t</text>

  <circle cx="330" cy="120" r="12" fill="#22d3ee"/>
  <circle cx="487" cy="290" r="12" fill="#f59e0b"/>
  <path d="M 342 130 A 170 170 0 0 1 475 278" fill="none" stroke="#22d3ee" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="410" y="178" fill="#67e8f9" font-size="20" font-family="Arial">clockwise 6</text>

  <path d="M 318 132 A 170 170 0 1 0 475 302" fill="none" stroke="#fb7185" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="120" y="200" fill="#fda4af" font-size="20" font-family="Arial">counterclockwise 20</text>

  <rect x="560" y="150" width="340" height="230" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="585" y="195" fill="#f8fafc" font-size="24" font-family="Arial" font-weight="700">Example step</text>
  <text x="585" y="235" fill="#cbd5e1" font-size="21" font-family="monospace">cur = 'a', next = 'g'</text>
  <text x="585" y="272" fill="#cbd5e1" font-size="21" font-family="monospace">d = |'g' - 'a'| = 6</text>
  <text x="585" y="309" fill="#cbd5e1" font-size="21" font-family="monospace">move = min(6, 26 - 6) = 6</text>
  <text x="585" y="346" fill="#22d3ee" font-size="21" font-family="monospace">cost = move + 1(type) = 7</text>

  <text x="40" y="500" fill="#94a3b8" font-size="18" font-family="Arial">For each character, choose the shorter arc on the 26-letter ring, then add one second for typing.</text>
</svg>
