<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1854 timeline difference array illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#182a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#eaf2ff" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 1854</text>
  <text x="60" y="130" fill="#9fc0ff" font-size="28" font-family="Inter, Arial, sans-serif">Maximum Population Year (Difference Array + Prefix Sum)</text>

  <line x1="100" y1="460" x2="1100" y2="460" stroke="#9bbcff" stroke-width="3"/>
  <text x="90" y="500" fill="#cfe1ff" font-size="20" font-family="Inter, Arial, sans-serif">1950</text>
  <text x="1060" y="500" fill="#cfe1ff" font-size="20" font-family="Inter, Arial, sans-serif">2050</text>

  <rect x="210" y="360" width="500" height="60" rx="8" fill="#4cd964" opacity="0.9"/>
  <text x="225" y="398" fill="#08240f" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">alive +1 at birth</text>

  <rect x="650" y="270" width="280" height="60" rx="8" fill="#ff6b6b" opacity="0.9"/>
  <text x="668" y="308" fill="#2a0808" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">alive -1 at death</text>

  <path d="M140 240 C280 180, 360 320, 500 250 C620 190, 760 220, 900 170" fill="none" stroke="#ffd166" stroke-width="6"/>
  <circle cx="900" cy="170" r="10" fill="#ffd166"/>
  <text x="915" y="176" fill="#ffe8a3" font-size="22" font-family="Inter, Arial, sans-serif">max prefix year</text>
</svg>
