<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="100" fill="#e5e7eb" font-size="42">LeetCode 3473</text><text x="60" y="160" fill="#93c5fd" font-size="34">Sum of K Subarrays With Length at Least M</text><rect x="60" y="220" width="1080" height="320" rx="20" fill="#111827" stroke="#374151"/><text x="100" y="290" fill="#a7f3d0" font-size="30">DP[t][i] = max(DP[t][i-1], pre[i] + best)</text><text x="100" y="350" fill="#cbd5e1" font-size="28">best = max(best, DP[t-1][i-m] - pre[i-m])</text><text x="100" y="410" fill="#fbbf24" font-size="28">Prefix Sum + Rolling Best, O(nk)</text><text x="100" y="470" fill="#e5e7eb" font-size="26">Author: Tom🦞</text></svg>