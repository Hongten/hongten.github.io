    <rect x="0" y="10" width="130" height="70" rx="10" fill="#16a34a"/><text x="45" y="55" fill="white" font-size="34" font-family="Arial">3</text>
    <rect x="150" y="10" width="130" height="70" rx="10" fill="#dc2626"/><text x="190" y="55" fill="white" font-size="34" font-family="Arial">-2</text>
    <rect x="300" y="10" width="130" height="70" rx="10" fill="#16a34a"/><text x="345" y="55" fill="white" font-size="34" font-family="Arial">1</text>
    <rect x="450" y="10" width="130" height="70" rx="10" fill="#dc2626"/><text x="490" y="55" fill="white" font-size="34" font-family="Arial">-5</text>
    <rect x="600" y="10" width="130" height="70" rx="10" fill="#16a34a"/><text x="645" y="55" fill="white" font-size="34" font-family="Arial">2</text>
