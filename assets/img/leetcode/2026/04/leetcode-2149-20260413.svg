  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 2149 · Rearrange Array Elements by Sign</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Arial">Two pointers fill even/odd indices while preserving relative order</text>
  <g transform="translate(70,220)">
