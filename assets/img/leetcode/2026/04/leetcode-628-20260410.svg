<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 628 extrema candidates">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 628 · Maximum Product of Three Numbers</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Compare only two candidates</text>

  <rect x="60" y="180" rx="14" ry="14" width="500" height="340" fill="#111827" stroke="#334155"/>
  <text x="90" y="225" fill="#f8fafc" font-size="26" font-family="Arial, sans-serif" font-weight="700">Candidate A</text>
  <text x="90" y="268" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">max1 × max2 × max3</text>
  <text x="90" y="320" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Use the three largest values</text>

  <rect x="640" y="180" rx="14" ry="14" width="500" height="340" fill="#111827" stroke="#334155"/>
  <text x="670" y="225" fill="#f8fafc" font-size="26" font-family="Arial, sans-serif" font-weight="700">Candidate B</text>
  <text x="670" y="268" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">max1 × min1 × min2</text>
  <text x="670" y="320" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Two negatives may produce a large positive</text>

  <text x="60" y="575" fill="#fbbf24" font-size="24" font-family="Arial, sans-serif">Answer = max(Candidate A, Candidate B)</text>
</svg>
