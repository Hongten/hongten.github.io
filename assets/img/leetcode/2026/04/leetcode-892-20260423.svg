<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 892 surface area of 3D shapes diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 892 · Surface Area of 3D Shapes</text>
  <text x="60" y="128" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Per stack: 4h + 2, subtract shared faces with neighbors</text>

  <g transform="translate(120,200)">
    <rect x="0" y="220" width="130" height="18" fill="#334155"/>
    <rect x="0" y="160" width="130" height="60" fill="#38bdf8"/>
    <rect x="8" y="150" width="130" height="10" fill="#7dd3fc"/>
    <text x="20" y="250" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">h=1</text>

    <rect x="190" y="220" width="130" height="18" fill="#334155"/>
    <rect x="190" y="100" width="130" height="120" fill="#22d3ee"/>
    <rect x="198" y="90" width="130" height="10" fill="#67e8f9"/>
    <text x="210" y="250" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">h=2</text>

    <rect x="380" y="220" width="130" height="18" fill="#334155"/>
    <rect x="380" y="40" width="130" height="180" fill="#06b6d4"/>
    <rect x="388" y="30" width="130" height="10" fill="#22d3ee"/>
    <text x="400" y="250" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">h=3</text>
  </g>

  <g transform="translate(760,215)">
    <rect x="0" y="0" width="360" height="230" rx="14" fill="#111827" stroke="#374151"/>
    <text x="24" y="46" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Contribution Rule</text>
    <text x="24" y="90" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">ans += 4 * h + 2</text>
    <text x="24" y="130" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">ans -= 2 * min(h, up)</text>
    <text x="24" y="170" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">ans -= 2 * min(h, left)</text>
    <text x="24" y="208" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Only check top and left to avoid double subtraction</text>
  </g>

  <text x="60" y="594" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second · Java default tabs</text>
</svg>
