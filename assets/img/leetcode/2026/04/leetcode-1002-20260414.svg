<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 1002 Find Common Characters</title>
  <desc id="desc">Frequency intersection across words and minimum counts per letter.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1c2a4d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="95" font-family="Inter,Arial,sans-serif" font-size="44" fill="#eaf2ff" font-weight="700">LeetCode 1002 · Find Common Characters</text>
  <text x="70" y="140" font-family="Inter,Arial,sans-serif" font-size="26" fill="#9ec5ff">Min-frequency intersection across all words</text>

  <rect x="70" y="190" width="1060" height="370" rx="20" fill="#111a33" stroke="#345"/>

  <text x="110" y="250" font-family="JetBrains Mono,Consolas,monospace" font-size="26" fill="#ffd166">words = ["bella", "label", "roller"]</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="24" fill="#d7e3ff">
    <text x="110" y="315">bella   : b1 e1 l2 a1</text>
    <text x="110" y="355">label   : l2 a1 b1 e1</text>
    <text x="110" y="395">roller  : r2 o1 l2 e1</text>
  </g>

  <line x1="100" y1="430" x2="1100" y2="430" stroke="#4c6aa6" stroke-width="2"/>
  <text x="110" y="480" font-family="JetBrains Mono,Consolas,monospace" font-size="28" fill="#7ee787">min counts: e1, l2 → output ["e", "l", "l"]</text>

  <text x="70" y="600" font-family="Inter,Arial,sans-serif" font-size="22" fill="#9fb3d9">Author: Tom🦞 · hongten.github.io</text>
</svg>
