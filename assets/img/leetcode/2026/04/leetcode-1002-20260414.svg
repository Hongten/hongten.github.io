<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1002 frequency intersection diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1002 · Find Common Characters</text>
  <text x="56" y="140" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Count each word, take per-letter minimum, then expand answer list.</text>

  <rect x="56" y="186" width="340" height="330" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="78" y="224" fill="#93c5fd" font-size="24" font-family="monospace">bella: a1 b1 e1 l2</text>
  <text x="78" y="264" fill="#93c5fd" font-size="24" font-family="monospace">label: a1 b1 e1 l2</text>
  <text x="78" y="304" fill="#93c5fd" font-size="24" font-family="monospace">roller: e1 l2 r2 o1</text>

  <rect x="432" y="186" width="320" height="330" rx="14" fill="#111827" stroke="#4b5563"/>
  <text x="466" y="236" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">min frequency</text>
  <text x="466" y="286" fill="#e5e7eb" font-size="28" font-family="monospace">e: min(1,1,1)=1</text>
  <text x="466" y="326" fill="#e5e7eb" font-size="28" font-family="monospace">l: min(2,2,2)=2</text>
  <text x="466" y="366" fill="#e5e7eb" font-size="28" font-family="monospace">others: 0</text>

  <rect x="790" y="186" width="354" height="330" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="828" y="248" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Output</text>
  <text x="828" y="312" fill="#e5e7eb" font-size="40" font-family="monospace">["e", "l", "l"]</text>
  <text x="828" y="472" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
