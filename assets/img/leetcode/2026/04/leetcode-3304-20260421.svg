<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3304 binary popcount shift diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3304 · K-th Character in String Game I</text>
  <rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="90" y="220" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Index mapping: x = k - 1</text>
  <text x="90" y="280" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Every bit 1 in x means one "+1 shift" from right-half inheritance</text>
  <text x="90" y="340" fill="#a7f3d0" font-size="30" font-family="Inter,Arial,sans-serif">shifts = popcount(k - 1)</text>
  <text x="90" y="400" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">answer = 'a' + shifts</text>
  <text x="90" y="470" fill="#cbd5e1" font-size="26" font-family="monospace">Example: k = 13 -&gt; x = 12 (1100₂) -&gt; popcount = 2 -&gt; 'c'</text>
</svg>
