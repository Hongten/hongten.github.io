<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3460 one-removal prefix matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2442"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3460 · Longest Common Prefix After at Most One Removal</text>
  <rect x="60" y="130" width="1080" height="430" rx="20" fill="#111827" stroke="#374151"/>

  <text x="95" y="190" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Compare until first mismatch at index k</text>
  <text x="95" y="240" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">s:  m a d x a</text>
  <text x="95" y="285" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">t:  m a d a m</text>
  <line x1="258" y1="250" x2="258" y2="295" stroke="#f87171" stroke-width="4"/>
  <text x="275" y="278" fill="#f87171" font-size="24" font-family="Inter,Arial,sans-serif">mismatch at k</text>

  <text x="95" y="355" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Remove s[k], then continue matching suffix</text>
  <text x="95" y="405" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">s': m a d   a</text>
  <text x="95" y="450" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">t : m a d a m</text>
  <text x="95" y="510" fill="#c4b5fd" font-size="28" font-family="Inter,Arial,sans-serif">Answer = matched prefix length after optional one removal</text>

  <text x="930" y="595" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
