<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1015 remainder cycle diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="36" font-family="Arial" font-weight="700">LeetCode 1015 · Smallest Integer Divisible by K</text>
  <text x="60" y="120" fill="#94a3b8" font-size="22" font-family="Arial">Transition: rem = (rem * 10 + 1) % k, detect 0 or cycle.</text>

  <rect x="70" y="170" width="500" height="360" rx="14" fill="#111827" stroke="#334155"/>
  <text x="95" y="215" fill="#cbd5e1" font-size="22" font-family="Arial">Example: k = 7</text>
  <text x="95" y="260" fill="#22d3ee" font-size="24" font-family="Courier New">len=1, rem=(0*10+1)%7 = 1</text>
  <text x="95" y="300" fill="#22d3ee" font-size="24" font-family="Courier New">len=2, rem=(1*10+1)%7 = 4</text>
  <text x="95" y="340" fill="#22d3ee" font-size="24" font-family="Courier New">len=3, rem=(4*10+1)%7 = 6</text>
  <text x="95" y="380" fill="#22d3ee" font-size="24" font-family="Courier New">len=4, rem=(6*10+1)%7 = 5</text>
  <text x="95" y="420" fill="#22d3ee" font-size="24" font-family="Courier New">len=5, rem=(5*10+1)%7 = 2</text>
  <text x="95" y="460" fill="#34d399" font-size="24" font-family="Courier New">len=6, rem=(2*10+1)%7 = 0 ✓</text>

  <rect x="620" y="170" width="510" height="360" rx="14" fill="#111827" stroke="#334155"/>
  <text x="645" y="215" fill="#cbd5e1" font-size="22" font-family="Arial">State Graph Idea</text>
  <circle cx="700" cy="300" r="38" fill="#1d4ed8"/><text x="687" y="307" fill="#fff" font-size="22" font-family="Arial">1</text>
  <circle cx="820" cy="250" r="38" fill="#1d4ed8"/><text x="807" y="257" fill="#fff" font-size="22" font-family="Arial">4</text>
  <circle cx="940" cy="300" r="38" fill="#1d4ed8"/><text x="927" y="307" fill="#fff" font-size="22" font-family="Arial">6</text>
  <circle cx="940" cy="410" r="38" fill="#1d4ed8"/><text x="927" y="417" fill="#fff" font-size="22" font-family="Arial">5</text>
  <circle cx="820" cy="460" r="38" fill="#1d4ed8"/><text x="807" y="467" fill="#fff" font-size="22" font-family="Arial">2</text>
  <circle cx="700" cy="410" r="38" fill="#16a34a"/><text x="687" y="417" fill="#fff" font-size="22" font-family="Arial">0</text>

  <path d="M738 286 L782 266" stroke="#e2e8f0" stroke-width="3" marker-end="url(#a)"/>
  <path d="M858 266 L902 286" stroke="#e2e8f0" stroke-width="3" marker-end="url(#a)"/>
  <path d="M940 338 L940 372" stroke="#e2e8f0" stroke-width="3" marker-end="url(#a)"/>
  <path d="M902 424 L858 444" stroke="#e2e8f0" stroke-width="3" marker-end="url(#a)"/>
  <path d="M782 444 L738 424" stroke="#e2e8f0" stroke-width="3" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e2e8f0"/></marker></defs>

  <text x="645" y="515" fill="#f59e0b" font-size="18" font-family="Arial">If a remainder repeats before reaching 0, answer is -1.</text>
</svg>
