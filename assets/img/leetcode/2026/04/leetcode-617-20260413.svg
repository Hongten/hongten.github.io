<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 617 merge two binary trees diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{font:700 44px Inter,Arial,sans-serif;fill:#e5e7eb}
      .label{font:600 24px Inter,Arial,sans-serif;fill:#cbd5e1}
      .sum{font:700 28px Inter,Arial,sans-serif;fill:#86efac}
      .node{fill:#1f2937;stroke:#60a5fa;stroke-width:3}
      .node2{fill:#1f2937;stroke:#f472b6;stroke-width:3}
      .node3{fill:#1f2937;stroke:#86efac;stroke-width:3}
      .v{font:700 24px Inter,Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#64748b;stroke-width:3}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="64" class="title">LeetCode 617 · Merge Two Binary Trees</text>
  <text x="48" y="102" class="label">Overlay aligned nodes: sum when both exist, keep non-null branch otherwise</text>

  <text x="220" y="160" class="label">Tree 1</text>
  <line x1="220" y1="210" x2="160" y2="280" class="edge"/><line x1="220" y1="210" x2="280" y2="280" class="edge"/>
  <circle cx="220" cy="200" r="28" class="node"/><text x="220" y="200" class="v">1</text>
  <circle cx="160" cy="300" r="28" class="node"/><text x="160" y="300" class="v">3</text>
  <circle cx="280" cy="300" r="28" class="node"/><text x="280" y="300" class="v">2</text>
  <line x1="160" y1="328" x2="130" y2="390" class="edge"/>
  <circle cx="130" cy="410" r="28" class="node"/><text x="130" y="410" class="v">5</text>

  <text x="600" y="160" class="label">Tree 2</text>
  <line x1="600" y1="210" x2="540" y2="280" class="edge"/><line x1="600" y1="210" x2="660" y2="280" class="edge"/>
  <circle cx="600" cy="200" r="28" class="node2"/><text x="600" y="200" class="v">2</text>
  <circle cx="540" cy="300" r="28" class="node2"/><text x="540" y="300" class="v">1</text>
  <circle cx="660" cy="300" r="28" class="node2"/><text x="660" y="300" class="v">3</text>
  <line x1="540" y1="328" x2="570" y2="390" class="edge"/>
  <line x1="660" y1="328" x2="700" y2="390" class="edge"/>
  <circle cx="570" cy="410" r="28" class="node2"/><text x="570" y="410" class="v">4</text>
  <circle cx="700" cy="410" r="28" class="node2"/><text x="700" y="410" class="v">7</text>

  <text x="900" y="160" class="label">Merged</text>
  <line x1="900" y1="210" x2="840" y2="280" class="edge"/><line x1="900" y1="210" x2="960" y2="280" class="edge"/>
  <circle cx="900" cy="200" r="28" class="node3"/><text x="900" y="200" class="v">3</text>
  <circle cx="840" cy="300" r="28" class="node3"/><text x="840" y="300" class="v">4</text>
  <circle cx="960" cy="300" r="28" class="node3"/><text x="960" y="300" class="v">5</text>
  <line x1="840" y1="328" x2="800" y2="390" class="edge"/><line x1="840" y1="328" x2="870" y2="390" class="edge"/>
  <line x1="960" y1="328" x2="1000" y2="390" class="edge"/>
  <circle cx="800" cy="410" r="28" class="node3"/><text x="800" y="410" class="v">5</text>
  <circle cx="870" cy="410" r="28" class="node3"/><text x="870" y="410" class="v">4</text>
  <circle cx="1000" cy="410" r="28" class="node3"/><text x="1000" y="410" class="v">7</text>

  <text x="48" y="560" class="sum">Rule: merged.val = (a != null ? a.val : 0) + (b != null ? b.val : 0)</text>
</svg>
