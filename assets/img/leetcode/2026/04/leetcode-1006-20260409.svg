<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="LeetCode 1006 clumsy factorial operation blocks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 36px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .small{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .op{font:800 34px 'Segoe UI',Arial,sans-serif;fill:#facc15}
      .num{font:700 30px 'Consolas',monospace;fill:#a7f3d0}
    </style>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="40" y="58" class="title">LeetCode 1006 · Clumsy Factorial</text>
  <text x="40" y="92" class="sub">Process numbers in blocks of 4: * / + -</text>

  <rect x="40" y="130" width="880" height="160" rx="16" fill="#111827" stroke="#334155"/>
  <text x="70" y="175" class="label">Example: n = 10</text>
  <text x="70" y="225" class="num">10</text>
  <text x="140" y="225" class="op">*</text>
  <text x="185" y="225" class="num">9</text>
  <text x="240" y="225" class="op">/</text>
  <text x="285" y="225" class="num">8</text>
  <text x="340" y="225" class="op">+</text>
  <text x="385" y="225" class="num">7</text>
  <text x="440" y="225" class="op">-</text>
  <text x="485" y="225" class="num">6</text>
  <text x="540" y="225" class="op">*</text>
  <text x="585" y="225" class="num">5</text>
  <text x="640" y="225" class="op">/</text>
  <text x="685" y="225" class="num">4</text>
  <text x="740" y="225" class="op">+</text>
  <text x="785" y="225" class="num">3</text>
  <text x="70" y="265" class="small">... continue with -2 *1</text>

  <rect x="40" y="320" width="420" height="170" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="65" y="355" class="label">Stack simulation idea</text>
  <text x="65" y="390" class="small">* and / : modify stack top</text>
  <text x="65" y="422" class="small">+ value : push positive</text>
  <text x="65" y="454" class="small">- value : push negative</text>

  <rect x="500" y="320" width="420" height="170" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="525" y="355" class="label">Pattern (n &gt; 4)</text>
  <text x="525" y="390" class="small">n % 4 == 0 → n + 1</text>
  <text x="525" y="422" class="small">n % 4 == 1 or 2 → n + 2</text>
  <text x="525" y="454" class="small">n % 4 == 3 → n - 1</text>
</svg>
