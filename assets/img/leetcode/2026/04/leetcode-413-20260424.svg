<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 413 arithmetic slices DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .num{font:700 30px 'JetBrains Mono',Consolas,monospace;fill:#f8fafc}
      .lab{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#a5b4fc}
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="78" class="title">LeetCode 413, Arithmetic Slices</text>
  <text x="60" y="116" class="sub">DP by ending position, dp[i] = dp[i-1] + 1 when diff keeps same</text>

  <rect x="70" y="180" width="140" height="90" rx="14" fill="#334155"/>
  <rect x="230" y="180" width="140" height="90" rx="14" fill="#334155"/>
  <rect x="390" y="180" width="140" height="90" rx="14" fill="#334155"/>
  <rect x="550" y="180" width="140" height="90" rx="14" fill="#334155"/>
  <rect x="710" y="180" width="140" height="90" rx="14" fill="#334155"/>

  <text x="130" y="235" class="num">1</text>
  <text x="290" y="235" class="num">3</text>
  <text x="450" y="235" class="num">5</text>
  <text x="610" y="235" class="num">7</text>
  <text x="770" y="235" class="num">9</text>

  <text x="120" y="305" class="lab">i=0</text>
  <text x="280" y="305" class="lab">i=1</text>
  <text x="440" y="305" class="lab">i=2</text>
  <text x="600" y="305" class="lab">i=3</text>
  <text x="760" y="305" class="lab">i=4</text>

  <path d="M210 225 L230 225" stroke="#38bdf8" stroke-width="5" marker-end="url(#arr)"/>
  <path d="M370 225 L390 225" stroke="#38bdf8" stroke-width="5" marker-end="url(#arr)"/>
  <path d="M530 225 L550 225" stroke="#38bdf8" stroke-width="5" marker-end="url(#arr)"/>
  <path d="M690 225 L710 225" stroke="#38bdf8" stroke-width="5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <text x="915" y="210" class="txt">diff = 2, 2, 2, 2</text>
  <text x="915" y="245" class="txt">dp[2]=1</text>
  <text x="915" y="280" class="txt">dp[3]=2</text>
  <text x="915" y="315" class="txt">dp[4]=3</text>
  <text x="915" y="360" class="txt">answer = 1+2+3 = 6</text>

  <rect x="70" y="390" width="1060" height="170" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="445" class="txt">Transition:</text>
  <text x="260" y="445" class="num">if nums[i]-nums[i-1] == nums[i-1]-nums[i-2]</text>
  <text x="100" y="490" class="txt">then</text>
  <text x="180" y="490" class="num">curr = curr + 1</text>
  <text x="500" y="490" class="txt">and</text>
  <text x="570" y="490" class="num">ans += curr</text>
  <text x="100" y="535" class="txt">else</text>
  <text x="180" y="535" class="num">curr = 0</text>
</svg>
