<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628" role="img" aria-label="LeetCode 1024 greedy interval expansion diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="628" fill="url(#bg)"/>

  <text x="70" y="78" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 1024 · Video Stitching</text>
  <text x="70" y="118" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Greedy layer expansion on [0, time]</text>

  <line x1="100" y1="340" x2="1100" y2="340" stroke="#cbd5e1" stroke-width="4"/>
  <text x="92" y="375" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">0</text>
  <text x="1085" y="375" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">time</text>

  <rect x="140" y="260" width="220" height="28" rx="8" fill="#22d3ee" opacity="0.85"/>
  <rect x="230" y="210" width="300" height="28" rx="8" fill="#38bdf8" opacity="0.85"/>
  <rect x="430" y="160" width="360" height="28" rx="8" fill="#60a5fa" opacity="0.85"/>
  <rect x="640" y="110" width="380" height="28" rx="8" fill="#818cf8" opacity="0.9"/>

  <text x="146" y="254" fill="#67e8f9" font-size="18" font-family="Arial, sans-serif">clips starting in current layer</text>

  <line x1="140" y1="420" x2="360" y2="420" stroke="#34d399" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="138" y="452" fill="#a7f3d0" font-size="20" font-family="Arial, sans-serif">pick #1: currEnd → farthest</text>

  <line x1="360" y1="490" x2="790" y2="490" stroke="#f59e0b" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="358" y="522" fill="#fde68a" font-size="20" font-family="Arial, sans-serif">pick #2: expand next layer</text>

  <line x1="790" y1="560" x2="1080" y2="560" stroke="#f472b6" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="788" y="592" fill="#fbcfe8" font-size="20" font-family="Arial, sans-serif">reach time with minimum clips</text>
</svg>
