<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2570 two-pointer merge diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="52" y="74" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2570 · Merge Two 2D Arrays by Summing Values</text>
  <text x="52" y="112" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Two pointers over sorted ids: smaller id moves first, equal ids sum.</text>

  <rect x="52" y="152" width="520" height="176" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="78" y="188" fill="#d1d5db" font-size="24" font-family="JetBrains Mono,Consolas,monospace">nums1</text>
  <text x="78" y="230" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">[1,2]  [2,3]  [4,5]</text>
  <circle cx="164" cy="260" r="16" fill="#2563eb"/>
  <text x="157" y="267" fill="#fff" font-size="18" font-family="Inter,Arial,sans-serif" font-weight="700">i</text>

  <rect x="628" y="152" width="520" height="176" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="654" y="188" fill="#d1d5db" font-size="24" font-family="JetBrains Mono,Consolas,monospace">nums2</text>
  <text x="654" y="230" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">[1,4]  [3,2]  [4,1]</text>
  <circle cx="740" cy="260" r="16" fill="#10b981"/>
  <text x="732" y="267" fill="#fff" font-size="18" font-family="Inter,Arial,sans-serif" font-weight="700">j</text>

  <line x1="560" y1="360" x2="640" y2="360" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="485" y="350" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">compare ids</text>

  <rect x="160" y="398" width="880" height="170" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="192" y="438" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Merged output (sorted):</text>
  <text x="192" y="484" fill="#86efac" font-size="32" font-family="JetBrains Mono,Consolas,monospace">[1,6]  [2,3]  [3,2]  [4,6]</text>
  <text x="192" y="528" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">id=1 and id=4 appear in both arrays, so values are added.</text>

  <text x="52" y="602" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
