<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1736 greedy replacement diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1736 · Latest Time by Replacing Hidden Digits</text>
  <rect x="60" y="130" width="1080" height="440" rx="20" fill="#0f172a" stroke="#334155"/>

  <text x="110" y="210" fill="#93c5fd" font-size="36" font-family="monospace">Input: 2?:?0</text>
  <text x="110" y="265" fill="#cbd5e1" font-size="30" font-family="Inter,Arial,sans-serif">Greedy from left to right (higher place first)</text>

  <rect x="100" y="300" width="1000" height="200" rx="14" fill="#111827" stroke="#374151"/>
  <text x="130" y="350" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">H1='?' → choose 2 when H2 ≤ 3, else 1</text>
  <text x="130" y="390" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">H2='?' → choose 3 if H1=2, else 9</text>
  <text x="130" y="430" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">M1='?' → 5, M2='?' → 9</text>
  <text x="130" y="470" fill="#f8fafc" font-size="30" font-family="monospace">Result: 23:50 (latest valid)</text>

  <text x="60" y="605" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second · Java/Go/C++/Python/JS tabs</text>
</svg>
