<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2032 two-out-of-three bitmask diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2032 · Two Out of Three</text>
  <text x="60" y="138" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Per-array dedup + presence bitmask</text>

  <g transform="translate(120,210)">
    <circle cx="210" cy="170" r="130" fill="#1d4ed8" fill-opacity="0.35" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="350" cy="170" r="130" fill="#16a34a" fill-opacity="0.35" stroke="#86efac" stroke-width="3"/>
    <circle cx="280" cy="290" r="130" fill="#9333ea" fill-opacity="0.35" stroke="#c4b5fd" stroke-width="3"/>

    <text x="142" y="72" fill="#bfdbfe" font-size="24" font-family="Inter,Arial,sans-serif">nums1 (bit 1)</text>
    <text x="318" y="72" fill="#bbf7d0" font-size="24" font-family="Inter,Arial,sans-serif">nums2 (bit 2)</text>
    <text x="218" y="440" fill="#ddd6fe" font-size="24" font-family="Inter,Arial,sans-serif">nums3 (bit 4)</text>

    <text x="258" y="192" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">keep</text>
    <text x="222" y="226" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">if bits >= 2</text>
  </g>

  <rect x="760" y="220" width="360" height="260" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="792" y="276" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Example masks:</text>
  <text x="792" y="326" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">001 / 010 / 100 → one array</text>
  <text x="792" y="366" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">011 / 101 / 110 → keep</text>
  <text x="792" y="406" fill="#c4b5fd" font-size="24" font-family="Inter,Arial,sans-serif">111 → keep</text>

  <text x="60" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文后置, full code tabs in both sections</text>
</svg>
