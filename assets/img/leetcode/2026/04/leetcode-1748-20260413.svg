<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1748 frequency counting flow">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1748 · Sum of Unique Elements</text>

  <rect x="60" y="150" width="280" height="360" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="90" y="200" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Input nums</text>
  <text x="90" y="250" fill="#e5e7eb" font-size="30" font-family="monospace">[1, 2, 3, 2]</text>

  <rect x="460" y="150" width="300" height="360" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="490" y="200" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Frequency Map</text>
  <text x="490" y="255" fill="#e5e7eb" font-size="30" font-family="monospace">1 → 1</text>
  <text x="490" y="300" fill="#e5e7eb" font-size="30" font-family="monospace">2 → 2</text>
  <text x="490" y="345" fill="#e5e7eb" font-size="30" font-family="monospace">3 → 1</text>

  <rect x="860" y="150" width="280" height="360" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="890" y="200" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Keep count == 1</text>
  <text x="890" y="260" fill="#e5e7eb" font-size="30" font-family="monospace">1 + 3 = 4</text>
  <text x="890" y="315" fill="#fde68a" font-size="28" font-family="Inter,Arial,sans-serif">Answer: 4</text>

  <path d="M340 330 L460 330" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 330 L860 330" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
