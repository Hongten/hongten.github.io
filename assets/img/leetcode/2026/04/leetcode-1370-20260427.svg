<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1370 Increasing Decreasing String diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1370: Increasing Decreasing String</text>
  <text x="60" y="148" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Count letters, scan a→z then z→a repeatedly</text>

  <rect x="60" y="210" width="1080" height="340" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="265" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Example: s = "aaaabbbbcccc"</text>
  <text x="100" y="320" fill="#e5e7eb" font-size="28" font-family="monospace">Round 1 ↑ : a b c</text>
  <text x="100" y="365" fill="#fca5a5" font-size="28" font-family="monospace">Round 1 ↓ : c b a</text>
  <text x="100" y="410" fill="#e5e7eb" font-size="28" font-family="monospace">Round 2 ↑ : a b c</text>
  <text x="100" y="455" fill="#fca5a5" font-size="28" font-family="monospace">Round 2 ↓ : c b a</text>
  <text x="100" y="510" fill="#fde68a" font-size="28" font-family="Inter,Arial,sans-serif">Result: abccbaabccba</text>
</svg>
