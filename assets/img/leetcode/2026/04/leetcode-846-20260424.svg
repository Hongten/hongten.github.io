<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 846 hand of straights grouping diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="94" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 846: Hand of Straights</text>
  <text x="56" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Greedy start from the smallest remaining card</text>

  <rect x="56" y="190" width="1088" height="370" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="245" fill="#f9fafb" font-size="26" font-family="monospace">hand = [1,2,3,6,2,3,4,7,8], groupSize = 3</text>

  <rect x="90" y="280" width="290" height="70" rx="10" fill="#0f766e"/>
  <text x="120" y="325" fill="#ecfeff" font-size="30" font-family="monospace">1 2 3</text>

  <rect x="420" y="280" width="290" height="70" rx="10" fill="#1d4ed8"/>
  <text x="450" y="325" fill="#eff6ff" font-size="30" font-family="monospace">2 3 4</text>

  <rect x="750" y="280" width="290" height="70" rx="10" fill="#7c3aed"/>
  <text x="780" y="325" fill="#f5f3ff" font-size="30" font-family="monospace">6 7 8</text>

  <text x="90" y="410" fill="#d1fae5" font-size="24" font-family="Inter,Arial,sans-serif">Count each value, then repeatedly consume consecutive chains.</text>
  <text x="90" y="450" fill="#d1d5db" font-size="22" font-family="Inter,Arial,sans-serif">If any required next number is missing, answer is false.</text>
  <text x="90" y="510" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
