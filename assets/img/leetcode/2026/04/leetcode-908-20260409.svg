<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 908 smallest range interval shrink diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
    </marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 908 · Smallest Range I</text>
  <text x="60" y="108" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Shrink [min, max] by moving min up (≤k) and max down (≤k)</text>

  <line x1="120" y1="250" x2="1080" y2="250" stroke="#64748b" stroke-width="4"/>

  <circle cx="260" cy="250" r="10" fill="#f97316"/>
  <text x="220" y="220" fill="#fb923c" font-size="24" font-family="Inter,Arial,sans-serif">minV</text>

  <circle cx="920" cy="250" r="10" fill="#22d3ee"/>
  <text x="890" y="220" fill="#67e8f9" font-size="24" font-family="Inter,Arial,sans-serif">maxV</text>

  <line x1="260" y1="290" x2="380" y2="290" stroke="#f97316" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="290" y="330" fill="#fdba74" font-size="22" font-family="Inter,Arial,sans-serif">+k</text>

  <line x1="920" y1="290" x2="800" y2="290" stroke="#22d3ee" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="850" y="330" fill="#7dd3fc" font-size="22" font-family="Inter,Arial,sans-serif">-k</text>

  <rect x="380" y="236" width="420" height="28" fill="#334155" rx="8"/>
  <text x="470" y="200" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">final gap = max(0, (maxV - minV) - 2k)</text>

  <text x="60" y="455" fill="#e2e8f0" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="600">If intervals overlap, answer becomes 0.</text>
  <text x="60" y="490" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Each number can move within [nums[i]-k, nums[i]+k], but extremes decide the minimum possible range.</text>
</svg>
