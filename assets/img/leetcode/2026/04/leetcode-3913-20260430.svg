<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="110" fill="#93c5fd" font-size="42" font-family="Arial">LeetCode 3913 - DP Partition</text><rect x="60" y="160" width="1080" height="360" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="230" fill="#e5e7eb" font-size="28" font-family="monospace">dp[i] = min(dp[j-1] + max(nums[j..i]) + k)</text><text x="90" y="280" fill="#cbd5e1" font-size="24" font-family="monospace">enumerate cut j backward, keep running max</text><line x1="90" y1="340" x2="1110" y2="340" stroke="#334155"/><text x="90" y="390" fill="#86efac" font-size="24" font-family="monospace">Time: O(n^2), Space: O(n)</text></svg>