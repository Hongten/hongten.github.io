<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1758 mismatch counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-family:Consolas,Monaco,monospace;fill:#f8fafc}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t" font-size="42" font-weight="700">LeetCode 1758</text>
  <text x="60" y="130" class="t" font-size="28">Minimum Changes To Make Alternating Binary String</text>

  <rect x="60" y="180" width="1080" height="180" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="230" class="m" font-size="34">s          : 1 1 1 0 1</text>
  <text x="90" y="275" class="m" font-size="34">pattern A  : 0 1 0 1 0   mismatches = 3</text>
  <text x="90" y="320" class="m" font-size="34">pattern B  : 1 0 1 0 1   mismatches = 2</text>

  <text x="60" y="430" class="t" font-size="34">Answer = min(mismatches with 0101..., mismatches with 1010...)</text>
  <text x="60" y="485" class="t" font-size="34">Time O(n), Space O(1)</text>

  <rect x="60" y="525" width="520" height="54" rx="10" fill="#1d4ed8"/>
  <text x="85" y="560" class="t" font-size="28" font-weight="700">Dual pattern count, pick the smaller</text>
</svg>
