<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 280 Wiggle Sort invariant diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 280 · Wiggle Sort</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Single Pass Adjacent Swap · Local Invariant</text>

  <rect x="70" y="200" width="1060" height="320" rx="20" fill="#1f2937" stroke="#374151"/>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="46" font-weight="700">
    <text x="140" y="330" fill="#f9fafb">a0</text>
    <text x="280" y="330" fill="#86efac">≤</text>
    <text x="360" y="330" fill="#f9fafb">a1</text>
    <text x="500" y="330" fill="#fca5a5">≥</text>
    <text x="580" y="330" fill="#f9fafb">a2</text>
    <text x="720" y="330" fill="#86efac">≤</text>
    <text x="800" y="330" fill="#f9fafb">a3</text>
    <text x="940" y="330" fill="#fca5a5">≥</text>
    <text x="1020" y="330" fill="#f9fafb">a4</text>
  </g>

  <text x="130" y="395" fill="#d1d5db" font-size="28" font-family="Inter,Arial,sans-serif">Odd i: ensure nums[i] ≥ nums[i-1]</text>
  <text x="130" y="435" fill="#d1d5db" font-size="28" font-family="Inter,Arial,sans-serif">Even i: ensure nums[i] ≤ nums[i-1]</text>
  <text x="130" y="478" fill="#34d399" font-size="26" font-family="Inter,Arial,sans-serif">If violation appears, swap this adjacent pair immediately.</text>

  <text x="60" y="585" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
