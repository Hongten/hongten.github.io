<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="110" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 3010 - Minimum Cost I</text><text x="60" y="180" fill="#93c5fd" font-size="30" font-family="Arial">answer = nums[0] + two smallest in nums[1..]</text><rect x="60" y="240" width="1080" height="300" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="305" fill="#cbd5e1" font-size="30" font-family="monospace">nums = [9, 4, 7, 2, 8]</text><text x="90" y="360" fill="#facc15" font-size="30" font-family="monospace">fixed: nums[0] = 9</text><text x="90" y="415" fill="#86efac" font-size="30" font-family="monospace">suffix minima: 2, 4</text><text x="90" y="470" fill="#fda4af" font-size="34" font-family="monospace">minimum cost = 9 + 2 + 4 = 15</text></svg>