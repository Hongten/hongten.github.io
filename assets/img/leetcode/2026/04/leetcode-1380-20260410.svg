<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 1380 Lucky Numbers in a Matrix</title>
  <desc id="desc">A 3x3 matrix where 15 is highlighted as the row minimum and column maximum, therefore a lucky number.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .cell { fill: #111827; stroke: #334155; stroke-width: 2; }
      .txt { font: 700 30px 'JetBrains Mono', Consolas, monospace; fill: #e5e7eb; text-anchor: middle; dominant-baseline: middle; }
      .hl { fill: #14532d; stroke: #22c55e; stroke-width: 3; }
      .lab { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #86efac; }
      .note { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #facc15; }
      .arrow { stroke: #facc15; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#facc15" />
    </marker>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="40" y="56" class="title">LeetCode 1380: Lucky Numbers in a Matrix</text>
  <text x="40" y="88" class="sub">Row minimum + Column maximum</text>

  <g transform="translate(250,140)">
    <rect class="cell" x="0" y="0" width="140" height="90"/>
    <rect class="cell" x="140" y="0" width="140" height="90"/>
    <rect class="cell" x="280" y="0" width="140" height="90"/>

    <rect class="cell" x="0" y="90" width="140" height="90"/>
    <rect class="hl" x="140" y="90" width="140" height="90"/>
    <rect class="cell" x="280" y="90" width="140" height="90"/>

    <rect class="cell" x="0" y="180" width="140" height="90"/>
    <rect class="cell" x="140" y="180" width="140" height="90"/>
    <rect class="cell" x="280" y="180" width="140" height="90"/>

    <text class="txt" x="70" y="45">3</text>
    <text class="txt" x="210" y="45">7</text>
    <text class="txt" x="350" y="45">8</text>

    <text class="txt" x="70" y="135">9</text>
    <text class="txt" x="210" y="135">15</text>
    <text class="txt" x="350" y="135">13</text>

    <text class="txt" x="70" y="225">6</text>
    <text class="txt" x="210" y="225">16</text>
    <text class="txt" x="350" y="225">17</text>

    <text x="-170" y="140" class="lab">Row 2 minimum = 15</text>
    <text x="150" y="315" class="lab">Column 2 maximum = 15</text>
    <path class="arrow" d="M -10 132 L 128 132"/>
    <path class="arrow" d="M 210 295 L 210 192"/>
  </g>

  <text x="40" y="502" class="note">Lucky number = value that is minimum in its row and maximum in its column</text>
</svg>
