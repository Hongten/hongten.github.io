<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1518 water bottle exchange flow diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1518 · Water Bottles</text>
  <text x="60" y="135" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Greedy exchange simulation: drink → collect empty → exchange</text>

  <rect x="70" y="200" width="250" height="140" rx="16" fill="#1f2937" stroke="#4b5563"/>
  <text x="95" y="255" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Full bottles</text>
  <text x="95" y="295" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">drink all</text>

  <rect x="470" y="200" width="250" height="140" rx="16" fill="#1f2937" stroke="#4b5563"/>
  <text x="495" y="255" fill="#fde68a" font-size="30" font-family="Inter,Arial,sans-serif">Empty bottles</text>
  <text x="495" y="295" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">count + remainder</text>

  <rect x="860" y="200" width="250" height="140" rx="16" fill="#1f2937" stroke="#4b5563"/>
  <text x="885" y="255" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Exchange</text>
  <text x="885" y="295" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">numExchange → 1 full</text>

  <line x1="320" y1="270" x2="470" y2="270" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="720" y1="270" x2="860" y2="270" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M985,340 C985,420 760,460 320,440" fill="none" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="70" y="540" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Invariant: whenever empty ≥ numExchange, total drinks can still increase.</text>
  <text x="70" y="585" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
