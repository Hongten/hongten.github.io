<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 386 lexicographical numbers preorder traversal diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 386: Lexicographical Numbers</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Preorder traversal on an implicit 10-ary tree</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30" fill="#e5e7eb">
    <rect x="60" y="180" width="1080" height="380" rx="18" fill="#111827" stroke="#374151"/>
    <text x="110" y="240" fill="#86efac">1</text>
    <text x="200" y="240" fill="#86efac">10</text>
    <text x="310" y="240" fill="#86efac">100</text>
    <text x="440" y="240" fill="#86efac">...</text>
    <text x="520" y="240" fill="#86efac">109</text>
    <text x="640" y="240" fill="#fca5a5">↩ up</text>

    <text x="110" y="310" fill="#93c5fd">11</text>
    <text x="200" y="310" fill="#93c5fd">110</text>
    <text x="320" y="310" fill="#93c5fd">...</text>
    <text x="400" y="310" fill="#93c5fd">119</text>
    <text x="520" y="310" fill="#fca5a5">↩ up</text>

    <text x="110" y="380" fill="#fcd34d">12</text>
    <text x="200" y="380" fill="#fcd34d">...</text>
    <text x="260" y="380" fill="#fcd34d">19</text>
    <text x="340" y="380" fill="#fca5a5">↩ up</text>

    <text x="110" y="450" fill="#c4b5fd">2</text>
    <text x="180" y="450" fill="#c4b5fd">20</text>
    <text x="270" y="450" fill="#c4b5fd">...</text>
    <text x="340" y="450" fill="#c4b5fd">29</text>
    <text x="430" y="450" fill="#c4b5fd">3 ... 9</text>

    <text x="110" y="520" fill="#9ca3af" font-size="24">Rule: go child (x10) first; if blocked, climb until next sibling exists, then +1.</text>
  </g>
  <text x="60" y="600" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
