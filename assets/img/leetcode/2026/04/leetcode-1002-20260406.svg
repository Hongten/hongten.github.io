<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1002 common characters minimum frequency intersection">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:38px;font-weight:700}
      .s{font-size:24px;fill:#cbd5e1}
      .box{fill:#111827;stroke:#334155;stroke-width:2;rx:16}
      .k{font-size:22px;font-weight:600}
      .v{font-size:30px;font-weight:700;fill:#38bdf8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t m">LeetCode 1002 · Find Common Characters</text>
  <text x="60" y="120" class="t s">For each letter, answer count = minimum frequency across all words</text>

  <rect x="60" y="170" width="340" height="160" class="box"/>
  <text x="85" y="215" class="t k">words[0] = "bella"</text>
  <text x="85" y="260" class="t">b:1  e:1  l:2  a:1</text>

  <rect x="430" y="170" width="340" height="160" class="box"/>
  <text x="455" y="215" class="t k">words[1] = "label"</text>
  <text x="455" y="260" class="t">l:2  a:1  b:1  e:1</text>

  <rect x="800" y="170" width="340" height="160" class="box"/>
  <text x="825" y="215" class="t k">words[2] = "roller"</text>
  <text x="825" y="260" class="t">r:2  o:1  l:2  e:1</text>

  <line x1="220" y1="360" x2="980" y2="360" stroke="#475569" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="520" y="400" class="t k">Take per-letter MIN</text>

  <rect x="280" y="430" width="640" height="140" class="box"/>
  <text x="320" y="490" class="t k">min counts:  e:1, l:2</text>
  <text x="320" y="535" class="t v">Answer = ["e", "l", "l"]</text>
</svg>
