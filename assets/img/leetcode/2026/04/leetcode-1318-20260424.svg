<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1318 bit flip cases">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1318 · Bit-by-Bit Greedy</text>
  <rect x="60" y="130" width="1080" height="440" rx="16" fill="#111827" stroke="#374151"/>

  <text x="100" y="195" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Per-bit rules for (a OR b) == c</text>

  <rect x="100" y="230" width="1000" height="130" rx="12" fill="#1f2937" stroke="#4b5563"/>
  <text x="130" y="285" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Case 1: cBit = 1</text>
  <text x="130" y="325" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">If aBit = 0 and bBit = 0, need 1 flip. Otherwise 0.</text>

  <rect x="100" y="385" width="1000" height="130" rx="12" fill="#1f2937" stroke="#4b5563"/>
  <text x="130" y="440" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Case 2: cBit = 0</text>
  <text x="130" y="480" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Both bits must be 0, flips = aBit + bBit.</text>

  <text x="60" y="605" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
