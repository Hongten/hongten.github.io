<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1018 rolling modulo diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1018 · Binary Prefix Divisible By 5</text>
  <text x="52" y="138" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Rolling remainder: rem = (rem * 2 + bit) % 5</text>
  <rect x="52" y="182" width="1096" height="396" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="84" y="238" fill="#86efac" font-size="26" font-family="JetBrains Mono,Consolas,monospace">bits:   1   0   1   1   0</text>
  <text x="84" y="286" fill="#e2e8f0" font-size="24" font-family="JetBrains Mono,Consolas,monospace">prefix: 1   2   5  11  22</text>
  <text x="84" y="334" fill="#f9a8d4" font-size="24" font-family="JetBrains Mono,Consolas,monospace">mod 5:  1   2   0   1   2</text>
  <text x="84" y="382" fill="#fde68a" font-size="24" font-family="JetBrains Mono,Consolas,monospace">ans:    F   F   T   F   F</text>
  <line x1="84" y1="420" x2="1116" y2="420" stroke="#475569" stroke-width="2"/>
  <text x="84" y="470" fill="#cbd5e1" font-size="23" font-family="Inter,Arial,sans-serif">Only remainder is needed, so values never overflow.</text>
  <text x="84" y="510" fill="#cbd5e1" font-size="23" font-family="Inter,Arial,sans-serif">Divisible by 5 exactly when remainder equals 0.</text>
  <text x="84" y="552" fill="#86efac" font-size="23" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
