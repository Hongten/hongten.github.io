<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 566 reshape matrix mapping diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .h{font-size:42px;font-weight:700}
      .s{font-size:24px;fill:#cbd5e1}
      .cell{fill:#334155;stroke:#94a3b8;stroke-width:2}
      .num{font-size:26px;font-weight:700;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .lab{font-size:24px;font-weight:700;fill:#93c5fd}
      .arrow{stroke:#f59e0b;stroke-width:6;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t h">LeetCode 566 - Reshape the Matrix</text>
  <text x="60" y="120" class="t s">Keep row-major order via flat index k: src[k/n] -&gt; dst[k/c]</text>

  <text x="120" y="180" class="t lab">Original 2 x 3</text>
  <rect x="90" y="210" width="90" height="90" class="cell"/><text x="135" y="255" class="num">1</text>
  <rect x="180" y="210" width="90" height="90" class="cell"/><text x="225" y="255" class="num">2</text>
  <rect x="270" y="210" width="90" height="90" class="cell"/><text x="315" y="255" class="num">3</text>
  <rect x="90" y="300" width="90" height="90" class="cell"/><text x="135" y="345" class="num">4</text>
  <rect x="180" y="300" width="90" height="90" class="cell"/><text x="225" y="345" class="num">5</text>
  <rect x="270" y="300" width="90" height="90" class="cell"/><text x="315" y="345" class="num">6</text>

  <path d="M400 295 C520 295, 530 295, 650 295" class="arrow"/>
  <text x="470" y="270" class="t s">flatten order: 1,2,3,4,5,6</text>

  <text x="740" y="180" class="t lab">Reshaped 3 x 2</text>
  <rect x="710" y="210" width="90" height="90" class="cell"/><text x="755" y="255" class="num">1</text>
  <rect x="800" y="210" width="90" height="90" class="cell"/><text x="845" y="255" class="num">2</text>
  <rect x="710" y="300" width="90" height="90" class="cell"/><text x="755" y="345" class="num">3</text>
  <rect x="800" y="300" width="90" height="90" class="cell"/><text x="845" y="345" class="num">4</text>
  <rect x="710" y="390" width="90" height="90" class="cell"/><text x="755" y="435" class="num">5</text>
  <rect x="800" y="390" width="90" height="90" class="cell"/><text x="845" y="435" class="num">6</text>

  <text x="60" y="560" class="t s">Check first: m*n == r*c, otherwise return original matrix.</text>
</svg>
