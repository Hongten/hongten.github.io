<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 947 connected components illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 42px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .stone{fill:#38bdf8;stroke:#e0f2fe;stroke-width:3}
      .edge{stroke:#22d3ee;stroke-width:3;opacity:.7}
      .box{fill:none;stroke:#94a3b8;stroke-dasharray:8 8;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 947</text>
  <text x="60" y="118" class="sub">Most Stones Removed with Same Row or Column</text>

  <rect x="70" y="170" width="500" height="360" rx="16" class="box"/>
  <line x1="170" y1="250" x2="320" y2="250" class="edge"/>
  <line x1="320" y1="250" x2="320" y2="390" class="edge"/>
  <line x1="170" y1="390" x2="320" y2="390" class="edge"/>
  <circle cx="170" cy="250" r="16" class="stone"/>
  <circle cx="320" cy="250" r="16" class="stone"/>
  <circle cx="170" cy="390" r="16" class="stone"/>
  <circle cx="320" cy="390" r="16" class="stone"/>
  <text x="120" y="470" class="txt">Component A: 4 stones, remove 3</text>

  <rect x="640" y="170" width="500" height="360" rx="16" class="box"/>
  <line x1="760" y1="250" x2="930" y2="250" class="edge"/>
  <circle cx="760" cy="250" r="16" class="stone"/>
  <circle cx="930" cy="250" r="16" class="stone"/>
  <circle cx="845" cy="390" r="16" class="stone"/>
  <text x="700" y="470" class="txt">Component B: 3 stones, remove 2</text>

  <text x="60" y="585" class="txt">Answer = total stones - connected components</text>
</svg>
