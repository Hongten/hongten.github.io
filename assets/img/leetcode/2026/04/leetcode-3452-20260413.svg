<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3452 Sum of Good Numbers diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3452 · Sum of Good Numbers</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Compare nums[i] with nums[i-k] and nums[i+k] (if they exist)</text>

  <rect x="56" y="180" width="1088" height="380" rx="20" fill="#0f172a" stroke="#334155"/>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30" text-anchor="middle">
    <rect x="120" y="320" width="110" height="90" rx="10" fill="#1e293b"/>
    <rect x="250" y="320" width="110" height="90" rx="10" fill="#1e293b"/>
    <rect x="380" y="320" width="110" height="90" rx="10" fill="#16a34a"/>
    <rect x="510" y="320" width="110" height="90" rx="10" fill="#1e293b"/>
    <rect x="640" y="320" width="110" height="90" rx="10" fill="#1e293b"/>

    <text x="175" y="355" fill="#94a3b8" font-size="20">i-k</text>
    <text x="305" y="355" fill="#94a3b8" font-size="20">...</text>
    <text x="435" y="355" fill="#dcfce7" font-size="20">i</text>
    <text x="565" y="355" fill="#94a3b8" font-size="20">...</text>
    <text x="695" y="355" fill="#94a3b8" font-size="20">i+k</text>

    <text x="175" y="388" fill="#e2e8f0">a</text>
    <text x="435" y="388" fill="#052e16">x</text>
    <text x="695" y="388" fill="#e2e8f0">b</text>
  </g>

  <path d="M435 300 L175 260" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M435 300 L695 260" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <text x="600" y="505" text-anchor="middle" fill="#e2e8f0" font-size="30" font-family="Inter,Arial,sans-serif">Good if x &gt; a and x &gt; b (only compare existing neighbors)</text>
  <text x="600" y="545" text-anchor="middle" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
