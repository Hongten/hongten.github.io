<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 377 ordered dynamic programming diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:2;rx:14}
      .txt{font:600 24px 'Consolas','Courier New',monospace;fill:#e2e8f0}
      .note{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .arrow{stroke:#22d3ee;stroke-width:3;marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 377 · Combination Sum IV</text>
  <text x="60" y="128" class="sub">Ordered DP: dp[s] += dp[s - num]</text>

  <rect x="80" y="190" width="180" height="90" class="box"/>
  <text x="110" y="246" class="txt">dp[0]=1</text>

  <rect x="330" y="190" width="180" height="90" class="box"/>
  <text x="360" y="246" class="txt">dp[1]=1</text>

  <rect x="580" y="190" width="180" height="90" class="box"/>
  <text x="610" y="246" class="txt">dp[2]=2</text>

  <rect x="830" y="190" width="220" height="90" class="box"/>
  <text x="860" y="246" class="txt">dp[3]=4</text>

  <line x1="260" y1="235" x2="330" y2="235" class="arrow"/>
  <line x1="510" y1="235" x2="580" y2="235" class="arrow"/>
  <line x1="760" y1="235" x2="830" y2="235" class="arrow"/>

  <text x="80" y="360" class="note">Example: nums = [1,2,3], target = 4</text>
  <text x="80" y="400" class="note">dp[4] = dp[3] + dp[2] + dp[1] = 4 + 2 + 1 = 7</text>
  <text x="80" y="440" class="note">Because order matters: (1,3) and (3,1) are different sequences.</text>

  <rect x="80" y="485" width="1040" height="90" rx="16" fill="#0b1220" stroke="#7dd3fc" stroke-width="2"/>
  <text x="110" y="540" class="txt">Loop sums outside, numbers inside → permutations are counted correctly.</text>
</svg>
