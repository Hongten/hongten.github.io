<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3115 first and last prime index diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#131a2b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="700">LeetCode 3115: Maximum Prime Difference</text>
  <text x="56" y="132" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="26">Track first and last prime indices, answer = last - first</text>

  <rect x="56" y="188" width="1088" height="330" rx="18" fill="#1f2937" stroke="#374151"/>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="28" fill="#d1d5db">
    <text x="92" y="255">nums:  [4,  8,  2,  15,  7,  9,  11,  6]</text>
    <text x="92" y="300">index:  0   1   2    3   4   5    6   7</text>
  </g>

  <circle cx="445" cy="360" r="34" fill="#0f766e"/>
  <circle cx="890" cy="360" r="34" fill="#0f766e"/>
  <text x="432" y="370" fill="#ecfeff" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700">2</text>
  <text x="875" y="370" fill="#ecfeff" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700">6</text>

  <path d="M479 360 L856 360" stroke="#60a5fa" stroke-width="6" marker-start="url(#m1)" marker-end="url(#m2)"/>
  <defs>
    <marker id="m1" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M10 0 L0 5 L10 10" fill="#60a5fa"/>
    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="592" y="345" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="22">prime indices span</text>
  <text x="530" y="420" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700">answer = 6 - 2 = 4</text>

  <text x="56" y="585" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="24">Author: Tom🦞</text>
</svg>
