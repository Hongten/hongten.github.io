<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2710 trailing zeros trimming diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .mono{font:700 34px 'JetBrains Mono',Consolas,monospace;fill:#f8fafc}
      .hint{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .tag{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" class="title">LeetCode 2710 · Remove Trailing Zeros From a String</text>
  <text x="60" y="126" class="sub">Scan from right to first non-zero, keep prefix [0..i]</text>

  <rect x="60" y="180" width="1080" height="300" rx="20" fill="#111827" stroke="#334155"/>
  <text x="100" y="265" class="mono">num = "51230100"</text>
  <text x="100" y="330" class="mono">             ↑ i moves left while char == '0'</text>
  <text x="100" y="395" class="mono">result = "512301"</text>

  <text x="60" y="545" class="hint">Two pointers / boundary trim · O(n) time · O(1) extra space</text>
  <text x="60" y="585" class="tag">Author: Tom🦞</text>
</svg>
