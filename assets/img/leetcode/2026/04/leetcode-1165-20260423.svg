<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1165 single-row keyboard distance accumulation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1165: Single-Row Keyboard</text>
  <rect x="50" y="130" width="1100" height="120" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="70" y="205" fill="#93c5fd" font-size="34" font-family="monospace">abcdefghijklmnopqrstuvwxyz</text>
  <circle cx="120" cy="330" r="22" fill="#f59e0b"/><text x="112" y="338" fill="#111827" font-size="18" font-family="Inter,Arial,sans-serif" font-weight="700">j</text>
  <circle cx="360" cy="330" r="22" fill="#34d399"/><text x="352" y="338" fill="#111827" font-size="18" font-family="Inter,Arial,sans-serif" font-weight="700">c</text>
  <circle cx="760" cy="330" r="22" fill="#60a5fa"/><text x="752" y="338" fill="#111827" font-size="18" font-family="Inter,Arial,sans-serif" font-weight="700">m</text>
  <path d="M120 330 L360 330 L760 330" stroke="#e5e7eb" stroke-width="4" fill="none" stroke-dasharray="10 8"/>
  <text x="70" y="410" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Build pos[char] once, then sum |next - cur| for each typed letter.</text>
  <text x="70" y="460" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Time: O(n), Space: O(1)</text>
  <text x="70" y="520" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
