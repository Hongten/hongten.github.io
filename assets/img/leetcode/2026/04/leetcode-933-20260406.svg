<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 933 sliding window queue diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 933 · Number of Recent Calls</text>
  <text x="56" y="132" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Queue keeps timestamps in [t-3000, t]</text>

  <rect x="56" y="182" width="1088" height="320" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="236" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Incoming pings (strictly increasing time)</text>
  <line x1="90" y1="264" x2="1100" y2="264" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="110" y="310" width="140" height="72" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="145" y="355" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">1</text>
  <rect x="270" y="310" width="140" height="72" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="305" y="355" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">100</text>
  <rect x="430" y="310" width="140" height="72" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="463" y="355" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">3001</text>
  <rect x="590" y="310" width="140" height="72" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="623" y="355" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">3002</text>

  <rect x="770" y="302" width="340" height="92" rx="12" fill="#0b1220" stroke="#10b981"/>
  <text x="792" y="336" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">At t = 3002, drop &lt; 2</text>
  <text x="792" y="368" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Queue = [100, 3001, 3002] → 3</text>

  <text x="90" y="450" fill="#fbbf24" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: front is always the oldest valid timestamp.</text>
  <text x="90" y="490" fill="#34d399" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
