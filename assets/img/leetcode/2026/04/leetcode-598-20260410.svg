<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 598 Range Addition II intersection area illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 598 · Range Addition II</text>
  <text x="60" y="125" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">All operations overlap on top-left intersection: min(a) × min(b)</text>

  <rect x="120" y="180" width="520" height="340" fill="none" stroke="#64748b" stroke-width="3"/>
  <text x="330" y="548" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">m × n matrix</text>

  <rect x="120" y="180" width="430" height="280" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="560" y="214" fill="#7dd3fc" font-size="20" font-family="Arial, sans-serif">op1: [a1,b1]</text>

  <rect x="120" y="180" width="360" height="220" fill="none" stroke="#22c55e" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="490" y="242" fill="#86efac" font-size="20" font-family="Arial, sans-serif">op2: [a2,b2]</text>

  <rect x="120" y="180" width="290" height="170" fill="#f59e0b" fill-opacity="0.28" stroke="#fbbf24" stroke-width="3"/>
  <text x="430" y="332" fill="#fde68a" font-size="22" font-family="Arial, sans-serif">Intersection</text>
  <text x="430" y="362" fill="#fde68a" font-size="22" font-family="Arial, sans-serif">max count area</text>

  <text x="760" y="250" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">Answer</text>
  <text x="760" y="300" fill="#f8fafc" font-size="40" font-family="Courier New, monospace" font-weight="700">minA × minB</text>
  <text x="760" y="355" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">Initialize minA = m, minB = n</text>
  <text x="760" y="390" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">For each [a,b]:</text>
  <text x="760" y="425" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">minA = min(minA, a)</text>
  <text x="760" y="460" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">minB = min(minB, b)</text>
</svg>
