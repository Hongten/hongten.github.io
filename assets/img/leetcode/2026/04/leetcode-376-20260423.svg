<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 376 wiggle subsequence sign-change counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#9ad1ff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#eaf2ff" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 376: Wiggle Subsequence</text>
  <text x="60" y="130" fill="#b8c7e6" font-size="26" font-family="Inter,Arial,sans-serif">Greedy: count turning points by sign changes of differences</text>

  <polyline points="120,430 220,290 320,410 420,260 520,390 620,250 720,360 820,230" fill="none" stroke="#58a6ff" stroke-width="6"/>
  <circle cx="120" cy="430" r="8" fill="#58a6ff"/><circle cx="220" cy="290" r="8" fill="#58a6ff"/>
  <circle cx="320" cy="410" r="8" fill="#58a6ff"/><circle cx="420" cy="260" r="8" fill="#58a6ff"/>
  <circle cx="520" cy="390" r="8" fill="#58a6ff"/><circle cx="620" cy="250" r="8" fill="#58a6ff"/>
  <circle cx="720" cy="360" r="8" fill="#58a6ff"/><circle cx="820" cy="230" r="8" fill="#58a6ff"/>

  <line x1="235" y1="280" x2="305" y2="395" stroke="#9ad1ff" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="335" y1="400" x2="405" y2="270" stroke="#9ad1ff" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="435" y1="270" x2="505" y2="380" stroke="#9ad1ff" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="860" y="260" fill="#ffdf6b" font-size="24" font-family="Inter,Arial,sans-serif">Each sign change: +1 length</text>
  <text x="860" y="300" fill="#ffdf6b" font-size="24" font-family="Inter,Arial,sans-serif">start with length = 1</text>

  <rect x="860" y="350" width="280" height="160" rx="14" fill="#0f1a30" stroke="#355a8a"/>
  <text x="885" y="390" fill="#cfe3ff" font-size="22" font-family="Consolas,Monaco,monospace">prevDiff = 0</text>
  <text x="885" y="425" fill="#cfe3ff" font-size="22" font-family="Consolas,Monaco,monospace">if currDiff changes sign</text>
  <text x="885" y="460" fill="#cfe3ff" font-size="22" font-family="Consolas,Monaco,monospace">then wiggleLen++</text>
</svg>
