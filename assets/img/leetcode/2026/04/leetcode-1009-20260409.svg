<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1009 bitmask complement diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .title{font:700 46px Inter,Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 28px Inter,Arial,sans-serif;fill:#cbd5e1}
      .label{font:600 24px Inter,Arial,sans-serif;fill:#93c5fd}
      .bits{font:700 38px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}
      .ok{font:700 34px Inter,Arial,sans-serif;fill:#86efac}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="86" class="title">LeetCode 1009: Complement of Base 10 Integer</text>
  <text x="56" y="128" class="sub">Bitmask + XOR flip on effective bits only</text>

  <rect x="56" y="170" width="1088" height="380" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="90" y="235" class="label">n = 5</text>
  <text x="220" y="235" class="bits">101</text>

  <text x="90" y="305" class="label">mask = 7</text>
  <text x="220" y="305" class="bits">111</text>

  <text x="90" y="375" class="label">mask XOR n</text>
  <text x="220" y="375" class="bits">111 XOR 101 = 010</text>

  <text x="90" y="455" class="ok">answer = 2</text>
  <text x="90" y="510" class="sub">Author: Tom🦞</text>
</svg>
