<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="LeetCode 925 long-pressed name two-pointer grouping diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 38px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .cell{font:700 28px 'Consolas','Menlo',monospace;fill:#0f172a}
      .ok{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#86efac}
      .note{font:600 21px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .small{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>

  <text x="60" y="70" class="title">LeetCode 925 · Long Pressed Name</text>
  <text x="60" y="106" class="sub">Two-pointer group matching: each typed group count must be &gt;= name group count</text>

  <text x="60" y="175" class="label">name  =</text>
  <rect x="220" y="135" width="80" height="60" rx="10" fill="#93c5fd"/>
  <rect x="305" y="135" width="80" height="60" rx="10" fill="#93c5fd"/>
  <rect x="390" y="135" width="80" height="60" rx="10" fill="#fdba74"/>
  <rect x="475" y="135" width="80" height="60" rx="10" fill="#a7f3d0"/>
  <text x="252" y="175" class="cell">a</text>
  <text x="337" y="175" class="cell">l</text>
  <text x="422" y="175" class="cell">e</text>
  <text x="507" y="175" class="cell">x</text>

  <text x="60" y="285" class="label">typed =</text>
  <rect x="220" y="245" width="80" height="60" rx="10" fill="#93c5fd"/>
  <rect x="305" y="245" width="80" height="60" rx="10" fill="#93c5fd"/>
  <rect x="390" y="245" width="80" height="60" rx="10" fill="#fde68a"/>
  <rect x="475" y="245" width="80" height="60" rx="10" fill="#fdba74"/>
  <rect x="560" y="245" width="80" height="60" rx="10" fill="#fdba74"/>
  <rect x="645" y="245" width="80" height="60" rx="10" fill="#fdba74"/>
  <rect x="730" y="245" width="80" height="60" rx="10" fill="#a7f3d0"/>
  <text x="252" y="285" class="cell">a</text>
  <text x="337" y="285" class="cell">l</text>
  <text x="422" y="285" class="cell">e</text>
  <text x="507" y="285" class="cell">e</text>
  <text x="592" y="285" class="cell">e</text>
  <text x="677" y="285" class="cell">e</text>
  <text x="762" y="285" class="cell">x</text>

  <line x1="432" y1="195" x2="432" y2="245" stroke="#f59e0b" stroke-width="4" stroke-dasharray="8 7"/>
  <line x1="602" y1="195" x2="602" y2="245" stroke="#f59e0b" stroke-width="4" stroke-dasharray="8 7"/>

  <text x="860" y="170" class="note">Group check</text>
  <text x="860" y="210" class="small">name:  e × 1</text>
  <text x="860" y="242" class="small">typed: e × 4</text>
  <text x="860" y="282" class="ok">✓ 4 ≥ 1, valid long press</text>

  <rect x="60" y="375" width="1080" height="240" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="425" class="note">Algorithm (O(n + m), O(1))</text>
  <text x="90" y="465" class="small">1) Walk both strings with pointers i, j.</text>
  <text x="90" y="500" class="small">2) For each matching character c, count consecutive c in name and typed.</text>
  <text x="90" y="535" class="small">3) If typedCount &lt; nameCount, return false immediately.</text>
  <text x="90" y="570" class="small">4) At the end, both pointers must finish exactly.</text>
</svg>
