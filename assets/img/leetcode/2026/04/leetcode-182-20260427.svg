<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 182 duplicate emails grouping diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 182: Duplicate Emails</text>
  <text x="52" y="132" fill="#93c5fd" font-size="25" font-family="Inter,Arial,sans-serif">GROUP BY email + HAVING COUNT(*) &gt; 1</text>

  <rect x="60" y="185" width="510" height="345" rx="14" fill="#111827" stroke="#334155"/>
  <text x="82" y="220" fill="#cbd5e1" font-size="22" font-family="monospace">Person Table</text>
  <text x="82" y="258" fill="#94a3b8" font-size="20" font-family="monospace">id   email</text>
  <text x="82" y="292" fill="#e2e8f0" font-size="20" font-family="monospace">1    a@x.com</text>
  <text x="82" y="324" fill="#e2e8f0" font-size="20" font-family="monospace">2    b@x.com</text>
  <text x="82" y="356" fill="#e2e8f0" font-size="20" font-family="monospace">3    a@x.com</text>
  <text x="82" y="388" fill="#e2e8f0" font-size="20" font-family="monospace">4    c@x.com</text>
  <text x="82" y="420" fill="#e2e8f0" font-size="20" font-family="monospace">5    b@x.com</text>

  <path d="M610 345 L760 345" stroke="#60a5fa" stroke-width="6" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="790" y="230" width="350" height="240" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="815" y="275" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Result</text>
  <text x="815" y="320" fill="#f8fafc" font-size="24" font-family="monospace">Email</text>
  <text x="815" y="360" fill="#f8fafc" font-size="24" font-family="monospace">a@x.com</text>
  <text x="815" y="398" fill="#f8fafc" font-size="24" font-family="monospace">b@x.com</text>

  <text x="52" y="585" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
