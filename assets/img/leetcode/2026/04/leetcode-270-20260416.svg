<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 270 closest BST value diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .n{fill:#0b1220;stroke:#38bdf8;stroke-width:3}
      .h{fill:#14532d;stroke:#22c55e;stroke-width:3}
      .e{stroke:#64748b;stroke-width:3}
      .k{fill:#93c5fd;font-size:26px}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t" font-size="44" font-weight="700">LeetCode 270 · Closest Binary Search Tree Value</text>
  <text x="60" y="120" class="t" font-size="24">Walk like binary search, update best distance on each visited node.</text>

  <line x1="430" y1="220" x2="290" y2="320" class="e"/>
  <line x1="430" y1="220" x2="570" y2="320" class="e"/>
  <line x1="570" y1="320" x2="650" y2="420" class="e"/>

  <circle cx="430" cy="220" r="42" class="n"/>
  <text x="430" y="230" class="t" font-size="28" text-anchor="middle">4</text>

  <circle cx="290" cy="320" r="38" class="n"/>
  <text x="290" y="329" class="t" font-size="24" text-anchor="middle">2</text>

  <circle cx="570" cy="320" r="38" class="h"/>
  <text x="570" y="329" class="t" font-size="24" text-anchor="middle">5</text>

  <circle cx="650" cy="420" r="34" class="h"/>
  <text x="650" y="428" class="t" font-size="22" text-anchor="middle">6</text>

  <text x="760" y="260" class="k">target = 3.714286</text>
  <text x="760" y="310" class="t" font-size="24">Visited path: 4 → 2</text>
  <text x="760" y="350" class="t" font-size="24">|4 - target| = 0.285714</text>
  <text x="760" y="390" class="t" font-size="24">|2 - target| = 1.714286</text>
  <text x="760" y="440" class="t" font-size="30" font-weight="700">Answer: 4</text>
</svg>
