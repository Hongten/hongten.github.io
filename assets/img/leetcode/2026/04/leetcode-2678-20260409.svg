<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2678 age parsing diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2678: Number of Senior Citizens</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Parse age from fixed positions [11..12] in each detail string</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <rect x="100" y="245" width="1000" height="80" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="120" y="295" fill="#e5e7eb" font-size="30" font-family="monospace">"7868190130M7522"</text>

  <text x="120" y="370" fill="#fbbf24" font-size="26" font-family="Inter,Arial,sans-serif">index: ... 10 11 12 13 14</text>
  <text x="120" y="410" fill="#a7f3d0" font-size="30" font-family="Inter,Arial,sans-serif">age = detail[11..12] = "75"</text>
  <text x="120" y="455" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">if age &gt; 60 =&gt; seniorCount++</text>
  <text x="120" y="505" fill="#cbd5e1" font-size="25" font-family="Inter,Arial,sans-serif">Single pass, O(n) time, O(1) extra space</text>

  <text x="60" y="595" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
