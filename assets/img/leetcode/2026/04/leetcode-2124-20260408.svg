<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2124 boundary check diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2124 · Check if All A's Appears Before All B's</text>
  <rect x="60" y="150" width="1080" height="390" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="95" y="215" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Valid pattern: all 'a' on the left, all 'b' on the right</text>
  <rect x="95" y="245" width="420" height="70" rx="12" fill="#14532d"/>
  <rect x="525" y="245" width="520" height="70" rx="12" fill="#1e3a8a"/>
  <text x="130" y="290" fill="#dcfce7" font-size="38" font-family="monospace">a a a a a</text>
  <text x="560" y="290" fill="#dbeafe" font-size="38" font-family="monospace">b b b b b b</text>
  <line x1="520" y1="235" x2="520" y2="330" stroke="#fbbf24" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="450" y="360" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">boundary</text>

  <text x="95" y="420" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Invalid when 'a' appears after we already saw 'b'</text>
  <rect x="95" y="445" width="950" height="70" rx="12" fill="#3f1d2e"/>
  <text x="130" y="490" fill="#fecdd3" font-size="38" font-family="monospace">a a b b a  ← violation</text>
</svg>
