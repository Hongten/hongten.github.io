<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2161 partition array according to given pivot diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2161 · Partition Array According to Given Pivot</text>

  <rect x="80" y="150" width="1040" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="120" y="210" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">nums = [9, 12, 5, 10, 14, 3, 10], pivot = 10</text>

  <rect x="120" y="250" width="280" height="90" rx="12" fill="#0f766e"/>
  <text x="145" y="304" fill="#ecfeff" font-size="30" font-family="monospace">less: [9, 5, 3]</text>

  <rect x="460" y="250" width="280" height="90" rx="12" fill="#7c3aed"/>
  <text x="485" y="304" fill="#f3e8ff" font-size="30" font-family="monospace">equal: [10, 10]</text>

  <rect x="800" y="250" width="280" height="90" rx="12" fill="#b45309"/>
  <text x="825" y="304" fill="#fffbeb" font-size="30" font-family="monospace">greater: [12, 14]</text>

  <path d="M260 355 L260 410 L540 410" stroke="#93c5fd" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M600 355 L600 460" stroke="#c4b5fd" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M940 355 L940 410 L660 410" stroke="#fdba74" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d1d5db"/>
    </marker>
  </defs>

  <rect x="300" y="480" width="600" height="70" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="335" y="525" fill="#d1fae5" font-size="30" font-family="monospace">result = [9, 5, 3, 10, 10, 12, 14]</text>
</svg>
