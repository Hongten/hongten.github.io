<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1640 piece-head map matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1640: Check Array Formation Through Concatenation</text>
  <text x="56" y="126" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Map piece head → piece, then scan arr sequentially</text>

  <rect x="56" y="170" width="1088" height="170" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="80" y="210" fill="#93c5fd" font-size="26" font-family="monospace">arr = [91, 4, 64, 78]</text>
  <rect x="80" y="228" width="980" height="88" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="102" y="282" fill="#e5e7eb" font-size="34" font-family="monospace">[91]   [4, 64]   [78]</text>

  <rect x="56" y="368" width="520" height="210" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="80" y="410" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">piece-head index map</text>
  <text x="86" y="452" fill="#e5e7eb" font-size="28" font-family="monospace">91 → [91]</text>
  <text x="86" y="490" fill="#e5e7eb" font-size="28" font-family="monospace">4  → [4, 64]</text>
  <text x="86" y="528" fill="#e5e7eb" font-size="28" font-family="monospace">78 → [78]</text>

  <rect x="624" y="368" width="520" height="210" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="648" y="410" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">scan rule</text>
  <text x="654" y="452" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">1) lookup by arr[i]</text>
  <text x="654" y="488" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">2) match full piece in order</text>
  <text x="654" y="524" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">3) mismatch/missing piece → false</text>
  <text x="654" y="560" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">all matched → true</text>
</svg>
