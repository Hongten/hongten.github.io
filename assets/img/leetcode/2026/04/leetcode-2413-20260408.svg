<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="LeetCode 2413 parity diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#334155;stroke-width:3;rx:18}
      .t{font:600 30px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .small{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .ok{fill:#16a34a}
      .warn{fill:#f59e0b}
      .arrow{stroke:#64748b;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="70" y="88" class="title">LeetCode 2413 · Smallest Even Multiple</text>
  <text x="70" y="128" class="sub">If n is even → answer n; else → answer 2n</text>

  <rect x="100" y="210" width="300" height="160" class="box"/>
  <text x="145" y="275" class="t">Input: n</text>
  <text x="130" y="320" class="small">Check parity: n % 2</text>

  <line x1="400" y1="290" x2="560" y2="220" class="arrow"/>
  <line x1="400" y1="290" x2="560" y2="360" class="arrow"/>

  <rect x="560" y="150" width="520" height="150" class="box"/>
  <circle cx="620" cy="225" r="16" class="ok"/>
  <text x="650" y="235" class="t">n is even  →  answer = n</text>
  <text x="650" y="270" class="small">Already divisible by 2 and n</text>

  <rect x="560" y="320" width="520" height="150" class="box"/>
  <circle cx="620" cy="395" r="16" class="warn"/>
  <text x="650" y="405" class="t">n is odd  →  answer = 2 × n</text>
  <text x="650" y="440" class="small">Smallest even number still divisible by n</text>

  <text x="70" y="610" class="sub">Time: O(1) · Space: O(1)</text>
</svg>
