<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1128 domino pair counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="94" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1128 · Number of Equivalent Domino Pairs</text>

  <rect x="56" y="140" width="520" height="420" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="86" y="190" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Normalize each domino</text>
  <text x="86" y="238" fill="#e5e7eb" font-size="24" font-family="monospace">[2,1] -&gt; [1,2] key=12</text>
  <text x="86" y="278" fill="#e5e7eb" font-size="24" font-family="monospace">[1,2] -&gt; [1,2] key=12</text>
  <text x="86" y="318" fill="#e5e7eb" font-size="24" font-family="monospace">[3,4] -&gt; [3,4] key=34</text>
  <text x="86" y="358" fill="#e5e7eb" font-size="24" font-family="monospace">[5,6] -&gt; [5,6] key=56</text>
  <text x="86" y="398" fill="#e5e7eb" font-size="24" font-family="monospace">[4,3] -&gt; [3,4] key=34</text>
  <text x="86" y="458" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Equivalent =&gt; same canonical key</text>

  <rect x="624" y="140" width="520" height="420" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="654" y="190" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Incremental counting</text>
  <text x="654" y="238" fill="#e5e7eb" font-size="24" font-family="monospace">freq[12]=0, ans+=0, freq[12]=1</text>
  <text x="654" y="278" fill="#e5e7eb" font-size="24" font-family="monospace">freq[12]=1, ans+=1, freq[12]=2</text>
  <text x="654" y="318" fill="#e5e7eb" font-size="24" font-family="monospace">freq[34]=0, ans+=0, freq[34]=1</text>
  <text x="654" y="358" fill="#e5e7eb" font-size="24" font-family="monospace">freq[56]=0, ans+=0, freq[56]=1</text>
  <text x="654" y="398" fill="#e5e7eb" font-size="24" font-family="monospace">freq[34]=1, ans+=1, freq[34]=2</text>
  <text x="654" y="458" fill="#fde68a" font-size="26" font-family="Inter,Arial,sans-serif">Total ans = 2</text>

  <text x="56" y="602" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual · Java default tabs</text>
</svg>
