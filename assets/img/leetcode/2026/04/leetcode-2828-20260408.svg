<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2828 acronym diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 2828 · Acronym Check</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">words = ["alice", "bob", "charlie"], s = "abc"</text>

  <rect x="70" y="210" width="300" height="80" rx="14" fill="#1d4ed8"/>
  <rect x="430" y="210" width="300" height="80" rx="14" fill="#2563eb"/>
  <rect x="790" y="210" width="300" height="80" rx="14" fill="#3b82f6"/>
  <text x="95" y="260" fill="#fff" font-size="38" font-family="monospace">alice → a</text>
  <text x="455" y="260" fill="#fff" font-size="38" font-family="monospace">bob → b</text>
  <text x="815" y="260" fill="#fff" font-size="38" font-family="monospace">charlie → c</text>

  <path d="M200 330 L200 390 L600 390" stroke="#f8fafc" stroke-width="4" fill="none"/>
  <path d="M560 370 L600 390 L560 410" stroke="#f8fafc" stroke-width="4" fill="none"/>

  <text x="500" y="455" fill="#fbbf24" font-size="52" font-family="monospace" font-weight="700">"abc" == s ?</text>
  <text x="500" y="530" fill="#86efac" font-size="46" font-family="Arial, sans-serif" font-weight="700">YES → true</text>
</svg>
