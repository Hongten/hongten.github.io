<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1903 rightmost odd cutoff diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1903 · Largest Odd Number in String</text>
  <text x="56" y="144" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Scan from right to left, stop at first odd digit</text>

  <rect x="56" y="200" width="1088" height="350" rx="20" fill="#111827" stroke="#334155"/>

  <text x="96" y="270" fill="#cbd5e1" font-size="30" font-family="monospace">s = 3 5 4 2 7 0 8</text>
  <line x1="96" y1="300" x2="960" y2="300" stroke="#334155" stroke-width="3"/>

  <circle cx="860" cy="270" r="28" fill="#1e293b" stroke="#475569"/>
  <text x="850" y="280" fill="#f8fafc" font-size="28" font-family="monospace">8</text>
  <text x="905" y="280" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">even → skip</text>

  <circle cx="710" cy="270" r="28" fill="#14532d" stroke="#22c55e"/>
  <text x="700" y="280" fill="#f0fdf4" font-size="28" font-family="monospace">7</text>
  <text x="760" y="280" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">odd → cut here</text>

  <path d="M730 330 L730 430" stroke="#22c55e" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <text x="96" y="470" fill="#e5e7eb" font-size="32" font-family="Inter,Arial,sans-serif">Answer = prefix[0..index] = "35427"</text>
  <text x="96" y="520" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">If no odd digit exists, return empty string.</text>
</svg>
