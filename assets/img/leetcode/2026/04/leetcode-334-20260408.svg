<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:34px;font-weight:700}
      .s{font-size:22px;fill:#94a3b8}
      .b{font-size:28px;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <text x="60" y="80" class="t m">LeetCode 334 · Increasing Triplet Subsequence</text>
  <text x="60" y="120" class="t s">Greedy: maintain two thresholds first and second</text>

  <rect x="70" y="190" width="180" height="90" rx="14" fill="#334155"/>
  <text x="160" y="246" text-anchor="middle" class="t b">first = 2</text>

  <rect x="330" y="190" width="210" height="90" rx="14" fill="#1d4ed8"/>
  <text x="435" y="246" text-anchor="middle" class="t b">second = 5</text>

  <rect x="640" y="190" width="250" height="90" rx="14" fill="#059669"/>
  <text x="765" y="246" text-anchor="middle" class="t b">current = 6</text>

  <path d="M250 235 L330 235" stroke="#94a3b8" stroke-width="6" marker-end="url(#a)"/>
  <path d="M540 235 L640 235" stroke="#94a3b8" stroke-width="6" marker-end="url(#a)"/>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="70" y="360" class="t s">Scan rule:</text>
  <text x="70" y="400" class="t s">1) x &lt;= first  → first = x</text>
  <text x="70" y="438" class="t s">2) else if x &lt;= second → second = x</text>
  <text x="70" y="476" class="t s">3) else return true (found first &lt; second &lt; x)</text>
</svg>
