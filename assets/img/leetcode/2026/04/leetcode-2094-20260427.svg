<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2094 Finding 3-Digit Even Numbers diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2094: Finding 3-Digit Even Numbers</text>
  <rect x="56" y="128" width="1088" height="436" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="88" y="185" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Count digits first, then enumerate even numbers (100..998).</text>
  <rect x="88" y="216" width="1024" height="310" rx="12" fill="#111827" stroke="#334155"/>
  <text x="112" y="262" fill="#86efac" font-size="27" font-family="monospace">cnt[d] = available count from input digits</text>
  <text x="112" y="305" fill="#fca5a5" font-size="27" font-family="monospace">for x in {100, 102, ..., 998}:</text>
  <text x="152" y="346" fill="#e5e7eb" font-size="25" font-family="monospace">need[a]++, need[b]++, need[c]++</text>
  <text x="152" y="386" fill="#e5e7eb" font-size="25" font-family="monospace">if need[d] &lt;= cnt[d] for all d: add x</text>
  <text x="152" y="426" fill="#fde68a" font-size="25" font-family="monospace">Ascending loop gives sorted unique answer</text>
  <text x="112" y="488" fill="#c4b5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN + 中文 · Java default tabs</text>
