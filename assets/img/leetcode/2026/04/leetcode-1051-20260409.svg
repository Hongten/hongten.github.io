<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1051 Height Checker counting and mismatch diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="86" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1051 · Height Checker</text>
  <text x="56" y="128" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Count frequencies (1..100) → rebuild expected order → count mismatches</text>

  <rect x="56" y="170" width="520" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="86" y="212" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Original heights</text>
  <text x="86" y="254" fill="#d1d5db" font-size="28" font-family="JetBrains Mono,Consolas,monospace">[1, 1, 4, 2, 1, 3]</text>
  <text x="86" y="308" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Count:</text>
  <text x="86" y="344" fill="#d1fae5" font-size="24" font-family="JetBrains Mono,Consolas,monospace">1→3, 2→1, 3→1, 4→1</text>

  <rect x="624" y="170" width="520" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="654" y="212" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Expected sorted order</text>
  <text x="654" y="254" fill="#d1d5db" font-size="28" font-family="JetBrains Mono,Consolas,monospace">[1, 1, 1, 2, 3, 4]</text>
  <text x="654" y="308" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Mismatch indices:</text>
  <text x="654" y="344" fill="#fecaca" font-size="24" font-family="JetBrains Mono,Consolas,monospace">2, 4, 5  →  answer = 3</text>

  <text x="56" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 · Java/Go/C++/Python/JavaScript tabs</text>
</svg>
