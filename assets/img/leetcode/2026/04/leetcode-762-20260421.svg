<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 762 prime set bits diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#182848"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e6edf3" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 762</text>
  <text x="60" y="140" fill="#9fb3c8" font-size="28" font-family="Arial, Helvetica, sans-serif">Prime Number of Set Bits in Binary Representation</text>

  <rect x="60" y="190" width="500" height="360" rx="18" fill="#111a2e" stroke="#355070"/>
  <text x="90" y="240" fill="#7cc7ff" font-size="26" font-family="monospace">x = 10  (1010)  =&gt; popcount = 2  ✓ prime</text>
  <text x="90" y="290" fill="#7cc7ff" font-size="26" font-family="monospace">x = 11  (1011)  =&gt; popcount = 3  ✓ prime</text>
  <text x="90" y="340" fill="#ffcc66" font-size="26" font-family="monospace">x = 12  (1100)  =&gt; popcount = 2  ✓ prime</text>
  <text x="90" y="390" fill="#ffcc66" font-size="26" font-family="monospace">x = 13  (1101)  =&gt; popcount = 3  ✓ prime</text>
  <text x="90" y="440" fill="#ff7b72" font-size="26" font-family="monospace">x = 14  (1110)  =&gt; popcount = 3  ✓ prime</text>
  <text x="90" y="490" fill="#ff7b72" font-size="26" font-family="monospace">x = 15  (1111)  =&gt; popcount = 4  ✗ not prime</text>

  <rect x="620" y="190" width="520" height="360" rx="18" fill="#0f1f1a" stroke="#2f855a"/>
  <text x="660" y="250" fill="#86efac" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Prime popcount set</text>
  <text x="660" y="305" fill="#d1fae5" font-size="34" font-family="monospace">{2, 3, 5, 7, 11, 13, 17, 19}</text>
  <text x="660" y="380" fill="#9ae6b4" font-size="26" font-family="Arial, Helvetica, sans-serif">For each x in [left, right]:</text>
  <text x="660" y="425" fill="#9ae6b4" font-size="26" font-family="Arial, Helvetica, sans-serif">1) count set bits</text>
  <text x="660" y="465" fill="#9ae6b4" font-size="26" font-family="Arial, Helvetica, sans-serif">2) check if in set</text>
  <text x="660" y="505" fill="#9ae6b4" font-size="26" font-family="Arial, Helvetica, sans-serif">3) accumulate answer</text>
</svg>
