<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1498 two-pointer counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="76" fill="#e5e7eb" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1498 · Sort + Two Pointers + 2^(r-l)</text>
  <text x="52" y="114" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Fix minimum at left, squeeze right, count free middle picks modulo 1e9+7</text>

  <rect x="52" y="150" width="1096" height="410" rx="16" fill="#111827" stroke="#374151"/>

  <text x="92" y="210" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Sorted nums:</text>
  <rect x="92" y="238" width="90" height="56" rx="8" fill="#1f2937" stroke="#4b5563"/>
  <rect x="194" y="238" width="90" height="56" rx="8" fill="#1f2937" stroke="#4b5563"/>
  <rect x="296" y="238" width="90" height="56" rx="8" fill="#1f2937" stroke="#4b5563"/>
  <rect x="398" y="238" width="90" height="56" rx="8" fill="#1f2937" stroke="#4b5563"/>
  <rect x="500" y="238" width="90" height="56" rx="8" fill="#1f2937" stroke="#4b5563"/>
  <rect x="602" y="238" width="90" height="56" rx="8" fill="#1f2937" stroke="#4b5563"/>
  <text x="127" y="274" text-anchor="middle" fill="#e5e7eb" font-size="24" font-family="monospace">l</text>
  <text x="245" y="274" text-anchor="middle" fill="#9ca3af" font-size="22" font-family="monospace">·</text>
  <text x="347" y="274" text-anchor="middle" fill="#9ca3af" font-size="22" font-family="monospace">·</text>
  <text x="449" y="274" text-anchor="middle" fill="#9ca3af" font-size="22" font-family="monospace">·</text>
  <text x="551" y="274" text-anchor="middle" fill="#9ca3af" font-size="22" font-family="monospace">·</text>
  <text x="647" y="274" text-anchor="middle" fill="#e5e7eb" font-size="24" font-family="monospace">r</text>

  <path d="M130 320 L640 320" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="355" y="348" text-anchor="middle" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">nums[l] + nums[r] ≤ target ?</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="92" y="382" width="470" height="138" rx="12" fill="#052e16" stroke="#166534"/>
  <text x="110" y="420" fill="#86efac" font-size="25" font-family="Inter,Arial,sans-serif">If valid:</text>
  <text x="110" y="454" fill="#dcfce7" font-size="23" font-family="Inter,Arial,sans-serif">count += 2^(r-l)</text>
  <text x="110" y="486" fill="#dcfce7" font-size="23" font-family="Inter,Arial,sans-serif">(middle elements choose or skip freely)</text>

  <rect x="592" y="382" width="520" height="138" rx="12" fill="#3f1d1d" stroke="#7f1d1d"/>
  <text x="610" y="420" fill="#fecaca" font-size="25" font-family="Inter,Arial,sans-serif">If too large:</text>
  <text x="610" y="454" fill="#fee2e2" font-size="23" font-family="Inter,Arial,sans-serif">move r left to reduce max</text>
  <text x="610" y="486" fill="#fee2e2" font-size="23" font-family="Inter,Arial,sans-serif">otherwise when valid, move l right</text>

  <text x="52" y="602" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
