<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 507 perfect number divisor pairing diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 507: Perfect Number</text>
  <text x="60" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Divisor pairs only need scan to √n</text>

  <rect x="60" y="180" width="1080" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="235" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Example: num = 28</text>
  <text x="100" y="280" fill="#86efac" font-size="25" font-family="Inter,Arial,sans-serif">Divisor pairs: (1, 28), (2, 14), (4, 7)</text>

  <line x1="120" y1="330" x2="1080" y2="330" stroke="#475569" stroke-width="2"/>
  <text x="140" y="375" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Proper divisors (exclude 28): 1 + 2 + 4 + 7 + 14 = 28</text>
  <text x="140" y="420" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">If sum == num → perfect number</text>

  <text x="140" y="480" fill="#93c5fd" font-size="23" font-family="Inter,Arial,sans-serif">Loop d from 2 while d*d ≤ num</text>
  <text x="140" y="520" fill="#93c5fd" font-size="23" font-family="Inter,Arial,sans-serif">When num % d == 0, add d and num/d (avoid duplicate on perfect square)</text>

  <text x="900" y="600" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
