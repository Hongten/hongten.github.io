<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2085 frequency intersection diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e0e1dd}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#3a506b;stroke:#5bc0be;stroke-width:3;rx:18}
      .label{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#ffffff}
      .text{font:500 24px 'Consolas','Menlo',monospace;fill:#d8f3ff}
      .ok{fill:#0f766e;stroke:#5eead4;stroke-width:2;rx:14}
      .okText{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#ecfeff}
      .foot{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="80" class="title">LeetCode 2085 · Count Common Words With One Occurrence</text>
  <text x="60" y="118" class="sub">Build freq1 + freq2, count words where freq1[w] = 1 and freq2[w] = 1</text>

  <rect x="70" y="170" width="470" height="300" class="box"/>
  <text x="95" y="215" class="label">words1 frequency map</text>
  <text x="95" y="260" class="text">leetcode: 1</text>
  <text x="95" y="300" class="text">rocks:    2</text>
  <text x="95" y="340" class="text">daily:    1</text>
  <text x="95" y="380" class="text">code:     1</text>

  <rect x="660" y="170" width="470" height="300" class="box"/>
  <text x="685" y="215" class="label">words2 frequency map</text>
  <text x="685" y="260" class="text">leetcode: 1</text>
  <text x="685" y="300" class="text">rocks:    1</text>
  <text x="685" y="340" class="text">daily:    1</text>
  <text x="685" y="380" class="text">practice: 3</text>

  <line x1="540" y1="275" x2="660" y2="275" stroke="#5eead4" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="540" y1="355" x2="660" y2="355" stroke="#5eead4" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5eead4"/>
    </marker>
  </defs>

  <rect x="360" y="500" width="480" height="70" class="ok"/>
  <text x="390" y="545" class="okText">Common once words: { leetcode, daily } → answer = 2</text>

  <text x="60" y="600" class="foot">Hash map frequency intersection • O(n + m) time • O(n + m) space</text>
</svg>
