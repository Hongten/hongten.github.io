<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3341 Dijkstra waiting-time grid diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#131a2e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="78" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3341 · Find Minimum Time to Reach Last Room I</text>
  <text x="52" y="118" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Dijkstra on grid with waiting: next = max(cur, openTime) + 1</text>
  <text x="52" y="154" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>

  <g transform="translate(70,210)">
    <rect x="0" y="0" width="760" height="330" rx="18" fill="#1f2937" stroke="#374151"/>
    <g font-family="JetBrains Mono,Consolas,monospace" font-size="22" fill="#e5e7eb" text-anchor="middle">
      <rect x="55" y="45" width="170" height="90" rx="10" fill="#0f172a" stroke="#475569"/>
      <text x="140" y="80">(0,0)</text><text x="140" y="110">open=0</text>

      <rect x="295" y="45" width="170" height="90" rx="10" fill="#0f172a" stroke="#475569"/>
      <text x="380" y="80">(0,1)</text><text x="380" y="110">open=5</text>

      <rect x="535" y="45" width="170" height="90" rx="10" fill="#0f172a" stroke="#475569"/>
      <text x="620" y="80">(0,2)</text><text x="620" y="110">open=1</text>

      <rect x="55" y="190" width="170" height="90" rx="10" fill="#0f172a" stroke="#475569"/>
      <text x="140" y="225">(1,0)</text><text x="140" y="255">open=2</text>

      <rect x="295" y="190" width="170" height="90" rx="10" fill="#0f172a" stroke="#475569"/>
      <text x="380" y="225">(1,1)</text><text x="380" y="255">open=8</text>

      <rect x="535" y="190" width="170" height="90" rx="10" fill="#102a1d" stroke="#34d399" stroke-width="2"/>
      <text x="620" y="225">(1,2)</text><text x="620" y="255">target</text>
    </g>

    <path d="M225 90 L295 90" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M380 135 L380 190" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M465 235 L535 235" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>

    <text x="245" y="70" fill="#fcd34d" font-family="Inter,Arial,sans-serif" font-size="20">wait if needed</text>
    <text x="306" y="176" fill="#fcd34d" font-family="Inter,Arial,sans-serif" font-size="20">+1 move</text>
  </g>

  <g transform="translate(865,220)">
    <rect x="0" y="0" width="285" height="300" rx="14" fill="#111827" stroke="#374151"/>
    <text x="20" y="42" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="24">Transition</text>
    <text x="20" y="88" fill="#e5e7eb" font-family="JetBrains Mono,Consolas,monospace" font-size="20">cur = t</text>
    <text x="20" y="126" fill="#e5e7eb" font-family="JetBrains Mono,Consolas,monospace" font-size="20">open = moveTime[nr][nc]</text>
    <text x="20" y="170" fill="#86efac" font-family="JetBrains Mono,Consolas,monospace" font-size="20">next = max(t, open) + 1</text>
    <text x="20" y="228" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">Use min-heap by time</text>
    <text x="20" y="258" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">First pop at target = answer</text>
  </g>
</svg>
