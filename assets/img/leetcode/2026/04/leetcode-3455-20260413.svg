<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><style>
    .t{font-family:Arial,sans-serif;fill:#eaf2ff}.s{font-size:28px}.m{font-size:22px}.b{font-size:34px;font-weight:700}
  </style></defs>
  <rect width="1200" height="630" fill="#0b1220"/>
  <text x="60" y="80" class="t b">LeetCode 3455 · Shortest Matching Substring</text>
  <rect x="60" y="150" width="1080" height="80" rx="12" fill="#1d2a44"/>
  <text x="85" y="200" class="t s">s:  ... [A] ......... [B] ...... [C] ...</text>
  <rect x="60" y="280" width="190" height="70" rx="10" fill="#2f6feb"/><text x="120" y="325" class="t s">A</text>
  <text x="270" y="325" class="t s">*</text>
  <rect x="320" y="280" width="190" height="70" rx="10" fill="#238636"/><text x="380" y="325" class="t s">B</text>
  <text x="530" y="325" class="t s">*</text>
  <rect x="580" y="280" width="190" height="70" rx="10" fill="#a371f7"/><text x="640" y="325" class="t s">C</text>
  <text x="60" y="430" class="t m">Use KMP to list starts of A/B/C, then next-position arrays:</text>
  <text x="60" y="470" class="t m">for each A start → earliest feasible B → earliest feasible C → minimize window length.</text>
</svg>
