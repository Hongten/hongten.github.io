<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1332 explanation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" fill="#e5edff" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 1332 · Remove Palindromic Subsequences</text>
  <rect x="70" y="140" width="1060" height="160" rx="18" fill="#12213f" stroke="#7aa2ff" stroke-width="2"/>
  <text x="100" y="200" fill="#dbe7ff" font-size="34" font-family="Arial, Helvetica, sans-serif">Case 1: s is palindrome  ➜  answer = 1</text>
  <text x="100" y="250" fill="#9fc1ff" font-size="28" font-family="Arial, Helvetica, sans-serif">Remove the whole string in one move.</text>

  <rect x="70" y="330" width="1060" height="220" rx="18" fill="#1b2b4f" stroke="#8bd3ff" stroke-width="2"/>
  <text x="100" y="390" fill="#dbe7ff" font-size="34" font-family="Arial, Helvetica, sans-serif">Case 2: s is NOT palindrome  ➜  answer = 2</text>
  <text x="100" y="442" fill="#9fc1ff" font-size="28" font-family="Arial, Helvetica, sans-serif">Step A: remove subsequence of all 'a'</text>
  <text x="100" y="488" fill="#9fc1ff" font-size="28" font-family="Arial, Helvetica, sans-serif">Step B: remove subsequence of all 'b'</text>
  <text x="100" y="534" fill="#8bd3ff" font-size="24" font-family="Arial, Helvetica, sans-serif">Because subsequence is non-contiguous, each same-letter set is a palindrome.</text>
</svg>
