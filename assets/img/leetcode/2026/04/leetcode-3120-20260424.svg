<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3120 lowercase uppercase presence diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3120: Count the Number of Special Characters I</text>
  <rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="215" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">word = "aaAbcBC"</text>
  <text x="100" y="275" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">lower seen: a b c</text>
  <text x="100" y="320" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">upper seen: A B C</text>

  <line x1="100" y1="355" x2="1100" y2="355" stroke="#4b5563" stroke-width="2"/>

  <text x="100" y="410" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">special letters = intersection(lower, upper) = {a, b, c}</text>
  <text x="100" y="465" fill="#fde68a" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="700">answer = 3</text>
  <text x="100" y="525" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">One pass marking + count overlap of 26 letters</text>
</svg>
