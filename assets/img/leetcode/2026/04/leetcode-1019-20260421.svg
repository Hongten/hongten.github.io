<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1019 monotonic stack diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 42px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .node{fill:#334155;stroke:#93c5fd;stroke-width:3}
      .num{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .arrow{stroke:#60a5fa;stroke-width:4;marker-end:url(#m)}
      .stack{fill:#111827;stroke:#22d3ee;stroke-width:3}
      .small{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#67e8f9}
      .ans{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#86efac}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 1019: Next Greater Node In Linked List</text>
  <text x="60" y="120" class="sub">Convert list to array + monotonic decreasing stack (indices)</text>

  <rect x="70" y="190" width="90" height="70" rx="12" class="node"/><text x="102" y="236" class="num">2</text>
  <rect x="200" y="190" width="90" height="70" rx="12" class="node"/><text x="232" y="236" class="num">1</text>
  <rect x="330" y="190" width="90" height="70" rx="12" class="node"/><text x="362" y="236" class="num">5</text>
  <rect x="460" y="190" width="90" height="70" rx="12" class="node"/><text x="492" y="236" class="num">3</text>
  <rect x="590" y="190" width="90" height="70" rx="12" class="node"/><text x="622" y="236" class="num">4</text>

  <line x1="160" y1="225" x2="198" y2="225" class="arrow"/>
  <line x1="290" y1="225" x2="328" y2="225" class="arrow"/>
  <line x1="420" y1="225" x2="458" y2="225" class="arrow"/>
  <line x1="550" y1="225" x2="588" y2="225" class="arrow"/>

  <rect x="760" y="170" width="350" height="330" rx="16" class="stack"/>
  <text x="790" y="215" class="small">Stack (top at bottom): [2, 4]</text>
  <text x="790" y="260" class="small">vals = [2, 1, 5, 3, 4]</text>
  <text x="790" y="305" class="ans">ans  = [5, 5, 0, 4, 0]</text>
  <text x="790" y="355" class="sub">When 5 appears:</text>
  <text x="790" y="390" class="small">pop 1 -> ans[1]=5, pop 2 -> ans[0]=5</text>
  <text x="790" y="440" class="sub">Each index is pushed/popped once</text>
  <text x="790" y="475" class="ans">Total O(n)</text>
</svg>
