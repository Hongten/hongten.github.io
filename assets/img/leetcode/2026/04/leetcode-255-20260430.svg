<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="90" fill="#7dd3fc" font-size="42" font-family="Arial">LeetCode 255 - Verify Preorder Sequence in BST</text><text x="60" y="150" fill="#e2e8f0" font-size="30" font-family="Arial">Monotonic Stack + Lower Bound (low)</text><rect x="60" y="200" width="1080" height="340" rx="20" fill="#111827" stroke="#334155"/><text x="100" y="255" fill="#93c5fd" font-size="28" font-family="monospace">preorder: [8,5,1,7,10,12]</text><text x="100" y="305" fill="#cbd5e1" font-size="24" font-family="monospace">stack path: 8 -> 5 -> 1</text><text x="100" y="355" fill="#cbd5e1" font-size="24" font-family="monospace">see 7: pop 1,5 => low = 5; push 7</text><text x="100" y="405" fill="#cbd5e1" font-size="24" font-family="monospace">see 10: pop 7,8 => low = 8; push 10</text><text x="100" y="455" fill="#fca5a5" font-size="24" font-family="monospace">if next x &lt; low, sequence invalid</text><text x="60" y="590" fill="#94a3b8" font-size="22" font-family="Arial">hongten.github.io</text></svg>