<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 965 Univalued Binary Tree diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="72" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 965: Univalued Binary Tree</text>
  <text x="48" y="112" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">DFS checks every node against root value</text>

  <rect x="60" y="160" width="500" height="410" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="205" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Example tree (target = 5)</text>

  <circle cx="310" cy="265" r="34" fill="#2563eb"/>
  <text x="300" y="274" fill="#ffffff" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">5</text>

  <line x1="290" y1="293" x2="220" y2="360" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="330" y1="293" x2="400" y2="360" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <circle cx="210" cy="375" r="30" fill="#2563eb"/>
  <text x="201" y="383" fill="#ffffff" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">5</text>

  <circle cx="410" cy="375" r="30" fill="#2563eb"/>
  <text x="401" y="383" fill="#ffffff" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">5</text>

  <line x1="196" y1="401" x2="152" y2="460" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="224" y1="401" x2="268" y2="460" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <circle cx="145" cy="475" r="24" fill="#2563eb"/>
  <text x="138" y="482" fill="#ffffff" font-size="20" font-family="Inter,Arial,sans-serif" font-weight="700">5</text>

  <circle cx="275" cy="475" r="24" fill="#2563eb"/>
  <text x="268" y="482" fill="#ffffff" font-size="20" font-family="Inter,Arial,sans-serif" font-weight="700">5</text>

  <rect x="610" y="160" width="530" height="410" rx="20" fill="#111827" stroke="#334155"/>
  <text x="640" y="210" fill="#e2e8f0" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Invariant</text>
  <text x="640" y="252" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">All visited nodes must equal root value.</text>

  <text x="640" y="318" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">DFS(node):</text>
  <text x="660" y="356" fill="#d1d5db" font-size="22" font-family="JetBrains Mono,Consolas,monospace">if node == null: return true</text>
  <text x="660" y="392" fill="#d1d5db" font-size="22" font-family="JetBrains Mono,Consolas,monospace">if node.val != target: return false</text>
  <text x="660" y="428" fill="#d1d5db" font-size="22" font-family="JetBrains Mono,Consolas,monospace">return DFS(left) &amp;&amp; DFS(right)</text>

  <text x="640" y="500" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Time: O(n)  |  Space: O(h)</text>
  <text x="640" y="536" fill="#fca5a5" font-size="20" font-family="Inter,Arial,sans-serif">Any mismatch can stop early.</text>

  <text x="60" y="604" fill="#9ca3af" font-size="18" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual LeetCode editorial</text>
</svg>
