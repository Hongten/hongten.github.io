<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2586 range vowel check diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2586</text>
  <text x="60" y="146" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Count the Number of Vowel Strings in Range</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="245" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Scan words[left..right], check first and last character only.</text>

  <rect x="95" y="280" width="1010" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="120" y="325" fill="#e2e8f0" font-size="28" font-family="monospace">words = ["aba", "bcb", "ece", "aa", "e"]   left = 0, right = 4</text>

  <rect x="95" y="370" width="320" height="130" rx="12" fill="#052e16" stroke="#16a34a"/>
  <text x="120" y="418" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Valid: aba, ece, aa, e</text>
  <text x="120" y="462" fill="#bbf7d0" font-size="28" font-family="Inter,Arial,sans-serif">both ends are vowels</text>

  <rect x="440" y="370" width="300" height="130" rx="12" fill="#3f0f1b" stroke="#ef4444"/>
  <text x="465" y="418" fill="#fecaca" font-size="30" font-family="Inter,Arial,sans-serif">Invalid: bcb</text>
  <text x="465" y="462" fill="#fda4af" font-size="28" font-family="Inter,Arial,sans-serif">starts with consonant</text>

  <rect x="765" y="370" width="340" height="130" rx="12" fill="#1e293b" stroke="#38bdf8"/>
  <text x="790" y="418" fill="#bae6fd" font-size="30" font-family="Inter,Arial,sans-serif">Answer = 4</text>
  <text x="790" y="462" fill="#7dd3fc" font-size="28" font-family="Inter,Arial,sans-serif">O(right-left+1), O(1)</text>

  <text x="60" y="595" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
