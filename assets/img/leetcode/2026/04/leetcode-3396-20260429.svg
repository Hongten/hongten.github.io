<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><rect x="60" y="60" width="1080" height="510" rx="20" fill="#111827" stroke="#38bdf8"/><text x="100" y="150" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 3396</text><text x="100" y="210" fill="#93c5fd" font-size="30" font-family="Arial">Suffix Distinct Boundary</text><text x="100" y="280" fill="#cbd5e1" font-size="26" font-family="Arial">Find first duplicate from right at index i</text><text x="100" y="330" fill="#cbd5e1" font-size="26" font-family="Arial">Need remove i+1 elements from front</text><text x="100" y="380" fill="#fcd34d" font-size="32" font-family="Arial">operations = ceil((i+1)/3)</text><circle cx="900" cy="290" r="120" fill="none" stroke="#22d3ee" stroke-width="6"/><text x="840" y="300" fill="#22d3ee" font-size="34" font-family="Arial">i</text></svg>