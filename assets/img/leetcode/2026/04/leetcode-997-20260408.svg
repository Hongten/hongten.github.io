<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 997 judge degree diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 997: Find the Town Judge</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Judge condition: in-degree = n - 1, out-degree = 0</text>

  <circle cx="260" cy="300" r="52" fill="#1f2937" stroke="#94a3b8" stroke-width="3"/>
  <text x="245" y="310" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">1</text>
  <circle cx="430" cy="430" r="52" fill="#1f2937" stroke="#94a3b8" stroke-width="3"/>
  <text x="415" y="440" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">2</text>
  <circle cx="430" cy="170" r="52" fill="#1f2937" stroke="#94a3b8" stroke-width="3"/>
  <text x="415" y="180" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">3</text>

  <circle cx="860" cy="300" r="74" fill="#064e3b" stroke="#34d399" stroke-width="4"/>
  <text x="832" y="312" fill="#d1fae5" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="700">Judge</text>

  <line x1="312" y1="300" x2="780" y2="300" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="475" y1="407" x2="800" y2="335" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="475" y1="193" x2="800" y2="265" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="60" y="560" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">degree[i] = inDegree[i] - outDegree[i], candidate needs degree = n - 1</text>
</svg>
