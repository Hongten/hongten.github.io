<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3028 Ant on the Boundary prefix sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3028 · Ant on the Boundary</text>
  <text x="60" y="135" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Count visits where prefix sum (position) returns to 0</text>

  <line x1="100" y1="360" x2="1100" y2="360" stroke="#6b7280" stroke-width="4"/>
  <line x1="600" y1="220" x2="600" y2="500" stroke="#374151" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="585" y="535" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">0</text>

  <polyline points="600,360 690,330 560,380 640,350 600,360 730,320 600,360"
            fill="none" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>

  <circle cx="600" cy="360" r="10" fill="#86efac"/>
  <circle cx="600" cy="360" r="18" fill="none" stroke="#86efac" stroke-width="3"/>
  <text x="620" y="400" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">return #1</text>

  <circle cx="600" cy="360" r="24" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="7 6"/>
  <text x="620" y="430" fill="#fbbf24" font-size="22" font-family="Inter,Arial,sans-serif">return #2</text>

  <text x="60" y="580" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: pos += nums[i], count++ whenever pos == 0</text>
</svg>
