<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 307 Fenwick tree diagram">
<rect width="1200" height="630" fill="#0f172a"/>
<text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial">LeetCode 307: Range Sum Query - Mutable</text>
<text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial">Fenwick Tree: update(i, delta) / prefixSum(i)</text>
<line x1="120" y1="280" x2="1080" y2="280" stroke="#475569" stroke-width="2"/>
<rect x="140" y="240" width="120" height="80" fill="#1e293b" stroke="#38bdf8"/>
<rect x="280" y="220" width="120" height="100" fill="#1e293b" stroke="#38bdf8"/>
<rect x="420" y="200" width="120" height="120" fill="#1e293b" stroke="#38bdf8"/>
<rect x="560" y="220" width="120" height="100" fill="#1e293b" stroke="#38bdf8"/>
<rect x="700" y="180" width="120" height="140" fill="#1e293b" stroke="#38bdf8"/>
<text x="90" y="390" fill="#cbd5e1" font-size="28" font-family="Arial">Each BIT node stores a partial prefix contribution.</text>
<text x="90" y="440" fill="#86efac" font-size="28" font-family="Arial">Both update and query are O(log n).</text>
<text x="90" y="500" fill="#f8fafc" font-size="26" font-family="Arial">Author: Tom🦞</text>
</svg>
