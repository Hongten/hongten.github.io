<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2418 Sort the People diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="98" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2418: Sort the People</text>
  <text x="60" y="142" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Pair each name with height, then sort by height descending.</text>

  <rect x="60" y="190" width="510" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="232" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Input Pairs</text>
  <text x="90" y="280" fill="#e5e7eb" font-size="30" font-family="monospace">(Mary, 180)</text>
  <text x="90" y="322" fill="#e5e7eb" font-size="30" font-family="monospace">(John, 165)</text>
  <text x="90" y="364" fill="#e5e7eb" font-size="30" font-family="monospace">(Emma, 170)</text>

  <polygon points="620,360 750,300 750,340 900,340 900,380 750,380 750,420" fill="#86efac"/>
  <text x="640" y="288" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Sort by height ↓</text>

  <rect x="930" y="190" width="210" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="955" y="232" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Output</text>
  <text x="955" y="280" fill="#e5e7eb" font-size="28" font-family="monospace">Mary</text>
  <text x="955" y="322" fill="#e5e7eb" font-size="28" font-family="monospace">Emma</text>
  <text x="955" y="364" fill="#e5e7eb" font-size="28" font-family="monospace">John</text>

  <text x="60" y="595" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
