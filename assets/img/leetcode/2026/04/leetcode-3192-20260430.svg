<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3192 greedy flip parity diagram"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs><rect width="1200" height="630" fill="url(#bg)"/><text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3192 - Greedy Flip Parity</text><rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/><text x="90" y="220" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Scan left to right, track flips parity only</text><text x="90" y="280" fill="#e5e7eb" font-size="28" font-family="monospace">effective = nums[i] XOR (flips &amp; 1)</text><text x="90" y="330" fill="#e5e7eb" font-size="28" font-family="monospace">if effective == 0: flips++</text><circle cx="220" cy="430" r="28" fill="#ef4444"/><text x="210" y="438" fill="#fff" font-size="24" font-family="monospace">0</text><text x="265" y="438" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">must flip here</text><circle cx="220" cy="500" r="28" fill="#22c55e"/><text x="210" y="508" fill="#fff" font-size="24" font-family="monospace">1</text><text x="265" y="508" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">keep moving</text></svg>