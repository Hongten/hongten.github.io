<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2181 merge nodes in between zeros diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2181</text>
  <text x="60" y="150" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Merge Nodes in Between Zeros</text>

  <rect x="60" y="210" width="1080" height="320" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="90" y="280" fill="#cbd5e1" font-size="28" font-family="JetBrains Mono,Consolas,monospace">Input:  0 → 3 → 1 → 0 → 4 → 5 → 2 → 0</text>
  <text x="90" y="335" fill="#86efac" font-size="28" font-family="JetBrains Mono,Consolas,monospace">Segments: (3+1) and (4+5+2)</text>
  <text x="90" y="390" fill="#fca5a5" font-size="28" font-family="JetBrains Mono,Consolas,monospace">Output: 4 → 11</text>

  <line x1="220" y1="430" x2="340" y2="430" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="560" y1="430" x2="760" y2="430" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="90" y="485" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">One pass: accumulate until 0, append sum, reset.</text>
  <text x="90" y="520" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
