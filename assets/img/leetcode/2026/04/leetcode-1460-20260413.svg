<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1460 frequency counting equivalence diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 1460</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Make Two Arrays Equal by Reversing Subarrays</text>

  <rect x="60" y="190" width="500" height="160" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="230" fill="#f8fafc" font-size="24" font-family="monospace">target: [1, 2, 3, 4]</text>
  <text x="90" y="275" fill="#f8fafc" font-size="24" font-family="monospace">freq: {1:1, 2:1, 3:1, 4:1}</text>

  <rect x="640" y="190" width="500" height="160" rx="16" fill="#111827" stroke="#334155"/>
  <text x="670" y="230" fill="#f8fafc" font-size="24" font-family="monospace">arr:    [2, 4, 1, 3]</text>
  <text x="670" y="275" fill="#f8fafc" font-size="24" font-family="monospace">freq: {1:1, 2:1, 3:1, 4:1}</text>

  <path d="M560 270 L640 270" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>

  <rect x="60" y="400" width="1080" height="150" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="452" fill="#cbd5e1" font-size="30" font-family="Arial, sans-serif">Reversals allow reordering; compare multisets instead of positions.</text>
  <text x="90" y="502" fill="#22c55e" font-size="34" font-family="Arial, sans-serif" font-weight="700">All counts match → true</text>
</svg>
