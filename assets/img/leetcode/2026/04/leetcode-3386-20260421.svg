<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3386 button push durations timeline diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="78" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3386: Button with Longest Push Time</text>
  <text x="56" y="118" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">duration = currentTime - previousTime, tie -> lexicographically larger key</text>

  <line x1="80" y1="250" x2="1120" y2="250" stroke="#9ca3af" stroke-width="4"/>
  <line x1="80" y1="236" x2="80" y2="264" stroke="#9ca3af" stroke-width="4"/>
  <line x1="300" y1="236" x2="300" y2="264" stroke="#9ca3af" stroke-width="4"/>
  <line x1="520" y1="236" x2="520" y2="264" stroke="#9ca3af" stroke-width="4"/>
  <line x1="860" y1="236" x2="860" y2="264" stroke="#9ca3af" stroke-width="4"/>
  <line x1="1120" y1="236" x2="1120" y2="264" stroke="#9ca3af" stroke-width="4"/>

  <text x="72" y="290" fill="#d1d5db" font-size="20" font-family="Inter,Arial,sans-serif">0</text>
  <text x="288" y="290" fill="#d1d5db" font-size="20" font-family="Inter,Arial,sans-serif">2</text>
  <text x="508" y="290" fill="#d1d5db" font-size="20" font-family="Inter,Arial,sans-serif">4</text>
  <text x="848" y="290" fill="#d1d5db" font-size="20" font-family="Inter,Arial,sans-serif">7</text>
  <text x="1100" y="290" fill="#d1d5db" font-size="20" font-family="Inter,Arial,sans-serif">9</text>

  <rect x="82" y="180" width="216" height="50" rx="10" fill="#2563eb"/>
  <text x="182" y="212" fill="#ffffff" font-size="24" font-family="Inter,Arial,sans-serif" text-anchor="middle">c (2)</text>

  <rect x="302" y="180" width="216" height="50" rx="10" fill="#16a34a"/>
  <text x="410" y="212" fill="#ffffff" font-size="24" font-family="Inter,Arial,sans-serif" text-anchor="middle">b (2)</text>

  <rect x="522" y="180" width="336" height="50" rx="10" fill="#dc2626"/>
  <text x="690" y="212" fill="#ffffff" font-size="24" font-family="Inter,Arial,sans-serif" text-anchor="middle">c (3) ← longest</text>

  <rect x="862" y="180" width="256" height="50" rx="10" fill="#9333ea"/>
  <text x="990" y="212" fill="#ffffff" font-size="24" font-family="Inter,Arial,sans-serif" text-anchor="middle">a (2)</text>

  <rect x="56" y="360" width="1088" height="200" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="86" y="412" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">One-pass update:</text>
  <text x="86" y="452" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">if (d &gt; bestD) or (d == bestD and key &gt; bestKey) =&gt; update answer</text>
  <text x="86" y="492" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">First event uses prev = 0</text>
  <text x="86" y="532" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1)</text>
</svg>
