<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2996 prefix sum and missing integer diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="82" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700">LeetCode 2996 · Prefix Run + Hash Set</text>

  <rect x="56" y="130" width="1088" height="180" rx="16" fill="#111827" stroke="#374151"/>
  <text x="86" y="178" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="30">nums = [1, 2, 3, 2, 5]</text>
  <text x="86" y="224" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="28">Sequential prefix: 1, 2, 3  →  x = 1 + 2 + 3 = 6</text>
  <text x="86" y="268" fill="#a7f3d0" font-family="Inter,Arial,sans-serif" font-size="26">Find smallest integer ≥ 6 that is NOT in nums</text>

  <rect x="56" y="340" width="680" height="230" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="86" y="388" fill="#fcd34d" font-family="Inter,Arial,sans-serif" font-size="28">seen = {1, 2, 3, 5}</text>
  <text x="86" y="434" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="26">start ans = 6</text>
  <text x="86" y="476" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="26">6 ∉ seen  →  answer = 6</text>
  <text x="86" y="522" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="22">If ans is present, keep ans++ until missing</text>

  <rect x="770" y="340" width="374" height="230" rx="16" fill="#111827" stroke="#374151"/>
  <text x="802" y="392" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="24">Complexity</text>
  <text x="802" y="438" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="24">Time: O(n + k)</text>
  <text x="802" y="478" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="24">Space: O(n)</text>
  <text x="802" y="526" fill="#a7f3d0" font-family="Inter,Arial,sans-serif" font-size="22">Author: Tom🦞</text>
</svg>
