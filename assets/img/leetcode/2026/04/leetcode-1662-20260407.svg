<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1662 two-pointer streaming comparison">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2440"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="74" fill="#e5e7eb" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1662 · Streaming Comparison</text>

  <rect x="52" y="120" width="1096" height="180" rx="16" fill="#111827" stroke="#334155"/>
  <text x="80" y="162" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">word1 = ["ab", "c"]</text>
  <text x="80" y="202" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">pointer (i,p) walks: a → b → c</text>
  <text x="80" y="252" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">word2 = ["a", "bc"]</text>
  <text x="80" y="292" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">pointer (j,q) walks: a → b → c</text>

  <line x1="140" y1="358" x2="1060" y2="358" stroke="#64748b" stroke-width="3" stroke-dasharray="10 8"/>

  <rect x="52" y="388" width="1096" height="190" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="80" y="432" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">Compare char-by-char without building full strings.</text>
  <text x="80" y="476" fill="#facc15" font-size="26" font-family="Inter,Arial,sans-serif">Mismatch at any step → false</text>
  <text x="80" y="516" fill="#34d399" font-size="26" font-family="Inter,Arial,sans-serif">Both streams end together → true</text>
  <text x="80" y="556" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Time O(totalChars), Extra Space O(1) · Author: Tom🦞</text>
</svg>
