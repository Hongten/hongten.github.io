<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 2490 Circular Sentence Diagram</title>
  <desc id="desc">Check sentence boundary matches at each space and wrap-around between last and first characters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="84" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 2490 · Circular Sentence</text>

  <rect x="60" y="130" width="320" height="88" rx="12" fill="#1d4ed8"/>
  <text x="220" y="184" text-anchor="middle" fill="#ffffff" font-size="26" font-family="Arial">Check first == last</text>

  <rect x="440" y="130" width="320" height="88" rx="12" fill="#2563eb"/>
  <text x="600" y="184" text-anchor="middle" fill="#ffffff" font-size="25" font-family="Arial">For each space: s[i-1]==s[i+1]</text>

  <rect x="820" y="130" width="320" height="88" rx="12" fill="#60a5fa"/>
  <text x="980" y="184" text-anchor="middle" fill="#0b1020" font-size="26" font-family="Arial" font-weight="700">All pass ⇒ true</text>

  <path d="M380 174H440 M760 174H820" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arrow)"/>

  <text x="60" y="306" fill="#cbd5e1" font-size="30" font-family="Courier New">Sentence: "leetcode exercises sound delightful"</text>
  <text x="60" y="360" fill="#93c5fd" font-size="26" font-family="Courier New">spaces: [leetcode] [exercises] [sound] [delightful]</text>
  <text x="60" y="414" fill="#86efac" font-size="26" font-family="Courier New">boundary checks: e=e, s=s, d=d, wrap l=l</text>
  <text x="60" y="490" fill="#facc15" font-size="34" font-family="Arial" font-weight="700">Single scan, O(n) time, O(1) space</text>
</svg>
