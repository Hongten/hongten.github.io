<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 251 flatten 2d vector iterator diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 251: Flatten 2D Vector</text>
  <rect x="56" y="130" width="1088" height="430" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="92" y="188" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Iterator state: row pointer r, column pointer c</text>
  <rect x="92" y="224" width="160" height="70" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="108" y="267" fill="#f9fafb" font-size="30" font-family="monospace">[1,2]</text>
  <rect x="272" y="224" width="120" height="70" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="308" y="267" fill="#f9fafb" font-size="30" font-family="monospace">[]</text>
  <rect x="412" y="224" width="200" height="70" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="430" y="267" fill="#f9fafb" font-size="30" font-family="monospace">[3]</text>
  <rect x="92" y="330" width="780" height="190" rx="12" fill="#111827" stroke="#374151"/>
  <text x="120" y="370" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">advance(): skip exhausted/empty rows lazily</text>
  <text x="120" y="414" fill="#e5e7eb" font-size="24" font-family="monospace">while r &lt; rows and c &gt;= len(vec[r]): r++, c = 0</text>
  <text x="120" y="456" fill="#e5e7eb" font-size="24" font-family="monospace">next(): return vec[r][c++]</text>
  <text x="120" y="496" fill="#e5e7eb" font-size="24" font-family="monospace">hasNext(): advance(); return r &lt; rows</text>
  <text x="908" y="370" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">Output</text>
  <text x="908" y="408" fill="#f9fafb" font-size="28" font-family="monospace">1, 2, 3</text>
  <text x="92" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
