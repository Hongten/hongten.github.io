<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2287 frequency bottleneck counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2287 · Rearrange Characters to Make Target String</text>
  <text x="56" y="136" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Frequency Bottleneck: answer = min(cntS[c] / cntT[c]) for required chars</text>

  <rect x="56" y="174" width="1088" height="400" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="90" y="225" fill="#e2e8f0" font-size="24" font-family="JetBrains Mono,Consolas,monospace">s counts:      a:8  b:3  c:6</text>
  <text x="90" y="265" fill="#e2e8f0" font-size="24" font-family="JetBrains Mono,Consolas,monospace">target counts: a:2  b:1  c:2</text>

  <line x1="90" y1="292" x2="1110" y2="292" stroke="#475569" stroke-width="2"/>

  <text x="90" y="340" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">a allows: 8 / 2 = 4 copies</text>
  <text x="90" y="380" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">b allows: 3 / 1 = 3 copies</text>
  <text x="90" y="420" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">c allows: 6 / 2 = 3 copies</text>

  <text x="90" y="490" fill="#facc15" font-size="32" font-family="Inter,Arial,sans-serif" font-weight="700">Bottleneck = min(4, 3, 3) = 3</text>
  <text x="90" y="535" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
