<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 972 fraction normalization diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 972: Equal Rational Numbers</text>
  <text x="52" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Convert decimal with repeating part into reduced fraction</text>

  <rect x="52" y="185" width="1096" height="380" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="250" fill="#e5e7eb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">x = I.N(R)</text>
  <text x="90" y="300" fill="#e5e7eb" font-size="26" font-family="JetBrains Mono,Consolas,monospace">= I + N/10^k + R/(10^k*(10^r-1))</text>

  <rect x="80" y="345" width="470" height="170" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="106" y="390" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Example A</text>
  <text x="106" y="430" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">0.1(6) = 1/6</text>
  <text x="106" y="468" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">0.16(6) = 1/6</text>

  <rect x="650" y="345" width="470" height="170" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="676" y="390" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Example B</text>
  <text x="676" y="430" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">0.9(9) = 1</text>
  <text x="676" y="468" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Compare reduced (num, den)</text>

  <text x="52" y="603" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second · Java default tab</text>
</svg>
