<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1005 greedy negation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 1005 · Greedy by |value|</text>
  <text x="60" y="130" fill="#94a3b8" font-size="28" font-family="Arial">Sort by absolute value desc → flip negatives first → if k odd, flip smallest |x|</text>
  <rect x="60" y="190" width="1080" height="120" rx="14" fill="#111827" stroke="#334155"/>
  <text x="90" y="260" fill="#f87171" font-size="36" font-family="Courier New">[-8, -3, -2, 5, 1], k=3</text>
  <text x="760" y="260" fill="#38bdf8" font-size="30" font-family="Arial">|x| desc</text>
  <line x1="600" y1="330" x2="600" y2="560" stroke="#475569" stroke-width="3"/>
  <text x="110" y="380" fill="#22c55e" font-size="30" font-family="Arial">Step1: flip -8, -3, -2 (k used up)</text>
  <text x="110" y="430" fill="#e2e8f0" font-size="30" font-family="Courier New">[8, 3, 2, 5, 1] sum = 19</text>
  <text x="110" y="500" fill="#f59e0b" font-size="28" font-family="Arial">If leftover k is odd, flip the last element (smallest absolute value).</text>
  <text x="110" y="550" fill="#94a3b8" font-size="24" font-family="Arial">Reason: it minimizes loss after all beneficial flips.</text>
</svg>
