<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 658 sliding window binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{fill:#e2e8f0;font-family:Arial,sans-serif}
      .m{fill:#93c5fd;font-family:Arial,sans-serif;font-size:28px}
      .s{fill:#f8fafc;font-family:Arial,sans-serif;font-size:24px}
      .b{fill:#334155;stroke:#64748b;stroke-width:2}
      .hl{fill:#2563eb;stroke:#93c5fd;stroke-width:3}
      .arr{stroke:#f59e0b;stroke-width:4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="70" class="t" font-size="42" font-weight="700">LeetCode 658: Find K Closest Elements</text>
  <text x="50" y="115" class="m">Binary Search Left Boundary + Fixed Window</text>
  <g transform="translate(70,220)">
    <rect x="0" y="0" width="120" height="90" rx="10" class="b"/>
    <rect x="130" y="0" width="120" height="90" rx="10" class="b"/>
    <rect x="260" y="0" width="120" height="90" rx="10" class="b"/>
    <rect x="390" y="0" width="120" height="90" rx="10" class="hl"/>
    <rect x="520" y="0" width="120" height="90" rx="10" class="hl"/>
    <rect x="650" y="0" width="120" height="90" rx="10" class="hl"/>
    <rect x="780" y="0" width="120" height="90" rx="10" class="b"/>
    <rect x="910" y="0" width="120" height="90" rx="10" class="b"/>
    <text x="42" y="54" class="s">1</text><text x="172" y="54" class="s">2</text><text x="302" y="54" class="s">3</text>
    <text x="432" y="54" class="s">4</text><text x="562" y="54" class="s">5</text><text x="692" y="54" class="s">6</text>
    <text x="822" y="54" class="s">7</text><text x="952" y="54" class="s">8</text>
    <text x="390" y="130" class="m">window length = k</text>
    <line x1="360" y1="-30" x2="390" y2="-5" class="arr"/>
    <text x="230" y="-35" class="s">pick smaller |x-arr[mid]| side</text>
  </g>
  <text x="70" y="565" class="s">Compare: x - arr[mid] vs arr[mid + k] - x, then move boundary.</text>
</svg>
