<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1025 Divisor Game parity diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1025 · Divisor Game</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Parity Strategy: Even Wins, Odd Loses</text>

  <rect x="70" y="190" width="500" height="330" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="245" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Even n (Winning)</text>
  <text x="100" y="295" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Choose x = 1 (always valid)</text>
  <text x="100" y="335" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">n - 1 becomes odd</text>
  <text x="100" y="375" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Force opponent into losing state</text>

  <rect x="630" y="190" width="500" height="330" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="660" y="245" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Odd n (Losing)</text>
  <text x="660" y="295" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Any divisor x is odd</text>
  <text x="660" y="335" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">n - x becomes even</text>
  <text x="660" y="375" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Give advantage to opponent</text>

  <line x1="570" y1="355" x2="630" y2="355" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="60" y="580" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual · Full 5-language code tabs</text>
</svg>
