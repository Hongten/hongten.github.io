<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 316 monotonic stack diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 316: Remove Duplicate Letters</text>
  <rect x="60" y="140" width="1080" height="430" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="200" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Input stream: c b a c d c b c</text>
  <text x="95" y="255" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Rule: pop while top &gt; current and top appears later</text>
  <text x="95" y="315" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Stack evolution: c → b → a → ac → acd → acdb</text>
  <text x="95" y="375" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Result: acdb (smallest lexicographic unique string)</text>
  <text x="95" y="445" fill="#c4b5fd" font-size="26" font-family="Inter,Arial,sans-serif">Last-occurrence array + visited set + monotonic stack</text>
  <text x="95" y="510" fill="#f9a8d4" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
