<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2769 formula diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="110" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2769 · Find the Maximum Achievable Number</text>
  <rect x="60" y="180" width="1080" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="260" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Each move: x + 1, num - 1</text>
  <text x="100" y="330" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">After t moves: x increases by t and pairing adds another t</text>
  <text x="100" y="400" fill="#86efac" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">Answer: x_max = num + 2t</text>
  <text x="100" y="475" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">O(1) time · O(1) space · Author: Tom🦞</text>
</svg>
