<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 836 rectangle overlap projection diagram">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="50" y="70" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 836: Rectangle Overlap</text>
  <text x="50" y="110" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Overlap exists iff x-projections and y-projections both intersect strictly</text>

  <rect x="210" y="200" width="380" height="240" fill="#60a5fa" fill-opacity="0.30" stroke="#60a5fa" stroke-width="3"/>
  <text x="230" y="190" fill="#bfdbfe" font-size="22" font-family="Arial, sans-serif">rec1</text>

  <rect x="430" y="150" width="360" height="250" fill="#34d399" fill-opacity="0.30" stroke="#34d399" stroke-width="3"/>
  <text x="750" y="140" fill="#86efac" font-size="22" font-family="Arial, sans-serif">rec2</text>

  <rect x="430" y="200" width="160" height="200" fill="#f59e0b" fill-opacity="0.55" stroke="#fbbf24" stroke-width="2"/>
  <text x="445" y="305" fill="#111827" font-size="22" font-family="Arial, sans-serif" font-weight="700">overlap area &gt; 0</text>

  <line x1="120" y1="520" x2="1080" y2="520" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="550" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">x-overlap: max(x1a,x1b) &lt; min(x2a,x2b)</text>

  <line x1="980" y1="150" x2="980" y2="500" stroke="#94a3b8" stroke-width="2"/>
  <text x="1000" y="330" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif" transform="rotate(90 1000,330)">y-overlap: max(y1a,y1b) &lt; min(y2a,y2b)</text>
</svg>
