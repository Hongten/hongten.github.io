<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1441 Build an Array With Stack Operations diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1441 · Push/Pop Simulation</text>
  <text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Target = [1,3], stream: 1,2,3</text>

  <rect x="60" y="200" width="1080" height="360" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="260" fill="#e5e7eb" font-size="26" font-family="monospace">1  → Push  (keep, match target[0])</text>
  <text x="90" y="310" fill="#e5e7eb" font-size="26" font-family="monospace">2  → Push, Pop  (skip non-target)</text>
  <text x="90" y="360" fill="#e5e7eb" font-size="26" font-family="monospace">3  → Push  (keep, match target[1])</text>

  <text x="90" y="440" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Operations: ["Push", "Push", "Pop", "Push"]</text>
  <text x="90" y="500" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">Invariant: every number is pushed once, non-target values are popped immediately.</text>
</svg>
