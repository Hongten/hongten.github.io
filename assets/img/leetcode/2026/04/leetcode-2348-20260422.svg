<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2348 zero run counting">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2348: Number of Zero-Filled Subarrays</text>
  <text x="50" y="138" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Zero-run contribution: add current run length each step</text>
  <rect x="50" y="180" width="1100" height="380" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="250" fill="#e5e7eb" font-size="28" font-family="monospace">nums: [1, 0, 0, 2, 0, 0, 0]</text>
  <text x="90" y="305" fill="#86efac" font-size="28" font-family="monospace">run :  0  1  2  0  1  2  3</text>
  <text x="90" y="360" fill="#fcd34d" font-size="28" font-family="monospace">add :  0  1  2  0  1  2  3</text>
  <text x="90" y="430" fill="#fca5a5" font-size="32" font-family="Inter,Arial,sans-serif">answer = 1+2 + 1+2+3 = 9</text>
  <text x="90" y="500" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">Each zero extends all previous zero-only suffixes ending at current index.</text>
</svg>
