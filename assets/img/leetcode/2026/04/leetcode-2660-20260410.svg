<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2660 scoring window diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2238"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2660 · Bowling Winner</text>
  <text x="60" y="130" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Rule: if previous 2 rounds contain a strike (10), current score doubles</text>

  <rect x="60" y="180" width="1080" height="360" rx="18" fill="#111827" stroke="#334155"/>

  <g font-family="Inter,Arial,sans-serif" font-size="22" fill="#e5e7eb">
    <text x="100" y="240">Round:</text>
    <text x="100" y="290">Pins:</text>
    <text x="100" y="340">Multiplier:</text>
    <text x="100" y="390">Score:</text>
  </g>

  <g font-family="Inter,Arial,sans-serif" font-size="22" text-anchor="middle">
    <rect x="240" y="210" width="120" height="220" rx="12" fill="#1f2937"/><text x="300" y="242" fill="#cbd5e1">1</text><text x="300" y="292" fill="#f8fafc">10</text><text x="300" y="342" fill="#86efac">×1</text><text x="300" y="392" fill="#f8fafc">10</text>
    <rect x="390" y="210" width="120" height="220" rx="12" fill="#1f2937"/><text x="450" y="242" fill="#cbd5e1">2</text><text x="450" y="292" fill="#f8fafc">3</text><text x="450" y="342" fill="#86efac">×2</text><text x="450" y="392" fill="#f8fafc">6</text>
    <rect x="540" y="210" width="120" height="220" rx="12" fill="#1f2937"/><text x="600" y="242" fill="#cbd5e1">3</text><text x="600" y="292" fill="#f8fafc">5</text><text x="600" y="342" fill="#86efac">×2</text><text x="600" y="392" fill="#f8fafc">10</text>
    <rect x="690" y="210" width="120" height="220" rx="12" fill="#1f2937"/><text x="750" y="242" fill="#cbd5e1">4</text><text x="750" y="292" fill="#f8fafc">2</text><text x="750" y="342" fill="#86efac">×1</text><text x="750" y="392" fill="#f8fafc">2</text>
  </g>

  <text x="60" y="590" fill="#f59e0b" font-size="22" font-family="Inter,Arial,sans-serif">Compare two players' totals after linear simulation → winner/tie.</text>
</svg>
