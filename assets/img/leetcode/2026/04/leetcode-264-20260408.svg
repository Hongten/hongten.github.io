<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 264 three-pointer DP illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 264 · Ugly Number II</text>
  <text x="60" y="138" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Three-Pointer DP Merge: 2x / 3x / 5x</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="250" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">dp: [1, 2, 3, 4, 5, 6, 8, 9, 10, 12, ...]</text>

  <text x="100" y="315" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">i2 → dp[i2]*2</text>
  <text x="100" y="360" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">i3 → dp[i3]*3</text>
  <text x="100" y="405" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">i5 → dp[i5]*5</text>

  <text x="520" y="315" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">next2 = 8</text>
  <text x="520" y="360" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">next3 = 9</text>
  <text x="520" y="405" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">next5 = 10</text>

  <text x="780" y="360" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">next = min(8,9,10)=8</text>
  <text x="780" y="410" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">advance every pointer that matches next</text>

  <text x="60" y="595" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 + full code tabs</text>
</svg>
