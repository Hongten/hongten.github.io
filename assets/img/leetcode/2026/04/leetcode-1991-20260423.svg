<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1991 prefix sum balance diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="94" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1991: Find the Middle Index in Array</text>
  <text x="56" y="138" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Prefix Sum Balance, leftSum == total - leftSum - nums[i]</text>

  <rect x="56" y="182" width="1088" height="356" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="232" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Example: nums = [2, 3, -1, 8, 4]</text>
  <text x="90" y="276" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">total = 16</text>

  <g font-family="Inter,Arial,sans-serif" font-size="22" fill="#e5e7eb">
    <text x="90" y="324">i=0: left=0, right=14</text>
    <text x="90" y="360">i=1: left=2, right=11</text>
    <text x="90" y="396">i=2: left=5, right=12</text>
    <text x="90" y="432" fill="#86efac">i=3: left=4, right=4  ✓ middle index</text>
  </g>

  <text x="90" y="488" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">Single pass after total sum, O(n) time and O(1) space.</text>
  <text x="90" y="528" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
