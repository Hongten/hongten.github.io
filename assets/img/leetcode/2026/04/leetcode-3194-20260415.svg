<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3194 endpoint pairing diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:34px;font-weight:700}
      .s{font-size:24px;fill:#cbd5e1}
      .b{fill:#334155;stroke:#94a3b8;stroke-width:2}
      .n{font-size:30px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
      .a{stroke:#22d3ee;stroke-width:4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" class="t m">LeetCode 3194 · Minimum Average of Smallest and Largest Elements</text>
  <text x="60" y="125" class="t s">Sort array, pair endpoints, take minimum pair average</text>

  <g transform="translate(110,230)">
    <rect x="0" y="0" width="120" height="90" rx="12" class="b"/><text x="60" y="45" class="t n">1</text>
    <rect x="130" y="0" width="120" height="90" rx="12" class="b"/><text x="190" y="45" class="t n">2</text>
    <rect x="260" y="0" width="120" height="90" rx="12" class="b"/><text x="320" y="45" class="t n">3</text>
    <rect x="390" y="0" width="120" height="90" rx="12" class="b"/><text x="450" y="45" class="t n">7</text>
    <rect x="520" y="0" width="120" height="90" rx="12" class="b"/><text x="580" y="45" class="t n">8</text>
    <rect x="650" y="0" width="120" height="90" rx="12" class="b"/><text x="710" y="45" class="t n">10</text>

    <line x1="60" y1="110" x2="710" y2="110" class="a"/>
    <line x1="190" y1="140" x2="580" y2="140" class="a"/>
    <line x1="320" y1="170" x2="450" y2="170" class="a"/>

    <text x="780" y="120" class="t s">(1+10)/2 = 5.5</text>
    <text x="780" y="150" class="t s">(2+8)/2 = 5.0</text>
    <text x="780" y="180" class="t s">(3+7)/2 = 5.0</text>
    <text x="780" y="225" class="t m" style="fill:#22d3ee">Minimum Average = 5.0</text>
  </g>
</svg>
