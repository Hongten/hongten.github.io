<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 181 majority voting diagram">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 181 · Majority Element</text>
  <text x="60" y="144" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Boyer-Moore Voting: cancel different values in pairs</text>
  <rect x="60" y="188" width="1080" height="360" rx="18" fill="#111827" stroke="#334155"/>
  <text x="100" y="255" fill="#f8fafc" font-size="34" font-family="Inter,Arial,sans-serif">candidate / count</text>
  <text x="100" y="315" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">same as candidate  → count + 1</text>
  <text x="100" y="365" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">different value     → count - 1</text>
  <text x="100" y="415" fill="#c4b5fd" font-size="28" font-family="Inter,Arial,sans-serif">count == 0          → reset candidate</text>
  <text x="100" y="485" fill="#e2e8f0" font-size="26" font-family="Inter,Arial,sans-serif">Majority survives all pair cancellations</text>
</svg>
