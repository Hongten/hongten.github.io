<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 318 bitmask disjoint words diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 318 · Maximum Product of Word Lengths</text>
  <text x="60" y="132" fill="#94a3b8" font-size="28" font-family="Arial, sans-serif">Bitmask disjoint check: (maskA &amp; maskB) == 0</text>

  <rect x="70" y="190" width="500" height="330" rx="20" fill="#111827" stroke="#334155"/>
  <text x="100" y="240" fill="#f8fafc" font-size="30" font-family="monospace">word A: "abcw"</text>
  <text x="100" y="285" fill="#38bdf8" font-size="24" font-family="monospace">maskA: 1000...0111 (a,b,c,w)</text>
  <text x="100" y="350" fill="#f8fafc" font-size="30" font-family="monospace">word B: "xtfn"</text>
  <text x="100" y="395" fill="#22d3ee" font-size="24" font-family="monospace">maskB: 0101...0000 (x,t,f,n)</text>
  <text x="100" y="465" fill="#86efac" font-size="30" font-family="monospace">maskA &amp; maskB = 0 ✅</text>

  <rect x="630" y="190" width="500" height="330" rx="20" fill="#111827" stroke="#334155"/>
  <text x="660" y="240" fill="#f8fafc" font-size="30" font-family="monospace">Product = len(A) × len(B)</text>
  <text x="660" y="300" fill="#f59e0b" font-size="44" font-family="monospace" font-weight="700">4 × 4 = 16</text>
  <text x="660" y="370" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">Try all pairs, keep maximum product</text>
  <text x="660" y="420" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">using O(n²) pair checks.</text>
</svg>
