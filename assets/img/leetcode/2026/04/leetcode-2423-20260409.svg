<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2423 remove one letter to equalize frequency">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <text x="60" y="90" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial" font-size="42" font-weight="700">LeetCode 2423 · Remove Letter To Equalize Frequency</text>
  <text x="60" y="135" fill="#93c5fd" font-family="Inter,Segoe UI,Arial" font-size="26">Try deleting one char, then check all non-zero frequencies match</text>

  <rect x="70" y="185" width="1060" height="360" rx="18" fill="#111827" stroke="#334155"/>
  <text x="100" y="235" fill="#f8fafc" font-family="JetBrains Mono,Consolas,monospace" font-size="24">word = "aazz"</text>
  <text x="100" y="280" fill="#f8fafc" font-family="JetBrains Mono,Consolas,monospace" font-size="24">freq: a:2, z:2</text>
  <text x="100" y="325" fill="#f8fafc" font-family="JetBrains Mono,Consolas,monospace" font-size="24">remove one 'a'  →  a:1, z:2  (not equal)</text>
  <text x="100" y="370" fill="#f8fafc" font-family="JetBrains Mono,Consolas,monospace" font-size="24">remove one 'z'  →  a:2, z:1  (not equal)</text>

  <text x="100" y="430" fill="#86efac" font-family="JetBrains Mono,Consolas,monospace" font-size="24">word = "abcc"</text>
  <text x="100" y="470" fill="#86efac" font-family="JetBrains Mono,Consolas,monospace" font-size="24">freq: a:1, b:1, c:2</text>
  <text x="100" y="515" fill="#86efac" font-family="JetBrains Mono,Consolas,monospace" font-size="24">remove one 'c'  →  a:1, b:1, c:1  ✅ equal</text>
</svg>
