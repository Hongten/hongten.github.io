<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1049 knapsack partition diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1049 · Last Stone Weight II</text>
  <text x="56" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Transform smash process into partition difference minimization</text>

  <rect x="60" y="180" width="500" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <rect x="640" y="180" width="500" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="230" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Group A sum = x</text>
  <text x="670" y="230" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">Group B sum = S - x</text>

  <g font-family="Inter,Arial,sans-serif" font-size="24" fill="#e5e7eb">
    <text x="100" y="290">Goal: make x as close as possible to S/2</text>
    <text x="100" y="330">Use 0/1 knapsack, capacity = floor(S/2)</text>
    <text x="100" y="370">dp[j] = reachable subset sum j</text>
    <text x="100" y="410">Best j: largest reachable j ≤ S/2</text>
    <text x="100" y="450">Answer = S - 2·j</text>
  </g>

  <text x="680" y="320" fill="#fef08a" font-size="78" font-family="JetBrains Mono,Consolas,monospace" font-weight="700">|S - 2x|</text>
  <text x="720" y="390" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">minimize final remaining stone</text>

  <text x="56" y="596" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 + full code-tabs</text>
</svg>
