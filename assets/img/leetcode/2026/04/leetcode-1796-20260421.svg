<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1796 diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1796</text>
  <text x="60" y="150" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Second Largest Digit in a String</text>
  <rect x="60" y="210" width="1080" height="340" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="280" fill="#a7f3d0" font-size="30" font-family="Inter,Arial,sans-serif">Scan characters once, keep two values:</text>
  <text x="90" y="340" fill="#e5e7eb" font-size="32" font-family="Inter,Arial,sans-serif">first = largest digit, second = second-largest digit</text>
  <text x="90" y="410" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">Update rules:</text>
  <text x="120" y="460" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">if d &gt; first  ⇒ second = first, first = d</text>
  <text x="120" y="505" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">else if second &lt; d &lt; first  ⇒ second = d</text>
</svg>
