<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 256 paint house dynamic programming diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 256: Paint House</text>
  <text x="60" y="140" fill="#94a3b8" font-size="28" font-family="Inter,Arial,sans-serif">Rolling DP with 3 colors (R, B, G)</text>

  <rect x="70" y="200" width="300" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="450" y="200" width="300" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="830" y="200" width="300" height="300" rx="16" fill="#111827" stroke="#334155"/>

  <text x="100" y="245" fill="#f8fafc" font-size="26" font-family="Inter,Arial,sans-serif">House i-1</text>
  <text x="480" y="245" fill="#f8fafc" font-size="26" font-family="Inter,Arial,sans-serif">House i</text>
  <text x="860" y="245" fill="#f8fafc" font-size="26" font-family="Inter,Arial,sans-serif">Transition</text>

  <text x="100" y="300" fill="#f87171" font-size="28" font-family="Inter,Arial,sans-serif">r</text>
  <text x="100" y="350" fill="#60a5fa" font-size="28" font-family="Inter,Arial,sans-serif">b</text>
  <text x="100" y="400" fill="#34d399" font-size="28" font-family="Inter,Arial,sans-serif">g</text>

  <text x="480" y="300" fill="#f87171" font-size="26" font-family="Inter,Arial,sans-serif">newR = cR + min(b,g)</text>
  <text x="480" y="350" fill="#60a5fa" font-size="26" font-family="Inter,Arial,sans-serif">newB = cB + min(r,g)</text>
  <text x="480" y="400" fill="#34d399" font-size="26" font-family="Inter,Arial,sans-serif">newG = cG + min(r,b)</text>

  <text x="860" y="310" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Adjacent houses</text>
  <text x="860" y="345" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">cannot share</text>
  <text x="860" y="380" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">the same color.</text>

  <text x="60" y="580" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
