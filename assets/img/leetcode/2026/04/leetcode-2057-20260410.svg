<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2057 index modulo 10 matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2057 · Smallest Index With Equal Value</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Find first i where i % 10 == nums[i]</text>

  <rect x="56" y="180" width="1088" height="360" rx="20" fill="#1f2937" stroke="#374151"/>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="26">
    <text x="110" y="250" fill="#9ca3af">index:   0   1   2   3   4   5</text>
    <text x="110" y="300" fill="#fcd34d">nums:    1   2   2   4   0   6</text>
    <text x="110" y="350" fill="#86efac">i%10:    0   1   2   3   4   5</text>
  </g>

  <line x1="106" y1="370" x2="1094" y2="370" stroke="#374151"/>
  <text x="110" y="430" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">First match at i = 2 because 2 % 10 = 2 and nums[2] = 2 ✅</text>
  <text x="110" y="476" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Scan from left to right and return immediately when condition becomes true.</text>
  <text x="110" y="520" fill="#34d399" font-size="28" font-family="Inter,Arial,sans-serif">Single pass · O(n) time · O(1) space</text>
</svg>
