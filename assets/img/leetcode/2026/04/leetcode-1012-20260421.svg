<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1012 diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <style>
      .t{fill:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
      .m{fill:#93c5fd}
      .b{fill:none;stroke:#60a5fa;stroke-width:3}
      .k{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:12}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t" font-size="42" font-weight="700">LeetCode 1012 - Numbers With Repeated Digits</text>
  <text x="60" y="132" class="t" font-size="28">Complement counting: repeated = n - unique</text>

  <rect x="60" y="180" width="500" height="360" class="k"/>
  <text x="90" y="230" class="m" font-size="26" font-weight="700">1) Count unique digits with length &lt; L</text>
  <text x="90" y="275" class="t" font-size="24">len=1: 9</text>
  <text x="90" y="310" class="t" font-size="24">len=2: 9 × P(9,1)</text>
  <text x="90" y="345" class="t" font-size="24">len=3: 9 × P(9,2)</text>
  <text x="90" y="380" class="t" font-size="24">...</text>

  <text x="90" y="440" class="m" font-size="26" font-weight="700">2) Prefix scan of n</text>
  <text x="90" y="480" class="t" font-size="24">Try smaller unused digit at each position,</text>
  <text x="90" y="515" class="t" font-size="24">then add permutations for remaining slots.</text>

  <rect x="620" y="180" width="520" height="360" class="k"/>
  <text x="650" y="235" class="m" font-size="28" font-weight="700">Example n = 3254</text>
  <text x="650" y="285" class="t" font-size="24">Unique(1..n) = 2242</text>
  <text x="650" y="325" class="t" font-size="24">Repeated = 3254 - 2242 = 1012</text>

  <path d="M560 360 C600 360, 610 360, 620 360" class="b"/>
  <polygon points="620,360 605,352 605,368" fill="#60a5fa"/>

  <text x="650" y="400" class="t" font-size="24">If current digit already used:</text>
  <text x="650" y="435" class="t" font-size="24">stop equal-length expansion immediately.</text>
  <text x="650" y="500" class="m" font-size="26" font-weight="700">Digit DP + permutations</text>
</svg>
