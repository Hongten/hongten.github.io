<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3042 prefix and suffix pairs diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3042: Prefix &amp; Suffix Pairs</text>
  <rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="225" fill="#93c5fd" font-size="32" font-family="Inter,Arial,sans-serif">Example: words[i] = "ab", words[j] = "abcab"</text>
  <text x="100" y="290" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Prefix check: abcab startsWith ab ✓</text>
  <text x="100" y="350" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Suffix check: abcab endsWith ab ✓</text>
