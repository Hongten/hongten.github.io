<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 328 odd even linked list diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 328: Odd Even Linked List</text>
  <text x="60" y="130" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">In-place odd-chain + even-chain stitching</text>

  <g transform="translate(60,190)">
    <rect x="0" y="0" width="120" height="64" rx="10" fill="#1f2937" stroke="#34d399"/>
    <rect x="170" y="0" width="120" height="64" rx="10" fill="#1f2937" stroke="#f59e0b"/>
    <rect x="340" y="0" width="120" height="64" rx="10" fill="#1f2937" stroke="#34d399"/>
    <rect x="510" y="0" width="120" height="64" rx="10" fill="#1f2937" stroke="#f59e0b"/>
    <rect x="680" y="0" width="120" height="64" rx="10" fill="#1f2937" stroke="#34d399"/>

    <text x="54" y="40" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">1</text>
    <text x="224" y="40" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">2</text>
    <text x="394" y="40" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">3</text>
    <text x="564" y="40" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">4</text>
    <text x="734" y="40" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">5</text>

    <line x1="120" y1="32" x2="170" y2="32" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="290" y1="32" x2="340" y2="32" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="460" y1="32" x2="510" y2="32" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="630" y1="32" x2="680" y2="32" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

    <text x="0" y="105" fill="#34d399" font-size="24" font-family="Inter,Arial,sans-serif">Odd nodes chain: 1 → 3 → 5</text>
    <text x="0" y="142" fill="#f59e0b" font-size="24" font-family="Inter,Arial,sans-serif">Even nodes chain: 2 → 4</text>
    <text x="0" y="179" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Final: odd tail connects to even head</text>
  </g>

  <text x="60" y="585" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
