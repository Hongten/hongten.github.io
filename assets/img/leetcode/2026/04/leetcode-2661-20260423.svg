<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2661 first complete row or column diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="85" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2661</text>
  <text x="50" y="130" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">First Completely Painted Row or Column</text>

  <g transform="translate(70,180)">
    <rect x="0" y="0" width="420" height="320" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="38" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">mat</text>
    <g font-family="monospace" font-size="28" fill="#e2e8f0" text-anchor="middle">
      <rect x="20" y="60" width="110" height="80" fill="#1e293b" stroke="#475569"/><text x="75" y="110">3</text>
      <rect x="150" y="60" width="110" height="80" fill="#1e293b" stroke="#475569"/><text x="205" y="110">2</text>
      <rect x="280" y="60" width="110" height="80" fill="#14532d" stroke="#22c55e"/><text x="335" y="110">5</text>

      <rect x="20" y="160" width="110" height="80" fill="#78350f" stroke="#f59e0b"/><text x="75" y="210">1</text>
      <rect x="150" y="160" width="110" height="80" fill="#78350f" stroke="#f59e0b"/><text x="205" y="210">4</text>
      <rect x="280" y="160" width="110" height="80" fill="#78350f" stroke="#f59e0b"/><text x="335" y="210">6</text>
    </g>
    <text x="20" y="285" fill="#fbbf24" font-size="20" font-family="Inter,Arial,sans-serif">arr: [1, 4, 6, 2, 3, 5]</text>
    <text x="20" y="310" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">index 2 paints row 2 completely</text>
  </g>

  <g transform="translate(550,180)">
    <rect x="0" y="0" width="580" height="320" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="24" y="38" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">value → (row,col), rowCount, colCount</text>
    <text x="24" y="86" fill="#e2e8f0" font-size="24" font-family="monospace">1 → (1,0)  row[1]=1 col[0]=1</text>
    <text x="24" y="126" fill="#e2e8f0" font-size="24" font-family="monospace">4 → (1,1)  row[1]=2 col[1]=1</text>
    <text x="24" y="166" fill="#86efac" font-size="24" font-family="monospace">6 → (1,2)  row[1]=3 == n ✓</text>
    <text x="24" y="226" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Stop at earliest complete row/column.</text>
    <text x="24" y="262" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Time O(m*n), Space O(m*n)</text>
  </g>

  <text x="50" y="585" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second · Full multi-language code tabs</text>
</svg>
