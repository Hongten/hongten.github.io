<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1189 balloon frequency counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 1189 · Maximum Number of Balloons</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter, Arial, sans-serif">Count letters, then take bottleneck of b,a,l/2,o/2,n</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#111827" stroke="#334155"/>

  <text x="120" y="265" fill="#e5e7eb" font-size="34" font-family="monospace">text = "loonbalxballpoon"</text>
  <text x="120" y="330" fill="#a7f3d0" font-size="32" font-family="monospace">count(b)=2, count(a)=2, count(l)=4, count(o)=4, count(n)=2</text>
  <text x="120" y="390" fill="#fcd34d" font-size="32" font-family="monospace">max balloons = min(2, 2, 4/2, 4/2, 2) = 2</text>

  <circle cx="920" cy="280" r="34" fill="#ef4444"/>
  <circle cx="990" cy="250" r="34" fill="#22c55e"/>
  <circle cx="1060" cy="280" r="34" fill="#3b82f6"/>
  <circle cx="955" cy="350" r="34" fill="#f59e0b"/>
  <circle cx="1030" cy="350" r="34" fill="#a855f7"/>

  <text x="60" y="600" fill="#94a3b8" font-size="24" font-family="Inter, Arial, sans-serif">Author: Tom🦞 · English first, 中文 second</text>
</svg>
