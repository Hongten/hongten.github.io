<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 277 candidate elimination and verification diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="78" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 277: Find the Celebrity</text>

  <rect x="50" y="120" width="520" height="450" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="80" y="168" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Step 1: Elimination</text>
  <text x="80" y="212" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">cand = 0</text>
  <text x="80" y="250" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">if knows(cand, i): cand = i</text>
  <text x="80" y="288" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">After one pass, only one possible</text>
  <text x="80" y="318" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">celebrity candidate remains.</text>

  <circle cx="190" cy="420" r="36" fill="#374151"/>
  <circle cx="300" cy="420" r="36" fill="#374151"/>
  <circle cx="410" cy="420" r="36" fill="#22c55e"/>
  <text x="176" y="428" fill="#d1d5db" font-size="22" font-family="Inter,Arial,sans-serif">0</text>
  <text x="286" y="428" fill="#d1d5db" font-size="22" font-family="Inter,Arial,sans-serif">1</text>
  <text x="396" y="428" fill="#052e16" font-size="22" font-family="Inter,Arial,sans-serif">C</text>
  <text x="150" y="488" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">C = final candidate</text>

  <rect x="630" y="120" width="520" height="450" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="660" y="168" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">Step 2: Verification</text>
  <text x="660" y="212" fill="#e5e7eb" font-size="23" font-family="Inter,Arial,sans-serif">for each j != cand:</text>
  <text x="690" y="252" fill="#e5e7eb" font-size="23" font-family="Inter,Arial,sans-serif">1) knows(cand, j) == false</text>
  <text x="690" y="292" fill="#e5e7eb" font-size="23" font-family="Inter,Arial,sans-serif">2) knows(j, cand) == true</text>
  <text x="660" y="338" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Any failure -> return -1</text>
  <text x="660" y="372" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">All pass -> return cand</text>

  <text x="660" y="446" fill="#fde68a" font-size="24" font-family="Inter,Arial,sans-serif">Complexity: O(n) time, O(1) space</text>
  <text x="50" y="610" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
