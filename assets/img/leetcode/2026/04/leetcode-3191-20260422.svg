<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-family:Arial,Helvetica,sans-serif;fill:#93c5fd}
      .b{font-family:Consolas,Monaco,monospace;fill:#f8fafc}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t" font-size="44" font-weight="700">LeetCode 3191</text>
  <text x="60" y="132" class="m" font-size="28">Minimum Operations to Make Binary Array Elements Equal to One I</text>

  <rect x="60" y="180" width="1080" height="360" rx="16" fill="#0f172a" stroke="#334155"/>

  <text x="95" y="235" class="b" font-size="30">nums:   [0, 1, 0, 0, 1, 1]</text>
  <text x="95" y="285" class="b" font-size="28">i=0 is 0  → flip [0..2]   => [1, 0, 1, 0, 1, 1]</text>
  <text x="95" y="335" class="b" font-size="28">i=1 is 0  → flip [1..3]   => [1, 1, 0, 1, 1, 1]</text>
  <text x="95" y="385" class="b" font-size="28">i=2 is 0  → flip [2..4]   => [1, 1, 1, 0, 0, 1]</text>
  <text x="95" y="435" class="b" font-size="28">end has 0s in tail (cannot flip) → impossible => -1</text>
  <text x="95" y="500" class="m" font-size="26">Greedy rule: when nums[i]==0 (i ≤ n-3), flip at i immediately.</text>
</svg>
