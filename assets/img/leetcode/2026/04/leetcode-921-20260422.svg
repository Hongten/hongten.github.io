<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 921 balance counter diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 921: Minimum Add to Make Parentheses Valid</text>

  <rect x="56" y="130" width="1088" height="420" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="180" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Scan:  (  )  )  (  (  )</text>

  <text x="90" y="240" fill="#f8fafc" font-size="26" font-family="JetBrains Mono,Consolas,monospace">balance: 0 → 1 → 0 → 0 → 1 → 2 → 1</text>
  <text x="90" y="290" fill="#f8fafc" font-size="26" font-family="JetBrains Mono,Consolas,monospace">need   : 0 → 0 → 0 → 1 → 1 → 1 → 1</text>

  <line x1="90" y1="330" x2="1110" y2="330" stroke="#334155" />
  <text x="90" y="378" fill="#a7f3d0" font-size="28" font-family="Inter,Arial,sans-serif">Unmatched ')' increments need</text>
  <text x="90" y="424" fill="#a7f3d0" font-size="28" font-family="Inter,Arial,sans-serif">Remaining balance means missing ')'</text>

  <text x="90" y="490" fill="#fde68a" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = need + balance</text>
  <text x="90" y="530" fill="#e2e8f0" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
