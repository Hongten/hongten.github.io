<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3222 move parity diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:44px;font-weight:700}
      .s{font-size:28px;fill:#cbd5e1}
      .b{fill:#111827;stroke:#64748b;stroke-width:2}
      .a{fill:#22c55e}
      .o{fill:#38bdf8}
      .w{font-size:30px;font-weight:700;fill:#f8fafc}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 3222: Coin Game</text>
  <text x="60" y="140" class="t s">k = min(x, y/4), winner depends on parity(k)</text>

  <rect x="60" y="200" width="500" height="320" rx="18" class="b"/>
  <text x="90" y="255" class="t w">Each move consumes</text>
  <circle cx="160" cy="320" r="42" class="a"/>
  <text x="148" y="329" class="t w">x-1</text>
  <text x="220" y="330" class="t s">and</text>
  <circle cx="360" cy="320" r="42" class="o"/>
  <text x="342" y="329" class="t w">y-4</text>
  <text x="90" y="410" class="t s">Maximum valid turns: min(x, floor(y/4))</text>
  <text x="90" y="460" class="t s">Odd turns → Alice wins, Even turns → Bob wins</text>

  <rect x="640" y="200" width="500" height="320" rx="18" class="b"/>
  <text x="680" y="260" class="t w">Turn Parity</text>
  <text x="680" y="320" class="t s">k % 2 == 1 → Alice</text>
  <text x="680" y="380" class="t s">k % 2 == 0 → Bob</text>
  <text x="680" y="460" class="t s">O(1) time, O(1) space</text>
</svg>
