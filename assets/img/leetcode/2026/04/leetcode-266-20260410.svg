<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 266 palindrome permutation odd-frequency rule illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:28px;font-weight:700}
      .s{font-size:20px}
      .b{fill:#334155;stroke:#64748b;stroke-width:2}
      .ok{fill:#22c55e}.bad{fill:#ef4444}
    </style>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>
  <text x="40" y="52" class="t m">LeetCode 266 · Palindrome Permutation</text>
  <text x="40" y="86" class="t s">Count character frequencies → odd-count letters must be ≤ 1</text>

  <rect x="40" y="120" width="410" height="240" rx="14" class="b"/>
  <text x="60" y="155" class="t s">Example A: "code"</text>
  <text x="60" y="195" class="t s">c:1  o:1  d:1  e:1</text>
  <text x="60" y="235" class="t s">Odd counts = 4</text>
  <text x="60" y="275" class="t s">Cannot form palindrome</text>
  <circle cx="360" cy="270" r="18" class="bad"/>
  <text x="353" y="276" class="t" font-size="20" font-weight="700">✗</text>

  <rect x="510" y="120" width="410" height="240" rx="14" class="b"/>
  <text x="530" y="155" class="t s">Example B: "carerac"</text>
  <text x="530" y="195" class="t s">c:2  a:2  r:2  e:1</text>
  <text x="530" y="235" class="t s">Odd counts = 1</text>
  <text x="530" y="275" class="t s">Can form palindrome (e.g. "racecar")</text>
  <circle cx="830" cy="270" r="18" class="ok"/>
  <text x="823" y="276" class="t" font-size="20" font-weight="700">✓</text>
</svg>
