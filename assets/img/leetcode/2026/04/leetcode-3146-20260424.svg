<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 3146 permutation difference diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="70" fill="#e2e8f0" font-size="36" font-family="Arial, sans-serif" font-weight="700">LeetCode 3146 · Permutation Difference</text>
  <text x="60" y="110" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Build index map in s, sum |posS(c) - posT(c)| while scanning t</text>

  <rect x="60" y="170" width="1080" height="170" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="210" fill="#f8fafc" font-size="28" font-family="monospace">s = "abcde"</text>
  <text x="90" y="300" fill="#94a3b8" font-size="26" font-family="monospace">index:   0   1   2   3   4</text>
  <text x="90" y="255" fill="#22d3ee" font-size="26" font-family="monospace">chars:   a   b   c   d   e</text>

  <rect x="60" y="370" width="1080" height="170" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="410" fill="#f8fafc" font-size="28" font-family="monospace">t = "edbac"</text>
  <text x="90" y="500" fill="#94a3b8" font-size="26" font-family="monospace">index:   0   1   2   3   4</text>
  <text x="90" y="455" fill="#f59e0b" font-size="26" font-family="monospace">chars:   e   d   b   a   c</text>

  <text x="640" y="455" fill="#e2e8f0" font-size="24" font-family="monospace">|4-0| + |3-1| + |1-2| + |0-3| + |2-4| = 12</text>
  <text x="640" y="500" fill="#34d399" font-size="30" font-family="Arial, sans-serif" font-weight="700">Answer = 12</text>
</svg>
