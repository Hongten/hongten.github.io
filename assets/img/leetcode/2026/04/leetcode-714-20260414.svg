<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill:#0f172a; }
      .box { fill:#111827; stroke:#60a5fa; stroke-width:2; rx:14; }
      .t { fill:#e5e7eb; font: 28px 'Segoe UI', Arial, sans-serif; }
      .s { fill:#93c5fd; font: 22px 'Segoe UI', Arial, sans-serif; }
      .a { stroke:#34d399; stroke-width:3; marker-end:url(#m); fill:none; }
      .b { stroke:#fbbf24; stroke-width:3; marker-end:url(#m); fill:none; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e5e7eb"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="630"/>
  <text class="t" x="60" y="80">LeetCode 714 · Two-State DP (hold / cash)</text>

  <rect class="box" x="120" y="180" width="400" height="220" rx="14"/>
  <text class="t" x="170" y="250">hold</text>
  <text class="s" x="170" y="300">max profit while holding stock</text>
  <text class="s" x="170" y="340">newHold = max(hold, cash - price)</text>

  <rect class="box" x="680" y="180" width="400" height="220" rx="14"/>
  <text class="t" x="730" y="250">cash</text>
  <text class="s" x="730" y="300">max profit with no stock</text>
  <text class="s" x="730" y="340">newCash = max(cash, hold + price - fee)</text>

  <path class="a" d="M520 250 C600 220, 600 220, 680 250"/>
  <text class="s" x="540" y="210">sell: +price - fee</text>
  <path class="b" d="M680 320 C600 360, 600 360, 520 320"/>
  <text class="s" x="530" y="395">buy: -price</text>

  <text class="s" x="60" y="560">Answer = cash after scanning all days · O(n) time, O(1) extra space</text>
</svg>
