<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3289 XOR split diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3289: The Two Sneaky Numbers of Digitville</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">XOR all nums and expected range 0..n-1, then split by lowbit</text>

  <rect x="60" y="190" width="1080" height="370" rx="18" fill="#1f2937" stroke="#374151"/>

  <rect x="100" y="235" width="470" height="120" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="125" y="285" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">mix = XOR(nums) ^ XOR(0..n-1)</text>
  <text x="125" y="325" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">mix = x ^ y</text>

  <rect x="630" y="235" width="470" height="120" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="655" y="285" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">lowbit = mix &amp; -mix</text>
  <text x="655" y="325" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">pick one differing bit between x and y</text>

  <rect x="100" y="390" width="470" height="130" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="125" y="440" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Group A (bit=0): XOR =&gt; x</text>
  <text x="125" y="476" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Group B (bit=1): XOR =&gt; y</text>

  <rect x="630" y="390" width="470" height="130" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="655" y="440" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Process both nums and range 0..n-1 in same partition rule</text>
  <text x="655" y="476" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Time O(n), Extra Space O(1)</text>

  <text x="60" y="600" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文后置 · Full multi-language code tabs</text>
</svg>
