<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="DP transition for LeetCode 1155">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 1155 • Dice DP Transition</text>
  <text x="60" y="120" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">dp[s] -> next[s+f], f in [1..k], modulo 1e9+7</text>

  <rect x="90" y="190" width="420" height="280" rx="16" fill="#111827" stroke="#334155"/>
  <text x="120" y="235" fill="#f8fafc" font-size="28" font-family="Courier New, monospace">Current layer dp</text>
  <text x="120" y="280" fill="#cbd5e1" font-size="24" font-family="Courier New, monospace">dp[0]=1, dp[1]=0, ...</text>
  <text x="120" y="320" fill="#cbd5e1" font-size="24" font-family="Courier New, monospace">for each reachable sum s</text>
  <text x="120" y="360" fill="#cbd5e1" font-size="24" font-family="Courier New, monospace">  try face f = 1..k</text>

  <rect x="700" y="190" width="420" height="280" rx="16" fill="#111827" stroke="#334155"/>
  <text x="730" y="235" fill="#f8fafc" font-size="28" font-family="Courier New, monospace">Next layer next</text>
  <text x="730" y="280" fill="#cbd5e1" font-size="24" font-family="Courier New, monospace">next[s+f] += dp[s]</text>
  <text x="730" y="320" fill="#cbd5e1" font-size="24" font-family="Courier New, monospace">if s+f <= target</text>
  <text x="730" y="360" fill="#cbd5e1" font-size="24" font-family="Courier New, monospace">all updates % MOD</text>

  <line x1="530" y1="300" x2="680" y2="300" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="555" y="280" fill="#7dd3fc" font-size="22" font-family="Arial, sans-serif">transition</text>

  <text x="60" y="560" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Repeat for n dice, answer = dp[target]</text>
</svg>
