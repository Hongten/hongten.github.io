<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 180 Consecutive Numbers diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .th{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .td{font:600 22px 'Consolas','Menlo',monospace;fill:#e2e8f0}
      .hl{fill:#22c55e;fill-opacity:.22;stroke:#22c55e;stroke-width:3}
      .note{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#a7f3d0}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="86" class="title">LeetCode 180 · Consecutive Numbers</text>
  <text x="60" y="122" class="sub">Detect 3 adjacent equal nums by id order (LAG / self-join)</text>

  <rect x="120" y="170" width="960" height="340" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="120" y="170" width="960" height="58" rx="16" fill="#e2e8f0"/>
  <text x="220" y="206" class="th">id</text>
  <text x="560" y="206" class="th">num</text>

  <line x1="120" y1="228" x2="1080" y2="228" stroke="#334155"/>
  <line x1="420" y1="170" x2="420" y2="510" stroke="#334155"/>

  <rect x="130" y="286" width="940" height="162" class="hl" rx="10"/>

  <text x="240" y="270" class="td">1</text><text x="560" y="270" class="td">1</text>
  <text x="240" y="324" class="td">2</text><text x="560" y="324" class="td">1</text>
  <text x="240" y="378" class="td">3</text><text x="560" y="378" class="td">1</text>
  <text x="240" y="432" class="td">4</text><text x="560" y="432" class="td">2</text>
  <text x="240" y="486" class="td">5</text><text x="560" y="486" class="td">1</text>

  <text x="760" y="356" class="note">ids 1,2,3 → num = 1 is consecutive</text>
  <text x="760" y="392" class="note">Output: ConsecutiveNums = 1</text>
</svg>
