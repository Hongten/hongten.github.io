<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2697 Lexicographically Smallest Palindrome diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="94" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700">LeetCode 2697: Lexicographically Smallest Palindrome</text>
  <text x="56" y="138" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="26">Two Pointers + replace mirrored chars with min(left, right)</text>

  <rect x="56" y="190" width="1088" height="370" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="120" y="270" fill="#f9fafb" font-family="monospace" font-size="40">e g c f e</text>
  <text x="120" y="338" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="24">Pair (0,4): min(e,e)=e, keep both</text>

  <line x1="160" y1="386" x2="420" y2="386" stroke="#60a5fa" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="760" y1="386" x2="1020" y2="386" stroke="#34d399" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <text x="120" y="450" fill="#f9fafb" font-family="monospace" font-size="40">e f c f e</text>
  <text x="120" y="518" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="24">Pair (1,3): min(g,f)=f, so both become f</text>
  <text x="120" y="548" fill="#fca5a5" font-family="Inter,Arial,sans-serif" font-size="22">Always assign both sides to the smaller one for lexicographically smallest result.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="#93c5fd"/>
    </marker>
  </defs>
</svg>
