<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1032 reversed trie stream diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1032 · Stream of Characters</text>
  <text x="56" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Reversed Trie + Backward Scan on Query Stream</text>

  <rect x="56" y="180" width="520" height="380" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="82" y="220" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Words: ["cd", "f", "kl"]</text>
  <text x="82" y="260" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Insert reversed: "dc", "f", "lk"</text>

  <circle cx="140" cy="330" r="24" fill="#1f2937" stroke="#64748b"/>
  <text x="133" y="337" fill="#e5e7eb" font-size="18" font-family="Inter,Arial,sans-serif">∅</text>
  <circle cx="250" cy="300" r="24" fill="#1f2937" stroke="#64748b"/>
  <text x="244" y="307" fill="#e5e7eb" font-size="18" font-family="Inter,Arial,sans-serif">d</text>
  <circle cx="360" cy="275" r="24" fill="#14532d" stroke="#22c55e"/>
  <text x="354" y="282" fill="#dcfce7" font-size="18" font-family="Inter,Arial,sans-serif">c</text>

  <circle cx="250" cy="360" r="24" fill="#14532d" stroke="#22c55e"/>
  <text x="245" y="367" fill="#dcfce7" font-size="18" font-family="Inter,Arial,sans-serif">f</text>

  <circle cx="250" cy="430" r="24" fill="#1f2937" stroke="#64748b"/>
