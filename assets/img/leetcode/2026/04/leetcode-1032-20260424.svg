  <circle cx="360" cy="455" r="24" fill="#14532d" stroke="#22c55e"/>
  <text x="354" y="462" fill="#dcfce7" font-size="18" font-family="Inter,Arial,sans-serif">k</text>

  <path d="M164 322 L226 307" stroke="#94a3b8" stroke-width="3"/>
  <path d="M274 292 L336 281" stroke="#94a3b8" stroke-width="3"/>
  <path d="M164 338 L226 352" stroke="#94a3b8" stroke-width="3"/>
  <path d="M164 348 L226 420" stroke="#94a3b8" stroke-width="3"/>
  <path d="M274 438 L336 447" stroke="#94a3b8" stroke-width="3"/>

  <rect x="620" y="180" width="524" height="380" rx="16" fill="#111827" stroke="#334155"/>
  <text x="650" y="225" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Query Flow</text>
  <text x="650" y="275" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">stream: ... a b c d</text>
  <text x="650" y="315" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">scan backward: d → c</text>
