  <text x="90" y="365" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Rule 1: fixed length</text>
  <text x="90" y="405" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Rule 2: dashes at positions 4 and 8</text>
  <text x="90" y="445" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Rule 3: letters and digits checked by index</text>

  <text x="60" y="585" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">Pattern Check + Character Rules • EN/中文</text>
