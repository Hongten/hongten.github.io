<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#93c5fd" font-size="36" font-family="Arial, sans-serif" font-weight="700">LeetCode 3465</text>
  <text x="60" y="145" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">Find Products with Valid Serial Numbers</text>

  <rect x="60" y="210" width="1080" height="320" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="270" fill="#f8fafc" font-size="30" font-family="Consolas, monospace">AAA-123-XYZ</text>
  <text x="90" y="315" fill="#22c55e" font-size="24" font-family="Arial, sans-serif">✓ Uppercase block</text>
  <text x="420" y="315" fill="#38bdf8" font-size="24" font-family="Arial, sans-serif">✓ Digits block</text>
