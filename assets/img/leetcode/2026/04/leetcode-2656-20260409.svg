<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2656 maximum sum with exactly k elements greedy progression diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121a33"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2656 · Maximum Sum With Exactly K Elements</text>
  <text x="60" y="130" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Always pick current max → it increases by 1 each time</text>

  <rect x="60" y="170" width="1080" height="390" rx="18" fill="#1f2937" stroke="#334155"/>

  <text x="100" y="240" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">If max(nums) = m and operations = k</text>
  <text x="100" y="300" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">Pick sequence: m, m+1, m+2, ... , m+k-1</text>

  <g transform="translate(100,340)">
    <rect x="0" y="0" width="130" height="64" rx="12" fill="#2563eb"/>
    <rect x="160" y="0" width="130" height="64" rx="12" fill="#3b82f6"/>
    <rect x="320" y="0" width="130" height="64" rx="12" fill="#60a5fa"/>
    <rect x="480" y="0" width="130" height="64" rx="12" fill="#93c5fd"/>
    <text x="50" y="41" fill="#fff" font-size="26" font-family="Inter,Arial,sans-serif">m</text>
    <text x="194" y="41" fill="#fff" font-size="26" font-family="Inter,Arial,sans-serif">m+1</text>
    <text x="354" y="41" fill="#fff" font-size="26" font-family="Inter,Arial,sans-serif">m+2</text>
    <text x="535" y="41" fill="#0f172a" font-size="26" font-family="Inter,Arial,sans-serif">m+k-1</text>
    <text x="136" y="41" fill="#cbd5e1" font-size="30" font-family="Inter,Arial,sans-serif">+</text>
    <text x="296" y="41" fill="#cbd5e1" font-size="30" font-family="Inter,Arial,sans-serif">+</text>
    <text x="456" y="41" fill="#cbd5e1" font-size="30" font-family="Inter,Arial,sans-serif">+ ... +</text>
  </g>

  <text x="100" y="490" fill="#86efac" font-size="32" font-family="JetBrains Mono,Consolas,monospace">Answer = k*m + k*(k-1)/2</text>
  <text x="100" y="535" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Complexity: O(n) time, O(1) space</text>
</svg>
