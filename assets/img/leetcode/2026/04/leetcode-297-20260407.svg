<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 297 serialization preorder and null markers diagram"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 297: Serialize and Deserialize Binary Tree</text><text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Preorder + null marker (#) keeps full structure</text><rect x="60" y="180" width="1080" height="390" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="245" fill="#cbd5e1" font-size="28" font-family="monospace">Tree:        1</text><text x="90" y="285" fill="#cbd5e1" font-size="28" font-family="monospace">           /   \</text><text x="90" y="325" fill="#cbd5e1" font-size="28" font-family="monospace">          2     3</text><text x="90" y="365" fill="#cbd5e1" font-size="28" font-family="monospace">               / \</text><text x="90" y="405" fill="#cbd5e1" font-size="28" font-family="monospace">              4   5</text><text x="90" y="470" fill="#86efac" font-size="30" font-family="monospace">Serialized preorder: 1,2,#,#,3,4,#,#,5,#,#</text><text x="90" y="520" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">Deserialize by consuming tokens in the same preorder recursion.</text></svg>