<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b1020"/>
  <rect x="60" y="60" width="1080" height="510" rx="20" fill="#121a33" stroke="#2a3b6b"/>
  <text x="90" y="130" fill="#9ecbff" font-size="40" font-family="Arial">LeetCode 3360 · Stone Removal Game</text>
  <text x="90" y="190" fill="#ffffff" font-size="28" font-family="Arial">n stones, remove 10 then 9 then 8 ... until impossible</text>
  <text x="90" y="240" fill="#ffd166" font-size="28" font-family="Arial">Observation: each turn consumes decreasing integers (10,9,...)</text>
  <rect x="90" y="290" width="1020" height="220" rx="14" fill="#0d1428" stroke="#3a4c7a"/>
  <text x="120" y="340" fill="#9ecbff" font-size="26" font-family="Courier New">remove = 10, 9, 8, ...</text>
  <text x="120" y="390" fill="#d7e3ff" font-size="26" font-family="Courier New">while n >= remove: n -= remove; remove--;</text>
  <text x="120" y="440" fill="#ff9f9f" font-size="26" font-family="Courier New">cannot move => lose, previous mover wins</text>
  <text x="90" y="545" fill="#7aa2ff" font-size="22" font-family="Arial">Simulation / Game Theory</text>
</svg>