<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 760 Find Anagram Mappings diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="105" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 760: Find Anagram Mappings</text>
  <text x="60" y="160" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Build value → indices map from nums2, then pop for nums1</text>

  <rect x="60" y="210" width="510" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <rect x="630" y="210" width="510" height="320" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="260" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">nums2 index buckets</text>
  <text x="90" y="308" fill="#86efac" font-size="25" font-family="monospace">12 → [0]</text>
  <text x="90" y="352" fill="#86efac" font-size="25" font-family="monospace">28 → [1, 3]</text>
  <text x="90" y="396" fill="#86efac" font-size="25" font-family="monospace">46 → [2]</text>
  <text x="90" y="460" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Duplicates keep multiple indices</text>

  <text x="660" y="260" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">Traverse nums1</text>
  <text x="660" y="308" fill="#fde68a" font-size="25" font-family="monospace">12 → pop 0</text>
  <text x="660" y="352" fill="#fde68a" font-size="25" font-family="monospace">28 → pop 3</text>
  <text x="660" y="396" fill="#fde68a" font-size="25" font-family="monospace">46 → pop 2</text>
  <text x="660" y="440" fill="#fde68a" font-size="25" font-family="monospace">28 → pop 1</text>
  <text x="660" y="498" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">ans = [0, 3, 2, 1]</text>

  <text x="60" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first · 中文完整代码区</text>
