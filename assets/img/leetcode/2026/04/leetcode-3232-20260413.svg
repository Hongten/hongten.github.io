<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3232 one-digit vs two-digit sum comparison diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3232: Find if Digit Game Can Be Won</text>
  <text x="60" y="140" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Compare sum(one-digit) and sum(two-digit)</text>

  <rect x="70" y="190" width="500" height="340" rx="18" fill="#111827" stroke="#374151"/>
  <text x="95" y="240" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">One-digit bucket (&lt; 10)</text>
  <text x="95" y="290" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">nums: [1, 2, 8]</text>
  <text x="95" y="340" fill="#86efac" font-size="32" font-family="Inter,Arial,sans-serif">sumOne = 11</text>

  <rect x="630" y="190" width="500" height="340" rx="18" fill="#111827" stroke="#374151"/>
  <text x="655" y="240" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Two-digit bucket (≥ 10)</text>
  <text x="655" y="290" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">nums: [12, 13]</text>
  <text x="655" y="340" fill="#fcd34d" font-size="32" font-family="Inter,Arial,sans-serif">sumTwo = 25</text>

  <text x="470" y="590" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">sumOne != sumTwo  →  Alice can pick larger sum and win</text>
</svg>
