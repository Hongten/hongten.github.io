<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 665 local greedy fix diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 665: Non-decreasing Array</text>
  <rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="210" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Violation: nums[i] &gt; nums[i+1]</text>
  <text x="100" y="260" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Option A: lower nums[i] when nums[i-1] &lt;= nums[i+1]</text>
  <text x="100" y="304" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Option B: raise nums[i+1] otherwise</text>

  <rect x="100" y="340" width="470" height="150" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="120" y="385" fill="#86efac" font-size="24" font-family="monospace">if i==0 or nums[i-1] &lt;= nums[i+1]:</text>
  <text x="120" y="420" fill="#86efac" font-size="24" font-family="monospace">    nums[i] = nums[i+1]</text>
  <text x="120" y="455" fill="#86efac" font-size="24" font-family="monospace">else: nums[i+1] = nums[i]</text>

  <rect x="620" y="340" width="500" height="150" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="640" y="390" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">At most one violation allowed</text>
  <text x="640" y="435" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">violations &gt; 1  →  false</text>

  <text x="60" y="608" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first · 中文 section includes full code tabs</text>
</svg>
