<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1749 dual Kadane diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 1749</text>
  <text x="56" y="140" fill="#cbd5e1" font-size="32" font-family="Inter, Arial, sans-serif">Maximum Absolute Sum of Any Subarray</text>

  <rect x="56" y="190" width="1088" height="360" rx="20" fill="#1f2937" stroke="#334155"/>

  <text x="92" y="246" fill="#93c5fd" font-size="28" font-family="Inter, Arial, sans-serif">nums: [2, -5, 1, -4, 3, -2]</text>
  <text x="92" y="292" fill="#a7f3d0" font-size="26" font-family="Inter, Arial, sans-serif">max subarray sum = 3</text>
  <text x="92" y="334" fill="#fca5a5" font-size="26" font-family="Inter, Arial, sans-serif">min subarray sum = -8</text>

  <line x1="92" y1="370" x2="1108" y2="370" stroke="#475569" stroke-width="2"/>

  <text x="92" y="418" fill="#e5e7eb" font-size="28" font-family="Inter, Arial, sans-serif">answer = max( maxSum, -minSum ) = max(3, 8) = 8</text>
  <text x="92" y="468" fill="#fde68a" font-size="24" font-family="Inter, Arial, sans-serif">One pass: maintain maxEnding and minEnding simultaneously</text>
  <text x="92" y="515" fill="#86efac" font-size="24" font-family="Inter, Arial, sans-serif">Author: Tom🦞</text>
</svg>
