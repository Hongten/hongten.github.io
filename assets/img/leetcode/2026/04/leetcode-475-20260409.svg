<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 475 Heaters nearest-heater radius diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title { fill: #e5e7eb; font: 700 46px Inter, Arial, sans-serif; }
      .sub { fill: #93c5fd; font: 600 26px Inter, Arial, sans-serif; }
      .label { fill: #d1d5db; font: 500 22px Inter, Arial, sans-serif; }
      .small { fill: #9ca3af; font: 500 18px Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="75" class="title">LeetCode 475 · Heaters</text>
  <text x="50" y="115" class="sub">For each house, find nearest heater distance; answer = maximum of those minima</text>

  <line x1="90" y1="360" x2="1110" y2="360" stroke="#4b5563" stroke-width="4"/>

  <circle cx="180" cy="360" r="14" fill="#f59e0b"/>
  <circle cx="430" cy="360" r="14" fill="#f59e0b"/>
  <circle cx="760" cy="360" r="14" fill="#f59e0b"/>
  <text x="155" y="330" class="label">H1</text>
  <text x="405" y="330" class="label">H2</text>
  <text x="735" y="330" class="label">H3</text>

  <rect x="280" y="320" width="18" height="40" rx="6" fill="#60a5fa"/>
  <rect x="610" y="320" width="18" height="40" rx="6" fill="#60a5fa"/>
  <rect x="960" y="320" width="18" height="40" rx="6" fill="#60a5fa"/>
  <text x="260" y="300" class="label">T1</text>
  <text x="590" y="300" class="label">T2</text>
  <text x="940" y="300" class="label">T3</text>

  <line x1="180" y1="360" x2="289" y2="360" stroke="#34d399" stroke-width="4" stroke-dasharray="8 7"/>
  <line x1="430" y1="360" x2="619" y2="360" stroke="#34d399" stroke-width="4" stroke-dasharray="8 7"/>
  <line x1="760" y1="360" x2="619" y2="360" stroke="#34d399" stroke-width="4" stroke-dasharray="8 7"/>
  <text x="150" y="390" class="small">d(H1)=min(|H1-T1|,...)</text>
  <text x="380" y="390" class="small">d(H2)=min(...)</text>
  <text x="700" y="390" class="small">d(H3)=min(...)</text>

  <rect x="55" y="455" width="1090" height="125" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="85" y="503" class="label">radius = max( d(H1), d(H2), d(H3), ... )</text>
  <text x="85" y="545" class="small">Sort heaters + binary search insertion point for each house (left/right nearest heater candidates)</text>
</svg>
