<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{fill:#e2e8f0;font-family:Arial,sans-serif}
      .m{fill:#38bdf8;font-family:Arial,sans-serif}
      .n{fill:#a7f3d0;font-family:Arial,sans-serif}
      .b{fill:none;stroke:#64748b;stroke-width:3}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" class="t" font-size="44" font-weight="700">LeetCode 671: Second Minimum Node In a Binary Tree</text>
  <text x="60" y="130" class="m" font-size="28">DFS candidate pruning: find smallest value &gt; root.val</text>

  <circle cx="600" cy="230" r="42" fill="#1d4ed8"/>
  <text x="590" y="238" class="t" font-size="28" font-weight="700">2</text>

  <line x1="580" y1="265" x2="470" y2="350" class="b"/>
  <line x1="620" y1="265" x2="730" y2="350" class="b"/>

  <circle cx="450" cy="370" r="40" fill="#1d4ed8"/>
  <text x="440" y="378" class="t" font-size="28" font-weight="700">2</text>

  <circle cx="750" cy="370" r="40" fill="#0ea5e9"/>
  <text x="740" y="378" class="t" font-size="28" font-weight="700">5</text>

  <line x1="430" y1="405" x2="350" y2="485" class="b"/>
  <line x1="470" y1="405" x2="550" y2="485" class="b"/>

  <circle cx="330" cy="505" r="34" fill="#1d4ed8"/>
  <text x="322" y="512" class="t" font-size="24" font-weight="700">2</text>

  <circle cx="570" cy="505" r="34" fill="#1d4ed8"/>
  <text x="562" y="512" class="t" font-size="24" font-weight="700">2</text>

  <text x="810" y="360" class="n" font-size="30" font-weight="700">Second minimum = 5</text>
  <text x="810" y="404" class="t" font-size="24">root minimum = 2</text>
  <text x="810" y="440" class="t" font-size="24">scan nodes, keep best candidate &gt; 2</text>
</svg>
