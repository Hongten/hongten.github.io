<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 575 Distribute Candies diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 575 · Distribute Candies</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Arial, Helvetica, sans-serif">Answer = min(uniqueTypes, n/2)</text>

  <rect x="70" y="190" width="480" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="95" y="230" fill="#f8fafc" font-size="24" font-family="Arial">Total candies: n = 8</text>
  <text x="95" y="270" fill="#f8fafc" font-size="24" font-family="Arial">Alice can take: n/2 = 4</text>
  <text x="95" y="310" fill="#f8fafc" font-size="24" font-family="Arial">Unique types: u = 5</text>
  <text x="95" y="370" fill="#86efac" font-size="36" font-family="Arial" font-weight="700">min(5, 4) = 4</text>
  <text x="95" y="420" fill="#cbd5e1" font-size="24" font-family="Arial">Maximum distinct types Alice gets = 4</text>

  <rect x="620" y="190" width="510" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="650" y="235" fill="#f8fafc" font-size="24" font-family="Arial">Candy types (example): [1,1,2,2,3,3,4,5]</text>
  <g font-family="Arial" font-size="22" fill="#e2e8f0">
    <circle cx="700" cy="300" r="26" fill="#ef4444"/><text x="693" y="307">1</text>
    <circle cx="770" cy="300" r="26" fill="#f59e0b"/><text x="763" y="307">2</text>
    <circle cx="840" cy="300" r="26" fill="#10b981"/><text x="833" y="307">3</text>
    <circle cx="910" cy="300" r="26" fill="#3b82f6"/><text x="903" y="307">4</text>
    <circle cx="980" cy="300" r="26" fill="#a855f7"/><text x="973" y="307">5</text>
  </g>
  <text x="650" y="370" fill="#cbd5e1" font-size="22" font-family="Arial">Alice picks 4 candies, at most 4 distinct types.</text>
  <text x="650" y="408" fill="#cbd5e1" font-size="22" font-family="Arial">Even with 5 types available, the half-length cap dominates.</text>

  <text x="60" y="585" fill="#94a3b8" font-size="20" font-family="Arial">Author: Tom🦞 · English first, 中文后置 · Hash Set + Greedy cap</text>
</svg>
