<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1493 sliding window with one zero diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1493 · Sliding Window (at most one 0)</text>
  <text x="56" y="124" fill="#bfdbfe" font-size="24" font-family="Inter,Arial,sans-serif">Longest Subarray of 1's After Deleting One Element</text>

  <rect x="70" y="180" width="1060" height="210" rx="16" fill="#0f172a" stroke="#334155"/>
  <g font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700" text-anchor="middle">
    <rect x="120" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="165" y="292" fill="#f8fafc">1</text>
    <rect x="220" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="265" y="292" fill="#f8fafc">1</text>
    <rect x="320" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="365" y="292" fill="#f8fafc">0</text>
    <rect x="420" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="465" y="292" fill="#f8fafc">1</text>
    <rect x="520" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="565" y="292" fill="#f8fafc">1</text>
    <rect x="620" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="665" y="292" fill="#f8fafc">1</text>
    <rect x="720" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="765" y="292" fill="#f8fafc">0</text>
    <rect x="820" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="865" y="292" fill="#f8fafc">1</text>
    <rect x="920" y="235" width="90" height="90" rx="10" fill="#1e293b"/><text x="965" y="292" fill="#f8fafc">1</text>
  </g>

  <rect x="318" y="228" width="495" height="104" rx="14" fill="none" stroke="#22d3ee" stroke-width="5"/>
  <text x="560" y="365" fill="#22d3ee" font-size="24" font-family="Inter,Arial,sans-serif" text-anchor="middle">window keeps at most one zero</text>

  <text x="70" y="470" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">answer = right - left (equivalent to window size - 1)</text>
  <text x="70" y="515" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Delete one element, keep longest all-ones segment.</text>
  <text x="70" y="570" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
