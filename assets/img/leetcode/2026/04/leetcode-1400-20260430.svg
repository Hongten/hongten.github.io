<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>
<text x="70" y="110" fill="#e2e8f0" font-size="46" font-family="Arial">LeetCode 1400, Construct K Palindrome Strings</text>
<rect x="70" y="170" width="500" height="360" rx="16" fill="#111827" stroke="#334155"/>
<text x="95" y="220" fill="#93c5fd" font-size="34" font-family="Arial">Rule 1, k ≤ |s|</text>
<text x="95" y="280" fill="#93c5fd" font-size="34" font-family="Arial">Rule 2, oddCount ≤ k</text>
<text x="95" y="350" fill="#cbd5e1" font-size="30" font-family="Arial">oddCount = #letters with odd freq</text>
<rect x="620" y="170" width="500" height="360" rx="16" fill="#111827" stroke="#334155"/>
<text x="650" y="235" fill="#86efac" font-size="30" font-family="Arial">Example, s = annabelle, k = 2</text>
<text x="650" y="295" fill="#e2e8f0" font-size="30" font-family="Arial">odd letters: b, n => oddCount = 2</text>
<text x="650" y="355" fill="#fcd34d" font-size="34" font-family="Arial">2 ≤ 2, possible ✅</text>
</svg>