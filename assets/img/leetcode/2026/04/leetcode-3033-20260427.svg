<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3033 Modify the Matrix column maxima diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3033 · Modify the Matrix</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Replace each -1 with the maximum in its column</text>

  <g transform="translate(70,180)">
    <text x="0" y="-20" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Input matrix</text>
    <rect x="0" y="0" width="420" height="300" rx="14" fill="#1f2937" stroke="#374151"/>

    <g fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace" text-anchor="middle">
      <text x="70" y="70">1</text><text x="210" y="70">-1</text><text x="350" y="70">4</text>
      <text x="70" y="160">-1</text><text x="210" y="160">3</text><text x="350" y="160">2</text>
      <text x="70" y="250">5</text><text x="210" y="250">-1</text><text x="350" y="250">-1</text>
    </g>
    <g stroke="#4b5563" stroke-width="2">
      <line x1="140" y1="20" x2="140" y2="280"/><line x1="280" y1="20" x2="280" y2="280"/>
      <line x1="20" y1="100" x2="400" y2="100"/><line x1="20" y1="200" x2="400" y2="200"/>
    </g>
  </g>

  <g transform="translate(530,180)">
    <text x="0" y="-20" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Column max = [5, 3, 4]</text>
    <rect x="0" y="0" width="420" height="300" rx="14" fill="#1f2937" stroke="#374151"/>

    <g fill="#86efac" font-size="34" font-family="JetBrains Mono,Consolas,monospace" text-anchor="middle">
      <text x="70" y="70">1</text><text x="210" y="70">3</text><text x="350" y="70">4</text>
      <text x="70" y="160">5</text><text x="210" y="160">3</text><text x="350" y="160">2</text>
      <text x="70" y="250">5</text><text x="210" y="250">3</text><text x="350" y="250">4</text>
    </g>
    <g stroke="#4b5563" stroke-width="2">
      <line x1="140" y1="20" x2="140" y2="280"/><line x1="280" y1="20" x2="280" y2="280"/>
      <line x1="20" y1="100" x2="400" y2="100"/><line x1="20" y1="200" x2="400" y2="200"/>
    </g>
  </g>

  <path d="M500 330 L530 330" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#93c5fd"/>
