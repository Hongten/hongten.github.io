<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1688 tournament elimination diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="88" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1688 · Count of Matches in Tournament</text>
  <text x="56" y="128" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Invariant: each match eliminates one team ⇒ total matches = n - 1</text>

  <rect x="56" y="180" width="1088" height="388" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="96" y="236" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">Round Simulation Example (n = 7)</text>

  <rect x="96" y="266" width="220" height="72" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="116" y="308" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">R1: 7 teams</text>
  <text x="116" y="334" fill="#86efac" font-size="20" font-family="JetBrains Mono,Consolas,monospace">3 matches + 1 bye</text>

  <line x1="328" y1="302" x2="460" y2="302" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="472" y="266" width="220" height="72" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="492" y="308" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">R2: 4 teams</text>
  <text x="492" y="334" fill="#86efac" font-size="20" font-family="JetBrains Mono,Consolas,monospace">2 matches</text>

  <line x1="704" y1="302" x2="836" y2="302" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="848" y="266" width="220" height="72" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="868" y="308" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">R3: 2 teams</text>
  <text x="868" y="334" fill="#86efac" font-size="20" font-family="JetBrains Mono,Consolas,monospace">1 match</text>

  <text x="96" y="416" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">Total matches = 3 + 2 + 1 = 6 = 7 - 1</text>
  <text x="96" y="462" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">General rule: single-elimination with n teams always needs n-1 matches.</text>

  <text x="96" y="530" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
