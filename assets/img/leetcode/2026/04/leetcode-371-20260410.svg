<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 371 Sum of Two Integers bitwise carry propagation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="94" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 371 · Sum of Two Integers</text>
  <text x="56" y="142" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Bitwise addition = XOR (sum bits) + AND&lt;&lt;1 (carry bits)</text>

  <rect x="56" y="182" width="1088" height="378" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="94" y="248" fill="#cbd5e1" font-size="30" font-family="JetBrains Mono,Consolas,monospace">a      = 0 1 1 0 1</text>
  <text x="94" y="292" fill="#cbd5e1" font-size="30" font-family="JetBrains Mono,Consolas,monospace">b      = 0 0 1 1 1</text>
  <line x1="90" y1="310" x2="720" y2="310" stroke="#475569" stroke-width="2"/>
  <text x="94" y="354" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">a ^ b  = 0 1 0 1 0   (sum without carry)</text>
  <text x="94" y="398" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,Consolas,monospace">a &amp; b  = 0 0 1 0 1</text>
  <text x="94" y="442" fill="#fda4af" font-size="30" font-family="JetBrains Mono,Consolas,monospace">(a&amp;b)&lt;&lt;1 = 0 1 0 1 0 (carry to next bit)</text>
  <text x="94" y="500" fill="#e2e8f0" font-size="28" font-family="Inter,Arial,sans-serif">Repeat until carry becomes 0, then result is stable.</text>

  <text x="56" y="602" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文后置 · Java default tabs</text>
</svg>
