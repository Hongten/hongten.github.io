<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 177 Nth Highest Salary ranking diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 177 · Nth Highest Salary</text>
  <text x="60" y="130" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">DISTINCT salary → ORDER BY DESC → OFFSET N-1</text>

  <rect x="80" y="180" width="300" height="360" rx="18" fill="#111827" stroke="#334155"/>
  <text x="110" y="225" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="700">Employee.salary</text>
  <text x="120" y="275" fill="#cbd5e1" font-size="26" font-family="Consolas, monospace">100</text>
  <text x="120" y="320" fill="#cbd5e1" font-size="26" font-family="Consolas, monospace">300</text>
  <text x="120" y="365" fill="#cbd5e1" font-size="26" font-family="Consolas, monospace">200</text>
  <text x="120" y="410" fill="#cbd5e1" font-size="26" font-family="Consolas, monospace">300</text>
  <text x="120" y="455" fill="#cbd5e1" font-size="26" font-family="Consolas, monospace">500</text>

  <rect x="450" y="180" width="300" height="360" rx="18" fill="#111827" stroke="#334155"/>
  <text x="480" y="225" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="700">Distinct + Desc</text>
  <text x="490" y="285" fill="#93c5fd" font-size="30" font-family="Consolas, monospace">1: 500</text>
  <text x="490" y="335" fill="#93c5fd" font-size="30" font-family="Consolas, monospace">2: 300</text>
  <text x="490" y="385" fill="#93c5fd" font-size="30" font-family="Consolas, monospace">3: 200</text>
  <text x="490" y="435" fill="#93c5fd" font-size="30" font-family="Consolas, monospace">4: 100</text>

  <rect x="820" y="180" width="300" height="360" rx="18" fill="#111827" stroke="#334155"/>
  <text x="850" y="225" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="700">Pick Nth</text>
  <text x="860" y="300" fill="#fde68a" font-size="34" font-family="Consolas, monospace">N = 2</text>
  <text x="860" y="355" fill="#fcd34d" font-size="42" font-family="Consolas, monospace" font-weight="700">answer = 300</text>
  <text x="860" y="420" fill="#94a3b8" font-size="23" font-family="Arial, sans-serif">If N is out of range → NULL</text>

  <path d="M390 360 L440 360" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 360 L810 360" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#94a3b8" />
    </marker>
  </defs>
</svg>