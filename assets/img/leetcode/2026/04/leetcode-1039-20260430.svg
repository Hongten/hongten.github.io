<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><polygon points="220,470 420,170 780,160 980,440 620,520" fill="none" stroke="#60a5fa" stroke-width="6"/><line x1="220" y1="470" x2="780" y2="160" stroke="#34d399" stroke-width="4"/><line x1="220" y1="470" x2="620" y2="520" stroke="#34d399" stroke-width="4"/><line x1="420" y1="170" x2="980" y2="440" stroke="#34d399" stroke-width="4"/><text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Arial">LeetCode 1039: Minimum Score Triangulation of Polygon</text><text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial">Interval DP: dp[i][j] = min(dp[i][k] + dp[k][j] + a[i]*a[k]*a[j])</text></svg>