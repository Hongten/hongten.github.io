<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1346 hash set one-pass diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="64" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1346: Check If N and Its Double Exist</text>
  <text x="64" y="150" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">One-pass Hash Set: check 2x or (x/2 when even)</text>

  <rect x="64" y="200" width="1072" height="360" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="255" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">arr = [10, 2, 5, 3]</text>
  <text x="100" y="305" fill="#86efac" font-size="28" font-family="JetBrains Mono,Consolas,monospace">seen = {10}</text>
  <text x="100" y="355" fill="#fbbf24" font-size="28" font-family="JetBrains Mono,Consolas,monospace">x = 5, check 2*x = 10  → found ✓</text>
  <text x="100" y="405" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Return true immediately (no O(n²) pair scan needed)</text>

  <text x="100" y="485" fill="#c4b5fd" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: for current x, if seen contains 2x or x/2 (x even), answer exists.</text>
  <text x="100" y="530" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
