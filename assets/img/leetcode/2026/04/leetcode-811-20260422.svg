<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 811 suffix subdomain aggregation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 811: Subdomain Visit Count</text>
  <rect x="60" y="140" width="1080" height="430" rx="16" fill="#111827" stroke="#334155"/>

  <text x="95" y="200" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Input: 900 discuss.leetcode.com</text>
  <text x="95" y="250" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Split suffixes and add count to each:</text>

  <rect x="95" y="285" width="460" height="60" rx="10" fill="#1e293b"/>
  <text x="115" y="323" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">discuss.leetcode.com += 900</text>

  <rect x="95" y="365" width="380" height="60" rx="10" fill="#1e293b"/>
  <text x="115" y="403" fill="#f9a8d4" font-size="26" font-family="Inter,Arial,sans-serif">leetcode.com += 900</text>

  <rect x="95" y="445" width="250" height="60" rx="10" fill="#1e293b"/>
  <text x="115" y="483" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif">com += 900</text>

  <text x="660" y="260" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">HashMap&lt;domain, totalCount&gt;</text>
  <text x="660" y="320" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Accumulate across all cpdomains</text>
  <text x="660" y="380" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Output: "count subdomain"</text>
  <text x="660" y="470" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
