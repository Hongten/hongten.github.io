<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 1260 Shift 2D Grid</title>
  <desc id="desc">A 2x3 grid flattened to linear indices, then shifted right by k=2 with modulo mapping.</desc>
  <defs>
    <style>
      .bg { fill:#0b1020; }
      .panel { fill:#121a31; stroke:#2a3b66; stroke-width:2; }
      .cell { fill:#1a2747; stroke:#5f7ec8; stroke-width:2; }
      .txt { fill:#dfe8ff; font-family:Arial, sans-serif; }
      .sub { fill:#9fb4e8; font-family:Arial, sans-serif; }
      .accent { fill:#7dd3fc; font-family:Arial, sans-serif; font-weight:700; }
      .arrow { stroke:#fbbf24; stroke-width:4; marker-end:url(#m); fill:none; }
      .map { stroke:#34d399; stroke-width:3; marker-end:url(#m2); fill:none; opacity:0.95; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="620"/>
  <text class="txt" x="60" y="58" font-size="34" font-weight="700">LeetCode 1260 · Shift 2D Grid</text>
  <text class="sub" x="60" y="90" font-size="20">Flatten → rotate by k → map back by division/modulo</text>

  <rect class="panel" x="50" y="120" width="500" height="430" rx="16"/>
  <text class="accent" x="80" y="160" font-size="24">Original Grid (2 x 3)</text>

  <rect class="cell" x="90" y="190" width="120" height="90" rx="10"/>
  <rect class="cell" x="230" y="190" width="120" height="90" rx="10"/>
  <rect class="cell" x="370" y="190" width="120" height="90" rx="10"/>
  <rect class="cell" x="90" y="310" width="120" height="90" rx="10"/>
  <rect class="cell" x="230" y="310" width="120" height="90" rx="10"/>
  <rect class="cell" x="370" y="310" width="120" height="90" rx="10"/>

  <text class="txt" x="145" y="245" font-size="34">1</text>
  <text class="txt" x="285" y="245" font-size="34">2</text>
  <text class="txt" x="425" y="245" font-size="34">3</text>
  <text class="txt" x="145" y="365" font-size="34">4</text>
  <text class="txt" x="285" y="365" font-size="34">5</text>
  <text class="txt" x="425" y="365" font-size="34">6</text>

  <text class="sub" x="110" y="435" font-size="19">Linear indices: 0, 1, 2, 3, 4, 5</text>
  <text class="sub" x="110" y="465" font-size="19">to = (from + k) % 6, with k = 2</text>

  <path class="arrow" d="M560 280 C620 280, 620 280, 680 280"/>
  <text class="accent" x="585" y="260" font-size="24">shift +2</text>

  <rect class="panel" x="690" y="120" width="460" height="430" rx="16"/>
  <text class="accent" x="720" y="160" font-size="24">Shifted Grid</text>

  <rect class="cell" x="730" y="190" width="120" height="90" rx="10"/>
  <rect class="cell" x="870" y="190" width="120" height="90" rx="10"/>
  <rect class="cell" x="1010" y="190" width="120" height="90" rx="10"/>
  <rect class="cell" x="730" y="310" width="120" height="90" rx="10"/>
  <rect class="cell" x="870" y="310" width="120" height="90" rx="10"/>
  <rect class="cell" x="1010" y="310" width="120" height="90" rx="10"/>

  <text class="txt" x="785" y="245" font-size="34">5</text>
  <text class="txt" x="925" y="245" font-size="34">6</text>
  <text class="txt" x="1065" y="245" font-size="34">1</text>
  <text class="txt" x="785" y="365" font-size="34">2</text>
  <text class="txt" x="925" y="365" font-size="34">3</text>
  <text class="txt" x="1065" y="365" font-size="34">4</text>

  <path class="map" d="M432 350 C610 480, 780 470, 790 365"/>
  <text class="sub" x="590" y="510" font-size="18">Example: value 6 from index 5 → index 1</text>
</svg>
