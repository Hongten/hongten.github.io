<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial" font-weight="700">LeetCode 3248 · Snake in Matrix</text><text x="60" y="130" fill="#94a3b8" font-size="24" font-family="Arial">Track (row,col) then map to row*n+col</text><g transform="translate(90,180)"><rect x="0" y="0" width="360" height="360" fill="#111827" stroke="#334155"/><line x1="120" y1="0" x2="120" y2="360" stroke="#334155"/><line x1="240" y1="0" x2="240" y2="360" stroke="#334155"/><line x1="0" y1="120" x2="360" y2="120" stroke="#334155"/><line x1="0" y1="240" x2="360" y2="240" stroke="#334155"/><text x="60" y="60" fill="#cbd5e1" font-size="26" text-anchor="middle">0</text><text x="180" y="60" fill="#cbd5e1" font-size="26" text-anchor="middle">1</text><text x="300" y="60" fill="#cbd5e1" font-size="26" text-anchor="middle">2</text><text x="60" y="180" fill="#cbd5e1" font-size="26" text-anchor="middle">3</text><text x="180" y="180" fill="#cbd5e1" font-size="26" text-anchor="middle">4</text><text x="300" y="180" fill="#cbd5e1" font-size="26" text-anchor="middle">5</text><text x="60" y="300" fill="#cbd5e1" font-size="26" text-anchor="middle">6</text><text x="180" y="300" fill="#cbd5e1" font-size="26" text-anchor="middle">7</text><text x="300" y="300" fill="#cbd5e1" font-size="26" text-anchor="middle">8</text><circle cx="60" cy="60" r="18" fill="#22c55e"/><circle cx="300" cy="300" r="18" fill="#f97316"/><path d="M60 60 L180 60 L180 180 L300 180 L300 300" stroke="#f97316" stroke-width="5" fill="none"/></g><text x="510" y="260" fill="#e2e8f0" font-size="32" font-family="monospace">n = 3</text><text x="510" y="320" fill="#93c5fd" font-size="28" font-family="monospace">end = (2,2)</text><text x="510" y="380" fill="#facc15" font-size="28" font-family="monospace">index = 2*3+2 = 8</text></svg>