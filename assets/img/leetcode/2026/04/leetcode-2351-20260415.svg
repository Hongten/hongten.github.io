<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2351 first repeated letter one-pass diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2351 · First Letter to Appear Twice</text>
  <text x="56" y="142" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">One-pass scan + seen[26] table</text>

  <rect x="56" y="188" width="1088" height="370" rx="20" fill="#111827" stroke="#334155"/>
  <text x="92" y="248" fill="#e2e8f0" font-size="26" font-family="JetBrains Mono,Consolas,monospace">s = "abccbaacz"</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30" text-anchor="middle">
    <rect x="92" y="286" width="92" height="64" rx="10" fill="#1e293b"/><text x="138" y="327" fill="#cbd5e1">a</text>
    <rect x="198" y="286" width="92" height="64" rx="10" fill="#1e293b"/><text x="244" y="327" fill="#cbd5e1">b</text>
    <rect x="304" y="286" width="92" height="64" rx="10" fill="#1e293b"/><text x="350" y="327" fill="#cbd5e1">c</text>
    <rect x="410" y="286" width="92" height="64" rx="10" fill="#7f1d1d" stroke="#ef4444"/><text x="456" y="327" fill="#fecaca">c</text>
    <text x="456" y="372" fill="#fca5a5" font-size="20">second hit</text>
  </g>

  <path d="M456 378 L456 430 L768 430" fill="none" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="784" y="392" width="324" height="120" rx="14" fill="#0f172a" stroke="#475569"/>
  <text x="806" y="434" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">return 'c'</text>
  <text x="806" y="470" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">first character whose 2nd occurrence appears earliest</text>

  <text x="56" y="602" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
