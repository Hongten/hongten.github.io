<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="110" fill="#e6edf3" font-size="44" font-family="Arial">LeetCode 2278 - Percentage of Letter in String</text><rect x="60" y="170" width="1080" height="360" rx="20" fill="#111a33" stroke="#2f4f88"/><text x="100" y="250" fill="#9ecbff" font-size="34" font-family="Courier New">s = "foobar", letter = "o"</text><text x="100" y="315" fill="#e6edf3" font-size="30" font-family="Courier New">count = 2, length = 6</text><text x="100" y="380" fill="#7ee787" font-size="34" font-family="Courier New">percentage = (2 * 100) / 6 = 33</text><text x="100" y="470" fill="#f2cc60" font-size="28" font-family="Courier New">One pass counting, O(n) time, O(1) space</text></svg>