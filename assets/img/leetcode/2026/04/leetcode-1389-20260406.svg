<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1389 indexed insertion simulation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title { fill:#e5e7eb; font:700 44px 'Inter',Arial,sans-serif; }
      .sub { fill:#93c5fd; font:600 26px 'Inter',Arial,sans-serif; }
      .txt { fill:#d1d5db; font:500 22px 'Inter',Arial,sans-serif; }
      .arr { fill:#1f2937; stroke:#4b5563; stroke-width:2; rx:12; }
      .cell { fill:#111827; stroke:#6b7280; stroke-width:2; rx:8; }
      .num { fill:#f9fafb; font:700 24px 'JetBrains Mono',monospace; text-anchor:middle; dominant-baseline:middle; }
      .idx { fill:#9ca3af; font:500 16px 'JetBrains Mono',monospace; text-anchor:middle; }
      .ins { fill:#34d399; font:700 20px 'Inter',Arial,sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="72" class="title">LeetCode 1389 · Create Target Array in the Given Order</text>
  <text x="50" y="112" class="sub">Indexed insertion simulation · build target left to right</text>

  <rect x="50" y="160" width="1100" height="420" class="arr"/>

  <text x="90" y="210" class="txt">nums  = [0, 1, 2, 3, 4]</text>
  <text x="90" y="242" class="txt">index = [0, 1, 2, 2, 1]</text>

  <text x="90" y="292" class="ins">Step i=3: insert nums[3]=3 at index[3]=2</text>

  <text x="90" y="338" class="txt">Before:</text>
  <g transform="translate(200,312)">
    <rect x="0" y="0" width="360" height="70" class="arr"/>
    <rect x="20" y="12" width="70" height="46" class="cell"/><text x="55" y="35" class="num">0</text><text x="55" y="76" class="idx">0</text>
    <rect x="100" y="12" width="70" height="46" class="cell"/><text x="135" y="35" class="num">1</text><text x="135" y="76" class="idx">1</text>
    <rect x="180" y="12" width="70" height="46" class="cell"/><text x="215" y="35" class="num">2</text><text x="215" y="76" class="idx">2</text>
  </g>

  <path d="M580 347 L650 347" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
  </defs>

  <text x="90" y="438" class="txt">After:</text>
  <g transform="translate(200,412)">
    <rect x="0" y="0" width="520" height="70" class="arr"/>
    <rect x="20" y="12" width="70" height="46" class="cell"/><text x="55" y="35" class="num">0</text><text x="55" y="76" class="idx">0</text>
    <rect x="100" y="12" width="70" height="46" class="cell"/><text x="135" y="35" class="num">1</text><text x="135" y="76" class="idx">1</text>
    <rect x="180" y="12" width="70" height="46" class="cell" style="stroke:#34d399"/><text x="215" y="35" class="num">3</text><text x="215" y="76" class="idx">2</text>
    <rect x="260" y="12" width="70" height="46" class="cell"/><text x="295" y="35" class="num">2</text><text x="295" y="76" class="idx">3</text>
  </g>

  <text x="90" y="540" class="txt">Final target = [0, 4, 1, 3, 2]</text>
  <text x="90" y="572" class="txt">Author: Tom🦞</text>
</svg>
