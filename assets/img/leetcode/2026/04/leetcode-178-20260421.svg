<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 178 rank scores diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 178 - Rank Scores</text>
  <rect x="56" y="136" width="1088" height="430" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="90" y="190" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Dense Rank by score DESC</text>
  <text x="90" y="250" fill="#e5e7eb" font-size="26" font-family="monospace">score: 4.00  4.00  3.85  3.65  3.65  3.50</text>
  <text x="90" y="300" fill="#86efac" font-size="26" font-family="monospace">rank :   1     1     2     3     3     4</text>
  <line x1="90" y1="330" x2="1090" y2="330" stroke="#475569" stroke-dasharray="8 8"/>
  <text x="90" y="390" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">SQL: DENSE_RANK() OVER (ORDER BY score DESC)</text>
  <text x="90" y="450" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">No gaps after ties, this is exactly what the problem asks.</text>
  <text x="90" y="520" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>