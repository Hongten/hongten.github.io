<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 286 Walls and Gates multi-source BFS diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 286: Walls and Gates</text>
  <text x="60" y="130" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Multi-Source BFS: start from all gates, expand by layers</text>

  <rect x="70" y="180" width="520" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="215" fill="#cbd5e1" font-size="22" font-family="monospace">Grid legend: 0 = gate, -1 = wall, INF = room</text>

  <g font-family="monospace" font-size="32" text-anchor="middle">
    <rect x="110" y="250" width="80" height="80" fill="#111827" stroke="#334155"/><text x="150" y="300" fill="#f8fafc">INF</text>
    <rect x="200" y="250" width="80" height="80" fill="#111827" stroke="#334155"/><text x="240" y="300" fill="#22d3ee">0</text>
    <rect x="290" y="250" width="80" height="80" fill="#111827" stroke="#334155"/><text x="330" y="300" fill="#f8fafc">INF</text>
    <rect x="380" y="250" width="80" height="80" fill="#111827" stroke="#334155"/><text x="420" y="300" fill="#f87171">-1</text>

    <rect x="110" y="340" width="80" height="80" fill="#111827" stroke="#334155"/><text x="150" y="390" fill="#f8fafc">INF</text>
    <rect x="200" y="340" width="80" height="80" fill="#111827" stroke="#334155"/><text x="240" y="390" fill="#f8fafc">1</text>
    <rect x="290" y="340" width="80" height="80" fill="#111827" stroke="#334155"/><text x="330" y="390" fill="#f8fafc">2</text>
    <rect x="380" y="340" width="80" height="80" fill="#111827" stroke="#334155"/><text x="420" y="390" fill="#f8fafc">3</text>

    <rect x="110" y="430" width="80" height="80" fill="#111827" stroke="#334155"/><text x="150" y="480" fill="#f8fafc">INF</text>
    <rect x="200" y="430" width="80" height="80" fill="#111827" stroke="#334155"/><text x="240" y="480" fill="#f87171">-1</text>
    <rect x="290" y="430" width="80" height="80" fill="#111827" stroke="#334155"/><text x="330" y="480" fill="#f8fafc">3</text>
    <rect x="380" y="430" width="80" height="80" fill="#111827" stroke="#334155"/><text x="420" y="480" fill="#22d3ee">0</text>
  </g>

  <line x1="240" y1="332" x2="240" y2="338" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="280" y1="380" x2="286" y2="380" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="380" y1="470" x2="344" y2="470" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="640" y="190" width="500" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="670" y="240" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">BFS Wavefront</text>
  <text x="670" y="290" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">1. Enqueue all gates first</text>
  <text x="670" y="330" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">2. Expand layer by layer</text>
  <text x="670" y="370" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">3. First visit gives shortest distance</text>
  <text x="670" y="410" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">4. Skip walls and non-INF cells</text>

  <text x="640" y="585" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
