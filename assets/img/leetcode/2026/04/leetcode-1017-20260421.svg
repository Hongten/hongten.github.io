<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1017 conversion flow">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1017 · Convert to Base -2</text>
  <rect x="60" y="145" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="210" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Loop invariant: n = (-2) * next + r, where r in {0,1}</text>
  <text x="95" y="270" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Step 1: r = n mod 2  (use n &amp; 1)</text>
  <text x="95" y="320" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Step 2: append digit r</text>
  <text x="95" y="370" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Step 3: n = (n - r) / -2</text>
  <text x="95" y="420" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Repeat until n = 0, then reverse digits</text>
  <text x="95" y="500" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Example: n=2 -> remainders 0,1,1 -> answer 110</text>
</svg>
