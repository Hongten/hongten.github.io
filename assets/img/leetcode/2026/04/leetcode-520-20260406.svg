<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="LeetCode 520 capitalization pattern validation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#334155;stroke-width:2;rx:14}
      .ok{fill:#16a34a}
      .bad{fill:#dc2626}
      .txt{font:600 24px 'Consolas','Menlo',monospace;fill:#f8fafc}
      .cap{font:500 16px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="960" height="520" fill="url(#bg)"/>
  <text x="60" y="72" class="title">LeetCode 520 · Detect Capital</text>
  <text x="60" y="104" class="sub">Valid iff one of 3 patterns: ALL UPPER / all lower / Title Case</text>

  <rect x="60" y="150" width="260" height="130" class="box"/>
  <circle cx="86" cy="176" r="8" class="ok"/>
  <text x="106" y="182" class="cap">ALL UPPERCASE</text>
  <text x="90" y="230" class="txt">USA</text>

  <rect x="350" y="150" width="260" height="130" class="box"/>
  <circle cx="376" cy="176" r="8" class="ok"/>
  <text x="396" y="182" class="cap">all lowercase</text>
  <text x="380" y="230" class="txt">leetcode</text>

  <rect x="640" y="150" width="260" height="130" class="box"/>
  <circle cx="666" cy="176" r="8" class="ok"/>
  <text x="686" y="182" class="cap">Title Case</text>
  <text x="670" y="230" class="txt">Google</text>

  <rect x="250" y="330" width="460" height="120" class="box"/>
  <circle cx="276" cy="356" r="8" class="bad"/>
  <text x="296" y="362" class="cap">Invalid mixed capitalization</text>
  <text x="280" y="410" class="txt">FlaG  ✗</text>

  <text x="60" y="490" class="cap">Rule check via uppercase count: upper==0 OR upper==n OR (upper==1 &amp;&amp; first is upper)</text>
</svg>
