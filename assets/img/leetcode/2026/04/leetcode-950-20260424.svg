<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,sans-serif;fill:#e2e8f0}
      .h{font-size:42px;font-weight:700}
      .m{font-size:28px;fill:#93c5fd}
      .s{font-size:24px;fill:#cbd5e1}
      .b{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:14}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t h">LeetCode 950 · Reveal Cards In Increasing Order</text>
  <text x="60" y="135" class="t m">Sort values + queue of reveal indices</text>
  <rect x="60" y="190" width="1080" height="120" class="b"/>
  <text x="85" y="255" class="t s">indices queue: [0,1,2,3,4,5,6] → place smallest at 0 → rotate 1 to tail</text>
  <rect x="60" y="340" width="1080" height="120" class="b"/>
  <text x="85" y="405" class="t s">repeat: pop front index for next smallest card, then rotate front index</text>
  <text x="60" y="540" class="t s">Build arrangement so reveal process outputs increasing order.</text>
</svg>
