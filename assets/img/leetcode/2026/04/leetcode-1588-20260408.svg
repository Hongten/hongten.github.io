<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1588 contribution counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t {{ font-family: 'Inter', 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }}
      .muted {{ fill: #94a3b8; }}
      .box {{ fill: #0b1220; stroke: #334155; stroke-width: 2; rx: 10; }}
      .hl {{ fill: #22d3ee; }}
      .hl2 {{ fill: #a78bfa; }}
      .hl3 {{ fill: #f59e0b; }}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t" font-size="38" font-weight="700">LeetCode 1588 · Sum of All Odd Length Subarrays</text>
  <text x="60" y="118" class="t muted" font-size="24">Contribution counting: each arr[i] contributes oddCount(i) times</text>

  <g transform="translate(60,180)">
    <rect class="box" x="0" y="0" width="120" height="90"/><rect class="box" x="130" y="0" width="120" height="90"/>
    <rect class="box" x="260" y="0" width="120" height="90"/><rect class="box" x="390" y="0" width="120" height="90"/>
    <rect class="box" x="520" y="0" width="120" height="90"/>
    <text class="t" x="46" y="55" font-size="34">1</text><text class="t" x="176" y="55" font-size="34">4</text>
    <text class="t" x="306" y="55" font-size="34">2</text><text class="t" x="436" y="55" font-size="34">5</text>
    <text class="t" x="566" y="55" font-size="34">3</text>
    <text class="t muted" x="10" y="122" font-size="20">Example arr = [1,4,2,5,3]</text>
  </g>

  <g transform="translate(60,350)">
    <text class="t" x="0" y="0" font-size="28">For index i = 2 (value = 2):</text>
    <text class="t" x="0" y="44" font-size="24">left choices = i+1 = 3, right choices = n-i = 3</text>
    <text class="t" x="0" y="82" font-size="24">total covering subarrays = 3 × 3 = 9</text>
    <text class="t" x="0" y="120" font-size="24">odd-length covering subarrays = (9 + 1) / 2 = 5</text>
    <text class="t" x="0" y="158" font-size="24">contribution = arr[i] × oddCount = 2 × 5 = 10</text>
  </g>

  <circle cx="980" cy="220" r="64" class="hl" opacity="0.2"/>
  <circle cx="1040" cy="330" r="74" class="hl2" opacity="0.2"/>
  <circle cx="920" cy="390" r="58" class="hl3" opacity="0.2"/>
  <text x="770" y="520" class="t" font-size="26">sum += arr[i] * ((i+1)*(n-i)+1)/2</text>
</svg>
