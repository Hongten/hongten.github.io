<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 276 paint fence DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 276 · Paint Fence</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">DP states: same(i), diff(i)</text>
  <rect x="60" y="190" width="1080" height="360" rx="20" fill="#1f2937" stroke="#374151"/>
  <rect x="120" y="250" width="420" height="220" rx="16" fill="#111827" stroke="#60a5fa"/>
  <text x="150" y="300" fill="#bfdbfe" font-size="30" font-family="Inter,Arial,sans-serif">newSame = diff</text>
  <text x="150" y="350" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Only previous diff can</text>
  <text x="150" y="385" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">become same now</text>
  <rect x="660" y="250" width="420" height="220" rx="16" fill="#111827" stroke="#34d399"/>
  <text x="690" y="300" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">newDiff = (same+diff)*(k-1)</text>
  <text x="690" y="350" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Choose any color except</text>
  <text x="690" y="385" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">the previous post color</text>
  <text x="60" y="600" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual · Java default tabs</text>
</svg>
