<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3462 maximum sum with at most k elements diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3462</text>
  <text x="60" y="145" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Maximum Sum With at Most K Elements</text>

  <rect x="60" y="190" width="510" height="350" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="230" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Per-row top picks (by limits)</text>
  <rect x="90" y="255" width="450" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="105" y="300" fill="#86efac" font-size="24" font-family="monospace">row0: [9, 7]</text>
  <rect x="90" y="340" width="450" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="105" y="385" fill="#86efac" font-size="24" font-family="monospace">row1: [8]</text>
  <rect x="90" y="425" width="450" height="70" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="105" y="470" fill="#86efac" font-size="24" font-family="monospace">row2: [6, 5, 4]</text>

  <rect x="630" y="190" width="510" height="350" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="660" y="230" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Global candidates -&gt; sort desc -&gt; take k</text>
  <text x="660" y="290" fill="#fde68a" font-size="28" font-family="monospace">[9,7,8,6,5,4] -&gt; [9,8,7,6,5,4]</text>
  <text x="660" y="350" fill="#fca5a5" font-size="28" font-family="monospace">k = 4  =>  9 + 8 + 7 + 6 = 30</text>
  <text x="660" y="430" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Greedy works because non-top row elements</text>
  <text x="660" y="465" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">can never beat row top-limited candidates.</text>

  <text x="60" y="590" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first / 中文后置 · Full code tabs</text>
