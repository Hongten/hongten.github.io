<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2859 bit count filter diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2859</text>
  <text x="60" y="140" fill="#93c5fd" font-size="32" font-family="Inter,Arial,sans-serif">Sum of Values at Indices With K Set Bits</text>

  <rect x="60" y="185" width="1080" height="360" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="245" fill="#d1d5db" font-size="26" font-family="JetBrains Mono,Consolas,monospace">nums = [5, 10, 1, 5, 2], k = 1</text>

  <rect x="100" y="280" width="1000" height="190" rx="14" fill="#0f172a" stroke="#334155"/>

  <text x="130" y="325" fill="#fca5a5" font-size="22" font-family="JetBrains Mono,Consolas,monospace">index:      0    1    2    3    4</text>
  <text x="130" y="360" fill="#a7f3d0" font-size="22" font-family="JetBrains Mono,Consolas,monospace">binary(i):  0    1   10   11  100</text>
  <text x="130" y="395" fill="#93c5fd" font-size="22" font-family="JetBrains Mono,Consolas,monospace">set bits:   0    1    1    2    1</text>
  <text x="130" y="430" fill="#fde68a" font-size="22" font-family="JetBrains Mono,Consolas,monospace">pick i:          ✓    ✓         ✓</text>

  <text x="780" y="505" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">sum = 10 + 1 + 2 = 13</text>
  <text x="60" y="595" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文双语题解</text>
</svg>
