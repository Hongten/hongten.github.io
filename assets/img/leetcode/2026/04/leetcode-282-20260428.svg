<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 282 backtracking branches">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:38px;font-weight:700}
      .s{font-size:24px;fill:#93c5fd}
      .b{fill:none;stroke:#38bdf8;stroke-width:4}
      .n{fill:#1d4ed8;stroke:#93c5fd;stroke-width:2}
      .w{font-size:22px;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="86" class="t m">LeetCode 282: Expression Add Operators</text>
  <text x="60" y="126" class="t s">DFS + Backtracking, eval/prev for * precedence</text>

  <rect x="520" y="180" rx="14" ry="14" width="160" height="70" class="n"/>
  <text x="570" y="223" class="t w">"123"</text>

  <path d="M600 250 L360 360" class="b"/>
  <path d="M600 250 L600 360" class="b"/>
  <path d="M600 250 L840 360" class="b"/>

  <rect x="280" y="360" rx="12" ry="12" width="180" height="72" class="n"/>
  <text x="333" y="405" class="t w">1+23</text>

  <rect x="510" y="360" rx="12" ry="12" width="180" height="72" class="n"/>
  <text x="563" y="405" class="t w">1-23</text>

  <rect x="740" y="360" rx="12" ry="12" width="180" height="72" class="n"/>
  <text x="793" y="405" class="t w">1*23</text>

  <text x="60" y="560" class="t s">Multiply branch correction: eval - prev + prev * cur</text>
</svg>
