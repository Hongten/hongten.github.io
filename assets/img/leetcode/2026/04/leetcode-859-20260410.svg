<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Buddy Strings mismatch and duplicate-check diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#eaf2ff" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 859 · Buddy Strings</text>
  <text x="60" y="130" fill="#9fc1ff" font-size="24" font-family="Arial, sans-serif">Mismatch Pair Swap or Duplicate Check</text>

  <rect x="60" y="180" width="1080" height="380" rx="16" fill="#0f1a33" stroke="#375a9e"/>
  <text x="90" y="235" fill="#dce8ff" font-size="26" font-family="Consolas, monospace">Case A: s != goal  → exactly 2 mismatches required</text>
  <text x="90" y="280" fill="#b9d1ff" font-size="24" font-family="Consolas, monospace">s    : a b c d</text>
  <text x="90" y="315" fill="#b9d1ff" font-size="24" font-family="Consolas, monospace">goal : a d c b</text>
  <text x="90" y="360" fill="#ffd580" font-size="24" font-family="Consolas, monospace">mismatch at i=1 (b vs d), j=3 (d vs b)</text>
  <text x="90" y="395" fill="#7ef0a8" font-size="24" font-family="Consolas, monospace">check: s[i] == goal[j] and s[j] == goal[i]</text>

  <text x="90" y="455" fill="#dce8ff" font-size="26" font-family="Consolas, monospace">Case B: s == goal  → need duplicate char for valid swap</text>
  <text x="90" y="495" fill="#b9d1ff" font-size="24" font-family="Consolas, monospace">"aa" ✓ (swap two 'a' keeps same)   "ab" ✗</text>
</svg>