<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 976 largest perimeter triangle diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 976 · Largest Perimeter Triangle</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter, Arial, sans-serif">Sort + scan from largest side</text>

  <rect x="60" y="190" width="1080" height="370" rx="20" fill="#111827" stroke="#334155"/>

  <text x="90" y="250" fill="#cbd5e1" font-size="30" font-family="Inter, Arial, sans-serif">Sorted: [ ... , a, b, c ]  (a ≤ b ≤ c)</text>
  <text x="90" y="300" fill="#86efac" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">Triangle condition: a + b &gt; c</text>
  <text x="90" y="350" fill="#fca5a5" font-size="30" font-family="Inter, Arial, sans-serif">If true at first hit from right, that perimeter is maximal</text>

  <polygon points="760,500 980,500 860,320" fill="#1d4ed8" fill-opacity="0.35" stroke="#60a5fa" stroke-width="4"/>
  <text x="752" y="525" fill="#dbeafe" font-size="26" font-family="Inter, Arial, sans-serif">a</text>
  <text x="982" y="525" fill="#dbeafe" font-size="26" font-family="Inter, Arial, sans-serif">b</text>
  <text x="865" y="308" fill="#dbeafe" font-size="26" font-family="Inter, Arial, sans-serif">c</text>

  <text x="90" y="430" fill="#e5e7eb" font-size="26" font-family="Inter, Arial, sans-serif">Answer: return a + b + c, else continue left; if none found, return 0.</text>
  <text x="90" y="500" fill="#fbbf24" font-size="24" font-family="Inter, Arial, sans-serif">Author: Tom🦞</text>
</svg>
