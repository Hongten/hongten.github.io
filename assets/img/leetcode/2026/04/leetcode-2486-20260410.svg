<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Two-pointer matching for LeetCode 2486">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" font-size="44" fill="#f8fafc" font-family="Arial">LeetCode 2486 · Two-Pointer Greedy Matching</text>
  <rect x="60" y="150" width="1080" height="120" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  <text x="90" y="220" font-size="38" fill="#e2e8f0" font-family="monospace">s = c o a c h b t l e</text>
  <text x="90" y="260" font-size="28" fill="#7dd3fc" font-family="Arial">scan left → right, move j when characters match</text>
  <rect x="60" y="320" width="1080" height="120" rx="16" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="90" y="390" font-size="38" fill="#e2e8f0" font-family="monospace">t = c o d e</text>
  <text x="90" y="430" font-size="28" fill="#86efac" font-family="Arial">matched prefix: "co"  → append suffix: "de"</text>
  <text x="60" y="540" font-size="34" fill="#fbbf24" font-family="Arial">Answer = |t| - matched = 4 - 2 = 2</text>
</svg>
