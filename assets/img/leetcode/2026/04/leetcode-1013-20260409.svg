<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1013 partition array into three equal sum parts diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 1013</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial, Helvetica, sans-serif">Partition Array Into Three Parts With Equal Sum</text>

  <rect x="60" y="220" width="1080" height="120" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>
  <g font-family="Consolas, monospace" font-size="34" fill="#f8fafc" text-anchor="middle">
    <text x="150" y="295">0</text>
    <text x="240" y="295">2</text>
    <text x="330" y="295">1</text>
    <text x="420" y="295">-6</text>
    <text x="510" y="295">6</text>
    <text x="600" y="295">-7</text>
    <text x="690" y="295">9</text>
    <text x="780" y="295">1</text>
    <text x="870" y="295">2</text>
    <text x="960" y="295">0</text>
    <text x="1050" y="295">1</text>
  </g>

  <line x1="375" y1="220" x2="375" y2="340" stroke="#22d3ee" stroke-width="6"/>
  <line x1="825" y1="220" x2="825" y2="340" stroke="#22d3ee" stroke-width="6"/>

  <text x="215" y="390" fill="#22d3ee" font-size="28" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">part1 sum = 3</text>
  <text x="600" y="390" fill="#22d3ee" font-size="28" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">part2 sum = 3</text>
  <text x="985" y="390" fill="#22d3ee" font-size="28" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">part3 sum = 3</text>

  <text x="60" y="470" fill="#cbd5e1" font-size="26" font-family="Arial, Helvetica, sans-serif">Key idea: if total % 3 == 0, scan prefix sums and find two cut points before the end.</text>
  <text x="60" y="520" fill="#86efac" font-size="28" font-family="Arial, Helvetica, sans-serif">target = total / 3, prefix == target, then prefix == 2 * target</text>
</svg>
