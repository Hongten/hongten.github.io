<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 218 skyline sweep-line diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e5e7eb}
      .m{font-size:18px;fill:#93c5fd}
      .s{font-size:14px;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="t" font-size="36" font-weight="700">LeetCode 218 · The Skyline Problem</text>
  <text x="60" y="105" class="m">Sweep Line + Max-Heap (Lazy Removal)</text>

  <rect x="90" y="390" width="180" height="140" fill="#60a5fa" opacity="0.75"/>
  <rect x="240" y="320" width="170" height="210" fill="#34d399" opacity="0.75"/>
  <rect x="390" y="360" width="190" height="170" fill="#f59e0b" opacity="0.75"/>
  <rect x="540" y="260" width="160" height="270" fill="#f472b6" opacity="0.75"/>
  <rect x="680" y="340" width="170" height="190" fill="#a78bfa" opacity="0.75"/>

  <polyline points="90,530 90,390 240,390 240,320 410,320 410,360 540,360 540,260 700,260 700,340 850,340 850,530"
            fill="none" stroke="#f8fafc" stroke-width="6" stroke-linejoin="round"/>

  <line x1="620" y1="150" x2="620" y2="530" stroke="#22d3ee" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="636" y="170" class="t" font-size="18">Sweep at x</text>

  <rect x="820" y="150" width="300" height="170" rx="14" fill="#1f2937" stroke="#475569"/>
  <text x="840" y="185" class="t" font-size="22" font-weight="700">Active Max-Heap</text>
  <text x="840" y="220" class="s">top = current max height</text>
  <text x="840" y="248" class="s">push at building start</text>
  <text x="840" y="276" class="s">pop expired (right ≤ x)</text>

  <text x="60" y="590" class="s">Source: https://leetcode.com/problems/the-skyline-problem/</text>
</svg>
