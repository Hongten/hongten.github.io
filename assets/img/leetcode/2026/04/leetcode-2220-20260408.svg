<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2220 XOR bit flips diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2220 · Minimum Bit Flips to Convert Number</text>
  <rect x="56" y="140" width="1088" height="430" rx="20" fill="#1f2937" stroke="#334155"/>

  <text x="90" y="210" fill="#93c5fd" font-size="30" font-family="monospace">start = 10  (1010)</text>
  <text x="90" y="260" fill="#93c5fd" font-size="30" font-family="monospace">goal  = 7   (0111)</text>
  <text x="90" y="320" fill="#86efac" font-size="30" font-family="monospace">diff  = start ^ goal = 1101</text>

  <text x="90" y="390" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Count set bits in diff:</text>
  <circle cx="430" cy="382" r="18" fill="#22c55e"/><text x="424" y="390" fill="#06210f" font-size="18" font-family="monospace">1</text>
  <circle cx="490" cy="382" r="18" fill="#22c55e"/><text x="484" y="390" fill="#06210f" font-size="18" font-family="monospace">1</text>
  <circle cx="550" cy="382" r="18" fill="#374151"/><text x="544" y="390" fill="#d1d5db" font-size="18" font-family="monospace">0</text>
  <circle cx="610" cy="382" r="18" fill="#22c55e"/><text x="604" y="390" fill="#06210f" font-size="18" font-family="monospace">1</text>

  <text x="90" y="470" fill="#fbbf24" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = 3 flips</text>
  <text x="90" y="525" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">XOR marks different bits; bitCount gives minimum operations.</text>
</svg>
