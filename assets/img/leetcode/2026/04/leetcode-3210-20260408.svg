<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 3210 rotation mapping diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 40px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .label{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .char{font:700 34px 'JetBrains Mono',Consolas,monospace;fill:#0f172a}
      .idx{font:500 18px 'JetBrains Mono',Consolas,monospace;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="50" y="70" class="title">LeetCode 3210 · Find the Encrypted String</text>
  <text x="50" y="108" class="sub">Left rotate by k mod n: encrypted = s[shift:] + s[:shift]</text>

  <text x="50" y="180" class="label">Original s = "dart"</text>
  <text x="50" y="320" class="label">k = 5, n = 4, shift = 1  →  encrypted = "artd"</text>

  <g transform="translate(50,210)">
    <rect x="0" y="0" width="90" height="72" rx="10" fill="#67e8f9"/>
    <rect x="100" y="0" width="90" height="72" rx="10" fill="#67e8f9"/>
    <rect x="200" y="0" width="90" height="72" rx="10" fill="#67e8f9"/>
    <rect x="300" y="0" width="90" height="72" rx="10" fill="#67e8f9"/>
    <text x="38" y="47" class="char">d</text>
    <text x="138" y="47" class="char">a</text>
    <text x="238" y="47" class="char">r</text>
    <text x="338" y="47" class="char">t</text>
    <text x="40" y="98" class="idx">0</text>
    <text x="140" y="98" class="idx">1</text>
    <text x="240" y="98" class="idx">2</text>
    <text x="340" y="98" class="idx">3</text>
  </g>

  <g stroke="#f59e0b" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
        <path d="M0,0 L12,6 L0,12 Z" fill="#f59e0b"/>
      </marker>
    </defs>
    <path d="M95 300 C160 360, 260 360, 325 300"/>
    <path d="M195 300 C260 360, 360 360, 425 300"/>
    <path d="M295 300 C360 360, 460 360, 525 300"/>
    <path d="M395 300 C460 360, 560 360, 625 300"/>
  </g>

  <g transform="translate(450,210)">
    <rect x="0" y="0" width="90" height="72" rx="10" fill="#86efac"/>
    <rect x="100" y="0" width="90" height="72" rx="10" fill="#86efac"/>
    <rect x="200" y="0" width="90" height="72" rx="10" fill="#86efac"/>
    <rect x="300" y="0" width="90" height="72" rx="10" fill="#86efac"/>
    <text x="38" y="47" class="char">a</text>
    <text x="138" y="47" class="char">r</text>
    <text x="238" y="47" class="char">t</text>
    <text x="338" y="47" class="char">d</text>
    <text x="40" y="98" class="idx">0</text>
    <text x="140" y="98" class="idx">1</text>
    <text x="240" y="98" class="idx">2</text>
    <text x="340" y="98" class="idx">3</text>
  </g>
</svg>
