<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 589 preorder traversal diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .node{fill:#334155;stroke:#94a3b8;stroke-width:2}
      .txt{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#64748b;stroke-width:3}
      .order{font:600 22px 'Consolas',monospace;fill:#f59e0b}
      .hint{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 589 · N-ary Tree Preorder Traversal</text>
  <text x="60" y="130" class="sub">Visit Root, then each child subtree from left to right</text>

  <line x1="600" y1="220" x2="360" y2="340" class="edge"/>
  <line x1="600" y1="220" x2="520" y2="340" class="edge"/>
  <line x1="600" y1="220" x2="680" y2="340" class="edge"/>
  <line x1="600" y1="220" x2="840" y2="340" class="edge"/>
  <line x1="360" y1="340" x2="300" y2="470" class="edge"/>
  <line x1="360" y1="340" x2="420" y2="470" class="edge"/>

  <circle cx="600" cy="220" r="42" class="node"/>
  <circle cx="360" cy="340" r="38" class="node"/>
  <circle cx="520" cy="340" r="38" class="node"/>
  <circle cx="680" cy="340" r="38" class="node"/>
  <circle cx="840" cy="340" r="38" class="node"/>
  <circle cx="300" cy="470" r="34" class="node"/>
  <circle cx="420" cy="470" r="34" class="node"/>

  <text x="600" y="220" class="txt">1</text>
  <text x="360" y="340" class="txt">3</text>
  <text x="520" y="340" class="txt">2</text>
  <text x="680" y="340" class="txt">4</text>
  <text x="840" y="340" class="txt">5</text>
  <text x="300" y="470" class="txt">6</text>
  <text x="420" y="470" class="txt">7</text>

  <text x="60" y="560" class="order">Preorder sequence: [1, 3, 6, 7, 2, 4, 5]</text>
  <text x="60" y="595" class="hint">DFS rule: add node value first, then recurse children in order.</text>
</svg>
