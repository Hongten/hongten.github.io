<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 184 Department Highest Salary diagram"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs><rect width="1200" height="630" fill="url(#bg)"/><text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 184 · Department Highest Salary</text><text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Groupwise MAX + Join Back</text><rect x="56" y="178" width="520" height="360" rx="14" fill="#1f2937" stroke="#334155"/><rect x="624" y="178" width="520" height="360" rx="14" fill="#1f2937" stroke="#334155"/><text x="88" y="220" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Employee</text><text x="88" y="260" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">departmentId, name, salary</text><text x="88" y="324" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">GROUP BY departmentId</text><text x="88" y="360" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">MAX(salary)</text><text x="656" y="220" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Department</text><text x="656" y="260" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">id, name</text><text x="656" y="324" fill="#fde68a" font-size="22" font-family="Inter,Arial,sans-serif">JOIN by departmentId</text><text x="656" y="360" fill="#fde68a" font-size="22" font-family="Inter,Arial,sans-serif">AND salary = maxSalary</text><text x="56" y="584" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text></svg>