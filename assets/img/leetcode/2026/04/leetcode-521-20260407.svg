<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 521 equality check and longest uncommon subsequence decision diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="76" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 521 · Longest Uncommon Subsequence I</text>
  <text x="56" y="116" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Key idea: equality decides everything</text>

  <rect x="70" y="170" width="300" height="120" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="215" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Compare</text>
  <text x="95" y="255" fill="#86efac" font-size="34" font-family="JetBrains Mono,monospace">a == b ?</text>

  <line x1="370" y1="230" x2="560" y2="230" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="370" y1="260" x2="560" y2="410" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="580" y="160" width="540" height="140" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="610" y="215" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Yes (a == b)</text>
  <text x="610" y="258" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,monospace">answer = -1</text>

  <rect x="580" y="340" width="540" height="180" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="610" y="395" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">No (a != b)</text>
  <text x="610" y="438" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">whole longer string is uncommon</text>
  <text x="610" y="482" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,monospace">answer = max(len(a), len(b))</text>

  <text x="56" y="586" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 section with full code tabs</text>
</svg>
