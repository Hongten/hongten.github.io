<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 1909 - Remove One Element to Make the Array Strictly Increasing</title>
  <desc id="desc">Illustration of handling one non-increasing pair by removing previous or current element.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 1909</text>
  <text x="60" y="140" fill="#bfdbfe" font-size="28" font-family="Arial, Helvetica, sans-serif">Remove One Element to Make the Array Strictly Increasing</text>

  <rect x="70" y="210" width="1060" height="320" rx="20" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="265" fill="#93c5fd" font-size="24" font-family="monospace">nums = [1, 2, 10, 5, 7]</text>
  <text x="110" y="310" fill="#fca5a5" font-size="24" font-family="monospace">violation: 10 &gt;= 5</text>

  <line x1="430" y1="325" x2="430" y2="445" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="560" y1="325" x2="560" y2="445" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 8"/>

  <rect x="110" y="360" width="430" height="140" rx="14" fill="#111827" stroke="#34d399"/>
  <text x="135" y="402" fill="#6ee7b7" font-size="22" font-family="Arial">Option A: remove previous (10)</text>
  <text x="135" y="440" fill="#d1fae5" font-size="22" font-family="monospace">[1, 2, 5, 7] ✓</text>

  <rect x="590" y="360" width="500" height="140" rx="14" fill="#111827" stroke="#f59e0b"/>
  <text x="615" y="402" fill="#fcd34d" font-size="22" font-family="Arial">Option B: remove current (5)</text>
  <text x="615" y="440" fill="#fef3c7" font-size="22" font-family="monospace">simulate when needed</text>

  <text x="60" y="590" fill="#cbd5e1" font-size="22" font-family="Arial">Single pass greedy: allow at most one violation, decide locally.</text>
</svg>
