<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 3453 Separate Squares I area split diagram">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #121a33; stroke: #2a3a70; stroke-width: 2; }
      .sq1 { fill: #5eead4; fill-opacity: 0.30; stroke: #5eead4; stroke-width: 3; }
      .sq2 { fill: #60a5fa; fill-opacity: 0.30; stroke: #60a5fa; stroke-width: 3; }
      .sq3 { fill: #f472b6; fill-opacity: 0.26; stroke: #f472b6; stroke-width: 3; }
      .line { stroke: #fbbf24; stroke-width: 4; stroke-dasharray: 10 8; }
      .txt { fill: #e5e7eb; font-family: Inter, Arial, sans-serif; font-size: 24px; }
      .small { fill: #cbd5e1; font-family: Inter, Arial, sans-serif; font-size: 20px; }
      .em { fill: #fbbf24; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <rect class="panel" x="40" y="40" width="1120" height="440" rx="18"/>

  <rect class="sq1" x="180" y="180" width="180" height="180"/>
  <rect class="sq2" x="330" y="120" width="230" height="230"/>
  <rect class="sq3" x="560" y="220" width="140" height="140"/>

  <line class="line" x1="120" y1="250" x2="1060" y2="250"/>

  <text class="txt" x="80" y="90">LeetCode 3453 · Separate Squares I</text>
  <text class="small" x="82" y="120">Binary search the minimum horizontal line Y where areaAbove = areaBelow</text>

  <text class="small" x="770" y="225">above(Y)</text>
  <text class="small" x="770" y="278">below(Y)</text>
  <text class="small em" x="780" y="252">Y = mid</text>

  <text class="small" x="82" y="430">below(Y) is monotonic → if below(mid) ≥ total/2, move high = mid; else low = mid</text>
</svg>
