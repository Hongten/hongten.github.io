<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1290 linked list binary to decimal illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 1290 · Linked List Binary → Integer</text>
  <text x="60" y="130" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">ans = (ans &lt;&lt; 1) | bit</text>

  <g transform="translate(90,220)">
    <rect x="0" y="0" width="130" height="80" rx="12" fill="#1d4ed8"/>
    <text x="65" y="50" text-anchor="middle" fill="#fff" font-size="36" font-family="monospace">1</text>

    <line x1="130" y1="40" x2="200" y2="40" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>

    <rect x="220" y="0" width="130" height="80" rx="12" fill="#2563eb"/>
    <text x="285" y="50" text-anchor="middle" fill="#fff" font-size="36" font-family="monospace">0</text>

    <line x1="350" y1="40" x2="420" y2="40" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>

    <rect x="440" y="0" width="130" height="80" rx="12" fill="#1d4ed8"/>
    <text x="505" y="50" text-anchor="middle" fill="#fff" font-size="36" font-family="monospace">1</text>

    <line x1="570" y1="40" x2="640" y2="40" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>

    <rect x="660" y="0" width="130" height="80" rx="12" fill="#2563eb"/>
    <text x="725" y="50" text-anchor="middle" fill="#fff" font-size="36" font-family="monospace">1</text>
  </g>

  <g transform="translate(90,380)" fill="#cbd5e1" font-family="monospace" font-size="30">
    <text x="0" y="0">start: ans = 0</text>
    <text x="0" y="55">read 1: ans = (0 &lt;&lt; 1) | 1 = 1</text>
    <text x="0" y="110">read 0: ans = (1 &lt;&lt; 1) | 0 = 2</text>
    <text x="0" y="165">read 1: ans = (2 &lt;&lt; 1) | 1 = 5</text>
    <text x="0" y="220">read 1: ans = (5 &lt;&lt; 1) | 1 = 11</text>
  </g>
</svg>
