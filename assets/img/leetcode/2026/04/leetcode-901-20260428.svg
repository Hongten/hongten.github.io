<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 901 Online Stock Span</title>
  <desc id="desc">Monotonic stack stores pairs of price and span to answer next(price) in amortized O(1).</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="72" y="110" font-size="44" font-weight="700">LeetCode 901 · Online Stock Span</text>
    <text x="72" y="160" font-size="28" fill="#93c5fd">Monotonic Stack (price, span)</text>
  </g>

  <g transform="translate(72,220)">
    <rect x="0" y="0" width="1056" height="300" rx="18" fill="#0b1220" stroke="#334155"/>
    <text x="36" y="52" fill="#22c55e" font-size="24" font-family="JetBrains Mono,Consolas,monospace">next(100) → 1    stack: [(100,1)]</text>
    <text x="36" y="96" fill="#22c55e" font-size="24" font-family="JetBrains Mono,Consolas,monospace">next(80)  → 1    stack: [(100,1),(80,1)]</text>
    <text x="36" y="140" fill="#22c55e" font-size="24" font-family="JetBrains Mono,Consolas,monospace">next(60)  → 1    stack: [(100,1),(80,1),(60,1)]</text>
    <text x="36" y="184" fill="#22c55e" font-size="24" font-family="JetBrains Mono,Consolas,monospace">next(70)  → 2    pop 60, merge span</text>
    <text x="36" y="228" fill="#22c55e" font-size="24" font-family="JetBrains Mono,Consolas,monospace">next(60)  → 1    push new day</text>
    <text x="36" y="272" fill="#22c55e" font-size="24" font-family="JetBrains Mono,Consolas,monospace">next(75)  → 4    pop 60,70 and merge</text>
  </g>

  <g fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="72" y="575" font-size="24">Idea: keep a decreasing stack of prices, each node stores compressed span.</text>
  </g>
</svg>
