<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3264 min-heap simulation">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:26px;font-weight:700}
      .s{font-size:20px}
      .b{fill:#111827;stroke:#38bdf8;stroke-width:2}
      .a{stroke:#94a3b8;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t m">LeetCode 3264 · Min-Heap Simulation (value, index)</text>

  <rect x="60" y="130" width="280" height="120" rx="14" class="b"/>
  <text x="80" y="175" class="t s">Heap Top: (minValue, minIdx)</text>
  <text x="80" y="210" class="t s">Tie → smaller index</text>

  <line x1="340" y1="190" x2="490" y2="190" class="a"/>

  <rect x="500" y="130" width="300" height="120" rx="14" class="b"/>
  <text x="520" y="175" class="t s">Pop top pair</text>
  <text x="520" y="210" class="t s">newValue = value × multiplier</text>

  <line x1="800" y1="190" x2="950" y2="190" class="a"/>

  <rect x="960" y="130" width="180" height="120" rx="14" class="b"/>
  <text x="980" y="175" class="t s">Push back</text>
  <text x="980" y="210" class="t s">(newValue, idx)</text>

  <rect x="180" y="330" width="840" height="190" rx="16" fill="#0b1220" stroke="#22c55e" stroke-width="2"/>
  <text x="210" y="380" class="t s">Repeat exactly k times:</text>
  <text x="210" y="420" class="t s">1) pop min pair</text>
  <text x="210" y="455" class="t s">2) multiply and update nums[idx]</text>
  <text x="210" y="490" class="t s">3) push updated pair back to heap</text>
</svg>
