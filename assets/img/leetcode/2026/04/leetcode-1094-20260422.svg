<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 1094 - Car Pooling</text>
  <text x="60" y="135" fill="#93c5fd" font-size="26" font-family="Arial, Helvetica, sans-serif">Difference Array + Prefix Sum Capacity Check</text>

  <line x1="120" y1="500" x2="1080" y2="500" stroke="#94a3b8" stroke-width="4"/>
  <g fill="#cbd5e1" font-size="20" font-family="Arial, Helvetica, sans-serif">
    <text x="115" y="530">0</text>
    <text x="350" y="530">2</text>
    <text x="585" y="530">5</text>
    <text x="820" y="530">7</text>
    <text x="1050" y="530">9</text>
  </g>

  <rect x="290" y="360" width="420" height="36" rx="8" fill="#22c55e" opacity="0.9"/>
  <text x="305" y="385" fill="#052e16" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="700">Trip A: +2 passengers on [2, 7)</text>

  <rect x="470" y="300" width="360" height="36" rx="8" fill="#38bdf8" opacity="0.9"/>
  <text x="485" y="325" fill="#082f49" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="700">Trip B: +3 passengers on [5, 9)</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#f8fafc">
    <text x="110" y="220">diff[2] += 2, diff[7] -= 2</text>
    <text x="110" y="255">diff[5] += 3, diff[9] -= 3</text>
    <text x="110" y="290">prefix load: 0, 0, 2, 2, 2, 5, 5, 3, 3, 0</text>
  </g>

  <rect x="860" y="170" width="250" height="88" rx="12" fill="#f59e0b"/>
  <text x="885" y="205" fill="#451a03" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">capacity = 4</text>
  <text x="885" y="238" fill="#7c2d12" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">max load = 5 ❌</text>
</svg>
