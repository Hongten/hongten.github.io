<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3330 typed string groups diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 3330: Find the Original Typed String I</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Arial, Helvetica, sans-serif">Count adjacent equal groups, answer = 1 + groups</text>
  <rect x="60" y="210" width="1080" height="330" rx="20" fill="#111827" stroke="#334155"/>
  <text x="100" y="270" fill="#cbd5e1" font-size="26" font-family="monospace">word = "abbcccc"</text>
  <text x="100" y="315" fill="#f8fafc" font-size="30" font-family="monospace">a | bb | cccc</text>
  <text x="100" y="360" fill="#86efac" font-size="26" font-family="Arial, Helvetica, sans-serif">equal-adjacent groups = 2 (bb, cccc)</text>
  <text x="100" y="405" fill="#fcd34d" font-size="26" font-family="Arial, Helvetica, sans-serif">possible originals = 1 + 2 = 3</text>
  <text x="100" y="475" fill="#93c5fd" font-size="24" font-family="Arial, Helvetica, sans-serif">Every group with length L &gt; 1 contributes exactly one extra valid deletion choice.</text>
</svg>
