<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 224 sign stack and parentheses context diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 224 · Basic Calculator</text>
  <text x="52" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Sign Stack + Parentheses Context</text>

  <rect x="52" y="170" width="1096" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <rect x="90" y="220" width="300" height="90" rx="12" fill="#111827" stroke="#60a5fa"/>
  <text x="110" y="255" fill="#bfdbfe" font-size="22" font-family="Inter,Arial,sans-serif">Read token</text>
  <text x="110" y="287" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">digit / + / - / ( / )</text>

  <rect x="450" y="220" width="300" height="90" rx="12" fill="#111827" stroke="#34d399"/>
  <text x="470" y="255" fill="#a7f3d0" font-size="22" font-family="Inter,Arial,sans-serif">Context stack</text>
  <text x="470" y="287" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">push(top*sign) on '('</text>

  <rect x="810" y="220" width="300" height="90" rx="12" fill="#111827" stroke="#f59e0b"/>
  <text x="830" y="255" fill="#fde68a" font-size="22" font-family="Inter,Arial,sans-serif">Accumulate</text>
  <text x="830" y="287" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">ans += sign*top*num</text>

  <path d="M390 265 L450 265" stroke="#9ca3af" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M750 265 L810 265" stroke="#9ca3af" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="90" y="360" width="1020" height="150" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="120" y="402" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Example: 1 - (2 - 3)</text>
  <text x="120" y="438" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Outer sign = -1, inside "-3" becomes +3 after context multiplication</text>
  <text x="120" y="472" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Final answer = 2</text>

  <text x="52" y="600" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文后置, full code tabs</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
