<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2224 greedy timeline diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2224 · Minimum Number of Operations to Convert Time</text>
  <text x="56" y="134" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Greedy steps: 60 → 15 → 5 → 1</text>

  <rect x="56" y="190" width="1088" height="330" rx="20" fill="#1f2937" stroke="#374151"/>

  <line x1="120" y1="355" x2="1080" y2="355" stroke="#9ca3af" stroke-width="4"/>
  <circle cx="120" cy="355" r="9" fill="#22c55e"/>
  <circle cx="1080" cy="355" r="9" fill="#ef4444"/>
  <text x="98" y="392" fill="#86efac" font-size="23" font-family="Inter,Arial,sans-serif">current</text>
  <text x="1043" y="392" fill="#fca5a5" font-size="23" font-family="Inter,Arial,sans-serif">correct</text>

  <rect x="190" y="286" width="220" height="54" rx="10" fill="#0ea5e9"/>
  <text x="266" y="321" fill="#082f49" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">+60</text>

  <rect x="440" y="286" width="180" height="54" rx="10" fill="#38bdf8"/>
  <text x="500" y="321" fill="#0c4a6e" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">+15</text>

  <rect x="650" y="286" width="140" height="54" rx="10" fill="#7dd3fc"/>
  <text x="698" y="321" fill="#075985" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">+5</text>

  <rect x="820" y="286" width="120" height="54" rx="10" fill="#bae6fd"/>
  <text x="865" y="321" fill="#0c4a6e" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">+1</text>

  <text x="80" y="468" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">Convert times to minutes, compute diff, take biggest valid step each round.</text>
  <text x="80" y="505" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
