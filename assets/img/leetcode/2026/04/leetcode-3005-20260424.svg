<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3005 frequency counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3005</text>
  <text x="60" y="150" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Count Elements With Maximum Frequency</text>
  <rect x="60" y="210" width="1080" height="350" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="280" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">nums: [1,2,2,3,1,4]</text>
  <text x="100" y="340" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">freq: 1→2, 2→2, 3→1, 4→1</text>
  <text x="100" y="400" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">max frequency = 2</text>
  <text x="100" y="460" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">answer = 2 + 2 = 4</text>
  <text x="100" y="520" fill="#c4b5fd" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
