<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 581 shortest unsorted continuous subarray boundary diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 581 · Shortest Unsorted Continuous Subarray</text>
  <rect x="60" y="140" width="1080" height="430" rx="18" fill="#111827" stroke="#374151"/>

  <text x="100" y="205" fill="#93c5fd" font-size="30" font-family="monospace">nums = [2, 6, 4, 8, 10, 9, 15]</text>
  <text x="100" y="250" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">left = 1, right = 5  ⇒  sort nums[1..5]</text>

  <g font-family="monospace" font-size="30" fill="#f9fafb">
    <text x="110" y="330">idx:  0   1   2   3   4   5   6</text>
    <text x="110" y="380">val:  2   6   4   8  10   9  15</text>
  </g>

  <rect x="240" y="405" width="560" height="58" rx="12" fill="#7c3aed33" stroke="#a78bfa" stroke-width="3"/>
  <text x="260" y="443" fill="#e9d5ff" font-size="26" font-family="Inter,Arial,sans-serif">unsorted window [1..5] length = 5</text>

  <g fill="#d1fae5" font-family="Inter,Arial,sans-serif" font-size="22">
    <text x="100" y="510">Left scan: nums[i] &lt; maxSeen ⇒ update right</text>
    <text x="100" y="540">Right scan: nums[i] &gt; minSeen ⇒ update left</text>
  </g>

  <text x="100" y="585" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文后置 + Full code tabs</text>
</svg>
