<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .label { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 1652 · Defuse the Bomb</text>
  <text x="60" y="130" class="subtitle">Circular Sliding Window Sum (k &gt; 0 / k &lt; 0)</text>

  <circle cx="430" cy="360" r="165" fill="none" stroke="#60a5fa" stroke-width="4"/>
  <g fill="#22d3ee">
    <circle cx="430" cy="195" r="28"/><circle cx="573" cy="247" r="28"/>
    <circle cx="625" cy="390" r="28"/><circle cx="430" cy="525" r="28"/>
    <circle cx="287" cy="473" r="28"/><circle cx="235" cy="330" r="28"/>
  </g>
  <text x="418" y="202" class="label">5</text>
  <text x="561" y="254" class="label">7</text>
  <text x="613" y="397" class="label">1</text>
  <text x="418" y="532" class="label">4</text>
  <text x="275" y="480" class="label">9</text>
  <text x="223" y="337" class="label">2</text>

  <path d="M573 247 A165 165 0 0 1 625 390" stroke="#f59e0b" stroke-width="8" fill="none"/>
  <path d="M625 390 A165 165 0 0 1 430 525" stroke="#f59e0b" stroke-width="8" fill="none"/>
  <text x="700" y="300" class="label">k &gt; 0: sum next k</text>
  <text x="700" y="340" class="small">Slide window by -left +right each step</text>
  <text x="700" y="390" class="label">k &lt; 0: sum previous |k|</text>
  <text x="700" y="430" class="small">Use modulo index for circular wrap</text>

  <rect x="60" y="545" width="1080" height="50" rx="10" fill="#111827" stroke="#334155"/>
  <text x="85" y="577" class="small">O(n) time · O(1) extra space · Fixed-size circular sliding window</text>
</svg>
