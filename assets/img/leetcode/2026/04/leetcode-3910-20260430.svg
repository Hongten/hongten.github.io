<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="110" fill="#e5e7eb" font-size="46" font-family="Arial">LeetCode 3910</text><text x="60" y="170" fill="#93c5fd" font-size="34" font-family="Arial">Count Distinct XOR Triplets I</text><rect x="60" y="230" width="1080" height="320" rx="16" fill="#1f2937" stroke="#334155"/><text x="90" y="300" fill="#f8fafc" font-size="28" font-family="monospace">i ≤ j ≤ k</text><text x="90" y="350" fill="#86efac" font-size="30" font-family="monospace">value = nums[i] ^ nums[j] ^ nums[k]</text><text x="90" y="410" fill="#cbd5e1" font-size="28" font-family="Arial">Mark seen[value] = true, answer = count(seen)</text></svg>