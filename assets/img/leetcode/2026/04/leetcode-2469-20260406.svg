<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2469 conversion diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2469 - Convert the Temperature</text>
  <rect x="60" y="145" width="1080" height="420" rx="20" fill="#1f2937" stroke="#334155"/>

  <rect x="110" y="210" width="240" height="110" rx="14" fill="#0f172a" stroke="#38bdf8"/>
  <text x="150" y="275" fill="#38bdf8" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">celsius</text>

  <path d="M360 265 L540 265" stroke="#94a3b8" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M360 335 L540 335" stroke="#94a3b8" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="560" y="190" width="540" height="160" rx="14" fill="#0f172a" stroke="#22c55e"/>
  <text x="600" y="250" fill="#bbf7d0" font-size="38" font-family="Inter,Arial,sans-serif">kelvin = celsius + 273.15</text>
  <text x="600" y="315" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Absolute temperature conversion</text>

  <rect x="560" y="375" width="540" height="160" rx="14" fill="#0f172a" stroke="#f59e0b"/>
  <text x="600" y="435" fill="#fde68a" font-size="36" font-family="Inter,Arial,sans-serif">fahrenheit = celsius × 1.80 + 32.00</text>
  <text x="600" y="500" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">Linear scale conversion</text>

  <text x="60" y="600" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文后置 · Java default tabs</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
