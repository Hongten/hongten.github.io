<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2913 subarray distinct square contribution diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2913: Distinct Count Square Sum</text>

  <rect x="50" y="140" width="1100" height="430" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="205" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">nums = [1, 2, 1]</text>
  <text x="90" y="255" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Subarrays and contribution = (distinct count)^2</text>

  <text x="90" y="310" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">[1] -&gt; 1^2 = 1</text>
  <text x="90" y="350" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">[1,2] -&gt; 2^2 = 4</text>
  <text x="90" y="390" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">[1,2,1] -&gt; 2^2 = 4</text>
  <text x="90" y="430" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">[2] -&gt; 1^2 = 1</text>
  <text x="90" y="470" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">[2,1] -&gt; 2^2 = 4</text>
  <text x="90" y="510" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">[1] -&gt; 1^2 = 1</text>

  <text x="760" y="410" fill="#fca5a5" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="700">Total = 15</text>
  <text x="760" y="455" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Brute force with hash set</text>
  <text x="760" y="495" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
