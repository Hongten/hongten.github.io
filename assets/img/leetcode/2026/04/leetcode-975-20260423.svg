<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 975 odd-even jump next-higher and next-lower transitions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="50" y="72" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 975: Odd Even Jump</text>
  <text x="50" y="108" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Odd jump = next higher/equal, Even jump = next lower/equal</text>

  <rect x="50" y="145" width="1100" height="430" rx="20" fill="#0f172a" stroke="#374151"/>

  <g font-family="Inter,Arial,sans-serif" font-size="22" fill="#e5e7eb" text-anchor="middle">
    <rect x="110" y="300" width="120" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="170" y="340">i=0, 10</text>

    <rect x="290" y="300" width="120" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="350" y="340">i=1, 13</text>

    <rect x="470" y="300" width="120" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="530" y="340">i=2, 12</text>

    <rect x="650" y="300" width="120" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="710" y="340">i=3, 14</text>

    <rect x="830" y="300" width="120" height="70" rx="12" fill="#1f2937" stroke="#4b5563"/>
    <text x="890" y="340">i=4, 15</text>
  </g>

  <path d="M170 285 C240 220, 290 220, 350 285" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M350 285 C420 220, 470 220, 530 285" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M530 285 C600 220, 650 220, 710 285" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M710 285 C780 220, 830 220, 890 285" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>

  <path d="M350 385 C420 450, 470 450, 530 385" stroke="#34d399" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M710 385 C600 500, 420 500, 350 385" stroke="#34d399" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>

  <text x="80" y="215" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Blue arcs: odd jumps (next higher/equal)</text>
  <text x="80" y="535" fill="#6ee7b7" font-size="22" font-family="Inter,Arial,sans-serif">Green arcs: even jumps (next lower/equal)</text>

  <text x="860" y="535" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
