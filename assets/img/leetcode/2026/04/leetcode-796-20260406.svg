<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 796 rotate string diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 796 · Rotate String</text>
  <text x="60" y="135" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">All rotations of s appear inside (s + s)</text>

  <rect x="60" y="190" width="500" height="88" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="82" y="244" fill="#f8fafc" font-size="34" font-family="Consolas, monospace">s = abcde</text>

  <line x1="570" y1="234" x2="770" y2="234" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="605" y="210" fill="#7dd3fc" font-size="22" font-family="Arial, sans-serif">rotate left</text>

  <rect x="790" y="190" width="350" height="88" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="812" y="244" fill="#f8fafc" font-size="34" font-family="Consolas, monospace">cdeab</text>

  <rect x="60" y="340" width="1080" height="200" rx="16" fill="#020617" stroke="#334155"/>
  <text x="82" y="395" fill="#f1f5f9" font-size="30" font-family="Consolas, monospace">s + s = abcdeabcde</text>
  <rect x="420" y="420" width="185" height="60" rx="10" fill="#0ea5e9" opacity="0.25" stroke="#38bdf8"/>
  <text x="445" y="460" fill="#7dd3fc" font-size="32" font-family="Consolas, monospace">cdeab</text>
  <text x="82" y="515" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">If goal is a substring of (s + s) and lengths are equal ⇒ true</text>
</svg>
