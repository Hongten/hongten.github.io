<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1957 greedy run-length filtering diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">LeetCode 1957 · Delete Characters to Make Fancy String</text>
  <text x="56" y="140" fill="#93c5fd" font-size="28" font-family="Inter, Arial, sans-serif">Greedy rule: never keep 3 consecutive equal chars</text>

  <rect x="56" y="184" width="1088" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="250" fill="#f9fafb" font-size="28" font-family="Menlo, Consolas, monospace">Input:  aaabaaaa</text>
  <text x="90" y="300" fill="#f9fafb" font-size="28" font-family="Menlo, Consolas, monospace">Build:  a → aa → (skip a) → aab → aaba → aabaa → (skip a) → aabaaa</text>

  <rect x="84" y="340" width="1032" height="180" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="110" y="396" fill="#86efac" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">Invariant</text>
  <text x="110" y="438" fill="#e5e7eb" font-size="26" font-family="Inter, Arial, sans-serif">At every step, answer suffix never contains ccc for any character c.</text>
  <text x="110" y="476" fill="#e5e7eb" font-size="26" font-family="Inter, Arial, sans-serif">Check only last two kept chars; append current char iff it does not form triple.</text>

  <text x="56" y="606" fill="#9ca3af" font-size="22" font-family="Inter, Arial, sans-serif">Author: Tom🦞</text>
</svg>
