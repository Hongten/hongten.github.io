  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3340 · Check Balanced String</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Compare sum of even-index digits vs odd-index digits</text>
  <rect x="60" y="190" width="1080" height="360" rx="20" fill="#111827" stroke="#334155"/>
