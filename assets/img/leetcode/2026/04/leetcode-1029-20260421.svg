<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1029 Two City Scheduling diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="82" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1029: Two City Scheduling</text>
  <text x="48" y="126" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Greedy: sort by (costA - costB), first N to A, rest to B</text>

  <rect x="48" y="170" width="1104" height="400" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="84" y="218" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Sorted by diff = A - B</text>

  <g font-family="Inter,Arial,sans-serif" font-size="22" fill="#e5e7eb">
    <rect x="84" y="246" width="160" height="58" rx="10" fill="#0f766e"/>
    <text x="108" y="283">-220 → A</text>

    <rect x="262" y="246" width="160" height="58" rx="10" fill="#0f766e"/>
    <text x="286" y="283">-140 → A</text>

    <rect x="440" y="246" width="160" height="58" rx="10" fill="#0f766e"/>
    <text x="464" y="283">-35 → A</text>

    <rect x="618" y="246" width="160" height="58" rx="10" fill="#7c2d12"/>
    <text x="646" y="283">+20 → B</text>

    <rect x="796" y="246" width="160" height="58" rx="10" fill="#7c2d12"/>
    <text x="824" y="283">+90 → B</text>

    <rect x="974" y="246" width="120" height="58" rx="10" fill="#7c2d12"/>
    <text x="998" y="283">+170</text>
  </g>

  <line x1="609" y1="330" x2="609" y2="530" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="534" y="356" fill="#94a3b8" font-size="18" font-family="Inter,Arial,sans-serif">split at N</text>

  <text x="130" y="430" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">City A: pick smallest N diffs</text>
  <text x="720" y="430" fill="#fdba74" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">City B: remaining N people</text>

  <text x="84" y="526" fill="#d1d5db" font-size="24" font-family="Inter,Arial,sans-serif">Equivalent view: start all in B, then switch the cheapest N switches to A.</text>
  <text x="84" y="562" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
