<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2455 filter and average diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2455</text>
  <text x="60" y="150" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Average Value of Even Numbers That Are Divisible by Three</text>

  <rect x="60" y="210" width="500" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="260" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Input nums</text>
  <text x="90" y="310" fill="#e5e7eb" font-size="28" font-family="monospace">[1, 3, 6, 10, 12, 15]</text>
  <text x="90" y="370" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Keep only num % 6 == 0</text>
  <text x="90" y="420" fill="#e5e7eb" font-size="28" font-family="monospace">valid = [6, 12]</text>
  <text x="90" y="470" fill="#e5e7eb" font-size="28" font-family="monospace">sum = 18, count = 2</text>

  <rect x="640" y="250" width="500" height="240" rx="16" fill="#111827" stroke="#60a5fa"/>
  <text x="680" y="320" fill="#e5e7eb" font-size="36" font-family="Inter,Arial,sans-serif">answer = sum / count</text>
  <text x="680" y="380" fill="#86efac" font-size="44" font-family="monospace">18 / 2 = 9</text>
  <text x="680" y="440" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">If count == 0, return 0</text>
</svg>
