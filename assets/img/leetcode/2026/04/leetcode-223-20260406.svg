<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 223 Rectangle Area overlap diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="72" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 223: Rectangle Area</text>
  <text x="48" y="110" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Total = Area(A) + Area(B) - Overlap</text>

  <rect x="220" y="180" width="420" height="280" fill="#22c55e" fill-opacity="0.45" stroke="#86efac" stroke-width="3"/>
  <rect x="470" y="120" width="420" height="300" fill="#60a5fa" fill-opacity="0.45" stroke="#93c5fd" stroke-width="3"/>
  <rect x="470" y="180" width="170" height="240" fill="#f59e0b" fill-opacity="0.55" stroke="#fcd34d" stroke-width="2"/>

  <line x1="220" y1="500" x2="640" y2="500" stroke="#86efac" stroke-width="2"/>
  <text x="360" y="525" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">Rectangle A</text>

  <line x1="470" y1="90" x2="890" y2="90" stroke="#93c5fd" stroke-width="2"/>
  <text x="610" y="75" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Rectangle B</text>

  <text x="485" y="305" fill="#fef3c7" font-size="18" font-family="Inter,Arial,sans-serif">overlap</text>

  <text x="48" y="585" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">x_overlap = max(0, min(ax2,bx2)-max(ax1,bx1))</text>
  <text x="48" y="615" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">y_overlap = max(0, min(ay2,by2)-max(ay1,by1))</text>
</svg>
