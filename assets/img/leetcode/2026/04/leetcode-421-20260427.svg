  <text x="56" y="94" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 421: Maximum XOR of Two Numbers in an Array</text>
  <text x="56" y="142" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Bitwise Trie + Greedy Opposite Bit Match</text>

  <rect x="56" y="190" width="1088" height="384" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="96" y="250" fill="#86efac" font-size="28" font-family="monospace">nums = [3, 10, 5, 25, 2, 8]</text>
