  <text x="96" y="376" fill="#fca5a5" font-size="26" font-family="monospace">XOR 11100 = 28 (max)</text>

  <path d="M420 280 L560 220 L700 280" stroke="#60a5fa" stroke-width="4" fill="none"/>
  <path d="M560 220 L560 420" stroke="#60a5fa" stroke-width="4" fill="none"/>
  <circle cx="560" cy="220" r="14" fill="#60a5fa"/>
  <circle cx="420" cy="280" r="12" fill="#34d399"/>
