<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">LeetCode 1614 Maximum Nesting Depth</title>
  <desc id="d">Running depth rises on left parenthesis and falls on right parenthesis; peak is the answer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1d2a44"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e6edf3" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 1614</text>
  <text x="60" y="135" fill="#9fb3c8" font-size="30" font-family="Arial, Helvetica, sans-serif">Maximum Nesting Depth of the Parentheses</text>

  <rect x="60" y="180" width="1080" height="360" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="230" fill="#93c5fd" font-size="24" font-family="monospace">s = (1+(2*3)+((8)/4))+1</text>

  <line x1="90" y1="500" x2="1110" y2="500" stroke="#64748b" stroke-width="2"/>
  <line x1="90" y1="470" x2="1110" y2="470" stroke="#334155" stroke-width="1"/>
  <line x1="90" y1="440" x2="1110" y2="440" stroke="#334155" stroke-width="1"/>
  <line x1="90" y1="410" x2="1110" y2="410" stroke="#334155" stroke-width="1"/>

  <text x="50" y="505" fill="#94a3b8" font-size="16" font-family="Arial">0</text>
  <text x="50" y="475" fill="#94a3b8" font-size="16" font-family="Arial">1</text>
  <text x="50" y="445" fill="#94a3b8" font-size="16" font-family="Arial">2</text>
  <text x="50" y="415" fill="#94a3b8" font-size="16" font-family="Arial">3</text>

  <polyline fill="none" stroke="#22d3ee" stroke-width="5" points="120,500 180,470 240,470 300,440 360,440 420,470 480,470 540,440 600,410 660,410 720,440 780,470 840,470 900,500"/>
  <circle cx="600" cy="410" r="7" fill="#f59e0b"/>
  <text x="620" y="400" fill="#fbbf24" font-size="22" font-family="Arial" font-weight="700">max depth = 3</text>

  <text x="60" y="590" fill="#cbd5e1" font-size="22" font-family="Arial">Rule: '(' => depth++, ')' => depth--, answer = max(depth)</text>
</svg>
