<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 2129 capitalization rules</title>
  <desc id="desc">Words of length one or two stay lowercase, words longer than two become title case.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="110" fill="#e2e8f0" font-size="46" font-family="Inter,Segoe UI,Arial" font-weight="700">LeetCode 2129 · Capitalize the Title</text>
  <rect x="70" y="170" width="500" height="170" rx="16" fill="#111827" stroke="#374151"/>
  <text x="95" y="220" fill="#93c5fd" font-size="30" font-family="JetBrains Mono,Consolas,monospace">len ≤ 2  →  lowercase</text>
  <text x="95" y="275" fill="#e5e7eb" font-size="27" font-family="JetBrains Mono,Consolas,monospace">"aN"  →  "an"</text>
  <text x="95" y="320" fill="#e5e7eb" font-size="27" font-family="JetBrains Mono,Consolas,monospace">"OF"  →  "of"</text>
  <rect x="630" y="170" width="500" height="170" rx="16" fill="#111827" stroke="#374151"/>
  <text x="655" y="220" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">len &gt; 2  →  Title Case</text>
  <text x="655" y="275" fill="#e5e7eb" font-size="27" font-family="JetBrains Mono,Consolas,monospace">"cAPITALIZE" → "Capitalize"</text>
  <text x="655" y="320" fill="#e5e7eb" font-size="27" font-family="JetBrains Mono,Consolas,monospace">"tHe" → "The"</text>
  <rect x="70" y="390" width="1060" height="160" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="95" y="450" fill="#cbd5e1" font-size="30" font-family="JetBrains Mono,Consolas,monospace">Process: split words → lowercase each word → if len&gt;2 uppercase first char → join</text>
  <text x="95" y="505" fill="#f8fafc" font-size="34" font-family="JetBrains Mono,Consolas,monospace" font-weight="700">Output: "capiTalIze tHe titLe" → "Capitalize The Title"</text>
</svg>
