<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 953 alien dictionary comparison diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 953: Verifying an Alien Dictionary</text>
  <text x="56" y="144" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Build rank map, compare adjacent words by first mismatch</text>

  <rect x="56" y="188" width="1088" height="368" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="88" y="238" fill="#86efac" font-size="26" font-family="JetBrains Mono,Consolas,monospace">order = "hlabcdefgijkmnopqrstuvwxyz"</text>
  <text x="88" y="278" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">rank['h']=0, rank['l']=1, rank['a']=2, ...</text>

  <rect x="88" y="314" width="500" height="84" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="108" y="348" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">word1 = "hello"</text>
  <text x="108" y="380" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">word2 = "leetcode"</text>

  <text x="624" y="350" fill="#fbbf24" font-size="24" font-family="Inter,Arial,sans-serif">first mismatch: 'h' vs 'l'</text>
  <text x="624" y="384" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">compare rank('h') &lt; rank('l') → valid</text>

  <text x="88" y="448" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Prefix rule: if equal prefix, shorter word must come first.</text>
  <text x="88" y="488" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Example invalid: "apple" before "app"</text>
  <text x="88" y="530" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
