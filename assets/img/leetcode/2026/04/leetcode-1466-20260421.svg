  <rect x="60" y="535" width="1080" height="62" rx="12" fill="#111827" stroke="#374151"/>
  <text x="86" y="575" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Answer = sum(cost) during BFS/DFS from node 0 on first visit of each node.</text>
