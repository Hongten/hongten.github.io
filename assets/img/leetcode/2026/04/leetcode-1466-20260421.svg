  <text x="60" y="132" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Traverse from 0, count only edges pointing away from 0-path</text>

  <circle cx="200" cy="320" r="34" fill="#1f2937" stroke="#93c5fd" stroke-width="3"/>
