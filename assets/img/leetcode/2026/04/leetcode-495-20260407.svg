<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 495 interval merge timeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#93c5fd}
      .axis{stroke:#64748b;stroke-width:3}
      .seg{fill:#22c55e;opacity:.85}
      .seg2{fill:#eab308;opacity:.85}
      .seg3{fill:#f97316;opacity:.85}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t" font-size="44" font-weight="700">LeetCode 495 · Teemo Attacking</text>
  <text x="60" y="135" class="m" font-size="28">Add min(duration, gap) between attacks, then +duration for the last one</text>

  <line x1="90" y1="360" x2="1110" y2="360" class="axis"/>
  <text x="90" y="390" class="t" font-size="20">time</text>

  <rect x="220" y="320" width="240" height="60" rx="10" class="seg"/>
  <rect x="360" y="320" width="240" height="60" rx="10" class="seg2"/>
  <rect x="700" y="320" width="240" height="60" rx="10" class="seg3"/>

  <text x="225" y="305" class="t" font-size="22">[t0, t0+duration)</text>
  <text x="365" y="305" class="t" font-size="22">[t1, t1+duration)</text>
  <text x="705" y="305" class="t" font-size="22">[t2, t2+duration)</text>

  <text x="270" y="500" class="t" font-size="30">overlap → count once</text>
  <text x="700" y="500" class="t" font-size="30">gap ≥ duration → full add</text>
</svg>
