<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 453 invariant illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#eaf0ff}
      .m{font-size:44px;font-weight:700}
      .s{font-size:26px;fill:#b9c6ee}
      .b{fill:#74c0fc}
      .g{fill:#51cf66}
      .y{fill:#ffd43b}
      .w{stroke:#dbe4ff;stroke-width:2;fill:none;opacity:.7}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 453 · Minimum Moves to Equal Array Elements</text>
  <text x="60" y="130" class="t s">Invariant: +1 to n-1 elements  ⇔  -1 to the excluded element</text>

  <text x="80" y="210" class="t s">Example nums = [1, 2, 4]</text>
  <rect x="80" y="240" width="70" height="180" rx="8" class="g"/>
  <rect x="170" y="300" width="70" height="120" rx="8" class="b"/>
  <rect x="260" y="180" width="70" height="240" rx="8" class="y"/>
  <text x="100" y="450" class="t s">1</text>
  <text x="190" y="450" class="t s">2</text>
  <text x="280" y="450" class="t s">4</text>

  <path d="M380 315 L560 315" class="w"/>
  <polygon points="560,315 540,303 540,327" fill="#dbe4ff"/>
  <text x="390" y="290" class="t s">Equivalent transform</text>

  <text x="620" y="210" class="t s">Reduce all values to min = 1</text>
  <rect x="620" y="240" width="70" height="180" rx="8" class="g"/>
  <rect x="710" y="240" width="70" height="180" rx="8" class="g"/>
  <rect x="800" y="240" width="70" height="180" rx="8" class="g"/>
  <text x="640" y="450" class="t s">1</text>
  <text x="730" y="450" class="t s">1</text>
  <text x="820" y="450" class="t s">1</text>

  <text x="620" y="505" class="t s">moves = (1-1) + (2-1) + (4-1) = 4</text>
  <text x="620" y="545" class="t s">Formula: sum(nums) - min(nums) × n</text>
</svg>
