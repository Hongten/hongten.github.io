<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:400 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .coin{fill:#f59e0b;stroke:#fbbf24;stroke-width:2}
      .outline{stroke:#38bdf8;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 441 · Arranging Coins</text>
  <text x="60" y="130" class="sub">Binary Search on k(k+1)/2 ≤ n</text>

  <g transform="translate(90,210)">
    <rect x="0" y="180" width="420" height="180" class="outline" rx="14"/>
    <circle cx="35" cy="330" r="14" class="coin"/>
    <circle cx="80" cy="330" r="14" class="coin"/>
    <circle cx="125" cy="330" r="14" class="coin"/>
    <circle cx="170" cy="330" r="14" class="coin"/>
    <circle cx="215" cy="330" r="14" class="coin"/>

    <circle cx="58" cy="285" r="14" class="coin"/>
    <circle cx="103" cy="285" r="14" class="coin"/>
    <circle cx="148" cy="285" r="14" class="coin"/>
    <circle cx="193" cy="285" r="14" class="coin"/>

    <circle cx="80" cy="240" r="14" class="coin"/>
    <circle cx="125" cy="240" r="14" class="coin"/>
    <circle cx="170" cy="240" r="14" class="coin"/>

    <circle cx="103" cy="195" r="14" class="coin"/>
    <circle cx="148" cy="195" r="14" class="coin"/>

    <circle cx="125" cy="150" r="14" class="coin"/>
  </g>

  <g transform="translate(640,220)">
    <rect x="0" y="0" width="470" height="280" rx="16" fill="#0b1220" stroke="#334155"/>
    <text x="28" y="60" class="txt">need(k) = 1 + 2 + ... + k</text>
    <text x="28" y="100" class="txt">        = k(k+1)/2</text>
    <text x="28" y="150" class="txt">Find max k such that:</text>
    <text x="28" y="190" class="txt">k(k+1)/2 ≤ n</text>
    <text x="28" y="240" class="txt">Monotonic ✅  → Binary Search</text>
  </g>
</svg>
