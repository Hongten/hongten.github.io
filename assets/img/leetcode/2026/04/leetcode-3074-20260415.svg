<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3074 apple redistribution into boxes diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3074 · Apple Redistribution into Boxes</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Greedy: choose largest capacities first</text>

  <rect x="70" y="210" width="470" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="95" y="255" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">Apple packs</text>
  <rect x="95" y="285" width="90" height="60" rx="10" fill="#22c55e"/><text x="125" y="323" fill="#052e16" font-size="26" font-family="Inter,Arial,sans-serif">5</text>
  <rect x="205" y="285" width="90" height="60" rx="10" fill="#22c55e"/><text x="235" y="323" fill="#052e16" font-size="26" font-family="Inter,Arial,sans-serif">1</text>
  <rect x="315" y="285" width="90" height="60" rx="10" fill="#22c55e"/><text x="345" y="323" fill="#052e16" font-size="26" font-family="Inter,Arial,sans-serif">2</text>
  <rect x="425" y="285" width="90" height="60" rx="10" fill="#22c55e"/><text x="455" y="323" fill="#052e16" font-size="26" font-family="Inter,Arial,sans-serif">4</text>
  <text x="95" y="385" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Total need = 12 apples</text>

  <rect x="640" y="210" width="490" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="665" y="255" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">Boxes (sorted desc)</text>
  <rect x="665" y="285" width="110" height="70" rx="10" fill="#60a5fa"/><text x="705" y="328" fill="#082f49" font-size="28" font-family="Inter,Arial,sans-serif">6</text>
  <rect x="795" y="285" width="110" height="70" rx="10" fill="#60a5fa"/><text x="835" y="328" fill="#082f49" font-size="28" font-family="Inter,Arial,sans-serif">4</text>
  <rect x="925" y="285" width="110" height="70" rx="10" fill="#60a5fa"/><text x="965" y="328" fill="#082f49" font-size="28" font-family="Inter,Arial,sans-serif">3</text>
  <text x="665" y="390" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Take 6 + 4 + 3 = 13 ≥ 12</text>
  <text x="665" y="430" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Minimum boxes = 3</text>

  <text x="60" y="585" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual with full code tabs</text>
