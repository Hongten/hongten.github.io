      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="80" fill="#e2e8f0" font-size="38" font-family="Inter,Segoe UI,Arial">LeetCode 402 · Remove K Digits</text>
  <text x="52" y="128" fill="#93c5fd" font-size="26" font-family="Inter,Segoe UI,Arial">Pop larger previous digits when current digit is smaller</text>

