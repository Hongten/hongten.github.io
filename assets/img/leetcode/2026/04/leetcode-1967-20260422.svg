<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1967 substring count diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1967</text>
  <text x="60" y="135" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Count patterns that appear in word</text>

  <rect x="60" y="180" width="1080" height="95" rx="12" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="238" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">word = "abcde"</text>

  <rect x="60" y="305" width="250" height="85" rx="10" fill="#0b3b2e" stroke="#10b981"/>
  <text x="95" y="358" fill="#d1fae5" font-size="32" font-family="JetBrains Mono,Consolas,monospace">"a" ✓</text>

  <rect x="340" y="305" width="250" height="85" rx="10" fill="#0b3b2e" stroke="#10b981"/>
  <text x="375" y="358" fill="#d1fae5" font-size="32" font-family="JetBrains Mono,Consolas,monospace">"bb" ✗</text>

  <rect x="620" y="305" width="250" height="85" rx="10" fill="#0b3b2e" stroke="#10b981"/>
  <text x="655" y="358" fill="#d1fae5" font-size="32" font-family="JetBrains Mono,Consolas,monospace">"acd" ✗</text>

  <rect x="900" y="305" width="240" height="85" rx="10" fill="#0b3b2e" stroke="#10b981"/>
  <text x="935" y="358" fill="#d1fae5" font-size="32" font-family="JetBrains Mono,Consolas,monospace">"ace" ✗</text>

  <text x="60" y="470" fill="#fbbf24" font-size="30" font-family="Inter,Arial,sans-serif">Check each pattern with contains(), then count matches.</text>
  <text x="60" y="530" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
