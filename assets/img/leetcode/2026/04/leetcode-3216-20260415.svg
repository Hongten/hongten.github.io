<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3216 adjacent same parity first improving swap">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:3;rx:12}
      .txt{font:700 40px 'Consolas',monospace;fill:#f8fafc}
      .cap{font:600 26px 'Segoe UI',Arial,sans-serif;fill:#22d3ee}
      .small{font:400 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .hl{fill:#f59e0b}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 3216 · Lexicographically Smallest String After a Swap</text>
  <text x="60" y="130" class="sub">Greedy rule: first adjacent pair with same parity and descending order.</text>

  <text x="120" y="200" class="cap">Input</text>
  <rect x="120" y="220" width="100" height="90" class="box"/><text x="158" y="278" class="txt">4</text>
  <rect x="240" y="220" width="100" height="90" class="box"/><text x="278" y="278" class="txt">1</text>
  <rect x="360" y="220" width="100" height="90" class="box"/><text x="398" y="278" class="txt">3</text>
  <rect x="480" y="220" width="100" height="90" class="box"/><text x="518" y="278" class="txt">2</text>

  <path d="M170 330 C210 390, 250 390, 290 330" fill="none" stroke="#f59e0b" stroke-width="5"/>
  <text x="135" y="425" class="small">4 and 1 are both odd/even? no</text>

  <path d="M410 330 C450 390, 490 390, 530 330" fill="none" stroke="#22c55e" stroke-width="5"/>
  <text x="370" y="425" class="small">3 and 2 same parity + 3&gt;2 → swap</text>

  <text x="720" y="200" class="cap">Result</text>
  <rect x="720" y="220" width="100" height="90" class="box"/><text x="758" y="278" class="txt">4</text>
  <rect x="840" y="220" width="100" height="90" class="box"/><text x="878" y="278" class="txt">1</text>
  <rect x="960" y="220" width="100" height="90" class="box"/><text x="998" y="278" class="txt hl">2</text>
  <rect x="1080" y="220" width="100" height="90" class="box"/><text x="1118" y="278" class="txt hl">3</text>

  <text x="720" y="370" class="small">First improving valid swap gives global lexicographic optimum.</text>
</svg>
