<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2914 pair mismatch diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2914 - Pair Greedy</text>
  <text x="60" y="150" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Count mismatched pairs: (01 or 10) needs exactly 1 change</text>
  <rect x="60" y="210" width="1080" height="320" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="285" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Example: s = 01 11 10 00</text>
  <text x="95" y="350" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">01 -> +1, 11 -> +0, 10 -> +1, 00 -> +0</text>
  <text x="95" y="415" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif">Answer = 2</text>
  <text x="95" y="480" fill="#fbbf24" font-size="26" font-family="Inter,Arial,sans-serif">Independent pairs, linear scan, O(n) time / O(1) space</text>
</svg>
