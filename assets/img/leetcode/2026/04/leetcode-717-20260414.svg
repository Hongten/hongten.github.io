<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 717 greedy decode diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 717 · 1-bit and 2-bit Characters</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Greedy pointer decode: 0 -&gt; +1, 1x -&gt; +2</text>

  <rect x="60" y="190" width="540" height="340" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="245" fill="#f8fafc" font-size="30" font-family="monospace">bits = [1, 0, 0]</text>
  <text x="90" y="305" fill="#cbd5e1" font-size="27" font-family="monospace">i=0, bits[i]=1  =&gt; take two-bit char "10"</text>
  <text x="90" y="355" fill="#cbd5e1" font-size="27" font-family="monospace">i = i + 2  =&gt; i=2 (last index)</text>
  <text x="90" y="425" fill="#86efac" font-size="30" font-family="monospace">End at last index  ✓ one-bit char</text>
  <text x="90" y="485" fill="#facc15" font-size="24" font-family="Inter,Arial,sans-serif">Return true</text>

  <rect x="640" y="190" width="500" height="340" rx="16" fill="#111827" stroke="#374151"/>
  <text x="670" y="250" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Invariant</text>
  <text x="670" y="315" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">Only scan while i &lt; n-1</text>
  <text x="670" y="365" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">0 consumes 1 bit, 1 consumes 2 bits</text>
  <text x="670" y="415" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">Final check: i == n-1 ?</text>
  <text x="670" y="470" fill="#fda4af" font-size="24" font-family="Inter,Arial,sans-serif">If i skips past last index, last 0 belongs to a two-bit char</text>

  <text x="60" y="590" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual solution post</text>
</svg>
