<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .muted{fill:#94a3b8}
      .node{fill:#1d4ed8;stroke:#93c5fd;stroke-width:2}
      .insert{fill:#065f46;stroke:#6ee7b7;stroke-width:2}
      .arrow{stroke:#cbd5e1;stroke-width:2;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" class="t" font-size="40" font-weight="700">LeetCode 2807</text>
  <text x="60" y="125" class="t muted" font-size="24">Insert Greatest Common Divisors in Linked List</text>

  <text x="60" y="190" class="t" font-size="26">Example: 18 → 6 → 10 → 3</text>

  <rect x="80" y="250" rx="12" ry="12" width="120" height="64" class="node"/>
  <text x="140" y="292" text-anchor="middle" class="t" font-size="30" font-weight="700">18</text>

  <line x1="200" y1="282" x2="260" y2="282" class="arrow"/>
  <rect x="260" y="250" rx="12" ry="12" width="120" height="64" class="insert"/>
  <text x="320" y="292" text-anchor="middle" class="t" font-size="28" font-weight="700">gcd=6</text>

  <line x1="380" y1="282" x2="440" y2="282" class="arrow"/>
  <rect x="440" y="250" rx="12" ry="12" width="120" height="64" class="node"/>
  <text x="500" y="292" text-anchor="middle" class="t" font-size="30" font-weight="700">6</text>

  <line x1="560" y1="282" x2="620" y2="282" class="arrow"/>
  <rect x="620" y="250" rx="12" ry="12" width="120" height="64" class="insert"/>
  <text x="680" y="292" text-anchor="middle" class="t" font-size="28" font-weight="700">gcd=2</text>

  <line x1="740" y1="282" x2="800" y2="282" class="arrow"/>
  <rect x="800" y="250" rx="12" ry="12" width="120" height="64" class="node"/>
  <text x="860" y="292" text-anchor="middle" class="t" font-size="30" font-weight="700">10</text>

  <line x1="920" y1="282" x2="980" y2="282" class="arrow"/>
  <rect x="980" y="250" rx="12" ry="12" width="120" height="64" class="insert"/>
  <text x="1040" y="292" text-anchor="middle" class="t" font-size="28" font-weight="700">gcd=1</text>

  <text x="60" y="390" class="t" font-size="24">One-pass pointer movement:</text>
  <text x="60" y="430" class="t muted" font-size="22">cur, nxt → insert gcd(cur.val, nxt.val) → move cur = nxt</text>

  <text x="60" y="520" class="t muted" font-size="20">Time: O(n * logV)  •  Extra Space: O(1)</text>
</svg>
