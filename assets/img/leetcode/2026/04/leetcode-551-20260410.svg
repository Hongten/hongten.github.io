<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 551 attendance scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 551 · Student Attendance Record I</text>
  <text x="60" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">One-pass state check: total 'A' and consecutive 'L'</text>

  <rect x="60" y="180" width="1080" height="380" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="96" y="232" fill="#cbd5e1" font-size="24" font-family="monospace">Input:  P  P  A  L  L  P  L  L</text>

  <rect x="92" y="266" width="120" height="64" rx="10" fill="#0f172a" stroke="#22c55e"/>
  <text x="106" y="304" fill="#86efac" font-size="24" font-family="monospace">A=1</text>
  <rect x="236" y="266" width="180" height="64" rx="10" fill="#0f172a" stroke="#f59e0b"/>
  <text x="250" y="304" fill="#fde68a" font-size="24" font-family="monospace">late=2</text>
  <rect x="440" y="266" width="310" height="64" rx="10" fill="#0f172a" stroke="#60a5fa"/>
  <text x="454" y="304" fill="#bfdbfe" font-size="24" font-family="monospace">still eligible ✓</text>

  <line x1="92" y1="360" x2="1110" y2="360" stroke="#475569" stroke-width="2" stroke-dasharray="8 8"/>

  <text x="96" y="406" fill="#cbd5e1" font-size="24" font-family="monospace">Disqualify when: A &gt;= 2  OR  consecutive L &gt;= 3</text>
  <text x="96" y="452" fill="#fca5a5" font-size="24" font-family="monospace">Example fail: PPALLL  → late streak reaches 3</text>
  <text x="96" y="498" fill="#86efac" font-size="24" font-family="monospace">Example pass: PPALLP  → A=1, max late streak=2</text>

  <text x="60" y="596" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 section + full code tabs</text>
</svg>
