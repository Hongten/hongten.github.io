<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 388 depth stack path-length diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="94" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 388 · Longest Absolute File Path</text>
  <rect x="56" y="130" width="1088" height="442" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="88" y="190" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Input lines with depth:</text>
  <text x="88" y="236" fill="#e5e7eb" font-size="24" font-family="monospace">dir</text>
  <text x="88" y="272" fill="#e5e7eb" font-size="24" font-family="monospace">\tsubdir1</text>
  <text x="88" y="308" fill="#e5e7eb" font-size="24" font-family="monospace">\tsubdir2</text>
  <text x="88" y="344" fill="#e5e7eb" font-size="24" font-family="monospace">\t\tfile.ext</text>

  <text x="580" y="190" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Depth prefix length table:</text>
  <text x="580" y="236" fill="#e5e7eb" font-size="24" font-family="monospace">lenAtDepth[0] = 0</text>
  <text x="580" y="272" fill="#e5e7eb" font-size="24" font-family="monospace">dir -&gt; lenAtDepth[1] = 4</text>
  <text x="580" y="308" fill="#e5e7eb" font-size="24" font-family="monospace">subdir2 -&gt; lenAtDepth[2] = 12</text>
  <text x="580" y="344" fill="#e5e7eb" font-size="24" font-family="monospace">file.ext -&gt; 12 + 8 = 20</text>

  <text x="88" y="426" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">Rule:</text>
  <text x="170" y="426" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">directory =&gt; save prefix + '/' ; file =&gt; update max length</text>
  <text x="88" y="490" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
