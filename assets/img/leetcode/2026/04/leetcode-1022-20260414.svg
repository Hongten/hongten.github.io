<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1022 root-to-leaf binary sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#e5e7eb}
      .n{fill:#1f2937;stroke:#93c5fd;stroke-width:2}
      .e{stroke:#6b7280;stroke-width:3}
      .l{font-size:22px;fill:#93c5fd}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="70" class="t" font-size="42" font-weight="700">LeetCode 1022 · Sum of Root To Leaf Binary Numbers</text>
  <text x="50" y="110" class="t" font-size="26" fill="#9ca3af">DFS: current = (current &lt;&lt; 1) | node.val</text>

  <line x1="280" y1="200" x2="180" y2="300" class="e"/>
  <line x1="280" y1="200" x2="380" y2="300" class="e"/>
  <line x1="180" y1="300" x2="130" y2="400" class="e"/>
  <line x1="180" y1="300" x2="230" y2="400" class="e"/>
  <line x1="380" y1="300" x2="430" y2="400" class="e"/>

  <circle cx="280" cy="200" r="34" class="n"/><text x="272" y="208" class="t" font-size="28">1</text>
  <circle cx="180" cy="300" r="34" class="n"/><text x="172" y="308" class="t" font-size="28">0</text>
  <circle cx="380" cy="300" r="34" class="n"/><text x="372" y="308" class="t" font-size="28">1</text>
  <circle cx="130" cy="400" r="34" class="n"/><text x="122" y="408" class="t" font-size="28">0</text>
  <circle cx="230" cy="400" r="34" class="n"/><text x="222" y="408" class="t" font-size="28">1</text>
  <circle cx="430" cy="400" r="34" class="n"/><text x="422" y="408" class="t" font-size="28">1</text>

  <text x="500" y="250" class="l">Path 1→0→0 = binary 100 = 4</text>
  <text x="500" y="295" class="l">Path 1→0→1 = binary 101 = 5</text>
  <text x="500" y="340" class="l">Path 1→1     = binary 11  = 3</text>
  <text x="500" y="420" class="t" font-size="34" fill="#86efac">Total Sum = 4 + 5 + 3 = 12</text>
  <text x="50" y="585" class="t" font-size="24" fill="#9ca3af">Author: Tom🦞 · EN first + 中文 + full multi-language code tabs</text>
</svg>
