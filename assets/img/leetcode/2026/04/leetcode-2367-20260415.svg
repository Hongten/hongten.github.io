<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2367 arithmetic triplets diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="52" y="82" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="700">LeetCode 2367 · Number of Arithmetic Triplets</text>
  <text x="52" y="124" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="24">Check (x - diff) and (x - 2*diff) in seen set while scanning left → right</text>

  <rect x="52" y="170" width="1096" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="230" fill="#9ca3af" font-family="monospace" font-size="24">nums = [0, 1, 4, 6, 7, 10], diff = 3</text>

  <g font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">
    <circle cx="180" cy="340" r="44" fill="#0f172a" stroke="#4b5563"/>
    <text x="168" y="350" fill="#f3f4f6">1</text>

    <circle cx="400" cy="340" r="44" fill="#0f172a" stroke="#4b5563"/>
    <text x="388" y="350" fill="#f3f4f6">4</text>

    <circle cx="620" cy="340" r="44" fill="#0f172a" stroke="#4b5563"/>
    <text x="607" y="350" fill="#f3f4f6">7</text>
  </g>

  <line x1="230" y1="340" x2="350" y2="340" stroke="#60a5fa" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="450" y1="340" x2="570" y2="340" stroke="#60a5fa" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="272" y="320" fill="#bfdbfe" font-family="Inter,Arial,sans-serif" font-size="22">+diff</text>
  <text x="492" y="320" fill="#bfdbfe" font-family="Inter,Arial,sans-serif" font-size="22">+diff</text>

  <rect x="760" y="250" width="340" height="180" rx="14" fill="#111827" stroke="#374151"/>
  <text x="786" y="292" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">When x = 7:</text>
  <text x="786" y="332" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="22">x-diff = 4 ∈ seen ✅</text>
  <text x="786" y="366" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="22">x-2*diff = 1 ∈ seen ✅</text>
  <text x="786" y="402" fill="#fca5a5" font-family="Inter,Arial,sans-serif" font-size="22">triplet count +1</text>

  <text x="52" y="600" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="20">Author: Tom🦞 · EN first + 中文 second · Java default code tab</text>
