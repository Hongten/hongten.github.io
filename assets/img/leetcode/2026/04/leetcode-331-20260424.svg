<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 331 slot counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Segoe UI,Arial" font-weight="700">LeetCode 331 · Slot Counting</text>
  <text x="60" y="130" fill="#94a3b8" font-size="26" font-family="Inter,Segoe UI,Arial">Verify Preorder Serialization of a Binary Tree</text>

  <rect x="60" y="180" width="1080" height="120" rx="14" fill="#111827" stroke="#334155"/>
  <text x="84" y="235" fill="#a7f3d0" font-size="28" font-family="JetBrains Mono,Consolas,monospace">9,3,4,#,#,1,#,#,2,#,6,#,#</text>
  <text x="84" y="275" fill="#cbd5e1" font-size="22" font-family="Inter,Segoe UI,Arial">Rule: consume 1 slot per token, non-# adds 2 slots</text>

  <rect x="60" y="330" width="340" height="220" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="85" y="375" fill="#f8fafc" font-size="26" font-family="Inter,Segoe UI,Arial" font-weight="700">Invariant</text>
  <text x="85" y="415" fill="#cbd5e1" font-size="22" font-family="Inter,Segoe UI,Arial">1) slots never &lt; 0</text>
  <text x="85" y="455" fill="#cbd5e1" font-size="22" font-family="Inter,Segoe UI,Arial">2) finish with slots = 0</text>
  <text x="85" y="495" fill="#fde68a" font-size="20" font-family="Inter,Segoe UI,Arial">No tree reconstruction needed</text>

  <rect x="440" y="330" width="700" height="220" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="465" y="375" fill="#f8fafc" font-size="26" font-family="Inter,Segoe UI,Arial" font-weight="700">Example Slot Trace</text>
  <text x="465" y="415" fill="#cbd5e1" font-size="22" font-family="JetBrains Mono,Consolas,monospace">start: 1 → 9:2 → 3:3 → 4:4</text>
  <text x="465" y="455" fill="#cbd5e1" font-size="22" font-family="JetBrains Mono,Consolas,monospace">#:3 → #:2 → 1:3 → #:2 → #:1</text>
  <text x="465" y="495" fill="#86efac" font-size="22" font-family="JetBrains Mono,Consolas,monospace">2:2 → #:1 → 6:2 → #:1 → #:0 ✅</text>
</svg>
