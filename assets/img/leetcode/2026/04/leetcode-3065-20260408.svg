<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3065 threshold counting illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 3065</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Minimum Operations to Exceed Threshold Value I</text>

  <rect x="60" y="200" width="1080" height="120" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="250" fill="#cbd5e1" font-size="28" font-family="Courier New, monospace">nums = [2, 11, 4, 9, 6], k = 8</text>
  <text x="90" y="290" fill="#f8fafc" font-size="24" font-family="Courier New, monospace">Count numbers &lt; k  →  2, 4, 6  (3 elements)</text>

  <rect x="60" y="360" width="340" height="180" rx="14" fill="#7f1d1d" stroke="#ef4444"/>
  <text x="90" y="410" fill="#fecaca" font-size="26" font-family="Arial, sans-serif">&lt; k (remove)</text>
  <text x="90" y="465" fill="#fee2e2" font-size="42" font-family="Courier New, monospace">2, 4, 6</text>

  <rect x="430" y="360" width="340" height="180" rx="14" fill="#14532d" stroke="#22c55e"/>
  <text x="460" y="410" fill="#bbf7d0" font-size="26" font-family="Arial, sans-serif">≥ k (keep)</text>
  <text x="460" y="465" fill="#dcfce7" font-size="42" font-family="Courier New, monospace">11, 9</text>

  <rect x="800" y="360" width="340" height="180" rx="14" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="830" y="410" fill="#bfdbfe" font-size="26" font-family="Arial, sans-serif">Answer</text>
  <text x="830" y="470" fill="#dbeafe" font-size="58" font-family="Arial, sans-serif" font-weight="700">3 ops</text>
</svg>
