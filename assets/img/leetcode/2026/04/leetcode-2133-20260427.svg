<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2133 row and column validation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .num { font: 700 28px 'Consolas', monospace; fill: #f8fafc; }
      .ok { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #34d399; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 2133</text>
  <text x="60" y="132" class="sub">Check if Every Row and Column Contains All Numbers</text>

  <g transform="translate(80,190)">
    <text x="0" y="-22" class="label">Validate every row and every column with a seen array</text>
    <rect x="0" y="0" width="420" height="300" rx="16" fill="#0b1220" stroke="#334155"/>

    <g transform="translate(40,35)">
      <rect x="0" y="0" width="90" height="70" fill="#1d4ed8"/><rect x="90" y="0" width="90" height="70" fill="#0ea5e9"/><rect x="180" y="0" width="90" height="70" fill="#2563eb"/>
      <rect x="0" y="70" width="90" height="70" fill="#0ea5e9"/><rect x="90" y="70" width="90" height="70" fill="#1d4ed8"/><rect x="180" y="70" width="90" height="70" fill="#3b82f6"/>
      <rect x="0" y="140" width="90" height="70" fill="#2563eb"/><rect x="90" y="140" width="90" height="70" fill="#3b82f6"/><rect x="180" y="140" width="90" height="70" fill="#1d4ed8"/>

      <text x="35" y="45" class="num">1</text><text x="125" y="45" class="num">2</text><text x="215" y="45" class="num">3</text>
      <text x="35" y="115" class="num">2</text><text x="125" y="115" class="num">3</text><text x="215" y="115" class="num">1</text>
      <text x="35" y="185" class="num">3</text><text x="125" y="185" class="num">1</text><text x="215" y="185" class="num">2</text>
    </g>
  </g>

  <g transform="translate(590,210)">
    <rect x="0" y="0" width="520" height="250" rx="16" fill="#0b1220" stroke="#334155"/>
    <text x="30" y="55" class="label">Row i: seen[1..n] = false</text>
    <text x="30" y="95" class="label">for each value v in row i:</text>
    <text x="70" y="135" class="label">if v out of range or seen[v] => invalid</text>
    <text x="70" y="175" class="label">else seen[v] = true</text>
    <text x="30" y="220" class="ok">Repeat for each column, all pass => true</text>
  </g>
</svg>
