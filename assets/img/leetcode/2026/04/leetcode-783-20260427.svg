<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 783 BST inorder minimum difference diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Inter',Arial,sans-serif;fill:#e5e7eb}
      .text{font:500 26px 'Inter',Arial,sans-serif;fill:#cbd5e1}
      .node{fill:#1f2937;stroke:#60a5fa;stroke-width:3}
      .edge{stroke:#64748b;stroke-width:3}
      .num{font:700 28px 'Inter',Arial,sans-serif;fill:#93c5fd;text-anchor:middle;dominant-baseline:middle}
      .seq{font:700 30px 'JetBrains Mono',monospace;fill:#86efac}
      .accent{fill:#fbbf24;font-weight:700}
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="70" class="title">LeetCode 783: Minimum Distance Between BST Nodes</text>
  <text x="50" y="110" class="text">Inorder traversal gives sorted values, compare adjacent numbers only.</text>

  <line x1="300" y1="210" x2="200" y2="300" class="edge"/>
  <line x1="300" y1="210" x2="400" y2="300" class="edge"/>
  <line x1="200" y1="300" x2="150" y2="390" class="edge"/>
  <line x1="200" y1="300" x2="250" y2="390" class="edge"/>

  <circle cx="300" cy="210" r="36" class="node"/><text x="300" y="210" class="num">4</text>
  <circle cx="200" cy="300" r="36" class="node"/><text x="200" y="300" class="num">2</text>
  <circle cx="400" cy="300" r="36" class="node"/><text x="400" y="300" class="num">6</text>
  <circle cx="150" cy="390" r="36" class="node"/><text x="150" y="390" class="num">1</text>
  <circle cx="250" cy="390" r="36" class="node"/><text x="250" y="390" class="num">3</text>

  <rect x="520" y="180" width="620" height="280" rx="18" fill="#111827" stroke="#334155"/>
  <text x="560" y="240" class="text">Inorder sequence:</text>
  <text x="560" y="290" class="seq">[1, 2, 3, 4, 6]</text>
  <text x="560" y="350" class="text">Adjacent diffs: 1, 1, 1, 2</text>
  <text x="560" y="405" class="text">Minimum difference = <tspan class="accent">1</tspan></text>

  <text x="50" y="575" class="text">Author: Tom🦞  ·  Tree / Inorder Traversal</text>
</svg>
