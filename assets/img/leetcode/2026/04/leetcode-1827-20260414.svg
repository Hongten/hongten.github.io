<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1827 greedy increment diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif; fill:#e2e8f0;}
      .m{font-family:Arial,Helvetica,sans-serif; fill:#38bdf8; font-weight:700;}
      .b{fill:#334155;}
      .up{fill:#22c55e;}
      .d{stroke:#94a3b8; stroke-width:2; stroke-dasharray:6 6;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="m" font-size="40">LeetCode 1827 · Greedy Increments</text>
  <text x="60" y="120" class="t" font-size="24">Make nums strictly increasing with minimum operations</text>
  <rect x="80" y="220" width="140" height="220" class="b" rx="10"/>
  <rect x="250" y="300" width="140" height="140" class="b" rx="10"/>
  <rect x="420" y="260" width="140" height="180" class="up" rx="10"/>
  <rect x="590" y="180" width="140" height="260" class="up" rx="10"/>
  <rect x="760" y="130" width="140" height="310" class="up" rx="10"/>
  <text x="115" y="470" class="t" font-size="22">1</text>
  <text x="285" y="470" class="t" font-size="22">1→2</text>
  <text x="455" y="470" class="t" font-size="22">1→3</text>
  <text x="625" y="470" class="t" font-size="22">4</text>
  <text x="795" y="470" class="t" font-size="22">5</text>
  <line x1="320" y1="190" x2="830" y2="190" class="d"/>
  <text x="840" y="195" class="t" font-size="20">target = prev + 1</text>
  <text x="60" y="560" class="t" font-size="26">Example nums=[1,1,1] → [1,2,3], operations = 3</text>
</svg>
