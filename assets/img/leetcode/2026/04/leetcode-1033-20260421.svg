<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1033 Moving Stones Until Consecutive gap analysis diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1033: Moving Stones Until Consecutive</text>
  <text x="56" y="138" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Sort positions x &lt; y &lt; z, analyze left/right gaps</text>

  <line x1="120" y1="360" x2="1080" y2="360" stroke="#64748b" stroke-width="4"/>
  <circle cx="260" cy="360" r="22" fill="#22c55e"/>
  <circle cx="560" cy="360" r="22" fill="#f59e0b"/>
  <circle cx="900" cy="360" r="22" fill="#ef4444"/>

  <text x="240" y="410" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">x</text>
  <text x="542" y="410" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">y</text>
  <text x="882" y="410" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">z</text>

  <line x1="282" y1="320" x2="538" y2="320" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="582" y1="320" x2="878" y2="320" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <text x="320" y="305" fill="#bae6fd" font-size="24" font-family="Inter,Arial,sans-serif">left = y - x</text>
  <text x="650" y="305" fill="#bae6fd" font-size="24" font-family="Inter,Arial,sans-serif">right = z - y</text>

  <text x="56" y="500" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">maxMoves = z - x - 2</text>
  <text x="56" y="540" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">minMoves = 0 if z - x == 2, else 1 if left &lt;= 2 or right &lt;= 2, else 2</text>
  <text x="56" y="585" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
