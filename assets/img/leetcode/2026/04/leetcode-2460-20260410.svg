<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2460 merge then compact diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="78" fill="#e5e7eb" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2460 · Apply Operations to an Array</text>
  <text x="56" y="116" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Step 1: Merge equal neighbors</text>

  <rect x="56" y="148" width="1088" height="170" rx="14" fill="#1f2937" stroke="#334155"/>
  <text x="86" y="198" fill="#d1d5db" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Input:   [1, 2, 2, 1, 1, 0]</text>
  <text x="86" y="238" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Merge:   [1, 4, 0, 2, 0, 0]</text>
  <text x="86" y="278" fill="#fca5a5" font-size="20" font-family="Inter,Arial,sans-serif">(2,2) → 4,0   and   (1,1) → 2,0</text>

  <text x="56" y="378" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Step 2: Stable compact non-zero values</text>
  <rect x="56" y="404" width="1088" height="168" rx="14" fill="#1f2937" stroke="#334155"/>
  <text x="86" y="454" fill="#d1d5db" font-size="24" font-family="JetBrains Mono,Consolas,monospace">After merge: [1, 4, 0, 2, 0, 0]</text>
  <text x="86" y="494" fill="#fcd34d" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Non-zero:    [1, 4, 2]</text>
  <text x="86" y="534" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Result:      [1, 4, 2, 0, 0, 0]</text>
</svg>
