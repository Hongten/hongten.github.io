<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .row { fill: #151d36; stroke: #2a365f; stroke-width: 2; rx: 10; }
      .dev { fill: #8be9fd; }
      .beam { stroke: #ffb86c; stroke-width: 4; opacity: 0.9; }
      .txt { fill: #e6edf3; font: 24px 'Segoe UI', Arial, sans-serif; }
      .small { fill: #9fb0d1; font: 20px 'Segoe UI', Arial, sans-serif; }
      .accent { fill: #50fa7b; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <text class="txt" x="40" y="60">LeetCode 2125 - Number of Laser Beams in a Bank</text>
  <text class="small" x="40" y="95">Only multiply adjacent non-empty rows: beams += prevDevices * curDevices</text>

  <rect class="row" x="60" y="130" width="1080" height="70"/>
  <rect class="row" x="60" y="220" width="1080" height="70"/>
  <rect class="row" x="60" y="310" width="1080" height="70"/>
  <rect class="row" x="60" y="400" width="1080" height="70"/>

  <circle class="dev" cx="180" cy="165" r="10"/><circle class="dev" cx="320" cy="165" r="10"/><circle class="dev" cx="480" cy="165" r="10"/>
  <circle class="dev" cx="230" cy="345" r="10"/><circle class="dev" cx="560" cy="345" r="10"/>
  <circle class="dev" cx="170" cy="435" r="10"/><circle class="dev" cx="300" cy="435" r="10"/><circle class="dev" cx="430" cy="435" r="10"/><circle class="dev" cx="640" cy="435" r="10"/>

  <line class="beam" x1="180" y1="165" x2="230" y2="345"/>
  <line class="beam" x1="320" y1="165" x2="230" y2="345"/>
  <line class="beam" x1="480" y1="165" x2="230" y2="345"/>
  <line class="beam" x1="180" y1="165" x2="560" y2="345"/>
  <line class="beam" x1="320" y1="165" x2="560" y2="345"/>
  <line class="beam" x1="480" y1="165" x2="560" y2="345"/>

  <line class="beam" x1="230" y1="345" x2="170" y2="435"/>
  <line class="beam" x1="560" y1="345" x2="170" y2="435"/>
  <line class="beam" x1="230" y1="345" x2="300" y2="435"/>
  <line class="beam" x1="560" y1="345" x2="300" y2="435"/>
  <line class="beam" x1="230" y1="345" x2="430" y2="435"/>
  <line class="beam" x1="560" y1="345" x2="430" y2="435"/>
  <line class="beam" x1="230" y1="345" x2="640" y2="435"/>
  <line class="beam" x1="560" y1="345" x2="640" y2="435"/>

  <text class="small" x="930" y="170">row1 devices = 3</text>
  <text class="small" x="930" y="260">row2 devices = 0 (skip)</text>
  <text class="small" x="930" y="350">row3 devices = 2</text>
  <text class="small" x="930" y="440">row4 devices = 4</text>
  <text class="txt accent" x="40" y="505">Total beams = 3×2 + 2×4 = 14</text>
</svg>
