<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="110" fill="#e2e8f0" font-size="46" font-family="Arial">LeetCode 259 - 3Sum Smaller</text><text x="60" y="170" fill="#93c5fd" font-size="30" font-family="Arial">Sorted + Two Pointers Counting</text><rect x="70" y="230" width="1060" height="300" rx="18" fill="#111827" stroke="#334155"/><text x="100" y="290" fill="#f8fafc" font-size="28" font-family="Courier New">i fixed, l=i+1, r=n-1</text><text x="100" y="340" fill="#cbd5e1" font-size="26" font-family="Courier New">if nums[i]+nums[l]+nums[r] &lt; target:</text><text x="140" y="390" fill="#86efac" font-size="26" font-family="Courier New">count += (r - l), l++</text><text x="100" y="440" fill="#cbd5e1" font-size="26" font-family="Courier New">else r--</text></svg>