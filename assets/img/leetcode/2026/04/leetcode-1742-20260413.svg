<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="LeetCode 1742 digit sum bucket counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;fill:#e2e8f0}
      .s{font-size:20px;font-weight:700}
      .m{font-size:16px}
      .box{fill:#334155;stroke:#64748b;stroke-width:2;rx:12}
      .ball{fill:#38bdf8}
      .ball2{fill:#f59e0b}
      .num{font-size:14px;fill:#0b1020;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <text x="40" y="52" class="t s">LeetCode 1742 · Maximum Number of Balls in a Box</text>
  <text x="40" y="84" class="t m">Map each number to box[digitSum(number)], then track the max frequency.</text>

  <text x="70" y="140" class="t m">Example numbers: 19, 20, 21, 22, 23, 24</text>
  <text x="70" y="170" class="t m">Digit sums:      10,  2,  3,  4,  5,  6</text>

  <rect x="500" y="110" width="120" height="180" class="box"/>
  <rect x="650" y="110" width="120" height="180" class="box"/>
  <rect x="800" y="110" width="120" height="180" class="box"/>
  <rect x="950" y="110" width="120" height="180" class="box"/>

  <text x="535" y="140" class="t m">Box 2</text>
  <text x="685" y="140" class="t m">Box 3</text>
  <text x="835" y="140" class="t m">Box 4</text>
  <text x="985" y="140" class="t m">Box 10</text>

  <circle cx="560" cy="190" r="18" class="ball"/><text x="553" y="195" class="num">20</text>
  <circle cx="710" cy="190" r="18" class="ball"/><text x="703" y="195" class="num">21</text>
  <circle cx="860" cy="190" r="18" class="ball"/><text x="853" y="195" class="num">22</text>
  <circle cx="1010" cy="190" r="18" class="ball"/><text x="1001" y="195" class="num">19</text>

  <circle cx="560" cy="240" r="18" class="ball2"/><text x="553" y="245" class="num">29</text>
  <circle cx="560" cy="280" r="18" class="ball2"/><text x="553" y="285" class="num">38</text>

  <text x="500" y="335" class="t m">If Box 2 has the most balls, answer = count(Box 2).</text>
</svg>
