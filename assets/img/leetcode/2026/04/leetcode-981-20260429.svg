<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial">LeetCode 981 · Time Based Key-Value Store</text><rect x="60" y="130" width="1080" height="420" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="190" fill="#93c5fd" font-size="28" font-family="monospace">key = "foo"</text><text x="90" y="240" fill="#e5e7eb" font-size="24" font-family="monospace">set(foo, bar, 1)</text><text x="90" y="280" fill="#e5e7eb" font-size="24" font-family="monospace">set(foo, bar2, 4)</text><line x1="90" y1="330" x2="1080" y2="330" stroke="#475569" stroke-width="2"/><circle cx="220" cy="330" r="8" fill="#22c55e"/><circle cx="580" cy="330" r="8" fill="#22c55e"/><text x="205" y="365" fill="#cbd5e1" font-size="20">t=1</text><text x="565" y="365" fill="#cbd5e1" font-size="20">t=4</text><text x="90" y="430" fill="#fbbf24" font-size="24" font-family="monospace">get(foo, 3) -> bar (rightmost timestamp <= 3)</text><text x="90" y="470" fill="#fbbf24" font-size="24" font-family="monospace">get(foo, 5) -> bar2</text></svg>
