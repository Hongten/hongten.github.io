<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 657 displacement cancellation diagram">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#f59e0b" />
    </marker>
    <style>
      .bg { fill: #0b1020; }
      .card { fill: #111a33; stroke: #2a3a66; stroke-width: 2; }
      .axis { stroke: #7dd3fc; stroke-width: 2; opacity: 0.75; }
      .route { stroke: #f59e0b; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .txt { fill: #e5e7eb; font-family: Arial, sans-serif; }
      .muted { fill: #9ca3af; font-family: Arial, sans-serif; }
      .ok { fill: #34d399; font-family: Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="420" />
  <rect class="card" x="24" y="24" width="912" height="372" rx="16" />

  <text class="txt" x="54" y="72" font-size="30" font-weight="700">LeetCode 657 · Robot Return to Origin</text>
  <text class="muted" x="54" y="102" font-size="18">Net displacement must be (0, 0): U cancels D, L cancels R</text>

  <line class="axis" x1="180" y1="320" x2="500" y2="320" />
  <line class="axis" x1="340" y1="360" x2="340" y2="140" />

  <text class="muted" x="507" y="324" font-size="16">x</text>
  <text class="muted" x="344" y="134" font-size="16">y</text>
  <text class="txt" x="350" y="336" font-size="16">(0,0)</text>

  <polyline class="route" points="340,320 340,270 390,270 390,320 340,320" />

  <text class="txt" x="346" y="262" font-size="16">U</text>
  <text class="txt" x="398" y="276" font-size="16">R</text>
  <text class="txt" x="398" y="326" font-size="16">D</text>
  <text class="txt" x="346" y="336" font-size="16">L</text>

  <text class="ok" x="560" y="230" font-size="28">Final Position = Origin ✅</text>
  <text class="txt" x="560" y="270" font-size="20">x == 0 &amp;&amp; y == 0</text>
  <text class="muted" x="560" y="304" font-size="18">Single pass, O(n) time, O(1) space</text>
</svg>
