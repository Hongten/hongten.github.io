<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 706 Design HashMap diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 706 · Design HashMap</text>
  <text x="60" y="130" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Separate Chaining with Fixed Buckets</text>

  <rect x="70" y="190" width="240" height="300" rx="14" fill="#111827" stroke="#334155"/>
  <text x="95" y="225" fill="#93c5fd" font-size="22" font-family="Arial, sans-serif">key % 7</text>
  <text x="95" y="260" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">bucket 0</text>
  <text x="95" y="300" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">bucket 1</text>
  <text x="95" y="340" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">bucket 2</text>
  <text x="95" y="380" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">bucket 3</text>
  <text x="95" y="420" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">bucket 4</text>

  <rect x="410" y="220" width="300" height="90" rx="12" fill="#1d4ed8"/>
  <text x="435" y="255" fill="#dbeafe" font-size="22" font-family="Arial, sans-serif">bucket 3 list:</text>
  <text x="435" y="285" fill="#eff6ff" font-size="22" font-family="Arial, sans-serif">(10, 5) → (24, 9)</text>

  <rect x="410" y="340" width="300" height="90" rx="12" fill="#0f766e"/>
  <text x="435" y="375" fill="#ccfbf1" font-size="22" font-family="Arial, sans-serif">put(24, 11)</text>
  <text x="435" y="405" fill="#ecfeff" font-size="22" font-family="Arial, sans-serif">update existing pair</text>

  <rect x="780" y="220" width="340" height="220" rx="12" fill="#111827" stroke="#334155"/>
  <text x="805" y="255" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif">Operations</text>
  <text x="805" y="295" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">put: insert / update</text>
  <text x="805" y="330" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">get: find by key</text>
  <text x="805" y="365" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">remove: delete pair</text>
  <text x="805" y="405" fill="#86efac" font-size="20" font-family="Arial, sans-serif">Avg O(1) with good spread</text>
</svg>
