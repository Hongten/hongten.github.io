<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2283 digit count consistency diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2283: Digit Count Consistency</text>
  <text x="60" y="138" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Index i requires count(digit i) == num[i]</text>

  <rect x="60" y="180" width="520" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="230" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">num = "1210"</text>
  <text x="90" y="280" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Counts in string:</text>
  <text x="90" y="325" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">digit0:1  digit1:2  digit2:1  digit3:0</text>
  <text x="90" y="380" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Check indexes:</text>
  <text x="90" y="425" fill="#fbbf24" font-size="24" font-family="JetBrains Mono,Consolas,monospace">num[0]=1 ✓  num[1]=2 ✓</text>
  <text x="90" y="460" fill="#fbbf24" font-size="24" font-family="JetBrains Mono,Consolas,monospace">num[2]=1 ✓  num[3]=0 ✓</text>
  <text x="90" y="510" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">All matched → true</text>

  <rect x="620" y="180" width="520" height="360" rx="18" fill="#111827" stroke="#374151"/>
  <text x="650" y="230" fill="#fbbf24" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">One-pass verification</text>
  <text x="650" y="275" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">1) Build cnt[10] over num</text>
  <text x="650" y="315" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">2) For each index i:</text>
  <text x="680" y="350" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">expected = num[i]-'0'</text>
  <text x="680" y="385" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">if cnt[i] != expected → false</text>
  <text x="650" y="435" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">3) End with no mismatch → true</text>
  <text x="650" y="485" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1)</text>

  <text x="60" y="595" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual LeetCode solution</text>
</svg>
