<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 2441</text>
  <text x="60" y="142" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Largest Positive Integer That Exists With Its Negative</text>

  <rect x="80" y="210" width="1040" height="300" rx="18" fill="#111827" stroke="#334155"/>
  <text x="120" y="260" fill="#f8fafc" font-size="28" font-family="Consolas, monospace">nums = [-1, 2, -3, 3]</text>
  <text x="120" y="310" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">seen: {-1}  → read 2</text>
  <text x="120" y="355" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">seen: {-1, 2} → read -3</text>
  <text x="120" y="400" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">seen: {-1, 2, -3} → read 3, found -3</text>
  <text x="120" y="450" fill="#86efac" font-size="30" font-family="Consolas, monospace" font-weight="700">candidate = |3| = 3, answer = 3</text>

  <text x="60" y="585" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">One-pass mirror check with HashSet: if -x exists, update max(abs(x)).</text>
</svg>
