<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1720 decode xored array reconstruction flow">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1720 · Decode XORed Array</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Reconstruction rule: arr[i+1] = arr[i] XOR encoded[i]</text>

  <rect x="70" y="190" width="1060" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <rect x="110" y="240" width="200" height="90" rx="12" fill="#0b1220" stroke="#60a5fa"/>
  <text x="140" y="295" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">arr[i]</text>

  <text x="345" y="298" fill="#fbbf24" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">XOR</text>

  <rect x="430" y="240" width="240" height="90" rx="12" fill="#0b1220" stroke="#34d399"/>
  <text x="455" y="295" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">encoded[i]</text>

  <text x="705" y="298" fill="#e5e7eb" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="700">=</text>

  <rect x="760" y="240" width="300" height="90" rx="12" fill="#0b1220" stroke="#f472b6"/>
  <text x="795" y="295" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">arr[i+1]</text>

  <text x="110" y="390" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Start from known first = arr[0]</text>
  <text x="110" y="435" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Repeat the formula left to right to decode the whole array in O(n).</text>
  <text x="110" y="490" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
