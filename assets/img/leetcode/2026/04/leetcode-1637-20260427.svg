<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1637 widest vertical area diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1637</text>
  <text x="60" y="145" fill="#93c5fd" font-size="32" font-family="Inter,Arial,sans-serif">Widest Vertical Area = max adjacent gap of sorted x</text>

  <line x1="140" y1="220" x2="1060" y2="220" stroke="#374151" stroke-width="3"/>
  <circle cx="220" cy="220" r="8" fill="#86efac"/>
  <circle cx="350" cy="220" r="8" fill="#86efac"/>
  <circle cx="540" cy="220" r="8" fill="#86efac"/>
  <circle cx="860" cy="220" r="8" fill="#86efac"/>
  <circle cx="980" cy="220" r="8" fill="#86efac"/>

  <line x1="540" y1="180" x2="860" y2="180" stroke="#f59e0b" stroke-width="8"/>
  <text x="615" y="165" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">max gap</text>

  <rect x="60" y="290" width="1080" height="260" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="350" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">1) Extract x from points</text>
  <text x="90" y="395" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">2) Sort x values</text>
  <text x="90" y="440" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">3) Scan adjacent differences, take maximum</text>
  <text x="90" y="500" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
