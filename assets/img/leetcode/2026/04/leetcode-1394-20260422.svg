<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1394 frequency-equals-value diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1394: Find Lucky Integer in an Array</text>
  <text x="56" y="142" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Count frequency, then scan value from high to low.</text>

  <rect x="56" y="188" width="1088" height="370" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="88" y="240" fill="#e5e7eb" font-size="26" font-family="JetBrains Mono,Consolas,monospace">arr = [2,2,3,4]</text>

  <rect x="88" y="274" width="320" height="220" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="112" y="312" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Frequency Map</text>
  <text x="112" y="352" fill="#e5e7eb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">2 -&gt; 2</text>
  <text x="112" y="386" fill="#e5e7eb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">3 -&gt; 1</text>
  <text x="112" y="420" fill="#e5e7eb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">4 -&gt; 1</text>

  <rect x="450" y="274" width="660" height="220" rx="12" fill="#0f172a" stroke="#4b5563"/>
  <text x="474" y="312" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Reverse Check</text>
  <text x="474" y="352" fill="#e5e7eb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">x = 4, freq[4] = 1  (not lucky)</text>
  <text x="474" y="386" fill="#e5e7eb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">x = 3, freq[3] = 1  (not lucky)</text>
  <text x="474" y="420" fill="#86efac" font-size="22" font-family="JetBrains Mono,Consolas,monospace">x = 2, freq[2] = 2  (lucky, return 2)</text>

  <text x="56" y="602" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文 second · Java default tabs</text>
</svg>
