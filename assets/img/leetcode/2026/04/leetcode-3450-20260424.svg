<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3450 bench-wise unique student counting">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3450</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Maximum Students on a Single Bench</text>

  <rect x="70" y="210" width="320" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="440" y="210" width="320" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="810" y="210" width="320" height="300" rx="16" fill="#111827" stroke="#334155"/>

  <text x="190" y="250" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Bench 1</text>
  <text x="560" y="250" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Bench 2</text>
  <text x="930" y="250" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Bench 3</text>

  <text x="120" y="310" fill="#86efac" font-size="22" font-family="monospace">{1, 3, 5}</text>
  <text x="490" y="310" fill="#86efac" font-size="22" font-family="monospace">{2, 4}</text>
  <text x="860" y="310" fill="#86efac" font-size="22" font-family="monospace">{7, 8, 9, 10}</text>

  <text x="110" y="430" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">distinct count = 3</text>
  <text x="480" y="430" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">distinct count = 2</text>
  <text x="850" y="430" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">distinct count = 4</text>

  <text x="60" y="580" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = max distinct count across benches</text>
</svg>
