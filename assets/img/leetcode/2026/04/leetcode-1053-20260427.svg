<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1053 pivot and swap illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="50" y="72" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1053 - Previous Permutation With One Swap</text>
  <text x="50" y="112" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Find pivot, then swap with the best smaller value in suffix</text>

  <rect x="50" y="150" width="1100" height="420" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="220" fill="#9ca3af" font-size="24" font-family="monospace">Example: [1, 9, 4, 6, 7]</text>
  <text x="90" y="270" fill="#fbbf24" font-size="24" font-family="monospace">pivot i = 1 (9 &gt; 4)</text>
  <text x="90" y="320" fill="#86efac" font-size="24" font-family="monospace">best j = 4 (value 7, largest &lt; 9)</text>
  <text x="90" y="370" fill="#e5e7eb" font-size="24" font-family="monospace">swap arr[i], arr[j] =&gt; [1, 7, 4, 6, 9]</text>

  <line x1="540" y1="246" x2="540" y2="340" stroke="#fbbf24" stroke-width="3"/>
  <line x1="940" y1="296" x2="940" y2="380" stroke="#86efac" stroke-width="3"/>

  <text x="90" y="460" fill="#cbd5e1" font-size="21" font-family="Inter,Arial,sans-serif">Duplicate rule: if multiple equal candidates exist, choose the leftmost among them.</text>
  <text x="90" y="500" fill="#cbd5e1" font-size="21" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1)</text>
  <text x="90" y="545" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
