<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 3457 Eat Pizzas Greedy Diagram</title>
  <desc id="desc">Sorted pizza weights grouped by 4, with odd day taking max and even day taking second max.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#f8fafc" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 3457 · Eat Pizzas!</text>
  <text x="60" y="135" fill="#cbd5e1" font-size="28" font-family="Arial, sans-serif">Sort + Greedy Grouping (4 per day)</text>

  <g font-family="Arial, sans-serif" font-size="22" fill="#e2e8f0">
    <text x="60" y="205">Sorted weights → [1, 2, 3, 4, 5, 6, 7, 8]</text>
    <text x="60" y="240">Day 1 (odd): [1, 4, 7, 8] gain = 8 (max)</text>
    <text x="60" y="275">Day 2 (even): [2, 3, 5, 6] gain = 5 (2nd max)</text>
    <text x="60" y="320">Total gain = 8 + 5</text>
  </g>

  <g transform="translate(60,370)">
    <rect x="0" y="0" width="1040" height="190" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="24" y="40" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Greedy rule after sorting:</text>
    <text x="24" y="80" fill="#e2e8f0" font-size="22" font-family="Arial, sans-serif">1) Take largest oddCount numbers for odd days.</text>
    <text x="24" y="115" fill="#e2e8f0" font-size="22" font-family="Arial, sans-serif">2) From remaining suffix, pick every 2nd from right for even days.</text>
    <text x="24" y="150" fill="#fca5a5" font-size="22" font-family="Arial, sans-serif">Reason: even-day gain needs one larger companion in same group.</text>
  </g>
</svg>
