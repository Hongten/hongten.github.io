<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1603 parking counters diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1603: Design Parking System</text>
  <text x="56" y="138" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">O(1) check + decrement for each car type</text>

  <rect x="56" y="190" width="340" height="320" rx="18" fill="#1f2937" stroke="#475569"/>
  <text x="86" y="240" fill="#f8fafc" font-size="30" font-family="Inter,Arial,sans-serif">Big (type 1)</text>
  <text x="86" y="300" fill="#86efac" font-size="64" font-family="JetBrains Mono,monospace">remain[1]=1</text>
  <text x="86" y="360" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">addCar(1) → true</text>

  <rect x="430" y="190" width="340" height="320" rx="18" fill="#1f2937" stroke="#475569"/>
  <text x="460" y="240" fill="#f8fafc" font-size="30" font-family="Inter,Arial,sans-serif">Medium (type 2)</text>
  <text x="460" y="300" fill="#fde68a" font-size="64" font-family="JetBrains Mono,monospace">remain[2]=0</text>
  <text x="460" y="360" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">addCar(2) → false</text>

  <rect x="804" y="190" width="340" height="320" rx="18" fill="#1f2937" stroke="#475569"/>
  <text x="834" y="240" fill="#f8fafc" font-size="30" font-family="Inter,Arial,sans-serif">Small (type 3)</text>
  <text x="834" y="300" fill="#fca5a5" font-size="64" font-family="JetBrains Mono,monospace">remain[3]=2</text>
  <text x="834" y="360" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">addCar(3) → true</text>

  <text x="56" y="580" fill="#a7f3d0" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
