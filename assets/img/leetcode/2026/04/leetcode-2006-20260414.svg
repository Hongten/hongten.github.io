<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2006 frequency counting pair matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="82" fill="#e5e7eb" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2006 · Count Number of Pairs With Absolute Difference K</text>
  <text x="48" y="120" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">One-pass frequency counting: for current x, add freq[x-k] + freq[x+k]</text>

  <rect x="56" y="170" width="520" height="360" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="84" y="212" fill="#f8fafc" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Seen Frequency Map</text>
  <text x="84" y="260" fill="#86efac" font-size="24" font-family="monospace">value: 1  2  3  4  5</text>
  <text x="84" y="300" fill="#fde68a" font-size="24" font-family="monospace">count: 2  1  3  1  2</text>

  <rect x="650" y="170" width="494" height="360" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="678" y="212" fill="#f8fafc" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Current Number</text>
  <text x="678" y="272" fill="#e5e7eb" font-size="30" font-family="monospace">x = 4, k = 2</text>
  <text x="678" y="332" fill="#93c5fd" font-size="28" font-family="monospace">match low: x-k = 2 → freq[2] = 1</text>
  <text x="678" y="382" fill="#93c5fd" font-size="28" font-family="monospace">match high: x+k = 6 → freq[6] = 0</text>
  <text x="678" y="450" fill="#86efac" font-size="34" font-family="monospace" font-weight="700">pairs += 1 + 0</text>

  <line x1="576" y1="350" x2="650" y2="350" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <text x="48" y="592" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 · Java/Go/C++/Python/JavaScript tabs</text>
</svg>
