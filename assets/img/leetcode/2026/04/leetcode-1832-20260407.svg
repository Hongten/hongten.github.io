<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1832 pangram bitmask diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1832 · Pangram</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Track 26 lowercase letters with Set / 26-bit mask</text>

  <rect x="60" y="190" width="1080" height="360" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="95" y="245" fill="#86efac" font-size="26" font-family="monospace">sentence: "thequickbrownfoxjumpsoverthelazydog"</text>
  <text x="95" y="295" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">mask bits (z ... a):</text>
  <rect x="95" y="315" width="1010" height="62" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="120" y="356" fill="#f9fafb" font-size="30" font-family="monospace">11111111111111111111111111</text>

  <text x="95" y="420" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">full = (1 &lt;&lt; 26) - 1</text>
  <text x="95" y="460" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">if mask == full ⇒ all letters covered ⇒ true</text>
  <text x="95" y="510" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
