<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2778 sum of squares of special elements diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2778</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Sum of Squares of Special Elements</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="245" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">n = 6, nums = [1, 2, 3, 4, 5, 6]</text>
  <text x="95" y="295" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Special indices (1-based): i where n % i == 0  →  1, 2, 3, 6</text>

  <text x="95" y="360" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Pick nums[0], nums[1], nums[2], nums[5]  →  1, 2, 3, 6</text>
  <text x="95" y="418" fill="#fde68a" font-size="30" font-family="Inter,Arial,sans-serif">Answer = 1² + 2² + 3² + 6² = 50</text>

  <text x="95" y="492" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Single pass over i = 1..n, accumulate nums[i-1]² when divisible.</text>
  <text x="95" y="535" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
