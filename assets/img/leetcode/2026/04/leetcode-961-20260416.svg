<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 961 hash set duplicate detection diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 961 · N-Repeated Element in Size 2N Array</text>

  <rect x="60" y="140" width="1080" height="430" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="195" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Scan + HashSet: first duplicate encountered is the answer</text>

  <rect x="95" y="230" width="700" height="95" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="125" y="290" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">nums = [5, 1, 5, 2, 3, 4]</text>

  <rect x="95" y="350" width="480" height="80" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="120" y="400" fill="#86efac" font-size="28" font-family="JetBrains Mono,Consolas,monospace">seen: {} → {5} → {5,1}</text>

  <rect x="600" y="350" width="420" height="80" rx="10" fill="#0b1220" stroke="#4b5563"/>
  <text x="625" y="400" fill="#fca5a5" font-size="28" font-family="JetBrains Mono,Consolas,monospace">next 5 already seen ⇒ return 5</text>

  <text x="95" y="500" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first bilingual post with full code tabs</text>
</svg>
