<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 245 shortest word distance diagram">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 245: Shortest Word Distance III</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">One pass + same-word handling</text>
  <line x1="80" y1="280" x2="1120" y2="280" stroke="#475569" stroke-width="4"/>
  <circle cx="260" cy="280" r="18" fill="#22c55e"/><text x="240" y="330" fill="#86efac" font-size="24">word1</text>
  <circle cx="520" cy="280" r="18" fill="#f59e0b"/><text x="500" y="330" fill="#fde68a" font-size="24">word2</text>
  <circle cx="760" cy="280" r="18" fill="#22c55e"/><text x="724" y="330" fill="#86efac" font-size="24">word1 again</text>
  <line x1="520" y1="240" x2="760" y2="240" stroke="#f8fafc" stroke-width="3" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f8fafc"/></marker></defs>
  <text x="540" y="215" fill="#f8fafc" font-size="24">min distance update</text>
</svg>
