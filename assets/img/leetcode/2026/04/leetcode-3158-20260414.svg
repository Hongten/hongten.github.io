<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3158 frequency count and xor fold diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3158 · XOR of Numbers Appearing Twice</text>

  <rect x="56" y="130" width="1088" height="70" rx="10" fill="#1f2937" stroke="#374151"/>
  <text x="84" y="175" fill="#93c5fd" font-size="30" font-family="JetBrains Mono,Consolas,monospace">nums = [1,2,1,3,2,5]  →  freq: 1→2, 2→2, 3→1, 5→1</text>

  <rect x="56" y="235" width="330" height="300" rx="14" fill="#111827" stroke="#4b5563"/>
  <text x="86" y="280" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">Count frequency</text>
  <text x="86" y="330" fill="#a7f3d0" font-size="26" font-family="JetBrains Mono,Consolas,monospace">1 : 2 ✓</text>
  <text x="86" y="372" fill="#a7f3d0" font-size="26" font-family="JetBrains Mono,Consolas,monospace">2 : 2 ✓</text>
  <text x="86" y="414" fill="#fca5a5" font-size="26" font-family="JetBrains Mono,Consolas,monospace">3 : 1 ✗</text>
  <text x="86" y="456" fill="#fca5a5" font-size="26" font-family="JetBrains Mono,Consolas,monospace">5 : 1 ✗</text>

  <rect x="435" y="235" width="330" height="300" rx="14" fill="#111827" stroke="#4b5563"/>
  <text x="470" y="280" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">Pick count == 2</text>
  <text x="470" y="360" fill="#fde68a" font-size="34" font-family="JetBrains Mono,Consolas,monospace">[1, 2]</text>

  <rect x="814" y="235" width="330" height="300" rx="14" fill="#111827" stroke="#4b5563"/>
  <text x="848" y="280" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">XOR fold</text>
  <text x="848" y="360" fill="#86efac" font-size="34" font-family="JetBrains Mono,Consolas,monospace">ans = 1 ^ 2 = 3</text>
  <text x="848" y="412" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">If none appears twice → ans = 0</text>

  <text x="56" y="595" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · Frequency Counting + Bitwise XOR</text>
</svg>
