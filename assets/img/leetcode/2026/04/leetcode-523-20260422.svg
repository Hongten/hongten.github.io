<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 523 prefix sum remainder diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="58" y="88" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 523 - Continuous Subarray Sum</text>
  <text x="58" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Prefix Sum Modulo + Earliest Index</text>

  <rect x="58" y="180" width="1080" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="88" y="230" fill="#cbd5e1" font-size="24" font-family="monospace">nums = [23, 2, 4, 6, 7], k = 6</text>
  <text x="88" y="280" fill="#fca5a5" font-size="24" font-family="monospace">prefix(0)=23, r=5</text>
  <text x="88" y="320" fill="#fca5a5" font-size="24" font-family="monospace">prefix(1)=25, r=1</text>
  <text x="88" y="360" fill="#86efac" font-size="24" font-family="monospace">prefix(2)=29, r=5  (same remainder as index 0)</text>
  <text x="88" y="400" fill="#86efac" font-size="24" font-family="monospace">subarray (1..2) sum = 6, divisible by 6</text>
  <text x="88" y="450" fill="#fde68a" font-size="24" font-family="monospace">Rule: if rem[i] == rem[j], then sum(j+1..i) % k == 0</text>

  <rect x="740" y="250" width="360" height="210" rx="14" fill="#0b1220" stroke="#475569"/>
  <text x="770" y="296" fill="#e2e8f0" font-size="24" font-family="monospace">map: remainder -&gt; first idx</text>
  <text x="770" y="338" fill="#a7f3d0" font-size="24" font-family="monospace">0 -&gt; -1</text>
  <text x="770" y="378" fill="#a7f3d0" font-size="24" font-family="monospace">5 -&gt; 0</text>
  <text x="770" y="418" fill="#a7f3d0" font-size="24" font-family="monospace">1 -&gt; 1</text>

  <text x="58" y="584" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
