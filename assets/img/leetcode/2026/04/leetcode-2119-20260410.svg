<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2119 double reversal trailing zero invariant diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 28px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:3;rx:18}
      .txt{font:700 44px 'JetBrains Mono',Consolas,monospace;fill:#f8fafc}
      .note{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .ok{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#86efac}
      .bad{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#fca5a5}
      .arrow{stroke:#f8fafc;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f8fafc"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" class="title">LeetCode 2119 · A Number After a Double Reversal</text>
  <text x="60" y="125" class="sub">Key idea: positive numbers ending with 0 lose information after first reverse</text>

  <rect x="70" y="190" width="300" height="120" class="box"/>
  <text x="130" y="265" class="txt">1200</text>

  <line x1="380" y1="250" x2="560" y2="250" class="arrow"/>
  <text x="425" y="220" class="note">reverse</text>

  <rect x="570" y="190" width="250" height="120" class="box"/>
  <text x="635" y="265" class="txt">21</text>

  <line x1="830" y1="250" x2="1010" y2="250" class="arrow"/>
  <text x="875" y="220" class="note">reverse</text>

  <rect x="1020" y="190" width="120" height="120" class="box"/>
  <text x="1055" y="265" class="txt">12</text>

  <text x="70" y="380" class="bad">1200 → 21 → 12   (not equal)</text>

  <rect x="70" y="430" width="300" height="120" class="box"/>
  <text x="165" y="505" class="txt">526</text>

  <line x1="380" y1="490" x2="560" y2="490" class="arrow"/>
  <rect x="570" y="430" width="250" height="120" class="box"/>
  <text x="650" y="505" class="txt">625</text>

  <line x1="830" y1="490" x2="1010" y2="490" class="arrow"/>
  <rect x="1020" y="430" width="120" height="120" class="box"/>
  <text x="1050" y="505" class="txt">526</text>

  <text x="70" y="595" class="ok">num == 0 OR num % 10 != 0  ⇒  true</text>
</svg>
