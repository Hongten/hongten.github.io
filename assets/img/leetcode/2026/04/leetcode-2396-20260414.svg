<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2396 strictly palindromic number contradiction diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e2e8f0" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2396 · Strictly Palindromic Number</text>
  <rect x="60" y="145" width="1080" height="420" rx="18" fill="#111827" stroke="#334155"/>

  <text x="95" y="210" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Key Base Choice: b = n - 2</text>
  <text x="95" y="268" fill="#e5e7eb" font-size="31" font-family="Inter,Arial,sans-serif">n = 1 × (n - 2) + 2</text>
  <text x="95" y="322" fill="#e5e7eb" font-size="31" font-family="Inter,Arial,sans-serif">Representation in base (n - 2): "12"</text>
  <text x="95" y="376" fill="#fca5a5" font-size="31" font-family="Inter,Arial,sans-serif">"12" is NOT a palindrome</text>

  <line x1="90" y1="410" x2="1110" y2="410" stroke="#334155" stroke-width="2"/>
  <text x="95" y="470" fill="#86efac" font-size="33" font-family="Inter,Arial,sans-serif" font-weight="700">Conclusion: No n ≥ 4 is strictly palindromic</text>
  <text x="95" y="520" fill="#cbd5e1" font-size="29" font-family="Inter,Arial,sans-serif">So for this problem: always return false</text>
</svg>
