<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="N-ary tree maximum depth diagram">
  <defs>
    <style>
      .bg{fill:#0b1020}
      .title{fill:#e6edf3;font:700 28px 'Segoe UI',Arial,sans-serif}
      .sub{fill:#9fb3c8;font:400 16px 'Segoe UI',Arial,sans-serif}
      .node{fill:#1f6feb;stroke:#8ab4f8;stroke-width:2}
      .leaf{fill:#2ea043;stroke:#7ee787;stroke-width:2}
      .txt{fill:#ffffff;font:600 16px 'Segoe UI',Arial,sans-serif;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#8b949e;stroke-width:2.5}
      .badge{fill:#d29922}
      .badge-t{fill:#111827;font:700 14px 'Segoe UI',Arial,sans-serif}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="420" rx="16"/>
  <text class="title" x="36" y="48">LeetCode 559 · Maximum Depth of N-ary Tree</text>
  <text class="sub" x="36" y="76">Depth = number of nodes on the longest root-to-leaf path</text>

  <line class="edge" x1="480" y1="120" x2="290" y2="190"/>
  <line class="edge" x1="480" y1="120" x2="480" y2="190"/>
  <line class="edge" x1="480" y1="120" x2="670" y2="190"/>
  <line class="edge" x1="290" y1="190" x2="220" y2="270"/>
  <line class="edge" x1="290" y1="190" x2="360" y2="270"/>
  <line class="edge" x1="670" y1="190" x2="630" y2="270"/>
  <line class="edge" x1="670" y1="190" x2="740" y2="270"/>
  <line class="edge" x1="740" y1="270" x2="800" y2="340"/>

  <circle class="node" cx="480" cy="120" r="28"/><text class="txt" x="480" y="120">1</text>
  <circle class="node" cx="290" cy="190" r="24"/><text class="txt" x="290" y="190">2</text>
  <circle class="node" cx="480" cy="190" r="24"/><text class="txt" x="480" y="190">3</text>
  <circle class="node" cx="670" cy="190" r="24"/><text class="txt" x="670" y="190">4</text>

  <circle class="leaf" cx="220" cy="270" r="22"/><text class="txt" x="220" y="270">5</text>
  <circle class="leaf" cx="360" cy="270" r="22"/><text class="txt" x="360" y="270">6</text>
  <circle class="leaf" cx="630" cy="270" r="22"/><text class="txt" x="630" y="270">7</text>
  <circle class="node" cx="740" cy="270" r="22"/><text class="txt" x="740" y="270">8</text>
  <circle class="leaf" cx="800" cy="340" r="20"/><text class="txt" x="800" y="340">9</text>

  <rect class="badge" x="690" y="94" width="220" height="42" rx="10"/>
  <text class="badge-t" x="800" y="120" text-anchor="middle">Longest path depth = 4</text>
</svg>
