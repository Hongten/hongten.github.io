<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t {{ font-family: "Inter", "Segoe UI", Arial, sans-serif; fill: #e2e8f0; }}
      .m {{ fill: #38bdf8; }}
      .b {{ fill: #22c55e; }}
      .s {{ fill: #94a3b8; font-size: 26px; }}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="72" y="120" class="t" font-size="52" font-weight="700">LeetCode 1282</text>
  <text x="72" y="174" class="t" font-size="34">Group the People Given the Group Size They Belong To</text>
  <text x="72" y="232" class="t s">Bucket fill by required group size</text>

  <g transform="translate(72,290)">
    <rect x="0" y="0" width="1050" height="250" rx="18" fill="#111827" stroke="#334155"/>
    <text x="28" y="48" class="t s">groupSizes = [3,3,3,3,3,1,3]</text>

    <rect x="28" y="76" width="996" height="58" rx="10" fill="#1f2937"/>
    <text x="44" y="112" class="t" font-size="28">size=3 bucket:</text>
    <circle cx="260" cy="104" r="20" fill="#2563eb"/><text x="252" y="112" class="t" font-size="20">0</text>
    <circle cx="320" cy="104" r="20" fill="#2563eb"/><text x="312" y="112" class="t" font-size="20">1</text>
    <circle cx="380" cy="104" r="20" fill="#2563eb"/><text x="372" y="112" class="t" font-size="20">2</text>
    <text x="430" y="112" class="m" font-size="24">=> flush [0,1,2]</text>

    <rect x="28" y="150" width="996" height="58" rx="10" fill="#1f2937"/>
    <text x="44" y="186" class="t" font-size="28">size=1 bucket:</text>
    <circle cx="260" cy="178" r="20" fill="#16a34a"/><text x="252" y="186" class="t" font-size="20">5</text>
    <text x="302" y="186" class="b" font-size="24">=> flush [5]</text>

    <text x="28" y="236" class="t s">Continue similarly -> answer like [[0,1,2],[3,4,6],[5]]</text>
  </g>
</svg>
