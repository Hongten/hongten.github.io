<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 932 beautiful array parity construction diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 932: Beautiful Array</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Construct by odd projection then even projection</text>

  <rect x="60" y="200" width="260" height="120" rx="12" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="248" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">base: [1]</text>

  <rect x="390" y="200" width="340" height="120" rx="12" fill="#111827" stroke="#374151"/>
  <text x="420" y="244" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">odd: 2x-1 -> [1,3,5,...]</text>
  <text x="420" y="282" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif">even: 2x   -> [2,4,6,...]</text>

  <rect x="800" y="200" width="340" height="120" rx="12" fill="#1f2937" stroke="#374151"/>
  <text x="830" y="252" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">next = odd + even</text>

  <path d="M320 260 L390 260" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M730 260 L800 260" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="60" y="400" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Repeat until length = n. This preserves the no-average-in-between property.</text>
  <text x="60" y="458" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
