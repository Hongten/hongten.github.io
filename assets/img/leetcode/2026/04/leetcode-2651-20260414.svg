  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2651 · Calculate Delayed Arrival Time</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Core formula: (arrivalTime + delayedTime) % 24</text>

  <circle cx="390" cy="355" r="170" fill="none" stroke="#60a5fa" stroke-width="8"/>
