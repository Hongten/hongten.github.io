  <path d="M390 215 A170 170 0 0 1 528 448" fill="none" stroke="#f59e0b" stroke-width="8" stroke-dasharray="10 8"/>
  <polygon points="534,455 516,448 530,437" fill="#f59e0b"/>
  <text x="510" y="390" fill="#f59e0b" font-size="24" font-family="Inter,Arial,sans-serif">+ delayed</text>

