<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 1523 odd count in interval diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>
  <text x="40" y="58" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">LeetCode 1523 · Count Odd Numbers in an Interval Range</text>
  <text x="40" y="95" fill="#93c5fd" font-size="22" font-family="Arial, sans-serif">Odd count in [low, high] = (high + 1) / 2 - low / 2</text>

  <line x1="100" y1="240" x2="860" y2="240" stroke="#94a3b8" stroke-width="4"/>
  <circle cx="220" cy="240" r="12" fill="#22c55e"/>
  <circle cx="300" cy="240" r="12" fill="#f59e0b"/>
  <circle cx="380" cy="240" r="12" fill="#22c55e"/>
  <circle cx="460" cy="240" r="12" fill="#f59e0b"/>
  <circle cx="540" cy="240" r="12" fill="#22c55e"/>
  <circle cx="620" cy="240" r="12" fill="#f59e0b"/>
  <circle cx="700" cy="240" r="12" fill="#22c55e"/>

  <text x="210" y="275" fill="#86efac" font-size="18" font-family="Arial, sans-serif">odd</text>
  <text x="285" y="275" fill="#fcd34d" font-size="18" font-family="Arial, sans-serif">even</text>
  <text x="370" y="275" fill="#86efac" font-size="18" font-family="Arial, sans-serif">odd</text>

  <rect x="120" y="312" width="720" height="64" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="145" y="352" fill="#e5e7eb" font-size="24" font-family="Consolas, monospace">countOdds(low, high) = odds(0..high) - odds(0..low-1)</text>
</svg>
