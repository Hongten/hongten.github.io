<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeetCode 572 subtree serialization and KMP matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .code{font:500 20px 'Consolas','Courier New',monospace;fill:#f8fafc}
      .node{fill:#334155;stroke:#93c5fd;stroke-width:2}
      .line{stroke:#64748b;stroke-width:3}
      .ok{fill:#22c55e;font:700 30px 'Segoe UI',Arial,sans-serif}
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="78" class="title">LeetCode 572 · Subtree of Another Tree</text>
  <text x="60" y="114" class="sub">Preorder Serialization + KMP substring match</text>

  <text x="60" y="170" class="label">root tree</text>
  <line x1="140" y1="225" x2="90" y2="280" class="line"/>
  <line x1="140" y1="225" x2="190" y2="280" class="line"/>
  <line x1="90" y1="310" x2="55" y2="360" class="line"/>
  <line x1="90" y1="310" x2="125" y2="360" class="line"/>
  <circle cx="140" cy="210" r="22" class="node"/><text x="132" y="217" class="code">3</text>
  <circle cx="90" cy="295" r="22" class="node"/><text x="82" y="302" class="code">4</text>
  <circle cx="190" cy="295" r="22" class="node"/><text x="182" y="302" class="code">5</text>
  <circle cx="55" cy="375" r="22" class="node"/><text x="47" y="382" class="code">1</text>
  <circle cx="125" cy="375" r="22" class="node"/><text x="117" y="382" class="code">2</text>

  <text x="360" y="170" class="label">subRoot tree</text>
  <line x1="450" y1="225" x2="400" y2="280" class="line"/>
  <line x1="450" y1="225" x2="500" y2="280" class="line"/>
  <circle cx="450" cy="210" r="22" class="node"/><text x="442" y="217" class="code">4</text>
  <circle cx="400" cy="295" r="22" class="node"/><text x="392" y="302" class="code">1</text>
  <circle cx="500" cy="295" r="22" class="node"/><text x="492" y="302" class="code">2</text>

  <text x="60" y="470" class="label">serialize(root):</text>
  <text x="260" y="470" class="code">^3,^4,^1,#,#,^2,#,#,^5,#,#,</text>
  <text x="60" y="515" class="label">serialize(subRoot):</text>
  <text x="300" y="515" class="code">^4,^1,#,#,^2,#,#,</text>

  <rect x="700" y="180" width="430" height="240" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="730" y="235" class="label">KMP search window</text>
  <text x="730" y="285" class="code">... ^3, [^4,^1,#,#,^2,#,#,] ^5 ...</text>
  <text x="730" y="345" class="ok">MATCH ✓ subtree exists</text>
</svg>
