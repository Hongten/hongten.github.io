<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1323 illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="110" fill="#93c5fd" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 1323 · Maximum 69 Number</text>
  <text x="70" y="170" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif">Greedy: Flip the first 6 to 9</text>
  <rect x="70" y="250" width="460" height="260" rx="24" fill="#111827" stroke="#60a5fa" stroke-width="3"/>
  <text x="110" y="320" fill="#94a3b8" font-size="36" font-family="monospace">Input:  9669</text>
  <text x="110" y="390" fill="#f59e0b" font-size="36" font-family="monospace">Flip:   ^ first 6</text>
  <text x="110" y="460" fill="#22c55e" font-size="48" font-family="monospace" font-weight="700">Output: 9969</text>
  <text x="640" y="305" fill="#cbd5e1" font-size="34" font-family="Arial, sans-serif">Most significant digit matters most.</text>
  <text x="640" y="360" fill="#cbd5e1" font-size="34" font-family="Arial, sans-serif">Changing the leftmost 6 gives max gain.</text>
</svg>
