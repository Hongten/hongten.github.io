<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif; fill:#e5e7eb}
      .muted{fill:#93c5fd}
      .box{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:14}
      .star{fill:#f59e0b;font-weight:700}
      .good{fill:#34d399}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t" font-size="40" font-weight="700">LeetCode 3170 - Clear Stars Greedy</text>
  <text x="60" y="130" class="t muted" font-size="26">Use 26 stacks, each * removes smallest left letter (rightmost on tie)</text>

  <rect x="60" y="180" width="1080" height="180" class="box"/>
  <text x="90" y="235" class="t" font-size="30">s = "d a b * c * b *"</text>
  <text x="90" y="285" class="t" font-size="28">At first *: remove 'a' (smallest on left)</text>
  <text x="90" y="325" class="t" font-size="28">At second *: remove 'b'</text>

  <rect x="60" y="390" width="1080" height="170" class="box"/>
  <text x="90" y="450" class="t" font-size="28">Buckets:</text>
  <text x="220" y="450" class="t" font-size="28">a:[ ]  b:[2,6]  c:[4]  d:[0]</text>
  <text x="90" y="500" class="t good" font-size="30">Final answer = "dc"</text>
  <text x="930" y="235" class="star" font-size="52">*</text>
  <text x="1030" y="285" class="star" font-size="52">*</text>
</svg>
