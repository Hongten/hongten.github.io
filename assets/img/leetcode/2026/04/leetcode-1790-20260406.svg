<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1790 mismatch pair validation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{fill:#e2e8f0;font-family:Arial,Helvetica,sans-serif}
      .m{fill:#38bdf8}
      .x{fill:#f472b6}
      .ok{fill:#34d399}
      .box{fill:#111827;stroke:#334155;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" class="t" font-size="44" font-weight="700">LeetCode 1790 · One Swap String Equality</text>
  <text x="60" y="126" class="t" font-size="24">Collect mismatches → must be 0 or exactly 2 cross-match positions</text>

  <rect x="70" y="180" width="1060" height="360" rx="20" class="box"/>

  <text x="120" y="250" class="t" font-size="30">s1 = bank</text>
  <text x="120" y="320" class="t" font-size="30">s2 = kanb</text>

  <text x="420" y="250" class="t m" font-size="28">Mismatch i=0: b vs k</text>
  <text x="420" y="320" class="t x" font-size="28">Mismatch j=3: k vs b</text>

  <text x="120" y="410" class="t" font-size="28">Check:</text>
  <text x="230" y="410" class="t ok" font-size="28">s1[i] == s2[j] and s1[j] == s2[i]</text>

  <text x="120" y="470" class="t" font-size="26">If mismatches count is 1 or >2 → impossible with one swap.</text>
  <text x="120" y="515" class="t" font-size="26">If mismatches count is 0 → already equal.</text>
</svg>
