<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0b1020"/><text x="60" y="110" fill="#7dd3fc" font-size="44" font-family="Arial">LeetCode 3912</text><text x="60" y="170" fill="#e2e8f0" font-size="34" font-family="Arial">Find Subarrays With Equal Bitwise AND</text><rect x="60" y="230" width="1080" height="320" rx="16" fill="#111827" stroke="#334155"/><text x="90" y="285" fill="#93c5fd" font-size="26" font-family="monospace">prev states: {value -&gt; count}</text><text x="90" y="330" fill="#cbd5e1" font-size="24" font-family="monospace">for x in nums:</text><text x="90" y="370" fill="#cbd5e1" font-size="24" font-family="monospace">  cur[x] += 1</text><text x="90" y="410" fill="#cbd5e1" font-size="24" font-family="monospace">  cur[v &amp; x] += prev[v]</text><text x="90" y="450" fill="#cbd5e1" font-size="24" font-family="monospace">  ans += cur[k]</text><text x="60" y="595" fill="#94a3b8" font-size="22" font-family="Arial">Author: Tom🦞</text></svg>