<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2558 max heap process diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2558: Take Gifts From the Richest Pile</text>
  <text x="60" y="145" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Max Heap Greedy: pop max, push floor(sqrt(x))</text>

  <rect x="70" y="190" width="1060" height="360" rx="20" fill="#1f2937" stroke="#374151"/>

  <rect x="120" y="255" width="180" height="80" rx="12" fill="#334155"/>
  <text x="155" y="305" fill="#f8fafc" font-size="34" font-family="JetBrains Mono,monospace">64</text>
  <text x="118" y="238" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">current max</text>

  <path d="M330 295 L500 295" stroke="#22d3ee" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="360" y="275" fill="#22d3ee" font-size="24" font-family="Inter,Arial,sans-serif">sqrt + floor</text>

  <rect x="530" y="255" width="180" height="80" rx="12" fill="#065f46"/>
  <text x="595" y="305" fill="#ecfeff" font-size="34" font-family="JetBrains Mono,monospace">8</text>
  <text x="530" y="238" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">push back</text>

  <text x="120" y="410" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Repeat k rounds, always operate on the current richest pile.</text>
  <text x="120" y="460" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Final answer = sum(all piles in heap)</text>
  <text x="120" y="510" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/>
    </marker>
  </defs>
</svg>
