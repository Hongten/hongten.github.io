<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 868 binary gap illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:500 25px 'Segoe UI',Arial,sans-serif;fill:#bcd0ff}
      .bit{font:700 52px 'JetBrains Mono',Consolas,monospace;fill:#f8fbff}
      .label{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#7dd3fc}
      .note{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="95" class="title">LeetCode 868 · Binary Gap</text>
  <text x="70" y="135" class="sub">Track distance between adjacent 1 bits</text>

  <g transform="translate(80,220)">
    <rect x="0" y="0" width="1040" height="220" rx="20" fill="#0f172a" stroke="#334155"/>
    <text x="65" y="135" class="bit">1 0 0 1 0 0 0 1 0</text>

    <line x1="70" y1="170" x2="330" y2="170" stroke="#22d3ee" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="160" y="205" class="label">gap = 3</text>

    <line x1="330" y1="170" x2="730" y2="170" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="500" y="205" class="label">gap = 4 (max)</text>
  </g>

  <text x="80" y="520" class="note">Scan bits with position index: whenever current bit is 1, compare with last 1 position.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/>
    </marker>
  </defs>
</svg>
