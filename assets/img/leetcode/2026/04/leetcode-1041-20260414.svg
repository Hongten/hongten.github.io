<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1041 robot bounded in circle diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1041 · Robot Bounded In Circle</text>
  <text x="60" y="138" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">One-cycle simulation: bounded iff back to origin OR final direction != north</text>

  <circle cx="430" cy="360" r="190" fill="none" stroke="#334155" stroke-width="3" stroke-dasharray="10 8"/>
  <circle cx="430" cy="360" r="4" fill="#f8fafc"/>
  <text x="446" y="365" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Origin (0,0)</text>

  <path d="M430 360 L530 310 L580 360 L530 410 L430 360" fill="none" stroke="#22d3ee" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="610" y="348" fill="#67e8f9" font-size="24" font-family="Inter,Arial,sans-serif">After one instruction cycle</text>
  <text x="610" y="382" fill="#a5f3fc" font-size="22" font-family="Inter,Arial,sans-serif">if direction changes, repeated cycles rotate path</text>

  <rect x="60" y="470" width="1080" height="120" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="520" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Bounded = (x == 0 and y == 0) OR (dir != North)</text>
  <text x="90" y="560" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · Simulation / Geometry / State Machine</text>
</svg>
