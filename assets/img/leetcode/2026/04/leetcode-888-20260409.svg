<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 888 Fair Candy Swap balancing diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 888 · Fair Candy Swap</text>

  <rect x="56" y="130" width="520" height="420" rx="16" fill="#1f2937" stroke="#374151"/>
  <rect x="624" y="130" width="520" height="420" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="185" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Alice</text>
  <text x="660" y="185" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Bob</text>

  <text x="90" y="245" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Total: sumA</text>
  <text x="660" y="245" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Total: sumB</text>

  <rect x="90" y="285" width="180" height="64" rx="10" fill="#334155"/>
  <text x="145" y="326" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">x</text>
  <text x="285" y="324" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">gives</text>

  <rect x="660" y="285" width="180" height="64" rx="10" fill="#334155"/>
  <text x="715" y="326" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">y</text>
  <text x="855" y="324" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">gives</text>

  <text x="90" y="410" fill="#fbbf24" font-size="30" font-family="Inter,Arial,sans-serif">x - y = (sumA - sumB) / 2</text>
  <text x="90" y="465" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Use hash set on Bob: y = x - diff</text>

  <line x1="270" y1="317" x2="620" y2="317" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="840" y1="317" x2="590" y2="317" stroke="#4ade80" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1" />
    </marker>
  </defs>
</svg>
