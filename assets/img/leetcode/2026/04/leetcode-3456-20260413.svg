<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3456 run-length boundary check diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3456 · Find Special Substring of Length K</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Scan maximal runs, check run length == k</text>

  <rect x="60" y="200" width="1080" height="330" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="255" fill="#9ca3af" font-size="24" font-family="monospace">Example: s = "aaabbbbcc", k = 4</text>

  <rect x="100" y="290" width="180" height="80" rx="10" fill="#334155"/>
  <text x="165" y="338" fill="#e5e7eb" font-size="36" font-family="monospace">aaa</text>
  <text x="155" y="388" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">len=3</text>

  <rect x="320" y="290" width="240" height="80" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="3"/>
  <text x="403" y="338" fill="#dcfce7" font-size="36" font-family="monospace">bbbb</text>
  <text x="408" y="388" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">len=4 ✓</text>

  <rect x="600" y="290" width="140" height="80" rx="10" fill="#334155"/>
  <text x="650" y="338" fill="#e5e7eb" font-size="36" font-family="monospace">cc</text>
  <text x="636" y="388" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">len=2</text>

  <text x="90" y="455" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">A valid special substring must be a whole run (both boundaries differ).</text>
  <text x="90" y="495" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
