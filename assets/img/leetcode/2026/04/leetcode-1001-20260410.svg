<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .small{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .lamp{fill:#f59e0b;stroke:#fbbf24;stroke-width:3}
      .beam{stroke:#fcd34d;stroke-width:8;stroke-linecap:round;opacity:.9}
      .grid{stroke:#334155;stroke-width:2}
      .q{fill:#22d3ee;font:700 28px 'Segoe UI',Arial,sans-serif}
      .hash{fill:#34d399;font:600 20px monospace}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="85" class="title">LeetCode 1001 · Grid Illumination</text>
  <text x="60" y="125" class="sub">Hash sets for active lamps + O(1) query checks</text>

  <g transform="translate(70,180)">
    <rect x="0" y="0" width="460" height="360" rx="16" fill="#0b1220" stroke="#334155"/>
    <g class="grid">
      <line x1="92" y1="0" x2="92" y2="360"/><line x1="184" y1="0" x2="184" y2="360"/>
      <line x1="276" y1="0" x2="276" y2="360"/><line x1="368" y1="0" x2="368" y2="360"/>
      <line x1="0" y1="72" x2="460" y2="72"/><line x1="0" y1="144" x2="460" y2="144"/>
      <line x1="0" y1="216" x2="460" y2="216"/><line x1="0" y1="288" x2="460" y2="288"/>
    </g>
    <circle cx="92" cy="72" r="16" class="lamp"/>
    <circle cx="276" cy="216" r="16" class="lamp"/>
    <line x1="92" y1="72" x2="92" y2="360" class="beam"/>
    <line x1="0" y1="72" x2="460" y2="72" class="beam"/>
    <line x1="0" y1="0" x2="460" y2="360" class="beam"/>
    <line x1="460" y1="32" x2="92" y2="360" class="beam"/>
    <text x="314" y="58" class="q">Q</text>
  </g>

  <g transform="translate(590,195)">
    <text x="0" y="0" class="txt">Maintain counters:</text>
    <text x="0" y="48" class="hash">row[x], col[y], diag[x-y], anti[x+y]</text>
    <text x="0" y="108" class="txt">Query illuminated if any counter &gt; 0</text>
    <text x="0" y="156" class="txt">Then turn off lamps in 3×3 around query</text>
    <text x="0" y="204" class="small">Each lamp removed at most once ⇒ O(L + Q)</text>
  </g>
</svg>
