<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3136 valid word check flow">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3136 · Valid Word</text>
  <text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">One-pass validation with vowel/consonant flags</text>

  <rect x="70" y="210" width="220" height="120" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="280" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">len ≥ 3 ?</text>

  <rect x="350" y="210" width="280" height="120" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="375" y="280" fill="#fde68a" font-size="26" font-family="Inter,Arial,sans-serif">all chars alnum ?</text>

  <rect x="690" y="210" width="440" height="120" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="715" y="280" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">has vowel AND has consonant ?</text>

  <line x1="290" y1="270" x2="350" y2="270" stroke="#9ca3af" stroke-width="4"/>
  <line x1="630" y1="270" x2="690" y2="270" stroke="#9ca3af" stroke-width="4"/>

  <text x="75" y="420" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Reject early on any non-alphanumeric character.</text>
  <text x="75" y="470" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Digits are allowed, but only letters affect vowel/consonant flags.</text>
  <text x="75" y="540" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
