<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 253 meeting rooms timeline min-heap diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 253 · Meeting Rooms II</text>
  <text x="56" y="126" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Sort by start time + min-heap of end times</text>

  <line x1="70" y1="210" x2="1130" y2="210" stroke="#6b7280" stroke-width="2"/>
  <line x1="70" y1="280" x2="1130" y2="280" stroke="#6b7280" stroke-width="2"/>
  <line x1="70" y1="350" x2="1130" y2="350" stroke="#6b7280" stroke-width="2"/>

  <rect x="140" y="188" width="280" height="44" rx="10" fill="#22d3ee" opacity="0.9"/>
  <rect x="420" y="258" width="310" height="44" rx="10" fill="#f59e0b" opacity="0.9"/>
  <rect x="280" y="328" width="250" height="44" rx="10" fill="#34d399" opacity="0.9"/>
  <rect x="730" y="188" width="220" height="44" rx="10" fill="#a78bfa" opacity="0.9"/>

  <text x="150" y="216" fill="#0b1020" font-size="20" font-family="Inter,Arial,sans-serif" font-weight="700">Meeting A [0, 30]</text>
  <text x="430" y="286" fill="#0b1020" font-size="20" font-family="Inter,Arial,sans-serif" font-weight="700">Meeting B [5, 10]</text>
  <text x="290" y="356" fill="#0b1020" font-size="20" font-family="Inter,Arial,sans-serif" font-weight="700">Meeting C [15, 20]</text>
  <text x="740" y="216" fill="#0b1020" font-size="20" font-family="Inter,Arial,sans-serif" font-weight="700">Meeting D [35, 40]</text>

  <rect x="56" y="430" width="1088" height="150" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="82" y="470" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Heap top = earliest ending room</text>
  <text x="82" y="508" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">if start &gt;= minEnd: reuse room (pop), then push new end</text>
  <text x="82" y="546" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">answer = max heap size during sweep</text>
</svg>
