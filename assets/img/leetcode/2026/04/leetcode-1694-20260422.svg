<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1694 grouping diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1694 · Reformat Phone Number</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Extract digits, group by 3, and split final 4 as 2-2</text>
  <rect x="60" y="190" width="1080" height="360" rx="20" fill="#111827" stroke="#374151"/>
  <text x="100" y="270" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">Input: 1-23-45 6</text>
  <text x="100" y="325" fill="#fcd34d" font-size="30" font-family="JetBrains Mono,Consolas,monospace">Digits: 123456</text>
  <text x="100" y="395" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">while remain &gt; 4: [123]  remain=3</text>
  <text x="100" y="465" fill="#bfdbfe" font-size="34" font-family="JetBrains Mono,Consolas,monospace">tail=3 =&gt; [456]</text>
  <text x="100" y="530" fill="#86efac" font-size="36" font-family="JetBrains Mono,Consolas,monospace">Output: 123-456</text>
</svg>