<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1598 crawler log folder depth simulation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1598 · Crawler Log Folder</text>
  <text x="60" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Depth counter simulation: ../ decreases, ./ keeps, x/ increases</text>

  <rect x="70" y="190" width="250" height="90" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="95" y="245" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">main/ (depth 0)</text>

  <rect x="390" y="190" width="250" height="90" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="430" y="245" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">d1/ (depth 1)</text>

  <rect x="710" y="190" width="250" height="90" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="750" y="245" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">d2/ (depth 2)</text>

  <line x1="320" y1="235" x2="390" y2="235" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="235" x2="710" y2="235" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="338" y="220" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">x/</text>
  <text x="658" y="220" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">x/</text>

  <line x1="710" y1="310" x2="640" y2="310" stroke="#fca5a5" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="650" y="345" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">../</text>
  <line x1="390" y1="310" x2="320" y2="310" stroke="#fca5a5" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="330" y="345" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">../</text>

  <rect x="70" y="400" width="1060" height="170" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="455" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Invariant: depth never goes below 0</text>
  <text x="100" y="500" fill="#d1d5db" font-size="28" font-family="Inter,Arial,sans-serif">Answer = final depth after processing all logs</text>
  <text x="100" y="545" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
