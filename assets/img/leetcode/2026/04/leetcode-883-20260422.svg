<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="95" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 883</text>
  <text x="70" y="145" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Projection Area of 3D Shapes</text>

  <g transform="translate(80,210)">
    <rect x="0" y="0" width="300" height="300" rx="20" fill="#111827" stroke="#334155"/>
    <text x="20" y="40" fill="#f8fafc" font-size="24" font-family="Arial">Top View (non-zero cells)</text>
    <rect x="30" y="70" width="60" height="60" fill="#22d3ee"/>
    <rect x="110" y="70" width="60" height="60" fill="#22d3ee"/>
    <rect x="190" y="70" width="60" height="60" fill="#22d3ee"/>
    <rect x="110" y="150" width="60" height="60" fill="#22d3ee"/>
    <text x="30" y="265" fill="#cbd5e1" font-size="22" font-family="Arial">count = 4</text>
  </g>

  <g transform="translate(450,210)">
    <rect x="0" y="0" width="300" height="300" rx="20" fill="#111827" stroke="#334155"/>
    <text x="20" y="40" fill="#f8fafc" font-size="24" font-family="Arial">Front View (row max)</text>
    <rect x="40" y="220" width="55" height="60" fill="#60a5fa"/>
    <rect x="125" y="140" width="55" height="140" fill="#60a5fa"/>
    <rect x="210" y="180" width="55" height="100" fill="#60a5fa"/>
    <text x="30" y="265" fill="#cbd5e1" font-size="22" font-family="Arial">sum(max row) = 6</text>
  </g>

  <g transform="translate(820,210)">
    <rect x="0" y="0" width="300" height="300" rx="20" fill="#111827" stroke="#334155"/>
    <text x="20" y="40" fill="#f8fafc" font-size="24" font-family="Arial">Side View (col max)</text>
    <rect x="40" y="180" width="55" height="100" fill="#34d399"/>
    <rect x="125" y="120" width="55" height="160" fill="#34d399"/>
    <rect x="210" y="200" width="55" height="80" fill="#34d399"/>
    <text x="30" y="265" fill="#cbd5e1" font-size="22" font-family="Arial">sum(max col) = 6</text>
  </g>

  <text x="70" y="585" fill="#f8fafc" font-size="28" font-family="Arial" font-weight="700">Total = Top + Front + Side</text>
</svg>
