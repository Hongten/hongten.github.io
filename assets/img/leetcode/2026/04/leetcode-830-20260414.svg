<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 830: Positions of Large Groups</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Run-Length Two Pointers</text>

  <rect x="60" y="180" width="1080" height="140" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="235" fill="#cbd5e1" font-size="34" font-family="monospace">s = "abbxxxxzyy"</text>
  <text x="90" y="285" fill="#22d3ee" font-size="30" font-family="monospace">groups: a | bb | xxxx | z | yy</text>

  <rect x="60" y="350" width="1080" height="210" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="405" fill="#f8fafc" font-size="30" font-family="Arial, sans-serif">Scan each run [i, j-1]. If (j - i) &gt;= 3, record it.</text>
  <text x="90" y="455" fill="#86efac" font-size="36" font-family="monospace">large group: [3, 6] -&gt; "xxxx"</text>
  <text x="90" y="510" fill="#fbbf24" font-size="28" font-family="Arial, sans-serif">Time O(n), Extra Space O(1)</text>
</svg>
