<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif; fill:#e2e8f0}
      .sub{font:500 26px 'Segoe UI',Arial,sans-serif; fill:#93c5fd}
      .txt{font:500 22px 'Segoe UI',Arial,sans-serif; fill:#cbd5e1}
      .node{fill:#38bdf8}
      .hill{fill:#22c55e}
      .valley{fill:#f59e0b}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 2210 · Count Hills and Valleys in an Array</text>
  <text x="60" y="128" class="sub">Skip equal plateaus, then count turning points</text>

  <polyline points="120,430 250,430 360,320 500,350 640,470 780,470 920,300 1060,390" fill="none" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="360" cy="320" r="11" class="hill"/>
  <circle cx="640" cy="470" r="11" class="valley"/>
  <circle cx="920" cy="300" r="11" class="hill"/>

  <text x="330" y="285" class="txt">Hill</text>
  <text x="600" y="525" class="txt">Valley</text>
  <text x="890" y="265" class="txt">Hill</text>

  <text x="60" y="580" class="txt">Plateau example: equal adjacent values are compressed before classification.</text>
</svg>
