<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 900 RLE iterator diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="98" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 900: RLE Iterator</text>
  <text x="56" y="146" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Run-length consumption with moving pointer</text>

  <rect x="56" y="190" width="1088" height="360" rx="18" fill="#111827" stroke="#374151"/>

  <rect x="100" y="240" width="120" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="132" y="275" fill="#f9fafb" font-size="24" font-family="monospace">3</text>
  <rect x="230" y="240" width="120" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="278" y="275" fill="#f9fafb" font-size="24" font-family="monospace">8</text>

  <rect x="390" y="240" width="120" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="422" y="275" fill="#f9fafb" font-size="24" font-family="monospace">0</text>
  <rect x="520" y="240" width="120" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="568" y="275" fill="#f9fafb" font-size="24" font-family="monospace">9</text>

  <rect x="680" y="240" width="120" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="712" y="275" fill="#f9fafb" font-size="24" font-family="monospace">2</text>
  <rect x="810" y="240" width="120" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="858" y="275" fill="#f9fafb" font-size="24" font-family="monospace">5</text>

  <text x="98" y="338" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">i points to count slot</text>
  <path d="M160 350 L160 404" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <text x="98" y="430" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">next(n): consume runs left to right, skip exhausted pairs, return last value.</text>
  <text x="98" y="478" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Amortized O(1) per call, O(k) total run transitions.</text>
  <text x="98" y="528" fill="#f9a8d4" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
