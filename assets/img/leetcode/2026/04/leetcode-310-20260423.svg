<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #121a33; stroke: #2a3a70; stroke-width: 2; }
      .node { fill: #1f2a4d; stroke: #7aa2ff; stroke-width: 2; }
      .leaf { fill: #234d2f; stroke: #5fd38d; stroke-width: 2; }
      .center { fill: #4b2c54; stroke: #d08cff; stroke-width: 3; }
      .edge { stroke: #8aa0d6; stroke-width: 3; }
      .txt { fill: #e8eeff; font: 22px Arial, sans-serif; }
      .small { fill: #b9c6ef; font: 18px Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="680"/>
  <rect class="panel" x="40" y="40" width="1120" height="600" rx="18"/>
  <text class="txt" x="70" y="90">LeetCode 310 - Leaf Trimming until 1 or 2 Centers</text>
  <text class="small" x="70" y="124">Each round removes current leaves (degree = 1). Remaining nodes are MHT roots.</text>

  <line class="edge" x1="210" y1="240" x2="360" y2="180"/>
  <line class="edge" x1="360" y1="180" x2="520" y2="240"/>
  <line class="edge" x1="520" y1="240" x2="680" y2="180"/>
  <line class="edge" x1="680" y1="180" x2="850" y2="250"/>
  <line class="edge" x1="520" y1="240" x2="520" y2="420"/>
  <line class="edge" x1="680" y1="180" x2="680" y2="380"/>

  <circle class="leaf" cx="210" cy="240" r="32"/><text class="txt" x="202" y="248">0</text>
  <circle class="node" cx="360" cy="180" r="32"/><text class="txt" x="352" y="188">1</text>
  <circle class="center" cx="520" cy="240" r="36"/><text class="txt" x="512" y="248">2</text>
  <circle class="center" cx="680" cy="180" r="36"/><text class="txt" x="672" y="188">3</text>
  <circle class="node" cx="850" cy="250" r="32"/><text class="txt" x="842" y="258">4</text>
  <circle class="leaf" cx="520" cy="420" r="32"/><text class="txt" x="512" y="428">5</text>
  <circle class="leaf" cx="680" cy="380" r="32"/><text class="txt" x="672" y="388">6</text>

  <text class="small" x="70" y="520">Round 1 remove leaves: {0,5,6,4} -> remaining chain 1-2-3</text>
  <text class="small" x="70" y="550">Round 2 remove leaves: {1,3} -> remaining center(s): {2}</text>
  <text class="small" x="70" y="580">Answer: root 2 gives minimum tree height.</text>
</svg>
