<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Three divisors means prime square">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="110" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1952 · Three Divisors</text>
  <text x="70" y="165" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">n has exactly 3 divisors ⇔ n = p² and p is prime</text>

  <rect x="70" y="220" width="1060" height="320" rx="20" fill="#111827" stroke="#334155"/>

  <text x="120" y="285" fill="#f8fafc" font-size="30" font-family="Consolas, monospace">Example: n = 49 = 7²</text>
  <text x="120" y="335" fill="#a7f3d0" font-size="28" font-family="Consolas, monospace">Divisors: 1, 7, 49  → exactly 3</text>

  <line x1="120" y1="380" x2="1080" y2="380" stroke="#334155" stroke-width="2"/>

  <text x="120" y="435" fill="#fcd34d" font-size="26" font-family="Consolas, monospace">Check flow:</text>
  <text x="300" y="435" fill="#e2e8f0" font-size="26" font-family="Consolas, monospace">sqrt(n) = r</text>
  <text x="470" y="435" fill="#e2e8f0" font-size="26" font-family="Consolas, monospace">→ r*r == n ?</text>
  <text x="660" y="435" fill="#e2e8f0" font-size="26" font-family="Consolas, monospace">→ isPrime(r) ?</text>
  <text x="870" y="435" fill="#86efac" font-size="26" font-family="Consolas, monospace">→ true</text>

  <text x="120" y="500" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">Only prime squares have exactly three positive divisors.</text>
</svg>
