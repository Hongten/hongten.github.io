<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><linearGradient id="g" x1="0" x2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <text x="60" y="110" fill="#93c5fd" font-size="42" font-family="Arial">LeetCode 1590</text>
  <text x="60" y="170" fill="#e2e8f0" font-size="38" font-family="Arial">Make Sum Divisible by P</text>
  <rect x="60" y="220" width="1080" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="280" fill="#cbd5e1" font-size="28" font-family="Consolas">need = total % p</text>
  <text x="90" y="330" fill="#cbd5e1" font-size="28" font-family="Consolas">target = (prefix - need + p) % p</text>
  <text x="90" y="380" fill="#cbd5e1" font-size="28" font-family="Consolas">ans = min(i - firstIndex[target])</text>
  <text x="90" y="430" fill="#94a3b8" font-size="24" font-family="Arial">Hash map stores latest index for each prefix modulo.</text>
</svg>