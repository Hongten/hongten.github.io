<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 329 longest increasing path diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="86" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 329: Longest Increasing Path in a Matrix</text>
  <text x="52" y="126" fill="#93c5fd" font-size="25" font-family="Inter,Arial,sans-serif">DFS + Memoization on DAG-like increasing edges</text>

  <rect x="70" y="180" width="640" height="380" rx="16" fill="#1f2937" stroke="#374151"/>

  <g font-family="Inter,Arial,sans-serif" font-size="28" text-anchor="middle" dominant-baseline="middle">
    <rect x="110" y="220" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="170" y="265" fill="#cbd5e1">9</text>
    <rect x="240" y="220" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="300" y="265" fill="#cbd5e1">9</text>
    <rect x="370" y="220" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="430" y="265" fill="#cbd5e1">4</text>

    <rect x="110" y="320" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="170" y="365" fill="#cbd5e1">6</text>
    <rect x="240" y="320" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="300" y="365" fill="#cbd5e1">6</text>
    <rect x="370" y="320" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="430" y="365" fill="#cbd5e1">8</text>

    <rect x="110" y="420" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="170" y="465" fill="#cbd5e1">2</text>
    <rect x="240" y="420" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="300" y="465" fill="#cbd5e1">1</text>
    <rect x="370" y="420" width="120" height="90" fill="#0f172a" stroke="#475569"/><text x="430" y="465" fill="#cbd5e1">1</text>
  </g>

  <g stroke="#60a5fa" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M300 465 L170 465"/>
    <path d="M170 465 L170 365"/>
    <path d="M170 365 L170 265"/>
  </g>

  <text x="760" y="250" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Example path:</text>
  <text x="760" y="300" fill="#86efac" font-size="42" font-family="JetBrains Mono,monospace">1 → 2 → 6 → 9</text>
  <text x="760" y="360" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">memo[r][c] caches best length</text>
  <text x="760" y="405" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">each cell computed once</text>

  <text x="52" y="600" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
