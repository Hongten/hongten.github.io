<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3162 divisibility illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 3162 · Good Pairs I</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Arial, Helvetica, sans-serif">Condition: nums1[i] % (nums2[j] * k) == 0</text>

  <rect x="70" y="190" width="470" height="330" rx="16" fill="#111827" stroke="#334155"/>
  <text x="95" y="230" fill="#f8fafc" font-size="24" font-family="Arial">nums1 = [12, 18, 24]</text>
  <text x="95" y="275" fill="#f8fafc" font-size="24" font-family="Arial">nums2 = [2, 3]</text>
  <text x="95" y="320" fill="#f8fafc" font-size="24" font-family="Arial">k = 3</text>

  <rect x="620" y="190" width="510" height="330" rx="16" fill="#111827" stroke="#334155"/>
  <text x="650" y="230" fill="#f8fafc" font-size="24" font-family="Arial">Scaled nums2: [6, 9]</text>
  <text x="650" y="275" fill="#34d399" font-size="22" font-family="Arial">12 % 6 = 0 ✅   12 % 9 ≠ 0</text>
  <text x="650" y="315" fill="#34d399" font-size="22" font-family="Arial">18 % 6 = 0 ✅   18 % 9 = 0 ✅</text>
  <text x="650" y="355" fill="#34d399" font-size="22" font-family="Arial">24 % 6 = 0 ✅   24 % 9 ≠ 0</text>
  <text x="650" y="420" fill="#fbbf24" font-size="28" font-family="Arial" font-weight="700">Total good pairs = 4</text>

  <text x="60" y="585" fill="#94a3b8" font-size="20" font-family="Arial">Brute-force over all (i, j) pairs · O(n × m)</text>
</svg>
