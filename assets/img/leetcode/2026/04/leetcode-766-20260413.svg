<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 766 Toeplitz Matrix Diagram</title>
  <desc id="desc">A Toeplitz matrix example where each top-left to bottom-right diagonal keeps the same value.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .cell{fill:#111827;stroke:#334155;stroke-width:2}
      .txt{font:700 28px 'Consolas',monospace;fill:#e5e7eb;text-anchor:middle;dominant-baseline:middle}
      .diag{fill:#16a34a;fill-opacity:.28}
      .cap{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" class="title">LeetCode 766 · Toeplitz Matrix</text>
  <text x="70" y="130" class="sub">Each top-left → bottom-right diagonal has identical values</text>

  <g transform="translate(250,180)">
    <g>
      <rect class="cell diag" x="0" y="0" width="120" height="80"/><rect class="cell" x="120" y="0" width="120" height="80"/><rect class="cell" x="240" y="0" width="120" height="80"/><rect class="cell" x="360" y="0" width="120" height="80"/>
      <rect class="cell" x="0" y="80" width="120" height="80"/><rect class="cell diag" x="120" y="80" width="120" height="80"/><rect class="cell" x="240" y="80" width="120" height="80"/><rect class="cell" x="360" y="80" width="120" height="80"/>
      <rect class="cell" x="0" y="160" width="120" height="80"/><rect class="cell" x="120" y="160" width="120" height="80"/><rect class="cell diag" x="240" y="160" width="120" height="80"/><rect class="cell" x="360" y="160" width="120" height="80"/>
      <rect class="cell" x="0" y="240" width="120" height="80"/><rect class="cell" x="120" y="240" width="120" height="80"/><rect class="cell" x="240" y="240" width="120" height="80"/><rect class="cell diag" x="360" y="240" width="120" height="80"/>
    </g>
    <g class="txt">
      <text x="60" y="40">7</text><text x="180" y="40">8</text><text x="300" y="40">9</text><text x="420" y="40">1</text>
      <text x="60" y="120">5</text><text x="180" y="120">7</text><text x="300" y="120">8</text><text x="420" y="120">9</text>
      <text x="60" y="200">2</text><text x="180" y="200">5</text><text x="300" y="200">7</text><text x="420" y="200">8</text>
      <text x="60" y="280">6</text><text x="180" y="280">2</text><text x="300" y="280">5</text><text x="420" y="280">7</text>
    </g>
  </g>

  <text x="250" y="550" class="cap">Check rule: matrix[r][c] == matrix[r-1][c-1] for all r&gt;0 and c&gt;0</text>
</svg>
