<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 246 strobogrammatic mirror mapping">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="105" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 246 · Strobogrammatic Number</text>
  <text x="70" y="150" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Mirror-Pair Digit Validation (180° rotation)</text>

  <rect x="70" y="210" width="1060" height="330" rx="18" fill="#111827" stroke="#334155"/>
  <line x1="600" y1="230" x2="600" y2="520" stroke="#475569" stroke-dasharray="8 8"/>
  <text x="520" y="255" fill="#cbd5e1" font-size="22" font-family="monospace">mirror axis</text>

  <text x="140" y="330" fill="#f8fafc" font-size="64" font-family="monospace">6 1 9 0</text>
  <text x="760" y="330" fill="#f8fafc" font-size="64" font-family="monospace">0 6 1 9</text>

  <text x="140" y="410" fill="#22d3ee" font-size="30" font-family="Inter,Arial,sans-serif">Valid pairs: (0,0) (1,1) (6,9) (8,8) (9,6)</text>
  <text x="140" y="460" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">Invalid example: digit 2 has no rotated mapping</text>
</svg>
