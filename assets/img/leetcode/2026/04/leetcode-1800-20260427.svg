<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1800 maximum ascending subarray sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1800: Maximum Ascending Subarray Sum</text>
  <rect x="56" y="130" width="1088" height="430" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="92" y="188" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">One pass: extend ascending run, otherwise reset</text>

  <rect x="92" y="228" width="690" height="76" rx="12" fill="#0b1220" stroke="#4b5563"/>
  <text x="112" y="275" fill="#f9fafb" font-size="30" font-family="monospace">nums = [10, 20, 30, 5, 10, 50]</text>

  <rect x="92" y="330" width="690" height="190" rx="12" fill="#111827" stroke="#374151"/>
  <text x="120" y="372" fill="#86efac" font-size="24" font-family="monospace">cur = nums[0], best = nums[0]</text>
  <text x="120" y="412" fill="#e5e7eb" font-size="24" font-family="monospace">if nums[i] &gt; nums[i-1] -&gt; cur += nums[i]</text>
  <text x="120" y="452" fill="#e5e7eb" font-size="24" font-family="monospace">else -&gt; cur = nums[i]</text>
  <text x="120" y="492" fill="#e5e7eb" font-size="24" font-family="monospace">best = max(best, cur)</text>

  <rect x="818" y="228" width="290" height="292" rx="12" fill="#111827" stroke="#374151"/>
  <text x="850" y="274" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Ascending sums</text>
  <text x="850" y="316" fill="#f9fafb" font-size="25" font-family="monospace">10+20+30 = 60</text>
  <text x="850" y="356" fill="#f9fafb" font-size="25" font-family="monospace">5+10+50 = 65</text>
  <text x="850" y="410" fill="#fef08a" font-size="32" font-family="monospace">Answer: 65</text>

  <text x="92" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
