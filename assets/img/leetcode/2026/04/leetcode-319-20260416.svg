<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 319 Bulb Switcher Perfect Square Insight</title>
  <desc id="desc">Bulbs toggled by divisor count: only perfect square indices remain on after all rounds.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 46px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .off { fill: #334155; stroke: #64748b; stroke-width: 2; }
      .on { fill: #22c55e; stroke: #16a34a; stroke-width: 3; }
      .txt { font: 700 28px 'JetBrains Mono', Consolas, monospace; fill: #f8fafc; text-anchor: middle; dominant-baseline: middle; }
      .note { font: 600 28px 'Segoe UI', Arial, sans-serif; fill: #facc15; }
      .eq { font: 700 34px 'JetBrains Mono', Consolas, monospace; fill: #93c5fd; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 319 · Bulb Switcher</text>
  <text x="60" y="130" class="subtitle">Only perfect-square positions stay ON</text>

  <g transform="translate(70,220)">
    <rect class="on"  x="0"   y="0" width="150" height="110" rx="14"/>
    <rect class="off" x="170" y="0" width="150" height="110" rx="14"/>
    <rect class="off" x="340" y="0" width="150" height="110" rx="14"/>
    <rect class="on"  x="510" y="0" width="150" height="110" rx="14"/>
    <rect class="off" x="680" y="0" width="150" height="110" rx="14"/>
    <rect class="off" x="850" y="0" width="150" height="110" rx="14"/>
    <rect class="off" x="1020" y="0" width="150" height="110" rx="14"/>

    <text class="txt" x="75" y="55">1</text>
    <text class="txt" x="245" y="55">2</text>
    <text class="txt" x="415" y="55">3</text>
    <text class="txt" x="585" y="55">4</text>
    <text class="txt" x="755" y="55">5</text>
    <text class="txt" x="925" y="55">6</text>
    <text class="txt" x="1095" y="55">7</text>

    <text class="txt" x="75" y="142">ON</text>
    <text class="txt" x="585" y="142">ON</text>
  </g>

  <text x="110" y="470" class="note">Perfect squares ≤ n: 1, 4, 9, 16, ...</text>
  <text x="110" y="535" class="eq">answer = ⌊sqrt(n)⌋</text>
  <text x="110" y="590" class="subtitle">Reason: only perfect squares have odd number of divisors.</text>
</svg>
