<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2190 counting targets after key diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2190 · Most Frequent Number Following Key</text>
  <text x="60" y="135" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Scan adjacent pairs: if nums[i] == key, count nums[i+1]</text>

  <rect x="60" y="180" width="1080" height="360" rx="20" fill="#1f2937" stroke="#334155"/>

  <text x="90" y="235" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">nums = [1, 100, 200, 1, 100], key = 1</text>

  <rect x="90" y="270" width="170" height="56" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="130" y="306" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">1</text>
  <text x="270" y="306" fill="#60a5fa" font-size="26" font-family="Inter,Arial,sans-serif">→</text>
  <rect x="320" y="270" width="170" height="56" rx="10" fill="#052e16" stroke="#166534"/>
  <text x="365" y="306" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">100</text>
  <text x="515" y="306" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">count[100] = 1</text>

  <rect x="90" y="345" width="170" height="56" rx="10" fill="#0b1220" stroke="#334155"/>
  <text x="130" y="381" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">1</text>
  <text x="270" y="381" fill="#60a5fa" font-size="26" font-family="Inter,Arial,sans-serif">→</text>
  <rect x="320" y="345" width="170" height="56" rx="10" fill="#052e16" stroke="#166534"/>
  <text x="365" y="381" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">100</text>
  <text x="515" y="381" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">count[100] = 2</text>

  <rect x="760" y="270" width="340" height="170" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="790" y="320" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Best target = 100</text>
  <text x="790" y="365" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">because its frequency is maximum</text>

  <text x="60" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · One pass + hash map counting</text>
</svg>
