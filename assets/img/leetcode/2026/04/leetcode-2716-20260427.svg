<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2716 unique characters diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2716: Minimize String Length</text>
  <text x="56" y="145" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Minimum length = number of distinct characters</text>
  <rect x="56" y="190" width="1088" height="366" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="86" y="250" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Example: s = "aaabc"</text>
  <text x="86" y="308" fill="#e5e7eb" font-size="32" font-family="Inter,Arial,sans-serif">Delete duplicates until one per character:</text>
  <text x="86" y="362" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif">a a a b c  →  a b c</text>
  <text x="86" y="418" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">Distinct set = {a,b,c} , answer = 3</text>
  <text x="86" y="488" fill="#e5e7eb" font-size="27" font-family="Inter,Arial,sans-serif">Invariant: each letter can remain exactly once, never zero.</text>
</svg>
