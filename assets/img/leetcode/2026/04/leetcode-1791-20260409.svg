<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1791 star graph center detection diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="4" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1791 · Find Center of Star Graph</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Center appears in every edge → compare first two edges only</text>

  <line x1="600" y1="320" x2="330" y2="190" stroke="#60a5fa" stroke-width="6"/>
  <line x1="600" y1="320" x2="330" y2="450" stroke="#60a5fa" stroke-width="6"/>
  <line x1="600" y1="320" x2="900" y2="190" stroke="#60a5fa" stroke-width="6"/>
  <line x1="600" y1="320" x2="900" y2="450" stroke="#60a5fa" stroke-width="6"/>

  <circle cx="600" cy="320" r="48" fill="#f59e0b"/>
  <text x="575" y="328" fill="#111827" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">C</text>

  <circle cx="330" cy="190" r="32" fill="#34d399"/>
  <circle cx="330" cy="450" r="32" fill="#34d399"/>
  <circle cx="900" cy="190" r="32" fill="#34d399"/>
  <circle cx="900" cy="450" r="32" fill="#34d399"/>

  <text x="210" y="560" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">edge[0] = [C, x]</text>
  <text x="520" y="560" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">edge[1] = [C, y]</text>
  <text x="860" y="560" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">shared node = C</text>

  <text x="60" y="600" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
