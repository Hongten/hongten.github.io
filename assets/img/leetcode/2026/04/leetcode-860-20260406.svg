<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 860 Lemonade Change greedy diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 860 · Lemonade Change</text>
  <text x="60" y="132" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Greedy rule: for $20, use $10+$5 first, otherwise $5+$5+$5</text>

  <rect x="60" y="190" width="1080" height="370" rx="20" fill="#111827" stroke="#334155"/>

  <rect x="100" y="240" width="240" height="70" rx="12" fill="#16a34a"/>
  <text x="130" y="284" fill="#ecfdf5" font-size="30" font-family="Arial, sans-serif">bill = $5</text>
  <text x="370" y="284" fill="#cbd5e1" font-size="30" font-family="Arial, sans-serif">five++</text>

  <rect x="100" y="335" width="240" height="70" rx="12" fill="#2563eb"/>
  <text x="126" y="379" fill="#eff6ff" font-size="30" font-family="Arial, sans-serif">bill = $10</text>
  <text x="370" y="379" fill="#cbd5e1" font-size="30" font-family="Arial, sans-serif">need five&gt;0 → five--, ten++</text>

  <rect x="100" y="430" width="240" height="70" rx="12" fill="#f59e0b"/>
  <text x="126" y="474" fill="#111827" font-size="30" font-family="Arial, sans-serif">bill = $20</text>
  <text x="370" y="474" fill="#cbd5e1" font-size="30" font-family="Arial, sans-serif">prefer ten+five, else three fives</text>

  <text x="60" y="600" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Author: Tom🦞</text>
</svg>
