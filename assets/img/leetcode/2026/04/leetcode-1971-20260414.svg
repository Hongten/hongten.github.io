<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1971 union-find connectivity diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 26px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .edge{stroke:#64748b;stroke-width:6;opacity:.9}
      .on{stroke:#22c55e;stroke-width:8}
      .node{fill:#0b1220;stroke:#94a3b8;stroke-width:4}
      .hot{fill:#052e16;stroke:#22c55e;stroke-width:4}
      .label{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0;text-anchor:middle;dominant-baseline:middle}
      .badge{fill:#1d4ed8}
      .badgeTxt{font:700 20px 'Segoe UI',Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="86" class="title">LeetCode 1971 · Find if Path Exists in Graph</text>
  <text x="56" y="126" class="sub">Union-Find: source and destination in same component ⇒ path exists</text>

  <line x1="210" y1="260" x2="380" y2="200" class="edge on"/>
  <line x1="380" y1="200" x2="560" y2="260" class="edge on"/>
  <line x1="560" y1="260" x2="740" y2="190" class="edge on"/>
  <line x1="740" y1="190" x2="930" y2="250" class="edge on"/>
  <line x1="380" y1="200" x2="380" y2="380" class="edge"/>
  <line x1="560" y1="260" x2="560" y2="430" class="edge"/>
  <line x1="740" y1="190" x2="860" y2="400" class="edge"/>

  <circle cx="210" cy="260" r="36" class="hot"/><text x="210" y="260" class="label">0</text>
  <circle cx="380" cy="200" r="36" class="hot"/><text x="380" y="200" class="label">2</text>
  <circle cx="560" cy="260" r="36" class="hot"/><text x="560" y="260" class="label">4</text>
  <circle cx="740" cy="190" r="36" class="hot"/><text x="740" y="190" class="label">5</text>
  <circle cx="930" cy="250" r="36" class="hot"/><text x="930" y="250" class="label">6</text>

  <circle cx="380" cy="380" r="36" class="node"/><text x="380" y="380" class="label">1</text>
  <circle cx="560" cy="430" r="36" class="node"/><text x="560" y="430" class="label">3</text>
  <circle cx="860" cy="400" r="36" class="node"/><text x="860" y="400" class="label">7</text>

  <rect x="56" y="500" rx="12" ry="12" width="360" height="52" class="badge"/>
  <text x="76" y="534" class="badgeTxt">source = 0, destination = 6</text>
  <text x="460" y="534" class="txt">All highlighted nodes share one DSU root.</text>
</svg>
