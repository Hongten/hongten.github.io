<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3442 frequency parity diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3442</text>
  <text x="60" y="135" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Maximum Difference Between Even and Odd Frequency I</text>

  <rect x="60" y="190" width="500" height="340" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="235" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Frequency Buckets</text>
  <text x="90" y="280" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Odd counts: 3, 5, 7  → maxOdd = 7</text>
  <text x="90" y="325" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Even counts: 2, 4, 8 → minEven = 2</text>
  <text x="90" y="390" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Answer = maxOdd - minEven = 5</text>
  <text x="90" y="450" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">Ignore zero counts (invalid characters)</text>

  <rect x="620" y="190" width="520" height="340" rx="18" fill="#111827" stroke="#374151"/>
  <text x="650" y="245" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">One-pass over 26 letters</text>
  <text x="650" y="300" fill="#c7d2fe" font-size="24" font-family="Inter,Arial,sans-serif">1) count frequency</text>
  <text x="650" y="340" fill="#c7d2fe" font-size="24" font-family="Inter,Arial,sans-serif">2) update max odd</text>
  <text x="650" y="380" fill="#c7d2fe" font-size="24" font-family="Inter,Arial,sans-serif">3) update min even</text>
  <text x="650" y="420" fill="#c7d2fe" font-size="24" font-family="Inter,Arial,sans-serif">4) return difference</text>
  <text x="650" y="480" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1)</text>

  <text x="60" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
