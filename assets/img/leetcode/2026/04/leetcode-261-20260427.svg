<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 261 union-find diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 261: Graph Valid Tree</text>
  <text x="60" y="145" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Union-Find: edge count + cycle detection</text>

  <rect x="70" y="210" width="500" height="320" rx="16" fill="#111827" stroke="#374151"/>
  <text x="95" y="255" fill="#a7f3d0" font-size="26" font-family="Inter,Arial,sans-serif">Tree Conditions</text>
  <text x="95" y="300" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">1) edges == n - 1</text>
  <text x="95" y="340" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">2) no cycle when union(u, v)</text>
  <text x="95" y="380" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">3) then graph is connected</text>

  <rect x="630" y="210" width="500" height="320" rx="16" fill="#111827" stroke="#374151"/>
  <text x="655" y="255" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif">Union-Find Flow</text>
  <text x="655" y="300" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">for each (u, v):</text>
  <text x="655" y="338" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">if find(u) == find(v) -&gt; cycle</text>
  <text x="655" y="376" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">else union by rank</text>
  <text x="655" y="414" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">finish without cycle -&gt; valid tree</text>

  <text x="60" y="590" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
