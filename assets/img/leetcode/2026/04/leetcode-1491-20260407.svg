<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1491 one-pass min max sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1491</text>
  <text x="60" y="135" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Average Salary Excluding Min and Max</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="250" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">salary = [4000, 3000, 1000, 2000]</text>
  <text x="90" y="300" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">min = 1000</text>
  <text x="330" y="300" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">max = 4000</text>
  <text x="570" y="300" fill="#fde68a" font-size="24" font-family="Inter,Arial,sans-serif">sum = 10000</text>

  <text x="90" y="365" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">(sum - min - max) / (n - 2)</text>
  <text x="90" y="415" fill="#c4b5fd" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">(10000 - 1000 - 4000) / 2 = 2500.0</text>

  <text x="90" y="485" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">One pass: track sum, min, max without sorting</text>
  <text x="90" y="525" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
