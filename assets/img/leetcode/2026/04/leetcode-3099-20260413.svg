<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3099 Harshad Number digit-sum divisibility diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="98" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3099 · Harshad Number</text>
  <rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="220" fill="#93c5fd" font-size="32" font-family="Inter,Arial,sans-serif">x = 1729</text>
  <text x="100" y="275" fill="#c4b5fd" font-size="30" font-family="Inter,Arial,sans-serif">digit sum = 1 + 7 + 2 + 9 = 19</text>

  <line x1="100" y1="310" x2="520" y2="310" stroke="#4b5563" stroke-width="2"/>
  <text x="100" y="360" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">1729 % 19 = 0  →  Harshad ✅</text>
  <text x="100" y="410" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Return digit sum (19) when divisible</text>
  <text x="100" y="455" fill="#f9a8d4" font-size="28" font-family="Inter,Arial,sans-serif">Else return -1</text>

  <text x="100" y="525" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Single pass over digits · O(log10 x) time · O(1) space</text>
</svg>
