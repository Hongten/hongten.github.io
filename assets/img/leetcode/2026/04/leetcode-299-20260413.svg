<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 299 bulls and cows diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="54" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 299 · Bulls and Cows</text>
  <rect x="52" y="130" width="1096" height="440" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="190" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">secret: 1 8 0 7</text>
  <text x="90" y="235" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">guess : 7 8 1 0</text>
  <text x="90" y="295" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Bull: same digit + same index (here: digit 8 at index 1)</text>
  <text x="90" y="340" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">Cow: same digit + different index (digits 1,0,7)</text>
  <rect x="90" y="380" width="1020" height="150" rx="12" fill="#111827" stroke="#334155"/>
  <text x="120" y="435" fill="#e5e7eb" font-size="26" font-family="JetBrains Mono,Consolas,monospace">One-pass balance array cnt[10]:</text>
  <text x="120" y="475" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">if cnt[s] &lt; 0 ⇒ cows++   if cnt[g] &gt; 0 ⇒ cows++</text>
  <text x="120" y="515" fill="#93c5fd" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Result example: 1A3B</text>
</svg>
