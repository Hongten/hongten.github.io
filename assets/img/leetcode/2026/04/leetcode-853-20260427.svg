<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 853 Car Fleet reverse scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 853: Car Fleet</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Sort by position, scan from right, merge by arrival time</text>

  <line x1="80" y1="360" x2="1120" y2="360" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="1120,360 1094,346 1094,374" fill="#94a3b8"/>
  <text x="1126" y="366" fill="#f8fafc" font-size="22" font-family="Inter,Arial,sans-serif">target</text>

  <circle cx="240" cy="360" r="28" fill="#22d3ee"/>
  <circle cx="450" cy="360" r="28" fill="#34d399"/>
  <circle cx="700" cy="360" r="28" fill="#fbbf24"/>
  <circle cx="910" cy="360" r="28" fill="#fb7185"/>

  <text x="208" y="316" fill="#bae6fd" font-size="20" font-family="Inter,Arial,sans-serif">t=8</text>
  <text x="418" y="316" fill="#bbf7d0" font-size="20" font-family="Inter,Arial,sans-serif">t=6</text>
  <text x="668" y="316" fill="#fde68a" font-size="20" font-family="Inter,Arial,sans-serif">t=3</text>
  <text x="878" y="316" fill="#fecdd3" font-size="20" font-family="Inter,Arial,sans-serif">t=3</text>

  <text x="680" y="430" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Same or smaller time joins fleet ahead</text>
  <text x="56" y="578" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
