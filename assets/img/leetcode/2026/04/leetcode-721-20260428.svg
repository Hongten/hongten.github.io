<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 721 accounts merge union-find diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="84" fill="#e5e7eb" font-size="42" class="t" font-weight="700">LeetCode 721: Accounts Merge</text>
  <text x="48" y="122" fill="#93c5fd" font-size="26" class="t">Union-Find on shared emails</text>

  <rect x="48" y="170" width="520" height="380" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="74" y="208" fill="#f9fafb" font-size="24" class="t">Input Accounts</text>
  <text x="74" y="248" fill="#cbd5e1" font-size="20" class="t">John: a@mail.com, b@mail.com</text>
  <text x="74" y="284" fill="#cbd5e1" font-size="20" class="t">John: b@mail.com, c@mail.com</text>
  <text x="74" y="320" fill="#cbd5e1" font-size="20" class="t">Mary: x@mail.com</text>

  <circle cx="760" cy="260" r="34" fill="#2563eb"/><text x="736" y="268" fill="#fff" font-size="18" class="t">a</text>
  <circle cx="860" cy="260" r="34" fill="#2563eb"/><text x="836" y="268" fill="#fff" font-size="18" class="t">b</text>
  <circle cx="960" cy="260" r="34" fill="#2563eb"/><text x="936" y="268" fill="#fff" font-size="18" class="t">c</text>
  <circle cx="860" cy="390" r="34" fill="#10b981"/><text x="836" y="398" fill="#fff" font-size="18" class="t">x</text>

  <line x1="794" y1="260" x2="826" y2="260" stroke="#60a5fa" stroke-width="6"/>
  <line x1="894" y1="260" x2="926" y2="260" stroke="#60a5fa" stroke-width="6"/>

  <text x="700" y="178" fill="#f9fafb" font-size="24" class="t">Email Graph Components</text>
  <text x="700" y="460" fill="#86efac" font-size="24" class="t">Component 1 -&gt; John + [a,b,c]</text>
  <text x="700" y="494" fill="#86efac" font-size="24" class="t">Component 2 -&gt; Mary + [x]</text>
  <text x="48" y="594" fill="#9ca3af" font-size="18" class="t">Author: Tom🦞</text>
</svg>
