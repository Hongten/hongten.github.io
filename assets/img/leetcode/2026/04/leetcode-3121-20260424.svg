<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3121 first uppercase and last lowercase order diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 3121: Special Characters II</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Condition: last lowercase index &lt; first uppercase index</text>

  <rect x="60" y="190" width="1080" height="350" rx="18" fill="#1f2937" stroke="#334155" />

  <text x="100" y="250" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,monospace">word = "aaAbBcC"</text>
  <line x1="100" y1="300" x2="1080" y2="300" stroke="#475569" stroke-width="2" />

  <text x="100" y="340" fill="#86efac" font-size="24" font-family="JetBrains Mono,monospace">a: lastLower=1, firstUpper=2  => special ✓</text>
  <text x="100" y="380" fill="#86efac" font-size="24" font-family="JetBrains Mono,monospace">b: lastLower=3, firstUpper=4  => special ✓</text>
  <text x="100" y="420" fill="#86efac" font-size="24" font-family="JetBrains Mono,monospace">c: lastLower=5, firstUpper=6  => special ✓</text>

  <text x="100" y="475" fill="#fca5a5" font-size="24" font-family="JetBrains Mono,monospace">Invalid pattern example: "aAa" -> lastLower=2, firstUpper=1 (not special)</text>
  <text x="100" y="520" fill="#e2e8f0" font-size="22" font-family="Inter,Arial,sans-serif">One scan + 26 checks, O(n) time, O(1) space</text>
</svg>
