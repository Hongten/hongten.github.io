<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1175 Prime Arrangements diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="110" fill="#e5e7eb" font-size="50" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1175: Prime Arrangements</text>
  <rect x="60" y="170" width="1080" height="380" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="245" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">Count primes in [1..n]: p</text>
  <text x="90" y="305" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">Prime positions: p, non-prime positions: n-p</text>
  <text x="90" y="385" fill="#86efac" font-size="48" font-family="JetBrains Mono,Consolas,monospace">Answer = p! × (n-p)! mod 1e9+7</text>
  <text x="90" y="470" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">Use sieve to count p, then factorial modulo multiplication</text>
  <text x="90" y="525" fill="#c4b5fd" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
