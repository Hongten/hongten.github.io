<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 175 LEFT JOIN diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="68" fill="#e5e7eb" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 175 · Combine Two Tables</text>
  <text x="48" y="108" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">LEFT JOIN keeps all Person rows, attaches Address when matched</text>

  <rect x="48" y="150" width="460" height="380" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="72" y="188" fill="#f9fafb" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Person (left table)</text>
  <text x="72" y="225" fill="#cbd5e1" font-size="20" font-family="monospace">personId | firstName | lastName</text>
  <text x="72" y="265" fill="#e5e7eb" font-size="20" font-family="monospace">1        | Allen     | Wang</text>
  <text x="72" y="300" fill="#e5e7eb" font-size="20" font-family="monospace">2        | Bob       | Alice</text>

  <rect x="692" y="150" width="460" height="380" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="716" y="188" fill="#f9fafb" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Address (right table)</text>
  <text x="716" y="225" fill="#cbd5e1" font-size="20" font-family="monospace">personId | city          | state</text>
  <text x="716" y="265" fill="#e5e7eb" font-size="20" font-family="monospace">2        | New York      | NY</text>
  <text x="716" y="300" fill="#e5e7eb" font-size="20" font-family="monospace">3        | Leetcode      | CA</text>

  <path d="M520 290 C610 240, 610 240, 684 290" fill="none" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect x="320" y="550" width="560" height="50" rx="10" fill="#065f46"/>
  <text x="340" y="583" fill="#d1fae5" font-size="24" font-family="Inter,Arial,sans-serif">Result: Allen Wang null null · Bob Alice New York NY</text>
</svg>
