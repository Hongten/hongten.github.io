<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 998 right-spine insertion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:600 26px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .node{fill:#1e293b;stroke:#60a5fa;stroke-width:3}
      .new{fill:#3b0764;stroke:#c084fc;stroke-width:4}
      .text{font:700 26px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .arrow{stroke:#94a3b8;stroke-width:4;fill:none;marker-end:url(#m)}
      .guide{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#fcd34d}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 998: Maximum Binary Tree II</text>
  <text x="60" y="118" class="sub">Right-Spine Insertion (append value)</text>

  <text x="170" y="180" class="label">Original tree (right chain checked)</text>
  <circle cx="250" cy="250" r="34" class="node"/><text x="250" y="250" class="text">5</text>
  <circle cx="360" cy="340" r="34" class="node"/><text x="360" y="340" class="text">4</text>
  <circle cx="470" cy="430" r="34" class="node"/><text x="470" y="430" class="text">2</text>
  <path d="M278 272 L332 318" class="arrow"/>
  <path d="M388 362 L442 408" class="arrow"/>

  <text x="585" y="300" class="guide">append val = 6, since 6 &gt; 5</text>
  <path d="M560 320 L700 320" class="arrow"/>

  <text x="790" y="180" class="label">After insertion</text>
  <circle cx="830" cy="250" r="38" class="new"/><text x="830" y="250" class="text">6</text>
  <circle cx="960" cy="360" r="34" class="node"/><text x="960" y="360" class="text">5</text>
  <circle cx="1060" cy="450" r="34" class="node"/><text x="1060" y="450" class="text">4</text>
  <path d="M860 278 L934 336" class="arrow"/>
  <path d="M987 383 L1034 427" class="arrow"/>
  <text x="910" y="226" class="guide">new root</text>

  <text x="60" y="585" class="label">Rule: if val is greater than current root, make val new root and attach old tree as left child; otherwise recurse right.</text>
</svg>
