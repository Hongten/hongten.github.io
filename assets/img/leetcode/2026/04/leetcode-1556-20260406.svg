<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1556 Thousand Separator diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">LeetCode 1556 · Thousand Separator</text>
  <text x="60" y="140" fill="#94a3b8" font-size="28" font-family="Arial, Helvetica, sans-serif">Insert dots every 3 digits from right to left</text>

  <rect x="70" y="205" width="1060" height="320" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="110" y="270" fill="#cbd5e1" font-size="28" font-family="Consolas, monospace">n = 987654321</text>

  <g font-family="Consolas, monospace" font-size="54" font-weight="700">
    <text x="110" y="360" fill="#f8fafc">987654321</text>
    <text x="110" y="440" fill="#22d3ee">987.654.321</text>
  </g>

  <g stroke="#64748b" stroke-width="3" fill="none">
    <line x1="390" y1="375" x2="390" y2="415"/>
    <line x1="615" y1="375" x2="615" y2="415"/>
  </g>
  <g fill="#a5b4fc" font-size="22" font-family="Arial, Helvetica, sans-serif">
    <text x="330" y="475">3 digits</text>
    <text x="560" y="475">3 digits</text>
  </g>

  <text x="70" y="585" fill="#94a3b8" font-size="22" font-family="Arial, Helvetica, sans-serif">Group by 3 from the right, then join groups with '.'</text>
</svg>
