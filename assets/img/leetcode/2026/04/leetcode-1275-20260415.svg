<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1275 tic tac toe winner counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1275 · Find Winner on a Tic Tac Toe Game</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Row / Column / Diagonal Counters</text>

  <rect x="70" y="180" width="360" height="360" rx="12" fill="#111827" stroke="#4b5563" stroke-width="3"/>
  <line x1="190" y1="180" x2="190" y2="540" stroke="#6b7280" stroke-width="4"/>
  <line x1="310" y1="180" x2="310" y2="540" stroke="#6b7280" stroke-width="4"/>
  <line x1="70" y1="300" x2="430" y2="300" stroke="#6b7280" stroke-width="4"/>
  <line x1="70" y1="420" x2="430" y2="420" stroke="#6b7280" stroke-width="4"/>

  <text x="115" y="265" fill="#34d399" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">X</text>
  <text x="235" y="265" fill="#fca5a5" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">O</text>
  <text x="355" y="265" fill="#34d399" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">X</text>
  <text x="115" y="385" fill="#fca5a5" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">O</text>
  <text x="235" y="385" fill="#34d399" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">X</text>
  <text x="355" y="385" fill="#fca5a5" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">O</text>
  <text x="115" y="505" fill="#94a3b8" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">·</text>
  <text x="235" y="505" fill="#94a3b8" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">·</text>
  <text x="355" y="505" fill="#34d399" font-size="84" font-family="Inter,Arial,sans-serif" font-weight="700">X</text>

  <line x1="100" y1="215" x2="400" y2="515" stroke="#22d3ee" stroke-width="8" stroke-linecap="round"/>
  <text x="500" y="250" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">A = +1, B = -1</text>
  <text x="500" y="305" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">rows[r] += delta</text>
  <text x="500" y="355" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">cols[c] += delta</text>
  <text x="500" y="405" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">diag / antiDiag += delta</text>
  <text x="500" y="470" fill="#86efac" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="700">|counter| == 3  =>  winner</text>
  <text x="500" y="530" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second, full code tabs</text>
