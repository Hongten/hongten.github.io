<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 186 reverse words in-place diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="78" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 186 · Reverse Words in a String II</text>
  <text x="48" y="122" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">In-place strategy: reverse all, then reverse each word</text>

  <rect x="48" y="170" width="1104" height="180" rx="16" fill="#111827" stroke="#374151"/>
  <text x="78" y="222" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Original:   the sky is blue</text>
  <text x="78" y="272" fill="#fbbf24" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Step 1:     eulb si yks eht   (reverse whole array)</text>
  <text x="78" y="322" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Step 2:     blue is sky the   (reverse each word)</text>

  <g transform="translate(48,390)">
    <rect x="0" y="0" width="280" height="170" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="38" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Two Pointers</text>
    <text x="22" y="76" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">• reverse(l, r)</text>
    <text x="22" y="108" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">• scan by spaces</text>
    <text x="22" y="140" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">• O(n), O(1)</text>
  </g>

  <g transform="translate(368,390)">
    <rect x="0" y="0" width="784" height="170" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="24" y="44" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">Word boundaries</text>
    <line x1="24" y1="84" x2="760" y2="84" stroke="#64748b" stroke-width="2"/>
    <line x1="150" y1="70" x2="150" y2="120" stroke="#22d3ee" stroke-width="4"/>
    <line x1="300" y1="70" x2="300" y2="120" stroke="#22d3ee" stroke-width="4"/>
    <line x1="420" y1="70" x2="420" y2="120" stroke="#22d3ee" stroke-width="4"/>
    <line x1="580" y1="70" x2="580" y2="120" stroke="#22d3ee" stroke-width="4"/>
    <text x="24" y="154" fill="#a7f3d0" font-size="20" font-family="Inter,Arial,sans-serif">Reverse segments between spaces after global reverse.</text>
  </g>
</svg>
