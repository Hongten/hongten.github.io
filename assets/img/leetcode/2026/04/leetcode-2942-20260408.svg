<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#93c5fd" font-size="34" font-family="Arial, sans-serif">LeetCode 2942</text>
  <text x="60" y="150" fill="#ffffff" font-size="48" font-weight="700" font-family="Arial, sans-serif">Find Words Containing Character</text>
  <rect x="60" y="210" width="1080" height="320" rx="18" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="260" fill="#bfdbfe" font-size="30" font-family="Consolas, monospace">words = ["leet", "code", "openclaw", "tom"]</text>
  <text x="90" y="310" fill="#bfdbfe" font-size="30" font-family="Consolas, monospace">x = 'o'</text>
  <text x="90" y="390" fill="#ffffff" font-size="30" font-family="Consolas, monospace">scan i=0..n-1:</text>
  <text x="130" y="435" fill="#86efac" font-size="30" font-family="Consolas, monospace">"code" contains 'o'  -> add index 1</text>
  <text x="130" y="475" fill="#86efac" font-size="30" font-family="Consolas, monospace">"openclaw" contains 'o' -> add index 2</text>
  <text x="90" y="555" fill="#fde68a" font-size="34" font-family="Consolas, monospace">result = [1, 2]</text>
</svg>
