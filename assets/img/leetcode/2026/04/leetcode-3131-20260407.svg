<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 3131 minimum alignment</title>
  <desc id="desc">Diagram showing nums1 and nums2 minimum values with constant shift x.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="110" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 3131</text>
  <text x="70" y="160" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Find the Integer Added to Array I</text>
  <rect x="70" y="220" width="470" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="660" y="220" width="470" height="300" rx="16" fill="#111827" stroke="#334155"/>
  <text x="95" y="265" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif">nums1 (original)</text>
  <text x="685" y="265" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif">nums2 (shifted)</text>
  <text x="105" y="330" fill="#cbd5e1" font-size="34" font-family="monospace">[2, 6, 4]</text>
  <text x="695" y="330" fill="#cbd5e1" font-size="34" font-family="monospace">[5, 9, 7]</text>
  <text x="105" y="395" fill="#facc15" font-size="28" font-family="Arial, sans-serif">min(nums1) = 2</text>
  <text x="695" y="395" fill="#facc15" font-size="28" font-family="Arial, sans-serif">min(nums2) = 5</text>
  <path d="M560 360 L640 360" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <text x="565" y="340" fill="#38bdf8" font-size="30" font-family="Arial, sans-serif" font-weight="700">+ x</text>
  <text x="370" y="485" fill="#a7f3d0" font-size="30" font-family="Arial, sans-serif">x = min(nums2) - min(nums1) = 3</text>
</svg>
