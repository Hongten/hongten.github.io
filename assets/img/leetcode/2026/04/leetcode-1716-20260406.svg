<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1716 weekly arithmetic progression diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1716 · Weekly Deposit Pattern</text>
  <text x="56" y="130" fill="#93c5fd" font-size="27" font-family="Inter,Arial,sans-serif">Arithmetic progression by full weeks + remaining days</text>

  <g font-family="Inter,Arial,sans-serif" font-size="24" text-anchor="middle">
    <rect x="70" y="190" width="500" height="180" rx="16" fill="#111827" stroke="#334155"/>
    <text x="320" y="226" fill="#cbd5e1" font-size="26">Week 1</text>
    <text x="320" y="260" fill="#86efac">1 2 3 4 5 6 7</text>
    <text x="320" y="300" fill="#e5e7eb">sum = 28</text>
    <text x="320" y="336" fill="#93c5fd">next week: each value +1</text>

    <rect x="630" y="190" width="500" height="180" rx="16" fill="#111827" stroke="#334155"/>
    <text x="880" y="226" fill="#cbd5e1" font-size="26">Week w+1</text>
    <text x="880" y="260" fill="#86efac">w+1, w+2, ..., w+7</text>
    <text x="880" y="300" fill="#e5e7eb">sum = 28 + 7w</text>
    <text x="880" y="336" fill="#93c5fd">AP on week sums: 28, 35, 42 ...</text>
  </g>

  <rect x="70" y="410" width="1060" height="150" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="455" fill="#f8fafc" font-size="30" font-family="Inter,Arial,sans-serif">Total = fullWeeksSum + remainingDaysSum</text>
  <text x="100" y="500" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">fullWeeksSum = weeks*28 + 7*weeks*(weeks-1)/2</text>
  <text x="100" y="536" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">remainingDays start from (weeks+1), length = days</text>
</svg>
