<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1833 Maximum Ice Cream Bars greedy diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172036"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#f8fafc" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1833 · Maximum Ice Cream Bars</text>
  <text x="56" y="138" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Sort costs, buy cheapest first until coins run out</text>

  <rect x="56" y="188" width="1088" height="360" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="88" y="246" fill="#cbd5e1" font-size="26" font-family="JetBrains Mono,Consolas,monospace">costs: [6,1,3,2,4,1]   coins: 7</text>
  <text x="88" y="292" fill="#22d3ee" font-size="26" font-family="JetBrains Mono,Consolas,monospace">sorted: [1,1,2,3,4,6]</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="24">
    <text x="88" y="344" fill="#86efac">buy 1  -&gt; remain 6  count 1</text>
    <text x="88" y="382" fill="#86efac">buy 1  -&gt; remain 5  count 2</text>
    <text x="88" y="420" fill="#86efac">buy 2  -&gt; remain 3  count 3</text>
    <text x="88" y="458" fill="#86efac">buy 3  -&gt; remain 0  count 4</text>
    <text x="88" y="496" fill="#fca5a5">next cost 4 &gt; remain 0  -&gt; stop</text>
  </g>

  <text x="88" y="534" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = 4</text>
  <text x="920" y="596" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
