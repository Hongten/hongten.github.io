<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2744 reverse pair matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2744 · Reverse Match Counting</text>

  <rect x="60" y="130" width="1080" height="430" rx="18" fill="#111827" stroke="#334155"/>

  <text x="100" y="190" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">words: [cd, ac, dc, ca, zz]</text>

  <rect x="100" y="230" width="180" height="76" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="148" y="277" fill="#f8fafc" font-size="36" font-family="JetBrains Mono, monospace">cd</text>

  <text x="316" y="277" fill="#fbbf24" font-size="40" font-family="Inter,Arial,sans-serif">↔</text>

  <rect x="370" y="230" width="180" height="76" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="418" y="277" fill="#f8fafc" font-size="36" font-family="JetBrains Mono, monospace">dc</text>

  <text x="590" y="275" fill="#22c55e" font-size="30" font-family="Inter,Arial,sans-serif">seen has reverse → +1 pair</text>

  <rect x="100" y="340" width="180" height="76" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="148" y="387" fill="#f8fafc" font-size="36" font-family="JetBrains Mono, monospace">ac</text>

  <text x="316" y="387" fill="#fbbf24" font-size="40" font-family="Inter,Arial,sans-serif">↔</text>

  <rect x="370" y="340" width="180" height="76" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="418" y="387" fill="#f8fafc" font-size="36" font-family="JetBrains Mono, monospace">ca</text>

  <text x="590" y="385" fill="#22c55e" font-size="30" font-family="Inter,Arial,sans-serif">seen has reverse → +1 pair</text>

  <text x="100" y="490" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">zz ↔ zz is ignored because each string appears once (distinct words).</text>
  <text x="100" y="535" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Answer = 2</text>
</svg>
