<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 747 dominant index diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="42" font-weight="700">LeetCode 747</text>
  <text x="70" y="136" fill="#94a3b8" font-family="Arial, sans-serif" font-size="28">Largest Number At Least Twice of Others</text>

  <line x1="90" y1="520" x2="1120" y2="520" stroke="#475569" stroke-width="2"/>

  <rect x="150" y="420" width="120" height="100" rx="10" fill="#334155"/>
  <rect x="330" y="360" width="120" height="160" rx="10" fill="#475569"/>
  <rect x="510" y="230" width="120" height="290" rx="10" fill="#22c55e"/>
  <rect x="690" y="300" width="120" height="220" rx="10" fill="#64748b"/>
  <rect x="870" y="390" width="120" height="130" rx="10" fill="#334155"/>

  <text x="540" y="215" fill="#86efac" font-family="Arial, sans-serif" font-size="24" font-weight="700">max1</text>
  <text x="705" y="285" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="24" font-weight="700">max2</text>

  <path d="M 640 245 C 700 245, 730 245, 810 245" stroke="#f59e0b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="650" y="235" fill="#fbbf24" font-family="Arial, sans-serif" font-size="24">check: max1 ≥ 2 × max2 ?</text>

  <text x="70" y="580" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24">One-pass top-2 tracking · O(n) time · O(1) space</text>
</svg>
