<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1034 Coloring A Border DFS diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#18233a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1034 · Coloring A Border</text>
  <text x="60" y="128" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">DFS over connected component, recolor border cells only</text>

  <rect x="70" y="180" width="500" height="380" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="218" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Component and Border Detection</text>

  <g transform="translate(100,245)">
    <rect x="0" y="0" width="70" height="70" fill="#1e293b" stroke="#64748b"/>
    <rect x="70" y="0" width="70" height="70" fill="#0284c7" stroke="#64748b"/>
    <rect x="140" y="0" width="70" height="70" fill="#0284c7" stroke="#64748b"/>
    <rect x="210" y="0" width="70" height="70" fill="#1e293b" stroke="#64748b"/>

    <rect x="0" y="70" width="70" height="70" fill="#0284c7" stroke="#64748b"/>
    <rect x="70" y="70" width="70" height="70" fill="#0284c7" stroke="#f59e0b" stroke-width="3"/>
    <rect x="140" y="70" width="70" height="70" fill="#0284c7" stroke="#f59e0b" stroke-width="3"/>
    <rect x="210" y="70" width="70" height="70" fill="#0284c7" stroke="#64748b"/>

    <rect x="0" y="140" width="70" height="70" fill="#1e293b" stroke="#64748b"/>
    <rect x="70" y="140" width="70" height="70" fill="#0284c7" stroke="#f59e0b" stroke-width="3"/>
    <rect x="140" y="140" width="70" height="70" fill="#0284c7" stroke="#f59e0b" stroke-width="3"/>
    <rect x="210" y="140" width="70" height="70" fill="#1e293b" stroke="#64748b"/>

    <rect x="0" y="210" width="70" height="70" fill="#1e293b" stroke="#64748b"/>
    <rect x="70" y="210" width="70" height="70" fill="#1e293b" stroke="#64748b"/>
    <rect x="140" y="210" width="70" height="70" fill="#0284c7" stroke="#64748b"/>
    <rect x="210" y="210" width="70" height="70" fill="#1e293b" stroke="#64748b"/>

    <text x="77" y="114" fill="#ffffff" font-size="20" font-family="Inter,Arial,sans-serif">S</text>
  </g>

  <rect x="630" y="180" width="500" height="380" rx="18" fill="#111827" stroke="#334155"/>
  <text x="655" y="230" fill="#e2e8f0" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Border Rule</text>
  <text x="655" y="275" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">1) Cell on outer frame => border</text>
  <text x="655" y="315" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">2) Neighbor has different color => border</text>
  <text x="655" y="355" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">3) DFS visits same-color component only</text>
  <text x="655" y="395" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Recolor only recorded border cells</text>
  <text x="655" y="452" fill="#f59e0b" font-size="22" font-family="Inter,Arial,sans-serif">Orange outline = cells to repaint</text>
  <text x="655" y="495" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Inner same-color cells remain unchanged</text>
</svg>
