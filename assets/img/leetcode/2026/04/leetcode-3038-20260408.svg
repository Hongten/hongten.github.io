<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3038 fixed score pair validation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Inter',Arial,sans-serif;fill:#e2e8f0}
      .text{font:500 26px 'Inter',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#475569;stroke-width:2;rx:14}
      .num{font:700 30px 'JetBrains Mono',monospace;fill:#93c5fd}
      .sum{font:700 28px 'Inter',Arial,sans-serif;fill:#86efac}
      .bad{font:700 28px 'Inter',Arial,sans-serif;fill:#fca5a5}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="76" class="title">LeetCode 3038 · Fixed Score from First Pair</text>
  <text x="48" y="118" class="text">Target = nums[0] + nums[1], then check (2,3), (4,5), ... sequentially</text>

  <rect class="box" x="48" y="170" width="1104" height="380"/>
  <text x="92" y="240" class="text">Example: [3, 2, 1, 4, 5, 0]</text>

  <rect class="box" x="92" y="280" width="140" height="90"/><text x="130" y="336" class="num">3</text>
  <rect class="box" x="252" y="280" width="140" height="90"/><text x="290" y="336" class="num">2</text>
  <text x="410" y="336" class="sum">score = 5 (target)</text>

  <rect class="box" x="92" y="400" width="140" height="90"/><text x="130" y="456" class="num">1</text>
  <rect class="box" x="252" y="400" width="140" height="90"/><text x="290" y="456" class="num">4</text>
  <text x="410" y="456" class="sum">score = 5 ✓</text>

  <rect class="box" x="650" y="400" width="140" height="90"/><text x="688" y="456" class="num">5</text>
  <rect class="box" x="810" y="400" width="140" height="90"/><text x="848" y="456" class="num">0</text>
  <text x="968" y="456" class="sum">score = 5 ✓</text>

  <text x="92" y="525" class="text">If any next pair sum != target, stop immediately.</text>
</svg>