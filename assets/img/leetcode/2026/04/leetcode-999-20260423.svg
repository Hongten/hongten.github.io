<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 999 rook directional scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <rect width="52" height="52" fill="#0f172a"/>
      <rect width="26" height="26" fill="#1f2937"/>
      <rect x="26" y="26" width="26" height="26" fill="#1f2937"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 999 · Available Captures for Rook</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Directional scan from rook, blocked by bishops, capture first pawn</text>

  <rect x="120" y="180" width="416" height="416" rx="14" fill="url(#grid)" stroke="#475569" stroke-width="2"/>

  <text x="332" y="406" text-anchor="middle" fill="#f8fafc" font-size="48" font-family="Inter,Arial,sans-serif" font-weight="700">R</text>
  <circle cx="332" cy="388" r="34" fill="none" stroke="#22d3ee" stroke-width="4"/>

  <text x="332" y="254" text-anchor="middle" fill="#f8fafc" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">p</text>
  <circle cx="332" cy="236" r="28" fill="none" stroke="#34d399" stroke-width="3"/>

  <text x="332" y="566" text-anchor="middle" fill="#f8fafc" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">B</text>
  <rect x="304" y="534" width="56" height="56" rx="10" fill="none" stroke="#fb7185" stroke-width="3"/>

  <text x="202" y="406" text-anchor="middle" fill="#f8fafc" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">p</text>
  <circle cx="202" cy="388" r="28" fill="none" stroke="#34d399" stroke-width="3"/>

  <text x="462" y="406" text-anchor="middle" fill="#f8fafc" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">B</text>
  <rect x="434" y="374" width="56" height="56" rx="10" fill="none" stroke="#fb7185" stroke-width="3"/>

  <line x1="332" y1="360" x2="332" y2="276" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="304" y1="388" x2="230" y2="388" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="360" y1="388" x2="424" y2="388" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="332" y1="416" x2="332" y2="520" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="590" y="190" width="520" height="380" rx="16" fill="#111827" stroke="#334155"/>
  <text x="620" y="248" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Scan Rule</text>
  <text x="620" y="298" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">1) Locate rook R.</text>
  <text x="620" y="338" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">2) Move in 4 directions.</text>
  <text x="620" y="378" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">3) First B: blocked, stop.</text>
  <text x="620" y="418" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">4) First p: capture +1, stop.</text>
  <text x="620" y="458" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">5) Sum all directions.</text>
  <text x="620" y="530" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
