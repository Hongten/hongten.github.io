<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 476 Number Complement bitmask XOR illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 476 · Number Complement</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Build same-length mask, then XOR to flip only valid bits</text>

  <rect x="60" y="200" width="1080" height="340" rx="18" fill="#111827" stroke="#334155"/>

  <text x="100" y="270" fill="#cbd5e1" font-size="28" font-family="Consolas, monospace">num   = 5  = 00101</text>
  <text x="100" y="330" fill="#fbbf24" font-size="28" font-family="Consolas, monospace">mask  = 7  = 00111</text>
  <text x="100" y="390" fill="#e2e8f0" font-size="28" font-family="Consolas, monospace">-------------------</text>
  <text x="100" y="450" fill="#34d399" font-size="32" font-family="Consolas, monospace" font-weight="700">mask ^ num = 00010 = 2</text>

  <text x="680" y="270" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Mask grows by:</text>
  <text x="680" y="320" fill="#94a3b8" font-size="24" font-family="Consolas, monospace">mask = (mask &lt;&lt; 1) | 1</text>
  <text x="680" y="370" fill="#94a3b8" font-size="24" font-family="Consolas, monospace">1 → 3 → 7 (cover all bits)</text>

  <text x="60" y="590" fill="#64748b" font-size="22" font-family="Arial, sans-serif">Only flip within the highest set bit range, avoid using ~num directly.</text>
</svg>
