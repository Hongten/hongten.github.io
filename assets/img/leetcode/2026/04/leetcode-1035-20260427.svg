<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1035 uncrossed lines DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1035: Uncrossed Lines</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Transform to Longest Common Subsequence (LCS)</text>

  <rect x="56" y="170" width="1088" height="392" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="220" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">nums1: [1,4,2]</text>
  <text x="90" y="255" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">nums2: [1,2,4]</text>

  <text x="90" y="310" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">DP Table (dp[i][j])</text>
  <rect x="90" y="330" width="380" height="190" fill="#0f172a" stroke="#475569"/>
  <path d="M90 378 H470 M90 426 H470 M90 474 H470 M166 330 V520 M242 330 V520 M318 330 V520 M394 330 V520" stroke="#334155"/>
  <text x="110" y="365" fill="#93c5fd" font-size="24" font-family="monospace">0 0 0 0 0</text>
  <text x="110" y="413" fill="#93c5fd" font-size="24" font-family="monospace">0 1 1 1 1</text>
  <text x="110" y="461" fill="#93c5fd" font-size="24" font-family="monospace">0 1 1 2 2</text>
  <text x="110" y="509" fill="#93c5fd" font-size="24" font-family="monospace">0 1 2 2 2</text>

  <text x="520" y="360" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">If nums1[i-1] == nums2[j-1]</text>
  <text x="520" y="395" fill="#fca5a5" font-size="30" font-family="monospace">dp[i][j] = dp[i-1][j-1] + 1</text>
  <text x="520" y="445" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Else</text>
  <text x="520" y="480" fill="#fcd34d" font-size="30" font-family="monospace">dp[i][j] = max(top, left)</text>

  <text x="56" y="600" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文 · Java/Go/C++/Python/JS tabs</text>
</svg>
