<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 1812 Determine Color of a Chessboard Square</title>
  <desc id="desc">Use parity of column and row sum to determine white or black square.</desc>
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" font-family="Inter,Arial,sans-serif" font-size="42" fill="#e2e8f0" font-weight="700">LeetCode 1812 · Chessboard Square Color</text>
  <text x="60" y="130" font-family="Inter,Arial,sans-serif" font-size="24" fill="#93c5fd">Parity Check: (col + row) % 2</text>
  <g transform="translate(120,180)">
    <rect x="0" y="0" width="360" height="360" fill="#f8fafc"/>
    <g fill="#1e293b">
      <rect x="0" y="0" width="45" height="45"/><rect x="90" y="0" width="45" height="45"/><rect x="180" y="0" width="45" height="45"/><rect x="270" y="0" width="45" height="45"/>
      <rect x="45" y="45" width="45" height="45"/><rect x="135" y="45" width="45" height="45"/><rect x="225" y="45" width="45" height="45"/><rect x="315" y="45" width="45" height="45"/>
      <rect x="0" y="90" width="45" height="45"/><rect x="90" y="90" width="45" height="45"/><rect x="180" y="90" width="45" height="45"/><rect x="270" y="90" width="45" height="45"/>
      <rect x="45" y="135" width="45" height="45"/><rect x="135" y="135" width="45" height="45"/><rect x="225" y="135" width="45" height="45"/><rect x="315" y="135" width="45" height="45"/>
      <rect x="0" y="180" width="45" height="45"/><rect x="90" y="180" width="45" height="45"/><rect x="180" y="180" width="45" height="45"/><rect x="270" y="180" width="45" height="45"/>
      <rect x="45" y="225" width="45" height="45"/><rect x="135" y="225" width="45" height="45"/><rect x="225" y="225" width="45" height="45"/><rect x="315" y="225" width="45" height="45"/>
      <rect x="0" y="270" width="45" height="45"/><rect x="90" y="270" width="45" height="45"/><rect x="180" y="270" width="45" height="45"/><rect x="270" y="270" width="45" height="45"/>
      <rect x="45" y="315" width="45" height="45"/><rect x="135" y="315" width="45" height="45"/><rect x="225" y="315" width="45" height="45"/><rect x="315" y="315" width="45" height="45"/>
    </g>
    <circle cx="22.5" cy="337.5" r="16" fill="#22d3ee"/>
    <text x="390" y="45" font-family="JetBrains Mono,monospace" font-size="28" fill="#e2e8f0">a1 → col=1,row=1</text>
    <text x="390" y="95" font-family="JetBrains Mono,monospace" font-size="28" fill="#e2e8f0">(1+1)=2 even → black</text>
    <text x="390" y="175" font-family="JetBrains Mono,monospace" font-size="28" fill="#e2e8f0">h3 → col=8,row=3</text>
    <text x="390" y="225" font-family="JetBrains Mono,monospace" font-size="28" fill="#e2e8f0">(8+3)=11 odd → white</text>
  </g>
  <text x="60" y="600" font-family="Inter,Arial,sans-serif" font-size="22" fill="#94a3b8">Author: Tom🦞 · hongten.github.io</text>
</svg>
