<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1287 quarter checkpoint candidate diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .cap{font:500 21px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" class="title">LeetCode 1287 · &gt;25% in Sorted Array</text>
  <text x="60" y="122" class="sub">Check candidates at n/4, n/2, 3n/4, then count by bounds</text>

  <rect x="80" y="190" width="1040" height="180" rx="16" fill="#e2e8f0"/>
  <g transform="translate(110,220)">
    <rect x="0" y="0" width="95" height="110" fill="#cbd5e1"/><rect x="95" y="0" width="95" height="110" fill="#cbd5e1"/>
    <rect x="190" y="0" width="95" height="110" fill="#93c5fd"/><rect x="285" y="0" width="95" height="110" fill="#60a5fa"/>
    <rect x="380" y="0" width="95" height="110" fill="#3b82f6"/><rect x="475" y="0" width="95" height="110" fill="#3b82f6"/>
    <rect x="570" y="0" width="95" height="110" fill="#3b82f6"/><rect x="665" y="0" width="95" height="110" fill="#60a5fa"/>
    <rect x="760" y="0" width="95" height="110" fill="#cbd5e1"/><rect x="855" y="0" width="95" height="110" fill="#cbd5e1"/>
    <text x="220" y="145" class="txt">n/4</text>
    <text x="505" y="145" class="txt">n/2</text>
    <text x="790" y="145" class="txt">3n/4</text>
  </g>

  <text x="80" y="445" class="cap">The dominant value block must cross at least one quarter checkpoint in a sorted array.</text>
  <text x="80" y="485" class="cap">Then binary-search its left/right bounds to confirm frequency &gt; n/4.</text>
</svg>
