<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3066 min-heap merge process">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:42px;font-weight:700}
      .s{font-size:24px;fill:#cbd5e1}
      .b{fill:#1d4ed8;stroke:#93c5fd;stroke-width:2}
      .k{fill:#16a34a;stroke:#86efac;stroke-width:2}
      .a{stroke:#94a3b8;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 3066 · Min-Heap Greedy Merge</text>
  <text x="60" y="130" class="t s">Pop two smallest x, y → push (2x + y), repeat until min ≥ k</text>

  <rect x="90" y="200" width="280" height="220" rx="16" class="b"/>
  <text x="120" y="245" class="t s">Heap top values</text>
  <text x="120" y="300" class="t" font-size="44">x = 2</text>
  <text x="120" y="355" class="t" font-size="44">y = 5</text>

  <line x1="390" y1="310" x2="560" y2="310" class="a"/>

  <rect x="580" y="220" width="270" height="180" rx="16" class="k"/>
  <text x="615" y="280" class="t" font-size="38">new = 2x + y</text>
  <text x="665" y="335" class="t" font-size="44">= 9</text>

  <line x1="860" y1="310" x2="1030" y2="310" class="a"/>

  <rect x="1040" y="230" width="120" height="160" rx="14" class="b"/>
  <text x="1062" y="285" class="t" font-size="24">push</text>
  <text x="1082" y="335" class="t" font-size="42">9</text>

  <text x="60" y="520" class="t s">Time: O(n log n) · Space: O(n) · Always merge two minimum values first.</text>
</svg>
