<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 697 degree of an array frequency and span diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 697 · Degree of an Array</text>
  <text x="56" y="128" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Count frequency + record first/last occurrence</text>

  <rect x="56" y="170" width="1088" height="396" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="230" fill="#f9fafb" font-size="24" font-family="monospace">nums = [1, 2, 2, 3, 1, 4, 2]</text>

  <g font-family="Inter,Arial,sans-serif" font-size="22">
    <text x="90" y="285" fill="#86efac">value 2: freq=3, first=1, last=6, span=6</text>
    <text x="90" y="325" fill="#fca5a5">value 1: freq=2, first=0, last=4, span=5</text>
    <text x="90" y="365" fill="#c4b5fd">degree = 3 → pick min span among freq=3 values</text>
  </g>

  <line x1="250" y1="430" x2="970" y2="430" stroke="#9ca3af" stroke-width="3"/>
  <circle cx="340" cy="430" r="8" fill="#60a5fa"/>
  <circle cx="910" cy="430" r="8" fill="#60a5fa"/>
  <text x="320" y="465" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">first(2)=1</text>
  <text x="878" y="465" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">last(2)=6</text>

  <text x="90" y="530" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">answer = last - first + 1 = 6</text>
  <text x="90" y="560" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
