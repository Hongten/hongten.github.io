<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 661 Image Smoother neighborhood averaging diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 661 · Image Smoother</text>
  <text x="56" y="124" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Average valid neighbors in the 3×3 window, then floor</text>

  <g transform="translate(80,180)">
    <rect x="0" y="0" width="360" height="360" rx="14" fill="#111827" stroke="#4b5563"/>
    <g font-family="JetBrains Mono,Consolas,monospace" font-size="28" fill="#e5e7eb" text-anchor="middle" dominant-baseline="middle">
      <rect x="30" y="30" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="80" y="80">100</text>
      <rect x="130" y="30" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="180" y="80">200</text>
      <rect x="230" y="30" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="280" y="80">100</text>

      <rect x="30" y="130" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="80" y="180">200</text>
      <rect x="130" y="130" width="100" height="100" fill="#065f46" stroke="#34d399" stroke-width="3"/><text x="180" y="180">50</text>
      <rect x="230" y="130" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="280" y="180">200</text>

      <rect x="30" y="230" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="80" y="280">100</text>
      <rect x="130" y="230" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="180" y="280">200</text>
      <rect x="230" y="230" width="100" height="100" fill="#1f2937" stroke="#6b7280"/><text x="280" y="280">100</text>
    </g>
  </g>

  <g transform="translate(500,220)">
    <text x="0" y="0" fill="#f3f4f6" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Center cell smoothing</text>
    <text x="0" y="56" fill="#d1d5db" font-size="30" font-family="Inter,Arial,sans-serif">sum = 1250, count = 9</text>
    <text x="0" y="110" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif">result = floor(1250 / 9) = 138</text>
    <text x="0" y="172" fill="#c4b5fd" font-size="26" font-family="Inter,Arial,sans-serif">Edges/corners use fewer valid neighbors.</text>
    <text x="0" y="220" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
  </g>
</svg>
