<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="100" fill="#e5e7eb" font-size="44">LeetCode 1043 Partition Array for Maximum Sum</text><rect x="60" y="150" width="1080" height="420" rx="14" fill="#111827" stroke="#374151"/><text x="90" y="220" fill="#93c5fd" font-size="30">DP[i] = max(DP[i-len] + max(arr[i-len..i-1]) * len)</text><text x="90" y="280" fill="#86efac" font-size="28">Try len from 1 to k for each i</text><text x="90" y="340" fill="#fca5a5" font-size="28">Maintain rolling max in the last block</text><text x="90" y="410" fill="#e5e7eb" font-size="26">Time: O(n*k), Space: O(n)</text><text x="90" y="500" fill="#e5e7eb" font-size="24">Author: Tom🦞</text></svg>