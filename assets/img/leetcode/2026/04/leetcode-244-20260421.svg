<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 244 indexed positions and two-pointer scan">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 244: Shortest Word Distance II</text>
  <text x="60" y="130" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">Index positions + two pointers</text>

  <rect x="60" y="180" width="1080" height="360" rx="18" fill="#111827" stroke="#334155"/>

  <text x="90" y="235" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">practice makes perfect coding makes</text>
  <text x="90" y="275" fill="#64748b" font-size="20" font-family="Consolas, monospace">0        1     2       3      4</text>

  <text x="90" y="335" fill="#22d3ee" font-size="24" font-family="Arial, sans-serif">word1 = &quot;makes&quot; → [1, 4]</text>
  <text x="90" y="375" fill="#a78bfa" font-size="24" font-family="Arial, sans-serif">word2 = &quot;coding&quot; → [3]</text>

  <circle cx="440" cy="455" r="10" fill="#22d3ee"/>
  <circle cx="760" cy="455" r="10" fill="#a78bfa"/>
  <line x1="450" y1="455" x2="750" y2="455" stroke="#f59e0b" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="500" y="445" fill="#fbbf24" font-size="22" font-family="Arial, sans-serif">min |1 - 3| = 2</text>

  <text x="60" y="595" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif">Build map once, answer each query in O(k + m)</text>
</svg>
