<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1103 candy distribution rounds">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1103 · Distribute Candies to People</text>
  <text x="60" y="130" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">Round-based increasing give: 1, 2, 3, ...</text>

  <g font-family="Arial, sans-serif" font-size="24" fill="#cbd5e1">
    <text x="120" y="220">P1</text><text x="300" y="220">P2</text><text x="480" y="220">P3</text><text x="660" y="220">P4</text>
  </g>
  <g>
    <rect x="90" y="240" width="120" height="56" rx="10" fill="#2563eb"/><text x="145" y="275" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">1</text>
    <rect x="270" y="240" width="120" height="56" rx="10" fill="#2563eb"/><text x="330" y="275" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">2</text>
    <rect x="450" y="240" width="120" height="56" rx="10" fill="#2563eb"/><text x="510" y="275" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">3</text>
    <rect x="630" y="240" width="120" height="56" rx="10" fill="#2563eb"/><text x="690" y="275" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">4</text>

    <rect x="90" y="330" width="120" height="56" rx="10" fill="#0ea5e9"/><text x="145" y="365" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">5</text>
    <rect x="270" y="330" width="120" height="56" rx="10" fill="#0ea5e9"/><text x="330" y="365" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">6</text>
    <rect x="450" y="330" width="120" height="56" rx="10" fill="#0ea5e9"/><text x="510" y="365" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">7</text>
    <rect x="630" y="330" width="120" height="56" rx="10" fill="#0ea5e9"/><text x="690" y="365" fill="#fff" font-size="26" font-family="Arial" text-anchor="middle">8</text>
  </g>

  <text x="60" y="470" fill="#e2e8f0" font-size="28" font-family="Arial">Each step: ans[i % n] += min(remaining, give)</text>
  <text x="60" y="515" fill="#94a3b8" font-size="24" font-family="Arial">Stop when remaining candies == 0</text>
</svg>
