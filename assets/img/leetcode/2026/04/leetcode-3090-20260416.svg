<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3090 sliding window illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#8bd5ff" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 3090 · Sliding Window</text>
  <text x="60" y="140" fill="#e6f1ff" font-size="28" font-family="Arial, sans-serif">Maximum Length Substring With Two Occurrences</text>
  <rect x="90" y="220" width="1020" height="170" rx="14" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="280" fill="#cbd5e1" font-size="30" font-family="Consolas, monospace">s = a b c a a b c b c d</text>
  <rect x="360" y="240" width="500" height="130" rx="10" fill="#1d4ed8" fill-opacity="0.25" stroke="#60a5fa" stroke-width="3"/>
  <text x="370" y="215" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">valid window: each char count ≤ 2</text>
  <text x="390" y="340" fill="#dbeafe" font-size="26" font-family="Arial, sans-serif">[left ... right] expand / shrink</text>
  <text x="90" y="470" fill="#f8fafc" font-size="30" font-family="Arial, sans-serif">Rule: if count(s[right]) &gt; 2, move left until valid.</text>
  <text x="90" y="525" fill="#a7f3d0" font-size="28" font-family="Arial, sans-serif">Answer = max window length during scan (O(n)).</text>
</svg>
