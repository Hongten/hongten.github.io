<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><rect x="70" y="170" width="1060" height="390" rx="20" fill="#1e293b" stroke="#334155"/><text x="70" y="95" fill="#e2e8f0" font-size="48" font-family="Arial">LeetCode 249: Group Shifted Strings</text><text x="110" y="250" fill="#93c5fd" font-size="30" font-family="Arial">Key = differences mod 26</text><text x="110" y="310" fill="#e5e7eb" font-size="26" font-family="monospace">"abc" -> 1#1</text><text x="110" y="360" fill="#e5e7eb" font-size="26" font-family="monospace">"bcd" -> 1#1</text><text x="110" y="410" fill="#e5e7eb" font-size="26" font-family="monospace">"xyz" -> 1#1</text><text x="110" y="470" fill="#86efac" font-size="28" font-family="Arial">Same key => same group</text></svg>