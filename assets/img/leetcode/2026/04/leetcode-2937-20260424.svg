<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2937 longest common prefix and deletions">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2937: Make Three Strings Equal</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Longest Common Prefix + Minimal Deletions</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="250" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">s1: abcxyz</text>
  <text x="100" y="300" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">s2: abcuv</text>
  <text x="100" y="350" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">s3: abc</text>

  <line x1="100" y1="372" x2="380" y2="372" stroke="#22c55e" stroke-width="6"/>
  <text x="100" y="410" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">LCP = "abc"</text>

  <text x="520" y="290" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Ops = (6-3) + (5-3) + (3-3) = 5</text>
  <text x="520" y="340" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Delete only suffixes after LCP</text>
  <text x="520" y="390" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">If LCP length is 0, return -1</text>

  <text x="60" y="595" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
