<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 2336 diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="78" fill="#e2e8f0" font-size="38" font-family="Arial, sans-serif" font-weight="700">LeetCode 2336 - Smallest Number in Infinite Set</text>
  <text x="60" y="116" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Pointer + Min-Heap + HashSet</text>

  <rect x="60" y="170" width="330" height="220" rx="16" fill="#111827" stroke="#334155"/>
  <text x="85" y="210" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="700">Infinite Tail</text>
  <text x="85" y="245" fill="#cbd5e1" font-size="22" font-family="monospace">cur = 7</text>
  <text x="85" y="282" fill="#cbd5e1" font-size="20" font-family="monospace">7, 8, 9, 10, ...</text>
  <text x="85" y="322" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">Never pushed into heap</text>

  <rect x="450" y="170" width="300" height="220" rx="16" fill="#111827" stroke="#334155"/>
  <text x="475" y="210" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="700">Min-Heap</text>
  <text x="475" y="245" fill="#cbd5e1" font-size="22" font-family="monospace">[2, 5]</text>
  <text x="475" y="282" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">Added back numbers</text>
  <text x="475" y="312" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">that are &lt; cur</text>

  <rect x="810" y="170" width="330" height="220" rx="16" fill="#111827" stroke="#334155"/>
  <text x="835" y="210" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="700">HashSet inHeap</text>
  <text x="835" y="245" fill="#cbd5e1" font-size="22" font-family="monospace">{2, 5}</text>
  <text x="835" y="282" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">Prevents duplicate addBack</text>

  <path d="M390 280 L440 280" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 280 L800 280" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="60" y="440" width="1080" height="130" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="482" fill="#e2e8f0" font-size="24" font-family="Arial, sans-serif" font-weight="700">popSmallest()</text>
  <text x="300" y="482" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">if heap not empty -> pop heap min; else return cur and cur++</text>
  <text x="90" y="530" fill="#e2e8f0" font-size="24" font-family="Arial, sans-serif" font-weight="700">addBack(num)</text>
  <text x="300" y="530" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">only when num &lt; cur and num not in inHeap</text>
</svg>
