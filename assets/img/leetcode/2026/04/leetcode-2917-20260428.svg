<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2917 K-or bit counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2917: Find the K-or of an Array</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Count 1-bits per position, keep bits with count ≥ k</text>

  <rect x="60" y="190" width="1080" height="360" rx="16" fill="#0f172a" stroke="#334155"/>

  <text x="100" y="245" fill="#cbd5e1" font-size="24" font-family="monospace">nums = [7, 12, 9, 8], k = 2</text>
  <text x="100" y="290" fill="#e2e8f0" font-size="24" font-family="monospace">bit 3: 12(1100), 9(1001), 8(1000)  → count = 3 ✓</text>
  <text x="100" y="330" fill="#e2e8f0" font-size="24" font-family="monospace">bit 2: 7(0111), 12(1100)           → count = 2 ✓</text>
  <text x="100" y="370" fill="#e2e8f0" font-size="24" font-family="monospace">bit 1: 7(0111)                     → count = 1 ✗</text>
  <text x="100" y="410" fill="#e2e8f0" font-size="24" font-family="monospace">bit 0: 7(0111), 9(1001)            → count = 2 ✓</text>

  <text x="100" y="470" fill="#86efac" font-size="30" font-family="monospace" font-weight="700">answer bits: 1101₂ = 13</text>
  <text x="100" y="520" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
