<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3463 Binomial coefficients mod 10 diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 28px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .num{font:700 30px 'Consolas',monospace;fill:#f8fafc}
      .coef{font:600 22px 'Consolas',monospace;fill:#fde68a}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" class="title">LeetCode 3463</text>
  <text x="60" y="132" class="sub">Check If Digits Are Equal in String After Operations II</text>

  <rect x="60" y="180" width="1080" height="390" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="235" class="txt">Original digits</text>
  <text x="90" y="275" class="num">d0   d1   d2   d3   d4   ...</text>

  <text x="90" y="335" class="txt">Final Left  = Σ C(n-2, i) * d[i]     (mod 10)</text>
  <text x="90" y="385" class="txt">Final Right = Σ C(n-2, i) * d[i+1]   (mod 10)</text>

  <text x="90" y="450" class="coef">Use Lucas(mod 5) + bit rule(mod 2) + CRT ⇒ C(n-2,i) mod 10</text>
  <text x="90" y="505" class="txt">Compare Left and Right directly, no O(n²) simulation.</text>
</svg>
