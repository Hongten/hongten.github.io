<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 645 set mismatch counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" font-size="44" fill="#e2e8f0" font-family="Arial, sans-serif" font-weight="700">LeetCode 645 · Set Mismatch</text>
  <text x="60" y="130" font-size="26" fill="#93c5fd" font-family="Arial, sans-serif">Count frequency in range 1..n</text>

  <rect x="70" y="190" width="1060" height="340" rx="18" fill="#0b1220" stroke="#334155"/>

  <text x="110" y="245" font-size="28" fill="#cbd5e1" font-family="Consolas, monospace">nums = [1, 2, 2, 4]</text>

  <g font-family="Consolas, monospace" font-size="30" font-weight="700">
    <text x="110" y="330" fill="#e2e8f0">value</text>
    <text x="280" y="330" fill="#e2e8f0">1</text>
    <text x="390" y="330" fill="#e2e8f0">2</text>
    <text x="500" y="330" fill="#e2e8f0">3</text>
    <text x="610" y="330" fill="#e2e8f0">4</text>

    <text x="110" y="390" fill="#e2e8f0">count</text>
    <text x="280" y="390" fill="#22c55e">1</text>
    <text x="390" y="390" fill="#f97316">2  ← duplicate</text>
    <text x="500" y="445" fill="#ef4444">0  ← missing</text>
    <text x="610" y="390" fill="#22c55e">1</text>
  </g>

  <text x="110" y="505" font-size="30" fill="#f8fafc" font-family="Arial, sans-serif" font-weight="700">Answer: [2, 3]</text>
</svg>
