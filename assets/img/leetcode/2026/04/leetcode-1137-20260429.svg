<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1137 tribonacci recurrence diagram">
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="50" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1137: N-th Tribonacci Number</text>
  <rect x="60" y="160" width="1080" height="390" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="230" fill="#93c5fd" font-size="36" font-family="Inter,Arial,sans-serif">Transition: T(n) = T(n-1) + T(n-2) + T(n-3)</text>
  <text x="90" y="300" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Base: T0 = 0, T1 = 1, T2 = 1</text>
  <text x="90" y="360" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Rolling DP: keep only (a, b, c)</text>
  <text x="90" y="420" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">Update: next = a + b + c, then shift</text>
  <text x="90" y="500" fill="#c4b5fd" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
