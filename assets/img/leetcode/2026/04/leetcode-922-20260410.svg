<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 922 index parity placement diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#f9fafb" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 922 · Sort Array By Parity II</text>
  <text x="60" y="132" fill="#cbd5e1" font-size="26" font-family="Arial, sans-serif">Even index → even number, odd index → odd number</text>

  <rect x="80" y="210" width="130" height="92" rx="12" fill="#2563eb"/><text x="145" y="266" text-anchor="middle" fill="#fff" font-size="34" font-family="monospace">4</text>
  <rect x="220" y="210" width="130" height="92" rx="12" fill="#dc2626"/><text x="285" y="266" text-anchor="middle" fill="#fff" font-size="34" font-family="monospace">2</text>
  <rect x="360" y="210" width="130" height="92" rx="12" fill="#2563eb"/><text x="425" y="266" text-anchor="middle" fill="#fff" font-size="34" font-family="monospace">5</text>
  <rect x="500" y="210" width="130" height="92" rx="12" fill="#dc2626"/><text x="565" y="266" text-anchor="middle" fill="#fff" font-size="34" font-family="monospace">7</text>
  <text x="80" y="338" fill="#93c5fd" font-size="22" font-family="Arial">index 0 ✅ even</text>
  <text x="220" y="338" fill="#fecaca" font-size="22" font-family="Arial">index 1 ❌ should be odd</text>
  <text x="360" y="338" fill="#fecaca" font-size="22" font-family="Arial">index 2 ❌ should be even</text>
  <text x="500" y="338" fill="#fca5a5" font-size="22" font-family="Arial">index 3 ✅ odd</text>

  <text x="760" y="246" fill="#e5e7eb" font-size="30" font-family="Arial" font-weight="700">Swap mismatched pair:</text>
  <text x="760" y="292" fill="#93c5fd" font-size="26" font-family="monospace">even-index i with odd value</text>
  <text x="760" y="328" fill="#fca5a5" font-size="26" font-family="monospace">odd-index j with even value</text>
  <text x="760" y="390" fill="#d1fae5" font-size="28" font-family="Arial">One swap fixes two positions.</text>
</svg>
