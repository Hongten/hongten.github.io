<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 518 Coin Change II DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Segoe UI,Arial">LeetCode 518 · Coin Change II</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Inter,Segoe UI,Arial">1D DP (combinations, not permutations)</text>

  <rect x="60" y="180" width="1080" height="360" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="230" fill="#cbd5e1" font-size="24" font-family="monospace">Example: amount = 5, coins = [1,2,5]</text>
  <text x="90" y="275" fill="#f8fafc" font-size="24" font-family="monospace">Initialize: dp = [1,0,0,0,0,0]</text>
  <text x="90" y="320" fill="#f8fafc" font-size="24" font-family="monospace">After coin 1: dp = [1,1,1,1,1,1]</text>
  <text x="90" y="365" fill="#f8fafc" font-size="24" font-family="monospace">After coin 2: dp = [1,1,2,2,3,3]</text>
  <text x="90" y="410" fill="#f8fafc" font-size="24" font-family="monospace">After coin 5: dp = [1,1,2,2,3,4]</text>
  <text x="90" y="470" fill="#22c55e" font-size="30" font-family="Inter,Segoe UI,Arial">Answer = dp[5] = 4 combinations</text>
  <text x="90" y="515" fill="#94a3b8" font-size="22" font-family="Inter,Segoe UI,Arial">Loop order: for coin in coins → for s from coin to amount</text>
</svg>
