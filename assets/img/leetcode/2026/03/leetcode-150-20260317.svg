<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 150 stack evaluation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 150: Evaluate Reverse Polish Notation</text>
  <text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Stack simulation: push numbers, pop two on operator, push result</text>

  <rect x="70" y="210" width="420" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="250" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Tokens: ["2","1","+","3","*"]</text>
  <text x="95" y="295" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">1) push 2  → [2]</text>
  <text x="95" y="335" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">2) push 1  → [2, 1]</text>
  <text x="95" y="375" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">3) '+'     → pop 2,1 => 3</text>
  <text x="95" y="415" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">4) push 3  → [3, 3]</text>
  <text x="95" y="455" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">5) '*'     → pop 3,3 => 9</text>
  <text x="95" y="495" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Answer = stack top = 9</text>

  <rect x="560" y="210" width="560" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="590" y="260" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">Operator handling</text>
  <text x="590" y="305" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">right = pop()</text>
  <text x="590" y="345" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">left  = pop()</text>
  <text x="590" y="385" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">push(left op right)</text>
  <text x="590" y="430" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Important: '-' and '/' must keep operand order</text>
  <text x="590" y="470" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Division truncates toward zero</text>
  <text x="590" y="510" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
