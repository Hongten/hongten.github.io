<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 134 Gas Station greedy reset diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f8fafc"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 134 · Gas Station</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif">Greedy Prefix Deficit Reset</text>

  <g transform="translate(90,190)">
    <circle cx="120" cy="110" r="56" fill="#1d4ed8"/>
    <circle cx="300" cy="60" r="56" fill="#0284c7"/>
    <circle cx="500" cy="90" r="56" fill="#0ea5e9"/>
    <circle cx="680" cy="170" r="56" fill="#22c55e"/>
    <circle cx="860" cy="110" r="56" fill="#16a34a"/>

    <text x="96" y="118" fill="white" font-size="24" font-family="Arial">0</text>
    <text x="276" y="68" fill="white" font-size="24" font-family="Arial">1</text>
    <text x="476" y="98" fill="white" font-size="24" font-family="Arial">2</text>
    <text x="656" y="178" fill="white" font-size="24" font-family="Arial">3</text>
    <text x="836" y="118" fill="white" font-size="24" font-family="Arial">4</text>

    <line x1="172" y1="98" x2="246" y2="72" stroke="#f8fafc" stroke-width="4" marker-end="url(#arr)"/>
    <line x1="352" y1="70" x2="444" y2="84" stroke="#f8fafc" stroke-width="4" marker-end="url(#arr)"/>
    <line x1="550" y1="108" x2="624" y2="148" stroke="#f8fafc" stroke-width="4" marker-end="url(#arr)"/>
    <line x1="734" y1="164" x2="804" y2="126" stroke="#f8fafc" stroke-width="4" marker-end="url(#arr)"/>
    <path d="M860 54 C 920 0, 1060 0, 1040 130 C 1028 205, 920 230, 190 150" fill="none" stroke="#f8fafc" stroke-width="4" marker-end="url(#arr)"/>

    <rect x="250" y="210" rx="10" ry="10" width="610" height="90" fill="#111827" stroke="#334155"/>
    <text x="275" y="245" fill="#fbbf24" font-size="24" font-family="Arial" font-weight="700">tank &lt; 0 at i = 2</text>
    <text x="275" y="278" fill="#e2e8f0" font-size="22" font-family="Arial">Discard previous segment, reset start = i + 1</text>
  </g>

  <text x="60" y="575" fill="#cbd5e1" font-size="24" font-family="Arial">If total(gas - cost) ≥ 0, one-pass greedy start is valid.</text>
</svg>
