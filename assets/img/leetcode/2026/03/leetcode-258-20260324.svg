<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 258 digital root modulo 9 cycle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:2;rx:16}
      .txt{font:600 28px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .note{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .arrow{stroke:#f59e0b;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 258 · Add Digits</text>
  <text x="60" y="130" class="sub">Digital Root: num == 0 ? 0 : (num % 9 == 0 ? 9 : num % 9)</text>

  <rect x="80" y="200" width="220" height="110" class="box"/>
  <text x="125" y="265" class="txt">38</text>

  <line x1="300" y1="255" x2="420" y2="255" class="arrow"/>
  <rect x="420" y="200" width="220" height="110" class="box"/>
  <text x="468" y="265" class="txt">3 + 8 = 11</text>

  <line x1="640" y1="255" x2="760" y2="255" class="arrow"/>
  <rect x="760" y="200" width="220" height="110" class="box"/>
  <text x="842" y="265" class="txt">1 + 1 = 2</text>

  <text x="80" y="390" class="note">Modulo-9 cycle: 1,2,3,...,8,9,1,2,...</text>
  <text x="80" y="430" class="note">Special case: 0 stays 0; positive multiples of 9 map to 9.</text>

  <rect x="80" y="470" width="1040" height="90" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="110" y="525" class="sub">Why it works: digit sum preserves value modulo 9, and repeated reduction lands on canonical representative.</text>
</svg>
