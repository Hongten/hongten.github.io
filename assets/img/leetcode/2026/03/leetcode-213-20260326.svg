<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 213 circular houses split">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="74" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 213 · House Robber II</text>
  <text x="50" y="112" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Split circular houses into two linear DP ranges</text>

  <circle cx="360" cy="360" r="180" fill="none" stroke="#60a5fa" stroke-width="4" stroke-dasharray="8 8"/>

  <g font-family="Inter,Arial,sans-serif" font-size="20" text-anchor="middle">
    <g fill="#fde68a" stroke="#f59e0b" stroke-width="2">
      <rect x="330" y="165" width="60" height="40" rx="8"/><text x="360" y="192" fill="#111827">0</text>
      <rect x="450" y="208" width="60" height="40" rx="8"/><text x="480" y="235" fill="#111827">1</text>
      <rect x="510" y="320" width="60" height="40" rx="8"/><text x="540" y="347" fill="#111827">2</text>
      <rect x="450" y="432" width="60" height="40" rx="8"/><text x="480" y="459" fill="#111827">3</text>
      <rect x="330" y="475" width="60" height="40" rx="8"/><text x="360" y="502" fill="#111827">4</text>
      <rect x="210" y="432" width="60" height="40" rx="8"/><text x="240" y="459" fill="#111827">5</text>
      <rect x="150" y="320" width="60" height="40" rx="8"/><text x="180" y="347" fill="#111827">6</text>
      <rect x="210" y="208" width="60" height="40" rx="8"/><text x="240" y="235" fill="#111827">7</text>
    </g>
  </g>

  <path d="M690 210 H1110" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="690" y="194" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">Case A: rob [0..n-2]</text>
  <g fill="#1f2937" stroke="#34d399" stroke-width="2">
    <rect x="700" y="230" width="45" height="32" rx="6"/><rect x="752" y="230" width="45" height="32" rx="6"/><rect x="804" y="230" width="45" height="32" rx="6"/><rect x="856" y="230" width="45" height="32" rx="6"/><rect x="908" y="230" width="45" height="32" rx="6"/>
  </g>

  <path d="M690 370 H1110" stroke="#f472b6" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="690" y="354" fill="#f9a8d4" font-size="24" font-family="Inter,Arial,sans-serif">Case B: rob [1..n-1]</text>
  <g fill="#1f2937" stroke="#f472b6" stroke-width="2">
    <rect x="700" y="390" width="45" height="32" rx="6"/><rect x="752" y="390" width="45" height="32" rx="6"/><rect x="804" y="390" width="45" height="32" rx="6"/><rect x="856" y="390" width="45" height="32" rx="6"/><rect x="908" y="390" width="45" height="32" rx="6"/>
  </g>

  <text x="690" y="510" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Answer = max(LinearDP(case A), LinearDP(case B))</text>
  <text x="50" y="594" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
