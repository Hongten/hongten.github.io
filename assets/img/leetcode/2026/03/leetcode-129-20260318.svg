<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 129 root to leaf number accumulation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#182a45"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#b8ccff}
      .node{fill:#1f3f67;stroke:#80b8ff;stroke-width:3}
      .edge{stroke:#6fa7ff;stroke-width:4}
      .txt{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#f6fbff;text-anchor:middle;dominant-baseline:middle}
      .eq{font:600 28px 'Consolas','SFMono-Regular',monospace;fill:#ffe9a8}
      .sum{font:700 34px 'Consolas','SFMono-Regular',monospace;fill:#8ef0b4}
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="70" y="78" class="title">LeetCode 129 · Sum Root to Leaf Numbers</text>
  <text x="70" y="118" class="sub">DFS invariant: next = current × 10 + node.val</text>

  <line x1="320" y1="230" x2="220" y2="330" class="edge"/>
  <line x1="320" y1="230" x2="430" y2="330" class="edge"/>
  <line x1="220" y1="330" x2="150" y2="430" class="edge"/>
  <line x1="220" y1="330" x2="290" y2="430" class="edge"/>

  <circle cx="320" cy="230" r="42" class="node"/>
  <text x="320" y="230" class="txt">4</text>

  <circle cx="220" cy="330" r="42" class="node"/>
  <text x="220" y="330" class="txt">9</text>

  <circle cx="430" cy="330" r="42" class="node"/>
  <text x="430" y="330" class="txt">0</text>

  <circle cx="150" cy="430" r="42" class="node"/>
  <text x="150" y="430" class="txt">5</text>

  <circle cx="290" cy="430" r="42" class="node"/>
  <text x="290" y="430" class="txt">1</text>

  <text x="620" y="240" class="eq">Path 4→9→5 = 495</text>
  <text x="620" y="290" class="eq">Path 4→9→1 = 491</text>
  <text x="620" y="340" class="eq">Path 4→0 = 40</text>
  <text x="620" y="420" class="sum">Total = 495 + 491 + 40 = 1026</text>
</svg>
