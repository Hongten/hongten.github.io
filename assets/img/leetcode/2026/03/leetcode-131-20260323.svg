<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 131 palindrome partitioning DFS diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <style>
      .title{font:700 44px Inter,Arial,sans-serif;fill:#e2e8f0}
      .sub{font:600 25px Inter,Arial,sans-serif;fill:#93c5fd}
      .label{font:600 22px Inter,Arial,sans-serif;fill:#cbd5e1}
      .node{fill:#1e293b;stroke:#60a5fa;stroke-width:2}
      .edge{stroke:#64748b;stroke-width:2.5}
      .ok{fill:#22c55e}
      .bad{fill:#ef4444}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="72" class="title">LeetCode 131 · Palindrome Partitioning</text>
  <text x="48" y="110" class="sub">DFS over cut positions + DP palindrome pruning</text>

  <line x1="190" y1="220" x2="390" y2="310" class="edge"/>
  <line x1="190" y1="220" x2="390" y2="170" class="edge"/>
  <line x1="190" y1="220" x2="390" y2="450" class="edge"/>

  <rect x="90" y="180" rx="14" ry="14" width="200" height="80" class="node"/>
  <text x="115" y="228" class="label">start=0, "aab"</text>

  <rect x="350" y="130" rx="14" ry="14" width="250" height="80" class="node"/>
  <circle cx="375" cy="170" r="9" class="ok"/>
  <text x="395" y="177" class="label">take "a" → start=1</text>

  <rect x="350" y="270" rx="14" ry="14" width="250" height="80" class="node"/>
  <circle cx="375" cy="310" r="9" class="ok"/>
  <text x="395" y="317" class="label">take "aa" → start=2</text>

  <rect x="350" y="410" rx="14" ry="14" width="250" height="80" class="node"/>
  <circle cx="375" cy="450" r="9" class="bad"/>
  <text x="395" y="457" class="label">"aab" not palindrome</text>

  <line x1="640" y1="170" x2="930" y2="170" class="edge"/>
  <line x1="640" y1="310" x2="930" y2="310" class="edge"/>

  <rect x="930" y="130" rx="14" ry="14" width="220" height="80" class="node"/>
  <text x="955" y="177" class="label">["a","a","b"]</text>

  <rect x="930" y="270" rx="14" ry="14" width="220" height="80" class="node"/>
  <text x="955" y="317" class="label">["aa","b"]</text>

  <text x="52" y="586" class="sub">Author: Tom🦞 · English first / 中文 next · Java default tabs</text>
</svg>
