<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2839 parity-position invariant diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2839 · Parity Position Invariant</text>

  <rect x="70" y="150" width="510" height="360" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="200" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Even group indices: {0, 2}</text>
  <rect x="110" y="235" width="170" height="100" rx="14" fill="#111827" stroke="#60a5fa"/>
  <rect x="360" y="235" width="170" height="100" rx="14" fill="#111827" stroke="#60a5fa"/>
  <text x="180" y="295" text-anchor="middle" fill="#e5e7eb" font-size="44" font-family="monospace">s[0]</text>
  <text x="445" y="295" text-anchor="middle" fill="#e5e7eb" font-size="44" font-family="monospace">s[2]</text>
  <path d="M280 285 L360 285" stroke="#22d3ee" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="320" y="265" text-anchor="middle" fill="#67e8f9" font-size="22" font-family="Inter,Arial,sans-serif">can swap</text>

  <rect x="620" y="150" width="510" height="360" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="650" y="200" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Odd group indices: {1, 3}</text>
  <rect x="660" y="235" width="170" height="100" rx="14" fill="#111827" stroke="#4ade80"/>
  <rect x="910" y="235" width="170" height="100" rx="14" fill="#111827" stroke="#4ade80"/>
  <text x="745" y="295" text-anchor="middle" fill="#e5e7eb" font-size="44" font-family="monospace">s[1]</text>
  <text x="995" y="295" text-anchor="middle" fill="#e5e7eb" font-size="44" font-family="monospace">s[3]</text>
  <path d="M830 285 L910 285" stroke="#34d399" stroke-width="6" marker-end="url(#arrow2)"/>
  <text x="870" y="265" text-anchor="middle" fill="#6ee7b7" font-size="22" font-family="Inter,Arial,sans-serif">can swap</text>

  <text x="600" y="560" text-anchor="middle" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">Need multiset(even) equal and multiset(odd) equal</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
  </defs>
</svg>
