<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 274 H-Index threshold scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 400 24px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .ok { fill: #22c55e; }
      .no { fill: #ef4444; }
      .bar { fill: #38bdf8; opacity: 0.9; }
      .axis { stroke: #94a3b8; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="80" class="title">LeetCode 274: H-Index</text>
  <text x="60" y="118" class="sub">Sort citations descending, check c[i] ≥ i+1</text>

  <line x1="90" y1="500" x2="1060" y2="500" class="axis"/>
  <line x1="90" y1="500" x2="90" y2="180" class="axis"/>

  <rect x="150" y="280" width="90" height="220" class="bar"/>
  <rect x="280" y="340" width="90" height="160" class="bar"/>
  <rect x="410" y="380" width="90" height="120" class="bar"/>
  <rect x="540" y="460" width="90" height="40" class="bar"/>
  <rect x="670" y="480" width="90" height="20" class="bar"/>

  <text x="165" y="540" class="small">i=0</text>
  <text x="295" y="540" class="small">i=1</text>
  <text x="425" y="540" class="small">i=2</text>
  <text x="555" y="540" class="small">i=3</text>
  <text x="685" y="540" class="small">i=4</text>

  <text x="150" y="260" class="label">6</text>
  <text x="280" y="320" class="label">4</text>
  <text x="410" y="360" class="label">3</text>
  <text x="540" y="440" class="label">1</text>
  <text x="670" y="460" class="label">0</text>

  <text x="840" y="280" class="label">Check:</text>
  <text x="840" y="318" class="small">6 ≥ 1 ✅</text>
  <text x="840" y="350" class="small">4 ≥ 2 ✅</text>
  <text x="840" y="382" class="small">3 ≥ 3 ✅</text>
  <text x="840" y="414" class="small">1 ≥ 4 ❌ stop</text>
  <text x="840" y="470" class="label ok">h-index = 3</text>
</svg>
