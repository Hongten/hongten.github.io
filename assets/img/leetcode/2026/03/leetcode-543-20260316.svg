<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 543 Diameter of Binary Tree diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .node{fill:#1d4ed8;stroke:#93c5fd;stroke-width:3}
      .txt{font:700 28px 'Segoe UI',Arial,sans-serif;fill:white;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#64748b;stroke-width:6}
      .dia{stroke:#f59e0b;stroke-width:10;stroke-linecap:round}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#fbbf24}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 543 · Diameter of Binary Tree</text>
  <text x="60" y="116" class="sub">Postorder DFS: at each node, update diameter = leftHeight + rightHeight</text>

  <line class="edge" x1="600" y1="220" x2="470" y2="320"/>
  <line class="edge" x1="600" y1="220" x2="730" y2="320"/>
  <line class="edge" x1="470" y1="320" x2="380" y2="430"/>
  <line class="edge" x1="470" y1="320" x2="540" y2="430"/>
  <line class="edge" x1="730" y1="320" x2="820" y2="430"/>

  <line class="dia" x1="380" y1="430" x2="470" y2="320"/>
  <line class="dia" x1="470" y1="320" x2="600" y2="220"/>
  <line class="dia" x1="600" y1="220" x2="730" y2="320"/>
  <line class="dia" x1="730" y1="320" x2="820" y2="430"/>

  <circle class="node" cx="600" cy="220" r="34"/><text class="txt" x="600" y="220">1</text>
  <circle class="node" cx="470" cy="320" r="34"/><text class="txt" x="470" y="320">2</text>
  <circle class="node" cx="730" cy="320" r="34"/><text class="txt" x="730" y="320">3</text>
  <circle class="node" cx="380" cy="430" r="34"/><text class="txt" x="380" y="430">4</text>
  <circle class="node" cx="540" cy="430" r="34"/><text class="txt" x="540" y="430">5</text>
  <circle class="node" cx="820" cy="430" r="34"/><text class="txt" x="820" y="430">6</text>

  <text x="60" y="570" class="label">Diameter path example: 4 → 2 → 1 → 3 → 6 (4 edges)</text>
</svg>
