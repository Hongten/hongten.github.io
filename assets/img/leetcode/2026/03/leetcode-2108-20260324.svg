<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2108 first palindromic string scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2108 · First Palindromic String</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Linear scan + two-pointer palindrome check</text>

  <rect x="56" y="178" width="1088" height="380" rx="18" fill="#1f2937" stroke="#334155"/>

  <text x="86" y="228" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">words = ["abc", "car", "ada", "racecar", "cool"]</text>

  <rect x="88" y="260" width="170" height="72" rx="12" fill="#374151"/>
  <text x="129" y="304" fill="#fca5a5" font-size="30" font-family="monospace">abc</text>
  <text x="95" y="345" fill="#fda4af" font-size="18" font-family="Inter,Arial,sans-serif">a != c → not palindrome</text>

  <rect x="292" y="260" width="170" height="72" rx="12" fill="#374151"/>
  <text x="338" y="304" fill="#fca5a5" font-size="30" font-family="monospace">car</text>
  <text x="300" y="345" fill="#fda4af" font-size="18" font-family="Inter,Arial,sans-serif">c != r → not palindrome</text>

  <rect x="496" y="260" width="170" height="72" rx="12" fill="#065f46" stroke="#10b981"/>
  <text x="548" y="304" fill="#d1fae5" font-size="30" font-family="monospace">ada</text>
  <text x="502" y="345" fill="#86efac" font-size="18" font-family="Inter,Arial,sans-serif">a == a, middle reached ✓</text>

  <path d="M 678 296 L 760 296" stroke="#fbbf24" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="775" y="303" fill="#fde68a" font-size="22" font-family="Inter,Arial,sans-serif">return "ada"</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <text x="86" y="525" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN + 中文 full code-tabs (Java default)</text>
</svg>
