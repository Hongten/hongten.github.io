<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Trie insert and query diagram for LeetCode 208">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .h{font-size:34px;font-weight:700}
      .s{font-size:22px}
      .n{fill:#1d4ed8;stroke:#93c5fd;stroke-width:2}
      .e{stroke:#38bdf8;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .l{font-size:20px;fill:#bae6fd}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="70" class="t h">LeetCode 208 · Trie Operations</text>
  <text x="60" y="108" class="t s">insert("app"), insert("apple"), search("app")=true, startsWith("ap")=true</text>

  <circle class="n" cx="130" cy="250" r="36"/><text x="116" y="258" class="t s">root</text>
  <circle class="n" cx="300" cy="250" r="32"/><text x="292" y="258" class="t s">a</text>
  <circle class="n" cx="470" cy="250" r="32"/><text x="462" y="258" class="t s">p</text>
  <circle class="n" cx="640" cy="250" r="32"/><text x="632" y="258" class="t s">p</text>
  <circle class="n" cx="810" cy="250" r="32"/><text x="803" y="258" class="t s">l</text>
  <circle class="n" cx="980" cy="250" r="32"/><text x="972" y="258" class="t s">e</text>

  <path class="e" d="M166 250 L262 250"/><text x="210" y="236" class="l">'a'</text>
  <path class="e" d="M332 250 L438 250"/><text x="382" y="236" class="l">'p'</text>
  <path class="e" d="M502 250 L608 250"/><text x="552" y="236" class="l">'p'</text>
  <path class="e" d="M672 250 L778 250"/><text x="722" y="236" class="l">'l'</text>
  <path class="e" d="M842 250 L948 250"/><text x="892" y="236" class="l">'e'</text>

  <rect x="585" y="305" width="110" height="40" rx="10" fill="#16a34a"/>
  <text x="603" y="332" class="t s">isEnd=✓</text>
  <rect x="925" y="305" width="110" height="40" rx="10" fill="#16a34a"/>
  <text x="943" y="332" class="t s">isEnd=✓</text>

  <rect x="60" y="420" width="1080" height="190" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="465" class="t s">search("app"):</text>
  <text x="280" y="465" class="t s">root → a → p → p, and final node isEnd=true ⇒ true</text>
  <text x="90" y="505" class="t s">startsWith("ap"):</text>
  <text x="300" y="505" class="t s">root → a → p exists ⇒ true (no need to check isEnd)</text>
  <text x="90" y="545" class="t s">Why Trie:</text>
  <text x="220" y="545" class="t s">shared prefix "app" is stored once, reducing repeated comparisons.</text>
</svg>
