<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial">LeetCode 214 · Shortest Palindrome</text>
  <text x="60" y="140" fill="#94a3b8" font-size="26" font-family="Arial">KMP on s + '#' + reverse(s)</text>

  <rect x="60" y="190" width="1080" height="120" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="235" fill="#cbd5e1" font-size="28" font-family="monospace">s        =  a a c e c a a a</text>
  <text x="90" y="275" fill="#cbd5e1" font-size="28" font-family="monospace">reverse  =  a a a c e c a a</text>

  <rect x="60" y="340" width="1080" height="170" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="390" fill="#93c5fd" font-size="28" font-family="monospace">t = s + # + reverse(s)</text>
  <text x="90" y="435" fill="#e5e7eb" font-size="24" font-family="monospace">a a c e c a a a # a a a c e c a a</text>
  <text x="90" y="475" fill="#fca5a5" font-size="24" font-family="monospace">LPS(last) = 7  → longest palindromic prefix = "aacecaa"</text>

  <text x="60" y="575" fill="#f8fafc" font-size="30" font-family="Arial">Answer: reverse(suffix) + s = "aaacecaaa"</text>
</svg>