  <line x1="420" y1="315" x2="520" y2="315" class="a"/>
  <text x="435" y="285" class="t" font-size="22">flip</text>

  <text x="660" y="210" class="t" font-size="24">After</text>
  <circle cx="700" cy="230" r="28" class="n"/><text x="692" y="238" class="t">4</text>
