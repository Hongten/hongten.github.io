<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1658 longest kept subarray diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="78" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1658 · Minimum Operations to Reduce X to Zero</text>
  <text x="52" y="118" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Convert to longest subarray with sum = total - x</text>

  <rect x="70" y="180" width="100" height="90" rx="10" fill="#ef4444"/>
  <rect x="180" y="180" width="100" height="90" rx="10" fill="#ef4444"/>
  <rect x="290" y="180" width="100" height="90" rx="10" fill="#374151"/>
  <rect x="400" y="180" width="100" height="90" rx="10" fill="#22c55e"/>
  <rect x="510" y="180" width="100" height="90" rx="10" fill="#22c55e"/>
  <rect x="620" y="180" width="100" height="90" rx="10" fill="#22c55e"/>
  <rect x="730" y="180" width="100" height="90" rx="10" fill="#374151"/>
  <rect x="840" y="180" width="100" height="90" rx="10" fill="#ef4444"/>
  <rect x="950" y="180" width="100" height="90" rx="10" fill="#ef4444"/>

  <text x="86" y="235" fill="#fff" font-size="22" font-family="monospace">L</text>
  <text x="196" y="235" fill="#fff" font-size="22" font-family="monospace">remove</text>
  <text x="430" y="235" fill="#04120a" font-size="22" font-family="monospace">keep</text>
  <text x="860" y="235" fill="#fff" font-size="22" font-family="monospace">remove</text>

  <text x="70" y="330" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Removed left + right sum = x</text>
  <text x="70" y="370" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Kept middle sum = total - x (maximize length)</text>

  <rect x="70" y="420" width="1060" height="150" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="96" y="470" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">Sliding window (all nums are positive):</text>
  <text x="96" y="510" fill="#d1d5db" font-size="24" font-family="Inter,Arial,sans-serif">expand right → while(sum &gt; target) shrink left → when sum == target update bestLen</text>
  <text x="96" y="548" fill="#d1d5db" font-size="24" font-family="Inter,Arial,sans-serif">answer = n - bestLen</text>
</svg>
