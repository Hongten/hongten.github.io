<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 680 mismatch branch diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 680 · Valid Palindrome II</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Two pointers + one deletion chance</text>

  <rect x="60" y="210" width="1080" height="330" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="270" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">s[i] == s[j] ? move inward</text>
  <text x="95" y="320" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">first mismatch: try one delete</text>
  <text x="135" y="370" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">check(i+1, j)  OR  check(i, j-1)</text>
  <line x1="445" y1="378" x2="755" y2="378" stroke="#9ca3af" stroke-width="2"/>
  <text x="95" y="430" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">if either side is palindrome => true</text>
  <text x="95" y="478" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">otherwise => false</text>
  <text x="95" y="525" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
