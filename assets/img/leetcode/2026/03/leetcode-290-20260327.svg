<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 290 Word Pattern mapping diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 290 · Word Pattern</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Bidirectional mapping must stay consistent</text>

  <rect x="80" y="190" width="420" height="320" rx="18" fill="#1f2937" stroke="#374151"/>
  <rect x="700" y="190" width="420" height="320" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="230" y="230" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Pattern chars</text>
  <text x="850" y="230" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Words</text>

  <text x="140" y="300" fill="#e5e7eb" font-size="38" font-family="monospace">a</text>
  <text x="140" y="360" fill="#e5e7eb" font-size="38" font-family="monospace">b</text>
  <text x="140" y="420" fill="#e5e7eb" font-size="38" font-family="monospace">a</text>
  <text x="140" y="480" fill="#e5e7eb" font-size="38" font-family="monospace">b</text>

  <text x="760" y="300" fill="#e5e7eb" font-size="38" font-family="monospace">dog</text>
  <text x="760" y="360" fill="#e5e7eb" font-size="38" font-family="monospace">cat</text>
  <text x="760" y="420" fill="#e5e7eb" font-size="38" font-family="monospace">dog</text>
  <text x="760" y="480" fill="#e5e7eb" font-size="38" font-family="monospace">cat</text>

  <path d="M190 288 C350 288, 620 288, 740 288" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M190 348 C350 348, 620 348, 740 348" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M190 408 C350 408, 620 408, 740 408" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M190 468 C350 468, 620 468, 740 468" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="60" y="580" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Check both directions: char→word and word→char</text>
</svg>
