<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 168 base-26 without zero digit conversion diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 48px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 28px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .mono { font: 600 34px 'Consolas', 'SFMono-Regular', monospace; fill: #38bdf8; }
      .hint { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .box { fill: #111827; stroke: #334155; stroke-width: 2; rx: 16; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 168 — Excel Sheet Column Title</text>
  <text x="60" y="135" class="sub">1-indexed base-26: decrement first, then modulo 26</text>

  <rect x="60" y="190" width="1080" height="340" class="box"/>
  <text x="90" y="250" class="mono">columnNumber = 701</text>
  <text x="90" y="300" class="mono">Step1: 701-1=700, 700%26=24 -&gt; 'Y'</text>
  <text x="90" y="350" class="mono">Step2: 700/26=26; 26-1=25, 25%26=25 -&gt; 'Z'</text>
  <text x="90" y="400" class="mono">Step3: 25/26=0 stop; reverse("YZ") = "ZY"</text>
  <text x="90" y="470" class="hint">Why decrement first? Because Excel columns are A..Z mapped to 1..26, not 0..25.</text>
</svg>
