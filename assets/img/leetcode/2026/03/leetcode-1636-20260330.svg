<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1636 frequency sort diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .text{font:500 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .mono{font:600 28px 'Consolas','Menlo',monospace;fill:#f8fafc}
      .pill{fill:#334155;stroke:#64748b;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 1636 · Frequency Sort</text>
  <text x="60" y="145" class="text">Rule: frequency ↑ , value ↓ when tie</text>

  <rect x="60" y="200" width="1080" height="80" rx="16" class="pill"/>
  <text x="90" y="250" class="mono">Input:  [2,3,1,3,2]</text>

  <rect x="60" y="310" width="1080" height="120" rx="16" class="pill"/>
  <text x="90" y="360" class="mono">Frequency: 1→1, 2→2, 3→2</text>
  <text x="90" y="405" class="mono">Tie(freq=2): 3 before 2 (value desc)</text>

  <rect x="60" y="460" width="1080" height="100" rx="16" class="pill"/>
  <text x="90" y="520" class="mono">Output: [1,3,3,2,2]</text>
</svg>
