<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 448 sign marking diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="86" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 448 · Find All Numbers Disappeared in an Array</text>
  <text x="48" y="126" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">In-place sign marking by value-to-index mapping</text>

  <rect x="48" y="165" width="1104" height="400" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="80" y="215" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Example: nums = [4,3,2,7,8,2,3,1]</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="26" fill="#e5e7eb">
    <text x="80" y="270">Index:  0  1  2  3  4  5  6  7</text>
    <text x="80" y="310">Value:  4  3  2  7  8  2  3  1</text>
  </g>

  <text x="80" y="360" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Mark rule: for value v, mark nums[v-1] as negative</text>
  <text x="80" y="398" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">After marking: [-4,-3,-2,-7, 8, 2,-3,-1]</text>
  <text x="80" y="436" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Positive indices: 4, 5  →  Missing numbers: 5, 6</text>

  <text x="80" y="496" fill="#cbd5e1" font-size="20" font-family="Inter,Arial,sans-serif">Time O(n) · Extra space O(1) (excluding output)</text>
  <text x="80" y="530" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
