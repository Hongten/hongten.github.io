<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 605 Can Place Flowers greedy neighbor check diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 605: Can Place Flowers</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Greedy: plant at i only when left and right are empty</text>

  <rect x="60" y="200" width="1080" height="320" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="255" fill="#9ca3af" font-size="22" font-family="monospace">flowerbed = [1,0,0,0,1], n = 1</text>

  <g transform="translate(90,290)">
    <rect x="0" y="0" width="90" height="90" rx="10" fill="#ef4444"/>
    <text x="45" y="56" text-anchor="middle" fill="#fff" font-size="36" font-family="monospace">1</text>
    <text x="45" y="118" text-anchor="middle" fill="#9ca3af" font-size="20" font-family="monospace">0</text>

    <rect x="110" y="0" width="90" height="90" rx="10" fill="#111827" stroke="#4b5563"/>
    <text x="155" y="56" text-anchor="middle" fill="#d1d5db" font-size="36" font-family="monospace">0</text>
    <text x="155" y="118" text-anchor="middle" fill="#9ca3af" font-size="20" font-family="monospace">1</text>

    <rect x="220" y="0" width="90" height="90" rx="10" fill="#22c55e"/>
    <text x="265" y="56" text-anchor="middle" fill="#052e16" font-size="36" font-family="monospace">1</text>
    <text x="265" y="118" text-anchor="middle" fill="#86efac" font-size="20" font-family="monospace">2</text>

    <rect x="330" y="0" width="90" height="90" rx="10" fill="#111827" stroke="#4b5563"/>
    <text x="375" y="56" text-anchor="middle" fill="#d1d5db" font-size="36" font-family="monospace">0</text>
    <text x="375" y="118" text-anchor="middle" fill="#9ca3af" font-size="20" font-family="monospace">3</text>

    <rect x="440" y="0" width="90" height="90" rx="10" fill="#ef4444"/>
    <text x="485" y="56" text-anchor="middle" fill="#fff" font-size="36" font-family="monospace">1</text>
    <text x="485" y="118" text-anchor="middle" fill="#9ca3af" font-size="20" font-family="monospace">4</text>

    <text x="590" y="40" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">At index 2: left=0, right=0 ✅ plant</text>
    <text x="590" y="82" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">planted = 1 ≥ n → true</text>
  </g>

  <text x="60" y="578" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
