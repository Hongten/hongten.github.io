<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 289 Game of Life in-place encoding diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 289 · Game of Life</text>
  <text x="52" y="135" fill="#93c5fd" font-size="27" font-family="Inter,Arial,sans-serif">In-place transition encoding: -1 (1→0), 2 (0→1)</text>

  <rect x="70" y="185" width="320" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <rect x="440" y="185" width="320" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <rect x="810" y="185" width="320" height="320" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="120" y="220" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Original</text>
  <text x="490" y="220" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Marking Pass</text>
  <text x="860" y="220" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Finalize</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="40" font-weight="700" text-anchor="middle">
    <text x="150" y="300" fill="#86efac">0</text><text x="230" y="300" fill="#fca5a5">1</text><text x="310" y="300" fill="#86efac">0</text>
    <text x="150" y="380" fill="#fca5a5">1</text><text x="230" y="380" fill="#fca5a5">1</text><text x="310" y="380" fill="#86efac">0</text>
    <text x="150" y="460" fill="#86efac">0</text><text x="230" y="460" fill="#86efac">0</text><text x="310" y="460" fill="#86efac">0</text>

    <text x="520" y="300" fill="#86efac">0</text><text x="600" y="300" fill="#f59e0b">-1</text><text x="680" y="300" fill="#86efac">0</text>
    <text x="520" y="380" fill="#fca5a5">1</text><text x="600" y="380" fill="#fca5a5">1</text><text x="680" y="380" fill="#22d3ee">2</text>
    <text x="520" y="460" fill="#86efac">0</text><text x="600" y="460" fill="#86efac">0</text><text x="680" y="460" fill="#86efac">0</text>

    <text x="890" y="300" fill="#86efac">0</text><text x="970" y="300" fill="#86efac">0</text><text x="1050" y="300" fill="#86efac">0</text>
    <text x="890" y="380" fill="#fca5a5">1</text><text x="970" y="380" fill="#fca5a5">1</text><text x="1050" y="380" fill="#fca5a5">1</text>
    <text x="890" y="460" fill="#86efac">0</text><text x="970" y="460" fill="#86efac">0</text><text x="1050" y="460" fill="#86efac">0</text>
  </g>

  <text x="70" y="565" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Count neighbors by treating {1, -1} as originally alive. Then normalize positive→1, otherwise 0.</text>
</svg>
