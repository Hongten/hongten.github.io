<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 160 linked list intersection diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{font:700 42px Inter,Arial,sans-serif;fill:#e5e7eb}
      .label{font:600 24px Inter,Arial,sans-serif;fill:#93c5fd}
      .node{fill:#1f2937;stroke:#60a5fa;stroke-width:2}
      .txt{font:600 20px Inter,Arial,sans-serif;fill:#e5e7eb}
      .hint{font:500 22px Inter,Arial,sans-serif;fill:#86efac}
      .arrow{stroke:#9ca3af;stroke-width:3;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="70" class="title">LeetCode 160 · Intersection of Two Linked Lists</text>
  <text x="50" y="110" class="hint">Two pointers walk A→B and B→A; same total distance ⇒ meet at intersection</text>

  <text x="80" y="190" class="label">List A</text>
  <rect x="180" y="160" width="90" height="44" rx="8" class="node"/><text x="220" y="188" text-anchor="middle" class="txt">4</text>
  <rect x="320" y="160" width="90" height="44" rx="8" class="node"/><text x="365" y="188" text-anchor="middle" class="txt">1</text>
  <rect x="460" y="160" width="90" height="44" rx="8" class="node"/><text x="505" y="188" text-anchor="middle" class="txt">8</text>
  <rect x="600" y="160" width="90" height="44" rx="8" class="node"/><text x="645" y="188" text-anchor="middle" class="txt">4</text>
  <rect x="740" y="160" width="90" height="44" rx="8" class="node"/><text x="785" y="188" text-anchor="middle" class="txt">5</text>

  <text x="80" y="330" class="label">List B</text>
  <rect x="180" y="300" width="90" height="44" rx="8" class="node"/><text x="225" y="328" text-anchor="middle" class="txt">5</text>
  <rect x="320" y="300" width="90" height="44" rx="8" class="node"/><text x="365" y="328" text-anchor="middle" class="txt">6</text>
  <rect x="460" y="300" width="90" height="44" rx="8" class="node"/><text x="505" y="328" text-anchor="middle" class="txt">1</text>

  <line x1="270" y1="182" x2="320" y2="182" class="arrow"/>
  <line x1="410" y1="182" x2="460" y2="182" class="arrow"/>
  <line x1="550" y1="182" x2="600" y2="182" class="arrow"/>
  <line x1="690" y1="182" x2="740" y2="182" class="arrow"/>

  <line x1="270" y1="322" x2="320" y2="322" class="arrow"/>
  <line x1="410" y1="322" x2="460" y2="322" class="arrow"/>
  <line x1="550" y1="322" x2="460" y2="204" class="arrow"/>

  <text x="505" y="145" text-anchor="middle" class="hint">intersection starts here</text>

  <text x="70" y="430" class="label">Pointer routes</text>
  <text x="70" y="470" class="txt">pA: A1 → A2 → C1 → C2 → C3 → B1 → B2 → B3 → C1 ...</text>
  <text x="70" y="510" class="txt">pB: B1 → B2 → B3 → C1 → C2 → C3 → A1 → A2 → C1 ...</text>
  <text x="70" y="560" class="hint">Equalized path length guarantees meeting point (or both null).</text>
</svg>