<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 19 fast and slow pointer gap diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd" />
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 19 · Remove Nth Node From End of List</text>
  <text x="60" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Two pointers keep gap = n, slow lands before target</text>

  <g transform="translate(90,220)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <rect x="150" y="0" width="120" height="80" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <rect x="300" y="0" width="120" height="80" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <rect x="450" y="0" width="120" height="80" rx="10" fill="#7f1d1d" stroke="#f87171"/>
    <rect x="600" y="0" width="120" height="80" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <text x="50" y="48" fill="#e5e7eb" font-size="24">1</text>
    <text x="200" y="48" fill="#e5e7eb" font-size="24">2</text>
    <text x="350" y="48" fill="#e5e7eb" font-size="24">3</text>
    <text x="500" y="48" fill="#fecaca" font-size="24">X</text>
    <text x="650" y="48" fill="#e5e7eb" font-size="24">5</text>
    <line x1="120" y1="40" x2="150" y2="40" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="270" y1="40" x2="300" y2="40" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="420" y1="40" x2="450" y2="40" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="570" y1="40" x2="600" y2="40" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

    <text x="300" y="130" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">slow</text>
    <line x1="340" y1="115" x2="340" y2="85" stroke="#86efac" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="630" y="130" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif">fast</text>
    <line x1="670" y1="115" x2="670" y2="85" stroke="#fcd34d" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="60" y="560" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second · Java default code tab</text>
