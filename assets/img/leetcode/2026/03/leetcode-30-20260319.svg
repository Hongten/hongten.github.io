<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 30 sliding window by word length offsets">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-family:Consolas,Monaco,monospace;fill:#93c5fd}
      .box{fill:#0b1220;stroke:#334155;stroke-width:2;rx:10}
      .hi{fill:#1d4ed8;opacity:.35}
      .ok{fill:#16a34a;opacity:.35}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t" font-size="42" font-weight="700">LeetCode 30 · Offset Sliding Window</text>
  <text x="60" y="118" class="t" font-size="24">Substring with Concatenation of All Words</text>

  <rect x="60" y="170" width="1080" height="120" class="box"/>
  <text x="85" y="210" class="m" font-size="30">barfoofoobarthefoobarman</text>
  <rect x="173" y="228" width="171" height="40" class="hi"/>
  <rect x="344" y="228" width="171" height="40" class="hi"/>
  <rect x="515" y="228" width="171" height="40" class="ok"/>
  <text x="85" y="265" class="t" font-size="20">wordLen=3, words=["bar","foo","the"]</text>

  <rect x="60" y="330" width="520" height="220" class="box"/>
  <text x="85" y="370" class="t" font-size="26" font-weight="700">Per Offset Scan</text>
  <text x="85" y="410" class="t" font-size="22">offset 0: [bar][foo][foo][bar][the]...</text>
  <text x="85" y="445" class="t" font-size="22">offset 1: [arf][oof][oob][art]...</text>
  <text x="85" y="480" class="t" font-size="22">offset 2: [rfo][ofo][oba][rth]...</text>
  <text x="85" y="520" class="t" font-size="20">Only aligned chunks can be valid candidates.</text>

  <rect x="620" y="330" width="520" height="220" class="box"/>
  <text x="645" y="370" class="t" font-size="26" font-weight="700">Window Rule</text>
  <text x="645" y="410" class="t" font-size="22">1) add token into winCount</text>
  <text x="645" y="445" class="t" font-size="22">2) if winCount[token] &gt; need[token], shrink</text>
  <text x="645" y="480" class="t" font-size="22">3) if tokenCount == words.length, record left</text>
  <text x="645" y="520" class="t" font-size="20">Result indices: 6, 9, 12</text>
</svg>
