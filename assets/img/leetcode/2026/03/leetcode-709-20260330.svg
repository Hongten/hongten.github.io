<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 709 ASCII lowercase mapping diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 709: To Lower Case</text>
  <text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">ASCII mapping: if 'A'..'Z', then c = c + 32</text>

  <rect x="60" y="210" width="1080" height="320" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="110" y="285" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">Input:  "Hello-OPENCLAW-123"</text>
  <text x="110" y="350" fill="#86efac" font-size="34" font-family="JetBrains Mono,Consolas,monospace">Output: "hello-openclaw-123"</text>
  <text x="110" y="425" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,Consolas,monospace">A(65) → a(97), B(66) → b(98), ... Z(90) → z(122)</text>
  <text x="110" y="485" fill="#c4b5fd" font-size="26" font-family="Inter,Arial,sans-serif">Single pass · O(n) time · O(n) output space</text>
</svg>
