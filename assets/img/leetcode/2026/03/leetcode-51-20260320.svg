<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 51 N-Queens backtracking diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 51: N-Queens</text>
  <text x="60" y="142" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Backtracking with Column / Diagonal Constraints</text>

  <g transform="translate(70,190)">
    <rect x="0" y="0" width="360" height="360" fill="#1f2937" stroke="#4b5563"/>
    <g stroke="#374151">
      <line x1="45" y1="0" x2="45" y2="360"/><line x1="90" y1="0" x2="90" y2="360"/><line x1="135" y1="0" x2="135" y2="360"/>
      <line x1="180" y1="0" x2="180" y2="360"/><line x1="225" y1="0" x2="225" y2="360"/><line x1="270" y1="0" x2="270" y2="360"/><line x1="315" y1="0" x2="315" y2="360"/>
      <line x1="0" y1="45" x2="360" y2="45"/><line x1="0" y1="90" x2="360" y2="90"/><line x1="0" y1="135" x2="360" y2="135"/>
      <line x1="0" y1="180" x2="360" y2="180"/><line x1="0" y1="225" x2="360" y2="225"/><line x1="0" y1="270" x2="360" y2="270"/><line x1="0" y1="315" x2="360" y2="315"/>
    </g>
    <text x="22" y="30" fill="#f59e0b" font-size="26">Q</text>
    <text x="112" y="120" fill="#f59e0b" font-size="26">Q</text>
    <text x="202" y="210" fill="#f59e0b" font-size="26">Q</text>
    <text x="292" y="300" fill="#f59e0b" font-size="26">Q</text>
  </g>

  <g transform="translate(480,210)">
    <rect x="0" y="0" width="650" height="300" rx="14" fill="#1f2937" stroke="#374151"/>
    <text x="28" y="52" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Row-by-row DFS with pruning</text>
    <text x="28" y="102" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">• columns[c] blocks same column</text>
    <text x="28" y="144" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">• diag1[row-col+n] blocks \ diagonal</text>
    <text x="28" y="186" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">• diag2[row+col] blocks / diagonal</text>
    <text x="28" y="242" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
  </g>
