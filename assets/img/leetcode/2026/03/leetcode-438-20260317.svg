<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 438 sliding window anagram diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:38px;font-weight:700}
      .s{font-size:22px;fill:#cbd5e1}
      .b{fill:#334155;stroke:#64748b;stroke-width:2}
      .h{fill:#0ea5e9;stroke:#38bdf8;stroke-width:3}
      .a{fill:#22c55e;stroke:#4ade80;stroke-width:3}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 438 · Fixed-Size Sliding Window</text>
  <text x="60" y="130" class="t s">s = c b a e b a b a c d · p = a b c</text>

  <g transform="translate(60,190)">
    <rect class="b" x="0" y="0" width="90" height="90" rx="10"/><text x="35" y="55" class="t" font-size="40">c</text>
    <rect class="b" x="100" y="0" width="90" height="90" rx="10"/><text x="135" y="55" class="t" font-size="40">b</text>
    <rect class="b" x="200" y="0" width="90" height="90" rx="10"/><text x="235" y="55" class="t" font-size="40">a</text>
    <rect class="h" x="300" y="0" width="90" height="90" rx="10"/><text x="335" y="55" class="t" font-size="40">e</text>
    <rect class="h" x="400" y="0" width="90" height="90" rx="10"/><text x="435" y="55" class="t" font-size="40">b</text>
    <rect class="h" x="500" y="0" width="90" height="90" rx="10"/><text x="535" y="55" class="t" font-size="40">a</text>
    <rect class="b" x="600" y="0" width="90" height="90" rx="10"/><text x="635" y="55" class="t" font-size="40">b</text>
    <rect class="a" x="700" y="0" width="90" height="90" rx="10"/><text x="735" y="55" class="t" font-size="40">a</text>
    <rect class="a" x="800" y="0" width="90" height="90" rx="10"/><text x="835" y="55" class="t" font-size="40">c</text>
    <rect class="a" x="900" y="0" width="90" height="90" rx="10"/><text x="935" y="55" class="t" font-size="40">d</text>

    <text x="0" y="145" class="t s">Blue window ("eba"): not an anagram</text>
    <text x="0" y="180" class="t s">Green window ("acd"): compare counts, match only when freq equals p</text>
    <text x="0" y="230" class="t s">Record index whenever window size = |p| and need[] == win[]</text>
  </g>
</svg>
