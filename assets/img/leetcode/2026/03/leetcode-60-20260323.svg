<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 60 factorial bucket diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 60: Permutation Sequence</text>
  <text x="56" y="136" fill="#93c5fd" font-size="27" font-family="Inter,Arial,sans-serif">Factorial Number System / Unranking</text>

  <rect x="56" y="186" width="1088" height="370" rx="18" fill="#1f2937" stroke="#334155"/>

  <text x="88" y="244" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">n = 4, k = 14 (1-indexed)  →  k' = 13</text>
  <text x="88" y="288" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">block = 3! = 6, idx = 13 / 6 = 2  → pick 3</text>
  <text x="88" y="324" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">remaining k = 13 % 6 = 1, nums = [1,2,4]</text>
  <text x="88" y="360" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">block = 2! = 2, idx = 1 / 2 = 0  → pick 1</text>
  <text x="88" y="396" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">block = 1! = 1, idx = 1 / 1 = 1  → pick 4</text>
  <text x="88" y="432" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">last digit → 2</text>

  <text x="88" y="490" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Answer: 3142</text>
  <text x="88" y="530" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
