<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1762 ocean view reverse scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="72" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1762 · Buildings With an Ocean View</text>
  <text x="52" y="115" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Right-to-left scan keeps buildings taller than max height on the right</text>

  <rect x="90" y="400" width="90" height="170" fill="#64748b"/>
  <rect x="210" y="350" width="90" height="220" fill="#475569"/>
  <rect x="330" y="430" width="90" height="140" fill="#64748b"/>
  <rect x="450" y="300" width="90" height="270" fill="#0ea5e9"/>
  <rect x="570" y="470" width="90" height="100" fill="#64748b"/>
  <rect x="690" y="260" width="90" height="310" fill="#22d3ee"/>
  <rect x="810" y="500" width="90" height="70" fill="#64748b"/>

  <text x="455" y="286" fill="#7dd3fc" font-size="20" font-family="Inter,Arial,sans-serif">picked (height &gt; maxRight)</text>
  <text x="695" y="246" fill="#67e8f9" font-size="20" font-family="Inter,Arial,sans-serif">picked</text>

  <line x1="930" y1="120" x2="1120" y2="120" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="942" y="103" fill="#38bdf8" font-size="24" font-family="Inter,Arial,sans-serif">Ocean</text>

  <text x="90" y="605" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Scan direction: right → left, maintain maxRight</text>
</svg>