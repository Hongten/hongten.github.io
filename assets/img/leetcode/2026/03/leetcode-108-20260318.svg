<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 108 middle-as-root balanced BST construction</title>
  <desc id="desc">Sorted array split by middle index into left and right halves recursively to build a height-balanced BST.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 16; }
      .txt { fill: #e5e7eb; font-family: Inter, Segoe UI, Arial, sans-serif; }
      .muted { fill: #94a3b8; font-size: 22px; }
      .title { fill: #f8fafc; font-size: 34px; font-weight: 700; }
      .arr { fill: #1f2937; stroke: #475569; stroke-width: 2; rx: 10; }
      .mid { fill: #7c3aed; stroke: #a78bfa; stroke-width: 2; }
      .node { fill: #1e293b; stroke: #60a5fa; stroke-width: 2; }
      .edge { stroke: #64748b; stroke-width: 3; }
      .val { fill: #f8fafc; font-size: 24px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .label { fill: #cbd5e1; font-size: 20px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="640" />
  <text class="title txt" x="48" y="62">LeetCode 108 · Convert Sorted Array to Binary Search Tree</text>
  <text class="muted txt" x="48" y="96">Pick middle as root recursively → keep left/right subtree sizes balanced</text>

  <rect class="panel" x="40" y="124" width="1120" height="184" />
  <text class="label txt" x="60" y="156">Sorted array:</text>

  <g transform="translate(100,178)">
    <rect class="arr" x="0" y="0" width="90" height="56" />
    <rect class="arr" x="100" y="0" width="90" height="56" />
    <rect class="arr" x="200" y="0" width="90" height="56" />
    <rect class="mid" x="300" y="0" width="90" height="56" rx="10" />
    <rect class="arr" x="400" y="0" width="90" height="56" />
    <rect class="arr" x="500" y="0" width="90" height="56" />
    <rect class="arr" x="600" y="0" width="90" height="56" />

    <text class="val" x="45" y="28">-10</text>
    <text class="val" x="145" y="28">-3</text>
    <text class="val" x="245" y="28">0</text>
    <text class="val" x="345" y="28">5</text>
    <text class="val" x="445" y="28">9</text>
    <text class="val" x="545" y="28">12</text>
    <text class="val" x="645" y="28">17</text>

    <text class="label txt" x="305" y="88">mid = 5 (root)</text>
  </g>

  <rect class="panel" x="40" y="332" width="1120" height="268" />
  <text class="label txt" x="60" y="364">Constructed balanced BST:</text>

  <g>
    <line class="edge" x1="600" y1="430" x2="430" y2="500" />
    <line class="edge" x1="600" y1="430" x2="770" y2="500" />
    <line class="edge" x1="430" y1="500" x2="340" y2="560" />
    <line class="edge" x1="430" y1="500" x2="520" y2="560" />
    <line class="edge" x1="770" y1="500" x2="860" y2="560" />
    <line class="edge" x1="770" y1="500" x2="950" y2="560" />

    <circle class="node" cx="600" cy="420" r="34" />
    <circle class="node" cx="430" cy="510" r="30" />
    <circle class="node" cx="770" cy="510" r="30" />
    <circle class="node" cx="340" cy="570" r="26" />
    <circle class="node" cx="520" cy="570" r="26" />
    <circle class="node" cx="860" cy="570" r="26" />
    <circle class="node" cx="950" cy="570" r="26" />

    <text class="val" x="600" y="420">5</text>
    <text class="val" x="430" y="510">-3</text>
    <text class="val" x="770" y="510">12</text>
    <text class="val" x="340" y="570">-10</text>
    <text class="val" x="520" y="570">0</text>
    <text class="val" x="860" y="570">9</text>
    <text class="val" x="950" y="570">17</text>
  </g>
</svg>
