<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 23 min-heap merge process diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .t1 { fill:#e5e7eb; font:700 44px Inter,Arial,sans-serif; }
      .t2 { fill:#93c5fd; font:600 26px Inter,Arial,sans-serif; }
      .t3 { fill:#d1d5db; font:500 24px Inter,Arial,sans-serif; }
      .node { fill:#1f2937; stroke:#60a5fa; stroke-width:2; rx:12; }
      .heap { fill:#0b1220; stroke:#34d399; stroke-width:2; rx:16; }
      .arrow { stroke:#f59e0b; stroke-width:3; fill:none; marker-end:url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="78" class="t1">LeetCode 23 · Merge k Sorted Lists</text>
  <text x="52" y="118" class="t2">Min-Heap on current heads · O(N log k)</text>

  <rect x="48" y="160" width="300" height="420" class="node"/>
  <text x="70" y="200" class="t2">Input Lists (heads)</text>
  <text x="70" y="245" class="t3">L1: 1 → 4 → 5</text>
  <text x="70" y="290" class="t3">L2: 1 → 3 → 4</text>
  <text x="70" y="335" class="t3">L3: 2 → 6</text>
  <text x="70" y="390" class="t3">Only push each current head</text>

  <rect x="420" y="200" width="340" height="230" class="heap"/>
  <text x="450" y="240" class="t2">Min-Heap</text>
  <text x="450" y="285" class="t3">top = smallest head node</text>
  <text x="450" y="330" class="t3">pop min → append to answer</text>
  <text x="450" y="375" class="t3">push popped.next (if exists)</text>

  <rect x="840" y="160" width="312" height="420" class="node"/>
  <text x="860" y="200" class="t2">Merged Output</text>
  <text x="860" y="250" class="t3">1 → 1 → 2 → 3</text>
  <text x="860" y="295" class="t3">→ 4 → 4 → 5 → 6</text>
  <text x="860" y="365" class="t3">Author: Tom🦞</text>

  <path d="M350 300 C390 300, 400 300, 420 300" class="arrow"/>
  <path d="M760 300 C790 300, 810 300, 840 300" class="arrow"/>
</svg>
