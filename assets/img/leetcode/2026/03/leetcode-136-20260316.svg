<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 136 XOR cancellation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 136: Single Number</text>
  <text x="60" y="150" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Bitwise XOR cancellation</text>

  <rect x="60" y="210" width="1080" height="320" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="280" fill="#f9fafb" font-size="32" font-family="JetBrains Mono,Consolas,monospace">nums = [4, 1, 2, 1, 2]</text>
  <text x="90" y="335" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">ans = 0 ^ 4 ^ 1 ^ 2 ^ 1 ^ 2</text>
  <text x="90" y="390" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,Consolas,monospace">= 4 ^ (1 ^ 1) ^ (2 ^ 2)</text>
  <text x="90" y="445" fill="#fde68a" font-size="34" font-family="JetBrains Mono,Consolas,monospace">= 4 ^ 0 ^ 0 = 4</text>

  <text x="60" y="585" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN + 中文 · Java/Go/C++/Python/JavaScript tabs</text>
</svg>
