<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 59 spiral matrix layer fill diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 59: Spiral Matrix II</text>
  <text x="60" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Layer-by-Layer Boundary Fill</text>

  <g transform="translate(120,190)">
    <rect x="0" y="0" width="320" height="320" fill="#1f2937" stroke="#334155"/>
    <rect x="20" y="20" width="280" height="280" fill="#0b1220" stroke="#38bdf8"/>
    <rect x="60" y="60" width="200" height="200" fill="#111827" stroke="#a78bfa"/>
    <rect x="100" y="100" width="120" height="120" fill="#0f172a" stroke="#34d399"/>

    <line x1="30" y1="30" x2="270" y2="30" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="290" y1="30" x2="290" y2="270" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="290" y1="290" x2="50" y2="290" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="30" y1="290" x2="30" y2="50" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="520" y="250" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">top / right / bottom / left</text>
  <text x="520" y="300" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Shrink boundaries after each edge fill</text>
  <text x="520" y="350" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">Write numbers 1..n² exactly once</text>
  <text x="520" y="430" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
