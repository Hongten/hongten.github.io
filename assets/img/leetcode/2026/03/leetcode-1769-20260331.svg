<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1769 two-pass prefix cost diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="84" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1769 · Two-Pass Prefix Cost</text>
  <text x="56" y="126" fill="#9ca3af" font-size="25" font-family="Inter,Arial,sans-serif">Minimum Number of Operations to Move All Balls to Each Box</text>

  <rect x="60" y="170" width="1080" height="380" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="225" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">boxes = 0 0 1 0 1 0 0</text>
  <text x="90" y="270" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Pass 1 (left → right): accumulate left-side balls and movement cost</text>
  <line x1="90" y1="295" x2="650" y2="295" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="700" y="300" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">ans[i] += leftOps</text>

  <text x="90" y="360" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Pass 2 (right → left): accumulate right-side balls and movement cost</text>
  <line x1="650" y1="385" x2="90" y2="385" stroke="#86efac" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="700" y="390" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">ans[i] += rightOps</text>

  <text x="90" y="455" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">Total per index = left contribution + right contribution</text>
  <text x="90" y="500" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1) extra</text>
  <text x="90" y="535" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
