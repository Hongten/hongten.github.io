<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 238 prefix and suffix product diagram">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 12; }
      .title { fill: #e2e8f0; font: 700 28px Arial, sans-serif; }
      .text { fill: #cbd5e1; font: 20px Arial, sans-serif; }
      .code { fill: #93c5fd; font: 700 22px 'Courier New', monospace; }
      .arrow { stroke: #38bdf8; stroke-width: 3; marker-end: url(#m); }
      .good { fill: #86efac; font: 700 20px Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="420"/>
  <text class="title" x="30" y="48">LeetCode 238 · Product of Array Except Self</text>

  <rect class="panel" x="30" y="80" width="900" height="140"/>
  <text class="text" x="60" y="125">nums = [1, 2, 3, 4]</text>
  <text class="code" x="60" y="165">prefix: [1, 1, 2, 6]</text>
  <text class="code" x="470" y="165">suffix on fly: [24, 12, 4, 1]</text>

  <line class="arrow" x1="320" y1="255" x2="640" y2="255"/>
  <text class="text" x="360" y="245">multiply left × right</text>

  <rect class="panel" x="30" y="280" width="900" height="100"/>
  <text class="good" x="60" y="340">answer = [24, 12, 8, 6]  (O(n) time, O(1) extra space)</text>
</svg>
