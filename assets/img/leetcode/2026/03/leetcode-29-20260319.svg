<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 29 bitwise division diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 29 · Divide Two Integers</text>
  <text x="56" y="136" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Bitwise Exponential Subtraction</text>

  <rect x="56" y="178" width="1088" height="396" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="88" y="234" fill="#93c5fd" font-size="28" font-family="JetBrains Mono,Consolas,monospace">Example: dividend = 43, divisor = 5</text>
  <text x="88" y="280" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">5 × 2^3 = 40  ≤ 43   take +8, remainder 3</text>
  <text x="88" y="320" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">remainder 3 &lt; 5  stop</text>
  <text x="88" y="360" fill="#86efac" font-size="26" font-family="JetBrains Mono,Consolas,monospace">quotient = 8, truncate toward zero</text>

  <line x1="88" y1="390" x2="1112" y2="390" stroke="#374151"/>

  <text x="88" y="438" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Overflow guard: INT_MIN / -1 → INT_MAX</text>
  <text x="88" y="478" fill="#c4b5fd" font-size="24" font-family="Inter,Arial,sans-serif">Use long/int64 abs values before shifting</text>
  <text x="88" y="520" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
