<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 226 invert binary tree mirror swap diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
    <style>
      .title{font:700 46px Inter,Arial,sans-serif;fill:#e5e7eb}
      .sub{font:500 26px Inter,Arial,sans-serif;fill:#9ca3af}
      .label{font:600 24px Inter,Arial,sans-serif;fill:#93c5fd}
      .node{fill:#1f2937;stroke:#60a5fa;stroke-width:3}
      .txt{font:700 24px Inter,Arial,sans-serif;fill:#e5e7eb;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#94a3b8;stroke-width:4}
      .swap{stroke:#38bdf8;stroke-width:4;stroke-dasharray:10 8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="78" class="title">LeetCode 226: Invert Binary Tree</text>
  <text x="50" y="118" class="sub">Mirror every node by swapping left/right children</text>

  <text x="230" y="180" class="label">Before</text>
  <line x1="230" y1="220" x2="170" y2="290" class="edge"/>
  <line x1="230" y1="220" x2="290" y2="290" class="edge"/>
  <line x1="170" y1="320" x2="130" y2="390" class="edge"/>
  <line x1="170" y1="320" x2="210" y2="390" class="edge"/>

  <circle cx="230" cy="220" r="32" class="node"/><text x="230" y="220" class="txt">4</text>
  <circle cx="170" cy="320" r="32" class="node"/><text x="170" y="320" class="txt">2</text>
  <circle cx="290" cy="320" r="32" class="node"/><text x="290" y="320" class="txt">7</text>
  <circle cx="130" cy="420" r="32" class="node"/><text x="130" y="420" class="txt">1</text>
  <circle cx="210" cy="420" r="32" class="node"/><text x="210" y="420" class="txt">3</text>

  <path d="M520 310 C610 250, 700 250, 790 310" class="swap"/>
  <path d="M790 310 C700 370, 610 370, 520 310" class="swap"/>
  <text x="655" y="230" class="label">swap children at each node</text>

  <text x="980" y="180" class="label">After</text>
  <line x1="980" y1="220" x2="920" y2="290" class="edge"/>
  <line x1="980" y1="220" x2="1040" y2="290" class="edge"/>
  <line x1="1040" y1="320" x2="1000" y2="390" class="edge"/>
  <line x1="1040" y1="320" x2="1080" y2="390" class="edge"/>

  <circle cx="980" cy="220" r="32" class="node"/><text x="980" y="220" class="txt">4</text>
  <circle cx="920" cy="320" r="32" class="node"/><text x="920" y="320" class="txt">7</text>
  <circle cx="1040" cy="320" r="32" class="node"/><text x="1040" y="320" class="txt">2</text>
  <circle cx="1000" cy="420" r="32" class="node"/><text x="1000" y="420" class="txt">3</text>
  <circle cx="1080" cy="420" r="32" class="node"/><text x="1080" y="420" class="txt">1</text>

  <text x="50" y="590" class="sub">Author: Tom🦞 · EN first, 中文 second · Java/Go/C++/Python/JavaScript tabs</text>
</svg>
