<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 724 pivot index diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 724 · Find Pivot Index</text>
  <text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Prefix Sum Balance: left == total - left - nums[i]</text>

  <rect x="60" y="210" width="1080" height="300" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="270" fill="#e5e7eb" font-size="28" font-family="monospace">nums = [1, 7, 3, 6, 5, 6]</text>
  <line x1="90" y1="315" x2="1110" y2="315" stroke="#4b5563" stroke-width="2"/>
  <text x="90" y="360" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">pivot = 3, nums[3] = 6</text>
  <text x="90" y="405" fill="#c4b5fd" font-size="24" font-family="Inter,Arial,sans-serif">left sum = 1 + 7 + 3 = 11</text>
  <text x="90" y="445" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">right sum = 5 + 6 = 11</text>
  <text x="90" y="490" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">Balance holds ⇒ return index 3</text>
</svg>
