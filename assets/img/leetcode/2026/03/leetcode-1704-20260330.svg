<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .code{font:700 30px 'Consolas',monospace;fill:#e2e8f0}
      .hint{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 1704 · Determine if String Halves Are Alike</text>
  <text x="60" y="130" class="sub">Vowel Balance Counting: left vowels +1, right vowels -1</text>

  <rect x="90" y="200" width="460" height="170" rx="18" fill="#bae6fd"/>
  <rect x="650" y="200" width="460" height="170" rx="18" fill="#fecaca"/>
  <text x="290" y="245" text-anchor="middle" class="label">Left Half</text>
  <text x="880" y="245" text-anchor="middle" class="label">Right Half</text>
  <text x="320" y="310" text-anchor="middle" class="code">book</text>
  <text x="910" y="310" text-anchor="middle" class="code">keep</text>
  <text x="320" y="350" text-anchor="middle" class="label">vowels = 2</text>
  <text x="910" y="350" text-anchor="middle" class="label">vowels = 2</text>

  <text x="600" y="300" text-anchor="middle" class="title" font-size="54">⇄</text>
  <text x="600" y="430" text-anchor="middle" class="sub">balance = 0  →  halves are alike</text>
  <text x="60" y="570" class="hint">Scan i in [0, n/2): if vowel(s[i]) balance++, if vowel(s[i+n/2]) balance--.</text>
</svg>
