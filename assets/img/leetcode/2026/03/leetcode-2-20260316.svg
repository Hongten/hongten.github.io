<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 2 add two numbers carry simulation">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 14; }
      .title { fill: #e2e8f0; font: 700 34px 'Segoe UI', Arial, sans-serif; }
      .sub { fill: #94a3b8; font: 500 20px 'Segoe UI', Arial, sans-serif; }
      .node { fill: #1d4ed8; stroke: #93c5fd; stroke-width: 2; }
      .node2 { fill: #065f46; stroke: #6ee7b7; stroke-width: 2; }
      .out { fill: #7c3aed; stroke: #c4b5fd; stroke-width: 2; }
      .txt { fill: #f8fafc; font: 700 28px 'Consolas', monospace; text-anchor: middle; dominant-baseline: middle; }
      .lbl { fill: #cbd5e1; font: 600 18px 'Segoe UI', Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 3; marker-end: url(#m); }
      .carry { fill: #f59e0b; font: 700 20px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <rect class="panel" x="24" y="24" width="1152" height="472"/>
  <text class="title" x="60" y="72">LeetCode 2 · Add Two Numbers</text>
  <text class="sub" x="60" y="106">Digit-by-digit linked-list addition with carry propagation</text>

  <text class="lbl" x="70" y="170">l1: 2 → 4 → 3</text>
  <circle class="node" cx="260" cy="165" r="34"/><text class="txt" x="260" y="165">2</text>
  <line class="arrow" x1="300" y1="165" x2="360" y2="165"/>
  <circle class="node" cx="420" cy="165" r="34"/><text class="txt" x="420" y="165">4</text>
  <line class="arrow" x1="460" y1="165" x2="520" y2="165"/>
  <circle class="node" cx="580" cy="165" r="34"/><text class="txt" x="580" y="165">3</text>

  <text class="lbl" x="70" y="260">l2: 5 → 6 → 4</text>
  <circle class="node2" cx="260" cy="255" r="34"/><text class="txt" x="260" y="255">5</text>
  <line class="arrow" x1="300" y1="255" x2="360" y2="255"/>
  <circle class="node2" cx="420" cy="255" r="34"/><text class="txt" x="420" y="255">6</text>
  <line class="arrow" x1="460" y1="255" x2="520" y2="255"/>
  <circle class="node2" cx="580" cy="255" r="34"/><text class="txt" x="580" y="255">4</text>

  <text class="lbl" x="70" y="360">result: 7 → 0 → 8</text>
  <circle class="out" cx="260" cy="355" r="34"/><text class="txt" x="260" y="355">7</text>
  <line class="arrow" x1="300" y1="355" x2="360" y2="355"/>
  <circle class="out" cx="420" cy="355" r="34"/><text class="txt" x="420" y="355">0</text>
  <line class="arrow" x1="460" y1="355" x2="520" y2="355"/>
  <circle class="out" cx="580" cy="355" r="34"/><text class="txt" x="580" y="355">8</text>

  <text class="carry" x="760" y="175">2 + 5 + carry(0) = 7</text>
  <text class="carry" x="760" y="255">4 + 6 + carry(0) = 10 → digit 0, carry 1</text>
  <text class="carry" x="760" y="335">3 + 4 + carry(1) = 8</text>
  <text class="sub" x="60" y="455">Reverse-order representation: [2,4,3] + [5,6,4] = [7,0,8]</text>
</svg>
