<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 217 Contains Duplicate hash-set flow diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 217: Contains Duplicate</text>
  <text x="60" y="132" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">One-pass Hash Set Membership Check</text>

  <rect x="70" y="190" width="240" height="90" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="245" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Read x</text>

  <rect x="380" y="190" width="350" height="90" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="410" y="245" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">x in seen ?</text>

  <rect x="800" y="120" width="320" height="90" rx="14" fill="#14532d" stroke="#22c55e"/>
  <text x="835" y="175" fill="#dcfce7" font-size="28" font-family="Inter,Arial,sans-serif">Yes → return true</text>

  <rect x="800" y="280" width="320" height="110" rx="14" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="842" y="338" fill="#dbeafe" font-size="28" font-family="Inter,Arial,sans-serif">No → seen.add(x)</text>

  <rect x="800" y="440" width="320" height="90" rx="14" fill="#3f3f46" stroke="#a1a1aa"/>
  <text x="855" y="495" fill="#f4f4f5" font-size="28" font-family="Inter,Arial,sans-serif">End → false</text>

  <line x1="310" y1="235" x2="380" y2="235" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="220" x2="800" y2="170" stroke="#22c55e" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="250" x2="800" y2="330" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="960" y1="390" x2="960" y2="440" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="60" y="590" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
