<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 295 two-heaps balancing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 295 · Find Median from Data Stream</text>
  <text x="60" y="130" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">Two Heaps: MaxHeap(lower half) + MinHeap(upper half)</text>

  <rect x="100" y="190" width="450" height="300" rx="18" fill="#1d4ed8" fill-opacity="0.28" stroke="#60a5fa" stroke-width="3"/>
  <text x="130" y="235" fill="#dbeafe" font-size="28" font-family="Arial, sans-serif" font-weight="700">Lower Half (MaxHeap)</text>
  <text x="130" y="280" fill="#bfdbfe" font-size="24" font-family="Arial, sans-serif">Top = largest of lower half</text>
  <text x="130" y="320" fill="#bfdbfe" font-size="24" font-family="Arial, sans-serif">... 3, 5, 8, 12</text>

  <rect x="650" y="190" width="450" height="300" rx="18" fill="#059669" fill-opacity="0.28" stroke="#34d399" stroke-width="3"/>
  <text x="680" y="235" fill="#d1fae5" font-size="28" font-family="Arial, sans-serif" font-weight="700">Upper Half (MinHeap)</text>
  <text x="680" y="280" fill="#a7f3d0" font-size="24" font-family="Arial, sans-serif">Top = smallest of upper half</text>
  <text x="680" y="320" fill="#a7f3d0" font-size="24" font-family="Arial, sans-serif">13, 15, 20, ...</text>

  <path d="M560 300 C610 260, 640 260, 690 300" stroke="#fbbf24" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <text x="430" y="530" fill="#fef08a" font-size="26" font-family="Arial, sans-serif">Balance rule: |size(lower) - size(upper)| ≤ 1</text>
</svg>
