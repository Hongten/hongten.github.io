<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1539 missing-count binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="58" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1539 · Kth Missing Positive Number</text>
  <text x="58" y="138" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Missing(i) = arr[i] - (i + 1), monotonic => binary search</text>

  <rect x="58" y="180" width="1084" height="370" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="235" fill="#f9fafb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">arr:      [ 2, 3, 4, 7, 11 ]</text>
  <text x="90" y="282" fill="#f9fafb" font-size="30" font-family="JetBrains Mono,Consolas,monospace">index i:  [ 0, 1, 2, 3,  4 ]</text>
  <text x="90" y="329" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">missing:  [ 1, 1, 1, 3,  6 ]</text>

  <line x1="90" y1="355" x2="1110" y2="355" stroke="#4b5563" stroke-width="2"/>
  <text x="90" y="403" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">Find first index with missing(i) ≥ k</text>
  <text x="90" y="448" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">If k = 5 => first index is l = 4 (missing=6)</text>
  <text x="90" y="493" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">Answer = l + k = 4 + 5 = 9</text>

  <text x="58" y="594" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文 + full 5-language code tabs</text>
</svg>
