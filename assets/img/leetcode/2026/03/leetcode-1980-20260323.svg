<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1980 diagonal construction">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2748"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#eaf1ff" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1980 · Diagonal Flip</text>
  <text x="60" y="130" fill="#a9c1ff" font-size="26" font-family="Arial, sans-serif">Build ans[i] as opposite of nums[i][i]</text>

  <g font-family="monospace" font-size="34" fill="#ffffff">
    <text x="120" y="210">nums[0] = 0 1 0 1</text>
    <text x="120" y="270">nums[1] = 1 1 0 0</text>
    <text x="120" y="330">nums[2] = 1 0 1 1</text>
    <text x="120" y="390">nums[3] = 0 0 1 0</text>
  </g>

  <g stroke="#ffce54" stroke-width="4">
    <line x1="338" y1="188" x2="338" y2="218"/>
    <line x1="378" y1="248" x2="378" y2="278"/>
    <line x1="418" y1="308" x2="418" y2="338"/>
    <line x1="458" y1="368" x2="458" y2="398"/>
  </g>

  <g fill="#7ee787" font-family="monospace" font-size="38" font-weight="700">
    <text x="680" y="290">ans = 1 0 0 1</text>
  </g>
  <text x="680" y="340" fill="#d6e4ff" font-size="24" font-family="Arial, sans-serif">Different from each row at diagonal position</text>
</svg>
