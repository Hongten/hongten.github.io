<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 693 alternating bits diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 693: Binary Number with Alternating Bits</text>
  <text x="56" y="145" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Check adjacent bits while right-shifting n</text>

  <rect x="56" y="200" width="1088" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="275" fill="#93c5fd" font-size="30" font-family="Consolas,monospace">n = 10 (1010₂):   1 0 1 0  ✅ alternating</text>
  <text x="90" y="340" fill="#93c5fd" font-size="30" font-family="Consolas,monospace">n = 11 (1011₂):   1 0 1 1  ❌ last pair equal</text>

  <text x="90" y="420" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Rule: if (currBit == prevBit) return false; else continue.</text>
  <text x="90" y="485" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Time O(log n), Space O(1) · Author: Tom🦞</text>
</svg>
