<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 401 Binary Watch bit split diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 401 · Binary Watch</text>
  <text x="56" y="126" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Bit Count Enumeration (Hour + Minute LEDs)</text>

  <rect x="56" y="170" width="1088" height="390" rx="20" fill="#111827" stroke="#334155"/>

  <text x="94" y="220" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Hour LEDs (4 bits, 0-11)</text>
  <g transform="translate(92,240)">
    <rect x="0" y="0" width="72" height="72" rx="12" fill="#1d4ed8"/>
    <rect x="88" y="0" width="72" height="72" rx="12" fill="#1d4ed8"/>
    <rect x="176" y="0" width="72" height="72" rx="12" fill="#374151"/>
    <rect x="264" y="0" width="72" height="72" rx="12" fill="#374151"/>
    <text x="24" y="44" fill="#fff" font-size="28" font-family="monospace">8</text>
    <text x="112" y="44" fill="#fff" font-size="28" font-family="monospace">4</text>
    <text x="200" y="44" fill="#cbd5e1" font-size="28" font-family="monospace">2</text>
    <text x="288" y="44" fill="#cbd5e1" font-size="28" font-family="monospace">1</text>
  </g>

  <text x="94" y="380" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Minute LEDs (6 bits, 0-59)</text>
  <g transform="translate(92,400)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#16a34a"/>
    <rect x="72" y="0" width="60" height="60" rx="10" fill="#16a34a"/>
    <rect x="144" y="0" width="60" height="60" rx="10" fill="#374151"/>
    <rect x="216" y="0" width="60" height="60" rx="10" fill="#374151"/>
    <rect x="288" y="0" width="60" height="60" rx="10" fill="#374151"/>
    <rect x="360" y="0" width="60" height="60" rx="10" fill="#374151"/>
    <text x="14" y="38" fill="#fff" font-size="22" font-family="monospace">32</text>
    <text x="92" y="38" fill="#fff" font-size="22" font-family="monospace">16</text>
    <text x="163" y="38" fill="#cbd5e1" font-size="22" font-family="monospace">8</text>
    <text x="236" y="38" fill="#cbd5e1" font-size="22" font-family="monospace">4</text>
    <text x="307" y="38" fill="#cbd5e1" font-size="22" font-family="monospace">2</text>
    <text x="379" y="38" fill="#cbd5e1" font-size="22" font-family="monospace">1</text>
  </g>

  <text x="640" y="280" fill="#f8fafc" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">Example: turnedOn = 4</text>
  <text x="640" y="332" fill="#e2e8f0" font-size="30" font-family="Inter,Arial,sans-serif">Hour 12? invalid</text>
  <text x="640" y="376" fill="#e2e8f0" font-size="30" font-family="Inter,Arial,sans-serif">Valid time sample: 10:48</text>
  <text x="640" y="420" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Check bitCount(h) + bitCount(m)</text>
  <text x="640" y="468" fill="#f97316" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
