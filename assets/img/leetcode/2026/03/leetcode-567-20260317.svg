<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 567 sliding window frequency match diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 26px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .label { font: 600 24px 'Consolas', monospace; fill: #f8fafc; }
      .small { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .box { fill: #334155; stroke: #64748b; stroke-width: 2; rx: 12; }
      .window { fill: #0ea5e9; fill-opacity: 0.25; stroke: #38bdf8; stroke-width: 3; rx: 12; }
      .ok { fill: #22c55e; }
      .bad { fill: #ef4444; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 567 · Permutation in String</text>
  <text x="60" y="130" class="sub">Fixed-Length Sliding Window + Frequency Count</text>

  <text x="60" y="195" class="small">s1 = "ab" → need: a:1, b:1</text>

  <rect x="60" y="240" width="92" height="64" class="box"/><text x="94" y="281" class="label">e</text>
  <rect x="162" y="240" width="92" height="64" class="box"/><text x="196" y="281" class="label">i</text>
  <rect x="264" y="240" width="92" height="64" class="box"/><text x="298" y="281" class="label">d</text>
  <rect x="366" y="240" width="92" height="64" class="box"/><text x="400" y="281" class="label">b</text>
  <rect x="468" y="240" width="92" height="64" class="box"/><text x="502" y="281" class="label">a</text>
  <rect x="570" y="240" width="92" height="64" class="box"/><text x="604" y="281" class="label">o</text>
  <rect x="672" y="240" width="92" height="64" class="box"/><text x="706" y="281" class="label">o</text>

  <rect x="360" y="232" width="206" height="80" class="window"/>
  <text x="360" y="350" class="small">window = "ba" → a:1, b:1</text>
  <circle cx="760" cy="342" r="14" class="ok"/>
  <text x="786" y="350" class="small">match ⇒ return true</text>

  <text x="60" y="430" class="small">Invariant: maintain window size = len(s1), update in O(1), compare 26-count arrays.</text>
  <text x="60" y="470" class="small">Time: O(n) · Space: O(1)</text>
</svg>
