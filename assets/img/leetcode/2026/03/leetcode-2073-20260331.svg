<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2073 queue rounds counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2073 · Time Needed to Buy Tickets</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Queue rounds counting: i ≤ k uses min(t[i], t[k]); i &gt; k uses min(t[i], t[k]-1)</text>

  <rect x="56" y="180" width="1088" height="390" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="100" y="235" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Example: tickets = [2,3,2], k = 2, target need = 2</text>

  <rect x="100" y="270" width="220" height="70" rx="12" fill="#1e293b" stroke="#64748b"/>
  <text x="125" y="315" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">i=0: min(2,2)=2</text>

  <rect x="350" y="270" width="220" height="70" rx="12" fill="#1e293b" stroke="#64748b"/>
  <text x="375" y="315" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">i=1: min(3,2)=2</text>

  <rect x="600" y="270" width="220" height="70" rx="12" fill="#1e293b" stroke="#64748b"/>
  <text x="625" y="315" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif">i=2: min(2,2)=2</text>

  <rect x="850" y="270" width="220" height="70" rx="12" fill="#14532d" stroke="#22c55e"/>
  <text x="900" y="315" fill="#dcfce7" font-size="28" font-family="Inter,Arial,sans-serif">Total = 6</text>

  <path d="M 140 390 L 1040 390" stroke="#475569" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="100" y="440" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Stop immediately when person k buys the last ticket.</text>
  <text x="100" y="476" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">So only positions after k would be capped at t[k]-1 in general.</text>

  <text x="100" y="535" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
