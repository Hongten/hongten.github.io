<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="LeetCode 2864 greedy arrangement diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 36px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .bit{font:700 34px 'JetBrains Mono','Consolas',monospace;fill:#0f172a}
      .note{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .arrow{stroke:#38bdf8;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <text x="50" y="58" class="title">LeetCode 2864 · Maximum Odd Binary Number</text>
  <text x="50" y="92" class="sub">Greedy: put all extra 1s to the left, reserve one 1 at the end.</text>

  <text x="60" y="150" class="label">Input bits (example):</text>
  <rect x="60" y="170" width="480" height="80" rx="14" fill="#334155"/>
  <text x="88" y="222" class="bit">0 1 0 1 1 0 1</text>

  <line x1="560" y1="210" x2="710" y2="210" class="arrow"/>
  <text x="585" y="190" class="note">count ones = 4</text>

  <text x="740" y="150" class="label">Maximum odd arrangement:</text>
  <rect x="740" y="170" width="400" height="80" rx="14" fill="#22c55e"/>
  <text x="768" y="222" class="bit">1 1 1 0 0 0 1</text>

  <text x="60" y="306" class="note">Template: (ones-1) × '1'  +  (zeros) × '0'  +  '1'</text>
  <text x="60" y="338" class="note">Last bit must be 1 (odd), and left side should be as large as possible.</text>
</svg>
