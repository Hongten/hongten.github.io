<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1004 sliding window with flip budget diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1004 · Max Consecutive Ones III</text>
  <text x="60" y="132" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Sliding Window · Keep zeros ≤ k</text>

  <rect x="60" y="180" width="1080" height="340" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="90" y="230" fill="#93c5fd" font-size="24" font-family="monospace">nums: [1, 1, 0, 0, 1, 1, 1, 0, 1]</text>
  <text x="90" y="265" fill="#86efac" font-size="24" font-family="monospace">k = 2 (flip budget)</text>

  <g font-family="monospace" font-size="28" text-anchor="middle">
    <rect x="110" y="300" width="90" height="72" rx="10" fill="#0f172a" stroke="#334155"/><text x="155" y="346" fill="#e5e7eb">1</text>
    <rect x="210" y="300" width="90" height="72" rx="10" fill="#0f172a" stroke="#334155"/><text x="255" y="346" fill="#e5e7eb">1</text>
    <rect x="310" y="300" width="90" height="72" rx="10" fill="#7c2d12" stroke="#fb923c"/><text x="355" y="346" fill="#fed7aa">0</text>
    <rect x="410" y="300" width="90" height="72" rx="10" fill="#7c2d12" stroke="#fb923c"/><text x="455" y="346" fill="#fed7aa">0</text>
    <rect x="510" y="300" width="90" height="72" rx="10" fill="#0f172a" stroke="#334155"/><text x="555" y="346" fill="#e5e7eb">1</text>
    <rect x="610" y="300" width="90" height="72" rx="10" fill="#0f172a" stroke="#334155"/><text x="655" y="346" fill="#e5e7eb">1</text>
    <rect x="710" y="300" width="90" height="72" rx="10" fill="#0f172a" stroke="#334155"/><text x="755" y="346" fill="#e5e7eb">1</text>
    <rect x="810" y="300" width="90" height="72" rx="10" fill="#7c2d12" stroke="#fb923c"/><text x="855" y="346" fill="#fed7aa">0</text>
    <rect x="910" y="300" width="90" height="72" rx="10" fill="#0f172a" stroke="#334155"/><text x="955" y="346" fill="#e5e7eb">1</text>
  </g>

  <rect x="300" y="286" width="610" height="100" rx="14" fill="none" stroke="#22d3ee" stroke-width="4" stroke-dasharray="12 8"/>
  <text x="300" y="426" fill="#22d3ee" font-size="22" font-family="Inter,Arial,sans-serif">left</text>
  <text x="910" y="426" fill="#22d3ee" font-size="22" font-family="Inter,Arial,sans-serif">right</text>
  <text x="90" y="475" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Window invariant: zeroCount ≤ k</text>
  <text x="90" y="512" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">If zeroCount &gt; k, move left until valid again.</text>
  <text x="90" y="560" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
