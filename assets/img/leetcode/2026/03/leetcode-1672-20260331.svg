<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1672 row sum aggregation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="86" fill="#e2e8f0" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700">LeetCode 1672 · Richest Customer Wealth</text>

  <rect x="70" y="140" width="760" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="98" y="185" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">accounts matrix (each row = one customer)</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30">
    <text x="110" y="245" fill="#f8fafc">[1, 5]   → sum = 6</text>
    <text x="110" y="305" fill="#f8fafc">[7, 3]   → sum = 10</text>
    <text x="110" y="365" fill="#f8fafc">[3, 5]   → sum = 8</text>
  </g>

  <path d="M860 300 L980 300" stroke="#22d3ee" stroke-width="8" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect x="1000" y="240" width="150" height="120" rx="14" fill="#052e16" stroke="#16a34a"/>
  <text x="1028" y="285" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">max = 10</text>
  <text x="1018" y="320" fill="#bbf7d0" font-family="Inter,Arial,sans-serif" font-size="18">richest wealth</text>

  <text x="70" y="560" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="24">One pass: row sum + global max, O(mn) time / O(1) extra space</text>
</svg>
