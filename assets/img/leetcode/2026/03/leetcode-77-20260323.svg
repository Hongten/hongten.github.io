<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 77 combinations backtracking pruning diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="74" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 77 · Combinations</text>
  <text x="48" y="112" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Backtracking tree + pruning upper bound: i ≤ n - need + 1</text>

  <rect x="40" y="140" width="1120" height="450" rx="16" fill="#1f2937" stroke="#374151"/>

  <g font-family="Inter,Arial,sans-serif" font-size="20" fill="#e5e7eb">
    <circle cx="170" cy="220" r="28" fill="#2563eb"/><text x="157" y="227">[]</text>

    <line x1="198" y1="220" x2="300" y2="190" stroke="#60a5fa" stroke-width="2"/>
    <line x1="198" y1="220" x2="300" y2="250" stroke="#60a5fa" stroke-width="2"/>
    <line x1="198" y1="220" x2="300" y2="310" stroke="#60a5fa" stroke-width="2"/>

    <circle cx="330" cy="190" r="26" fill="#0ea5e9"/><text x="306" y="197">[1]</text>
    <circle cx="330" cy="250" r="26" fill="#0ea5e9"/><text x="306" y="257">[2]</text>
    <circle cx="330" cy="310" r="26" fill="#0ea5e9"/><text x="306" y="317">[3]</text>

    <line x1="356" y1="190" x2="470" y2="170" stroke="#34d399" stroke-width="2"/>
    <line x1="356" y1="190" x2="470" y2="220" stroke="#34d399" stroke-width="2"/>
    <line x1="356" y1="250" x2="470" y2="250" stroke="#34d399" stroke-width="2"/>
    <line x1="356" y1="310" x2="470" y2="340" stroke="#34d399" stroke-width="2"/>

    <circle cx="500" cy="170" r="24" fill="#10b981"/><text x="466" y="177">[1,2]</text>
    <circle cx="500" cy="220" r="24" fill="#10b981"/><text x="466" y="227">[1,3]</text>
    <circle cx="500" cy="250" r="24" fill="#10b981"/><text x="466" y="257">[2,3]</text>
    <circle cx="500" cy="340" r="24" fill="#10b981"/><text x="466" y="347">[3,4]</text>
  </g>

  <text x="650" y="210" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">Pruning Example (n=4, k=2)</text>
  <text x="650" y="250" fill="#fecaca" font-size="20" font-family="Inter,Arial,sans-serif">need = k - path.size()</text>
  <text x="650" y="285" fill="#fecaca" font-size="20" font-family="Inter,Arial,sans-serif">upper = n - need + 1</text>
  <text x="650" y="320" fill="#fecaca" font-size="20" font-family="Inter,Arial,sans-serif">If start &gt; upper, stop branch early.</text>

  <text x="650" y="390" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Generate only C(n,k) valid paths</text>
  <text x="650" y="425" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">No duplicate combinations</text>
  <text x="650" y="460" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
