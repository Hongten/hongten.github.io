<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 165 compare version numbers segment by segment">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 165 · Compare Version Numbers</text>
  <text x="60" y="135" fill="#93c5fd" font-size="26" font-family="Arial, sans-serif">Two-pointer segment scan: parse integer chunks between dots</text>

  <rect x="60" y="200" width="1080" height="330" rx="18" fill="#111827" stroke="#334155"/>

  <text x="90" y="255" fill="#f9fafb" font-size="30" font-family="Consolas, monospace">v1: 1.0.7</text>
  <text x="90" y="315" fill="#f9fafb" font-size="30" font-family="Consolas, monospace">v2: 1.0.10</text>

  <rect x="270" y="225" width="58" height="40" rx="8" fill="#16a34a"/>
  <rect x="344" y="225" width="58" height="40" rx="8" fill="#16a34a"/>
  <rect x="418" y="225" width="58" height="40" rx="8" fill="#ef4444"/>

  <rect x="270" y="285" width="58" height="40" rx="8" fill="#16a34a"/>
  <rect x="344" y="285" width="58" height="40" rx="8" fill="#16a34a"/>
  <rect x="418" y="285" width="58" height="40" rx="8" fill="#22c55e"/>

  <text x="286" y="253" fill="#ffffff" font-size="24" font-family="Consolas, monospace">1</text>
  <text x="360" y="253" fill="#ffffff" font-size="24" font-family="Consolas, monospace">0</text>
  <text x="434" y="253" fill="#ffffff" font-size="24" font-family="Consolas, monospace">7</text>

  <text x="286" y="313" fill="#ffffff" font-size="24" font-family="Consolas, monospace">1</text>
  <text x="360" y="313" fill="#ffffff" font-size="24" font-family="Consolas, monospace">0</text>
  <text x="428" y="313" fill="#ffffff" font-size="24" font-family="Consolas, monospace">10</text>

  <line x1="520" y1="245" x2="710" y2="245" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="520" y1="305" x2="710" y2="305" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="740" y="262" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">first different segment</text>
  <text x="740" y="304" fill="#f87171" font-size="30" font-family="Arial, sans-serif" font-weight="700">7 &lt; 10  ⇒  return -1</text>

  <text x="60" y="585" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Author: Tom🦞 · hongten.github.io</text>
