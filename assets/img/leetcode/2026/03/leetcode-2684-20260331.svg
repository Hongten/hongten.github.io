<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2684 right-to-left DP transition diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="72" fill="#e5e7eb" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2684 — Maximum Number of Moves in a Grid</text>
  <text x="48" y="108" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">DP from right to left: dp[r][c] = 1 + max(dp[nr][c+1]) when grid[nr][c+1] &gt; grid[r][c]</text>

  <g transform="translate(70,170)">
    <rect x="0" y="0" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>
    <rect x="0" y="100" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>
    <rect x="0" y="200" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>

    <rect x="150" y="0" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>
    <rect x="150" y="100" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>
    <rect x="150" y="200" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>

    <rect x="300" y="0" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>
    <rect x="300" y="100" width="90" height="90" rx="10" fill="#0b3b2e" stroke="#22c55e" stroke-width="2"/>
    <rect x="300" y="200" width="90" height="90" rx="10" fill="#1f2937" stroke="#475569"/>

    <text x="24" y="54" fill="#e5e7eb" font-size="30" font-family="monospace">3</text>
    <text x="24" y="154" fill="#e5e7eb" font-size="30" font-family="monospace">4</text>
    <text x="24" y="254" fill="#e5e7eb" font-size="30" font-family="monospace">2</text>

    <text x="174" y="54" fill="#e5e7eb" font-size="30" font-family="monospace">5</text>
    <text x="174" y="154" fill="#e5e7eb" font-size="30" font-family="monospace">6</text>
    <text x="174" y="254" fill="#e5e7eb" font-size="30" font-family="monospace">7</text>

    <text x="324" y="54" fill="#e5e7eb" font-size="30" font-family="monospace">8</text>
    <text x="324" y="154" fill="#86efac" font-size="30" font-family="monospace">9</text>
    <text x="324" y="254" fill="#e5e7eb" font-size="30" font-family="monospace">10</text>

    <path d="M240,145 L300,45" stroke="#22d3ee" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M240,145 L300,145" stroke="#22d3ee" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M240,145 L300,245" stroke="#22d3ee" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <text x="415" y="55" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">three legal directions</text>
    <text x="415" y="90" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">(up-right / right / down-right)</text>

    <text x="0" y="330" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Transition only if destination is strictly larger.</text>
    <text x="0" y="365" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Compute from last column to first column.</text>
  </g>

  <text x="48" y="590" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
