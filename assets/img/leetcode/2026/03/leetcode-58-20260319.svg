<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 58 reverse scan diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 58 · Length of Last Word</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Reverse scan: skip trailing spaces, then count last word</text>

  <rect x="60" y="190" width="1080" height="330" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="260" fill="#e5e7eb" font-size="34" font-family="monospace">s = "Hello World   "</text>

  <text x="90" y="330" fill="#fca5a5" font-size="30" font-family="Inter,Arial,sans-serif">Step 1: i starts at end, skip spaces ← ← ←</text>
  <line x1="770" y1="318" x2="640" y2="318" stroke="#fca5a5" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="90" y="390" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Step 2: count chars in "World" = 5</text>
  <line x1="700" y1="378" x2="520" y2="378" stroke="#86efac" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="90" y="460" fill="#fde68a" font-size="30" font-family="Inter,Arial,sans-serif">Invariant: right side already processed; stop at first space before last word</text>
  <text x="90" y="565" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文后置 · Java/Go/C++/Python/JavaScript</text>
</svg>
