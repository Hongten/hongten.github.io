<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 416 subset sum DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="72" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 416 · Partition Equal Subset Sum</text>
  <text x="48" y="112" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Transform to subset sum target = total / 2</text>

  <rect x="48" y="150" width="500" height="130" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="72" y="195" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Example nums = [1, 5, 11, 5]</text>
  <text x="72" y="232" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">sum = 22 → target = 11</text>
  <text x="72" y="266" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Need any subset with sum 11</text>

  <rect x="610" y="150" width="540" height="360" rx="14" fill="#111827" stroke="#374151"/>
  <text x="640" y="188" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="600">1D DP Reachability</text>
  <text x="640" y="222" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">dp[s] = whether sum s is reachable</text>

  <g font-family="monospace" font-size="20">
    <rect x="640" y="250" width="460" height="48" rx="8" fill="#1f2937"/>
    <text x="656" y="282" fill="#cbd5e1">initial: dp[0]=T, others=F</text>

    <rect x="640" y="312" width="460" height="48" rx="8" fill="#1f2937"/>
    <text x="656" y="344" fill="#cbd5e1">for x in nums:</text>

    <rect x="640" y="374" width="460" height="48" rx="8" fill="#1f2937"/>
    <text x="656" y="406" fill="#cbd5e1">for s = target..x (reverse)</text>

    <rect x="640" y="436" width="460" height="48" rx="8" fill="#1f2937"/>
    <text x="656" y="468" fill="#86efac">dp[s] = dp[s] OR dp[s-x]</text>
  </g>

  <line x1="548" y1="216" x2="600" y2="216" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="48" y="340" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">Why reverse loop?</text>
  <text x="48" y="374" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">Prevents reusing the same number in one round (0/1 constraint).</text>

  <text x="48" y="560" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
