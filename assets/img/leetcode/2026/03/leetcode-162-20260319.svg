<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 162 find peak element binary search slope diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 162 · Find Peak Element</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Binary Search on Slope Direction</text>

  <rect x="56" y="180" width="1088" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <polyline points="100,470 220,420 340,450 460,320 580,370 700,260 820,320 940,240 1060,300"
            fill="none" stroke="#86efac" stroke-width="6"/>
  <circle cx="460" cy="320" r="9" fill="#fbbf24"/>
  <circle cx="700" cy="260" r="9" fill="#fbbf24"/>
  <circle cx="940" cy="240" r="9" fill="#fbbf24"/>

  <rect x="90" y="220" width="470" height="130" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="116" y="262" fill="#f9fafb" font-size="23" font-family="JetBrains Mono,Consolas,monospace">Compare nums[mid] vs nums[mid+1]</text>
  <text x="116" y="298" fill="#86efac" font-size="22" font-family="JetBrains Mono,Consolas,monospace">nums[mid] &gt; nums[mid+1]  ⇒  r = mid</text>
  <text x="116" y="332" fill="#93c5fd" font-size="22" font-family="JetBrains Mono,Consolas,monospace">nums[mid] &lt; nums[mid+1]  ⇒  l = mid+1</text>

  <rect x="620" y="372" width="470" height="150" rx="12" fill="#111827" stroke="#4b5563"/>
  <text x="646" y="416" fill="#f9fafb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Invariant: [l, r] always has a peak</text>
  <text x="646" y="454" fill="#f9fafb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Stop when l == r, answer is index l</text>
  <text x="646" y="492" fill="#93c5fd" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Time O(log n), Space O(1)</text>

  <text x="56" y="606" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文 + Java default tabs</text>
</svg>
