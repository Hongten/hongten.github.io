<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 494 Target Sum transformation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 494: Target Sum</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Sign assignment → Subset sum counting</text>

  <rect x="60" y="170" width="520" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="220" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Original equation</text>
  <text x="90" y="275" fill="#86efac" font-size="36" font-family="monospace">P - N = target</text>
  <text x="90" y="330" fill="#fcd34d" font-size="36" font-family="monospace">P + N = total</text>
  <text x="90" y="395" fill="#e5e7eb" font-size="30" font-family="monospace">2P = total + target</text>
  <text x="90" y="445" fill="#c4b5fd" font-size="34" font-family="monospace">P = (total + target) / 2</text>

  <rect x="620" y="170" width="520" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="650" y="220" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">DP counting</text>
  <text x="650" y="270" fill="#93c5fd" font-size="26" font-family="monospace">dp[s] = #ways to sum s</text>
  <text x="650" y="320" fill="#e5e7eb" font-size="26" font-family="monospace">init: dp[0] = 1</text>
  <text x="650" y="370" fill="#86efac" font-size="26" font-family="monospace">for num in nums:</text>
  <text x="680" y="410" fill="#86efac" font-size="26" font-family="monospace">for s = goal..num:</text>
  <text x="710" y="450" fill="#fcd34d" font-size="26" font-family="monospace">dp[s] += dp[s-num]</text>

  <text x="60" y="575" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN + 中文 · Java/Go/C++/Python/JS</text>
</svg>
