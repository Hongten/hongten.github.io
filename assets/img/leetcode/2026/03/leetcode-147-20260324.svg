<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 147 insertion sort list pointer insertion diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 147 · Insertion Sort List</text>
  <text x="56" y="122" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Detach current node, scan sorted prefix from dummy, then relink.</text>

  <text x="60" y="180" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">Sorted part (with dummy)</text>
  <rect x="60" y="205" width="88" height="46" rx="8" fill="#1f2937" stroke="#86efac"/>
  <text x="88" y="235" fill="#e5e7eb" font-size="24" font-family="monospace">D</text>

  <rect x="190" y="205" width="88" height="46" rx="8" fill="#1f2937" stroke="#60a5fa"/>
  <text x="218" y="235" fill="#e5e7eb" font-size="24" font-family="monospace">1</text>

  <rect x="320" y="205" width="88" height="46" rx="8" fill="#1f2937" stroke="#60a5fa"/>
  <text x="348" y="235" fill="#e5e7eb" font-size="24" font-family="monospace">3</text>

  <rect x="450" y="205" width="88" height="46" rx="8" fill="#1f2937" stroke="#60a5fa"/>
  <text x="478" y="235" fill="#e5e7eb" font-size="24" font-family="monospace">4</text>

  <line x1="148" y1="228" x2="190" y2="228" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="278" y1="228" x2="320" y2="228" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="408" y1="228" x2="450" y2="228" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="60" y="322" fill="#fca5a5" font-size="20" font-family="Inter,Arial,sans-serif">Current node to insert</text>
  <rect x="320" y="342" width="88" height="46" rx="8" fill="#3f1d2e" stroke="#fca5a5"/>
  <text x="348" y="372" fill="#ffe4e6" font-size="24" font-family="monospace">2</text>

  <path d="M 364 342 C 364 300, 300 290, 300 252" fill="none" stroke="#fca5a5" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="430" y="330" fill="#fca5a5" font-size="18" font-family="Inter,Arial,sans-serif">insert between 1 and 3</text>

  <rect x="60" y="430" width="1080" height="140" rx="14" fill="#111827" stroke="#374151"/>
  <text x="84" y="472" fill="#d1fae5" font-size="24" font-family="Inter,Arial,sans-serif">Invariant:</text>
  <text x="220" y="472" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">dummy.next ... prev is always sorted before each insertion.</text>
  <text x="84" y="515" fill="#dbeafe" font-size="22" font-family="Inter,Arial,sans-serif">After insertion:</text>
  <text x="260" y="515" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">D → 1 → 2 → 3 → 4</text>
</svg>
