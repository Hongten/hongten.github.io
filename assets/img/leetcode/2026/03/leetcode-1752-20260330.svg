<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:28px;font-weight:700}
      .s{font-size:22px;fill:#93c5fd}
      .a{font-size:20px;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 1752 · Circular Drop Counting</text>
  <text x="60" y="130" class="t s">Check if Array Is Sorted and Rotated</text>
  <g transform="translate(70,220)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="#334155"/><text x="53" y="43" class="t a">3</text>
    <rect x="150" y="0" width="130" height="70" rx="10" fill="#334155"/><text x="203" y="43" class="t a">4</text>
    <rect x="300" y="0" width="130" height="70" rx="10" fill="#334155"/><text x="353" y="43" class="t a">5</text>
    <rect x="450" y="0" width="130" height="70" rx="10" fill="#334155"/><text x="503" y="43" class="t a">1</text>
    <rect x="600" y="0" width="130" height="70" rx="10" fill="#334155"/><text x="653" y="43" class="t a">2</text>
    <text x="20" y="130" class="t a">Only one drop: 5 &gt; 1 ✅</text>
    <text x="20" y="170" class="t a">If drops &gt; 1, it cannot be sorted+rotated ❌</text>
  </g>
</svg>
