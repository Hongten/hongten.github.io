<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 64 minimum path sum DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .cell{fill:#111827;stroke:#334155;stroke-width:2}
      .txt{font:600 30px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .path{fill:#16a34a;stroke:#22c55e;stroke-width:3}
      .sum{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#facc15}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 64 · Minimum Path Sum</text>
  <text x="60" y="130" class="sub">DP transition: dp[i][j] = grid[i][j] + min(top, left)</text>

  <g transform="translate(120,180)">
    <rect x="0" y="0" width="110" height="110" class="path"/>
    <rect x="110" y="0" width="110" height="110" class="cell"/>
    <rect x="220" y="0" width="110" height="110" class="cell"/>

    <rect x="0" y="110" width="110" height="110" class="path"/>
    <rect x="110" y="110" width="110" height="110" class="path"/>
    <rect x="220" y="110" width="110" height="110" class="cell"/>

    <rect x="0" y="220" width="110" height="110" class="cell"/>
    <rect x="110" y="220" width="110" height="110" class="path"/>
    <rect x="220" y="220" width="110" height="110" class="path"/>

    <text x="55" y="55" class="txt">1</text>
    <text x="165" y="55" class="txt">3</text>
    <text x="275" y="55" class="txt">1</text>

    <text x="55" y="165" class="txt">1</text>
    <text x="165" y="165" class="txt">5</text>
    <text x="275" y="165" class="txt">1</text>

    <text x="55" y="275" class="txt">4</text>
    <text x="165" y="275" class="txt">2</text>
    <text x="275" y="275" class="txt">1</text>
  </g>

  <text x="560" y="280" class="sub">Optimal Path</text>
  <text x="560" y="340" class="sum">1 → 1 → 5 → 2 → 1 = 10</text>
  <text x="560" y="390" class="sum">Better Path: 1 → 3 → 1 → 1 → 1 = 7 ✓</text>
</svg>
