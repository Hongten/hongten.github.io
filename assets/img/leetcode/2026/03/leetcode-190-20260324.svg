<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 190 reverse bits diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" fill="#e2e8f0" font-size="42" font-family="Inter, Arial">LeetCode 190 · Reverse Bits</text>
  <text x="70" y="132" fill="#93c5fd" font-size="24" font-family="Inter, Arial">Shift-and-Accumulate over 32 rounds</text>

  <rect x="70" y="190" width="1060" height="90" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="95" y="245" fill="#f8fafc" font-size="28" font-family="JetBrains Mono, monospace">n bits (read from right):   b31 b30 ... b2 b1 b0</text>

  <path d="M160 310 L160 380 L1040 380 L1040 450" stroke="#38bdf8" stroke-width="6" fill="none"/>
  <polygon points="1040,450 1022,430 1058,430" fill="#38bdf8"/>
  <text x="180" y="352" fill="#bae6fd" font-size="24" font-family="Inter, Arial">each round: ans = (ans &lt;&lt; 1) | (n &amp; 1), then n &gt;&gt;= 1</text>

  <rect x="70" y="470" width="1060" height="90" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="95" y="525" fill="#f8fafc" font-size="28" font-family="JetBrains Mono, monospace">ans bits (built left):      b0 b1 b2 ... b30 b31</text>
</svg>
