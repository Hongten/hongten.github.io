<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1011 binary search capacity diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .h{font-size:44px;font-weight:700}
      .m{font-size:28px}
      .s{font-size:22px}
      .box{fill:#1f2937;stroke:#38bdf8;stroke-width:2}
      .ok{fill:#22c55e}
      .no{fill:#ef4444}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t h">LeetCode 1011 · Binary Search on Capacity</text>
  <text x="60" y="135" class="t m">Capacity To Ship Packages Within D Days</text>

  <rect x="60" y="180" width="340" height="170" rx="14" class="box"/>
  <text x="82" y="220" class="t s">Lower Bound = max(weights)</text>
  <text x="82" y="255" class="t s">Upper Bound = sum(weights)</text>
  <text x="82" y="290" class="t s">Binary search [lo, hi]</text>

  <rect x="430" y="180" width="340" height="170" rx="14" class="box"/>
  <text x="452" y="220" class="t s">Check mid capacity</text>
  <text x="452" y="255" class="t s">Greedy load in order</text>
  <text x="452" y="290" class="t s">Count used days</text>

  <rect x="800" y="180" width="340" height="170" rx="14" class="box"/>
  <text x="822" y="220" class="t s">usedDays ≤ D ?</text>
  <text x="822" y="255" class="t s ok">Yes → hi = mid</text>
  <text x="822" y="290" class="t s no">No  → lo = mid + 1</text>

  <path d="M402 265 L430 265" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/>
  <path d="M772 265 L800 265" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="60" y="420" class="t m">Example weights: [3,2,2,4,1,4], days = 3</text>
  <text x="60" y="460" class="t s">Try cap = 6 → day groups: [3,2] [2,4] [1,4] ✅</text>
  <text x="60" y="495" class="t s">Try cap = 5 → day groups: [3,2] [2] [4,1] [4] ❌ (4 days)</text>
  <text x="60" y="560" class="t s">Answer = minimum feasible capacity after binary search converges</text>
</svg>