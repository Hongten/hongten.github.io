<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Clone Graph node mapping diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .lbl{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .node{fill:#0b1220;stroke:#38bdf8;stroke-width:3}
      .node2{fill:#0b1220;stroke:#22c55e;stroke-width:3}
      .edge{stroke:#64748b;stroke-width:3}
      .map{stroke:#f59e0b;stroke-width:3;stroke-dasharray:10 8}
      .num{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 133 · Clone Graph</text>
  <text x="60" y="118" class="sub">Build one copy per original node, then reconnect neighbors</text>

  <text x="220" y="170" class="lbl">Original Graph</text>
  <line x1="170" y1="260" x2="300" y2="220" class="edge"/>
  <line x1="300" y1="220" x2="370" y2="320" class="edge"/>
  <line x1="170" y1="260" x2="370" y2="320" class="edge"/>
  <line x1="170" y1="260" x2="240" y2="360" class="edge"/>
  <line x1="240" y1="360" x2="370" y2="320" class="edge"/>
  <circle cx="170" cy="260" r="36" class="node"/><text x="170" y="260" class="num">1</text>
  <circle cx="300" cy="220" r="36" class="node"/><text x="300" y="220" class="num">2</text>
  <circle cx="370" cy="320" r="36" class="node"/><text x="370" y="320" class="num">3</text>
  <circle cx="240" cy="360" r="36" class="node"/><text x="240" y="360" class="num">4</text>

  <text x="760" y="170" class="lbl">Cloned Graph</text>
  <line x1="710" y1="260" x2="840" y2="220" class="edge"/>
  <line x1="840" y1="220" x2="910" y2="320" class="edge"/>
  <line x1="710" y1="260" x2="910" y2="320" class="edge"/>
  <line x1="710" y1="260" x2="780" y2="360" class="edge"/>
  <line x1="780" y1="360" x2="910" y2="320" class="edge"/>
  <circle cx="710" cy="260" r="36" class="node2"/><text x="710" y="260" class="num">1'</text>
  <circle cx="840" cy="220" r="36" class="node2"/><text x="840" y="220" class="num">2'</text>
  <circle cx="910" cy="320" r="36" class="node2"/><text x="910" y="320" class="num">3'</text>
  <circle cx="780" cy="360" r="36" class="node2"/><text x="780" y="360" class="num">4'</text>

  <line x1="206" y1="260" x2="674" y2="260" class="map"/>
  <line x1="336" y1="220" x2="804" y2="220" class="map"/>
  <line x1="406" y1="320" x2="874" y2="320" class="map"/>
  <line x1="276" y1="360" x2="744" y2="360" class="map"/>
  <text x="470" y="410" class="sub">visited[original] = clone</text>
</svg>
