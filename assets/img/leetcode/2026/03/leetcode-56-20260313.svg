<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeetCode 56 Merge Intervals diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .txt { font: 600 22px 'Consolas', monospace; fill: #f8fafc; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 56: Merge Intervals</text>
  <text x="60" y="120" class="sub">Sort by start, then greedily merge overlaps</text>

  <text x="60" y="190" class="label">Input intervals</text>
  <rect x="60" y="220" width="260" height="44" rx="10" fill="#334155"/>
  <text x="84" y="249" class="txt">[1,3]</text>
  <rect x="340" y="220" width="260" height="44" rx="10" fill="#334155"/>
  <text x="364" y="249" class="txt">[2,6]</text>
  <rect x="620" y="220" width="260" height="44" rx="10" fill="#334155"/>
  <text x="644" y="249" class="txt">[8,10]</text>
  <rect x="900" y="220" width="260" height="44" rx="10" fill="#334155"/>
  <text x="924" y="249" class="txt">[15,18]</text>

  <text x="60" y="350" class="label">Merged output</text>
  <rect x="60" y="380" width="540" height="52" rx="10" fill="#0ea5e9" opacity="0.9"/>
  <text x="84" y="414" class="txt">[1,6]</text>
  <rect x="620" y="380" width="260" height="52" rx="10" fill="#2563eb" opacity="0.9"/>
  <text x="644" y="414" class="txt">[8,10]</text>
  <rect x="900" y="380" width="260" height="52" rx="10" fill="#1d4ed8" opacity="0.9"/>
  <text x="924" y="414" class="txt">[15,18]</text>

  <text x="60" y="520" class="sub">Time: O(n log n) · Space: O(n) (output excluded by some definitions)</text>
