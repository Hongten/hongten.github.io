<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 392 Is Subsequence two-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#131a2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 392: Is Subsequence</text>
  <text x="52" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Two-Pointer Monotonic Scan</text>

  <rect x="52" y="180" width="1096" height="390" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="92" y="240" fill="#f8fafc" font-size="24" font-family="JetBrains Mono,Consolas,monospace">s = "abc"</text>
  <text x="92" y="300" fill="#f8fafc" font-size="24" font-family="JetBrains Mono,Consolas,monospace">t = "ahbgdc"</text>

  <text x="250" y="240" fill="#34d399" font-size="24" font-family="JetBrains Mono,Consolas,monospace">a   b   c</text>
  <text x="250" y="300" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">a h b g d c</text>

  <line x1="255" y1="248" x2="255" y2="286" stroke="#22c55e" stroke-width="3"/>
  <line x1="318" y1="248" x2="352" y2="286" stroke="#22c55e" stroke-width="3"/>
  <line x1="382" y1="248" x2="478" y2="286" stroke="#22c55e" stroke-width="3"/>

  <text x="92" y="370" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Invariant: i scans s, j scans t; only move i when chars match.</text>
  <text x="92" y="420" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">If i reaches |s|, s is a subsequence of t.</text>
  <text x="92" y="490" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
