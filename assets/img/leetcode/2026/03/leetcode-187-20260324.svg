<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 187 repeated DNA sequences sliding window diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 24px 'Consolas','Menlo',monospace;fill:#f8fafc}
      .small{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 187 · Repeated DNA Sequences</text>
  <text x="60" y="130" class="sub">Fixed 10-letter sliding window + frequency map</text>

  <rect x="60" y="190" width="1080" height="90" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="245" class="txt">AAAAACCCCCAAAAACCCCCCAAAAAGGGTTT</text>

  <rect x="90" y="206" width="300" height="58" rx="10" fill="#1d4ed8" fill-opacity="0.25" stroke="#60a5fa" stroke-width="3"/>
  <text x="90" y="315" class="small">Window #1: AAAAACCCCC</text>

  <rect x="390" y="206" width="300" height="58" rx="10" fill="#16a34a" fill-opacity="0.22" stroke="#4ade80" stroke-width="3"/>
  <text x="390" y="315" class="small">Window #2: CCCCCAAAAA</text>

  <rect x="690" y="206" width="300" height="58" rx="10" fill="#7c3aed" fill-opacity="0.22" stroke="#a78bfa" stroke-width="3"/>
  <text x="690" y="315" class="small">Later repeat → push once when count hits 2</text>

  <rect x="60" y="370" width="1080" height="200" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="430" class="small">freq["AAAAACCCCC"] = 2   ✓ add to result</text>
  <text x="90" y="470" class="small">freq["CCCCCAAAAA"] = 2   ✓ add to result</text>
  <text x="90" y="510" class="small">Rule: only append when count == 2 (avoid duplicates in output)</text>
  <text x="90" y="550" class="small">Time O(n) · Space O(n)</text>
</svg>
