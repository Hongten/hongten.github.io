<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 189 rotate array diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 189 · Rotate Array</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Three-Reversal In-Place Mapping</text>

  <rect x="56" y="180" width="1088" height="380" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="86" y="238" fill="#cbd5e1" font-size="24" font-family="monospace">Original: [1, 2, 3, 4, 5, 6, 7], k = 3</text>
  <text x="86" y="286" fill="#fde68a" font-size="24" font-family="monospace">Reverse all      -&gt; [7, 6, 5, 4, 3, 2, 1]</text>
  <text x="86" y="334" fill="#86efac" font-size="24" font-family="monospace">Reverse first k  -&gt; [5, 6, 7, 4, 3, 2, 1]</text>
  <text x="86" y="382" fill="#fca5a5" font-size="24" font-family="monospace">Reverse rest     -&gt; [5, 6, 7, 1, 2, 3, 4]</text>

  <line x1="86" y1="420" x2="1114" y2="420" stroke="#334155"/>
  <text x="86" y="464" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Invariant: segment order is restored after each target segment reversal.</text>
  <text x="86" y="506" fill="#a7f3d0" font-size="22" font-family="Inter,Arial,sans-serif">Time O(n) · Space O(1) · Author: Tom🦞</text>
</svg>