<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 79 Word Search DFS backtracking diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 79: Word Search</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">DFS + Backtracking on Grid</text>

  <g transform="translate(70,180)">
    <rect x="0" y="0" width="360" height="360" rx="12" fill="#1f2937" stroke="#334155"/>
    <g font-family="monospace" font-size="30" text-anchor="middle" dominant-baseline="middle">
      <rect x="30" y="30" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="75" y="75" fill="#f8fafc">A</text>
      <rect x="135" y="30" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="180" y="75" fill="#f8fafc">B</text>
      <rect x="240" y="30" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="285" y="75" fill="#f8fafc">C</text>

      <rect x="30" y="135" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="75" y="180" fill="#f8fafc">S</text>
      <rect x="135" y="135" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="180" y="180" fill="#f8fafc">F</text>
      <rect x="240" y="135" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="285" y="180" fill="#f8fafc">C</text>

      <rect x="30" y="240" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="75" y="285" fill="#f8fafc">A</text>
      <rect x="135" y="240" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="180" y="285" fill="#f8fafc">D</text>
      <rect x="240" y="240" width="90" height="90" fill="#0b1220" stroke="#475569"/><text x="285" y="285" fill="#f8fafc">E</text>
    </g>
    <path d="M75 75 L180 75 L285 75 L285 180 L285 285" fill="none" stroke="#22d3ee" stroke-width="7" stroke-linecap="round"/>
    <circle cx="75" cy="75" r="10" fill="#22d3ee"/>
    <circle cx="285" cy="285" r="10" fill="#34d399"/>
  </g>

  <g transform="translate(480,190)">
    <rect x="0" y="0" width="650" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
    <text x="35" y="58" fill="#e2e8f0" font-size="28" font-family="Inter,Arial,sans-serif">Path for word "ABCCED"</text>
    <text x="35" y="112" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">1) Start at first matching cell</text>
    <text x="35" y="156" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">2) DFS to 4 neighbors</text>
    <text x="35" y="200" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">3) Mark visited, then backtrack (restore)</text>
    <text x="35" y="244" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">4) Early prune on mismatch / out of bound</text>
    <text x="35" y="300" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
  </g>
</svg>
