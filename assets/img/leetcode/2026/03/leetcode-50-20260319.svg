<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 50 binary exponentiation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 50 · Pow(x, n)</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Binary Exponentiation / Fast Power</text>

  <rect x="56" y="180" width="1088" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="245" fill="#cbd5e1" font-size="26" font-family="JetBrains Mono,Consolas,monospace">n = 13 (1101₂)</text>
  <text x="90" y="290" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">bit=1 → ans *= base</text>
  <text x="90" y="330" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">base *= base; n >>= 1</text>

  <rect x="520" y="225" width="580" height="290" rx="14" fill="#111827" stroke="#4b5563"/>
  <text x="548" y="268" fill="#f9fafb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Step 1: n=1101, ans*=x, base=x²</text>
  <text x="548" y="308" fill="#f9fafb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Step 2: n=110,  ans stays, base=x⁴</text>
  <text x="548" y="348" fill="#f9fafb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Step 3: n=11,   ans*=x⁴, base=x⁸</text>
  <text x="548" y="388" fill="#f9fafb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Step 4: n=1,    ans*=x⁸</text>
  <text x="548" y="438" fill="#93c5fd" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Result: x^(8+4+1) = x^13</text>

  <text x="56" y="606" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first + 中文 + Java default tabs</text>
</svg>
