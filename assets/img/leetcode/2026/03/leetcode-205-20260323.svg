<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 205 isomorphic mapping diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 205 · Isomorphic Strings</text>
  <text x="60" y="132" fill="#94a3b8" font-size="26" font-family="Inter,Arial,sans-serif">Bidirectional mapping must stay one-to-one</text>

  <rect x="80" y="190" width="440" height="320" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="680" y="190" width="440" height="320" rx="18" fill="#111827" stroke="#334155"/>
  <text x="110" y="240" fill="#f8fafc" font-size="28" font-family="monospace">s = paper</text>
  <text x="710" y="240" fill="#f8fafc" font-size="28" font-family="monospace">t = title</text>

  <g font-family="monospace" font-size="36" fill="#e2e8f0">
    <text x="120" y="310">p</text><text x="180" y="310">a</text><text x="240" y="310">p</text><text x="300" y="310">e</text><text x="360" y="310">r</text>
    <text x="720" y="310">t</text><text x="780" y="310">i</text><text x="840" y="310">t</text><text x="900" y="310">l</text><text x="960" y="310">e</text>
  </g>

  <g stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M130 330 C 350 380, 490 270, 720 330"/>
    <path d="M190 330 C 390 430, 560 230, 780 330"/>
    <path d="M310 330 C 500 420, 700 240, 900 330"/>
    <path d="M370 330 C 560 380, 770 280, 960 330"/>
  </g>

  <text x="90" y="560" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Rule: s[i]→t[i] and t[i]→s[i] must both be consistent at every index.</text>
</svg>
