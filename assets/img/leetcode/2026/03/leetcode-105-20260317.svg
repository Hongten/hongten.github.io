<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .bg{fill:#0b1020}.card{fill:#121a33;stroke:#2b3a67;stroke-width:2}
      .title{fill:#dbe8ff;font:700 36px Arial,sans-serif}
      .sub{fill:#9fb5ff;font:500 22px Arial,sans-serif}
      .txt{fill:#e9efff;font:600 20px Arial,sans-serif}
      .mono{fill:#9fe870;font:700 24px 'Courier New',monospace}
      .line{stroke:#5f7ad6;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5f7ad6"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620"/>
  <text class="title" x="50" y="65">LeetCode 105 · Build Tree from Preorder + Inorder</text>
  <text class="sub" x="50" y="105">Root from preorder, split subtrees by inorder index map</text>

  <rect class="card" x="50" y="145" width="520" height="180" rx="16"/>
  <text class="txt" x="80" y="190">Preorder: root - left - right</text>
  <text class="mono" x="80" y="235">[3, 9, 20, 15, 7]</text>
  <text class="txt" x="80" y="285">First element => root = 3</text>

  <rect class="card" x="630" y="145" width="520" height="180" rx="16"/>
  <text class="txt" x="660" y="190">Inorder: left - root - right</text>
  <text class="mono" x="660" y="235">[9, 3, 15, 20, 7]</text>
  <text class="txt" x="660" y="285">Split at 3 => left:[9], right:[15,20,7]</text>

  <line class="line" x1="570" y1="235" x2="620" y2="235"/>

  <rect class="card" x="170" y="370" width="860" height="200" rx="16"/>
  <text class="txt" x="210" y="420">Recursive boundaries (inorder indices):</text>
  <text class="mono" x="210" y="465">build(0,4) -> root 3</text>
  <text class="mono" x="210" y="500">left: build(0,0) -> root 9</text>
  <text class="mono" x="210" y="535">right: build(2,4) -> root 20 -> children 15,7</text>
</svg>
