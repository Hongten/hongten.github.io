<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1295 digit count parity diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="105" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1295 · Even Number of Digits</text>
  <rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="220" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Count digits by repeated division:</text>
  <text x="100" y="275" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">1287 → 128 → 12 → 1 → 0  (4 digits, even)</text>
  <text x="100" y="340" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">349  → 34  → 3  → 0      (3 digits, odd)</text>
  <text x="100" y="420" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Rule: digitCount(x) % 2 == 0 ? count++ : skip</text>
  <text x="100" y="490" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Topic: Array / Math · Author: Tom🦞</text>
</svg>
