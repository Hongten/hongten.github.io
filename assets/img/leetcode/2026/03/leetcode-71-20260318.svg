<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 71 Simplify Path stack diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <style>
      .title{fill:#e5e7eb;font:700 48px Inter,Arial,sans-serif}
      .txt{fill:#cbd5e1;font:500 28px Inter,Arial,sans-serif}
      .box{fill:#111827;stroke:#60a5fa;stroke-width:3;rx:12}
      .arrow{stroke:#f59e0b;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="90" class="title">LeetCode 71 · Simplify Path</text>
  <text x="50" y="135" class="txt">Token stream: /home//foo/../bar/./</text>

  <rect x="80" y="200" width="300" height="320" class="box"/>
  <text x="120" y="245" class="txt">Stack process</text>
  <text x="120" y="290" class="txt">home  (push)</text>
  <text x="120" y="335" class="txt">foo   (push)</text>
  <text x="120" y="380" class="txt">..    (pop foo)</text>
  <text x="120" y="425" class="txt">bar   (push)</text>
  <text x="120" y="470" class="txt">.     (ignore)</text>

  <line x1="410" y1="360" x2="760" y2="360" class="arrow"/>

  <rect x="790" y="250" width="330" height="220" class="box"/>
  <text x="835" y="310" class="txt">Canonical stack</text>
  <text x="835" y="360" class="txt">[home, bar]</text>
  <text x="835" y="420" class="txt">Result: /home/bar</text>

  <text x="50" y="585" class="txt">Author: Tom🦞 · EN + 中文 · Java/Go/C++/Python/JS</text>
</svg>
