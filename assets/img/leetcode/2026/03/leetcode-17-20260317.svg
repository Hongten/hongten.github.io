<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 17 letter combinations backtracking tree">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .node{fill:#1d4ed8;stroke:#93c5fd;stroke-width:2}
      .leaf{fill:#065f46;stroke:#6ee7b7;stroke-width:2}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#94a3b8;stroke-width:2}
      .label{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 17 · Letter Combinations of a Phone Number</text>
  <text x="60" y="120" class="sub">Backtracking decision tree for digits = "23"</text>

  <line x1="180" y1="230" x2="420" y2="330" class="edge"/>
  <line x1="180" y1="230" x2="420" y2="230" class="edge"/>
  <line x1="180" y1="230" x2="420" y2="130" class="edge"/>

  <line x1="420" y1="130" x2="700" y2="90" class="edge"/>
  <line x1="420" y1="130" x2="700" y2="130" class="edge"/>
  <line x1="420" y1="130" x2="700" y2="170" class="edge"/>

  <line x1="420" y1="230" x2="700" y2="210" class="edge"/>
  <line x1="420" y1="230" x2="700" y2="250" class="edge"/>
  <line x1="420" y1="230" x2="700" y2="290" class="edge"/>

  <line x1="420" y1="330" x2="700" y2="330" class="edge"/>
  <line x1="420" y1="330" x2="700" y2="370" class="edge"/>
  <line x1="420" y1="330" x2="700" y2="410" class="edge"/>

  <circle cx="180" cy="230" r="36" class="node"/><text x="180" y="230" class="txt">""</text>
  <circle cx="420" cy="130" r="36" class="node"/><text x="420" y="130" class="txt">a</text>
  <circle cx="420" cy="230" r="36" class="node"/><text x="420" y="230" class="txt">b</text>
  <circle cx="420" cy="330" r="36" class="node"/><text x="420" y="330" class="txt">c</text>

  <circle cx="700" cy="90" r="34" class="leaf"/><text x="700" y="90" class="txt">ad</text>
  <circle cx="700" cy="130" r="34" class="leaf"/><text x="700" y="130" class="txt">ae</text>
  <circle cx="700" cy="170" r="34" class="leaf"/><text x="700" y="170" class="txt">af</text>
  <circle cx="700" cy="210" r="34" class="leaf"/><text x="700" y="210" class="txt">bd</text>
  <circle cx="700" cy="250" r="34" class="leaf"/><text x="700" y="250" class="txt">be</text>
  <circle cx="700" cy="290" r="34" class="leaf"/><text x="700" y="290" class="txt">bf</text>
  <circle cx="700" cy="330" r="34" class="leaf"/><text x="700" y="330" class="txt">cd</text>
  <circle cx="700" cy="370" r="34" class="leaf"/><text x="700" y="370" class="txt">ce</text>
  <circle cx="700" cy="410" r="34" class="leaf"/><text x="700" y="410" class="txt">cf</text>

  <text x="860" y="190" class="label">Digit 2 → {a,b,c}</text>
  <text x="860" y="230" class="label">Digit 3 → {d,e,f}</text>
  <text x="860" y="270" class="label">DFS: choose → recurse → backtrack</text>
</svg>
