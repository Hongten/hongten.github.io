<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 107 bottom-up BFS diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#e5e7eb}
      .s{font-family:Inter,Arial,sans-serif;fill:#93c5fd}
      .n{font-family:Inter,Arial,sans-serif;fill:#0b1020;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t" font-size="42" font-weight="700">LeetCode 107 · Binary Tree Level Order Traversal II</text>
  <text x="60" y="135" class="s" font-size="26">Bottom-up result via queue BFS + final reverse</text>

  <circle cx="600" cy="210" r="34" fill="#86efac"/><text x="590" y="220" class="n" font-size="26">3</text>
  <line x1="580" y1="240" x2="470" y2="320" stroke="#9ca3af" stroke-width="4"/>
  <line x1="620" y1="240" x2="730" y2="320" stroke="#9ca3af" stroke-width="4"/>

  <circle cx="450" cy="340" r="32" fill="#fde68a"/><text x="440" y="350" class="n" font-size="24">9</text>
  <circle cx="750" cy="340" r="32" fill="#fde68a"/><text x="740" y="350" class="n" font-size="24">20</text>

  <line x1="730" y1="368" x2="660" y2="450" stroke="#9ca3af" stroke-width="4"/>
  <line x1="770" y1="368" x2="840" y2="450" stroke="#9ca3af" stroke-width="4"/>

  <circle cx="640" cy="470" r="30" fill="#bfdbfe"/><text x="630" y="480" class="n" font-size="22">15</text>
  <circle cx="860" cy="470" r="30" fill="#bfdbfe"/><text x="850" y="480" class="n" font-size="22">7</text>

  <rect x="60" y="500" width="1080" height="92" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="540" class="t" font-size="30">Top-down BFS levels: [ [3], [9,20], [15,7] ]</text>
  <text x="90" y="577" class="s" font-size="30">Bottom-up answer:     [ [15,7], [9,20], [3] ]</text>
</svg>
