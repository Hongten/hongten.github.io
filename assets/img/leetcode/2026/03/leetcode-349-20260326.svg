<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 349 intersection via hash sets">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 349 · Intersection of Two Arrays</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Arial, sans-serif">Hash Set Dedup Filtering</text>

  <rect x="90" y="190" width="280" height="320" rx="16" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="120" y="230" fill="#bfdbfe" font-size="28" font-family="monospace">nums1 set</text>
  <text x="120" y="285" fill="#e5e7eb" font-size="34" font-family="monospace">{ 1, 2, 3, 4 }</text>

  <rect x="460" y="190" width="280" height="320" rx="16" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="490" y="230" fill="#a7f3d0" font-size="28" font-family="monospace">scan nums2</text>
  <text x="490" y="285" fill="#e5e7eb" font-size="30" font-family="monospace">2 ✓</text>
  <text x="490" y="330" fill="#e5e7eb" font-size="30" font-family="monospace">2 ✓</text>
  <text x="490" y="375" fill="#e5e7eb" font-size="30" font-family="monospace">5 ✗</text>
  <text x="490" y="420" fill="#e5e7eb" font-size="30" font-family="monospace">3 ✓</text>

  <rect x="830" y="190" width="280" height="320" rx="16" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="860" y="230" fill="#fde68a" font-size="28" font-family="monospace">result set</text>
  <text x="860" y="320" fill="#fef3c7" font-size="40" font-family="monospace">{ 2, 3 }</text>
  <text x="860" y="380" fill="#fef3c7" font-size="22" font-family="Arial, sans-serif">unique intersection</text>

  <path d="M380 350 L450 350" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M750 350 L820 350" stroke="#86efac" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1" />
    </marker>
  </defs>
</svg>
