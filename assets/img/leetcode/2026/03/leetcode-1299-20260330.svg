      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 1299 · Reverse Scan Running Max</text>
  <text x="60" y="130" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">arr = [17, 18, 5, 4, 6, 1]</text>
  <g font-family="Consolas, monospace" font-size="30" font-weight="700">
    <rect x="60" y="190" width="150" height="90" rx="12" fill="#334155"/><text x="115" y="247" fill="#f8fafc">17</text>
    <rect x="230" y="190" width="150" height="90" rx="12" fill="#334155"/><text x="285" y="247" fill="#f8fafc">18</text>
    <rect x="400" y="190" width="150" height="90" rx="12" fill="#334155"/><text x="468" y="247" fill="#f8fafc">5</text>
    <rect x="570" y="190" width="150" height="90" rx="12" fill="#334155"/><text x="638" y="247" fill="#f8fafc">4</text>
    <rect x="740" y="190" width="150" height="90" rx="12" fill="#334155"/><text x="808" y="247" fill="#f8fafc">6</text>
    <rect x="910" y="190" width="150" height="90" rx="12" fill="#334155"/><text x="978" y="247" fill="#f8fafc">1</text>
