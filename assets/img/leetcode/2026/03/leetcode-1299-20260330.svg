  <text x="60" y="350" fill="#fcd34d" font-size="28" font-family="Arial, sans-serif">Scan direction: right → left</text>
  <path d="M1030 360 L170 360" stroke="#fcd34d" stroke-width="8" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#fcd34d"/></marker></defs>
  <text x="60" y="430" fill="#c7d2fe" font-size="26" font-family="Arial, sans-serif">Output: [18, 6, 6, 6, 1, -1]</text>
  <text x="60" y="490" fill="#a7f3d0" font-size="24" font-family="Arial, sans-serif">Invariant: rightMax always equals max value strictly to the right of current index.</text>
