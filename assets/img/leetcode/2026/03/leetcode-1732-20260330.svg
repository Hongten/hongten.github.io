<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1732 prefix sum altitude chart">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1732 · Find the Highest Altitude</text>
  <text x="60" y="132" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">Prefix Sum Peak Tracking</text>

  <line x1="90" y1="460" x2="1060" y2="460" stroke="#64748b" stroke-width="2"/>
  <line x1="90" y1="220" x2="90" y2="500" stroke="#64748b" stroke-width="2"/>

  <polyline fill="none" stroke="#22d3ee" stroke-width="8" points="120,440 260,360 400,390 540,300 680,320 820,260 960,280"/>
  <circle cx="820" cy="260" r="10" fill="#f59e0b"/>
  <text x="840" y="252" fill="#fbbf24" font-size="24" font-family="Arial, sans-serif" font-weight="700">Highest = 3</text>

  <text x="120" y="490" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">start: 0</text>
  <text x="250" y="490" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">+1</text>
  <text x="390" y="490" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">-3</text>
  <text x="530" y="490" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">+5</text>
  <text x="670" y="490" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">+2</text>
  <text x="810" y="490" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">-1</text>

  <text x="60" y="580" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Track running altitude and keep max altitude seen.</text>
</svg>
