<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 300 LIS tails array diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="78" fill="#f8fafc" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 300 · Longest Increasing Subsequence</text>
  <text x="56" y="116" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">O(n²) DP → O(n log n) with tails + binary search</text>

  <rect x="56" y="150" width="1088" height="430" rx="16" fill="#0f172a" stroke="#374151"/>

  <text x="90" y="204" fill="#cbd5e1" font-size="26" font-family="JetBrains Mono,Consolas,monospace">nums = [10, 9, 2, 5, 3, 7, 101, 18]</text>

  <rect x="90" y="235" width="280" height="70" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="108" y="278" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">tails: [2]</text>

  <rect x="420" y="235" width="280" height="70" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="438" y="278" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">tails: [2, 3]</text>

  <rect x="750" y="235" width="320" height="70" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="770" y="278" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">tails: [2, 3, 7]</text>

  <line x1="370" y1="270" x2="418" y2="270" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="270" x2="748" y2="270" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="90" y="350" width="980" height="180" rx="12" fill="#111827" stroke="#374151"/>
  <text x="115" y="392" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="600">Invariant</text>
  <text x="115" y="430" fill="#d1d5db" font-size="23" font-family="Inter,Arial,sans-serif">tails[k] = minimum possible tail value of an increasing subsequence with length (k + 1)</text>
  <text x="115" y="468" fill="#d1d5db" font-size="23" font-family="Inter,Arial,sans-serif">For each x: lower_bound(tails, x) then replace/append</text>
  <text x="115" y="506" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Answer = tails.length = 4</text>

  <text x="56" y="607" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
