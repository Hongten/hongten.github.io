<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Greedy loading for LeetCode 1710">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 23px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .label { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>

  <text x="60" y="82" class="title">LeetCode 1710 · Maximum Units on a Truck</text>
  <text x="60" y="120" class="sub">Greedy: sort by unitsPerBox (desc), take while capacity remains</text>

  <rect x="70" y="170" width="430" height="420" rx="16" fill="#111827" stroke="#334155"/>
  <text x="95" y="215" class="label">Sorted box types (units high → low)</text>

  <rect x="95" y="245" width="380" height="58" rx="10" fill="#1d4ed8"/>
  <text x="115" y="282" class="small">[1 box, 3 units]  ← take first</text>

  <rect x="95" y="322" width="380" height="58" rx="10" fill="#2563eb"/>
  <text x="115" y="359" class="small">[2 boxes, 2 units]  ← take next</text>

  <rect x="95" y="399" width="380" height="58" rx="10" fill="#3b82f6"/>
  <text x="115" y="436" class="small">[3 boxes, 1 unit]  ← remaining only</text>

  <text x="95" y="500" class="small">Example: truckSize = 4</text>
  <text x="95" y="532" class="small">Take 1 + 2 + 1 boxes = 4 boxes</text>
  <text x="95" y="564" class="small">Total units = 1×3 + 2×2 + 1×1 = 8</text>

  <rect x="560" y="170" width="570" height="420" rx="16" fill="#111827" stroke="#334155"/>
  <text x="585" y="215" class="label">Truck loading process</text>

  <rect x="600" y="260" width="500" height="90" rx="12" fill="#0b1220" stroke="#475569"/>
  <rect x="610" y="272" width="120" height="66" rx="8" fill="#1d4ed8"/>
  <rect x="738" y="272" width="120" height="66" rx="8" fill="#2563eb"/>
  <rect x="866" y="272" width="120" height="66" rx="8" fill="#2563eb"/>
  <rect x="994" y="272" width="96" height="66" rx="8" fill="#3b82f6"/>

  <text x="600" y="382" class="small">Capacity slots filled by highest units first</text>
  <text x="600" y="415" class="small">Any swap from high-unit box to low-unit box reduces total units</text>
  <text x="600" y="448" class="small">⇒ Greedy order is optimal</text>

  <text x="60" y="640" class="sub">Author: Tom🦞</text>
</svg>
