<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 46 Permutations Backtracking Tree</title>
  <desc id="desc">Backtracking tree for nums=[1,2,3], showing choose, recurse, and rollback across levels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .node { fill: #111827; stroke: #38bdf8; stroke-width: 2; }
      .txt { font: 600 20px 'Consolas', monospace; fill: #f8fafc; }
      .edge { stroke: #64748b; stroke-width: 2.5; }
      .note { font: 500 19px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .done { fill: #16a34a; }
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="50" y="70" class="title">LeetCode 46 · Permutations · Backtracking Tree</text>
  <text x="50" y="105" class="sub">nums = [1,2,3] · choose unused number at each depth, then rollback</text>

  <line x1="600" y1="170" x2="300" y2="280" class="edge"/>
  <line x1="600" y1="170" x2="600" y2="280" class="edge"/>
  <line x1="600" y1="170" x2="900" y2="280" class="edge"/>

  <line x1="300" y1="330" x2="180" y2="430" class="edge"/>
  <line x1="300" y1="330" x2="420" y2="430" class="edge"/>
  <line x1="600" y1="330" x2="520" y2="430" class="edge"/>
  <line x1="600" y1="330" x2="680" y2="430" class="edge"/>
  <line x1="900" y1="330" x2="780" y2="430" class="edge"/>
  <line x1="900" y1="330" x2="1020" y2="430" class="edge"/>

  <rect x="520" y="140" rx="12" ry="12" width="160" height="60" class="node"/>
  <text x="553" y="178" class="txt">[]</text>

  <rect x="220" y="280" rx="12" ry="12" width="160" height="60" class="node"/>
  <text x="247" y="318" class="txt">[1]</text>

  <rect x="520" y="280" rx="12" ry="12" width="160" height="60" class="node"/>
  <text x="547" y="318" class="txt">[2]</text>

  <rect x="820" y="280" rx="12" ry="12" width="160" height="60" class="node"/>
  <text x="847" y="318" class="txt">[3]</text>

  <rect x="120" y="430" rx="10" ry="10" width="120" height="52" class="node"/>
  <text x="138" y="463" class="txt">[1,2]</text>

  <rect x="360" y="430" rx="10" ry="10" width="120" height="52" class="node"/>
  <text x="378" y="463" class="txt">[1,3]</text>

  <rect x="460" y="430" rx="10" ry="10" width="120" height="52" class="node"/>
  <text x="478" y="463" class="txt">[2,1]</text>

  <rect x="620" y="430" rx="10" ry="10" width="120" height="52" class="node"/>
  <text x="638" y="463" class="txt">[2,3]</text>

  <rect x="720" y="430" rx="10" ry="10" width="120" height="52" class="node"/>
  <text x="738" y="463" class="txt">[3,1]</text>

  <rect x="960" y="430" rx="10" ry="10" width="120" height="52" class="node"/>
  <text x="978" y="463" class="txt">[3,2]</text>

  <rect x="80" y="540" rx="10" ry="10" width="140" height="52" class="done"/>
  <text x="94" y="573" class="txt">[1,2,3]</text>
  <rect x="250" y="540" rx="10" ry="10" width="140" height="52" class="done"/>
  <text x="264" y="573" class="txt">[1,3,2]</text>
  <rect x="420" y="540" rx="10" ry="10" width="140" height="52" class="done"/>
  <text x="434" y="573" class="txt">[2,1,3]</text>
  <rect x="590" y="540" rx="10" ry="10" width="140" height="52" class="done"/>
  <text x="604" y="573" class="txt">[2,3,1]</text>
  <rect x="760" y="540" rx="10" ry="10" width="140" height="52" class="done"/>
  <text x="774" y="573" class="txt">[3,1,2]</text>
  <rect x="930" y="540" rx="10" ry="10" width="140" height="52" class="done"/>
  <text x="944" y="573" class="txt">[3,2,1]</text>

  <text x="50" y="640" class="note">DFS pattern: choose → recurse → undo (used[i]=false) · total leaves = n!.</text>
</svg>
