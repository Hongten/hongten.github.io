<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="Flatten Binary Tree to Linked List reverse preorder rewiring diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a33"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #e6edf7; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #a9b7d0; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #d7e2f2; }
      .node { fill: #1f6feb; stroke: #8fb3ff; stroke-width: 2; }
      .num { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #7aa2f7; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .flat { stroke: #f2cc60; stroke-width: 4; fill: none; marker-end: url(#arrowY); }
      .box { fill: #111a2e; stroke: #2d3f66; stroke-width: 2; rx: 12; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa2f7"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f2cc60"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="50" y="58" class="title">LeetCode 114 · Flatten Binary Tree to Linked List</text>
  <text x="50" y="92" class="subtitle">Reverse preorder (right → left → root) rewires each node to prev</text>

  <rect x="40" y="130" width="540" height="500" class="box"/>
  <text x="70" y="168" class="label">Original tree</text>

  <circle cx="300" cy="220" r="28" class="node"/><text x="300" y="220" class="num">1</text>
  <circle cx="220" cy="320" r="28" class="node"/><text x="220" y="320" class="num">2</text>
  <circle cx="380" cy="320" r="28" class="node"/><text x="380" y="320" class="num">5</text>
  <circle cx="170" cy="420" r="28" class="node"/><text x="170" y="420" class="num">3</text>
  <circle cx="270" cy="420" r="28" class="node"/><text x="270" y="420" class="num">4</text>
  <circle cx="430" cy="420" r="28" class="node"/><text x="430" y="420" class="num">6</text>

  <path d="M286 243 L236 298" class="edge"/>
  <path d="M314 243 L364 298" class="edge"/>
  <path d="M206 343 L182 394" class="edge"/>
  <path d="M234 343 L258 394" class="edge"/>
  <path d="M394 343 L418 394" class="edge"/>

  <rect x="620" y="130" width="540" height="500" class="box"/>
  <text x="650" y="168" class="label">Flattened list (preorder): 1 → 2 → 3 → 4 → 5 → 6</text>

  <circle cx="700" cy="360" r="28" class="node"/><text x="700" y="360" class="num">1</text>
  <circle cx="780" cy="360" r="28" class="node"/><text x="780" y="360" class="num">2</text>
  <circle cx="860" cy="360" r="28" class="node"/><text x="860" y="360" class="num">3</text>
  <circle cx="940" cy="360" r="28" class="node"/><text x="940" y="360" class="num">4</text>
  <circle cx="1020" cy="360" r="28" class="node"/><text x="1020" y="360" class="num">5</text>
  <circle cx="1100" cy="360" r="28" class="node"/><text x="1100" y="360" class="num">6</text>

  <path d="M728 360 L752 360" class="flat"/>
  <path d="M808 360 L832 360" class="flat"/>
  <path d="M888 360 L912 360" class="flat"/>
  <path d="M968 360 L992 360" class="flat"/>
  <path d="M1048 360 L1072 360" class="flat"/>

  <text x="640" y="460" class="subtitle">Invariant: after dfs(node.right), dfs(node.left),</text>
  <text x="640" y="490" class="subtitle">set node.right = prev, node.left = null, prev = node</text>
</svg>
