<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 104 maximum depth highlighted path diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="78" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 104 · Maximum Depth of Binary Tree</text>
  <text x="48" y="118" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Depth = number of nodes on longest root-to-leaf path</text>

  <line x1="80" y1="180" x2="80" y2="520" stroke="#334155" stroke-width="2"/>
  <text x="24" y="188" fill="#94a3b8" font-size="18">L1</text>
  <text x="24" y="268" fill="#94a3b8" font-size="18">L2</text>
  <text x="24" y="348" fill="#94a3b8" font-size="18">L3</text>
  <text x="24" y="428" fill="#94a3b8" font-size="18">L4</text>

  <line x1="220" y1="190" x2="160" y2="250" stroke="#22c55e" stroke-width="6"/>
  <line x1="220" y1="190" x2="280" y2="250" stroke="#64748b" stroke-width="4"/>
  <line x1="160" y1="270" x2="120" y2="330" stroke="#22c55e" stroke-width="6"/>
  <line x1="160" y1="270" x2="200" y2="330" stroke="#64748b" stroke-width="4"/>
  <line x1="120" y1="350" x2="90" y2="410" stroke="#22c55e" stroke-width="6"/>

  <circle cx="220" cy="190" r="26" fill="#0ea5e9"/><text x="220" y="197" text-anchor="middle" fill="#fff" font-size="18">1</text>
  <circle cx="160" cy="270" r="26" fill="#22c55e"/><text x="160" y="277" text-anchor="middle" fill="#fff" font-size="18">2</text>
  <circle cx="280" cy="270" r="26" fill="#475569"/><text x="280" y="277" text-anchor="middle" fill="#fff" font-size="18">3</text>
  <circle cx="120" cy="350" r="26" fill="#22c55e"/><text x="120" y="357" text-anchor="middle" fill="#fff" font-size="18">4</text>
  <circle cx="200" cy="350" r="26" fill="#475569"/><text x="200" y="357" text-anchor="middle" fill="#fff" font-size="18">5</text>
  <circle cx="90" cy="430" r="26" fill="#22c55e"/><text x="90" y="437" text-anchor="middle" fill="#fff" font-size="18">6</text>

  <text x="330" y="250" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Highlighted longest path:</text>
  <text x="330" y="290" fill="#e5e7eb" font-size="26" font-family="monospace">1 → 2 → 4 → 6</text>
  <text x="330" y="330" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">Maximum depth = 4</text>

  <rect x="640" y="180" width="520" height="330" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="668" y="234" fill="#fda4af" font-size="25" font-family="Inter,Arial,sans-serif">DFS Recurrence</text>
  <text x="668" y="282" fill="#e5e7eb" font-size="26" font-family="monospace">depth(node) = 1 + max(</text>
  <text x="668" y="318" fill="#e5e7eb" font-size="26" font-family="monospace">  depth(node.left),</text>
  <text x="668" y="354" fill="#e5e7eb" font-size="26" font-family="monospace">  depth(node.right)</text>
  <text x="668" y="390" fill="#e5e7eb" font-size="26" font-family="monospace">)</text>
  <text x="668" y="450" fill="#93c5fd" font-size="23" font-family="Inter,Arial,sans-serif">Time O(n), Space O(h)</text>
</svg>
