<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 104 maximum depth of binary tree diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 104 · Maximum Depth of Binary Tree</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">DFS recursion · BFS level traversal</text>

  <circle cx="220" cy="220" r="30" fill="#0ea5e9"/><text x="220" y="228" text-anchor="middle" fill="#fff" font-size="20">3</text>
  <circle cx="140" cy="320" r="30" fill="#22c55e"/><text x="140" y="328" text-anchor="middle" fill="#fff" font-size="20">9</text>
  <circle cx="300" cy="320" r="30" fill="#22c55e"/><text x="300" y="328" text-anchor="middle" fill="#fff" font-size="20">20</text>
  <circle cx="260" cy="420" r="30" fill="#f59e0b"/><text x="260" y="428" text-anchor="middle" fill="#fff" font-size="20">15</text>
  <circle cx="340" cy="420" r="30" fill="#f59e0b"/><text x="340" y="428" text-anchor="middle" fill="#fff" font-size="20">7</text>

  <line x1="205" y1="245" x2="155" y2="295" stroke="#94a3b8" stroke-width="4"/>
  <line x1="235" y1="245" x2="285" y2="295" stroke="#94a3b8" stroke-width="4"/>
  <line x1="285" y1="345" x2="270" y2="395" stroke="#94a3b8" stroke-width="4"/>
  <line x1="315" y1="345" x2="330" y2="395" stroke="#94a3b8" stroke-width="4"/>

  <rect x="520" y="180" width="620" height="370" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="550" y="235" fill="#a7f3d0" font-size="28" font-family="Inter,Arial,sans-serif">Depth recurrence:</text>
  <text x="550" y="285" fill="#e5e7eb" font-size="28" font-family="monospace">depth(node) = 1 + max(depth(left), depth(right))</text>
  <text x="550" y="345" fill="#fda4af" font-size="26" font-family="Inter,Arial,sans-serif">Example tree depth = 3</text>
  <text x="550" y="410" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">DFS: O(n) time, O(h) stack</text>
  <text x="550" y="450" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">BFS: O(n) time, O(w) queue</text>
</svg>
