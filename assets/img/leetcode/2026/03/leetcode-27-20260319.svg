<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 27 remove element overwrite-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 27 · Remove Element</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Two pointers: scan i, write kept values at k</text>

  <rect x="60" y="190" width="1080" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="245" fill="#9ca3af" font-size="24" font-family="monospace">nums = [3, 2, 2, 3], val = 3</text>

  <rect x="90" y="285" width="80" height="60" rx="8" fill="#7c3aed"/><text x="122" y="322" fill="#fff" font-size="28" font-family="monospace">3</text>
  <rect x="185" y="285" width="80" height="60" rx="8" fill="#0ea5e9"/><text x="217" y="322" fill="#fff" font-size="28" font-family="monospace">2</text>
  <rect x="280" y="285" width="80" height="60" rx="8" fill="#0ea5e9"/><text x="312" y="322" fill="#fff" font-size="28" font-family="monospace">2</text>
  <rect x="375" y="285" width="80" height="60" rx="8" fill="#7c3aed"/><text x="407" y="322" fill="#fff" font-size="28" font-family="monospace">3</text>

  <text x="90" y="385" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Keep non-val only → compact prefix:</text>
  <rect x="90" y="410" width="80" height="60" rx="8" fill="#10b981"/><text x="122" y="447" fill="#fff" font-size="28" font-family="monospace">2</text>
  <rect x="185" y="410" width="80" height="60" rx="8" fill="#10b981"/><text x="217" y="447" fill="#fff" font-size="28" font-family="monospace">2</text>
  <text x="290" y="448" fill="#e5e7eb" font-size="26" font-family="monospace">k = 2</text>

  <text x="780" y="320" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">i scans all elements</text>
  <text x="780" y="355" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">k writes kept elements</text>
  <text x="780" y="390" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1)</text>
</svg>
