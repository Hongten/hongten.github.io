<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 216 Combination Sum III pruning diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="86" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 216 · Combination Sum III</text>
  <text x="60" y="128" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">DFS + Backtracking + remain pruning</text>

  <rect x="60" y="170" width="280" height="80" rx="12" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="218" fill="#f8fafc" font-size="28" font-family="monospace">start=1, remain=n</text>

  <line x1="200" y1="250" x2="120" y2="320" stroke="#6b7280" stroke-width="3"/>
  <line x1="200" y1="250" x2="260" y2="320" stroke="#6b7280" stroke-width="3"/>
  <line x1="200" y1="250" x2="400" y2="320" stroke="#6b7280" stroke-width="3"/>

  <rect x="40" y="320" width="180" height="72" rx="10" fill="#111827" stroke="#334155"/>
  <text x="62" y="364" fill="#86efac" font-size="24" font-family="monospace">pick 1</text>

  <rect x="230" y="320" width="180" height="72" rx="10" fill="#111827" stroke="#334155"/>
  <text x="252" y="364" fill="#86efac" font-size="24" font-family="monospace">pick 2</text>

  <rect x="420" y="320" width="250" height="72" rx="10" fill="#111827" stroke="#334155"/>
  <text x="442" y="364" fill="#fca5a5" font-size="24" font-family="monospace">num &gt; remain → prune</text>

  <rect x="60" y="450" width="1080" height="120" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="500" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Rule: path length == k and remain == 0 ⇒ valid combination</text>
  <text x="95" y="545" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Strictly increasing picks (start = num + 1) avoids duplicates by construction</text>
</svg>
