<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="42" font-weight="700">LeetCode 3168 · Minimum Number of Chairs in a Waiting Room</text>
  <text x="60" y="135" fill="#93c5fd" font-family="Arial, sans-serif" font-size="26">Occupancy Prefix Peak = Answer</text>

  <line x1="90" y1="500" x2="1090" y2="500" stroke="#94a3b8" stroke-width="2"/>
  <line x1="90" y1="220" x2="90" y2="500" stroke="#94a3b8" stroke-width="2"/>

  <polyline points="130,500 230,420 330,340 430,420 530,500 630,420 730,340 830,260 930,340 1030,420"
            fill="none" stroke="#22d3ee" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <line x1="90" y1="260" x2="1090" y2="260" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="1100" y="266" fill="#fbbf24" font-family="Arial, sans-serif" font-size="20">peak = 3 chairs</text>

  <text x="60" y="560" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">E = enter (+1), L = leave (-1), max running occupancy is the minimum chairs needed.</text>
</svg>
