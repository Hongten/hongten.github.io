<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 292 Nim Game modulo-4 invariant diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="94" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 292 · Nim Game</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Winning Invariant: n % 4 != 0</text>

  <rect x="56" y="180" width="1088" height="390" rx="18" fill="#111827" stroke="#334155"/>

  <g font-family="Inter,Arial,sans-serif" font-size="30" text-anchor="middle">
    <circle cx="180" cy="300" r="56" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="180" y="310" fill="#fecaca">4</text>
    <text x="180" y="392" fill="#fca5a5" font-size="20">Lose</text>

    <circle cx="360" cy="300" r="56" fill="#064e3b" stroke="#34d399"/>
    <text x="360" y="310" fill="#d1fae5">5</text>
    <text x="360" y="392" fill="#6ee7b7" font-size="20">Win</text>

    <circle cx="540" cy="300" r="56" fill="#064e3b" stroke="#34d399"/>
    <text x="540" y="310" fill="#d1fae5">6</text>
    <text x="540" y="392" fill="#6ee7b7" font-size="20">Win</text>

    <circle cx="720" cy="300" r="56" fill="#064e3b" stroke="#34d399"/>
    <text x="720" y="310" fill="#d1fae5">7</text>
    <text x="720" y="392" fill="#6ee7b7" font-size="20">Win</text>

    <circle cx="900" cy="300" r="56" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="900" y="310" fill="#fecaca">8</text>
    <text x="900" y="392" fill="#fca5a5" font-size="20">Lose</text>
  </g>

  <g stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
      </marker>
    </defs>
    <line x1="236" y1="300" x2="304" y2="300"/>
    <line x1="416" y1="300" x2="484" y2="300"/>
    <line x1="596" y1="300" x2="664" y2="300"/>
    <line x1="776" y1="300" x2="844" y2="300"/>
  </g>

  <text x="56" y="528" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Multiples of 4 are losing states under optimal play.</text>
  <text x="56" y="560" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
