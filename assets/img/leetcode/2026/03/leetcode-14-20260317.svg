<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#93c5fd" font-size="36" font-family="Arial">LeetCode 14 · Longest Common Prefix</text>
  <text x="60" y="135" fill="#e2e8f0" font-size="26" font-family="Arial">Vertical scanning compares column i across all strings.</text>

  <g font-family="Consolas, monospace" font-size="34" fill="#f8fafc">
    <rect x="80" y="200" width="980" height="300" rx="16" fill="#111827" stroke="#334155"/>
    <text x="130" y="270">flower   →  f l o w e r</text>
    <text x="130" y="330">flow     →  f l o w</text>
    <text x="130" y="390">flight   →  f l i g h t</text>
  </g>

  <line x1="352" y1="225" x2="352" y2="430" stroke="#22d3ee" stroke-width="6" stroke-dasharray="10 8"/>
  <text x="300" y="470" fill="#22d3ee" font-size="28" font-family="Arial">mismatch at i=2</text>
  <text x="60" y="570" fill="#fbbf24" font-size="30" font-family="Arial">Result prefix: "fl"</text>
</svg>
