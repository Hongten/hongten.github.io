<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 117 next pointer level linking diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="72" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 117 · Populating Next Right Pointers in Each Node II</text>
  <text x="50" y="112" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Current level via next-chain → build next level with dummy + tail</text>

  <rect x="130" y="180" width="110" height="60" rx="10" fill="#1f2937" stroke="#60a5fa"/>
  <text x="175" y="218" fill="#f9fafb" font-size="28" font-family="monospace">1</text>
  <rect x="350" y="180" width="110" height="60" rx="10" fill="#1f2937" stroke="#60a5fa"/>
  <text x="395" y="218" fill="#f9fafb" font-size="28" font-family="monospace">2</text>
  <rect x="570" y="180" width="110" height="60" rx="10" fill="#1f2937" stroke="#60a5fa"/>
  <text x="615" y="218" fill="#f9fafb" font-size="28" font-family="monospace">3</text>
  <line x1="240" y1="210" x2="340" y2="210" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="460" y1="210" x2="560" y2="210" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="760" y="218" fill="#67e8f9" font-size="24" font-family="Inter,Arial,sans-serif">current level traversal</text>

  <rect x="70" y="340" width="130" height="60" rx="10" fill="#0b3b2e" stroke="#34d399"/>
  <text x="100" y="378" fill="#ecfeff" font-size="24" font-family="monospace">dummy</text>
  <rect x="290" y="340" width="110" height="60" rx="10" fill="#1f2937" stroke="#34d399"/>
  <text x="335" y="378" fill="#f9fafb" font-size="28" font-family="monospace">4</text>
  <rect x="510" y="340" width="110" height="60" rx="10" fill="#1f2937" stroke="#34d399"/>
  <text x="555" y="378" fill="#f9fafb" font-size="28" font-family="monospace">5</text>
  <rect x="730" y="340" width="110" height="60" rx="10" fill="#1f2937" stroke="#34d399"/>
  <text x="775" y="378" fill="#f9fafb" font-size="28" font-family="monospace">7</text>
  <line x1="200" y1="370" x2="280" y2="370" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="400" y1="370" x2="500" y2="370" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="620" y1="370" x2="720" y2="370" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="900" y="378" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">next level chain</text>

  <text x="50" y="540" fill="#d1d5db" font-size="28" font-family="Inter,Arial,sans-serif">Invariant: scan current level with next, append non-null children left→right, then jump to dummy.next.</text>
  <text x="50" y="586" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n), Extra Space O(1)</text>
</svg>
