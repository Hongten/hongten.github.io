<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Valid Mountain Array diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#94a3b8" />
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Segoe UI,Arial" font-weight="700">LeetCode 941 · Valid Mountain Array</text>
  <text x="60" y="132" fill="#94a3b8" font-size="28" font-family="Inter,Segoe UI,Arial">Strictly up, one peak, strictly down</text>

  <polyline points="130,500 280,420 420,300 570,210 730,320 870,430 1030,510"
            fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="570" cy="210" r="11" fill="#f59e0b"/>
  <text x="585" y="200" fill="#fbbf24" font-size="24" font-family="Inter,Segoe UI,Arial" font-weight="700">Peak</text>

  <line x1="220" y1="440" x2="480" y2="260" stroke="#22c55e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="210" y="470" fill="#4ade80" font-size="24" font-family="Inter,Segoe UI,Arial">Increasing phase: arr[i] &lt; arr[i+1]</text>

  <line x1="660" y1="250" x2="940" y2="470" stroke="#f87171" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="640" y="520" fill="#fca5a5" font-size="24" font-family="Inter,Segoe UI,Arial">Decreasing phase: arr[i] &gt; arr[i+1]</text>

  <text x="60" y="585" fill="#cbd5e1" font-size="22" font-family="Inter,Segoe UI,Arial">Reject if peak at index 0 or n-1, or if equal adjacent values appear.</text>
</svg>
