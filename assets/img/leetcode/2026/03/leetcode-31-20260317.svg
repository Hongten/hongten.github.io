<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 31 next permutation pivot and reverse diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 31 · Next Permutation</text>
  <text x="56" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Pivot + Rightmost Successor + Reverse Suffix</text>

  <rect x="56" y="170" width="1088" height="392" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="235" fill="#e5e7eb" font-size="24" font-family="monospace">nums = [1, 3, 5, 4, 2]</text>
  <text x="90" y="278" fill="#fbbf24" font-size="22" font-family="Inter,Arial,sans-serif">pivot i=1 (value 3), successor j=3 (value 4)</text>

  <rect x="90" y="305" width="950" height="58" rx="10" fill="#111827"/>
  <text x="110" y="344" fill="#cbd5e1" font-size="24" font-family="monospace">swap(i,j): [1, 4, 5, 3, 2]</text>

  <rect x="90" y="382" width="950" height="58" rx="10" fill="#111827"/>
  <text x="110" y="421" fill="#86efac" font-size="24" font-family="monospace">reverse suffix [i+1..n-1]: [1, 4, 2, 3, 5]</text>

  <text x="90" y="480" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Suffix before swap is non-increasing; reverse makes minimal ascending tail.</text>
  <text x="90" y="520" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
