<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="LeetCode 455 Assign Cookies greedy matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 38px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .num{font:700 24px 'Consolas','Menlo',monospace;fill:#0f172a}
      .note{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="72" class="title">LeetCode 455 · Assign Cookies</text>
  <text x="60" y="108" class="sub">Sort + Two Pointers: smallest feasible cookie for current least greedy child</text>

  <text x="80" y="180" class="label">Children greed g (sorted)</text>
  <g transform="translate(80,210)">
    <rect x="0" y="0" width="120" height="70" rx="12" fill="#93c5fd"/>
    <rect x="135" y="0" width="120" height="70" rx="12" fill="#93c5fd"/>
    <rect x="270" y="0" width="120" height="70" rx="12" fill="#93c5fd"/>
    <rect x="405" y="0" width="120" height="70" rx="12" fill="#93c5fd"/>
    <text x="54" y="44" class="num">1</text>
    <text x="189" y="44" class="num">2</text>
    <text x="324" y="44" class="num">3</text>
    <text x="459" y="44" class="num">4</text>
  </g>

  <text x="80" y="350" class="label">Cookies size s (sorted)</text>
  <g transform="translate(80,380)">
    <rect x="0" y="0" width="120" height="70" rx="12" fill="#86efac"/>
    <rect x="135" y="0" width="120" height="70" rx="12" fill="#86efac"/>
    <rect x="270" y="0" width="120" height="70" rx="12" fill="#86efac"/>
    <text x="54" y="44" class="num">1</text>
    <text x="189" y="44" class="num">2</text>
    <text x="324" y="44" class="num">3</text>
  </g>

  <path d="M140 380 C140 320,140 300,140 280" stroke="#fbbf24" stroke-width="5" fill="none" marker-end="url(#a)"/>
  <path d="M275 380 C275 320,275 300,275 280" stroke="#fbbf24" stroke-width="5" fill="none" marker-end="url(#a)"/>
  <path d="M410 380 C410 320,410 300,410 280" stroke="#fbbf24" stroke-width="5" fill="none" marker-end="url(#a)"/>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect x="650" y="180" width="480" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="680" y="230" class="label">Greedy invariant</text>
  <text x="680" y="270" class="note">• If s[j] &lt; g[i], cookie j cannot satisfy any later child</text>
  <text x="680" y="305" class="note">  (later greed is equal or larger), so skip it.</text>
  <text x="680" y="345" class="note">• If s[j] &gt;= g[i], assign it immediately to child i.</text>
  <text x="680" y="380" class="note">• This preserves larger cookies for larger greed values.</text>
  <text x="680" y="430" class="label">Result in this example: 3 content children</text>

  <text x="60" y="620" class="sub">Complexity: O(n log n + m log m) time, O(1) extra space (excluding sort internals)</text>
</svg>
