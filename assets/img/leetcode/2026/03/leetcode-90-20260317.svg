<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 90 Subsets II backtracking dedup diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .box { fill: #111827; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .txt { font: 600 22px 'Consolas', monospace; fill: #e5e7eb; }
      .hint { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #fca5a5; }
      .ok { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #86efac; }
      .edge { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="75" class="title">LeetCode 90 · Subsets II</text>
  <text x="50" y="112" class="sub">Sort + Backtracking + Skip duplicates at the same DFS level</text>

  <rect x="70" y="170" width="180" height="56" class="box"/>
  <text x="96" y="206" class="txt">[]</text>

  <rect x="340" y="280" width="180" height="56" class="box"/>
  <text x="360" y="316" class="txt">[1]</text>

  <rect x="610" y="390" width="180" height="56" class="box"/>
  <text x="628" y="426" class="txt">[1,2]</text>

  <rect x="880" y="500" width="220" height="56" class="box"/>
  <text x="902" y="536" class="txt">[1,2,2]</text>

  <path d="M250 198 C290 220, 300 260, 340 290" class="edge"/>
  <path d="M520 308 C560 330, 570 370, 610 400" class="edge"/>
  <path d="M790 418 C835 440, 845 480, 880 510" class="edge"/>

  <rect x="340" y="120" width="220" height="56" class="box"/>
  <text x="360" y="156" class="txt">[2]</text>
  <path d="M250 190 C300 170, 305 150, 340 148" class="edge"/>

  <text x="610" y="150" class="hint">At root level: second '2' is skipped (duplicate sibling)</text>
  <text x="610" y="184" class="ok">Inside deeper level after taking first 2: taking next 2 is valid</text>
</svg>
