<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 643 sliding window example">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 643 · Maximum Average Subarray I</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Fixed-size Sliding Window (k = 4)</text>

  <g transform="translate(70,210)">
    <rect x="0" y="0" width="130" height="80" rx="10" fill="#334155"/>
    <rect x="140" y="0" width="130" height="80" rx="10" fill="#334155"/>
    <rect x="280" y="0" width="130" height="80" rx="10" fill="#334155"/>
    <rect x="420" y="0" width="130" height="80" rx="10" fill="#334155"/>
    <rect x="560" y="0" width="130" height="80" rx="10" fill="#1d4ed8" stroke="#93c5fd" stroke-width="3"/>
    <rect x="700" y="0" width="130" height="80" rx="10" fill="#1d4ed8" stroke="#93c5fd" stroke-width="3"/>
    <rect x="840" y="0" width="130" height="80" rx="10" fill="#1d4ed8" stroke="#93c5fd" stroke-width="3"/>
    <rect x="980" y="0" width="130" height="80" rx="10" fill="#1d4ed8" stroke="#93c5fd" stroke-width="3"/>

    <text x="50" y="50" fill="#cbd5e1" font-size="34" font-family="monospace">1</text>
    <text x="190" y="50" fill="#cbd5e1" font-size="34" font-family="monospace">12</text>
    <text x="330" y="50" fill="#cbd5e1" font-size="34" font-family="monospace">-5</text>
    <text x="470" y="50" fill="#cbd5e1" font-size="34" font-family="monospace">-6</text>
    <text x="610" y="50" fill="#dbeafe" font-size="34" font-family="monospace">50</text>
    <text x="750" y="50" fill="#dbeafe" font-size="34" font-family="monospace">3</text>
    <text x="890" y="50" fill="#dbeafe" font-size="34" font-family="monospace">3</text>
    <text x="1030" y="50" fill="#dbeafe" font-size="34" font-family="monospace">1</text>
  </g>

  <text x="70" y="355" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Current window sum = 50 + 3 + 3 + 1 = 57</text>
  <text x="70" y="398" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">Maximum average = 57 / 4 = 14.25</text>
  <text x="70" y="455" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Update rule: windowSum += nums[r] - nums[r-k]</text>
  <text x="70" y="525" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
