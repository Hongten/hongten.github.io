<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2485 pivot integer equation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2485: Find the Pivot Integer</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Balance condition: sum(1..x) = sum(x..n)</text>
  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="270" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">S = n(n+1)/2</text>
  <text x="100" y="335" fill="#86efac" font-size="34" font-family="JetBrains Mono,Consolas,monospace">x(x+1)/2 = S - x(x-1)/2</text>
  <text x="100" y="400" fill="#fca5a5" font-size="42" font-family="JetBrains Mono,Consolas,monospace">x² = S</text>
  <text x="100" y="470" fill="#c4b5fd" font-size="28" font-family="Inter,Arial,sans-serif">If S is a perfect square, pivot = sqrt(S); else -1</text>
  <text x="100" y="525" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN + 中文 · Java/Go/C++/Python/JavaScript</text>
</svg>
