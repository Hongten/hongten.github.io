<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 4 binary search partition diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .h { fill:#e5e7eb; font:700 38px Inter,Arial,sans-serif; }
      .s { fill:#93c5fd; font:600 22px Inter,Arial,sans-serif; }
      .m { fill:#f8fafc; font:700 24px ui-monospace,Menlo,Consolas,monospace; }
      .k { fill:#86efac; font:600 20px Inter,Arial,sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="44" y="68" class="h">LeetCode 4 · Binary Search on Partition</text>
  <text x="44" y="106" class="s">Find i, j so left parts have half elements and border condition holds</text>

  <rect x="44" y="150" width="1112" height="380" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="80" y="220" class="m">A: [ 1  3  |  8  9 ]</text>
  <text x="80" y="280" class="m">B: [ 2  4  5  |  6  7  10 ]</text>

  <line x1="340" y1="185" x2="340" y2="305" stroke="#f59e0b" stroke-width="5"/>
  <line x1="470" y1="245" x2="470" y2="365" stroke="#38bdf8" stroke-width="5"/>

  <text x="560" y="220" class="k">maxLeftA = 3</text>
  <text x="560" y="255" class="k">minRightA = 8</text>
  <text x="560" y="305" class="k">maxLeftB = 5</text>
  <text x="560" y="340" class="k">minRightB = 6</text>
  <text x="560" y="390" class="k">Need: maxLeftA ≤ minRightB and maxLeftB ≤ minRightA</text>

  <text x="80" y="470" class="s">Odd total → median = max(left parts). Even total → average of max(left), min(right).</text>
  <text x="44" y="590" class="k">O(log(min(m,n))) with boundary sentinels · Author: Tom🦞</text>
</svg>
