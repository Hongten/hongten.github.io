<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 977 two pointers fill from back">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 28px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .small{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#1f2937;stroke:#60a5fa;stroke-width:2;rx:10}
      .hilite{fill:#0b3b65;stroke:#38bdf8;stroke-width:3;rx:10}
      .arrow{stroke:#f59e0b;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" class="title">LeetCode 977 · Squares of a Sorted Array</text>
  <text x="60" y="126" class="sub">Two pointers at both ends, fill answer from right to left</text>

  <text x="80" y="195" class="small">nums = [-7, -3, 2, 3, 11]</text>
  <rect x="70" y="220" width="170" height="70" class="hilite"/>
  <rect x="245" y="220" width="170" height="70" class="box"/>
  <rect x="420" y="220" width="170" height="70" class="box"/>
  <rect x="595" y="220" width="170" height="70" class="box"/>
  <rect x="770" y="220" width="170" height="70" class="hilite"/>

  <text x="145" y="265" class="txt" text-anchor="middle">-7</text>
  <text x="330" y="265" class="txt" text-anchor="middle">-3</text>
  <text x="505" y="265" class="txt" text-anchor="middle">2</text>
  <text x="680" y="265" class="txt" text-anchor="middle">3</text>
  <text x="855" y="265" class="txt" text-anchor="middle">11</text>

  <text x="100" y="330" class="small">l</text>
  <line x1="110" y1="318" x2="145" y2="292" class="arrow"/>
  <text x="900" y="330" class="small">r</text>
  <line x1="900" y1="318" x2="855" y2="292" class="arrow"/>

  <text x="80" y="390" class="small">Compare |nums[l]| and |nums[r]|: max square goes to ans[k]</text>

  <text x="80" y="450" class="small">ans = [ _,  _,  _,  _, 121 ]</text>
  <rect x="70" y="470" width="170" height="70" class="box"/>
  <rect x="245" y="470" width="170" height="70" class="box"/>
  <rect x="420" y="470" width="170" height="70" class="box"/>
  <rect x="595" y="470" width="170" height="70" class="box"/>
  <rect x="770" y="470" width="170" height="70" class="hilite"/>

  <text x="145" y="515" class="txt" text-anchor="middle">_</text>
  <text x="330" y="515" class="txt" text-anchor="middle">_</text>
  <text x="505" y="515" class="txt" text-anchor="middle">_</text>
  <text x="680" y="515" class="txt" text-anchor="middle">_</text>
  <text x="855" y="515" class="txt" text-anchor="middle">121</text>

  <text x="960" y="515" class="small">k</text>
  <line x1="970" y1="500" x2="910" y2="500" class="arrow"/>
</svg>
