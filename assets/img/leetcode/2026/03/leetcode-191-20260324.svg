<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 191 Number of 1 Bits n and n-1 clearing lowest set bit">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 191: Number of 1 Bits</text>
  <text x="60" y="150" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Key trick: n &amp; (n - 1) clears one lowest set bit</text>

  <rect x="60" y="200" width="1080" height="340" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="265" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">n      = 1101 0000</text>
  <text x="100" y="320" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">n - 1  = 1100 1111</text>
  <text x="100" y="375" fill="#86efac" font-size="34" font-family="JetBrains Mono,Consolas,monospace">n&amp;(n-1)= 1100 0000   (removed one '1')</text>
  <text x="100" y="440" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Repeat until n == 0; number of iterations = Hamming weight</text>
  <text x="100" y="495" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
