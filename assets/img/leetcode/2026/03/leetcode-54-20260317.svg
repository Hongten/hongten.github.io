<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 54 spiral matrix traversal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="86" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 54 · Spiral Matrix</text>
  <text x="60" y="126" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">Boundary Shrink Traversal: top → right ↓ bottom ← left ↑</text>

  <g transform="translate(350,170)">
    <rect x="0" y="0" width="500" height="320" rx="14" fill="#0b1220" stroke="#334155" stroke-width="3"/>
    <g fill="#1e293b" stroke="#475569" stroke-width="2">
      <rect x="30" y="30" width="90" height="65"/><rect x="120" y="30" width="90" height="65"/><rect x="210" y="30" width="90" height="65"/><rect x="300" y="30" width="90" height="65"/><rect x="390" y="30" width="80" height="65"/>
      <rect x="30" y="95" width="90" height="65"/><rect x="120" y="95" width="90" height="65"/><rect x="210" y="95" width="90" height="65"/><rect x="300" y="95" width="90" height="65"/><rect x="390" y="95" width="80" height="65"/>
      <rect x="30" y="160" width="90" height="65"/><rect x="120" y="160" width="90" height="65"/><rect x="210" y="160" width="90" height="65"/><rect x="300" y="160" width="90" height="65"/><rect x="390" y="160" width="80" height="65"/>
      <rect x="30" y="225" width="90" height="65"/><rect x="120" y="225" width="90" height="65"/><rect x="210" y="225" width="90" height="65"/><rect x="300" y="225" width="90" height="65"/><rect x="390" y="225" width="80" height="65"/>
    </g>

    <path d="M75 62 H430 V258 H75 V127 H340 V193 H165" fill="none" stroke="#38bdf8" stroke-width="7" marker-end="url(#arrow)" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="60" y="560" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">Visit each cell once · O(mn) time · O(1) extra space</text>
</svg>
