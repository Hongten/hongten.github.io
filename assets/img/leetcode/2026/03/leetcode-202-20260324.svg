<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 202 happy number cycle detection diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#eaf2ff}
      .m{font-size:28px;font-weight:700}
      .s{font-size:20px;fill:#b8c7ff}
      .n{font-size:24px;font-weight:700}
      .a{stroke:#7aa2ff;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .box{fill:#1f2a48;stroke:#6f92ff;stroke-width:2;rx:16}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7aa2ff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 202 · Happy Number</text>
  <text x="60" y="130" class="t s">Repeated sum of squared digits reaches 1, or falls into a cycle.</text>

  <rect class="box" x="80" y="220" width="150" height="80"/>
  <text class="t n" x="155" y="270" text-anchor="middle">19</text>

  <rect class="box" x="280" y="220" width="170" height="80"/>
  <text class="t n" x="365" y="270" text-anchor="middle">82</text>

  <rect class="box" x="500" y="220" width="170" height="80"/>
  <text class="t n" x="585" y="270" text-anchor="middle">68</text>

  <rect class="box" x="720" y="220" width="170" height="80"/>
  <text class="t n" x="805" y="270" text-anchor="middle">100</text>

  <rect class="box" x="940" y="220" width="150" height="80"/>
  <text class="t n" x="1015" y="270" text-anchor="middle">1 ✅</text>

  <path class="a" d="M230 260 L280 260"/>
  <path class="a" d="M450 260 L500 260"/>
  <path class="a" d="M670 260 L720 260"/>
  <path class="a" d="M890 260 L940 260"/>

  <rect class="box" x="220" y="420" width="130" height="70"/>
  <rect class="box" x="390" y="420" width="130" height="70"/>
  <rect class="box" x="560" y="420" width="130" height="70"/>
  <rect class="box" x="730" y="420" width="130" height="70"/>
  <text class="t" x="285" y="463" text-anchor="middle">4</text>
  <text class="t" x="455" y="463" text-anchor="middle">16</text>
  <text class="t" x="625" y="463" text-anchor="middle">37</text>
  <text class="t" x="795" y="463" text-anchor="middle">58</text>
  <path class="a" d="M350 455 L390 455"/>
  <path class="a" d="M520 455 L560 455"/>
  <path class="a" d="M690 455 L730 455"/>
  <path class="a" d="M860 455 C920 455,920 360,820 360 C700 360,700 455,730 455"/>
  <text x="910" y="420" class="t s">unhappy cycle</text>
</svg>
