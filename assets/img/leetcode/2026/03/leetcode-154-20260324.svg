<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 154 duplicate-safe binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 154 · Find Minimum in Rotated Sorted Array II</text>
  <rect x="60" y="140" width="1080" height="430" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="195" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Duplicate-safe binary search decision:</text>
  <text x="110" y="245" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">if nums[mid] &gt; nums[right]  ⇒  left = mid + 1</text>
  <text x="110" y="285" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">if nums[mid] &lt; nums[right]  ⇒  right = mid</text>
  <text x="110" y="325" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">if nums[mid] == nums[right] ⇒  right--</text>

  <rect x="90" y="360" width="1020" height="170" rx="12" fill="#111827" stroke="#334155"/>
  <text x="110" y="405" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Example: [2,2,2,0,1,2]</text>
  <text x="110" y="445" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Use right-- to break ties when mid equals right under duplicates.</text>
  <text x="110" y="485" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Converges to minimum index without skipping candidates.</text>

  <text x="60" y="605" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN-first + 中文 + full 5-language code tabs</text>
</svg>
