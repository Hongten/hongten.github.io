<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 239 monotonic deque diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111a2d"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e6edf7; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #9fb3d9; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #d3def5; }
      .num { font: 700 28px 'Consolas', 'Courier New', monospace; fill: #eaf2ff; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #95a9d1; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="86" class="title">LeetCode 239 · Sliding Window Maximum</text>
  <text x="56" y="124" class="sub">Monotonic Deque (store indices, keep values decreasing)</text>

  <text x="56" y="192" class="label">nums = [1, 3, -1, -3, 5, 3, 6, 7], k = 3</text>

  <g transform="translate(56,230)">
    <rect x="0" y="0" width="86" height="74" rx="10" fill="#1a2742" stroke="#2d4067"/>
    <rect x="90" y="0" width="86" height="74" rx="10" fill="#1a2742" stroke="#2d4067"/>
    <rect x="180" y="0" width="86" height="74" rx="10" fill="#1a2742" stroke="#2d4067"/>
    <rect x="270" y="0" width="86" height="74" rx="10" fill="#131f36" stroke="#2d4067"/>
    <rect x="360" y="0" width="86" height="74" rx="10" fill="#131f36" stroke="#2d4067"/>
    <rect x="450" y="0" width="86" height="74" rx="10" fill="#131f36" stroke="#2d4067"/>
    <rect x="540" y="0" width="86" height="74" rx="10" fill="#131f36" stroke="#2d4067"/>
    <rect x="630" y="0" width="86" height="74" rx="10" fill="#131f36" stroke="#2d4067"/>

    <text x="34" y="47" class="num">1</text>
    <text x="124" y="47" class="num">3</text>
    <text x="206" y="47" class="num">-1</text>
    <text x="296" y="47" class="num">-3</text>
    <text x="394" y="47" class="num">5</text>
    <text x="484" y="47" class="num">3</text>
    <text x="574" y="47" class="num">6</text>
    <text x="664" y="47" class="num">7</text>

    <rect x="0" y="-8" width="266" height="90" rx="14" fill="none" stroke="#4cd3a8" stroke-width="4"/>
    <text x="8" y="112" class="small">Window [0..2] → max = 3</text>
  </g>

  <g transform="translate(56,390)">
    <text x="0" y="0" class="label">Deque status (indices):</text>
    <rect x="0" y="20" width="500" height="64" rx="12" fill="#12233d" stroke="#2a436f"/>
    <text x="20" y="62" class="num">[1, 2]</text>
    <text x="180" y="62" class="small">values: [3, -1]</text>

    <text x="0" y="130" class="small">Rule 1: Pop front if index out of window</text>
    <text x="0" y="160" class="small">Rule 2: Pop back while nums[back] ≤ nums[i]</text>
    <text x="0" y="190" class="small">Rule 3: Front is current maximum</text>
  </g>
</svg>
