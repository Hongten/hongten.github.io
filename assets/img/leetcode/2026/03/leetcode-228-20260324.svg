<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 228 Summary Ranges diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 228 · Summary Ranges</text>
  <text x="56" y="136" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Single Pass Range Compression</text>

  <rect x="56" y="176" width="1088" height="388" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="238" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Input: [0, 1, 2, 4, 5, 7]</text>

  <rect x="90" y="266" width="240" height="70" rx="10" fill="#0f766e"/>
  <text x="210" y="309" text-anchor="middle" fill="#ecfeff" font-size="28" font-family="JetBrains Mono,Consolas,monospace">0 -> 2</text>

  <rect x="360" y="266" width="180" height="70" rx="10" fill="#2563eb"/>
  <text x="450" y="309" text-anchor="middle" fill="#eff6ff" font-size="28" font-family="JetBrains Mono,Consolas,monospace">4 -> 5</text>

  <rect x="570" y="266" width="120" height="70" rx="10" fill="#7c3aed"/>
  <text x="630" y="309" text-anchor="middle" fill="#f5f3ff" font-size="28" font-family="JetBrains Mono,Consolas,monospace">7</text>

  <text x="90" y="390" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Rule:</text>
  <text x="170" y="390" fill="#d1d5db" font-size="24" font-family="Inter,Arial,sans-serif">Expand while nums[i+1] = nums[i] + 1</text>
  <text x="90" y="430" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Output:</text>
  <text x="190" y="430" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">["0->2", "4->5", "7"]</text>

  <text x="90" y="500" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">EN first · 中文后置 · Author: Tom🦞</text>
