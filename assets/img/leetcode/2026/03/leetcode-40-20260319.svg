<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 40 duplicate pruning diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="42" font-weight="700">LeetCode 40 · Combination Sum II</text>
  <text x="60" y="135" fill="#93c5fd" font-family="Arial, sans-serif" font-size="26">Sorted Backtracking + Same-Level Duplicate Pruning</text>

  <rect x="70" y="190" width="1060" height="360" rx="16" fill="#0b1220" stroke="#334155"/>

  <circle cx="180" cy="260" r="28" fill="#1d4ed8"/><text x="170" y="268" fill="white" font-size="18" font-family="monospace">[]</text>
  <line x1="208" y1="260" x2="300" y2="230" stroke="#64748b" stroke-width="3"/>
  <line x1="208" y1="260" x2="300" y2="290" stroke="#64748b" stroke-width="3"/>
  <line x1="208" y1="260" x2="300" y2="350" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 6"/>

  <circle cx="330" cy="230" r="26" fill="#0ea5e9"/><text x="316" y="237" fill="white" font-size="16" font-family="monospace">[1]</text>
  <circle cx="330" cy="290" r="26" fill="#0ea5e9"/><text x="316" y="297" fill="white" font-size="16" font-family="monospace">[2]</text>
  <circle cx="330" cy="350" r="26" fill="#475569"/><text x="316" y="357" fill="#cbd5e1" font-size="16" font-family="monospace">[2]</text>

  <text x="380" y="228" fill="#cbd5e1" font-family="Arial" font-size="22">choose first 2 → explore</text>
  <text x="380" y="288" fill="#cbd5e1" font-family="Arial" font-size="22">next distinct value</text>
  <text x="380" y="348" fill="#ef4444" font-family="Arial" font-size="22">skip duplicate at same level</text>

  <rect x="760" y="220" width="320" height="170" rx="12" fill="#111827" stroke="#334155"/>
  <text x="785" y="255" fill="#f8fafc" font-family="monospace" font-size="20">if (i &gt; start &amp;&amp;</text>
  <text x="785" y="285" fill="#f8fafc" font-family="monospace" font-size="20">    a[i] == a[i-1])</text>
  <text x="785" y="315" fill="#f87171" font-family="monospace" font-size="20">    continue;</text>
  <text x="785" y="350" fill="#93c5fd" font-family="Arial" font-size="18">only removes duplicate branches</text>

  <text x="60" y="595" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">Tom🦞 · interview-ready explanation</text>
</svg>
