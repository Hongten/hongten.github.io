<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 260 XOR partition by rightmost set bit">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 260 · Single Number III</text>
  <text x="56" y="132" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">XOR all → isolate rightmost set bit → partition → XOR each group</text>

  <rect x="56" y="170" width="1088" height="404" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="90" y="220" fill="#e5e7eb" font-size="24" font-family="monospace">nums: [1,2,1,3,2,5]</text>
  <text x="90" y="262" fill="#86efac" font-size="24" font-family="monospace">xorAll = 1^2^1^3^2^5 = 3^5 = 6 (110)</text>
  <text x="90" y="304" fill="#fca5a5" font-size="24" font-family="monospace">mask = xorAll &amp; -xorAll = 110 &amp; 010 = 010</text>

  <rect x="80" y="334" width="500" height="210" rx="12" fill="#0b1220" stroke="#475569"/>
  <text x="100" y="372" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Group A (num &amp; mask == 0)</text>
  <text x="100" y="408" fill="#e5e7eb" font-size="22" font-family="monospace">1, 1, 5</text>
  <text x="100" y="444" fill="#86efac" font-size="22" font-family="monospace">XOR => 1^1^5 = 5</text>

  <rect x="620" y="334" width="500" height="210" rx="12" fill="#0b1220" stroke="#475569"/>
  <text x="640" y="372" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Group B (num &amp; mask != 0)</text>
  <text x="640" y="408" fill="#e5e7eb" font-size="22" font-family="monospace">2, 3, 2</text>
  <text x="640" y="444" fill="#86efac" font-size="22" font-family="monospace">XOR => 2^3^2 = 3</text>

  <text x="90" y="525" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">Answer: [5, 3] (order can vary)</text>
  <text x="905" y="598" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
