<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 161 one edit distance diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 161 · One Edit Distance</text>
  <text x="60" y="140" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Two Pointers · First mismatch decides branch</text>

  <rect x="60" y="180" width="1080" height="380" rx="18" fill="#1f2937" stroke="#374151"/>

  <rect x="100" y="220" width="300" height="120" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="120" y="265" fill="#fbbf24" font-size="24" font-family="Inter,Arial,sans-serif">len diff &gt; 1</text>
  <text x="120" y="302" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">immediately false</text>

  <rect x="450" y="220" width="300" height="120" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="470" y="265" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">first mismatch i</text>
  <text x="470" y="302" fill="#c4b5fd" font-size="22" font-family="Inter,Arial,sans-serif">split by length relation</text>

  <rect x="800" y="220" width="300" height="120" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="820" y="265" fill="#67e8f9" font-size="24" font-family="Inter,Arial,sans-serif">same len ⇒ replace</text>
  <text x="820" y="302" fill="#67e8f9" font-size="24" font-family="Inter,Arial,sans-serif">+1 len ⇒ insert/delete</text>

  <line x1="400" y1="280" x2="450" y2="280" stroke="#64748b" stroke-width="4"/>
  <line x1="750" y1="280" x2="800" y2="280" stroke="#64748b" stroke-width="4"/>

  <text x="100" y="420" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">No mismatch until end? true only when longer string has exactly one extra tail char.</text>
  <text x="100" y="470" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
