<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 303 prefix sum interval subtraction diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 303: Prefix Sum Query</text>
  <rect x="60" y="160" width="1080" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="215" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">nums = [ -2, 0, 3, -5, 2, -1 ]</text>
  <text x="90" y="265" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">prefix = [0, -2, -2, 1, -4, -2, -3]</text>
  <text x="90" y="325" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">sumRange(2,5) = prefix[6] - prefix[2] = -3 - (-2) = -1</text>
  <text x="90" y="385" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">Query Formula: pre[right+1] - pre[left]</text>
  <text x="90" y="445" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Immutable array -> preprocess once, answer many queries in O(1)</text>
  <text x="60" y="560" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
