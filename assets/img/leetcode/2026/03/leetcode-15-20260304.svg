<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 15 3Sum sorting and two-pointer process">
  <defs>
    <style>
      .bg{fill:#0f172a}.card{fill:#111827;stroke:#334155;stroke-width:2}.txt{fill:#e5e7eb;font:20px Arial,sans-serif}.sub{fill:#93c5fd;font:16px Arial,sans-serif}.num{fill:#f8fafc;font:22px monospace}.hi{fill:#22c55e}.pivot{fill:#f59e0b}.ptr{fill:#38bdf8}.sum{fill:#fca5a5;font:18px Arial,sans-serif}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="420"/>
  <text x="40" y="48" class="txt">LeetCode 15 · 3Sum · Sort + Two Pointers</text>
  <text x="40" y="76" class="sub">Fix i, then move left/right to approach target 0 while skipping duplicates.</text>

  <rect x="40" y="110" width="880" height="220" rx="14" class="card"/>

  <g transform="translate(80,190)">
    <rect x="0" y="-32" width="70" height="64" rx="8" fill="#1f2937"/>
    <rect x="90" y="-32" width="70" height="64" rx="8" fill="#1f2937"/>
    <rect x="180" y="-32" width="70" height="64" rx="8" class="pivot"/>
    <rect x="270" y="-32" width="70" height="64" rx="8" class="ptr"/>
    <rect x="360" y="-32" width="70" height="64" rx="8" fill="#1f2937"/>
    <rect x="450" y="-32" width="70" height="64" rx="8" fill="#1f2937"/>
    <rect x="540" y="-32" width="70" height="64" rx="8" class="ptr"/>
    <rect x="630" y="-32" width="70" height="64" rx="8" fill="#1f2937"/>

    <text x="24" y="8" class="num">-4</text>
    <text x="114" y="8" class="num">-2</text>
    <text x="206" y="8" class="num">-1</text>
    <text x="296" y="8" class="num">0</text>
    <text x="386" y="8" class="num">1</text>
    <text x="476" y="8" class="num">2</text>
    <text x="566" y="8" class="num">3</text>
    <text x="656" y="8" class="num">5</text>

    <text x="198" y="-48" class="sub">i</text>
    <text x="292" y="-48" class="sub">left</text>
    <text x="554" y="-48" class="sub">right</text>

    <line x1="305" y1="-62" x2="305" y2="-95" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="575" y1="-62" x2="575" y2="-95" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <text x="80" y="360" class="sum">Example step: nums[i] + nums[left] + nums[right] = -1 + 0 + 3 = 2 &gt; 0 → right--</text>
  <text x="80" y="390" class="sub">If sum &lt; 0 then left++, if sum == 0 record triplet and skip duplicates on both sides.</text>
</svg>
