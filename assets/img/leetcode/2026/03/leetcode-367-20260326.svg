<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 367 binary search perfect square diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#152a46"/>
    </linearGradient>
    <style>
      .title { font: 700 46px 'Segoe UI', Arial, sans-serif; fill: #eaf2ff; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #b7cbff; }
      .label { font: 600 24px 'Segoe UI', Arial, sans-serif; fill: #0f1b2d; }
      .small { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #d9e6ff; }
      .mono { font: 600 22px 'Consolas', 'Courier New', monospace; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" class="title">LeetCode 367 · Valid Perfect Square</text>
  <text x="60" y="130" class="sub">Binary search over integer root range [1, num]</text>

  <rect x="90" y="220" width="1020" height="100" rx="20" fill="#f7fbff"/>
  <line x1="140" y1="270" x2="1060" y2="270" stroke="#2a4e7a" stroke-width="8"/>

  <circle cx="260" cy="270" r="22" fill="#58a6ff"/>
  <circle cx="600" cy="270" r="22" fill="#ffb347"/>
  <circle cx="940" cy="270" r="22" fill="#ff7b72"/>

  <text x="226" y="205" class="small">left = 1</text>
  <text x="545" y="205" class="small">mid</text>
  <text x="885" y="205" class="small">right = num</text>

  <rect x="120" y="380" width="960" height="170" rx="16" fill="#0f1f35" stroke="#5b8cff" stroke-width="2"/>
  <text x="160" y="430" class="mono">square = mid * mid</text>
  <text x="160" y="470" class="mono">if square == num → true</text>
  <text x="160" y="510" class="mono">if square &lt; num  → left = mid + 1</text>
  <text x="160" y="550" class="mono">else              → right = mid - 1</text>
</svg>
