<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1143 longest common subsequence DP table diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="82" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="700">LeetCode 1143 · Longest Common Subsequence</text>
  <text x="52" y="124" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="24">dp[i][j] = diagonal+1 if match, else max(top, left)</text>

  <g transform="translate(80,170)">
    <text x="70" y="-18" fill="#cbd5e1" font-size="22" font-family="monospace">text2: a c e</text>
    <text x="-54" y="38" fill="#cbd5e1" font-size="22" font-family="monospace" transform="rotate(-90 -54,38)">text1: a b c d e</text>
    <rect x="0" y="0" width="420" height="360" rx="12" fill="#111827" stroke="#334155"/>
    <g stroke="#334155" fill="none">
      <line x1="0" y1="60" x2="420" y2="60"/><line x1="0" y1="120" x2="420" y2="120"/><line x1="0" y1="180" x2="420" y2="180"/>
      <line x1="0" y1="240" x2="420" y2="240"/><line x1="0" y1="300" x2="420" y2="300"/>
      <line x1="105" y1="0" x2="105" y2="360"/><line x1="210" y1="0" x2="210" y2="360"/><line x1="315" y1="0" x2="315" y2="360"/>
    </g>
    <g fill="#e5e7eb" font-size="30" font-family="monospace" text-anchor="middle">
      <text x="52" y="42">1</text><text x="157" y="42">1</text><text x="262" y="42">1</text><text x="367" y="42">1</text>
      <text x="52" y="102">1</text><text x="157" y="102">1</text><text x="262" y="102">1</text><text x="367" y="102">1</text>
      <text x="52" y="162">1</text><text x="157" y="162">2</text><text x="262" y="162">2</text><text x="367" y="162">2</text>
      <text x="52" y="222">1</text><text x="157" y="222">2</text><text x="262" y="222">2</text><text x="367" y="222">2</text>
      <text x="52" y="282">1</text><text x="157" y="282">2</text><text x="262" y="282">3</text><text x="367" y="282">3</text>
      <text x="52" y="342">1</text><text x="157" y="342">2</text><text x="262" y="342">3</text><text x="367" y="342">3</text>
    </g>
    <rect x="220" y="252" width="86" height="48" fill="none" stroke="#22c55e" stroke-width="4" rx="6"/>
  </g>

  <text x="610" y="250" fill="#e2e8f0" font-size="30" font-family="Inter,Arial,sans-serif">Example: text1 = "abcde", text2 = "ace"</text>
  <text x="610" y="300" fill="#86efac" font-size="32" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = 3 ("ace")</text>
  <text x="610" y="360" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Transition keeps monotonic best result per prefix pair.</text>
  <text x="610" y="418" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">Mismatch -&gt; max(top,left) · Match -&gt; diagonal+1</text>
  <text x="610" y="560" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
