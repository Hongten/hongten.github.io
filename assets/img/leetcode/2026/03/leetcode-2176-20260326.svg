<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2176 index pair filtering diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#b9c9ff}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#dce6ff}
      .small{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#9fb4ff}
      .ok{fill:#4ade80}
      .bad{fill:#fb7185}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" class="title">LeetCode 2176</text>
  <text x="70" y="130" class="sub">Count Equal and Divisible Pairs in an Array</text>

  <rect x="70" y="180" width="1060" height="360" rx="20" fill="#0f172a" stroke="#334155"/>

  <text x="110" y="230" class="label">nums = [3, 1, 2, 2, 2, 1, 3], k = 2</text>
  <text x="110" y="270" class="small">Check pairs (i &lt; j): nums[i] == nums[j] and (i * j) % k == 0</text>

  <g transform="translate(110,320)">
    <rect x="0" y="0" width="120" height="56" rx="10" fill="#1e293b"/><text x="18" y="34" class="label">(0,6)</text><text x="72" y="34" class="ok">✓</text>
    <rect x="150" y="0" width="120" height="56" rx="10" fill="#1e293b"/><text x="168" y="34" class="label">(2,3)</text><text x="222" y="34" class="ok">✓</text>
    <rect x="300" y="0" width="120" height="56" rx="10" fill="#1e293b"/><text x="318" y="34" class="label">(2,4)</text><text x="372" y="34" class="ok">✓</text>
    <rect x="450" y="0" width="120" height="56" rx="10" fill="#1e293b"/><text x="468" y="34" class="label">(3,4)</text><text x="522" y="34" class="ok">✓</text>

    <rect x="0" y="84" width="120" height="56" rx="10" fill="#1e293b"/><text x="18" y="118" class="label">(1,5)</text><text x="72" y="118" class="bad">✗</text>
    <rect x="150" y="84" width="120" height="56" rx="10" fill="#1e293b"/><text x="168" y="118" class="label">(0,1)</text><text x="222" y="118" class="bad">✗</text>
    <text x="300" y="118" class="small">Only equal-value pairs with divisible index product count.</text>
  </g>

  <text x="70" y="588" class="small">Enumerate all i&lt;j pairs → validate value equality → validate (i*j)%k==0</text>
</svg>
