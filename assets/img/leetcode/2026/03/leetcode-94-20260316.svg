<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="LeetCode 94 inorder traversal diagram">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #121a33; stroke: #2c3a66; stroke-width: 2; }
      .title { fill: #eaf0ff; font: 700 40px 'Segoe UI', Arial, sans-serif; }
      .sub { fill: #9db2e8; font: 500 24px 'Segoe UI', Arial, sans-serif; }
      .node { fill: #1e2a4d; stroke: #7aa2ff; stroke-width: 3; }
      .nodeText { fill: #ffffff; font: 700 28px 'Segoe UI', Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #6d87c9; stroke-width: 3; }
      .step { fill: #d9e5ff; font: 600 22px 'Segoe UI', Arial, sans-serif; }
      .order { fill: #ffe08a; font: 700 28px 'Consolas', monospace; }
      .badge { fill: #263764; stroke: #8eb2ff; stroke-width: 2; rx: 12; }
      .badgeText { fill: #f2f6ff; font: 600 20px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="680"/>
  <rect class="panel" x="30" y="30" width="1140" height="620" rx="20"/>

  <text class="title" x="70" y="95">LeetCode 94 · Binary Tree Inorder Traversal</text>
  <text class="sub" x="70" y="132">Rule: Left → Root → Right (Iterative Stack)</text>

  <line class="edge" x1="330" y1="250" x2="220" y2="360"/>
  <line class="edge" x1="330" y1="250" x2="440" y2="360"/>
  <line class="edge" x1="220" y1="360" x2="165" y2="470"/>
  <line class="edge" x1="220" y1="360" x2="275" y2="470"/>

  <circle class="node" cx="330" cy="250" r="38"/>
  <circle class="node" cx="220" cy="360" r="38"/>
  <circle class="node" cx="440" cy="360" r="38"/>
  <circle class="node" cx="165" cy="470" r="38"/>
  <circle class="node" cx="275" cy="470" r="38"/>

  <text class="nodeText" x="330" y="250">1</text>
  <text class="nodeText" x="220" y="360">2</text>
  <text class="nodeText" x="440" y="360">3</text>
  <text class="nodeText" x="165" y="470">4</text>
  <text class="nodeText" x="275" y="470">5</text>

  <rect class="badge" x="560" y="210" width="560" height="70"/>
  <text class="badgeText" x="585" y="254">Step 1: Keep pushing left nodes into stack</text>

  <rect class="badge" x="560" y="300" width="560" height="70"/>
  <text class="badgeText" x="585" y="344">Step 2: Pop top, visit it, then move to right child</text>

  <rect class="badge" x="560" y="390" width="560" height="70"/>
  <text class="badgeText" x="585" y="434">Step 3: Repeat until cur == null and stack empty</text>

  <text class="step" x="70" y="590">Inorder output sequence for this tree:</text>
  <text class="order" x="70" y="632">[4, 2, 5, 1, 3]</text>
</svg>
