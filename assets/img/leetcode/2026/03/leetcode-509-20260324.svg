<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 509 Fibonacci Number diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 509: Fibonacci Number</text>
  <text x="60" y="132" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Rolling DP: F(n) = F(n-1) + F(n-2)</text>

  <rect x="80" y="220" width="180" height="90" rx="14" fill="#1f2937" stroke="#374151"/>
  <rect x="340" y="220" width="180" height="90" rx="14" fill="#1f2937" stroke="#374151"/>
  <rect x="600" y="220" width="180" height="90" rx="14" fill="#1f2937" stroke="#374151"/>
  <rect x="860" y="220" width="220" height="90" rx="14" fill="#1f2937" stroke="#374151"/>

  <text x="130" y="275" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif">F(0)=0</text>
  <text x="390" y="275" fill="#86efac" font-size="34" font-family="Inter,Arial,sans-serif">F(1)=1</text>
  <text x="645" y="275" fill="#fcd34d" font-size="34" font-family="Inter,Arial,sans-serif">...</text>
  <text x="900" y="275" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif">F(n)</text>

  <line x1="260" y1="265" x2="340" y2="265" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="520" y1="265" x2="600" y2="265" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="780" y1="265" x2="860" y2="265" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="80" y="400" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">State transition:</text>
  <text x="80" y="445" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">cur = prev1 + prev2; prev2 = prev1; prev1 = cur</text>
  <text x="80" y="505" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1) · Author: Tom🦞</text>
</svg>
