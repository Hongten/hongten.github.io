<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1512 Number of Good Pairs counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2340"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1512 · Number of Good Pairs</text>
  <text x="50" y="135" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Incremental counting: ans += seen[x], then seen[x]++</text>

  <rect x="50" y="180" width="1100" height="380" rx="18" fill="#111827" stroke="#374151"/>

  <text x="90" y="235" fill="#a7f3d0" font-size="26" font-family="monospace">nums = [1,2,3,1,1,3]</text>
  <text x="90" y="280" fill="#e5e7eb" font-size="24" font-family="monospace">i=0, x=1: seen[1]=0, ans=0</text>
  <text x="90" y="320" fill="#e5e7eb" font-size="24" font-family="monospace">i=1, x=2: seen[2]=0, ans=0</text>
  <text x="90" y="360" fill="#e5e7eb" font-size="24" font-family="monospace">i=2, x=3: seen[3]=0, ans=0</text>
  <text x="90" y="400" fill="#fde68a" font-size="24" font-family="monospace">i=3, x=1: seen[1]=1, ans=1</text>
  <text x="90" y="440" fill="#fde68a" font-size="24" font-family="monospace">i=4, x=1: seen[1]=2, ans=3</text>
  <text x="90" y="480" fill="#fde68a" font-size="24" font-family="monospace">i=5, x=3: seen[3]=1, ans=4</text>

  <text x="90" y="530" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Final good pairs = 4</text>
</svg>
