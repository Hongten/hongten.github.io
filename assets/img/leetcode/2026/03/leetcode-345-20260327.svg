<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 25px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .txt { font: 600 28px 'JetBrains Mono', monospace; fill: #f8fafc; }
      .v { fill: #f97316; font-weight: 700; }
      .lab { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 345 · Reverse Vowels of a String</text>
  <text x="60" y="132" class="sub">Two pointers scan inward and swap only vowels</text>

  <rect x="60" y="210" width="1080" height="220" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="110" y="340" class="txt">h <tspan class="v">e</tspan> l l o   w <tspan class="v">o</tspan> r l d</text>
  <text x="110" y="390" class="txt">h <tspan class="v">o</tspan> l l o   w <tspan class="v">e</tspan> r l d</text>

  <line x1="195" y1="245" x2="195" y2="300" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="245" x2="700" y2="300" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="150" y="230" class="lab">left pointer</text>
  <text x="640" y="230" class="lab">right pointer</text>

  <text x="60" y="530" class="lab">Vowels: a, e, i, o, u, A, E, I, O, U · Time O(n) · Two-pointer invariant</text>
</svg>
