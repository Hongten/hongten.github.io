<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="LeetCode 92 reverse linked list II head insertion diagram">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7dd3fc"/>
    </marker>
    <style>
      .bg{fill:#0b1220}.title{fill:#e2e8f0;font:700 30px Arial}.txt{fill:#cbd5e1;font:18px Arial}.box{fill:#111827;stroke:#38bdf8;stroke-width:2}.num{fill:#f8fafc;font:700 24px Arial}.label{fill:#fbbf24;font:700 18px Arial}
    </style>
  </defs>
  <rect class="bg" width="1200" height="420" rx="16"/>
  <text x="40" y="52" class="title">LeetCode 92 · Reverse Linked List II</text>
  <text x="40" y="82" class="txt">Head-insertion inside [left, right]: move cur.next to right after pre repeatedly</text>

  <text x="40" y="132" class="label">before</text>
  <rect x="140" y="105" width="90" height="54" rx="8" class="box"/><text x="178" y="140" class="num">1</text>
  <rect x="280" y="105" width="90" height="54" rx="8" class="box"/><text x="318" y="140" class="num">2</text>
  <rect x="420" y="105" width="90" height="54" rx="8" class="box"/><text x="458" y="140" class="num">3</text>
  <rect x="560" y="105" width="90" height="54" rx="8" class="box"/><text x="598" y="140" class="num">4</text>
  <rect x="700" y="105" width="90" height="54" rx="8" class="box"/><text x="738" y="140" class="num">5</text>
  <line x1="230" y1="132" x2="280" y2="132" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="370" y1="132" x2="420" y2="132" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="510" y1="132" x2="560" y2="132" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="650" y1="132" x2="700" y2="132" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="295" y="94" class="label">left</text>
  <text x="575" y="94" class="label">right</text>

  <text x="40" y="250" class="label">after reversing [2,4]</text>
  <rect x="140" y="223" width="90" height="54" rx="8" class="box"/><text x="178" y="258" class="num">1</text>
  <rect x="280" y="223" width="90" height="54" rx="8" class="box"/><text x="318" y="258" class="num">4</text>
  <rect x="420" y="223" width="90" height="54" rx="8" class="box"/><text x="458" y="258" class="num">3</text>
  <rect x="560" y="223" width="90" height="54" rx="8" class="box"/><text x="598" y="258" class="num">2</text>
  <rect x="700" y="223" width="90" height="54" rx="8" class="box"/><text x="738" y="258" class="num">5</text>
  <line x1="230" y1="250" x2="280" y2="250" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="370" y1="250" x2="420" y2="250" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="510" y1="250" x2="560" y2="250" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="650" y1="250" x2="700" y2="250" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="40" y="360" class="txt">Pointer invariant: pre stays fixed before the window; cur stays at window tail while nodes are inserted after pre.</text>
</svg>
