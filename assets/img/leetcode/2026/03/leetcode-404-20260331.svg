<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 404 sum of left leaves diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{fill:#e5e7eb;font:700 46px Inter,Arial,sans-serif}
      .sub{fill:#9ca3af;font:28px Inter,Arial,sans-serif}
      .node{fill:#1f2937;stroke:#60a5fa;stroke-width:2}
      .txt{fill:#f8fafc;font:600 26px Inter,Arial,sans-serif;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#64748b;stroke-width:3}
      .leftLeaf{fill:#14532d;stroke:#4ade80;stroke-width:3}
      .sum{fill:#86efac;font:700 34px Inter,Arial,sans-serif}
      .note{fill:#93c5fd;font:600 24px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="95" class="title">LeetCode 404 · Sum of Left Leaves</text>
  <text x="60" y="140" class="sub">DFS: only add nodes that are both left child and leaf</text>

  <line x1="600" y1="220" x2="430" y2="320" class="edge"/>
  <line x1="600" y1="220" x2="770" y2="320" class="edge"/>
  <line x1="430" y1="320" x2="340" y2="430" class="edge"/>
  <line x1="430" y1="320" x2="520" y2="430" class="edge"/>
  <line x1="770" y1="320" x2="860" y2="430" class="edge"/>

  <circle cx="600" cy="220" r="38" class="node"/>
  <text x="600" y="220" class="txt">3</text>

  <circle cx="430" cy="320" r="38" class="node"/>
  <text x="430" y="320" class="txt">9</text>

  <circle cx="770" cy="320" r="38" class="node"/>
  <text x="770" y="320" class="txt">20</text>

  <circle cx="340" cy="430" r="38" class="leftLeaf"/>
  <text x="340" y="430" class="txt">5</text>

  <circle cx="520" cy="430" r="38" class="node"/>
  <text x="520" y="430" class="txt">7</text>

  <circle cx="860" cy="430" r="38" class="leftLeaf"/>
  <text x="860" y="430" class="txt">15</text>

  <text x="285" y="490" class="note">left leaf ✓</text>
  <text x="805" y="490" class="note">left leaf ✓</text>

  <text x="60" y="575" class="sum">Result: 5 + 15 = 20</text>
</svg>
