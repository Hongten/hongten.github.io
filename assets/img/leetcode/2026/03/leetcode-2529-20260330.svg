<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 2529 dual boundary binary search">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .title { fill: #e5e7eb; font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .sub { fill: #9ca3af; font: 500 16px 'Segoe UI', Arial, sans-serif; }
      .cell { fill: #111827; stroke: #374151; stroke-width: 2; }
      .neg { fill: #3b82f6; }
      .zero { fill: #6b7280; }
      .pos { fill: #10b981; }
      .txt { fill: #f9fafb; font: 700 20px 'Consolas', monospace; }
      .idx { fill: #9ca3af; font: 600 14px 'Consolas', monospace; }
      .arrow1 { stroke: #f59e0b; stroke-width: 3; marker-end: url(#m1); }
      .arrow2 { stroke: #ef4444; stroke-width: 3; marker-end: url(#m2); }
      .note1 { fill: #fbbf24; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .note2 { fill: #f87171; font: 700 16px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m1" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#f59e0b" />
    </marker>
    <marker id="m2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#ef4444" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="420" rx="18" />
  <text class="title" x="40" y="52">LeetCode 2529: Dual Boundary Binary Search</text>
  <text class="sub" x="40" y="82">Find first index of &gt;=0 and first index of &gt;0 in a sorted array</text>

  <g transform="translate(70,150)">
    <rect class="cell neg" x="0" y="0" width="90" height="70" rx="8" /><text class="txt" x="33" y="44">-4</text><text class="idx" x="38" y="92">0</text>
    <rect class="cell neg" x="95" y="0" width="90" height="70" rx="8" /><text class="txt" x="128" y="44">-2</text><text class="idx" x="133" y="92">1</text>
    <rect class="cell neg" x="190" y="0" width="90" height="70" rx="8" /><text class="txt" x="223" y="44">-1</text><text class="idx" x="228" y="92">2</text>
    <rect class="cell zero" x="285" y="0" width="90" height="70" rx="8" /><text class="txt" x="322" y="44">0</text><text class="idx" x="323" y="92">3</text>
    <rect class="cell zero" x="380" y="0" width="90" height="70" rx="8" /><text class="txt" x="417" y="44">0</text><text class="idx" x="418" y="92">4</text>
    <rect class="cell pos" x="475" y="0" width="90" height="70" rx="8" /><text class="txt" x="512" y="44">3</text><text class="idx" x="513" y="92">5</text>
    <rect class="cell pos" x="570" y="0" width="90" height="70" rx="8" /><text class="txt" x="607" y="44">8</text><text class="idx" x="608" y="92">6</text>
    <rect class="cell pos" x="665" y="0" width="90" height="70" rx="8" /><text class="txt" x="697" y="44">12</text><text class="idx" x="703" y="92">7</text>

    <line class="arrow1" x1="330" y1="-35" x2="330" y2="-2" />
    <text class="note1" x="214" y="-48">firstNonNegative = 3</text>

    <line class="arrow2" x1="520" y1="120" x2="520" y2="72" />
    <text class="note2" x="430" y="145">firstPositive = 5</text>
  </g>

  <text class="sub" x="70" y="360">negativeCount = 3, positiveCount = 8 - 5 = 3, answer = max(3,3) = 3</text>
</svg>
