<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2000 reverse prefix diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .txt{font:700 34px 'Consolas','Menlo',monospace;fill:#f8fafc}
      .idx{font:600 20px 'Consolas','Menlo',monospace;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 2000 · Reverse Prefix of Word</text>
  <text x="60" y="132" class="sub">Find first 'd' → reverse prefix [0..3]</text>

  <rect x="60" y="180" width="1080" height="170" rx="18" fill="#111827" stroke="#334155"/>
  <text x="90" y="240" class="sub">Before</text>
  <text x="90" y="300" class="txt">a b c d e f d</text>
  <text x="90" y="332" class="idx">0 1 2 3 4 5 6</text>
  <rect x="84" y="262" width="320" height="54" rx="10" fill="#2563eb" fill-opacity="0.35"/>
  <circle cx="390" cy="289" r="22" fill="#22c55e"/>
  <text x="382" y="297" class="label">d</text>

  <path d="M600 370 L600 430" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect x="60" y="440" width="1080" height="150" rx="18" fill="#111827" stroke="#334155"/>
  <text x="90" y="492" class="sub">After</text>
  <text x="90" y="548" class="txt">d c b a e f d</text>
</svg>
