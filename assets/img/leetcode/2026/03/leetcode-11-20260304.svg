<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 11 two pointers diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8fafc"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="420" fill="url(#bg)"/>
  <text x="36" y="48" font-size="28" fill="#e2e8f0" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 11 · Two Pointers</text>
  <text x="36" y="78" font-size="18" fill="#94a3b8" font-family="Inter,Arial,sans-serif">Move the shorter wall to seek a taller bottleneck.</text>

  <line x1="80" y1="340" x2="880" y2="340" stroke="#94a3b8" stroke-width="2"/>

  <rect x="140" y="120" width="24" height="220" fill="#f59e0b"/>
  <rect x="700" y="160" width="24" height="180" fill="#22c55e"/>
  <rect x="164" y="160" width="536" height="180" fill="url(#water)"/>

  <text x="132" y="110" font-size="16" fill="#fde68a" font-family="Inter,Arial,sans-serif">left (taller)</text>
  <text x="690" y="150" font-size="16" fill="#86efac" font-family="Inter,Arial,sans-serif">right (shorter)</text>

  <line x1="715" y1="110" x2="760" y2="90" stroke="#f8fafc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="768" y="96" font-size="16" fill="#f8fafc" font-family="Inter,Arial,sans-serif">move this pointer</text>

  <text x="330" y="230" font-size="22" fill="#e0f2fe" font-family="Inter,Arial,sans-serif" font-weight="700">Area = (right - left) × min(h[left], h[right])</text>

  <line x1="164" y1="365" x2="700" y2="365" stroke="#e2e8f0" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="404" y="390" font-size="16" fill="#e2e8f0" font-family="Inter,Arial,sans-serif">width shrinks each step</text>
</svg>
