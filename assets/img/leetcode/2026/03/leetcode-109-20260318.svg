<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 109 sorted list to BST diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="50" y="70" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 109: Convert Sorted List to Binary Search Tree</text>
  <text x="50" y="112" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Slow/Fast pointer finds middle, recursive split builds balanced BST</text>

  <rect x="60" y="170" width="430" height="170" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="80" y="205" fill="#f9fafb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Sorted List Segment</text>
  <g font-family="JetBrains Mono,Consolas,monospace" font-size="22" fill="#e5e7eb">
    <rect x="90" y="230" width="62" height="46" rx="8" fill="#334155"/>
    <rect x="170" y="230" width="62" height="46" rx="8" fill="#334155"/>
    <rect x="250" y="230" width="62" height="46" rx="8" fill="#0f766e" stroke="#14b8a6"/>
    <rect x="330" y="230" width="62" height="46" rx="8" fill="#334155"/>
    <text x="113" y="260">-10</text>
    <text x="193" y="260">-3</text>
    <text x="274" y="260">0</text>
    <text x="353" y="260">5</text>
  </g>
  <text x="250" y="305" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">mid (root)</text>

  <line x1="405" y1="253" x2="540" y2="253" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="570" y="160" width="560" height="360" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="600" y="205" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">Balanced BST</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="22" fill="#e5e7eb" text-anchor="middle">
    <circle cx="850" cy="255" r="30" fill="#0f766e" stroke="#14b8a6"/>
    <text x="850" y="263">0</text>

    <circle cx="740" cy="340" r="28" fill="#334155"/>
    <text x="740" y="348">-10</text>
    <circle cx="960" cy="340" r="28" fill="#334155"/>
    <text x="960" y="348">5</text>

    <circle cx="790" cy="420" r="26" fill="#334155"/>
    <text x="790" y="428">-3</text>
    <circle cx="1010" cy="420" r="26" fill="#334155"/>
    <text x="1010" y="428">9</text>
  </g>

  <line x1="830" y1="278" x2="760" y2="320" stroke="#93c5fd" stroke-width="3"/>
  <line x1="870" y1="278" x2="940" y2="320" stroke="#93c5fd" stroke-width="3"/>
  <line x1="752" y1="364" x2="782" y2="398" stroke="#93c5fd" stroke-width="3"/>
  <line x1="968" y1="364" x2="998" y2="398" stroke="#93c5fd" stroke-width="3"/>

  <text x="50" y="585" fill="#9ca3af" font-size="21" font-family="Inter,Arial,sans-serif">EN-first · CN-second · Java default tabs · Author: Tom🦞</text>
