<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 47 permutations II dedup backtracking diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 47 · Permutations II</text>
  <text x="56" y="138" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Sorted DFS + used[] + skip duplicates at same depth</text>

  <rect x="56" y="182" width="1088" height="390" rx="20" fill="#111827" stroke="#374151"/>

  <text x="90" y="232" fill="#f9fafb" font-size="25" font-family="JetBrains Mono,Consolas,monospace">nums = [1,1,2] (sorted)</text>
  <text x="90" y="278" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">depth0: choose index0(1) ✓   index1(1) ✗ if index0 unused</text>
  <text x="90" y="324" fill="#fca5a5" font-size="24" font-family="JetBrains Mono,Consolas,monospace">skip rule: i&gt;0 &amp;&amp; nums[i]==nums[i-1] &amp;&amp; !used[i-1]</text>
  <text x="90" y="370" fill="#c4b5fd" font-size="24" font-family="JetBrains Mono,Consolas,monospace">unique leaves: [1,1,2] [1,2,1] [2,1,1]</text>

  <line x1="450" y1="420" x2="300" y2="500" stroke="#93c5fd" stroke-width="3"/>
