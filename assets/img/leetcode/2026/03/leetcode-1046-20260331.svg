<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1046 max-heap smashing process diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1046 · Last Stone Weight</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Max-Heap Repeated Extraction</text>

  <rect x="56" y="180" width="1088" height="370" rx="20" fill="#111827" stroke="#334155"/>
  <text x="90" y="230" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Heap top 2 pop each round: y, x</text>

  <circle cx="200" cy="320" r="46" fill="#ef4444"/><text x="184" y="328" fill="white" font-size="30" font-family="Inter,Arial,sans-serif">8</text>
  <circle cx="340" cy="320" r="46" fill="#f59e0b"/><text x="324" y="328" fill="white" font-size="30" font-family="Inter,Arial,sans-serif">7</text>
  <text x="420" y="328" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">smash → 1 push back</text>
  <circle cx="860" cy="320" r="34" fill="#22c55e"/><text x="850" y="328" fill="white" font-size="26" font-family="Inter,Arial,sans-serif">1</text>

  <text x="90" y="420" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Repeat until heap size ≤ 1</text>
  <text x="90" y="468" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Answer: heap top or 0 if empty</text>
  <text x="90" y="520" fill="#f9a8d4" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
