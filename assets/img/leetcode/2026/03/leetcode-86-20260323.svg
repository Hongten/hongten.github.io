<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#0f172a}
      .label{font:600 20px Arial,sans-serif;fill:#1e293b}
      .node{font:700 18px Arial,sans-serif;fill:#0b1020}
      .small{fill:#86efac;stroke:#15803d;stroke-width:2}
      .large{fill:#93c5fd;stroke:#1d4ed8;stroke-width:2}
      .raw{fill:#fde68a;stroke:#b45309;stroke-width:2}
      .arrow{stroke:#475569;stroke-width:3;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="40" y="45" class="title">LeetCode 86 · Partition List (x = 3)</text>

  <text x="40" y="92" class="label">Original</text>
  <rect x="40" y="110" width="88" height="52" rx="10" class="raw"/><text x="75" y="143" text-anchor="middle" class="node">1</text>
  <rect x="170" y="110" width="88" height="52" rx="10" class="raw"/><text x="214" y="143" text-anchor="middle" class="node">4</text>
  <rect x="300" y="110" width="88" height="52" rx="10" class="raw"/><text x="344" y="143" text-anchor="middle" class="node">3</text>
  <rect x="430" y="110" width="88" height="52" rx="10" class="raw"/><text x="474" y="143" text-anchor="middle" class="node">2</text>
  <rect x="560" y="110" width="88" height="52" rx="10" class="raw"/><text x="604" y="143" text-anchor="middle" class="node">5</text>
  <rect x="690" y="110" width="88" height="52" rx="10" class="raw"/><text x="734" y="143" text-anchor="middle" class="node">2</text>
  <line x1="128" y1="136" x2="170" y2="136" class="arrow"/><line x1="258" y1="136" x2="300" y2="136" class="arrow"/><line x1="388" y1="136" x2="430" y2="136" class="arrow"/><line x1="518" y1="136" x2="560" y2="136" class="arrow"/><line x1="648" y1="136" x2="690" y2="136" class="arrow"/>

  <text x="40" y="230" class="label">less than x (&lt; 3)</text>
  <rect x="40" y="248" width="88" height="52" rx="10" class="small"/><text x="84" y="281" text-anchor="middle" class="node">1</text>
  <rect x="170" y="248" width="88" height="52" rx="10" class="small"/><text x="214" y="281" text-anchor="middle" class="node">2</text>
  <rect x="300" y="248" width="88" height="52" rx="10" class="small"/><text x="344" y="281" text-anchor="middle" class="node">2</text>
  <line x1="128" y1="274" x2="170" y2="274" class="arrow"/><line x1="258" y1="274" x2="300" y2="274" class="arrow"/>

  <text x="520" y="230" class="label">greater/equal x (&gt;= 3)</text>
  <rect x="520" y="248" width="88" height="52" rx="10" class="large"/><text x="564" y="281" text-anchor="middle" class="node">4</text>
  <rect x="650" y="248" width="88" height="52" rx="10" class="large"/><text x="694" y="281" text-anchor="middle" class="node">3</text>
  <rect x="780" y="248" width="88" height="52" rx="10" class="large"/><text x="824" y="281" text-anchor="middle" class="node">5</text>
  <line x1="608" y1="274" x2="650" y2="274" class="arrow"/><line x1="738" y1="274" x2="780" y2="274" class="arrow"/>

  <text x="40" y="366" class="label">Merge: [1 → 2 → 2] + [4 → 3 → 5]  ⇒  1 → 2 → 2 → 4 → 3 → 5 (stable)</text>
</svg>
