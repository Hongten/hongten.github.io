<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 124 maximum path sum diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .node{fill:#1d4ed8;stroke:#93c5fd;stroke-width:3}
      .txt{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#60a5fa;stroke-width:5}
      .path{stroke:#f59e0b;stroke-width:8;stroke-linecap:round}
      .label{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#fbbf24}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" class="title">LeetCode 124 · Binary Tree Maximum Path Sum</text>
  <text x="70" y="130" class="sub">Postorder DP: gain = node.val + max(0, leftGain, rightGain)</text>

  <line x1="600" y1="230" x2="450" y2="340" class="edge"/>
  <line x1="600" y1="230" x2="750" y2="340" class="edge"/>
  <line x1="450" y1="340" x2="360" y2="460" class="edge"/>
  <line x1="450" y1="340" x2="540" y2="460" class="edge"/>

  <line x1="600" y1="230" x2="450" y2="340" class="path"/>
  <line x1="450" y1="340" x2="540" y2="460" class="path"/>

  <circle cx="600" cy="230" r="42" class="node"/><text x="600" y="230" class="txt">-10</text>
  <circle cx="450" cy="340" r="42" class="node"/><text x="450" y="340" class="txt">9</text>
  <circle cx="750" cy="340" r="42" class="node"/><text x="750" y="340" class="txt">20</text>
  <circle cx="360" cy="460" r="42" class="node"/><text x="360" y="460" class="txt">15</text>
  <circle cx="540" cy="460" r="42" class="node"/><text x="540" y="460" class="txt">7</text>

  <text x="790" y="470" class="label">Best path example: 15 → 20 → 7 = 42</text>
</svg>
