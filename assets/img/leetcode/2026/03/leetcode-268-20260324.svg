<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 268 XOR cancellation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 268 · Missing Number</text>
  <text x="56" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">XOR Cancellation: indices ^ values =&gt; missing</text>

  <rect x="56" y="190" width="1088" height="380" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="90" y="250" fill="#f8fafc" font-size="30" font-family="JetBrains Mono,Consolas,monospace">nums = [3, 0, 1]</text>
  <text x="90" y="300" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">range 0..n = 0,1,2,3</text>

  <text x="90" y="360" fill="#86efac" font-size="26" font-family="JetBrains Mono,Consolas,monospace">(0 ^ 1 ^ 2 ^ 3) ^ (3 ^ 0 ^ 1)</text>
  <text x="90" y="405" fill="#86efac" font-size="26" font-family="JetBrains Mono,Consolas,monospace">= (0^0) ^ (1^1) ^ (3^3) ^ 2</text>
  <text x="90" y="450" fill="#facc15" font-size="34" font-family="JetBrains Mono,Consolas,monospace" font-weight="700">= 2</text>

  <text x="90" y="525" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
