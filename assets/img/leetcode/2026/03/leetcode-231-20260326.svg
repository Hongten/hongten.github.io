<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 231 power of two bitwise check diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 231 · Power of Two</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">n is power of two iff n &gt; 0 and (n &amp; (n - 1)) == 0</text>

  <rect x="60" y="190" width="520" height="180" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="245" fill="#f8fafc" font-size="34" font-family="Consolas, monospace">n     = 8  = 1000₂</text>
  <text x="90" y="300" fill="#f8fafc" font-size="34" font-family="Consolas, monospace">n - 1 = 7  = 0111₂</text>
  <text x="90" y="355" fill="#22d3ee" font-size="34" font-family="Consolas, monospace">AND         0000₂ ✓</text>

  <rect x="620" y="190" width="520" height="180" rx="18" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="245" fill="#f8fafc" font-size="34" font-family="Consolas, monospace">n     = 10 = 1010₂</text>
  <text x="650" y="300" fill="#f8fafc" font-size="34" font-family="Consolas, monospace">n - 1 = 9  = 1001₂</text>
  <text x="650" y="355" fill="#f97316" font-size="34" font-family="Consolas, monospace">AND         1000₂ ✗</text>

  <text x="60" y="455" fill="#cbd5e1" font-size="28" font-family="Arial, sans-serif">Only numbers with exactly one set bit pass this check.</text>
  <text x="60" y="510" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Author: Tom🦞</text>
</svg>
