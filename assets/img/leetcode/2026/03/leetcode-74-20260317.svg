<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 74 flattened binary search mapping">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 36px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .num{font:700 24px 'Consolas',monospace;fill:#f8fafc}
      .small{font:500 16px 'Segoe UI',Arial,sans-serif;fill:#a5b4fc}
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="50" y="62" class="title">LeetCode 74 · Search a 2D Matrix</text>
  <text x="50" y="98" class="sub">Flatten matrix into a virtual sorted array, then binary search</text>

  <rect x="60" y="150" width="520" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="80" y="190" class="txt">Matrix (3 x 4)</text>

  <g transform="translate(90,220)">
    <rect x="0" y="0" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="100" y="0" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="200" y="0" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="300" y="0" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <text x="36" y="44" class="num">1</text><text x="128" y="44" class="num">3</text><text x="228" y="44" class="num">5</text><text x="328" y="44" class="num">7</text>

    <rect x="0" y="70" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="100" y="70" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="200" y="70" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="300" y="70" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <text x="28" y="114" class="num">10</text><text x="128" y="114" class="num">11</text><text x="228" y="114" class="num">16</text><text x="328" y="114" class="num">20</text>

    <rect x="0" y="140" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="100" y="140" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="200" y="140" width="100" height="70" fill="#1f2937" stroke="#475569"/>
    <rect x="300" y="140" width="100" height="70" fill="#0f766e" stroke="#2dd4bf" stroke-width="2"/>
    <text x="28" y="184" class="num">23</text><text x="128" y="184" class="num">30</text><text x="228" y="184" class="num">34</text><text x="328" y="184" class="num">60</text>
  </g>

  <rect x="640" y="150" width="500" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="665" y="190" class="txt">Virtual array index mapping</text>
  <text x="665" y="235" class="small">mid = 11, n = 4</text>
  <text x="665" y="275" class="num">row = mid / n = 11 / 4 = 2</text>
  <text x="665" y="315" class="num">col = mid % n = 11 % 4 = 3</text>
  <text x="665" y="360" class="num">matrix[2][3] = 60</text>
  <text x="665" y="410" class="small">Binary search compares 60 with target and adjusts range.</text>

  <path d="M590 290 C630 290, 630 290, 650 290" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#60a5fa"/>
    </marker>
  </defs>
</svg>
