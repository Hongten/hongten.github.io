<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 96 Catalan DP split-by-root diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 96 · Unique Binary Search Trees</text>
  <text x="60" y="132" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Catalan DP: dp[nodes] += dp[left] * dp[right]</text>

  <rect x="70" y="180" width="1060" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="120" y="245" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">nodes = 4, choose root = 2</text>
  <text x="120" y="295" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">left = root-1 = 1  →  dp[1]</text>
  <text x="120" y="340" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">right = nodes-root = 2  →  dp[2]</text>
  <text x="120" y="390" fill="#fcd34d" font-size="30" font-family="Inter,Arial,sans-serif">contribution: dp[1] × dp[2]</text>

  <path d="M540 305 C640 280, 700 260, 760 245" stroke="#93c5fd" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 350 C650 360, 715 390, 780 430" stroke="#86efac" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="790" y="220" width="290" height="90" rx="12" fill="#111827" stroke="#374151"/>
  <text x="815" y="276" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">dp[1] = 1</text>

  <rect x="790" y="380" width="290" height="90" rx="12" fill="#111827" stroke="#374151"/>
  <text x="815" y="436" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">dp[2] = 2</text>

  <text x="60" y="605" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
