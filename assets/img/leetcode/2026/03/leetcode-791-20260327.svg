<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 791 custom sort flow diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .box{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:16}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb}
      .small{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .arrow{stroke:#38bdf8;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 791 · Custom Sort String</text>
  <text x="60" y="128" class="sub">Count frequencies → emit by order → append leftovers</text>

  <rect x="70" y="190" width="300" height="160" class="box"/>
  <text x="90" y="240" class="txt">Input</text>
  <text x="90" y="280" class="small">order = "cba"</text>
  <text x="90" y="315" class="small">s = "abcdabc"</text>

  <rect x="450" y="170" width="300" height="200" class="box"/>
  <text x="470" y="220" class="txt">Frequency Table</text>
  <text x="470" y="260" class="small">a:2  b:2  c:2  d:1</text>
  <text x="470" y="300" class="small">Emit c,b,a by order</text>
  <text x="470" y="335" class="small">Then append d</text>

  <rect x="830" y="190" width="300" height="160" class="box"/>
  <text x="850" y="240" class="txt">Output</text>
  <text x="850" y="280" class="small">"ccbbaad"</text>
  <text x="850" y="315" class="small">valid custom order</text>

  <line x1="370" y1="270" x2="450" y2="270" class="arrow"/>
  <line x1="750" y1="270" x2="830" y2="270" class="arrow"/>
</svg>
