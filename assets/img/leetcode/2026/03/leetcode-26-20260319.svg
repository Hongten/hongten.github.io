<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 26 remove duplicates two-pointers diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 24px 'JetBrains Mono',Consolas,monospace;fill:#e5e7eb}
      .cap{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" class="title">LeetCode 26 · Remove Duplicates from Sorted Array</text>
  <text x="60" y="122" class="sub">Two pointers: scan i, write unique at k</text>

  <rect x="70" y="180" width="140" height="80" rx="12" fill="#1d4ed8"/><text x="120" y="230" class="txt">0</text>
  <rect x="230" y="180" width="140" height="80" rx="12" fill="#1e40af"/><text x="280" y="230" class="txt">0</text>
  <rect x="390" y="180" width="140" height="80" rx="12" fill="#2563eb"/><text x="440" y="230" class="txt">1</text>
  <rect x="550" y="180" width="140" height="80" rx="12" fill="#1e40af"/><text x="600" y="230" class="txt">1</text>
  <rect x="710" y="180" width="140" height="80" rx="12" fill="#2563eb"/><text x="760" y="230" class="txt">2</text>
  <rect x="870" y="180" width="140" height="80" rx="12" fill="#1e40af"/><text x="920" y="230" class="txt">2</text>
  <rect x="1030" y="180" width="100" height="80" rx="12" fill="#2563eb"/><text x="1062" y="230" class="txt">3</text>

  <line x1="460" y1="290" x2="460" y2="360" stroke="#22d3ee" stroke-width="4"/>
  <polygon points="460,360 450,342 470,342" fill="#22d3ee"/>
  <text x="420" y="390" class="cap">i scans</text>

  <line x1="760" y1="290" x2="760" y2="360" stroke="#34d399" stroke-width="4"/>
  <polygon points="760,360 750,342 770,342" fill="#34d399"/>
  <text x="705" y="390" class="cap">k writes</text>

  <text x="70" y="470" class="cap">When nums[i] != nums[k-1], write nums[k] = nums[i], then k++</text>
  <text x="70" y="515" class="cap">Result prefix: [0, 1, 2, 3], return k = 4</text>
</svg>
