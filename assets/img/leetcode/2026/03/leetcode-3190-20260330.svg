<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,sans-serif;fill:#e2e8f0}
      .h{font-size:46px;font-weight:700}
      .s{font-size:28px;fill:#93c5fd}
      .b{font-size:24px}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="95" class="t h">LeetCode 3190 · Remainder Buckets</text>
  <text x="70" y="140" class="t s">Find Minimum Operations to Make All Elements Divisible by Three</text>
  <rect x="90" y="190" width="300" height="300" rx="18" fill="#0b5" opacity="0.2" stroke="#34d399"/>
  <rect x="450" y="190" width="300" height="300" rx="18" fill="#38bdf8" opacity="0.2" stroke="#38bdf8"/>
  <rect x="810" y="190" width="300" height="300" rx="18" fill="#f59e0b" opacity="0.2" stroke="#f59e0b"/>
  <text x="190" y="250" class="t b">x % 3 == 0</text>
  <text x="190" y="310" class="t b">cost = 0</text>
  <text x="190" y="370" class="t b">already divisible</text>
  <text x="550" y="250" class="t b">x % 3 == 1</text>
  <text x="550" y="310" class="t b">cost = 1</text>
  <text x="525" y="370" class="t b">x - 1 → divisible</text>
  <text x="910" y="250" class="t b">x % 3 == 2</text>
  <text x="910" y="310" class="t b">cost = 1</text>
  <text x="885" y="370" class="t b">x + 1 → divisible</text>
  <text x="70" y="560" class="t b">Answer = count of elements where x % 3 != 0</text>
</svg>
