<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 126 Word Ladder II layered BFS DAG diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="70" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 126 · Word Ladder II</text>
  <text x="50" y="110" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Layered BFS builds shortest-parent DAG, DFS reconstructs all shortest paths</text>

  <g font-family="Inter,Arial,sans-serif" font-size="24" text-anchor="middle">
    <rect x="80" y="250" width="140" height="60" rx="12" fill="#1f2937" stroke="#60a5fa"/>
    <text x="150" y="288" fill="#e5e7eb">hit</text>

    <rect x="320" y="180" width="140" height="60" rx="12" fill="#1f2937" stroke="#34d399"/>
    <text x="390" y="218" fill="#e5e7eb">hot</text>

    <rect x="560" y="120" width="140" height="60" rx="12" fill="#1f2937" stroke="#f59e0b"/>
    <text x="630" y="158" fill="#e5e7eb">dot</text>

    <rect x="560" y="260" width="140" height="60" rx="12" fill="#1f2937" stroke="#f59e0b"/>
    <text x="630" y="298" fill="#e5e7eb">lot</text>

    <rect x="800" y="120" width="140" height="60" rx="12" fill="#1f2937" stroke="#f472b6"/>
    <text x="870" y="158" fill="#e5e7eb">dog</text>

    <rect x="800" y="260" width="140" height="60" rx="12" fill="#1f2937" stroke="#f472b6"/>
    <text x="870" y="298" fill="#e5e7eb">log</text>

    <rect x="1020" y="190" width="140" height="60" rx="12" fill="#1f2937" stroke="#fb7185"/>
    <text x="1090" y="228" fill="#e5e7eb">cog</text>
  </g>

  <g stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="220" y1="280" x2="320" y2="210"/>
    <line x1="460" y1="210" x2="560" y2="150"/>
    <line x1="460" y1="210" x2="560" y2="290"/>
    <line x1="700" y1="150" x2="800" y2="150"/>
    <line x1="700" y1="290" x2="800" y2="290"/>
    <line x1="940" y1="150" x2="1020" y2="220"/>
    <line x1="940" y1="290" x2="1020" y2="220"/>
  </g>

  <text x="50" y="580" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
