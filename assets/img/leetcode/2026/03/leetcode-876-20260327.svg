<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 876 fast and slow pointers middle node diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 876 · Middle of the Linked List</text>
  <text x="60" y="128" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Fast pointer moves 2x, slow pointer moves 1x</text>
  <g transform="translate(70,240)">
    <rect x="0" y="0" width="120" height="74" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <rect x="170" y="0" width="120" height="74" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <rect x="340" y="0" width="120" height="74" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <rect x="510" y="0" width="120" height="74" rx="10" fill="#1f2937" stroke="#f59e0b" stroke-width="3"/>
    <rect x="680" y="0" width="120" height="74" rx="10" fill="#1f2937" stroke="#60a5fa"/>
    <rect x="850" y="0" width="120" height="74" rx="10" fill="#1f2937" stroke="#60a5fa"/>

    <text x="56" y="45" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="Inter,Arial,sans-serif">1</text>
    <text x="226" y="45" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="Inter,Arial,sans-serif">2</text>
    <text x="396" y="45" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="Inter,Arial,sans-serif">3</text>
    <text x="566" y="45" fill="#fbbf24" font-size="30" text-anchor="middle" font-family="Inter,Arial,sans-serif">4</text>
    <text x="736" y="45" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="Inter,Arial,sans-serif">5</text>
    <text x="906" y="45" fill="#e5e7eb" font-size="30" text-anchor="middle" font-family="Inter,Arial,sans-serif">6</text>

    <line x1="122" y1="37" x2="166" y2="37" stroke="#9ca3af" stroke-width="4"/>
    <line x1="292" y1="37" x2="336" y2="37" stroke="#9ca3af" stroke-width="4"/>
    <line x1="462" y1="37" x2="506" y2="37" stroke="#9ca3af" stroke-width="4"/>
    <line x1="632" y1="37" x2="676" y2="37" stroke="#9ca3af" stroke-width="4"/>
    <line x1="802" y1="37" x2="846" y2="37" stroke="#9ca3af" stroke-width="4"/>

    <text x="566" y="120" fill="#fbbf24" font-size="24" text-anchor="middle" font-family="Inter,Arial,sans-serif">middle (answer)</text>
    <line x1="566" y1="110" x2="566" y2="80" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <text x="60" y="560" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: when fast reaches end, slow reaches middle (second middle for even length)</text>
</svg>