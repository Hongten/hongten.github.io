<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 225 queue rotation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#182848"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#bcd0ff}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .cell{fill:#263a63;stroke:#8fb3ff;stroke-width:2}
      .txt{font:700 28px 'Consolas',monospace;fill:#f8fbff}
      .arrow{stroke:#ffd166;stroke-width:5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#ffd166"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 225 · Implement Stack using Queues</text>
  <text x="60" y="130" class="sub">Single queue + rotation after push keeps newest element at front</text>

  <text x="80" y="210" class="label">After push(4), rotate old elements:</text>
  <rect x="80" y="240" width="120" height="90" rx="12" class="cell"/><text x="133" y="297" class="txt">4</text>
  <rect x="210" y="240" width="120" height="90" rx="12" class="cell"/><text x="263" y="297" class="txt">3</text>
  <rect x="340" y="240" width="120" height="90" rx="12" class="cell"/><text x="393" y="297" class="txt">2</text>
  <rect x="470" y="240" width="120" height="90" rx="12" class="cell"/><text x="523" y="297" class="txt">1</text>

  <text x="80" y="385" class="label">Queue front = stack top (LIFO behavior)</text>
  <path d="M610 285 C700 220, 840 220, 930 285" class="arrow"/>
  <text x="955" y="293" class="label">pop/top</text>

  <text x="80" y="500" class="sub">Push: O(n)   Pop/Top: O(1)   Space: O(n)</text>
</svg>
