<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 55 Jump Game greedy reachability diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 55: Jump Game</text>
  <text x="60" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Greedy idea: keep the farthest reachable index</text>

  <g transform="translate(80,220)">
    <rect x="0" y="0" width="140" height="120" rx="10" fill="#1f2937" stroke="#4b5563"/>
    <rect x="150" y="0" width="140" height="120" rx="10" fill="#1f2937" stroke="#4b5563"/>
    <rect x="300" y="0" width="140" height="120" rx="10" fill="#1f2937" stroke="#4b5563"/>
    <rect x="450" y="0" width="140" height="120" rx="10" fill="#1f2937" stroke="#4b5563"/>
    <rect x="600" y="0" width="140" height="120" rx="10" fill="#1f2937" stroke="#4b5563"/>
    <rect x="750" y="0" width="140" height="120" rx="10" fill="#065f46" stroke="#34d399"/>

    <text x="55" y="50" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,monospace">2</text>
    <text x="205" y="50" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,monospace">3</text>
    <text x="355" y="50" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,monospace">1</text>
    <text x="505" y="50" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,monospace">1</text>
    <text x="655" y="50" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,monospace">4</text>
    <text x="790" y="50" fill="#d1fae5" font-size="30" font-family="Inter,Arial,sans-serif">last index</text>

    <text x="52" y="102" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,monospace">i=0</text>
    <text x="202" y="102" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,monospace">i=1</text>
    <text x="352" y="102" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,monospace">i=2</text>
    <text x="502" y="102" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,monospace">i=3</text>
    <text x="652" y="102" fill="#9ca3af" font-size="24" font-family="JetBrains Mono,monospace">i=4</text>

    <line x1="70" y1="-25" x2="370" y2="-25" stroke="#34d399" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="95" y="-38" fill="#34d399" font-size="24" font-family="Inter,Arial,sans-serif">farthest = max(farthest, i + nums[i])</text>
  </g>

  <text x="80" y="560" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">If current index i ever exceeds farthest, we found an unreachable gap → false.</text>
  <text x="80" y="595" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
