<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2696 stack cancellation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="78" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2696 · Greedy Stack Cancellation</text>
  <text x="48" y="120" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Remove adjacent "AB" / "CD" as soon as they appear</text>

  <rect x="48" y="160" width="1104" height="420" rx="16" fill="#0f172a" stroke="#334155"/>

  <text x="90" y="215" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Input:   A C D B C B</text>
  <text x="90" y="255" fill="#22d3ee" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Stack:   A</text>
  <text x="90" y="295" fill="#22d3ee" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read C → AC</text>
  <text x="90" y="335" fill="#f59e0b" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read D → A(CD) remove → A</text>
  <text x="90" y="375" fill="#f59e0b" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read B → (AB) remove → ∅</text>
  <text x="90" y="415" fill="#22d3ee" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read C → C</text>
  <text x="90" y="455" fill="#22d3ee" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Read B → CB (no pair)</text>
  <text x="90" y="510" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">Final length = 2</text>

  <text x="880" y="564" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
