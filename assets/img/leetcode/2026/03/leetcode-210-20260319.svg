<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 210 topological sort diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 210 · Course Schedule II</text>
  <text x="60" y="138" fill="#94a3b8" font-size="26" font-family="Inter,Arial,sans-serif">Topological Sort (Kahn BFS): indegree-0 queue builds valid course order</text>

  <rect x="80" y="220" width="130" height="70" rx="12" fill="#0f766e"/>
  <text x="145" y="263" text-anchor="middle" fill="#ecfeff" font-size="30" font-family="Inter,Arial,sans-serif">0</text>

  <rect x="300" y="160" width="130" height="70" rx="12" fill="#1d4ed8"/>
  <text x="365" y="203" text-anchor="middle" fill="#eff6ff" font-size="30" font-family="Inter,Arial,sans-serif">1</text>

  <rect x="300" y="300" width="130" height="70" rx="12" fill="#1d4ed8"/>
  <text x="365" y="343" text-anchor="middle" fill="#eff6ff" font-size="30" font-family="Inter,Arial,sans-serif">2</text>

  <rect x="530" y="230" width="130" height="70" rx="12" fill="#7c3aed"/>
  <text x="595" y="273" text-anchor="middle" fill="#f5f3ff" font-size="30" font-family="Inter,Arial,sans-serif">3</text>

  <line x1="210" y1="250" x2="300" y2="195" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="210" y1="260" x2="300" y2="335" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="430" y1="195" x2="530" y2="250" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="430" y1="335" x2="530" y2="280" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="760" y="185" width="360" height="260" rx="16" fill="#111827" stroke="#334155"/>
  <text x="785" y="230" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Queue flow</text>
  <text x="785" y="280" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">[0] → pop 0 → push 1,2</text>
  <text x="785" y="320" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">[1,2] → pop 1</text>
  <text x="785" y="360" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">[2] → pop 2 → push 3</text>
  <text x="785" y="400" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Order: [0,1,2,3]</text>

  <text x="60" y="580" fill="#22c55e" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
