<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 171 Excel Sheet Column Number base-26 conversion diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#182a4a"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#b9ccff}
      .box{fill:#111a2f;stroke:#5b7cfa;stroke-width:2;rx:14}
      .txt{font:600 30px 'Consolas','Menlo',monospace;fill:#d8e4ff}
      .eq{font:600 28px 'Consolas','Menlo',monospace;fill:#9ad0ff}
      .note{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#9fb3d9}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" class="title">LeetCode 171 · Excel Sheet Column Number</text>
  <text x="56" y="132" class="sub">Base-26 Accumulation (A=1 ... Z=26)</text>

  <rect class="box" x="56" y="186" width="180" height="96"/>
  <rect class="box" x="266" y="186" width="180" height="96"/>
  <rect class="box" x="476" y="186" width="180" height="96"/>
  <text x="142" y="247" text-anchor="middle" class="txt">A</text>
  <text x="352" y="247" text-anchor="middle" class="txt">B</text>
  <text x="562" y="247" text-anchor="middle" class="txt">C</text>

  <text x="684" y="247" class="eq">→ (((0 × 26 + 1) × 26 + 2) × 26 + 3)</text>
  <text x="684" y="290" class="eq">→ 731</text>

  <text x="56" y="365" class="note">Invariant:</text>
  <text x="170" y="365" class="eq">ans = ans × 26 + value(currentChar)</text>

  <text x="56" y="430" class="note">Character mapping:</text>
  <text x="290" y="430" class="eq">value = (c - 'A' + 1)</text>

  <rect x="56" y="476" width="1088" height="100" rx="12" fill="#0f1930" stroke="#2f4f9f"/>
  <text x="76" y="535" class="eq">Single pass, O(n) time, O(1) extra space. Process each letter left to right like decimal parsing.</text>
</svg>
