<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1331 rank transform diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1331 · Rank Transform of an Array</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Sort distinct values, assign ranks, map back to original order</text>

  <rect x="60" y="180" width="500" height="320" rx="18" fill="#111827" stroke="#374151"/>
  <text x="90" y="225" fill="#f9fafb" font-size="28" font-family="monospace">arr: [40, 10, 20, 30, 20]</text>
  <text x="90" y="270" fill="#d1d5db" font-size="24" font-family="monospace">sorted unique: [10, 20, 30, 40]</text>
  <text x="90" y="315" fill="#86efac" font-size="24" font-family="monospace">10→1  20→2  30→3  40→4</text>
  <text x="90" y="370" fill="#fcd34d" font-size="28" font-family="monospace">result: [4, 1, 2, 3, 2]</text>

  <rect x="620" y="180" width="520" height="320" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="650" y="235" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">Algorithm Flow</text>
  <text x="650" y="280" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">1) Copy + sort array</text>
  <text x="650" y="320" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">2) Deduplicate while assigning rank from 1</text>
  <text x="650" y="360" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">3) Hash-map lookup for each original value</text>
  <text x="650" y="420" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Time: O(n log n) · Space: O(n)</text>

  <text x="60" y="575" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
