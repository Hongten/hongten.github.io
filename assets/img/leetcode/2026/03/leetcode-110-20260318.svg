<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 110 Balanced Binary Tree postorder pruning diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121a33"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#b9c8ff}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#dbe7ff}
      .tiny{font:500 16px 'Segoe UI',Arial,sans-serif;fill:#b7c4ea}
      .ok{fill:#38d39f}
      .bad{fill:#ff6b6b}
      .node{fill:#1f2a4d;stroke:#90a8ff;stroke-width:2}
      .edge{stroke:#6d84d8;stroke-width:3}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="82" class="title">LeetCode 110 · Balanced Binary Tree</text>
  <text x="60" y="118" class="sub">Postorder height + early prune with sentinel -1</text>

  <line x1="250" y1="220" x2="170" y2="300" class="edge"/>
  <line x1="250" y1="220" x2="330" y2="300" class="edge"/>
  <line x1="170" y1="300" x2="120" y2="380" class="edge"/>
  <line x1="170" y1="300" x2="220" y2="380" class="edge"/>

  <line x1="770" y1="200" x2="700" y2="280" class="edge"/>
  <line x1="700" y1="280" x2="640" y2="360" class="edge"/>
  <line x1="640" y1="360" x2="590" y2="440" class="edge"/>

  <circle cx="250" cy="220" r="34" class="node"/>
  <circle cx="170" cy="300" r="30" class="node"/>
  <circle cx="330" cy="300" r="30" class="node"/>
  <circle cx="120" cy="380" r="26" class="node"/>
  <circle cx="220" cy="380" r="26" class="node"/>

  <circle cx="770" cy="200" r="34" class="node"/>
  <circle cx="700" cy="280" r="30" class="node"/>
  <circle cx="640" cy="360" r="26" class="node"/>
  <circle cx="590" cy="440" r="24" class="node"/>

  <text x="232" y="227" class="label">A</text>
  <text x="156" y="307" class="tiny">B</text>
  <text x="316" y="307" class="tiny">C</text>
  <text x="110" y="386" class="tiny">D</text>
  <text x="210" y="386" class="tiny">E</text>

  <text x="752" y="207" class="label">X</text>
  <text x="688" y="287" class="tiny">Y</text>
  <text x="628" y="367" class="tiny">Z</text>
  <text x="580" y="446" class="tiny">W</text>

  <text x="80" y="520" class="label ok">Balanced: |h(left)-h(right)| ≤ 1 at every node</text>
  <text x="80" y="552" class="tiny">Postorder returns heights bottom-up: leaf=1, parent=max(l,r)+1</text>

  <text x="620" y="520" class="label bad">Unbalanced chain: diff > 1 ⇒ return -1 early</text>
  <text x="620" y="552" class="tiny">Sentinel -1 prunes remaining checks and bubbles to root</text>
</svg>
