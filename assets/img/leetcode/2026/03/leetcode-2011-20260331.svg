<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="LeetCode 2011 net delta counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>
  <text x="40" y="58" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="28" font-weight="700">LeetCode 2011 · Net Delta Counting</text>
  <text x="40" y="92" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Each op contributes +1 or -1 by checking the middle char</text>

  <rect x="40" y="130" width="160" height="56" rx="10" fill="#1d4ed8"/>
  <text x="120" y="165" text-anchor="middle" fill="#eff6ff" font-size="24" font-family="Courier New, monospace">X = 0</text>

  <rect x="240" y="130" width="160" height="56" rx="10" fill="#166534"/>
  <text x="320" y="165" text-anchor="middle" fill="#ecfdf5" font-size="22" font-family="Courier New, monospace">"--X" → -1</text>

  <rect x="430" y="130" width="160" height="56" rx="10" fill="#166534"/>
  <text x="510" y="165" text-anchor="middle" fill="#ecfdf5" font-size="22" font-family="Courier New, monospace">"X++" → +1</text>

  <rect x="620" y="130" width="160" height="56" rx="10" fill="#166534"/>
  <text x="700" y="165" text-anchor="middle" fill="#ecfdf5" font-size="22" font-family="Courier New, monospace">"X++" → +1</text>

  <rect x="810" y="130" width="110" height="56" rx="10" fill="#7c2d12"/>
  <text x="865" y="165" text-anchor="middle" fill="#fff7ed" font-size="22" font-family="Courier New, monospace">"X--"</text>

  <path d="M200 158 H235" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M400 158 H425" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M590 158 H615" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M780 158 H805" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect x="40" y="250" width="880" height="120" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="70" y="292" fill="#e2e8f0" font-size="24" font-family="Courier New, monospace">x = 0 - 1 + 1 + 1 - 1 = 0</text>
  <text x="70" y="332" fill="#fbbf24" font-size="20" font-family="Arial, sans-serif">Rule: op[1] == '+' ? x++ : x--</text>
</svg>
