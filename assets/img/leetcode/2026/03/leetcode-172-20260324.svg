<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 172 factorial trailing zeroes factor-of-5 counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 172 · Factorial Trailing Zeroes</text>
  <text x="60" y="150" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Count factors of 5 in n!</text>

  <rect x="60" y="200" width="1080" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="255" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">n! trailing zeroes = floor(n/5) + floor(n/25) + floor(n/125) + ...</text>

  <text x="90" y="320" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Example n = 30:</text>
  <text x="120" y="365" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">floor(30/5)  = 6</text>
  <text x="120" y="405" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">floor(30/25) = 1</text>
  <text x="120" y="445" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Total = 7</text>

  <text x="90" y="505" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">25 contributes two factors of 5, so we must keep dividing by 5.</text>
</svg>
