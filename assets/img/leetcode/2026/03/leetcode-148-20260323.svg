<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 148 merge sort on linked list diagram">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="56" y="78" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 148 · Sort List</text>
  <text x="56" y="118" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Linked List Merge Sort: Split by middle, then merge sorted halves</text>

  <g font-family="monospace" font-size="30" fill="#f8fafc">
    <rect x="56" y="170" width="1088" height="110" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="90" y="238">4 -&gt; 2 -&gt; 1 -&gt; 3</text>

    <line x1="300" y1="292" x2="300" y2="334" stroke="#64748b" stroke-width="3"/>
    <line x1="900" y1="292" x2="900" y2="334" stroke="#64748b" stroke-width="3"/>
    <text x="245" y="330" fill="#86efac" font-size="22">split</text>
    <text x="845" y="330" fill="#86efac" font-size="22">split</text>

    <rect x="56" y="344" width="500" height="90" rx="10" fill="#1e293b" stroke="#334155"/>
    <rect x="644" y="344" width="500" height="90" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="90" y="398">4 -&gt; 2</text>
    <text x="678" y="398">1 -&gt; 3</text>

    <line x1="600" y1="450" x2="600" y2="490" stroke="#38bdf8" stroke-width="4" marker-end="url(#arr)"/>
    <rect x="230" y="500" width="740" height="86" rx="10" fill="#111827" stroke="#475569"/>
    <text x="270" y="554" fill="#facc15">merge -&gt; 1 -&gt; 2 -&gt; 3 -&gt; 4</text>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#38bdf8" />
    </marker>
  </defs>

  <text x="56" y="608" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · O(n log n) time, O(log n) recursion stack</text>
</svg>