<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 852 Peak Index in a Mountain Array binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 852: Peak Index in a Mountain Array</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Binary Search on Slope Direction</text>

  <polyline points="120,500 300,380 470,260 640,160 820,280 1010,440" fill="none" stroke="#60a5fa" stroke-width="8"/>
  <circle cx="640" cy="160" r="10" fill="#f97316"/>
  <text x="656" y="156" fill="#f97316" font-size="26" font-family="Inter,Arial,sans-serif">peak</text>

  <line x1="360" y1="310" x2="510" y2="250" stroke="#fbbf24" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="258" y="320" fill="#fbbf24" font-size="22" font-family="Inter,Arial,sans-serif">arr[mid] &lt; arr[mid+1] → right</text>

  <line x1="770" y1="235" x2="680" y2="190" stroke="#34d399" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="790" y="240" fill="#34d399" font-size="22" font-family="Inter,Arial,sans-serif">arr[mid] &gt;= arr[mid+1] → left</text>

  <rect x="56" y="536" width="1088" height="62" rx="12" fill="#1f2937" stroke="#374151"/>
  <text x="82" y="575" fill="#e5e7eb" font-size="25" font-family="Inter,Arial,sans-serif">Invariant: peak ∈ [left, right], shrink range until left == right.</text>
</svg>
