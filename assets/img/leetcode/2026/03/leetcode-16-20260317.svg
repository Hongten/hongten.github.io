<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 16 3Sum Closest two-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="54" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 16: 3Sum Closest</text>
  <text x="54" y="136" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Sort + Fix i + Two Pointers (l,r)</text>

  <rect x="52" y="190" width="1096" height="350" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="250" fill="#d1d5db" font-size="28" font-family="JetBrains Mono,Consolas,monospace">Sorted nums: [ -4, -1, 1, 2, 5, 9 ]    target = 3</text>
  <text x="90" y="305" fill="#34d399" font-size="28" font-family="JetBrains Mono,Consolas,monospace">i = 1 (-1), l = 2 (1), r = 5 (9), sum = 9  → too large, r--</text>
  <line x1="720" y1="318" x2="660" y2="318" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="90" y="370" fill="#34d399" font-size="28" font-family="JetBrains Mono,Consolas,monospace">i = 1 (-1), l = 2 (1), r = 4 (5), sum = 5  → closer</text>
  <text x="90" y="425" fill="#34d399" font-size="28" font-family="JetBrains Mono,Consolas,monospace">i = 1 (-1), l = 2 (1), r = 3 (2), sum = 2  → too small, l++</text>
  <line x1="505" y1="438" x2="565" y2="438" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="90" y="495" fill="#fbbf24" font-size="28" font-family="Inter,Arial,sans-serif">Rule: sum &lt; target => l++, sum &gt; target => r--, track minimum |sum - target|</text>
  <text x="54" y="592" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
