<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 207 course schedule topological sort diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .subtitle{font:500 28px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .node{fill:#1d4ed8;stroke:#93c5fd;stroke-width:3}
      .txt{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#38bdf8;stroke-width:5;fill:none;marker-end:url(#arrow)}
      .note{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .ok{font:700 26px 'Segoe UI',Arial,sans-serif;fill:#22c55e}
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="78" class="title">LeetCode 207 · Course Schedule</text>
  <text x="60" y="118" class="subtitle">Kahn BFS Topological Sort (Detect Cycle by processed count)</text>

  <path class="edge" d="M220 270 L360 270"/>
  <path class="edge" d="M220 270 L360 410"/>
  <path class="edge" d="M500 270 L640 270"/>
  <path class="edge" d="M500 410 L640 270"/>

  <circle cx="180" cy="270" r="42" class="node"/>
  <text x="180" y="270" class="txt">0</text>

  <circle cx="460" cy="270" r="42" class="node"/>
  <text x="460" y="270" class="txt">1</text>

  <circle cx="460" cy="410" r="42" class="node"/>
  <text x="460" y="410" class="txt">2</text>

  <circle cx="680" cy="270" r="42" class="node"/>
  <text x="680" y="270" class="txt">3</text>

  <text x="760" y="210" class="note">Queue starts with indegree=0 nodes:</text>
  <text x="760" y="248" class="note">[0] → take 0, unlock 1 and 2</text>
  <text x="760" y="286" class="note">[1,2] → take both, unlock 3</text>
  <text x="760" y="324" class="note">[3] → all 4 courses processed</text>

  <text x="760" y="396" class="ok">processed == numCourses ⇒ can finish</text>
</svg>
