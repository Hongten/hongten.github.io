      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 221: Maximal Square</text>
  <text x="60" y="122" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">dp[i][j] = min(top, left, top-left) + 1</text>

  <g transform="translate(60,170)">
    <rect width="420" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
    <text x="20" y="36" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">matrix (char)</text>

    <g font-family="monospace" font-size="28" text-anchor="middle" dominant-baseline="middle">
      <rect x="40" y="70" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="74" y="104" fill="#dcfce7">1</text>
      <rect x="108" y="70" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="142" y="104" fill="#dcfce7">1</text>
      <rect x="176" y="70" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="210" y="104" fill="#dcfce7">1</text>
      <rect x="244" y="70" width="68" height="68" fill="#7f1d1d" stroke="#fca5a5"/><text x="278" y="104" fill="#fee2e2">0</text>

      <rect x="40" y="138" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="74" y="172" fill="#dcfce7">1</text>
      <rect x="108" y="138" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="142" y="172" fill="#dcfce7">1</text>
      <rect x="176" y="138" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="210" y="172" fill="#dcfce7">1</text>
      <rect x="244" y="138" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="278" y="172" fill="#dcfce7">1</text>

      <rect x="40" y="206" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="74" y="240" fill="#dcfce7">1</text>
      <rect x="108" y="206" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="142" y="240" fill="#dcfce7">1</text>
      <rect x="176" y="206" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="210" y="240" fill="#dcfce7">1</text>
      <rect x="244" y="206" width="68" height="68" fill="#14532d" stroke="#4ade80"/><text x="278" y="240" fill="#dcfce7">1</text>
    </g>

    <rect x="108" y="138" width="204" height="136" fill="none" stroke="#facc15" stroke-width="4" stroke-dasharray="10 6"/>
    <text x="320" y="305" fill="#fde68a" font-size="20" font-family="Inter,Arial,sans-serif">largest square side = 2</text>
  </g>

  <g transform="translate(540,170)">
    <rect width="600" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
    <text x="24" y="38" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">DP transition at cell (i, j)</text>

    <circle cx="210" cy="110" r="34" fill="#2563eb"/><text x="210" y="118" fill="#dbeafe" font-size="20" text-anchor="middle" font-family="Inter,Arial,sans-serif">top</text>
    <circle cx="130" cy="190" r="34" fill="#2563eb"/><text x="130" y="198" fill="#dbeafe" font-size="20" text-anchor="middle" font-family="Inter,Arial,sans-serif">left</text>
    <circle cx="210" cy="190" r="34" fill="#059669"/><text x="210" y="198" fill="#d1fae5" font-size="17" text-anchor="middle" font-family="Inter,Arial,sans-serif">top-left</text>
    <circle cx="290" cy="190" r="38" fill="#dc2626"/><text x="290" y="198" fill="#fee2e2" font-size="18" text-anchor="middle" font-family="Inter,Arial,sans-serif">(i, j)</text>

    <path d="M244 110 L272 160" stroke="#f8fafc" stroke-width="3" marker-end="url(#arr)"/>
    <path d="M164 190 L248 190" stroke="#f8fafc" stroke-width="3" marker-end="url(#arr)"/>
    <path d="M240 190 L252 190" stroke="#f8fafc" stroke-width="3" marker-end="url(#arr)"/>

    <text x="24" y="270" fill="#93c5fd" font-size="26" font-family="JetBrains Mono,monospace">if matrix[i][j] == '1':</text>
    <text x="24" y="310" fill="#e5e7eb" font-size="28" font-family="JetBrains Mono,monospace">dp = min(top, left, diag) + 1</text>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f8fafc"/>
