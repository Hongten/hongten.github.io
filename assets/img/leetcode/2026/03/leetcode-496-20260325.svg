<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 496 Next Greater Element I monotonic stack diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .text{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .box{fill:#1f2937;stroke:#60a5fa;stroke-width:2;rx:14}
      .arr{stroke:#f59e0b;stroke-width:4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 496: Next Greater Element I</text>
  <text x="60" y="130" class="sub">Monotonic Decreasing Stack + Hash Map</text>

  <text x="60" y="190" class="label">nums2 = [1, 3, 4, 2]</text>
  <rect x="60" y="220" width="130" height="70" class="box"/><text x="112" y="264" class="text">1</text>
  <rect x="210" y="220" width="130" height="70" class="box"/><text x="262" y="264" class="text">3</text>
  <rect x="360" y="220" width="130" height="70" class="box"/><text x="412" y="264" class="text">4</text>
  <rect x="510" y="220" width="130" height="70" class="box"/><text x="562" y="264" class="text">2</text>

  <line x1="140" y1="305" x2="260" y2="380" class="arr"/>
  <line x1="290" y1="305" x2="410" y2="380" class="arr"/>

  <rect x="220" y="390" width="300" height="170" class="box"/>
  <text x="245" y="430" class="label">nextGreater map</text>
  <text x="245" y="470" class="text">1 → 3</text>
  <text x="245" y="505" class="text">3 → 4</text>
  <text x="245" y="540" class="text">4 → -1, 2 → -1</text>

  <rect x="680" y="220" width="430" height="340" class="box"/>
  <text x="710" y="270" class="label">Query nums1 = [4, 1, 2]</text>
  <text x="710" y="325" class="text">ans[4] = -1</text>
  <text x="710" y="365" class="text">ans[1] = 3</text>
  <text x="710" y="405" class="text">ans[2] = -1</text>
  <text x="710" y="470" class="sub">Result: [-1, 3, -1]</text>
</svg>
