<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 52 N-Queens II pruning diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:600 26px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .q{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#fbbf24}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="95" class="title">LeetCode 52: N-Queens II</text>
  <text x="70" y="138" class="sub">Backtracking Count with Column + Diagonal Pruning</text>

  <g transform="translate(90,190)">
    <rect x="0" y="0" width="320" height="320" fill="#0b1220" stroke="#334155"/>
    <g stroke="#334155" stroke-width="1">
      <line x1="40" y1="0" x2="40" y2="320"/><line x1="80" y1="0" x2="80" y2="320"/><line x1="120" y1="0" x2="120" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/><line x1="280" y1="0" x2="280" y2="320"/>
      <line x1="0" y1="40" x2="320" y2="40"/><line x1="0" y1="80" x2="320" y2="80"/><line x1="0" y1="120" x2="320" y2="120"/><line x1="0" y1="160" x2="320" y2="160"/><line x1="0" y1="200" x2="320" y2="200"/><line x1="0" y1="240" x2="320" y2="240"/><line x1="0" y1="280" x2="320" y2="280"/>
    </g>
    <text x="20" y="32" class="q">♛</text>
    <text x="140" y="72" class="q">♛</text>
    <text x="260" y="112" class="q">♛</text>
    <line x1="20" y1="20" x2="300" y2="300" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 6"/>
    <line x1="260" y1="100" x2="20" y2="340" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 6"/>
  </g>

  <g transform="translate(470,220)">
    <rect x="0" y="0" rx="12" ry="12" width="640" height="250" fill="#111827" stroke="#334155"/>
    <text x="28" y="52" class="txt">State sets while DFS(row):</text>
    <text x="28" y="98" class="txt">• cols[col] = used column</text>
    <text x="28" y="138" class="txt">• diag1[row-col+n-1] = used main diagonal</text>
    <text x="28" y="178" class="txt">• diag2[row+col] = used anti diagonal</text>
    <text x="28" y="218" class="txt">row == n  ⇒  valid arrangement count + 1</text>
  </g>
</svg>
