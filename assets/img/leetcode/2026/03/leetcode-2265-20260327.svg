<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2265 subtree average postorder illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2a44"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#b9c8ff}
      .node{fill:#1e90ff;stroke:#d6e6ff;stroke-width:3}
      .edge{stroke:#8fb3ff;stroke-width:4}
      .txt{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
      .note{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#d9e7ff}
      .formula{font:700 30px 'Consolas',monospace;fill:#9df7c5}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="80" class="title">LeetCode 2265 · Count Nodes Equal to Average of Subtree</text>
  <text x="60" y="118" class="sub">Postorder returns (sum, count), then check node.val == sum / count</text>

  <line x1="600" y1="230" x2="430" y2="340" class="edge"/>
  <line x1="600" y1="230" x2="770" y2="340" class="edge"/>
  <line x1="430" y1="340" x2="330" y2="450" class="edge"/>
  <line x1="430" y1="340" x2="530" y2="450" class="edge"/>

  <circle cx="600" cy="210" r="46" class="node"/>
  <text x="600" y="210" class="txt">4</text>

  <circle cx="430" cy="340" r="42" class="node"/>
  <text x="430" y="340" class="txt">8</text>

  <circle cx="770" cy="340" r="42" class="node"/>
  <text x="770" y="340" class="txt">5</text>

  <circle cx="330" cy="450" r="38" class="node"/>
  <text x="330" y="450" class="txt">0</text>

  <circle cx="530" cy="450" r="38" class="node"/>
  <text x="530" y="450" class="txt">1</text>

  <text x="820" y="460" class="note">At node 8: sum = 8+0+1 = 9, count = 3</text>
  <text x="820" y="500" class="formula">avg = 9 / 3 = 3 (not equal)</text>

  <text x="60" y="570" class="note">Each node computed once ⇒ O(n) time, O(h) stack space</text>
</svg>
