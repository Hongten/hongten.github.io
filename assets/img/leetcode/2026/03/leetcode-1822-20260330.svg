<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1822 sign-of-product decision diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1822 — Sign of the Product of an Array</text>
  <rect x="60" y="150" width="1080" height="420" rx="20" fill="#1f2937" stroke="#374151"/>

  <rect x="110" y="210" width="300" height="90" rx="14" fill="#0b1220" stroke="#60a5fa"/>
  <text x="140" y="265" fill="#dbeafe" font-size="30" font-family="Inter,Arial,sans-serif">Any zero?</text>

  <rect x="460" y="180" width="280" height="110" rx="14" fill="#052e16" stroke="#4ade80"/>
  <text x="560" y="248" fill="#dcfce7" font-size="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="700">return 0</text>

  <rect x="460" y="330" width="300" height="90" rx="14" fill="#111827" stroke="#93c5fd"/>
  <text x="485" y="385" fill="#dbeafe" font-size="28" font-family="Inter,Arial,sans-serif">count negatives</text>

  <rect x="820" y="300" width="250" height="120" rx="14" fill="#3f1d2e" stroke="#f472b6"/>
  <text x="945" y="350" fill="#fbcfe8" font-size="28" text-anchor="middle" font-family="Inter,Arial,sans-serif">odd → -1</text>
  <text x="945" y="390" fill="#bbf7d0" font-size="28" text-anchor="middle" font-family="Inter,Arial,sans-serif">even → 1</text>

  <line x1="410" y1="255" x2="460" y2="235" stroke="#86efac" stroke-width="4"/>
  <text x="420" y="225" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">yes</text>

  <line x1="410" y1="280" x2="460" y2="365" stroke="#93c5fd" stroke-width="4"/>
  <text x="418" y="335" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">no</text>

  <line x1="760" y1="375" x2="820" y2="360" stroke="#f472b6" stroke-width="4"/>
  <text x="73" y="540" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: sign depends only on zero existence + parity of negatives</text>
</svg>
