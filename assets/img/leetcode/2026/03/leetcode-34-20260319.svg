<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 34 boundary binary search diagram">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 34 · Dual Binary Search Boundaries</text>
  <text x="60" y="140" fill="#94a3b8" font-size="26" font-family="Inter,Arial,sans-serif">Find left boundary (&gt;= target) and right boundary (first &gt; target) - 1</text>

  <rect x="70" y="210" width="1060" height="290" rx="16" fill="#111827" stroke="#334155"/>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="30" fill="#e5e7eb">
    <text x="120" y="320">nums: [ 1, 2, 3, 3, 3, 4, 5 ]</text>
    <text x="120" y="370">idx :   0  1  2  3  4  5  6</text>
  </g>

  <line x1="390" y1="395" x2="390" y2="455" stroke="#22c55e" stroke-width="5"/>
  <polygon points="390,460 380,442 400,442" fill="#22c55e"/>
  <text x="315" y="490" fill="#22c55e" font-size="24" font-family="Inter,Arial,sans-serif">left = 2</text>

  <line x1="655" y1="395" x2="655" y2="455" stroke="#f59e0b" stroke-width="5"/>
  <polygon points="655,460 645,442 665,442" fill="#f59e0b"/>
  <text x="560" y="490" fill="#f59e0b" font-size="24" font-family="Inter,Arial,sans-serif">right = 4</text>

  <text x="70" y="580" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · O(log n) + O(log n)</text>
</svg>
