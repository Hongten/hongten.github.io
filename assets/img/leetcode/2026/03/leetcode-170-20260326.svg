<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 170 complement lookup diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 170: Two Sum III</text>
  <text x="60" y="142" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Hash Map Count Design: add + find</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="252" fill="#86efac" font-size="28" font-family="Menlo,Consolas,monospace">freq = {1:2, 3:1, 5:1}</text>
  <text x="100" y="308" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">find(6):</text>
  <text x="130" y="356" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">x=1, y=5  → y exists ✓</text>
  <text x="130" y="398" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">x=3, y=3  → need freq[3] ≥ 2 ✗</text>
  <text x="130" y="440" fill="#d1d5db" font-size="26" font-family="Inter,Arial,sans-serif">x=5, y=1  → y exists ✓</text>
  <text x="100" y="500" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">Rule: if x == y, count must be at least 2</text>

  <text x="60" y="594" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
