<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1365 frequency prefix counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:26px;font-weight:700}
      .s{font-size:20px}
      .k{fill:#38bdf8}
      .box{fill:#111827;stroke:#334155;stroke-width:2;rx:10}
      .chip{fill:#1f2937;stroke:#475569;stroke-width:1.5;rx:8}
      .a{stroke:#22d3ee;stroke-width:3;marker-end:url(#arr)}
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="t m">LeetCode 1365 · Frequency Prefix Counting</text>
  <text x="60" y="105" class="t s">nums = [8,1,2,2,3]  →  answer = [4,0,1,1,3]</text>

  <rect x="60" y="140" width="500" height="160" class="box"/>
  <text x="80" y="175" class="t s">Step 1: Frequency table (value → count)</text>
  <rect x="80" y="195" width="70" height="42" class="chip"/><text x="102" y="222" class="t s">1:1</text>
  <rect x="165" y="195" width="70" height="42" class="chip"/><text x="187" y="222" class="t s">2:2</text>
  <rect x="250" y="195" width="70" height="42" class="chip"/><text x="272" y="222" class="t s">3:1</text>
  <rect x="335" y="195" width="70" height="42" class="chip"/><text x="357" y="222" class="t s">8:1</text>
  <text x="80" y="270" class="t s">(only non-zero entries shown)</text>

  <rect x="640" y="140" width="500" height="160" class="box"/>
  <text x="660" y="175" class="t s">Step 2: Prefix "less than v"</text>
  <rect x="660" y="195" width="80" height="42" class="chip"/><text x="676" y="222" class="t s">less[1]=0</text>
  <rect x="750" y="195" width="80" height="42" class="chip"/><text x="766" y="222" class="t s">less[2]=1</text>
  <rect x="840" y="195" width="80" height="42" class="chip"/><text x="856" y="222" class="t s">less[3]=3</text>
  <rect x="930" y="195" width="80" height="42" class="chip"/><text x="946" y="222" class="t s">less[8]=4</text>
  <text x="660" y="270" class="t s">answer[i] = less[nums[i]]</text>

  <line x1="560" y1="220" x2="635" y2="220" class="a"/>

  <rect x="60" y="350" width="1080" height="210" class="box"/>
  <text x="80" y="390" class="t s">Mapping:</text>
  <text x="80" y="430" class="t s">8 → less[8] = 4</text>
  <text x="280" y="430" class="t s">1 → less[1] = 0</text>
  <text x="480" y="430" class="t s">2 → less[2] = 1</text>
  <text x="680" y="430" class="t s">2 → less[2] = 1</text>
  <text x="880" y="430" class="t s">3 → less[3] = 3</text>
  <text x="80" y="490" class="t m k">Result: [4, 0, 1, 1, 3]</text>
</svg>
