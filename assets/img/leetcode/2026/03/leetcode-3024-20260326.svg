<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Type of Triangle decision flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .t{{font-family:Arial,sans-serif;fill:#e5e7eb}}
      .m{{font-size:38px;font-weight:700}}
      .s{{font-size:26px}}
      .b{{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:14}}
      .a{{stroke:#93c5fd;stroke-width:3;marker-end:url(#arrow)}}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 3024 · Type of Triangle</text>
  <rect x="70" y="160" width="300" height="110" class="b"/>
  <text x="95" y="225" class="t s">Sort: a ≤ b ≤ c</text>
  <rect x="450" y="160" width="320" height="110" class="b"/>
  <text x="480" y="225" class="t s">Check a + b &gt; c ?</text>
  <rect x="870" y="90" width="250" height="100" class="b"/>
  <text x="920" y="150" class="t s">No → "none"</text>
  <rect x="870" y="230" width="250" height="100" class="b"/>
  <text x="890" y="292" class="t s">all equal → equilateral</text>
  <rect x="870" y="370" width="250" height="100" class="b"/>
  <text x="885" y="432" class="t s">two equal → isosceles</text>
  <rect x="870" y="510" width="250" height="90" class="b"/>
  <text x="915" y="567" class="t s">else → scalene</text>
  <line x1="370" y1="215" x2="450" y2="215" class="a"/>
  <line x1="770" y1="200" x2="870" y2="140" class="a"/>
  <line x1="770" y1="215" x2="870" y2="280" class="a"/>
  <line x1="995" y1="330" x2="995" y2="370" class="a"/>
  <line x1="995" y1="470" x2="995" y2="510" class="a"/>
</svg>
