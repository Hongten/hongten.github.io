<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 122 greedy daily gain diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" fill="#e2e8f0" font-size="42" font-family="Inter,Segoe UI,Arial" font-weight="700">LeetCode 122 · Best Time to Buy and Sell Stock II</text>
  <text x="70" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Segoe UI,Arial">Greedy: sum every positive day-to-day increase</text>

  <g transform="translate(70,180)">
    <line x1="0" y1="320" x2="980" y2="320" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="20" x2="0" y2="320" stroke="#64748b" stroke-width="2"/>

    <polyline fill="none" stroke="#38bdf8" stroke-width="5" points="40,250 180,210 320,240 460,140 600,170 740,90 880,120"/>

    <circle cx="40" cy="250" r="6" fill="#e2e8f0"/>
    <circle cx="180" cy="210" r="6" fill="#e2e8f0"/>
    <circle cx="320" cy="240" r="6" fill="#e2e8f0"/>
    <circle cx="460" cy="140" r="6" fill="#e2e8f0"/>
    <circle cx="600" cy="170" r="6" fill="#e2e8f0"/>
    <circle cx="740" cy="90" r="6" fill="#e2e8f0"/>
    <circle cx="880" cy="120" r="6" fill="#e2e8f0"/>

    <g fill="#22c55e" font-size="20" font-family="Inter,Segoe UI,Arial" font-weight="700">
      <text x="102" y="225">+2</text>
      <text x="382" y="185">+5</text>
      <text x="662" y="125">+4</text>
    </g>

    <g stroke="#22c55e" stroke-width="4" marker-end="url(#arrow)">
      <line x1="80" y1="230" x2="160" y2="215"/>
      <line x1="360" y1="220" x2="440" y2="155"/>
      <line x1="640" y1="160" x2="720" y2="100"/>
    </g>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>

  <text x="70" y="585" fill="#cbd5e1" font-size="24" font-family="Inter,Segoe UI,Arial">Profit = Σ max(0, prices[i] - prices[i-1])</text>
</svg>
