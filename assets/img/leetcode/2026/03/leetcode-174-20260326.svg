<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 38px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .cell{fill:#111827;stroke:#64748b;stroke-width:2;rx:12}
      .txt{font:700 28px 'Consolas',monospace;fill:#f8fafc}
      .good{fill:#22c55e}
      .bad{fill:#ef4444}
      .dp{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .arrow{stroke:#f59e0b;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="56" y="70" class="title">LeetCode 174 · Dungeon Game</text>
  <text x="56" y="108" class="sub">Reverse DP: minimum health needed when entering each cell</text>

  <g transform="translate(120,170)">
    <rect class="cell" x="0" y="0" width="170" height="110"/>
    <rect class="cell" x="190" y="0" width="170" height="110"/>
    <rect class="cell" x="380" y="0" width="170" height="110"/>
    <rect class="cell" x="0" y="130" width="170" height="110"/>
    <rect class="cell" x="190" y="130" width="170" height="110"/>
    <rect class="cell" x="380" y="130" width="170" height="110"/>
    <rect class="cell" x="0" y="260" width="170" height="110"/>
    <rect class="cell" x="190" y="260" width="170" height="110"/>
    <rect class="cell" x="380" y="260" width="170" height="110"/>

    <text class="txt" x="58" y="64">-2</text>
    <text class="txt" x="247" y="64">-3</text>
    <text class="txt good" x="442" y="64">+3</text>

    <text class="txt bad" x="58" y="194">-5</text>
    <text class="txt bad" x="247" y="194">-10</text>
    <text class="txt" x="442" y="194">+1</text>

    <text class="txt good" x="58" y="324">+10</text>
    <text class="txt" x="247" y="324">+30</text>
    <text class="txt bad" x="442" y="324">-5</text>

    <text class="dp" x="15" y="98">dp=7</text>
    <text class="dp" x="206" y="98">dp=5</text>
    <text class="dp" x="396" y="98">dp=2</text>

    <text class="dp" x="15" y="228">dp=6</text>
    <text class="dp" x="206" y="228">dp=11</text>
    <text class="dp" x="396" y="228">dp=5</text>

    <text class="dp" x="15" y="358">dp=1</text>
    <text class="dp" x="206" y="358">dp=1</text>
    <text class="dp" x="396" y="358">dp=6</text>

    <line class="arrow" x1="465" y1="315" x2="470" y2="205"/>
    <line class="arrow" x1="465" y1="315" x2="340" y2="315"/>
    <line class="arrow" x1="275" y1="315" x2="275" y2="205"/>
    <line class="arrow" x1="275" y1="185" x2="465" y2="185"/>
    <line class="arrow" x1="275" y1="185" x2="85" y2="185"/>
    <line class="arrow" x1="85" y1="185" x2="85" y2="75"/>
    <line class="arrow" x1="275" y1="75" x2="85" y2="75"/>
  </g>

  <text x="730" y="240" class="sub">Transition</text>
  <text x="730" y="290" class="txt">need = min(right, down) - dungeon[i][j]</text>
  <text x="730" y="340" class="txt">dp[i][j] = max(1, need)</text>
  <text x="730" y="420" class="sub">Answer: dp[0][0] = 7</text>
</svg>
