<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 237 delete node linked list diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#93c5fd" />
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="78" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 237 · Delete Node in a Linked List</text>
  <text x="50" y="118" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Copy next value, then bypass next node</text>

  <g transform="translate(90,220)">
    <rect x="0" y="0" width="140" height="80" rx="12" fill="#1f2937" stroke="#60a5fa"/>
    <text x="70" y="48" text-anchor="middle" fill="#e5e7eb" font-size="32" font-family="monospace">4</text>

    <rect x="210" y="0" width="140" height="80" rx="12" fill="#1f2937" stroke="#34d399"/>
    <text x="280" y="48" text-anchor="middle" fill="#e5e7eb" font-size="32" font-family="monospace">5</text>

    <rect x="420" y="0" width="140" height="80" rx="12" fill="#1f2937" stroke="#f59e0b"/>
    <text x="490" y="48" text-anchor="middle" fill="#e5e7eb" font-size="32" font-family="monospace">1</text>

    <rect x="630" y="0" width="140" height="80" rx="12" fill="#1f2937" stroke="#a78bfa"/>
    <text x="700" y="48" text-anchor="middle" fill="#e5e7eb" font-size="32" font-family="monospace">9</text>

    <line x1="140" y1="40" x2="210" y2="40" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="350" y1="40" x2="420" y2="40" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="560" y1="40" x2="630" y2="40" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

    <text x="280" y="-20" text-anchor="middle" fill="#34d399" font-size="24" font-family="Inter,Arial,sans-serif">given node</text>
  </g>

  <text x="90" y="390" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">After operation: overwrite 5 with 1, and point to 9</text>
  <text x="90" y="440" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">List becomes: 4 → 1 → 9</text>
  <text x="90" y="500" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
