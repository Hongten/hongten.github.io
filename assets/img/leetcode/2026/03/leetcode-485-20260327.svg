<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 485 streak counter diagram">
  <defs>
    <style>
      .bg{fill:#0b1020}.card{fill:#121a33;stroke:#2a3a72;stroke-width:2}.txt{fill:#e8ecff;font-family:Inter,Segoe UI,Arial,sans-serif}
      .muted{fill:#9fb0e6}.one{fill:#39d98a}.zero{fill:#ff6b6b}.line{stroke:#4f6fd6;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <text class="txt" x="48" y="64" font-size="34" font-weight="700">LeetCode 485 · Max Consecutive Ones</text>
  <text class="muted" x="48" y="96" font-size="20">Single pass invariant: on 1 => cur++, on 0 => cur = 0, best = max(best, cur)</text>

  <rect class="card" x="48" y="130" width="1104" height="330" rx="18"/>

  <text class="muted" x="76" y="180" font-size="22">Example nums = [1, 1, 0, 1, 1, 1]</text>

  <g transform="translate(76,210)">
    <rect x="0" y="0" width="120" height="64" rx="10" fill="#163b2a"/><text class="txt" x="56" y="41" font-size="30" text-anchor="middle">1</text>
    <rect x="140" y="0" width="120" height="64" rx="10" fill="#163b2a"/><text class="txt" x="196" y="41" font-size="30" text-anchor="middle">1</text>
    <rect x="280" y="0" width="120" height="64" rx="10" fill="#4a1f2a"/><text class="txt" x="336" y="41" font-size="30" text-anchor="middle">0</text>
    <rect x="420" y="0" width="120" height="64" rx="10" fill="#163b2a"/><text class="txt" x="476" y="41" font-size="30" text-anchor="middle">1</text>
    <rect x="560" y="0" width="120" height="64" rx="10" fill="#163b2a"/><text class="txt" x="616" y="41" font-size="30" text-anchor="middle">1</text>
    <rect x="700" y="0" width="120" height="64" rx="10" fill="#163b2a"/><text class="txt" x="756" y="41" font-size="30" text-anchor="middle">1</text>
  </g>

  <text class="one" x="76" y="332" font-size="24">cur: 1 → 2</text>
  <text class="zero" x="356" y="332" font-size="24">reset to 0</text>
  <text class="one" x="496" y="332" font-size="24">1 → 2 → 3</text>

  <path class="line" d="M80 360 C220 300, 320 300, 400 360 S620 420, 820 340"/>
  <text class="txt" x="860" y="350" font-size="26" font-weight="700">best = 3</text>
</svg>
