<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 63 Unique Paths II DP illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .cell{fill:#111827;stroke:#334155;stroke-width:2}
      .obs{fill:#7f1d1d;stroke:#ef4444;stroke-width:2}
      .path{fill:#0ea5e9;opacity:.25}
      .txt{font:700 24px 'Consolas',monospace;fill:#e2e8f0}
      .note{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="82" class="title">LeetCode 63 · Unique Paths II</text>
  <text x="60" y="120" class="sub">DP transition with obstacles: dp[r][c] = top + left, blocked = 0</text>

  <g transform="translate(140,170)">
    <rect class="path" x="0" y="0" width="500" height="300" rx="16"/>
    <g>
      <rect class="cell" x="0" y="0" width="100" height="100"/><text class="txt" x="42" y="60">1</text>
      <rect class="cell" x="100" y="0" width="100" height="100"/><text class="txt" x="142" y="60">1</text>
      <rect class="cell" x="200" y="0" width="100" height="100"/><text class="txt" x="242" y="60">1</text>
      <rect class="cell" x="300" y="0" width="100" height="100"/><text class="txt" x="342" y="60">1</text>
      <rect class="cell" x="400" y="0" width="100" height="100"/><text class="txt" x="442" y="60">1</text>

      <rect class="cell" x="0" y="100" width="100" height="100"/><text class="txt" x="42" y="160">1</text>
      <rect class="obs"  x="100" y="100" width="100" height="100"/><text class="txt" x="132" y="160">X</text>
      <rect class="cell" x="200" y="100" width="100" height="100"/><text class="txt" x="242" y="160">1</text>
      <rect class="obs"  x="300" y="100" width="100" height="100"/><text class="txt" x="332" y="160">X</text>
      <rect class="cell" x="400" y="100" width="100" height="100"/><text class="txt" x="442" y="160">1</text>

      <rect class="cell" x="0" y="200" width="100" height="100"/><text class="txt" x="42" y="260">1</text>
      <rect class="cell" x="100" y="200" width="100" height="100"/><text class="txt" x="142" y="260">1</text>
      <rect class="cell" x="200" y="200" width="100" height="100"/><text class="txt" x="242" y="260">2</text>
      <rect class="cell" x="300" y="200" width="100" height="100"/><text class="txt" x="342" y="260">2</text>
      <rect class="cell" x="400" y="200" width="100" height="100"/><text class="txt" x="442" y="260">3</text>
    </g>
  </g>

  <g transform="translate(730,210)">
    <text class="note" x="0" y="0">Obstacle ⇒ paths = 0</text>
    <text class="note" x="0" y="45">Open cell ⇒ from top + left</text>
    <text class="note" x="0" y="90">Start blocked? answer = 0</text>
    <text class="note" x="0" y="135">Time: O(mn), Space: O(mn)</text>
    <text class="note" x="0" y="180">(Can optimize to O(n))</text>
  </g>
</svg>
