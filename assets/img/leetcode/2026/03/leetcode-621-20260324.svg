<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 621 Task Scheduler diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 621: Task Scheduler</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Greedy counting frame: (maxFreq - 1) * (n + 1) + maxCount</text>

  <rect x="60" y="190" width="1080" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="240" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Example: tasks = [A,A,A,B,B,B], n = 2</text>

  <g font-family="monospace" font-size="34" font-weight="700">
    <rect x="90" y="280" width="72" height="52" rx="8" fill="#2563eb"/><text x="114" y="316" fill="#fff">A</text>
    <rect x="178" y="280" width="72" height="52" rx="8" fill="#334155"/><text x="202" y="316" fill="#cbd5e1">_</text>
    <rect x="266" y="280" width="72" height="52" rx="8" fill="#334155"/><text x="290" y="316" fill="#cbd5e1">_</text>
    <rect x="354" y="280" width="72" height="52" rx="8" fill="#2563eb"/><text x="378" y="316" fill="#fff">A</text>
    <rect x="442" y="280" width="72" height="52" rx="8" fill="#334155"/><text x="466" y="316" fill="#cbd5e1">_</text>
    <rect x="530" y="280" width="72" height="52" rx="8" fill="#334155"/><text x="554" y="316" fill="#cbd5e1">_</text>
    <rect x="618" y="280" width="72" height="52" rx="8" fill="#2563eb"/><text x="642" y="316" fill="#fff">A</text>

    <rect x="90" y="358" width="72" height="52" rx="8" fill="#16a34a"/><text x="114" y="394" fill="#fff">B</text>
    <rect x="178" y="358" width="72" height="52" rx="8" fill="#16a34a"/><text x="202" y="394" fill="#fff">B</text>
    <rect x="266" y="358" width="72" height="52" rx="8" fill="#16a34a"/><text x="290" y="394" fill="#fff">B</text>
  </g>

  <text x="90" y="466" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Answer = max(total tasks, frame length)</text>
  <text x="90" y="510" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
