<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 34px 'Segoe UI',sans-serif;fill:#e2e8f0}
      .sub{font:500 20px 'Segoe UI',sans-serif;fill:#93c5fd}
      .label{font:600 22px 'Segoe UI',sans-serif;fill:#cbd5e1}
      .ch{font:700 30px 'Consolas',monospace;fill:#f8fafc}
      .box{fill:#334155;stroke:#64748b;stroke-width:2;rx:10}
      .arrow{stroke:#38bdf8;stroke-width:4;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <text x="48" y="62" class="title">LeetCode 6 · Zigzag Conversion</text>
  <text x="48" y="96" class="sub">Row simulation (numRows = 4, s = PAYPALISHIRING)</text>

  <text x="70" y="170" class="label">Row 0</text>
  <rect x="180" y="140" width="760" height="44" class="box"/>
  <text x="205" y="171" class="ch">P     I     N</text>

  <text x="70" y="240" class="label">Row 1</text>
  <rect x="180" y="210" width="760" height="44" class="box"/>
  <text x="205" y="241" class="ch">A   L S   I G</text>

  <text x="70" y="310" class="label">Row 2</text>
  <rect x="180" y="280" width="760" height="44" class="box"/>
  <text x="205" y="311" class="ch">Y A   H R</text>

  <text x="70" y="380" class="label">Row 3</text>
  <rect x="180" y="350" width="760" height="44" class="box"/>
  <text x="205" y="381" class="ch">P     I</text>

  <path d="M960 162 C1020 180,1020 352,960 372" class="arrow"/>
  <text x="985" y="270" class="sub">down ↓ then up ↑</text>

  <text x="48" y="500" class="label">Read row by row: PIN + ALSIG + YAHR + PI = PINALSIGYAHRPI</text>
</svg>
