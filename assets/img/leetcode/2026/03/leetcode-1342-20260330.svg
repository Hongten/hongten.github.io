<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1342 parity reduction diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1342 · Number of Steps to Reduce a Number to Zero</text>
  <rect x="60" y="140" width="1080" height="430" rx="18" fill="#111827" stroke="#374151"/>

  <text x="100" y="210" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Rule A (even): n → n / 2</text>
  <text x="100" y="258" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Rule B (odd):  n → n - 1</text>

  <text x="100" y="332" fill="#f9fafb" font-size="28" font-family="JetBrains Mono,Consolas,monospace">Example: 14 → 7 → 6 → 3 → 2 → 1 → 0</text>
  <text x="100" y="380" fill="#fcd34d" font-size="28" font-family="JetBrains Mono,Consolas,monospace">Steps:      1    2    3    4    5    6</text>

  <text x="100" y="455" fill="#9ca3af" font-size="27" font-family="Inter,Arial,sans-serif">Parity-driven simulation · O(log n) time · O(1) space</text>
  <text x="100" y="512" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
