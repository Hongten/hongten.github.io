<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 232 two-stack queue flow diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="76" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 232 · Implement Queue using Stacks</text>
  <text x="48" y="116" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">FIFO via two stacks: in-stack + out-stack (lazy transfer)</text>

  <rect x="70" y="180" width="420" height="350" rx="18" fill="#1f2937" stroke="#4b5563"/>
  <text x="95" y="220" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">in stack (push here)</text>
  <rect x="145" y="260" width="270" height="240" rx="12" fill="#0f172a" stroke="#60a5fa"/>
  <rect x="175" y="450" width="210" height="36" rx="8" fill="#334155"/>
  <text x="255" y="474" text-anchor="middle" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">3 (top)</text>
  <rect x="175" y="408" width="210" height="36" rx="8" fill="#334155"/>
  <text x="255" y="432" text-anchor="middle" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">2</text>
  <rect x="175" y="366" width="210" height="36" rx="8" fill="#334155"/>
  <text x="255" y="390" text-anchor="middle" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">1 (oldest)</text>

  <rect x="710" y="180" width="420" height="350" rx="18" fill="#1f2937" stroke="#4b5563"/>
  <text x="735" y="220" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">out stack (pop/peek)</text>
  <rect x="785" y="260" width="270" height="240" rx="12" fill="#0f172a" stroke="#f87171"/>
  <rect x="815" y="450" width="210" height="36" rx="8" fill="#334155"/>
  <text x="920" y="474" text-anchor="middle" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">1 (front/top)</text>
  <rect x="815" y="408" width="210" height="36" rx="8" fill="#334155"/>
  <text x="920" y="432" text-anchor="middle" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">2</text>
  <rect x="815" y="366" width="210" height="36" rx="8" fill="#334155"/>
  <text x="920" y="390" text-anchor="middle" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">3</text>

  <line x1="500" y1="350" x2="700" y2="350" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="600" y="330" text-anchor="middle" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">transfer when out is empty</text>

  <text x="48" y="586" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Amortized O(1): each element moves at most once from in → out</text>
</svg>
