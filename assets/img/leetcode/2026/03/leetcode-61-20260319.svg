<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 61 rotate list cycle and cut diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="72" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 61 · Rotate List</text>
  <text x="52" y="112" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Build cycle → move to new tail (n-k%n-1) → cut</text>

  <rect x="52" y="150" width="1096" height="420" rx="16" fill="#111827" stroke="#334155"/>

  <text x="90" y="205" fill="#f8fafc" font-size="24" font-family="Inter,Arial,sans-serif">Example: 1 → 2 → 3 → 4 → 5,  k = 2,  n = 5,  shift = 2</text>

  <g font-family="Inter,Arial,sans-serif" font-size="22" text-anchor="middle">
    <rect x="130" y="250" width="80" height="52" rx="10" fill="#1e293b" stroke="#64748b"/>
    <text x="170" y="283" fill="#e2e8f0">1</text>
    <rect x="290" y="250" width="80" height="52" rx="10" fill="#1e293b" stroke="#64748b"/>
    <text x="330" y="283" fill="#e2e8f0">2</text>
    <rect x="450" y="250" width="80" height="52" rx="10" fill="#1e293b" stroke="#64748b"/>
    <text x="490" y="283" fill="#e2e8f0">3</text>
    <rect x="610" y="250" width="80" height="52" rx="10" fill="#1e293b" stroke="#64748b"/>
    <text x="650" y="283" fill="#e2e8f0">4</text>
    <rect x="770" y="250" width="80" height="52" rx="10" fill="#1e293b" stroke="#64748b"/>
    <text x="810" y="283" fill="#e2e8f0">5</text>
  </g>

  <line x1="210" y1="276" x2="290" y2="276" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="370" y1="276" x2="450" y2="276" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="530" y1="276" x2="610" y2="276" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="690" y1="276" x2="770" y2="276" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M850,276 C980,276 980,390 170,390 C120,390 110,350 130,300" fill="none" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="875" y="345" fill="#22d3ee" font-size="20" font-family="Inter,Arial,sans-serif">tail.next = head (make cycle)</text>

  <line x1="520" y1="330" x2="520" y2="402" stroke="#fbbf24" stroke-width="4" stroke-dasharray="8 6"/>
  <text x="536" y="428" fill="#fbbf24" font-size="20" font-family="Inter,Arial,sans-serif">cut here (newTail = 3)</text>

  <text x="90" y="470" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Result: 4 → 5 → 1 → 2 → 3</text>
  <text x="90" y="520" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">Invariant: move n-shift-1 steps from old head to locate new tail.</text>
  <text x="90" y="552" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
