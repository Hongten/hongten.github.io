<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1436 destination city diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1436 · Destination City</text>
  <text x="60" y="130" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Destination = city in all "to" nodes but not in "from" set</text>

  <rect x="90" y="220" rx="18" ry="18" width="220" height="90" fill="#334155" stroke="#64748b"/>
  <text x="200" y="275" text-anchor="middle" fill="#f8fafc" font-size="34" font-family="Arial">London</text>

  <rect x="490" y="220" rx="18" ry="18" width="220" height="90" fill="#334155" stroke="#64748b"/>
  <text x="600" y="275" text-anchor="middle" fill="#f8fafc" font-size="34" font-family="Arial">New York</text>

  <rect x="890" y="220" rx="18" ry="18" width="220" height="90" fill="#14532d" stroke="#4ade80" stroke-width="3"/>
  <text x="1000" y="275" text-anchor="middle" fill="#dcfce7" font-size="34" font-family="Arial" font-weight="700">Lima</text>

  <line x1="312" y1="265" x2="488" y2="265" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="712" y1="265" x2="888" y2="265" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="120" y="390" rx="14" ry="14" width="450" height="150" fill="#1e293b" stroke="#475569"/>
  <text x="145" y="430" fill="#cbd5e1" font-size="28" font-family="Arial" font-weight="700">Start set (from):</text>
  <text x="145" y="475" fill="#f1f5f9" font-size="30" font-family="Courier New">{ London, New York }</text>
  <text x="145" y="515" fill="#94a3b8" font-size="22" font-family="Arial">Check each "to" city against this set.</text>

  <rect x="640" y="390" rx="14" ry="14" width="430" height="150" fill="#052e16" stroke="#22c55e"/>
  <text x="665" y="430" fill="#86efac" font-size="28" font-family="Arial" font-weight="700">Destination city:</text>
  <text x="665" y="485" fill="#dcfce7" font-size="44" font-family="Arial" font-weight="700">Lima</text>
  <text x="665" y="522" fill="#bbf7d0" font-size="22" font-family="Arial">Not in start set ⇒ answer</text>
</svg>
