<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 73 marker matrix diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#e5e7eb}
      .m{font-family:JetBrains Mono,Consolas,monospace;fill:#d1d5db;font-size:26px}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="90" class="t" font-size="44" font-weight="700">LeetCode 73 · Set Matrix Zeroes</text>
  <text x="52" y="132" class="t" font-size="26" fill="#93c5fd">Use first row + first column as in-place markers</text>

  <rect x="52" y="180" width="520" height="380" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="80" y="220" class="t" font-size="24">Before</text>
  <text x="80" y="270" class="m">[1, 1, 1, 1]</text>
  <text x="80" y="315" class="m">[1, 0, 1, 1]  &lt;-- zero found</text>
  <text x="80" y="360" class="m">[1, 1, 1, 1]</text>
  <text x="80" y="405" class="m">[1, 1, 1, 0]  &lt;-- zero found</text>
  <text x="80" y="470" class="t" font-size="22" fill="#86efac">Mark matrix[i][0] and matrix[0][j]</text>

  <rect x="628" y="180" width="520" height="380" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="656" y="220" class="t" font-size="24">After</text>
  <text x="656" y="270" class="m">[1, 0, 1, 0]</text>
  <text x="656" y="315" class="m">[0, 0, 0, 0]</text>
  <text x="656" y="360" class="m">[1, 0, 1, 0]</text>
  <text x="656" y="405" class="m">[0, 0, 0, 0]</text>
  <text x="656" y="470" class="t" font-size="22" fill="#fca5a5">Finally process first row/col by flags</text>

  <text x="52" y="600" class="t" font-size="24" fill="#9ca3af">Author: Tom🦞 · EN first / 中文 second · Java default code tab</text>
</svg>
