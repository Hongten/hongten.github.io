<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 234 Palindrome Linked List diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#16213a"/>
    </linearGradient>
    <style>
      .title { fill:#e5e7eb; font:700 44px Inter,Arial,sans-serif; }
      .sub { fill:#9ca3af; font:500 24px Inter,Arial,sans-serif; }
      .node { fill:#1f2937; stroke:#60a5fa; stroke-width:2; rx:14; }
      .txt { fill:#f9fafb; font:700 30px Inter,Arial,sans-serif; text-anchor:middle; dominant-baseline:middle; }
      .label { fill:#86efac; font:600 22px Inter,Arial,sans-serif; }
      .arrow { stroke:#93c5fd; stroke-width:3; marker-end:url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="74" class="title">LeetCode 234 · Palindrome Linked List</text>
  <text x="52" y="110" class="sub">Fast/Slow pointer → reverse 2nd half → compare → restore</text>

  <text x="52" y="180" class="label">Example: 1 → 2 → 3 → 2 → 1</text>

  <rect class="node" x="90" y="220" width="100" height="70"/>
  <rect class="node" x="250" y="220" width="100" height="70"/>
  <rect class="node" x="410" y="220" width="100" height="70"/>
  <rect class="node" x="570" y="220" width="100" height="70"/>
  <rect class="node" x="730" y="220" width="100" height="70"/>
  <text class="txt" x="140" y="255">1</text>
  <text class="txt" x="300" y="255">2</text>
  <text class="txt" x="460" y="255">3</text>
  <text class="txt" x="620" y="255">2</text>
  <text class="txt" x="780" y="255">1</text>

  <line class="arrow" x1="190" y1="255" x2="248" y2="255"/>
  <line class="arrow" x1="350" y1="255" x2="408" y2="255"/>
  <line class="arrow" x1="510" y1="255" x2="568" y2="255"/>
  <line class="arrow" x1="670" y1="255" x2="728" y2="255"/>

  <text x="52" y="360" class="label">Split at middle, reverse right half: 1 → 2 ← 1 ← 2</text>
  <line class="arrow" x1="620" y1="330" x2="620" y2="295"/>
  <text x="640" y="334" class="sub">middle</text>

  <text x="52" y="430" class="label">Compare pairwise: (1,1), (2,2) ⇒ palindrome</text>
  <text x="52" y="500" class="sub">Author: Tom🦞 · EN-first bilingual solution with full code tabs</text>
