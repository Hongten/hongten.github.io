<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 25 reverse nodes in k-group diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="70" fill="#e5e7eb" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 25 · Reverse Nodes in k-Group</text>
  <text x="50" y="110" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">k = 3 example: reverse each full block, keep short tail unchanged</text>

  <g transform="translate(70,180)" font-family="Inter,Arial,sans-serif" font-size="28" text-anchor="middle">
    <rect x="0" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#60a5fa"/><text x="40" y="37" fill="#e5e7eb">1</text>
    <rect x="120" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#60a5fa"/><text x="160" y="37" fill="#e5e7eb">2</text>
    <rect x="240" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#60a5fa"/><text x="280" y="37" fill="#e5e7eb">3</text>
    <rect x="360" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#60a5fa"/><text x="400" y="37" fill="#e5e7eb">4</text>
    <rect x="480" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#60a5fa"/><text x="520" y="37" fill="#e5e7eb">5</text>
    <rect x="600" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#60a5fa"/><text x="640" y="37" fill="#e5e7eb">6</text>
    <rect x="720" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#f59e0b"/><text x="760" y="37" fill="#e5e7eb">7</text>

    <line x1="80" y1="28" x2="120" y2="28" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="200" y1="28" x2="240" y2="28" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="320" y1="28" x2="360" y2="28" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="440" y1="28" x2="480" y2="28" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="560" y1="28" x2="600" y2="28" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="680" y1="28" x2="720" y2="28" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="70" y="320" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">After reversing each full k-block:</text>
  <g transform="translate(70,350)" font-family="Inter,Arial,sans-serif" font-size="28" text-anchor="middle">
    <rect x="0" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#34d399"/><text x="40" y="37" fill="#e5e7eb">3</text>
    <rect x="120" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#34d399"/><text x="160" y="37" fill="#e5e7eb">2</text>
    <rect x="240" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#34d399"/><text x="280" y="37" fill="#e5e7eb">1</text>
    <rect x="360" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#34d399"/><text x="400" y="37" fill="#e5e7eb">6</text>
    <rect x="480" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#34d399"/><text x="520" y="37" fill="#e5e7eb">5</text>
    <rect x="600" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#34d399"/><text x="640" y="37" fill="#e5e7eb">4</text>
    <rect x="720" y="0" width="80" height="56" rx="10" fill="#1f2937" stroke="#f59e0b"/><text x="760" y="37" fill="#e5e7eb">7</text>

    <line x1="80" y1="28" x2="120" y2="28" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="200" y1="28" x2="240" y2="28" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="320" y1="28" x2="360" y2="28" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="440" y1="28" x2="480" y2="28" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="560" y1="28" x2="600" y2="28" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="680" y1="28" x2="720" y2="28" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="70" y="465" fill="#f59e0b" font-size="22" font-family="Inter,Arial,sans-serif">Tail length &lt; k stays unchanged (node 7)</text>
  <text x="70" y="525" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: verify kth first → reverse [groupStart..kth] → reconnect to groupNext</text>
  <text x="70" y="575" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
