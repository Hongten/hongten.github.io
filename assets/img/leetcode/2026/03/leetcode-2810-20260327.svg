<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2810 faulty keyboard deque simulation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#18243b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2810 - Faulty Keyboard</text>
  <text x="56" y="132" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Toggle reverse on 'i', push to front/back with deque</text>

  <rect x="56" y="176" width="1088" height="390" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="90" y="230" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,monospace">Input:   s = "poiinter"</text>
  <text x="90" y="270" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,monospace">chars:   p  o  i  i  n  t  e  r</text>
  <text x="90" y="310" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,monospace">deque:   [p,o] -> rev -> normal -> [p,o,n,t,e,r]</text>

  <rect x="90" y="350" width="320" height="72" rx="12" fill="#1d4ed8"/>
  <text x="112" y="394" fill="#dbeafe" font-size="28" font-family="Inter,Arial,sans-serif">reversed = false</text>

  <rect x="440" y="350" width="320" height="72" rx="12" fill="#7c3aed"/>
  <text x="460" y="394" fill="#ede9fe" font-size="28" font-family="Inter,Arial,sans-serif">on 'i': toggle flag</text>

  <rect x="790" y="350" width="320" height="72" rx="12" fill="#059669"/>
  <text x="820" y="394" fill="#dcfce7" font-size="28" font-family="Inter,Arial,sans-serif">final: "ponter"</text>

  <text x="90" y="470" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">Time O(n), Space O(n) · Author: Tom🦞</text>
</svg>
