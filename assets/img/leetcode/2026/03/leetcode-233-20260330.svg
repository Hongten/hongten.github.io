<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 233 place-value counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 26px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .mono{font:600 26px 'JetBrains Mono','Consolas',monospace;fill:#f8fafc}
      .accent{fill:#22d3ee}
      .box{fill:#0b1220;stroke:#334155;stroke-width:2;rx:14}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 233 · Number of Digit One</text>
  <text x="60" y="130" class="sub">Place-Value Counting (high / cur / low)</text>

  <rect x="60" y="170" width="1080" height="170" class="box"/>
  <text x="90" y="225" class="txt">For each place m = 1, 10, 100, ...</text>
  <text x="90" y="275" class="mono">high = n / (m*10),   cur = (n/m)%10,   low = n%m</text>
  <text x="90" y="320" class="txt">cur==0 → high*m   |   cur==1 → high*m+low+1   |   cur&gt;=2 → (high+1)*m</text>

  <rect x="60" y="370" width="1080" height="200" class="box"/>
  <text x="90" y="430" class="txt">Example n = 314159, at m = 100 (hundreds place):</text>
  <text x="90" y="480" class="mono">high = 314, cur = 1, low = 59  ⇒  contribution = 314*100 + 59 + 1 = 31460</text>
  <text x="90" y="530" class="txt">Sum contributions from every place → total count of digit '1' in [0..n]</text>

  <circle cx="1080" cy="95" r="34" class="accent"/>
  <text x="1063" y="103" font-size="24" font-family="Segoe UI, Arial" fill="#082f49">233</text>
</svg>
