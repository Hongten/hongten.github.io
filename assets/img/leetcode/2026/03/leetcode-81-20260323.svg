<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 81 rotated array binary search with duplicates">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#e2e8f0}.m{font-size:28px;font-weight:700}.s{font-size:22px}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 81 · Search in Rotated Sorted Array II</text>
  <text x="60" y="130" class="t s">Duplicate-safe binary search: trim ambiguous edges, then pick sorted half.</text>
  <rect x="70" y="210" width="1060" height="120" rx="14" fill="#111827" stroke="#334155"/>
  <text x="95" y="283" class="t s">Array: [2,5,6,0,0,1,2], target=0</text>
  <rect x="120" y="410" width="260" height="90" rx="12" fill="#1d4ed8"/>
  <text x="150" y="465" class="t s">left==mid==right?</text>
  <rect x="470" y="410" width="260" height="90" rx="12" fill="#0f766e"/>
  <text x="510" y="465" class="t s">left half sorted?</text>
  <rect x="820" y="410" width="260" height="90" rx="12" fill="#7c3aed"/>
  <text x="850" y="465" class="t s">right half sorted</text>
</svg>
