<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 424 sliding window max frequency diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="52" y="74" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 424 · Sliding Window + MaxFreq</text>
  <text x="52" y="112" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Keep window valid: windowLen - maxFreq ≤ k</text>

  <rect x="60" y="170" width="1080" height="260" rx="16" fill="#1f2937" stroke="#334155"/>

  <g font-family="monospace" font-size="38" fill="#f8fafc" text-anchor="middle">
    <text x="165" y="320">A</text>
    <text x="245" y="320">A</text>
    <text x="325" y="320">B</text>
    <text x="405" y="320">A</text>
    <text x="485" y="320">B</text>
    <text x="565" y="320">B</text>
    <text x="645" y="320">A</text>
    <text x="725" y="320">A</text>
    <text x="805" y="320">A</text>
  </g>

  <g stroke="#475569" stroke-width="2">
    <line x1="120" y1="340" x2="840" y2="340"/>
    <line x1="120" y1="360" x2="840" y2="360"/>
  </g>

  <line x1="120" y1="390" x2="120" y2="470" stroke="#22c55e" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="90" y="500" fill="#22c55e" font-size="26" font-family="Inter,Arial,sans-serif">left</text>

  <line x1="840" y1="390" x2="840" y2="470" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="810" y="500" fill="#38bdf8" font-size="26" font-family="Inter,Arial,sans-serif">right</text>

  <text x="60" y="560" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">Example window: AABABBAA (len=8), maxFreq(A)=5, needReplace=3</text>
  <text x="60" y="598" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">If needReplace &gt; k, move left pointer to shrink.</text>
</svg>
