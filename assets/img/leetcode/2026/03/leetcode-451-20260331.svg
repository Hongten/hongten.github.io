<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 451 frequency sorting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 451 · Sort Characters By Frequency</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Count chars -> sort by frequency -> rebuild string</text>

  <rect x="56" y="180" width="320" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="82" y="220" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">Input</text>
  <text x="82" y="262" fill="#86efac" font-size="34" font-family="JetBrains Mono,monospace">tree</text>
  <text x="82" y="318" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">Frequency Map</text>
  <text x="82" y="356" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,monospace">e : 2</text>
  <text x="82" y="396" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,monospace">t : 1</text>
  <text x="82" y="436" fill="#fca5a5" font-size="30" font-family="JetBrains Mono,monospace">r : 1</text>

  <rect x="436" y="180" width="320" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="462" y="220" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">Sort by Count Desc</text>
  <rect x="462" y="250" width="268" height="58" rx="10" fill="#334155"/>
  <text x="490" y="288" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,monospace">(e,2)</text>
  <rect x="462" y="324" width="268" height="58" rx="10" fill="#334155"/>
  <text x="490" y="362" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,monospace">(t,1)</text>
  <rect x="462" y="398" width="268" height="58" rx="10" fill="#334155"/>
  <text x="490" y="436" fill="#e5e7eb" font-size="30" font-family="JetBrains Mono,monospace">(r,1)</text>

  <rect x="816" y="180" width="328" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="842" y="220" fill="#f9fafb" font-size="24" font-family="Inter,Arial,sans-serif">Rebuild Output</text>
  <text x="842" y="290" fill="#fde68a" font-size="34" font-family="JetBrains Mono,monospace">"ee" + "t" + "r"</text>
  <text x="842" y="360" fill="#86efac" font-size="42" font-family="JetBrains Mono,monospace">"eetr"</text>
  <text x="842" y="420" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">("eert" also valid)</text>

  <text x="56" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
