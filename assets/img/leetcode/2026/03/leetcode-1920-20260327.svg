<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1920 index mapping composition diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1920 · Build Array from Permutation</text>
  <text x="60" y="135" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">ans[i] = nums[nums[i]] (index mapping composition)</text>
  <rect x="60" y="180" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="240" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">nums = [0,2,1,5,3,4]</text>
  <text x="100" y="285" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">i = 3 → nums[3] = 5 → nums[5] = 4 → ans[3] = 4</text>
  <line x1="450" y1="275" x2="615" y2="275" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="275" x2="905" y2="275" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="100" y="360" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif">One pass over i = 0..n-1, each ans slot computed once.</text>
  <text x="100" y="410" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Time O(n), Output space O(n).</text>
  <text x="100" y="470" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">EN-first · 中文后置 · Java/Go/C++/Python/JavaScript tabs</text>
  <text x="100" y="515" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
