<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 241 divide-and-conquer split diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{fill:#e2e8f0;font-family:Inter,Segoe UI,Arial,sans-serif}
      .h{font-size:42px;font-weight:700}
      .m{font-size:24px;font-weight:600}
      .s{font-size:20px}
      .b{fill:none;stroke:#38bdf8;stroke-width:3}
      .n{fill:#0b1220;stroke:#38bdf8;stroke-width:2;rx:14}
      .o{fill:#f59e0b;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t h">LeetCode 241 · Different Ways to Add Parentheses</text>
  <text x="60" y="120" class="t s">Divide at operators, solve subproblems, combine cross-product results.</text>

  <rect x="460" y="170" width="280" height="56" class="n"/>
  <text x="600" y="205" text-anchor="middle" class="t m">2*3-4*5</text>

  <path d="M600 226 L360 300" class="b"/>
  <path d="M600 226 L600 300" class="b"/>
  <path d="M600 226 L840 300" class="b"/>

  <rect x="250" y="300" width="220" height="58" class="n"/>
  <text x="360" y="336" text-anchor="middle" class="t m">2 <tspan class="o">*</tspan> 3-4*5</text>

  <rect x="490" y="300" width="220" height="58" class="n"/>
  <text x="600" y="336" text-anchor="middle" class="t m">2*3 <tspan class="o">-</tspan> 4*5</text>

  <rect x="730" y="300" width="220" height="58" class="n"/>
  <text x="840" y="336" text-anchor="middle" class="t m">2*3-4 <tspan class="o">*</tspan> 5</text>

  <text x="60" y="430" class="t s">Memo keys: "3-4*5", "2*3", "4*5", "2*3-4"</text>
  <text x="60" y="470" class="t s">Each substring is solved once, then reused.</text>
</svg>
