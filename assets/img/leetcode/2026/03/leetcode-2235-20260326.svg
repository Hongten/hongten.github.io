<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2235 Add Two Integers diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .subtitle{font:500 28px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#60a5fa;stroke-width:3;rx:16}
      .label{font:600 32px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .value{font:700 40px 'Consolas','Menlo',monospace;fill:#f8fafc}
      .op{font:700 54px 'Segoe UI',Arial,sans-serif;fill:#fbbf24}
      .note{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 2235 · Add Two Integers</text>
  <text x="60" y="135" class="subtitle">Return num1 + num2 directly (O(1) time, O(1) space)</text>

  <rect x="120" y="210" width="250" height="170" class="box"/>
  <text x="155" y="275" class="label">num1</text>
  <text x="155" y="335" class="value">a</text>

  <text x="430" y="320" class="op">+</text>

  <rect x="500" y="210" width="250" height="170" class="box"/>
  <text x="535" y="275" class="label">num2</text>
  <text x="535" y="335" class="value">b</text>

  <text x="810" y="320" class="op">=</text>

  <rect x="860" y="210" width="250" height="170" class="box"/>
  <text x="895" y="275" class="label">result</text>
  <text x="895" y="335" class="value">a + b</text>

  <text x="60" y="560" class="note">Source: https://leetcode.com/problems/add-two-integers/</text>
</svg>
