<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .lbl{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .num{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#facc15}
      .small{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 414 · Third Maximum Number</text>
  <text x="60" y="130" class="sub">One-pass tracking of top-3 distinct values</text>
  <rect x="70" y="180" width="1060" height="370" rx="20" fill="#0b1220" stroke="#334155"/>
  <text x="110" y="240" class="lbl">Scan nums: [2, 2, 3, 1, 5]</text>
  <rect x="120" y="290" width="280" height="180" rx="16" fill="#1d4ed8"/>
  <text x="160" y="335" class="lbl">first (max)</text>
  <text x="240" y="400" class="num">5</text>
  <rect x="460" y="290" width="280" height="180" rx="16" fill="#7c3aed"/>
  <text x="490" y="335" class="lbl">second</text>
  <text x="580" y="400" class="num">3</text>
  <rect x="800" y="290" width="280" height="180" rx="16" fill="#0891b2"/>
  <text x="840" y="335" class="lbl">third</text>
  <text x="920" y="400" class="num">2</text>
  <text x="110" y="515" class="small">Ignore duplicates first, then shift slots when a bigger distinct number appears.</text>
</svg>
