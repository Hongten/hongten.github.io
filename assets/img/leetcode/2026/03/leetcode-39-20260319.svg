  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="70" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 39 · Combination Sum</text>
  <text x="48" y="108" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">DFS Backtracking with Reuse + Pruning (sorted candidates)</text>

  <rect x="50" y="150" width="200" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="66" y="184" fill="#e5e7eb" font-size="24" font-family="Consolas,Monaco,monospace">[] , remain=7</text>

