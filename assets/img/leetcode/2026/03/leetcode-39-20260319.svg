  <line x1="810" y1="178" x2="890" y2="178" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="48" y="590" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · Rule: recurse with same index i to allow unlimited reuse; break when candidate &gt; remaining.</text>
