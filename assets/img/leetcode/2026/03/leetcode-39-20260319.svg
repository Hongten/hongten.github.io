  <text x="306" y="294" fill="#e5e7eb" font-size="24" font-family="Consolas,Monaco,monospace">[2] , remain=5</text>

  <rect x="570" y="370" width="240" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="586" y="404" fill="#e5e7eb" font-size="24" font-family="Consolas,Monaco,monospace">[2,2] , rem=3</text>

  <rect x="890" y="480" width="260" height="56" rx="10" fill="#0f2a1d" stroke="#22c55e"/>
  <text x="906" y="514" fill="#bbf7d0" font-size="24" font-family="Consolas,Monaco,monospace">[2,2,3] ✓</text>

  <rect x="570" y="230" width="240" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="586" y="264" fill="#e5e7eb" font-size="24" font-family="Consolas,Monaco,monospace">[2,3] , rem=2</text>

  <rect x="890" y="300" width="260" height="56" rx="10" fill="#0f2a1d" stroke="#22c55e"/>
  <text x="906" y="334" fill="#bbf7d0" font-size="24" font-family="Consolas,Monaco,monospace">[2,2,3] same combo</text>

  <rect x="290" y="150" width="220" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="306" y="184" fill="#e5e7eb" font-size="24" font-family="Consolas,Monaco,monospace">[3] , remain=4</text>

  <rect x="570" y="150" width="240" height="56" rx="10" fill="#1f2937" stroke="#4b5563"/>
  <text x="586" y="184" fill="#e5e7eb" font-size="24" font-family="Consolas,Monaco,monospace">[3,3] , rem=1</text>

  <rect x="890" y="150" width="250" height="56" rx="10" fill="#0f2a1d" stroke="#22c55e"/>
  <text x="906" y="184" fill="#bbf7d0" font-size="24" font-family="Consolas,Monaco,monospace">[7] ✓</text>

  <line x1="250" y1="178" x2="290" y2="178" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="250" y1="190" x2="290" y2="288" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="510" y1="288" x2="570" y2="398" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
