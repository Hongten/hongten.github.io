<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <rect width="1200" height="420" fill="#0b1020"/>
  <text x="40" y="54" fill="#e9eefc" font-size="28" font-family="Arial">LeetCode 42 — Trapping Rain Water (Two Pointers)</text>
  <text x="40" y="88" fill="#94a3b8" font-size="18" font-family="Arial">Move the shorter side inward; maintain leftMax/rightMax and accumulate trapped water.</text>

  <g transform="translate(40,130)">
    <rect x="0" y="220" width="40" height="40" fill="#334155"/>
    <rect x="60" y="160" width="40" height="100" fill="#334155"/>
    <rect x="120" y="200" width="40" height="60" fill="#334155"/>
    <rect x="180" y="120" width="40" height="140" fill="#334155"/>
    <rect x="240" y="180" width="40" height="80" fill="#334155"/>
    <rect x="300" y="220" width="40" height="40" fill="#334155"/>
    <rect x="360" y="140" width="40" height="120" fill="#334155"/>
    <rect x="420" y="180" width="40" height="80" fill="#334155"/>
    <rect x="480" y="200" width="40" height="60" fill="#334155"/>

    <rect x="120" y="160" width="40" height="40" fill="#60a5fa" fill-opacity="0.65"/>
    <rect x="240" y="160" width="40" height="20" fill="#60a5fa" fill-opacity="0.65"/>
    <rect x="300" y="160" width="40" height="60" fill="#60a5fa" fill-opacity="0.65"/>
    <rect x="420" y="160" width="40" height="20" fill="#60a5fa" fill-opacity="0.65"/>
    <rect x="480" y="160" width="40" height="40" fill="#60a5fa" fill-opacity="0.65"/>

    <text x="0" y="300" fill="#94a3b8" font-size="16" font-family="Arial">Bars (gray) + trapped water (blue)</text>
  </g>

  <g transform="translate(700,150)">
    <rect x="0" y="0" width="430" height="180" rx="12" fill="#121a30" stroke="#334155"/>
    <text x="20" y="36" fill="#e9eefc" font-size="18" font-family="Consolas,monospace">if (height[left] &lt; height[right]) {</text>
    <text x="20" y="66" fill="#e9eefc" font-size="18" font-family="Consolas,monospace">  leftMax = max(leftMax, height[left]);</text>
    <text x="20" y="96" fill="#e9eefc" font-size="18" font-family="Consolas,monospace">  ans += leftMax - height[left++];</text>
    <text x="20" y="126" fill="#e9eefc" font-size="18" font-family="Consolas,monospace">} else { ... }</text>
    <text x="20" y="160" fill="#94a3b8" font-size="16" font-family="Arial">Greedy proof: smaller side limits water level.</text>
  </g>
</svg>
