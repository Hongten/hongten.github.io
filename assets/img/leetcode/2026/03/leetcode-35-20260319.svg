<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 35 lower bound binary search insert position">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 28px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 24px 'Consolas',monospace;fill:#e5e7eb}
      .lbl{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 35 · Search Insert Position</text>
  <text x="60" y="135" class="sub">Lower Bound Binary Search (first index with nums[i] ≥ target)</text>

  <rect x="90" y="220" width="140" height="90" rx="12" fill="#1f2937" stroke="#60a5fa"/>
  <rect x="240" y="220" width="140" height="90" rx="12" fill="#1f2937" stroke="#60a5fa"/>
  <rect x="390" y="220" width="140" height="90" rx="12" fill="#1f2937" stroke="#60a5fa"/>
  <rect x="540" y="220" width="140" height="90" rx="12" fill="#1f2937" stroke="#60a5fa"/>
  <rect x="690" y="220" width="140" height="90" rx="12" fill="#7c2d12" stroke="#fb923c" stroke-width="3"/>
  <rect x="840" y="220" width="140" height="90" rx="12" fill="#14532d" stroke="#4ade80" stroke-width="3"/>

  <text x="155" y="275" text-anchor="middle" class="txt">1</text>
  <text x="305" y="275" text-anchor="middle" class="txt">3</text>
  <text x="455" y="275" text-anchor="middle" class="txt">5</text>
  <text x="605" y="275" text-anchor="middle" class="txt">6</text>
  <text x="755" y="275" text-anchor="middle" class="txt">target=7</text>
  <text x="910" y="275" text-anchor="middle" class="txt">insert @4</text>

  <line x1="755" y1="340" x2="755" y2="400" stroke="#fb923c" stroke-width="4"/>
  <line x1="910" y1="340" x2="910" y2="400" stroke="#4ade80" stroke-width="4"/>
  <text x="690" y="440" class="lbl">Compare mid with target → shrink range</text>
  <text x="690" y="475" class="lbl">End state: left = insertion index</text>

  <text x="60" y="560" class="sub">Time: O(log n) · Space: O(1)</text>
</svg>
