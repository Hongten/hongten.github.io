<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 7 reverse integer process">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 7 · Reverse Integer</text>
  <text x="60" y="130" fill="#94a3b8" font-size="26" font-family="Arial, sans-serif">Pop digit, guard overflow, push digit</text>
  <rect x="60" y="180" width="1080" height="360" rx="20" fill="#111827" stroke="#334155"/>
  <text x="95" y="235" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">Example: x = 123</text>
  <g font-family="Consolas, monospace" font-size="30" fill="#f8fafc">
    <text x="100" y="300">Step 1: digit = 3, rev = 3, x = 12</text>
    <text x="100" y="360">Step 2: digit = 2, rev = 32, x = 1</text>
    <text x="100" y="420">Step 3: digit = 1, rev = 321, x = 0</text>
  </g>
  <rect x="90" y="455" width="1020" height="65" rx="12" fill="#0b1220" stroke="#475569"/>
  <text x="110" y="495" fill="#fbbf24" font-size="24" font-family="Arial, sans-serif">Guard: rev&gt;214748364 or (rev==214748364 and digit&gt;7) =&gt; return 0</text>
</svg>
