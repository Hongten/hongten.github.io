<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 89 gray code reflect and prefix diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121a2b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 89: Gray Code</text>
  <text x="56" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Reflect-and-Prefix Construction</text>

  <rect x="56" y="176" width="1088" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="232" fill="#d1d5db" font-size="24" font-family="JetBrains Mono,Consolas,monospace">n = 3</text>
  <text x="90" y="270" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">000 → 001 → 011 → 010 → 110 → 111 → 101 → 100</text>

  <text x="90" y="326" fill="#d1d5db" font-size="23" font-family="Inter,Arial,sans-serif">Rule per round i:</text>
  <text x="90" y="360" fill="#cbd5e1" font-size="22" font-family="JetBrains Mono,Consolas,monospace">new = reverse(old) with bit i set (x | (1 &lt;&lt; i))</text>

  <line x1="90" y1="410" x2="1110" y2="410" stroke="#374151"/>
  <text x="90" y="454" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">Adjacency check:</text>
  <text x="270" y="454" fill="#e5e7eb" font-size="22" font-family="JetBrains Mono,Consolas,monospace">a and b differ by one bit ⇔ popcount(a XOR b) = 1</text>

  <text x="90" y="520" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
