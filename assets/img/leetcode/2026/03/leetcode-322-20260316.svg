<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 322 coin change DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 322: Coin Change</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">dp[x] = min(dp[x], dp[x - coin] + 1)</text>

  <rect x="56" y="180" width="1088" height="340" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="235" fill="#d1fae5" font-size="24" font-family="Inter,Arial,sans-serif">Example: coins = [1,2,5], amount = 11</text>

  <g font-family="Inter,Arial,sans-serif" font-size="20" text-anchor="middle">
    <rect x="90" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="125" y="300" fill="#cbd5e1">0</text>
    <rect x="170" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="205" y="300" fill="#cbd5e1">1</text>
    <rect x="250" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="285" y="300" fill="#cbd5e1">2</text>
    <rect x="330" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="365" y="300" fill="#cbd5e1">3</text>
    <rect x="410" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="445" y="300" fill="#cbd5e1">4</text>
    <rect x="490" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="525" y="300" fill="#86efac">5</text>
    <rect x="570" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="605" y="300" fill="#cbd5e1">6</text>
    <rect x="650" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="685" y="300" fill="#cbd5e1">7</text>
    <rect x="730" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="765" y="300" fill="#cbd5e1">8</text>
    <rect x="810" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="845" y="300" fill="#cbd5e1">9</text>
    <rect x="890" y="270" width="70" height="48" rx="8" fill="#111827" stroke="#4b5563"/>
    <text x="925" y="300" fill="#cbd5e1">10</text>
    <rect x="970" y="270" width="90" height="48" rx="8" fill="#064e3b" stroke="#10b981"/>
    <text x="1015" y="300" fill="#d1fae5">11</text>
  </g>

  <path d="M 525 335 C 650 390, 850 390, 1015 335" fill="none" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#60a5fa" />
    </marker>
  </defs>
  <text x="670" y="430" fill="#bfdbfe" font-size="24" font-family="Inter,Arial,sans-serif">Use coin 5: dp[11] can come from dp[6] + 1</text>
  <text x="56" y="580" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
