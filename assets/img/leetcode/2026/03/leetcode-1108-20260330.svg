<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1108 defanging IP address diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="110" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1108: Defanging an IP Address</text>
  <rect x="60" y="170" width="1080" height="380" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="250" fill="#93c5fd" font-size="32" font-family="JetBrains Mono,Consolas,monospace">Input : 192.168.0.1</text>
  <text x="100" y="315" fill="#86efac" font-size="32" font-family="JetBrains Mono,Consolas,monospace">Rule  : '.' → '[.]'</text>
  <text x="100" y="380" fill="#fcd34d" font-size="32" font-family="JetBrains Mono,Consolas,monospace">Output: 192[.]168[.]0[.]1</text>
  <text x="100" y="455" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Single pass string builder, O(n) time</text>
  <text x="100" y="510" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
