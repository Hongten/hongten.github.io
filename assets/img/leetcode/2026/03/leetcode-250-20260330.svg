<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 250 Count Univalue Subtrees diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="96" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 250 · Count Univalue Subtrees</text>
  <text x="56" y="142" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Postorder DFS: validate left + right, then compare child values</text>

  <g transform="translate(90,210)">
    <circle cx="300" cy="40" r="28" fill="#1f2937" stroke="#86efac" stroke-width="2"/>
    <text x="300" y="48" text-anchor="middle" fill="#e5e7eb" font-size="24" font-family="monospace">5</text>

    <circle cx="190" cy="140" r="28" fill="#1f2937" stroke="#86efac" stroke-width="2"/>
    <text x="190" y="148" text-anchor="middle" fill="#e5e7eb" font-size="24" font-family="monospace">1</text>

    <circle cx="410" cy="140" r="28" fill="#1f2937" stroke="#86efac" stroke-width="2"/>
    <text x="410" y="148" text-anchor="middle" fill="#e5e7eb" font-size="24" font-family="monospace">5</text>

    <circle cx="470" cy="240" r="28" fill="#1f2937" stroke="#86efac" stroke-width="2"/>
    <text x="470" y="248" text-anchor="middle" fill="#e5e7eb" font-size="24" font-family="monospace">5</text>

    <line x1="280" y1="62" x2="208" y2="120" stroke="#60a5fa" stroke-width="3"/>
    <line x1="320" y1="62" x2="392" y2="120" stroke="#60a5fa" stroke-width="3"/>
    <line x1="430" y1="162" x2="452" y2="218" stroke="#60a5fa" stroke-width="3"/>

    <text x="640" y="38" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Univalue check at node:</text>
    <text x="640" y="88" fill="#86efac" font-size="24" font-family="monospace">leftUni &amp;&amp; rightUni</text>
    <text x="640" y="124" fill="#86efac" font-size="24" font-family="monospace">(left==null || left.val==node.val)</text>
    <text x="640" y="160" fill="#86efac" font-size="24" font-family="monospace">(right==null || right.val==node.val)</text>
    <text x="640" y="220" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">If true: count++</text>
  </g>

  <text x="56" y="592" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文后置</text>
</svg>
