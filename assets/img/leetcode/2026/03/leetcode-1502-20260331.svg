<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1502 arithmetic progression check diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1502 · Arithmetic Progression Check</text>
  <rect x="60" y="150" width="1080" height="420" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="210" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Sort first:</text>
  <text x="250" y="210" fill="#f8fafc" font-size="30" font-family="JetBrains Mono,Consolas,monospace">[3, 5, 1] → [1, 3, 5]</text>

  <text x="90" y="280" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Common difference:</text>
  <text x="390" y="280" fill="#86efac" font-size="30" font-family="JetBrains Mono,Consolas,monospace">d = 3 - 1 = 2</text>

  <line x1="210" y1="360" x2="360" y2="360" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="430" y1="360" x2="580" y2="360" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#38bdf8" />
    </marker>
  </defs>

  <rect x="120" y="320" width="90" height="80" rx="10" fill="#0b1220" stroke="#475569"/>
  <rect x="340" y="320" width="90" height="80" rx="10" fill="#0b1220" stroke="#475569"/>
  <rect x="560" y="320" width="90" height="80" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="158" y="370" fill="#f8fafc" font-size="34" font-family="JetBrains Mono,Consolas,monospace">1</text>
  <text x="378" y="370" fill="#f8fafc" font-size="34" font-family="JetBrains Mono,Consolas,monospace">3</text>
  <text x="598" y="370" fill="#f8fafc" font-size="34" font-family="JetBrains Mono,Consolas,monospace">5</text>

  <text x="90" y="470" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">Verify every adjacent gap equals d. If all match → true, else false.</text>
  <text x="90" y="530" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
