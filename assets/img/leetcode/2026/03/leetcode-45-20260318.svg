<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="LeetCode 45 greedy jump range expansion">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 40px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .cell{fill:#111827;stroke:#60a5fa;stroke-width:2}
      .idx{font:500 18px monospace;fill:#93c5fd}
      .val{font:700 30px monospace;fill:#f8fafc}
      .note{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .jump{stroke:#f59e0b;stroke-width:5;fill:none;marker-end:url(#arrow)}
      .range{fill:#22d3ee22;stroke:#22d3ee;stroke-width:2;stroke-dasharray:8 6}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 45 · Jump Game II</text>
  <text x="60" y="120" class="sub">Greedy: finish current range, then jump to farthest next reach</text>

  <rect x="80" y="210" width="980" height="220" rx="18" class="range"/>

  <g transform="translate(120,250)">
    <g>
      <rect class="cell" x="0" y="0" width="110" height="120" rx="12"/>
      <text class="idx" x="50" y="25">0</text><text class="val" x="50" y="78">2</text>
    </g>
    <g transform="translate(130,0)">
      <rect class="cell" x="0" y="0" width="110" height="120" rx="12"/>
      <text class="idx" x="50" y="25">1</text><text class="val" x="50" y="78">3</text>
    </g>
    <g transform="translate(260,0)">
      <rect class="cell" x="0" y="0" width="110" height="120" rx="12"/>
      <text class="idx" x="50" y="25">2</text><text class="val" x="50" y="78">1</text>
    </g>
    <g transform="translate(390,0)">
      <rect class="cell" x="0" y="0" width="110" height="120" rx="12"/>
      <text class="idx" x="50" y="25">3</text><text class="val" x="50" y="78">1</text>
    </g>
    <g transform="translate(520,0)">
      <rect class="cell" x="0" y="0" width="110" height="120" rx="12"/>
      <text class="idx" x="50" y="25">4</text><text class="val" x="50" y="78">4</text>
    </g>
  </g>

  <path class="jump" d="M175 470 C210 540, 320 540, 375 470"/>
  <path class="jump" d="M375 470 C460 560, 640 560, 825 470"/>

  <text x="140" y="600" class="note">Example: [2,3,1,1,4]  →  min jumps = 2</text>
  <text x="140" y="635" class="note">Layer 1 range: [0..0], farthest = 2; Layer 2 range: [1..2], farthest = 4</text>
</svg>
