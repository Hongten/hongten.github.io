<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3163 String Compression III chunking diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#eaf2ff}
      .m{font-family:JetBrains Mono,Consolas,monospace;fill:#9fe7ff}
      .box{fill:#13233f;stroke:#5dc8ff;stroke-width:2;rx:14}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="84" class="t" font-size="44" font-weight="700">LeetCode 3163 · String Compression III</text>
  <text x="60" y="126" class="t" font-size="26">Greedy run-length chunking with max block size = 9</text>

  <rect x="60" y="180" width="1080" height="88" class="box"/>
  <text x="88" y="235" class="m" font-size="34">word = aaaaaaaaaaaaabbccc</text>

  <rect x="60" y="300" width="330" height="110" class="box"/>
  <text x="86" y="347" class="t" font-size="24">run: 13 × 'a'</text>
  <text x="86" y="382" class="m" font-size="34">9a + 4a</text>

  <rect x="435" y="300" width="330" height="110" class="box"/>
  <text x="461" y="347" class="t" font-size="24">run: 2 × 'b'</text>
  <text x="461" y="382" class="m" font-size="34">2b</text>

  <rect x="810" y="300" width="330" height="110" class="box"/>
  <text x="836" y="347" class="t" font-size="24">run: 3 × 'c'</text>
  <text x="836" y="382" class="m" font-size="34">3c</text>

  <text x="60" y="500" class="t" font-size="28">compressed = </text>
  <text x="300" y="500" class="m" font-size="40">9a4a2b3c</text>
  <text x="60" y="560" class="t" font-size="24">Rule: each block is [1..9] + character, never 10+ in one block.</text>
</svg>
