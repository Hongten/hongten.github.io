<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 746 rolling DP transition diagram"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#93c5fd" /></marker></defs><rect width="1200" height="630" fill="url(#bg)"/><text x="54" y="84" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 746 · Min Cost Climbing Stairs</text><text x="54" y="128" fill="#94a3b8" font-size="26" font-family="Inter,Arial,sans-serif">Rolling DP: dp[i] = min(dp[i-1]+cost[i-1], dp[i-2]+cost[i-2])</text><rect x="70" y="190" width="230" height="90" rx="12" fill="#1d4ed8"/><text x="95" y="245" fill="#eff6ff" font-size="30" font-family="Inter,Arial,sans-serif">prev2 = dp[i-2]</text><rect x="360" y="190" width="230" height="90" rx="12" fill="#2563eb"/><text x="385" y="245" fill="#eff6ff" font-size="30" font-family="Inter,Arial,sans-serif">prev1 = dp[i-1]</text><rect x="650" y="190" width="480" height="90" rx="12" fill="#0f766e"/><text x="680" y="245" fill="#ecfeff" font-size="28" font-family="Inter,Arial,sans-serif">cur = min(prev1 + cost[i-1], prev2 + cost[i-2])</text><line x1="300" y1="235" x2="360" y2="235" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/><line x1="590" y1="235" x2="650" y2="235" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/><rect x="180" y="360" width="840" height="180" rx="16" fill="#111827" stroke="#334155"/><text x="220" y="420" fill="#a7f3d0" font-size="30" font-family="Inter,Arial,sans-serif">State shift after each i:</text><text x="220" y="470" fill="#e5e7eb" font-size="34" font-family="JetBrains Mono,monospace">prev2 = prev1;   prev1 = cur;</text><text x="220" y="515" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Answer = dp[n] = prev1 (reach top position n)</text></svg>