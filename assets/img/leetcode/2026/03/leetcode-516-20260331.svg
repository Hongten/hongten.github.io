<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 516 interval DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="54" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 516 · Longest Palindromic Subsequence</text>
  <text x="54" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Interval DP: dp[i][j] over substring s[i..j]</text>

  <rect x="60" y="180" width="500" height="380" rx="18" fill="#1f2937" stroke="#334155"/>
  <text x="88" y="225" fill="#e5e7eb" font-size="24" font-family="monospace">if s[i] == s[j]: dp[i][j] = dp[i+1][j-1] + 2</text>
  <text x="88" y="265" fill="#e5e7eb" font-size="24" font-family="monospace">else: dp[i][j] = max(dp[i+1][j], dp[i][j-1])</text>
  <text x="88" y="305" fill="#86efac" font-size="24" font-family="monospace">base: dp[i][i] = 1</text>

  <rect x="640" y="180" width="500" height="380" rx="18" fill="#111827" stroke="#374151"/>
  <g font-family="monospace" font-size="28" fill="#d1d5db">
    <text x="680" y="250">      j→</text>
    <text x="680" y="295">i  0 1 2 3 4</text>
    <text x="680" y="340">0 [1 1 1 3 4]</text>
    <text x="680" y="380">1 [0 1 1 3 3]</text>
    <text x="680" y="420">2 [0 0 1 1 1]</text>
    <text x="680" y="460">3 [0 0 0 1 1]</text>
    <text x="680" y="500">4 [0 0 0 0 1]</text>
  </g>
  <text x="680" y="545" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Fill from short intervals to long intervals</text>
</svg>
