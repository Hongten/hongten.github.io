<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 127 Word Ladder BFS wildcard diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#131a2f"/>
    </linearGradient>
    <style>
      .title { fill: #e5e7eb; font: 700 46px 'Inter', Arial, sans-serif; }
      .sub { fill: #93c5fd; font: 600 28px 'Inter', Arial, sans-serif; }
      .node { fill: #1f2937; stroke: #60a5fa; stroke-width: 2.5; rx: 14; }
      .word { fill: #f9fafb; font: 700 30px 'JetBrains Mono', monospace; }
      .hint { fill: #86efac; font: 500 24px 'Inter', Arial, sans-serif; }
      .edge { stroke: #94a3b8; stroke-width: 4; marker-end: url(#arrow); }
      .bucket { fill: #111827; stroke: #34d399; stroke-width: 2; rx: 10; }
      .bucketText { fill: #34d399; font: 600 24px 'JetBrains Mono', monospace; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="86" class="title">LeetCode 127 · Word Ladder</text>
  <text x="56" y="126" class="sub">BFS shortest path with wildcard pattern buckets</text>

  <line x1="210" y1="300" x2="420" y2="300" class="edge"/>
  <line x1="510" y1="300" x2="720" y2="300" class="edge"/>
  <line x1="810" y1="300" x2="1020" y2="300" class="edge"/>

  <rect x="90" y="250" width="140" height="90" class="node"/>
  <text x="130" y="307" class="word">hit</text>

  <rect x="390" y="250" width="140" height="90" class="node"/>
  <text x="430" y="307" class="word">hot</text>

  <rect x="690" y="250" width="140" height="90" class="node"/>
  <text x="730" y="307" class="word">dot</text>

  <rect x="990" y="250" width="140" height="90" class="node"/>
  <text x="1030" y="307" class="word">dog</text>

  <rect x="360" y="400" width="220" height="62" class="bucket"/>
  <text x="398" y="440" class="bucketText">*ot → hot, dot</text>

  <rect x="620" y="400" width="220" height="62" class="bucket"/>
  <text x="658" y="440" class="bucketText">do* → dot, dog</text>

  <text x="56" y="560" class="hint">Expand layer by layer; first reach to endWord gives shortest ladder length.</text>
  <text x="56" y="596" class="hint">Author: Tom🦞</text>
</svg>
