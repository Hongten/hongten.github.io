<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 48 rotate image layer-by-layer four-way swap diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a33"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <style>
      .title{font:700 36px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb}
      .sub{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .cell{fill:#1f2937;stroke:#94a3b8;stroke-width:2}
      .txt{font:700 22px 'Consolas',monospace;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .hi{fill:#334155;stroke:#f59e0b;stroke-width:4}
      .arrow{stroke:#60a5fa;stroke-width:5;fill:none;marker-end:url(#arrow)}
      .cap{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="64" class="title">LeetCode 48 · Rotate Image</text>
  <text x="60" y="98" class="sub">Layer-by-layer 4-way swap: top ← left ← bottom ← right ← top</text>

  <g transform="translate(120,160)">
    <rect class="hi" x="0" y="0" width="100" height="100"/><text class="txt" x="50" y="50">a</text>
    <rect class="cell" x="100" y="0" width="100" height="100"/><text class="txt" x="150" y="50">b</text>
    <rect class="cell" x="200" y="0" width="100" height="100"/><text class="txt" x="250" y="50">c</text>
    <rect class="hi" x="300" y="0" width="100" height="100"/><text class="txt" x="350" y="50">d</text>

    <rect class="cell" x="0" y="100" width="100" height="100"/><text class="txt" x="50" y="150">e</text>
    <rect class="cell" x="100" y="100" width="100" height="100"/><text class="txt" x="150" y="150">f</text>
    <rect class="cell" x="200" y="100" width="100" height="100"/><text class="txt" x="250" y="150">g</text>
    <rect class="cell" x="300" y="100" width="100" height="100"/><text class="txt" x="350" y="150">h</text>

    <rect class="cell" x="0" y="200" width="100" height="100"/><text class="txt" x="50" y="250">i</text>
    <rect class="cell" x="100" y="200" width="100" height="100"/><text class="txt" x="150" y="250">j</text>
    <rect class="cell" x="200" y="200" width="100" height="100"/><text class="txt" x="250" y="250">k</text>
    <rect class="cell" x="300" y="200" width="100" height="100"/><text class="txt" x="350" y="250">l</text>

    <rect class="hi" x="0" y="300" width="100" height="100"/><text class="txt" x="50" y="350">m</text>
    <rect class="cell" x="100" y="300" width="100" height="100"/><text class="txt" x="150" y="350">n</text>
    <rect class="cell" x="200" y="300" width="100" height="100"/><text class="txt" x="250" y="350">o</text>
    <rect class="hi" x="300" y="300" width="100" height="100"/><text class="txt" x="350" y="350">p</text>

    <path class="arrow" d="M50,50 C50,-20 350,-20 350,50"/>
    <path class="arrow" d="M350,50 C430,50 430,350 350,350"/>
    <path class="arrow" d="M350,350 C350,430 50,430 50,350"/>
    <path class="arrow" d="M50,350 C-20,350 -20,50 50,50"/>
  </g>

  <text x="620" y="230" class="cap">(first ring, one offset i)</text>
  <text x="620" y="275" class="sub">(top, left+ i) ← (bottom - i, left)</text>
  <text x="620" y="310" class="sub">(bottom, right - i) ← (right - i, right)</text>
  <text x="620" y="345" class="sub">Use temp to preserve top value</text>
  <text x="620" y="405" class="sub">Repeat for each layer: layer = 0 .. n/2-1</text>
</svg>