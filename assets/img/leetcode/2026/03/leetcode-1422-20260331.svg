<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1422 split score diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e6edf3" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1422 — Maximum Score After Splitting a String</text>
  <text x="60" y="140" fill="#9fb3c8" font-size="28" font-family="Arial, sans-serif">score = zeros(left) + ones(right)</text>

  <rect x="80" y="210" width="1040" height="120" rx="20" fill="#111a2b" stroke="#32507a" stroke-width="2"/>
  <text x="130" y="285" fill="#7ee787" font-size="44" font-family="Courier New, monospace">0 1 1 1 | 0 0 1 1</text>
  <line x1="560" y1="220" x2="560" y2="320" stroke="#ffd166" stroke-width="6"/>
  <text x="585" y="268" fill="#ffd166" font-size="26" font-family="Arial, sans-serif">split</text>
  <text x="585" y="298" fill="#ffd166" font-size="22" font-family="Arial, sans-serif">i = 3</text>

  <rect x="120" y="390" width="300" height="130" rx="16" fill="#143d2b"/>
  <text x="145" y="445" fill="#b6f0c5" font-size="28" font-family="Arial, sans-serif">leftZeros = 1</text>
  <text x="145" y="485" fill="#b6f0c5" font-size="20" font-family="Arial, sans-serif">count '0' in left part</text>

  <rect x="460" y="390" width="300" height="130" rx="16" fill="#3b1f4f"/>
  <text x="485" y="445" fill="#e5c7ff" font-size="28" font-family="Arial, sans-serif">rightOnes = 2</text>
  <text x="485" y="485" fill="#e5c7ff" font-size="20" font-family="Arial, sans-serif">count '1' in right part</text>

  <rect x="800" y="390" width="280" height="130" rx="16" fill="#4a3418"/>
  <text x="845" y="445" fill="#ffd89e" font-size="30" font-family="Arial, sans-serif" font-weight="700">score = 3</text>
  <text x="845" y="485" fill="#ffd89e" font-size="20" font-family="Arial, sans-serif">maximize over all i</text>
</svg>
