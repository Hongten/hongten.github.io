<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{{fill:#e2e8f0;font-family:Arial,sans-serif}}
      .m{{fill:#38bdf8;font-family:Arial,sans-serif;font-weight:700}}
      .b{{fill:#94a3b8;font-family:Consolas,monospace}}
      .ok{{fill:#22c55e;font-family:Consolas,monospace}}
      .no{{fill:#f97316;font-family:Consolas,monospace}}
      .box{{fill:#0b1220;stroke:#334155;stroke-width:2;rx:14}}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="m" font-size="46">LeetCode 342 · Power of Four</text>
  <text x="60" y="132" class="t" font-size="28">Power of Two + Odd-Bit Mask (0x55555555)</text>

  <rect x="60" y="170" width="1080" height="170" class="box"/>
  <text x="90" y="220" class="b" font-size="28">n = 16  ->  binary: 0001 0000</text>
  <text x="90" y="265" class="b" font-size="28">(n &amp; (n-1)) == 0  ✓  (single set bit)</text>
  <text x="90" y="310" class="b" font-size="28">(n &amp; 0x55555555) != 0  ✓  (bit at position 4)</text>

  <rect x="60" y="370" width="520" height="190" class="box"/>
  <text x="90" y="420" class="ok" font-size="30">Power of Four examples</text>
  <text x="90" y="465" class="b" font-size="26">1   = 000...0001</text>
  <text x="90" y="500" class="b" font-size="26">4   = 000...0100</text>
  <text x="90" y="535" class="b" font-size="26">16  = 000..10000</text>

  <rect x="620" y="370" width="520" height="190" class="box"/>
  <text x="650" y="420" class="no" font-size="30">Not power of four</text>
  <text x="650" y="465" class="b" font-size="26">2   = 000...0010  (2^1)</text>
  <text x="650" y="500" class="b" font-size="26">8   = 000...1000  (2^3)</text>
  <text x="650" y="535" class="b" font-size="26">32  = 00..100000  (2^5)</text>
</svg>
