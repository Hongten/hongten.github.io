<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 67 add binary carry propagation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 67 · Add Binary</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Two-pointer carry simulation</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#111827" stroke="#374151"/>
  <text x="100" y="250" fill="#f9fafb" font-size="30" font-family="monospace">a:      1 0 1 1</text>
  <text x="100" y="295" fill="#f9fafb" font-size="30" font-family="monospace">b:    + 1 1 0 1</text>
  <line x1="100" y1="320" x2="610" y2="320" stroke="#6b7280" stroke-width="3"/>
  <text x="100" y="365" fill="#86efac" font-size="30" font-family="monospace">sum: 1 1 0 0 0</text>

  <text x="100" y="430" fill="#c4b5fd" font-size="26" font-family="Inter,Arial,sans-serif">Carry flows right → left; append bit = (x+y+carry)%2</text>
  <text x="100" y="470" fill="#c4b5fd" font-size="26" font-family="Inter,Arial,sans-serif">New carry = (x+y+carry)/2, reverse output at end</text>
  <text x="100" y="520" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
