<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-label="Floyd cycle detection with fast and slow pointers">
  <defs>
    <style>
      .bg{fill:#0f172a}.box{fill:#1e293b;stroke:#38bdf8;stroke-width:2}.txt{fill:#e2e8f0;font-family:Arial,sans-serif;font-size:18px}.small{fill:#94a3b8;font-size:14px}.arrow{stroke:#94a3b8;stroke-width:2;marker-end:url(#m)}.slow{fill:#22c55e}.fast{fill:#f59e0b}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="360" rx="16"/>
  <text x="32" y="42" class="txt">LeetCode 141 · Linked List Cycle · Floyd Fast/Slow</text>
  <text x="32" y="68" class="small">If fast reaches null: no cycle · If fast meets slow: cycle exists</text>

  <rect class="box" x="70" y="140" width="90" height="54" rx="10"/><text class="txt" x="108" y="173">1</text>
  <rect class="box" x="220" y="140" width="90" height="54" rx="10"/><text class="txt" x="258" y="173">2</text>
  <rect class="box" x="370" y="140" width="90" height="54" rx="10"/><text class="txt" x="408" y="173">3</text>
  <rect class="box" x="520" y="140" width="90" height="54" rx="10"/><text class="txt" x="558" y="173">4</text>
  <rect class="box" x="670" y="140" width="90" height="54" rx="10"/><text class="txt" x="708" y="173">5</text>

  <line class="arrow" x1="160" y1="167" x2="220" y2="167"/>
  <line class="arrow" x1="310" y1="167" x2="370" y2="167"/>
  <line class="arrow" x1="460" y1="167" x2="520" y2="167"/>
  <line class="arrow" x1="610" y1="167" x2="670" y2="167"/>
  <path class="arrow" d="M760 167 C840 167, 840 260, 600 260 C430 260, 360 240, 370 194"/>

  <circle class="slow" cx="565" cy="118" r="12"/>
  <text class="small" x="545" y="96">slow (+1)</text>

  <circle class="fast" cx="708" cy="112" r="12"/>
  <text class="small" x="688" y="90">fast (+2)</text>
</svg>
