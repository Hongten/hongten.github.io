<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 905 two-pointer parity partition">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 42px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .lbl{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 905 · Sort Array By Parity</text>
  <text x="60" y="130" class="sub">Two pointers swap misplaced odd/even values in-place</text>

  <rect x="80" y="230" width="1040" height="120" rx="18" fill="#e2e8f0"/>

  <rect x="110" y="255" width="120" height="70" rx="10" fill="#86efac"/>
  <text x="170" y="300" text-anchor="middle" class="txt">2</text>

  <rect x="245" y="255" width="120" height="70" rx="10" fill="#fca5a5"/>
  <text x="305" y="300" text-anchor="middle" class="txt">3</text>

  <rect x="380" y="255" width="120" height="70" rx="10" fill="#86efac"/>
  <text x="440" y="300" text-anchor="middle" class="txt">4</text>

  <rect x="515" y="255" width="120" height="70" rx="10" fill="#fca5a5"/>
  <text x="575" y="300" text-anchor="middle" class="txt">1</text>

  <rect x="650" y="255" width="120" height="70" rx="10" fill="#86efac"/>
  <text x="710" y="300" text-anchor="middle" class="txt">6</text>

  <rect x="785" y="255" width="120" height="70" rx="10" fill="#fca5a5"/>
  <text x="845" y="300" text-anchor="middle" class="txt">5</text>

  <rect x="920" y="255" width="120" height="70" rx="10" fill="#86efac"/>
  <text x="980" y="300" text-anchor="middle" class="txt">8</text>

  <text x="245" y="390" class="lbl">l → finds odd on left</text>
  <text x="760" y="390" class="lbl">r ← finds even on right</text>
  <text x="80" y="470" class="lbl">Invariant: [0..l-1] all even, [r+1..n-1] all odd</text>
  <text x="80" y="510" class="lbl">Swap nums[l] and nums[r], then shrink inward.</text>
</svg>
