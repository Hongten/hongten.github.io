<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="LeetCode 198 house robber dynamic programming diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:22px;font-weight:700}
      .s{font-size:18px;fill:#cbd5e1}
      .v{font-size:30px;font-weight:800;fill:#22d3ee}
      .n{fill:#334155;stroke:#64748b;stroke-width:2}
      .a{stroke:#f59e0b;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>

  <text x="48" y="58" class="t m">LeetCode 198 · House Robber · DP Transition</text>
  <text x="48" y="92" class="t s">nums = [2, 7, 9, 3, 1],  cur = max(prev1, prev2 + nums[i])</text>

  <g transform="translate(70,170)">
    <rect class="n" x="0" y="0" width="170" height="120" rx="14"/>
    <text x="20" y="42" class="t s">House 0</text>
    <text x="20" y="88" class="t v">2</text>

    <rect class="n" x="210" y="0" width="170" height="120" rx="14"/>
    <text x="230" y="42" class="t s">House 1</text>
    <text x="230" y="88" class="t v">7</text>

    <rect class="n" x="420" y="0" width="170" height="120" rx="14"/>
    <text x="440" y="42" class="t s">House 2</text>
    <text x="440" y="88" class="t v">9</text>

    <rect class="n" x="630" y="0" width="170" height="120" rx="14"/>
    <text x="650" y="42" class="t s">House 3</text>
    <text x="650" y="88" class="t v">3</text>

    <rect class="n" x="840" y="0" width="170" height="120" rx="14"/>
    <text x="860" y="42" class="t s">House 4</text>
    <text x="860" y="88" class="t v">1</text>

    <line class="a" x1="85" y1="130" x2="505" y2="190"/>
    <line class="a" x1="505" y1="130" x2="925" y2="190"/>
    <text x="330" y="215" class="t s">Pick non-adjacent houses: 2 + 9 + 1</text>
  </g>

  <g transform="translate(80,390)">
    <text x="0" y="0" class="t s">Rolling states:</text>
    <text x="170" y="0" class="t s">prev2 = best up to i-2</text>
    <text x="470" y="0" class="t s">prev1 = best up to i-1</text>
    <text x="760" y="0" class="t s">Answer = 12</text>
  </g>
</svg>
