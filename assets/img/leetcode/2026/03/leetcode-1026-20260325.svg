<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1026 path min max tracking diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2540"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#e5e7eb}
      .n{fill:#111827;stroke:#60a5fa;stroke-width:3}
      .e{stroke:#94a3b8;stroke-width:3}
      .p{stroke:#22c55e;stroke-width:5;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="75" class="t" font-size="42" font-weight="700">LeetCode 1026: Maximum Difference Between Node and Ancestor</text>
  <text x="50" y="118" class="t" font-size="26" fill="#93c5fd">DFS Path Min/Max Invariant: carry [min, max] from root to current node</text>

  <line x1="260" y1="220" x2="160" y2="330" class="e"/>
  <line x1="260" y1="220" x2="360" y2="330" class="e"/>
  <line x1="160" y1="330" x2="110" y2="440" class="e"/>
  <line x1="160" y1="330" x2="210" y2="440" class="e"/>
  <line x1="360" y1="330" x2="420" y2="440" class="e"/>

  <circle cx="260" cy="220" r="34" class="n"/><text x="247" y="229" class="t" font-size="24">8</text>
  <circle cx="160" cy="330" r="34" class="n"/><text x="147" y="339" class="t" font-size="24">3</text>
  <circle cx="360" cy="330" r="34" class="n"/><text x="347" y="339" class="t" font-size="24">10</text>
  <circle cx="110" cy="440" r="34" class="n"/><text x="97" y="449" class="t" font-size="24">1</text>
  <circle cx="210" cy="440" r="34" class="n"/><text x="197" y="449" class="t" font-size="24">6</text>
  <circle cx="420" cy="440" r="34" class="n"/><text x="407" y="449" class="t" font-size="24">14</text>

  <path d="M260 220 L160 330 L110 440" class="p" fill="none"/>

  <rect x="560" y="185" width="580" height="320" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="590" y="245" class="t" font-size="30" fill="#86efac">Example highlighted path: 8 → 3 → 1</text>
  <text x="590" y="295" class="t" font-size="28">pathMin = 1, pathMax = 8</text>
  <text x="590" y="345" class="t" font-size="28">At node 1: max(|1-1|, |1-8|) = 7</text>
  <text x="590" y="395" class="t" font-size="28">Update global answer while DFS traverses all paths</text>
  <text x="590" y="455" class="t" font-size="26" fill="#93c5fd">Time O(n), Space O(h), Author: Tom🦞</text>
</svg>
