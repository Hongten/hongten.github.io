<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .txt { font: 500 22px 'Consolas', 'Courier New', monospace; fill: #e5e7eb; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .muted { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="88" class="title">LeetCode 387 · First Unique Character in a String</text>
  <text x="60" y="128" class="sub">Frequency Count + First Pass Index Scan</text>

  <rect x="60" y="180" width="1080" height="390" rx="18" fill="#0b1220" stroke="#334155"/>

  <text x="90" y="235" class="label">s = "leetcode"</text>
  <text x="90" y="275" class="txt">Index: 0 1 2 3 4 5 6 7</text>
  <text x="90" y="310" class="txt">Chars: l e e t c o d e</text>

  <rect x="90" y="345" width="500" height="170" rx="12" fill="#111827" stroke="#475569"/>
  <text x="115" y="378" class="label">Frequency Map</text>
  <text x="115" y="414" class="txt">l:1, e:3, t:1, c:1, o:1, d:1</text>
  <text x="115" y="450" class="txt">First index with count==1 → 0</text>
  <text x="115" y="486" class="txt">Answer: 0</text>

  <rect x="630" y="345" width="480" height="170" rx="12" fill="#111827" stroke="#475569"/>
  <text x="655" y="378" class="label">Two-Pass Pattern</text>
  <text x="655" y="414" class="muted">Pass 1: build counts for all chars</text>
  <text x="655" y="446" class="muted">Pass 2: first count==1 index is answer</text>
  <text x="655" y="478" class="muted">No unique char → return -1</text>
</svg>
