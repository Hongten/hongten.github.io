<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 380 swap delete diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111a2e"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e6edf7}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#9fb3d1}
      .label{font:700 22px 'Segoe UI',Arial,sans-serif;fill:#d7e3f7}
      .mono{font:600 22px 'Consolas','Courier New',monospace;fill:#dff7e1}
      .note{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#ffd48a}
      .box{fill:#1c2740;stroke:#3a4a70;stroke-width:2;rx:12}
      .cell{fill:#22304f;stroke:#5a6f9d;stroke-width:2;rx:8}
      .arrow{stroke:#ffb86b;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#ffb86b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="85" class="title">LeetCode 380 · RandomizedSet</text>
  <text x="60" y="122" class="sub">Array + HashMap + Swap-with-Last Delete</text>

  <rect x="60" y="170" width="520" height="390" class="box"/>
  <text x="86" y="214" class="label">nums = [10, 40, 25, 99]</text>

  <rect x="86" y="240" width="98" height="68" class="cell"/><text x="121" y="282" class="mono">10</text>
  <rect x="198" y="240" width="98" height="68" class="cell"/><text x="233" y="282" class="mono">40</text>
  <rect x="310" y="240" width="98" height="68" class="cell"/><text x="345" y="282" class="mono">25</text>
  <rect x="422" y="240" width="98" height="68" class="cell"/><text x="457" y="282" class="mono">99</text>

  <text x="86" y="350" class="label">remove(40): i = 1, last = 99</text>
  <line x1="248" y1="320" x2="470" y2="320" class="arrow"/>
  <text x="86" y="392" class="note">Step 1: nums[1] = 99</text>
  <text x="86" y="428" class="note">Step 2: idx[99] = 1</text>
  <text x="86" y="464" class="note">Step 3: pop last, erase idx[40]</text>
  <text x="86" y="510" class="label">Result: nums = [10, 99, 25]</text>

  <rect x="640" y="170" width="500" height="390" class="box"/>
  <text x="666" y="214" class="label">idx map (value -&gt; index)</text>
  <text x="666" y="265" class="mono">10 -&gt; 0</text>
  <text x="666" y="305" class="mono">40 -&gt; 1   (delete)</text>
  <text x="666" y="345" class="mono">25 -&gt; 2</text>
  <text x="666" y="385" class="mono">99 -&gt; 3  →  1</text>

  <text x="666" y="455" class="note">getRandom(): pick uniform index in [0, n-1]</text>
  <text x="666" y="495" class="note">Array gives O(1) random access</text>
  <text x="666" y="535" class="note">Hash map gives O(1) membership/index lookup</text>
</svg>
