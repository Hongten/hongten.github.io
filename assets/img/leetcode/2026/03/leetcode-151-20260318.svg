<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 151 reverse words diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .box{fill:#0b1220;stroke:#38bdf8;stroke-width:2;rx:12}
      .txt{font:600 28px 'Consolas','Courier New',monospace;fill:#f8fafc}
      .cap{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .arr{stroke:#f59e0b;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 151: Reverse Words in a String</text>
  <text x="60" y="128" class="sub">Scan from right → pick word blocks → join with single spaces</text>

  <rect x="60" y="180" width="1080" height="120" class="box"/>
  <text x="90" y="252" class="txt">"  the   sky   is   blue  "</text>
  <text x="870" y="212" class="cap">Input (extra spaces)</text>

  <line x1="600" y1="320" x2="600" y2="390" class="arr"/>
  <text x="620" y="360" class="cap">reverse traversal</text>

  <rect x="60" y="410" width="1080" height="120" class="box"/>
  <text x="90" y="482" class="txt">"blue is sky the"</text>
  <text x="860" y="442" class="cap">Output (normalized)</text>
</svg>
