<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="LeetCode 1768 Merge Strings Alternately two-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#e5e7eb}
      .label{font:600 18px Arial,sans-serif;fill:#cbd5e1}
      .idx{font:500 13px Arial,sans-serif;fill:#94a3b8}
      .ch{font:700 24px 'Courier New',monospace;fill:#f8fafc}
      .small{font:500 14px Arial,sans-serif;fill:#93c5fd}
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="420" fill="url(#bg)"/>
  <text x="40" y="52" class="title">LeetCode 1768 · Merge Strings Alternately</text>
  <text x="40" y="78" class="small">Take char from word1, then word2, repeat; append leftovers.</text>

  <text x="40" y="140" class="label">word1 = "abcde"</text>
  <g transform="translate(240,106)">
    <rect x="0" y="0" width="70" height="54" rx="10" fill="#1f2937" stroke="#334155"/><text x="35" y="34" text-anchor="middle" class="ch">a</text><text x="35" y="71" text-anchor="middle" class="idx">0</text>
    <rect x="82" y="0" width="70" height="54" rx="10" fill="#1f2937" stroke="#334155"/><text x="117" y="34" text-anchor="middle" class="ch">b</text><text x="117" y="71" text-anchor="middle" class="idx">1</text>
    <rect x="164" y="0" width="70" height="54" rx="10" fill="#0f766e" stroke="#22d3ee"/><text x="199" y="34" text-anchor="middle" class="ch">c</text><text x="199" y="71" text-anchor="middle" class="idx">2</text>
    <rect x="246" y="0" width="70" height="54" rx="10" fill="#1f2937" stroke="#334155"/><text x="281" y="34" text-anchor="middle" class="ch">d</text><text x="281" y="71" text-anchor="middle" class="idx">3</text>
    <rect x="328" y="0" width="70" height="54" rx="10" fill="#1f2937" stroke="#334155"/><text x="363" y="34" text-anchor="middle" class="ch">e</text><text x="363" y="71" text-anchor="middle" class="idx">4</text>
  </g>
  <text x="438" y="101" class="small">i = 2</text>

  <text x="40" y="242" class="label">word2 = "pqr"</text>
  <g transform="translate(240,208)">
    <rect x="0" y="0" width="70" height="54" rx="10" fill="#1f2937" stroke="#334155"/><text x="35" y="34" text-anchor="middle" class="ch">p</text><text x="35" y="71" text-anchor="middle" class="idx">0</text>
    <rect x="82" y="0" width="70" height="54" rx="10" fill="#1f2937" stroke="#334155"/><text x="117" y="34" text-anchor="middle" class="ch">q</text><text x="117" y="71" text-anchor="middle" class="idx">1</text>
    <rect x="164" y="0" width="70" height="54" rx="10" fill="#6d28d9" stroke="#a78bfa"/><text x="199" y="34" text-anchor="middle" class="ch">r</text><text x="199" y="71" text-anchor="middle" class="idx">2</text>
  </g>
  <text x="438" y="203" class="small">j = 2</text>

  <text x="40" y="346" class="label">output = "apbqcrde"</text>
  <g transform="translate(240,312)">
    <rect x="0" y="0" width="620" height="56" rx="12" fill="#111827" stroke="#374151"/>
    <text x="20" y="35" class="ch">a p b q c r d e</text>
  </g>

  <line x1="560" y1="160" x2="560" y2="205" stroke="#22d3ee" stroke-width="3"/>
  <line x1="560" y1="262" x2="560" y2="307" stroke="#a78bfa" stroke-width="3"/>
</svg>
