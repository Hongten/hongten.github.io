<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 72 Edit Distance DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="80" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 72 · Edit Distance</text>
  <text x="48" y="120" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">dp[i][j] = min ops to convert word1[0..i) → word2[0..j)</text>

  <rect x="48" y="160" width="700" height="420" rx="18" fill="#111827" stroke="#374151"/>
  <text x="80" y="205" fill="#d1d5db" font-size="22" font-family="monospace">Base: dp[i][0] = i, dp[0][j] = j</text>
  <text x="80" y="250" fill="#86efac" font-size="24" font-family="monospace">if w1[i-1] == w2[j-1]: dp[i][j] = dp[i-1][j-1]</text>
  <text x="80" y="300" fill="#fca5a5" font-size="24" font-family="monospace">else: 1 + min(</text>
  <text x="120" y="340" fill="#fde68a" font-size="24" font-family="monospace">dp[i][j-1],   // insert</text>
  <text x="120" y="380" fill="#fde68a" font-size="24" font-family="monospace">dp[i-1][j],   // delete</text>
  <text x="120" y="420" fill="#fde68a" font-size="24" font-family="monospace">dp[i-1][j-1]  // replace</text>
  <text x="80" y="460" fill="#fca5a5" font-size="24" font-family="monospace">)</text>
  <text x="80" y="515" fill="#c4b5fd" font-size="22" font-family="Inter,Arial,sans-serif">Time O(mn) · Space O(mn)</text>

  <rect x="780" y="160" width="372" height="420" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="810" y="220" fill="#e2e8f0" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">State Transition</text>
  <circle cx="900" cy="300" r="44" fill="#334155"/>
  <text x="870" y="308" fill="#f8fafc" font-size="24" font-family="monospace">i,j</text>
  <line x1="900" y1="252" x2="900" y2="210" stroke="#fbbf24" stroke-width="4"/>
  <line x1="855" y1="300" x2="810" y2="300" stroke="#34d399" stroke-width="4"/>
  <line x1="865" y1="265" x2="830" y2="230" stroke="#60a5fa" stroke-width="4"/>
  <text x="915" y="205" fill="#fbbf24" font-size="20" font-family="Inter,Arial,sans-serif">delete</text>
  <text x="790" y="292" fill="#34d399" font-size="20" font-family="Inter,Arial,sans-serif">insert</text>
  <text x="835" y="220" fill="#60a5fa" font-size="20" font-family="Inter,Arial,sans-serif">replace/match</text>
  <text x="810" y="540" fill="#e5e7eb" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
