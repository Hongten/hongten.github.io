<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="LeetCode 2373 3x3 local maximum matrix diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .label { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .num { font: 700 28px 'Consolas', 'Courier New', monospace; fill: #0f172a; }
      .outnum { font: 700 30px 'Consolas', 'Courier New', monospace; fill: #7c2d12; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="url(#bg)"/>
  <text x="60" y="72" class="title">LeetCode 2373 · Largest Local Values in a Matrix</text>
  <text x="60" y="112" class="sub">Each output cell = max value in corresponding 3×3 window</text>

  <text x="100" y="170" class="label">Input grid (4×4)</text>
  <g transform="translate(100,200)">
    <rect x="0" y="0" width="320" height="320" fill="#e2e8f0" rx="16"/>
    <g stroke="#475569" stroke-width="2">
      <line x1="80" y1="0" x2="80" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/>
      <line x1="0" y1="80" x2="320" y2="80"/><line x1="0" y1="160" x2="320" y2="160"/><line x1="0" y1="240" x2="320" y2="240"/>
    </g>

    <g>
      <rect x="0" y="0" width="240" height="240" fill="#fef08a" fill-opacity="0.5"/>
      <rect x="80" y="80" width="240" height="240" fill="#86efac" fill-opacity="0.35"/>
    </g>

    <g class="num" text-anchor="middle" dominant-baseline="middle">
      <text x="40" y="40">9</text><text x="120" y="40">9</text><text x="200" y="40">8</text><text x="280" y="40">1</text>
      <text x="40" y="120">5</text><text x="120" y="120">6</text><text x="200" y="120">2</text><text x="280" y="120">6</text>
      <text x="40" y="200">8</text><text x="120" y="200">2</text><text x="200" y="200">6</text><text x="280" y="200">4</text>
      <text x="40" y="280">6</text><text x="120" y="280">2</text><text x="200" y="280">2</text><text x="280" y="280">2</text>
    </g>
  </g>

  <path d="M470 330 L620 330" stroke="#cbd5e1" stroke-width="6" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <text x="700" y="170" class="label">Output maxLocal (2×2)</text>
  <g transform="translate(700,260)">
    <rect x="0" y="0" width="240" height="240" fill="#ffedd5" rx="16"/>
    <g stroke="#9a3412" stroke-width="2">
      <line x1="120" y1="0" x2="120" y2="240"/>
      <line x1="0" y1="120" x2="240" y2="120"/>
    </g>
    <g class="outnum" text-anchor="middle" dominant-baseline="middle">
      <text x="60" y="60">9</text>
      <text x="180" y="60">9</text>
      <text x="60" y="180">8</text>
      <text x="180" y="180">6</text>
    </g>
  </g>

  <text x="60" y="640" class="sub">Windows shown: yellow at (0,0) → 9, green at (1,1) → 6</text>
</svg>
