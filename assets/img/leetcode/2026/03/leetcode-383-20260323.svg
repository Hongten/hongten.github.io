<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 383 frequency counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#f8fafc" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 383 · Ransom Note</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Arial, sans-serif">Frequency Counting with Early Exit</text>

  <rect x="60" y="180" width="500" height="360" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="90" y="225" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif">Build Supply from magazine</text>
  <text x="90" y="270" fill="#cbd5e1" font-size="20" font-family="monospace">magazine = "aabcc"</text>
  <text x="90" y="310" fill="#86efac" font-size="20" font-family="monospace">count[a]=2, count[b]=1, count[c]=2</text>

  <rect x="640" y="180" width="500" height="360" rx="18" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="670" y="225" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif">Consume Demand from ransomNote</text>
  <text x="670" y="270" fill="#cbd5e1" font-size="20" font-family="monospace">ransomNote = "abca"</text>
  <text x="670" y="310" fill="#fcd34d" font-size="20" font-family="monospace">a → b → c → a</text>
  <text x="670" y="350" fill="#86efac" font-size="20" font-family="monospace">all counts stay ≥ 0  ⇒ true</text>
  <text x="670" y="390" fill="#fca5a5" font-size="20" font-family="monospace">if any count &lt; 0  ⇒ false</text>

  <path d="M560 360 L620 360" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
</svg>
