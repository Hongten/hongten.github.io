<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 409 longest palindrome frequency parity diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2440"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e5ecff}
      .m{font-size:28px;font-weight:700}
      .s{font-size:22px;fill:#b8c4ea}
      .b{font-size:26px;font-weight:700}
      .n{font-size:22px;font-weight:600}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="86" class="t m">LeetCode 409 · Longest Palindrome</text>
  <text x="60" y="122" class="t s">Use all even pairs + at most one odd center</text>

  <rect x="70" y="180" width="1060" height="370" rx="20" fill="#111a30" stroke="#314066"/>

  <text x="110" y="245" class="t b">Counts:  a:4   b:3   c:5</text>
  <text x="110" y="290" class="t n">Even parts used: 4 + 2 + 4 = 10</text>
  <text x="110" y="335" class="t n">Odd exists (b or c) ⇒ place 1 center char</text>

  <rect x="110" y="375" width="980" height="120" rx="14" fill="#1d2b4d" stroke="#4b5f92"/>
  <text x="140" y="450" class="t b">Max palindrome length = 10 + 1 = 11</text>

  <text x="60" y="595" class="t s">Author: Tom🦞</text>
</svg>
