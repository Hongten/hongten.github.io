<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 28 KMP prefix fallback diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 28 · KMP Prefix Function</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Find the Index of the First Occurrence in a String</text>

  <rect x="60" y="180" width="1080" height="390" rx="16" fill="#1f2937" stroke="#334155"/>

  <text x="90" y="230" fill="#f8fafc" font-size="24" font-family="JetBrains Mono,Consolas,monospace">haystack:  a b a b a b c a b a b d</text>
  <text x="90" y="270" fill="#86efac" font-size="24" font-family="JetBrains Mono,Consolas,monospace">needle:      a b a b d</text>

  <line x1="320" y1="320" x2="480" y2="320" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="250" y="325" fill="#38bdf8" font-size="22" font-family="Inter,Arial,sans-serif">mismatch</text>

  <line x1="540" y1="320" x2="700" y2="320" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="500" y="355" fill="#fbbf24" font-size="22" font-family="Inter,Arial,sans-serif">j = lps[j-1]</text>

  <text x="90" y="410" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Prefix table (lps): [0, 0, 1, 2, 0]</text>
  <text x="90" y="460" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">No haystack backtracking → O(n + m)</text>
  <text x="90" y="510" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
