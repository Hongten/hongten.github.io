<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 138 copy list with random pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#fca5a5"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">LeetCode 138 · Copy List with Random Pointer</text>
  <text x="60" y="120" fill="#93c5fd" font-size="26" font-family="Arial, sans-serif">Interleave clone nodes, wire random, then split</text>

  <g font-family="Arial, sans-serif" font-size="24" fill="#0f172a" stroke="#bfdbfe" stroke-width="2">
    <rect x="90" y="190" rx="12" ry="12" width="120" height="70" fill="#dbeafe"/>
    <rect x="280" y="190" rx="12" ry="12" width="120" height="70" fill="#dbeafe"/>
    <rect x="470" y="190" rx="12" ry="12" width="120" height="70" fill="#dbeafe"/>
    <text x="140" y="234">A</text><text x="330" y="234">B</text><text x="520" y="234">C</text>

    <rect x="170" y="360" rx="12" ry="12" width="120" height="70" fill="#fecaca"/>
    <rect x="360" y="360" rx="12" ry="12" width="120" height="70" fill="#fecaca"/>
    <rect x="550" y="360" rx="12" ry="12" width="120" height="70" fill="#fecaca"/>
    <text x="214" y="404">A'</text><text x="404" y="404">B'</text><text x="594" y="404">C'</text>
  </g>

  <g stroke="#93c5fd" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="210" y1="225" x2="280" y2="225"/>
    <line x1="400" y1="225" x2="470" y2="225"/>
    <line x1="290" y1="395" x2="360" y2="395"/>
    <line x1="480" y1="395" x2="550" y2="395"/>
  </g>

  <g stroke="#fca5a5" stroke-width="4" fill="none" marker-end="url(#arrow2)">
    <path d="M150 190 C 100 110, 520 110, 520 190"/>
    <path d="M330 190 C 330 120, 140 300, 230 360"/>
    <path d="M520 190 C 650 120, 640 280, 610 360"/>
  </g>

  <text x="760" y="250" fill="#e2e8f0" font-size="28" font-family="Arial, sans-serif">Step 1: A→A'→B→B'→C→C'</text>
  <text x="760" y="305" fill="#e2e8f0" font-size="28" font-family="Arial, sans-serif">Step 2: clone.random = old.random.next</text>
  <text x="760" y="360" fill="#e2e8f0" font-size="28" font-family="Arial, sans-serif">Step 3: split into two lists</text>
  <text x="760" y="430" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif">Blue: next pointers · Red: random pointers</text>
</svg>
