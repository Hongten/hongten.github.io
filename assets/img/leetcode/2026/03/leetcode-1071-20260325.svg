<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1071 gcd of strings diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:32px;font-weight:700}
      .s{font-size:24px}
      .k{fill:#22d3ee;font-weight:700}
      .box{fill:#111827;stroke:#334155;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="t m">LeetCode 1071 · GCD of Strings</text>

  <rect x="60" y="130" width="1080" height="120" rx="16" class="box"/>
  <text x="90" y="180" class="t s">str1 = "ABCABCABC"</text>
  <text x="90" y="220" class="t s">str2 = "ABCABC"</text>

  <text x="60" y="300" class="t s">Check compatibility:</text>
  <text x="370" y="300" class="t s k">str1 + str2 == str2 + str1 ✓</text>

  <text x="60" y="360" class="t s">Length GCD: gcd(9, 6) = 3</text>
  <text x="60" y="420" class="t s">Answer = str1.substring(0, 3) = </text>
  <text x="540" y="420" class="t s k">"ABC"</text>

  <rect x="60" y="470" width="1080" height="100" rx="14" class="box"/>
  <text x="90" y="530" class="t s">Pattern: only when concatenations commute, gcd length gives the largest repeat base.</text>
</svg>
