<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3110 adjacent ASCII difference accumulation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}
      .m{font-size:32px;font-weight:700}
      .s{font-size:24px;fill:#cbd5e1}
      .n{font-size:34px;font-weight:700;fill:#38bdf8}
      .b{fill:#334155;stroke:#64748b;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 3110 · Score of a String</text>
  <text x="60" y="130" class="t s">Sum absolute ASCII differences of adjacent characters</text>

  <rect x="80" y="200" width="140" height="100" rx="14" class="b"/>
  <rect x="280" y="200" width="140" height="100" rx="14" class="b"/>
  <rect x="480" y="200" width="140" height="100" rx="14" class="b"/>
  <text x="145" y="260" text-anchor="middle" class="t n">h</text>
  <text x="345" y="260" text-anchor="middle" class="t n">e</text>
  <text x="545" y="260" text-anchor="middle" class="t n">l</text>

  <text x="230" y="250" class="t s">|104-101| = 3</text>
  <text x="430" y="250" class="t s">|101-108| = 7</text>

  <text x="80" y="390" class="t s">One pass: ans += abs(s[i] - s[i-1])</text>
  <text x="80" y="440" class="t m">Total score = 3 + 7 + ...</text>
  <text x="80" y="500" class="t s">Time O(n), Space O(1)</text>
</svg>
