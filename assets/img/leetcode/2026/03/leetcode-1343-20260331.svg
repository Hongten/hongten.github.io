<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1343 sliding window diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif; fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif; fill:#93c5fd}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif; fill:#e2e8f0}
      .small{font:500 20px 'Segoe UI',Arial,sans-serif; fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 1343 · Fixed-Size Sliding Window</text>
  <text x="60" y="130" class="sub">Count windows where sum &gt;= k × threshold</text>

  <g transform="translate(70,210)">
    <rect x="0" y="0" width="120" height="90" rx="12" fill="#1f2937" stroke="#475569"/>
    <rect x="130" y="0" width="120" height="90" rx="12" fill="#1f2937" stroke="#475569"/>
    <rect x="260" y="0" width="120" height="90" rx="12" fill="#1f2937" stroke="#475569"/>
    <rect x="390" y="0" width="120" height="90" rx="12" fill="#1f2937" stroke="#475569"/>
    <rect x="520" y="0" width="120" height="90" rx="12" fill="#1f2937" stroke="#475569"/>
    <rect x="650" y="0" width="120" height="90" rx="12" fill="#1f2937" stroke="#475569"/>
    <rect x="780" y="0" width="120" height="90" rx="12" fill="#1f2937" stroke="#475569"/>

    <rect x="130" y="-10" width="510" height="110" rx="14" fill="none" stroke="#38bdf8" stroke-width="5"/>

    <text x="50" y="55" class="txt">2</text>
    <text x="180" y="55" class="txt">1</text>
    <text x="310" y="55" class="txt">5</text>
    <text x="440" y="55" class="txt">3</text>
    <text x="570" y="55" class="txt">9</text>
    <text x="700" y="55" class="txt">2</text>
    <text x="830" y="55" class="txt">8</text>

    <text x="140" y="145" class="small">window size = k</text>
    <text x="400" y="145" class="small">sum += in - out</text>
  </g>

  <text x="70" y="500" class="small">Compare with target directly: windowSum ≥ k × threshold</text>
  <text x="70" y="535" class="small">One pass, O(n) time, O(1) extra space</text>
</svg>
