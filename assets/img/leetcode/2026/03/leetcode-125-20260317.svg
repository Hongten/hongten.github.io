    <text x="566" y="76" class="t c">n</text>
    <text x="696" y="76" class="t c">:</text>
    <text x="825" y="76" class="t c">a</text>
    <text x="956" y="76" class="t c">M</text>

    <path d="M 60 150 C 60 210, 975 210, 975 150" fill="none" stroke="#22d3ee" stroke-width="6"/>
    <polygon points="975,150 955,140 960,160" fill="#22d3ee"/>
