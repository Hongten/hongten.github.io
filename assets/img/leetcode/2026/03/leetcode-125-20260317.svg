  <g transform="translate(90,220)">
    <rect class="box" x="0" y="0" width="120" height="120"/>
    <rect class="box" x="130" y="0" width="120" height="120"/>
    <rect class="box" x="260" y="0" width="120" height="120"/>
    <rect class="box" x="390" y="0" width="120" height="120"/>
    <rect class="box" x="520" y="0" width="120" height="120"/>
    <rect class="box" x="650" y="0" width="120" height="120"/>
    <rect class="box" x="780" y="0" width="120" height="120"/>
    <rect class="box" x="910" y="0" width="120" height="120"/>

    <text x="45" y="76" class="t c">A</text>
    <text x="176" y="76" class="t c">,</text>
    <text x="305" y="76" class="t c">m</text>
