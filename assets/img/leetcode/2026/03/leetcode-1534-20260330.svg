<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1534 Count Good Triplets diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1534 · Count Good Triplets</text>
  <rect x="56" y="120" width="1088" height="460" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="90" y="176" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Indices: i &lt; j &lt; k</text>
  <circle cx="220" cy="240" r="34" fill="#1d4ed8"/>
  <circle cx="450" cy="240" r="34" fill="#2563eb"/>
  <circle cx="680" cy="240" r="34" fill="#3b82f6"/>
  <text x="208" y="248" fill="#e2e8f0" font-size="22" font-family="Inter,Arial,sans-serif">i</text>
  <text x="438" y="248" fill="#e2e8f0" font-size="22" font-family="Inter,Arial,sans-serif">j</text>
  <text x="668" y="248" fill="#e2e8f0" font-size="22" font-family="Inter,Arial,sans-serif">k</text>

  <line x1="254" y1="240" x2="416" y2="240" stroke="#22c55e" stroke-width="4"/>
  <line x1="484" y1="240" x2="646" y2="240" stroke="#22c55e" stroke-width="4"/>
  <line x1="240" y1="270" x2="660" y2="270" stroke="#f59e0b" stroke-width="4"/>

  <text x="730" y="248" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">|arr[i]-arr[j]| ≤ a</text>
  <text x="730" y="284" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">|arr[j]-arr[k]| ≤ b</text>
  <text x="730" y="320" fill="#fcd34d" font-size="24" font-family="Inter,Arial,sans-serif">|arr[i]-arr[k]| ≤ c</text>

  <text x="90" y="360" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Pruning idea:</text>
  <text x="90" y="402" fill="#e2e8f0" font-size="24" font-family="Inter,Arial,sans-serif">If |arr[i]-arr[j]| &gt; a, skip all k for this (i, j).</text>

  <text x="90" y="470" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Complexity: O(n³) time, O(1) space (n ≤ 100, acceptable)</text>
  <text x="90" y="530" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
