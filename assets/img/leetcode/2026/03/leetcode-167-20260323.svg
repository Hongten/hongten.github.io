<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 167 two-pointer convergence diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb}
      .small{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 167 · Two Sum II (Sorted Array)</text>
  <text x="60" y="130" class="sub">Two pointers converge by monotonic sum adjustment</text>

  <rect x="70" y="210" width="1060" height="120" rx="16" fill="#111827" stroke="#334155"/>
  <g>
    <rect x="120" y="240" width="120" height="60" rx="10" fill="#1f2937" stroke="#475569"/>
    <text x="180" y="278" text-anchor="middle" class="txt">2</text>
    <rect x="260" y="240" width="120" height="60" rx="10" fill="#1f2937" stroke="#475569"/>
    <text x="320" y="278" text-anchor="middle" class="txt">7</text>
    <rect x="400" y="240" width="120" height="60" rx="10" fill="#1f2937" stroke="#475569"/>
    <text x="460" y="278" text-anchor="middle" class="txt">11</text>
    <rect x="540" y="240" width="120" height="60" rx="10" fill="#1f2937" stroke="#475569"/>
    <text x="600" y="278" text-anchor="middle" class="txt">15</text>
  </g>

  <path d="M180 350 L180 405" stroke="#22c55e" stroke-width="5"/>
  <polygon points="180,418 170,398 190,398" fill="#22c55e"/>
  <text x="180" y="450" text-anchor="middle" class="small">left (l)</text>

  <path d="M600 350 L600 405" stroke="#f59e0b" stroke-width="5"/>
  <polygon points="600,418 590,398 610,398" fill="#f59e0b"/>
  <text x="600" y="450" text-anchor="middle" class="small">right (r)</text>

  <text x="760" y="260" class="txt">sum = numbers[l] + numbers[r]</text>
  <text x="760" y="295" class="small">sum &lt; target → l++</text>
  <text x="760" y="325" class="small">sum &gt; target → r--</text>
  <text x="760" y="355" class="small">sum == target → return [l+1, r+1]</text>

  <text x="60" y="580" class="small">Example: [2, 7, 11, 15], target = 9  →  answer indices = [1, 2]</text>
</svg>
