<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 337 House Robber III tree DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#eaf2ff}
      .n{fill:#13223d;stroke:#8ec5ff;stroke-width:2}
      .e{stroke:#8ec5ff;stroke-width:3}
      .s{font-size:24px}
      .b{font-size:34px;font-weight:700}
      .m{font-size:22px}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="t b">LeetCode 337 · House Robber III</text>
  <text x="60" y="105" class="t s">Tree DP states: rob(node) vs skip(node)</text>

  <line x1="600" y1="190" x2="420" y2="290" class="e"/>
  <line x1="600" y1="190" x2="780" y2="290" class="e"/>

  <circle cx="600" cy="170" r="58" class="n"/>
  <text x="600" y="160" text-anchor="middle" class="t s">root=3</text>
  <text x="600" y="190" text-anchor="middle" class="t m">rob=7 skip=6</text>

  <line x1="420" y1="350" x2="330" y2="450" class="e"/>
  <line x1="420" y1="350" x2="510" y2="450" class="e"/>
  <line x1="780" y1="350" x2="870" y2="450" class="e"/>

  <circle cx="420" cy="330" r="52" class="n"/>
  <text x="420" y="322" text-anchor="middle" class="t s">2</text>
  <text x="420" y="347" text-anchor="middle" class="t m">r=2 s=3</text>

  <circle cx="780" cy="330" r="52" class="n"/>
  <text x="780" y="322" text-anchor="middle" class="t s">3</text>
  <text x="780" y="347" text-anchor="middle" class="t m">r=3 s=1</text>

  <circle cx="330" cy="480" r="48" class="n"/>
  <text x="330" y="487" text-anchor="middle" class="t s">3</text>

  <circle cx="510" cy="480" r="48" class="n"/>
  <text x="510" y="487" text-anchor="middle" class="t s">1</text>

  <circle cx="870" cy="480" r="48" class="n"/>
  <text x="870" y="487" text-anchor="middle" class="t s">1</text>

  <text x="60" y="575" class="t s">Transition: rob = val + left.skip + right.skip; skip = max(left) + max(right)</text>
</svg>
