<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 215 Kth Largest Element in an Array diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 215 · Kth Largest Element in an Array</text>
  <text x="56" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Min Heap (size k) · Quickselect (average O(n))</text>

  <rect x="56" y="176" width="520" height="392" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="84" y="220" fill="#a7f3d0" font-size="24" font-family="monospace">Input: [3,2,1,5,6,4], k = 2</text>
  <text x="84" y="262" fill="#e5e7eb" font-size="22" font-family="monospace">Keep min-heap with top k largest values</text>
  <text x="84" y="300" fill="#e5e7eb" font-size="22" font-family="monospace">After scan: heap = [5,6]</text>
  <text x="84" y="338" fill="#fbbf24" font-size="24" font-family="monospace">Answer = heap top = 5</text>

  <circle cx="260" cy="450" r="28" fill="#22c55e"/><text x="260" y="457" text-anchor="middle" fill="#fff" font-size="24">5</text>
  <circle cx="340" cy="450" r="28" fill="#0ea5e9"/><text x="340" y="457" text-anchor="middle" fill="#fff" font-size="24">6</text>
  <line x1="260" y1="422" x2="340" y2="422" stroke="#64748b" stroke-width="3"/>

  <rect x="620" y="176" width="524" height="392" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="648" y="222" fill="#fda4af" font-size="26" font-family="Inter,Arial,sans-serif">Quickselect idea:</text>
  <text x="648" y="270" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">target index in sorted asc = n - k</text>
  <text x="648" y="310" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">partition around pivot</text>
  <text x="648" y="350" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">shrink to one side until pivot hits target</text>
  <text x="648" y="408" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Average: O(n) · Worst: O(n²)</text>
  <text x="648" y="446" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Heap method: O(n log k), stable and practical</text>
</svg>
