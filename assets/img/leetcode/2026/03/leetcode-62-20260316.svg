<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 62 Unique Paths diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="90" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 62: Unique Paths</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">DP transition: dp[i][j] = dp[i-1][j] + dp[i][j-1]</text>

  <g transform="translate(120,190)">
    <rect x="0" y="0" width="520" height="320" rx="16" fill="#1f2937" stroke="#374151"/>

    <g fill="none" stroke="#4b5563" stroke-width="2">
      <line x1="40" y1="40" x2="480" y2="40"/><line x1="40" y1="120" x2="480" y2="120"/>
      <line x1="40" y1="200" x2="480" y2="200"/><line x1="40" y1="280" x2="480" y2="280"/>
      <line x1="40" y1="40" x2="40" y2="280"/><line x1="150" y1="40" x2="150" y2="280"/>
      <line x1="260" y1="40" x2="260" y2="280"/><line x1="370" y1="40" x2="370" y2="280"/>
      <line x1="480" y1="40" x2="480" y2="280"/>
    </g>

    <circle cx="40" cy="40" r="12" fill="#22c55e"/>
    <text x="56" y="48" fill="#22c55e" font-size="22" font-family="Inter,Arial,sans-serif">Start</text>
    <circle cx="480" cy="280" r="12" fill="#ef4444"/>
    <text x="378" y="316" fill="#ef4444" font-size="22" font-family="Inter,Arial,sans-serif">Finish</text>

    <path d="M40 40 H150 V120 H260 V200 H370 V280 H480" fill="none" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="180" y="24" fill="#f59e0b" font-size="20" font-family="Inter,Arial,sans-serif">One valid path</text>
  </g>

  <g transform="translate(700,210)">
    <rect x="0" y="0" width="420" height="260" rx="16" fill="#111827" stroke="#374151"/>
    <text x="26" y="52" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">State Transition</text>
    <text x="26" y="98" fill="#86efac" font-size="26" font-family="monospace">dp[i][j] = top + left</text>
    <text x="26" y="145" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">First row = 1</text>
    <text x="26" y="180" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">First col = 1</text>
    <text x="26" y="220" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Answer: dp[m-1][n-1]</text>
  </g>

  <text x="60" y="590" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second · Java/Go/C++/Python/JS</text>
</svg>
