<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 113 Path Sum II DFS backtracking diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 113 · Path Sum II</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">DFS + Backtracking Path Capture</text>

  <rect x="60" y="190" width="520" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="235" fill="#f8fafc" font-size="24" font-family="monospace">         5(remain=22)</text>
  <text x="90" y="275" fill="#f8fafc" font-size="24" font-family="monospace">       /            \</text>
  <text x="90" y="315" fill="#f8fafc" font-size="24" font-family="monospace">   4(rem=17)       8(rem=17)</text>
  <text x="90" y="355" fill="#f8fafc" font-size="24" font-family="monospace">   /              /        \</text>
  <text x="90" y="395" fill="#86efac" font-size="24" font-family="monospace">11(rem=13)      13          4</text>
  <text x="90" y="435" fill="#f8fafc" font-size="24" font-family="monospace"> /   \                    /  \</text>
  <text x="90" y="475" fill="#86efac" font-size="24" font-family="monospace">7     2(rem=0)           5    1</text>
  <text x="90" y="520" fill="#22c55e" font-size="24" font-family="Inter,Arial,sans-serif">Valid path snapshot: [5,4,11,2]</text>

  <rect x="620" y="190" width="520" height="360" rx="16" fill="#111827" stroke="#374151"/>
  <text x="650" y="240" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Backtracking Invariant</text>
  <text x="650" y="290" fill="#cbd5e1" font-size="24" font-family="monospace">path.push(node.val)</text>
  <text x="650" y="330" fill="#cbd5e1" font-size="24" font-family="monospace">remain -= node.val</text>
  <text x="650" y="370" fill="#cbd5e1" font-size="24" font-family="monospace">if leaf &amp;&amp; remain==0: copy(path)</text>
  <text x="650" y="410" fill="#cbd5e1" font-size="24" font-family="monospace">dfs(left), dfs(right)</text>
  <text x="650" y="450" fill="#fca5a5" font-size="24" font-family="monospace">path.pop()  // restore</text>
  <text x="650" y="510" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second</text>
</svg>
