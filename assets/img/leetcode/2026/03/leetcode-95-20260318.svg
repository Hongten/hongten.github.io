<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 95 recursive interval construction diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="82" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 95 · Unique Binary Search Trees II</text>
  <text x="56" y="125" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Interval recursion: choose root k, combine left[l..k-1] × right[k+1..r]</text>

  <rect x="70" y="180" width="260" height="120" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="100" y="225" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">build(1, 3)</text>
  <text x="95" y="265" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">root = 1, 2, 3</text>

  <rect x="470" y="120" width="260" height="120" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="500" y="165" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">left: build(1,1)</text>
  <text x="500" y="205" fill="#c4b5fd" font-size="22" font-family="Inter,Arial,sans-serif">or null if empty</text>

  <rect x="470" y="300" width="260" height="120" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="500" y="345" fill="#f9fafb" font-size="28" font-family="Inter,Arial,sans-serif">right: build(3,3)</text>
  <text x="500" y="385" fill="#fca5a5" font-size="22" font-family="Inter,Arial,sans-serif">or null if empty</text>

  <line x1="330" y1="235" x2="470" y2="180" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="330" y1="245" x2="470" y2="350" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="860" y="200" width="280" height="180" rx="14" fill="#1f2937" stroke="#4b5563"/>
  <text x="890" y="245" fill="#f9fafb" font-size="26" font-family="Inter,Arial,sans-serif">Cartesian product</text>
  <text x="890" y="285" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">for each left subtree</text>
  <text x="890" y="315" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">for each right subtree</text>
  <text x="890" y="350" fill="#fbbf24" font-size="22" font-family="Inter,Arial,sans-serif">new TreeNode(k)</text>

  <text x="56" y="580" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
