<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 41 index hashing diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-family:Arial,Helvetica,sans-serif;fill:#93c5fd}
      .b{fill:#111827;stroke:#64748b;stroke-width:2}
      .n{font-family:Consolas,monospace;fill:#f8fafc;font-size:28px}
      .small{font-size:22px;fill:#cbd5e1}
      .ok{fill:#22c55e}
      .warn{fill:#f59e0b}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="86" class="t" font-size="44" font-weight="700">LeetCode 41 · First Missing Positive</text>
  <text x="60" y="124" class="m" font-size="28">In-place index hashing: place value x at index x-1</text>

  <text x="72" y="190" class="small">Example nums = [3, 4, -1, 1]</text>
  <rect x="60" y="215" width="120" height="80" class="b"/><rect x="190" y="215" width="120" height="80" class="b"/><rect x="320" y="215" width="120" height="80" class="b"/><rect x="450" y="215" width="120" height="80" class="b"/>
  <text x="112" y="264" class="n">3</text><text x="242" y="264" class="n">4</text><text x="355" y="264" class="n">-1</text><text x="502" y="264" class="n">1</text>
  <text x="96" y="320" class="small">i=0</text><text x="226" y="320" class="small">i=1</text><text x="356" y="320" class="small">i=2</text><text x="486" y="320" class="small">i=3</text>

  <path d="M122 350 C180 410, 380 410, 505 350" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <text x="210" y="395" class="small">swap 3 to index 2, swap 1 to index 0 ...</text>

  <text x="72" y="470" class="small">After placement: [1, -1, 3, 4]</text>
  <rect x="60" y="495" width="120" height="80" class="b"/><rect x="190" y="495" width="120" height="80" class="b"/><rect x="320" y="495" width="120" height="80" class="b"/><rect x="450" y="495" width="120" height="80" class="b"/>
  <text x="112" y="544" class="n ok">1</text><text x="242" y="544" class="n warn">-1</text><text x="372" y="544" class="n ok">3</text><text x="502" y="544" class="n ok">4</text>
  <text x="620" y="535" class="t" font-size="32" font-weight="700">First mismatch at i=1</text>
  <text x="620" y="575" class="m" font-size="34" font-weight="700">Answer = i + 1 = 2</text>
</svg>
