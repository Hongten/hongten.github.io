<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 119 Pascal Triangle II in-place right-to-left update diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="70" fill="#e2e8f0" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 119 · Pascal's Triangle II</text>
  <text x="48" y="108" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">In-place DP: update from right to left</text>

  <rect x="48" y="150" width="1104" height="420" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="88" y="205" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Previous row (i-1): [1, 4, 6, 4, 1]</text>
  <text x="88" y="265" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Current row (i) before update: [1, 0, 0, 0, 0, 1]</text>

  <rect x="88" y="305" width="1024" height="205" rx="12" fill="#111827" stroke="#374151"/>
  <text x="108" y="345" fill="#86efac" font-size="23" font-family="JetBrains Mono,Consolas,monospace">j = 4: row[4] = row[4] + row[3]  → 1</text>
  <text x="108" y="382" fill="#86efac" font-size="23" font-family="JetBrains Mono,Consolas,monospace">j = 3: row[3] = row[3] + row[2]  → 5</text>
  <text x="108" y="419" fill="#86efac" font-size="23" font-family="JetBrains Mono,Consolas,monospace">j = 2: row[2] = row[2] + row[1]  → 10</text>
  <text x="108" y="456" fill="#86efac" font-size="23" font-family="JetBrains Mono,Consolas,monospace">j = 1: row[1] = row[1] + row[0]  → 5</text>
  <text x="108" y="493" fill="#fcd34d" font-size="23" font-family="JetBrains Mono,Consolas,monospace">Result row: [1, 5, 10, 10, 5, 1]</text>

  <line x1="920" y1="240" x2="760" y2="295" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="925" y="230" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Right → Left</text>

  <text x="48" y="605" fill="#94a3b8" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
