<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 37 Sudoku Solver diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}.m{font-size:30px;font-weight:700}.s{font-size:18px;fill:#93c5fd}.n{font-size:20px;font-weight:700;fill:#f8fafc}.g{stroke:#94a3b8;stroke-width:2}.b{stroke:#f8fafc;stroke-width:4}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="85" class="t m">LeetCode 37 · Sudoku Solver</text>
  <text x="70" y="120" class="t s">Backtracking + Row/Col/Box Constraints</text>

  <g transform="translate(70,170)">
    <rect x="0" y="0" width="360" height="360" fill="#0f172a" rx="12"/>
    <g>
      <line x1="0" y1="0" x2="360" y2="0" class="b"/>
      <line x1="0" y1="120" x2="360" y2="120" class="b"/>
      <line x1="0" y1="240" x2="360" y2="240" class="b"/>
      <line x1="0" y1="360" x2="360" y2="360" class="b"/>
      <line x1="0" y1="0" x2="0" y2="360" class="b"/>
      <line x1="120" y1="0" x2="120" y2="360" class="b"/>
      <line x1="240" y1="0" x2="240" y2="360" class="b"/>
      <line x1="360" y1="0" x2="360" y2="360" class="b"/>
      <line x1="40" y1="0" x2="40" y2="360" class="g"/><line x1="80" y1="0" x2="80" y2="360" class="g"/>
      <line x1="160" y1="0" x2="160" y2="360" class="g"/><line x1="200" y1="0" x2="200" y2="360" class="g"/>
      <line x1="280" y1="0" x2="280" y2="360" class="g"/><line x1="320" y1="0" x2="320" y2="360" class="g"/>
      <line x1="0" y1="40" x2="360" y2="40" class="g"/><line x1="0" y1="80" x2="360" y2="80" class="g"/>
      <line x1="0" y1="160" x2="360" y2="160" class="g"/><line x1="0" y1="200" x2="360" y2="200" class="g"/>
      <line x1="0" y1="280" x2="360" y2="280" class="g"/><line x1="0" y1="320" x2="360" y2="320" class="g"/>
    </g>
    <rect x="120" y="120" width="40" height="40" fill="#f59e0b" opacity="0.9"/>
    <text x="134" y="148" class="n">?</text>
    <text x="14" y="30" class="n">5</text><text x="54" y="30" class="n">3</text><text x="174" y="30" class="n">7</text>
    <text x="14" y="70" class="n">6</text><text x="134" y="70" class="n">1</text><text x="174" y="70" class="n">9</text><text x="214" y="70" class="n">5</text>
  </g>

  <g transform="translate(500,200)">
    <text x="0" y="0" class="t n">Try digit d at (r, c)</text>
    <text x="0" y="50" class="t">if !row[r][d] &amp;&amp; !col[c][d] &amp;&amp; !box[b][d]:</text>
    <text x="30" y="90" class="t">place d → recurse</text>
    <text x="30" y="130" class="t">fail? undo and try next d</text>
    <text x="0" y="190" class="t s">b = (r / 3) * 3 + (c / 3)</text>
    <text x="0" y="240" class="t">Constraint tables:</text>
    <text x="30" y="278" class="t">rows[9][10], cols[9][10], boxes[9][10]</text>
  </g>
</svg>
