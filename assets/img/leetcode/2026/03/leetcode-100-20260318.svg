<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 100 Same Tree synchronized comparison diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .label { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .node { fill: #334155; stroke: #38bdf8; stroke-width: 3; }
      .ok { fill: #22c55e; font: 700 20px 'Segoe UI', Arial, sans-serif; }
      .bad { fill: #f87171; font: 700 20px 'Segoe UI', Arial, sans-serif; }
      .edge { stroke: #64748b; stroke-width: 3; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="78" class="title">LeetCode 100 · Same Tree</text>
  <text x="60" y="116" class="sub">Compare nodes in lockstep: (both null) or (both non-null and equal value)</text>

  <text x="220" y="170" class="label">Tree p</text>
  <text x="780" y="170" class="label">Tree q</text>

  <line x1="260" y1="260" x2="190" y2="340" class="edge"/>
  <line x1="260" y1="260" x2="330" y2="340" class="edge"/>
  <line x1="820" y1="260" x2="750" y2="340" class="edge"/>
  <line x1="820" y1="260" x2="890" y2="340" class="edge"/>

  <circle cx="260" cy="250" r="36" class="node"/><text x="250" y="258" class="label">1</text>
  <circle cx="190" cy="350" r="32" class="node"/><text x="181" y="358" class="label">2</text>
  <circle cx="330" cy="350" r="32" class="node"/><text x="321" y="358" class="label">3</text>

  <circle cx="820" cy="250" r="36" class="node"/><text x="810" y="258" class="label">1</text>
  <circle cx="750" cy="350" r="32" class="node"/><text x="741" y="358" class="label">2</text>
  <circle cx="890" cy="350" r="32" class="node"/><text x="881" y="358" class="label">3</text>

  <line x1="296" y1="250" x2="784" y2="250" stroke="#22c55e" stroke-width="4" stroke-dasharray="8 8"/>
  <line x1="222" y1="350" x2="718" y2="350" stroke="#22c55e" stroke-width="4" stroke-dasharray="8 8"/>
  <line x1="362" y1="350" x2="858" y2="350" stroke="#22c55e" stroke-width="4" stroke-dasharray="8 8"/>

  <text x="505" y="242" class="ok">✓ 1 == 1</text>
  <text x="505" y="342" class="ok">✓ 2 == 2</text>
  <text x="505" y="378" class="ok">✓ 3 == 3</text>

  <rect x="60" y="460" width="1080" height="120" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="510" class="label">Rules:</text>
  <text x="200" y="510" class="sub">1) both null → true   2) one null → false   3) values differ → false   4) recurse left &amp; right</text>
  <text x="90" y="555" class="bad">Any mismatch at one paired position means the whole tree is not the same.</text>
</svg>
