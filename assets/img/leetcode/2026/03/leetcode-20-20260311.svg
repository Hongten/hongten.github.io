<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 20 stack matching diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="48" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 20 · Valid Parentheses</text>
  <text x="60" y="150" fill="#9ca3af" font-size="28" font-family="Inter,Arial,sans-serif">Stack Matching: push open, pop on matching close</text>

  <rect x="70" y="220" width="300" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="265" fill="#93c5fd" font-size="28" font-family="monospace">Input: ({[]})</text>

  <rect x="460" y="220" width="260" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="520" y="265" fill="#a7f3d0" font-size="26" font-family="monospace">Stack</text>
  <rect x="530" y="300" width="120" height="46" rx="8" fill="#0ea5e9"/>
  <text x="587" y="331" text-anchor="middle" fill="#fff" font-size="28" font-family="monospace">(</text>
  <rect x="530" y="356" width="120" height="46" rx="8" fill="#22c55e"/>
  <text x="587" y="387" text-anchor="middle" fill="#fff" font-size="28" font-family="monospace">{</text>
  <rect x="530" y="412" width="120" height="46" rx="8" fill="#f59e0b"/>
  <text x="587" y="443" text-anchor="middle" fill="#fff" font-size="28" font-family="monospace">[</text>

  <rect x="800" y="220" width="320" height="320" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="830" y="270" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Rules</text>
  <text x="830" y="320" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">1. Opening bracket → push</text>
  <text x="830" y="365" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">2. Closing bracket → must match top</text>
  <text x="830" y="410" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">3. End with empty stack</text>
  <text x="830" y="480" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n) · Space O(n)</text>
</svg>
