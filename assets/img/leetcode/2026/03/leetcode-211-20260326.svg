<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 211 trie wildcard DFS diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#e5e7eb}
      .m{font-family:Inter,Arial,sans-serif;fill:#93c5fd}
      .n{font-family:Inter,Arial,sans-serif;fill:#cbd5e1;font-size:22px}
      .node{fill:#111827;stroke:#60a5fa;stroke-width:2}
      .edge{stroke:#64748b;stroke-width:2}
      .hit{stroke:#22c55e;stroke-width:4}
      .w{fill:#fbbf24;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="70" class="t" font-size="40" font-weight="700">LeetCode 211 · Design Add and Search Words Data Structure</text>
  <text x="48" y="108" class="m" font-size="26">Trie insertion + DFS branching on '.' wildcard</text>

  <line x1="160" y1="280" x2="340" y2="220" class="edge"/>
  <line x1="160" y1="280" x2="340" y2="340" class="edge"/>
  <line x1="340" y1="220" x2="540" y2="180" class="edge"/>
  <line x1="340" y1="220" x2="540" y2="260" class="edge hit"/>
  <line x1="340" y1="340" x2="540" y2="340" class="edge"/>
  <line x1="540" y1="260" x2="740" y2="260" class="edge hit"/>

  <circle cx="160" cy="280" r="32" class="node"/>
  <circle cx="340" cy="220" r="32" class="node"/>
  <circle cx="340" cy="340" r="32" class="node"/>
  <circle cx="540" cy="180" r="32" class="node"/>
  <circle cx="540" cy="260" r="32" class="node"/>
  <circle cx="540" cy="340" r="32" class="node"/>
  <circle cx="740" cy="260" r="32" class="node"/>

  <text x="151" y="287" class="t" font-size="20">∅</text>
  <text x="332" y="227" class="t" font-size="20">b</text>
  <text x="332" y="347" class="t" font-size="20">m</text>
  <text x="532" y="187" class="t" font-size="20">a</text>
  <text x="532" y="267" class="t" font-size="20">i</text>
  <text x="532" y="347" class="t" font-size="20">e</text>
  <text x="732" y="267" class="t" font-size="20">d</text>

  <text x="210" y="192" class="n">search("b.d")</text>
  <text x="210" y="220" class="n">b → '.' tries all children → d ✓</text>

  <text x="820" y="220" class="w" font-size="30">Wildcard DFS</text>
  <text x="820" y="260" class="n">- letter: single branch</text>
  <text x="820" y="292" class="n">- '.': iterate all children</text>
  <text x="820" y="324" class="n">- end index must hit isWord=true</text>

  <text x="48" y="590" class="m" font-size="24">Author: Tom🦞</text>
</svg>
