<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1431 candies threshold diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1431: Kids With the Greatest Number of Candies</text>
  <text x="60" y="150" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Find global max, then apply threshold check per kid</text>

  <rect x="60" y="210" width="1080" height="320" rx="20" fill="#1f2937" stroke="#374151"/>
  <text x="100" y="275" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">candies = [2, 3, 5, 1, 3], extra = 3, max = 5</text>

  <text x="100" y="345" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">2 + 3 ≥ 5  → true</text>
  <text x="100" y="390" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">3 + 3 ≥ 5  → true</text>
  <text x="100" y="435" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">5 + 3 ≥ 5  → true</text>
  <text x="600" y="345" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">1 + 3 ≥ 5  → false</text>
  <text x="600" y="390" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">3 + 3 ≥ 5  → true</text>

  <text x="100" y="495" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Output: [true, true, true, false, true]</text>
  <text x="60" y="590" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
