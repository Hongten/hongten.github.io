<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 844 Backspace String Compare two-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="80" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 844 · Backspace String Compare</text>
  <text x="50" y="122" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Reverse Two Pointers + Skip Counters</text>

  <rect x="50" y="170" width="1100" height="400" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="230" fill="#f9fafb" font-size="28" font-family="monospace">s = "ab#c#d"</text>
  <text x="90" y="280" fill="#f9fafb" font-size="28" font-family="monospace">t = "ad##d"</text>

  <line x1="750" y1="215" x2="1060" y2="215" stroke="#60a5fa" stroke-width="4"/>
  <polygon points="1060,215 1042,205 1042,225" fill="#60a5fa"/>
  <text x="770" y="200" fill="#60a5fa" font-size="22" font-family="Inter,Arial,sans-serif">i scans right → left</text>

  <line x1="750" y1="265" x2="1060" y2="265" stroke="#34d399" stroke-width="4"/>
  <polygon points="1060,265 1042,255 1042,275" fill="#34d399"/>
  <text x="770" y="250" fill="#34d399" font-size="22" font-family="Inter,Arial,sans-serif">j scans right → left</text>

  <text x="90" y="360" fill="#fde68a" font-size="24" font-family="Inter,Arial,sans-serif">Rule 1: '#': skip++</text>
  <text x="90" y="400" fill="#fde68a" font-size="24" font-family="Inter,Arial,sans-serif">Rule 2: normal char with skip&gt;0: skip-- and ignore char</text>
  <text x="90" y="440" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Rule 3: compare next valid chars; mismatch =&gt; false</text>
  <text x="90" y="480" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Both exhausted together =&gt; true</text>

  <text x="90" y="535" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Time: O(n+m)   Space: O(1)   Author: Tom🦞</text>
</svg>
