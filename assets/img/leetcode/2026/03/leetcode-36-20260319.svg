<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 36 Valid Sudoku row column box validation diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 36: Valid Sudoku</text>
  <text x="60" y="130" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Row / Column / 3x3 Box uniqueness check</text>

  <rect x="60" y="170" width="360" height="360" rx="8" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <g stroke="#334155" stroke-width="1">
    <line x1="100" y1="170" x2="100" y2="530"/><line x1="140" y1="170" x2="140" y2="530"/><line x1="180" y1="170" x2="180" y2="530"/>
    <line x1="220" y1="170" x2="220" y2="530"/><line x1="260" y1="170" x2="260" y2="530"/><line x1="300" y1="170" x2="300" y2="530"/>
    <line x1="340" y1="170" x2="340" y2="530"/><line x1="380" y1="170" x2="380" y2="530"/>
    <line x1="60" y1="210" x2="420" y2="210"/><line x1="60" y1="250" x2="420" y2="250"/><line x1="60" y1="290" x2="420" y2="290"/>
    <line x1="60" y1="330" x2="420" y2="330"/><line x1="60" y1="370" x2="420" y2="370"/><line x1="60" y1="410" x2="420" y2="410"/>
    <line x1="60" y1="450" x2="420" y2="450"/><line x1="60" y1="490" x2="420" y2="490"/>
  </g>
  <g stroke="#94a3b8" stroke-width="3">
    <line x1="180" y1="170" x2="180" y2="530"/><line x1="300" y1="170" x2="300" y2="530"/>
    <line x1="60" y1="290" x2="420" y2="290"/><line x1="60" y1="410" x2="420" y2="410"/>
  </g>

  <rect x="540" y="200" width="580" height="300" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="570" y="255" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">One filled cell d at (r, c) creates 3 keys:</text>
  <text x="570" y="305" fill="#86efac" font-size="28" font-family="JetBrains Mono,Consolas,monospace">row key: r{r}-d</text>
  <text x="570" y="350" fill="#fca5a5" font-size="28" font-family="JetBrains Mono,Consolas,monospace">col key: c{c}-d</text>
  <text x="570" y="395" fill="#93c5fd" font-size="28" font-family="JetBrains Mono,Consolas,monospace">box key: b{r/3}{c/3}-d</text>
  <text x="570" y="450" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">If any key already exists → invalid</text>

  <text x="60" y="585" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
