<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 771 jewels set counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e0fbfc" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 771 · Jewels and Stones</text>
  <text x="60" y="135" fill="#98c1d9" font-size="28" font-family="Arial, sans-serif">Hash Set Membership Counting</text>
  <rect x="70" y="190" width="460" height="330" rx="16" fill="#3a506b"/>
  <text x="95" y="235" fill="#ffffff" font-size="30" font-family="monospace">jewels = "aA"</text>
  <text x="95" y="280" fill="#ffffff" font-size="30" font-family="monospace">set = { 'a', 'A' }</text>
  <text x="95" y="345" fill="#e0fbfc" font-size="26" font-family="monospace">stones = "aAAbbbb"</text>
  <text x="95" y="390" fill="#e0fbfc" font-size="26" font-family="monospace">scan each char:</text>
  <text x="95" y="435" fill="#ffd166" font-size="26" font-family="monospace">a ✓  A ✓  A ✓  b ✗  b ✗  b ✗  b ✗</text>
  <text x="95" y="485" fill="#06d6a0" font-size="34" font-family="monospace" font-weight="700">answer = 3</text>

  <rect x="620" y="210" width="500" height="260" rx="16" fill="#5bc0be" opacity="0.18"/>
  <text x="650" y="270" fill="#e0fbfc" font-size="30" font-family="Arial, sans-serif">Build set in O(|jewels|)</text>
  <text x="650" y="320" fill="#e0fbfc" font-size="30" font-family="Arial, sans-serif">Count in O(|stones|)</text>
  <text x="650" y="370" fill="#e0fbfc" font-size="30" font-family="Arial, sans-serif">Total O(j + s), Space O(j)</text>
</svg>
