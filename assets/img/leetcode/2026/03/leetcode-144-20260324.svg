<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 144 preorder traversal diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{fill:#e2e8f0;font:700 44px 'Segoe UI',Arial,sans-serif}
      .sub{fill:#93c5fd;font:600 24px 'Segoe UI',Arial,sans-serif}
      .node{fill:#0b1220;stroke:#38bdf8;stroke-width:3}
      .txt{fill:#f8fafc;font:700 26px 'Segoe UI',Arial,sans-serif;text-anchor:middle;dominant-baseline:middle}
      .edge{stroke:#64748b;stroke-width:4}
      .order{fill:#f59e0b;font:700 22px 'Segoe UI',Arial,sans-serif}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 144 · Binary Tree Preorder Traversal</text>
  <text x="60" y="120" class="sub">Iterative Stack: visit Root → Left → Right</text>

  <line x1="600" y1="240" x2="450" y2="330" class="edge"/>
  <line x1="600" y1="240" x2="750" y2="330" class="edge"/>
  <line x1="450" y1="330" x2="360" y2="430" class="edge"/>
  <line x1="450" y1="330" x2="540" y2="430" class="edge"/>
  <line x1="750" y1="330" x2="840" y2="430" class="edge"/>

  <circle cx="600" cy="220" r="42" class="node"/><text x="600" y="220" class="txt">1</text>
  <circle cx="450" cy="330" r="40" class="node"/><text x="450" y="330" class="txt">2</text>
  <circle cx="750" cy="330" r="40" class="node"/><text x="750" y="330" class="txt">3</text>
  <circle cx="360" cy="430" r="38" class="node"/><text x="360" y="430" class="txt">4</text>
  <circle cx="540" cy="430" r="38" class="node"/><text x="540" y="430" class="txt">5</text>
  <circle cx="840" cy="430" r="38" class="node"/><text x="840" y="430" class="txt">6</text>

  <text x="60" y="560" class="order">Preorder output: [1, 2, 4, 5, 3, 6]</text>
</svg>
