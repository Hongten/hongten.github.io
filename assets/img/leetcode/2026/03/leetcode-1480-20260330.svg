<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 26px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .label { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .num { font: 700 28px 'Consolas', monospace; fill: #f8fafc; }
      .sum { font: 700 28px 'Consolas', monospace; fill: #22d3ee; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 1480 · Running Sum of 1d Array</text>
  <text x="60" y="130" class="sub">Prefix accumulation from left to right</text>

  <rect x="60" y="200" width="150" height="90" rx="12" fill="#334155"/>
  <rect x="240" y="200" width="150" height="90" rx="12" fill="#334155"/>
  <rect x="420" y="200" width="150" height="90" rx="12" fill="#334155"/>
  <rect x="600" y="200" width="150" height="90" rx="12" fill="#334155"/>
  <text x="120" y="255" class="num">1</text>
  <text x="300" y="255" class="num">2</text>
  <text x="480" y="255" class="num">3</text>
  <text x="660" y="255" class="num">4</text>

  <text x="60" y="350" class="label">runningSum:</text>
  <rect x="60" y="380" width="150" height="90" rx="12" fill="#0f766e"/>
  <rect x="240" y="380" width="150" height="90" rx="12" fill="#0f766e"/>
  <rect x="420" y="380" width="150" height="90" rx="12" fill="#0f766e"/>
  <rect x="600" y="380" width="150" height="90" rx="12" fill="#0f766e"/>
  <text x="115" y="435" class="sum">1</text>
  <text x="295" y="435" class="sum">3</text>
  <text x="475" y="435" class="sum">6</text>
  <text x="650" y="435" class="sum">10</text>

  <path d="M135 305 C 165 340, 235 340, 315 305" stroke="#38bdf8" stroke-width="4" fill="none"/>
  <path d="M315 305 C 345 340, 415 340, 495 305" stroke="#38bdf8" stroke-width="4" fill="none"/>
  <path d="M495 305 C 525 340, 595 340, 675 305" stroke="#38bdf8" stroke-width="4" fill="none"/>

  <text x="820" y="260" class="label">Formula</text>
  <text x="820" y="305" class="sum">nums[i] += nums[i-1]</text>
  <text x="820" y="350" class="label">Time: O(n) · Space: O(1)</text>
</svg>
