<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3206 alternating groups diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="38" font-family="Arial, sans-serif" font-weight="700">LeetCode 3206 · Alternating Groups I</text>
  <text x="60" y="130" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Circular windows of length 3: check adjacent differences</text>

  <g transform="translate(90,220)">
    <text x="0" y="-25" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">Example colors = [1,0,1,0,1,1]</text>
    <g font-family="Arial, sans-serif" font-size="26" font-weight="700">
      <rect x="0" y="0" width="110" height="90" rx="12" fill="#22c55e"/><text x="45" y="56" fill="#052e16">1</text>
      <rect x="130" y="0" width="110" height="90" rx="12" fill="#38bdf8"/><text x="175" y="56" fill="#082f49">0</text>
      <rect x="260" y="0" width="110" height="90" rx="12" fill="#22c55e"/><text x="305" y="56" fill="#052e16">1</text>
      <rect x="390" y="0" width="110" height="90" rx="12" fill="#38bdf8"/><text x="435" y="56" fill="#082f49">0</text>
      <rect x="520" y="0" width="110" height="90" rx="12" fill="#22c55e"/><text x="565" y="56" fill="#052e16">1</text>
      <rect x="650" y="0" width="110" height="90" rx="12" fill="#22c55e"/><text x="695" y="56" fill="#052e16">1</text>
    </g>
    <path d="M760,45 C820,45 845,-30 905,-30" stroke="#f59e0b" stroke-width="5" fill="none" marker-end="url(#arr)"/>
    <text x="850" y="-40" fill="#fbbf24" font-size="20" font-family="Arial, sans-serif">circular wrap</text>
  </g>

  <text x="60" y="540" fill="#e2e8f0" font-size="24" font-family="Arial, sans-serif">Valid if a!=b and b!=c for each start i</text>
  <text x="60" y="575" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">Time O(n) · Space O(1)</text>
</svg>
