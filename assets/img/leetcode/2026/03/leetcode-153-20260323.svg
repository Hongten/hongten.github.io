<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 153 rotated sorted array binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 153 · Find Minimum in Rotated Sorted Array</text>
  <text x="60" y="132" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Binary Search on Sorted Half</text>

  <rect x="60" y="180" width="1080" height="360" rx="20" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="240" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Example: [4, 5, 6, 7, 0, 1, 2]</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="34" text-anchor="middle">
    <rect x="90" y="280" width="120" height="90" rx="10" fill="#334155"/><text x="150" y="337" fill="#e2e8f0">4</text>
    <rect x="220" y="280" width="120" height="90" rx="10" fill="#334155"/><text x="280" y="337" fill="#e2e8f0">5</text>
    <rect x="350" y="280" width="120" height="90" rx="10" fill="#334155"/><text x="410" y="337" fill="#e2e8f0">6</text>
    <rect x="480" y="280" width="120" height="90" rx="10" fill="#334155"/><text x="540" y="337" fill="#e2e8f0">7</text>
    <rect x="610" y="280" width="120" height="90" rx="10" fill="#166534" stroke="#22c55e" stroke-width="3"/><text x="670" y="337" fill="#dcfce7">0</text>
    <rect x="740" y="280" width="120" height="90" rx="10" fill="#334155"/><text x="800" y="337" fill="#e2e8f0">1</text>
    <rect x="870" y="280" width="120" height="90" rx="10" fill="#334155"/><text x="930" y="337" fill="#e2e8f0">2</text>
  </g>

  <path d="M540 390 L540 460" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M930 390 L930 460" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#e5e7eb"/>
    </marker>
  </defs>

  <text x="540" y="495" fill="#38bdf8" font-size="22" font-family="Inter,Arial,sans-serif" text-anchor="middle">mid=7</text>
  <text x="930" y="495" fill="#f59e0b" font-size="22" font-family="Inter,Arial,sans-serif" text-anchor="middle">right=2</text>
  <text x="90" y="525" fill="#e5e7eb" font-size="22" font-family="Inter,Arial,sans-serif">Rule: if nums[mid] &gt; nums[right], minimum is on the right side.</text>
  <text x="90" y="560" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
