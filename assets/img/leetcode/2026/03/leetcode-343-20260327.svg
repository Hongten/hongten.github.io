<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 343 integer break DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 343 · Integer Break</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">DP over first cut j: dp[i] = max(j*(i-j), j*dp[i-j])</text>

  <rect x="70" y="180" width="1060" height="390" rx="18" fill="#1f2937" stroke="#374151"/>

  <circle cx="220" cy="320" r="55" fill="#2563eb"/>
  <text x="193" y="328" fill="#ffffff" font-size="32" font-family="Inter,Arial,sans-serif">i</text>

  <line x1="275" y1="300" x2="430" y2="250" stroke="#86efac" stroke-width="4"/>
  <line x1="275" y1="340" x2="430" y2="390" stroke="#fca5a5" stroke-width="4"/>

  <rect x="430" y="210" width="250" height="90" rx="12" fill="#065f46"/>
  <text x="455" y="265" fill="#d1fae5" font-size="28" font-family="Inter,Arial,sans-serif">j · (i - j)</text>

  <rect x="430" y="350" width="290" height="90" rx="12" fill="#7f1d1d"/>
  <text x="455" y="405" fill="#fee2e2" font-size="28" font-family="Inter,Arial,sans-serif">j · dp[i - j]</text>

  <rect x="780" y="275" width="280" height="110" rx="14" fill="#312e81"/>
  <text x="812" y="322" fill="#c7d2fe" font-size="30" font-family="Inter,Arial,sans-serif">take max</text>
  <text x="812" y="356" fill="#c7d2fe" font-size="30" font-family="Inter,Arial,sans-serif">→ dp[i]</text>

  <text x="60" y="605" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second, full 5-language tabs</text>
</svg>
