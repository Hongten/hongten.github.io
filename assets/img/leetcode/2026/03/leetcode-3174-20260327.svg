<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3174 stack simulation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:28px;font-weight:700}
      .s{font-size:22px}
      .k{fill:#38bdf8}
      .p{fill:#22c55e}
      .d{fill:#f97316}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 3174 · Clear Digits</text>
  <text x="60" y="130" class="t s">Stack-style backspace simulation</text>

  <rect x="60" y="180" width="1080" height="360" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="230" class="t s">Input: <tspan class="k">a b c 1 d 2 e f 3</tspan></text>

  <text x="90" y="290" class="t s">Read a,b,c → push: <tspan class="p">[a,b,c]</tspan></text>
  <text x="90" y="340" class="t s">Read 1 → pop one: <tspan class="d">[a,b]</tspan></text>
  <text x="90" y="390" class="t s">Read d,2 → push d then pop: <tspan class="d">[a,b]</tspan></text>
  <text x="90" y="440" class="t s">Read e,f,3 → push e,f then pop: <tspan class="p">[a,b,e]</tspan></text>
  <text x="90" y="500" class="t s">Result = <tspan class="k">"abe"</tspan></text>
</svg>
