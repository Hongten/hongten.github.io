<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 137 bit counting modulo 3 diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="88" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 137 · Single Number II</text>
  <text x="52" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Bit counting at each position, then modulo 3</text>

  <rect x="52" y="172" width="1096" height="390" rx="16" fill="#1f2937" stroke="#374151"/>

  <text x="82" y="220" fill="#f9fafb" font-size="24" font-family="monospace">nums = [2, 2, 2, 5]</text>
  <text x="82" y="260" fill="#f9fafb" font-size="24" font-family="monospace">binary:</text>
  <text x="82" y="298" fill="#cbd5e1" font-size="22" font-family="monospace">2 = 0010</text>
  <text x="82" y="334" fill="#cbd5e1" font-size="22" font-family="monospace">2 = 0010</text>
  <text x="82" y="370" fill="#cbd5e1" font-size="22" font-family="monospace">2 = 0010</text>
  <text x="82" y="406" fill="#86efac" font-size="22" font-family="monospace">5 = 0101  ← unique</text>

  <line x1="480" y1="244" x2="480" y2="520" stroke="#4b5563" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="520" y="260" fill="#f9fafb" font-size="22" font-family="monospace">bit sums: [1,3,1,0]</text>
  <text x="520" y="302" fill="#f9fafb" font-size="22" font-family="monospace">mod 3   : [1,0,1,0]</text>
  <text x="520" y="344" fill="#fde68a" font-size="22" font-family="monospace">result  : 0101 (5)</text>

  <text x="520" y="404" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Rule:</text>
  <text x="580" y="404" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">remainder after %3 at each bit belongs to the single number.</text>
  <text x="520" y="442" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Complexity:</text>
  <text x="638" y="442" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">O(32n) time, O(1) extra space.</text>

  <text x="52" y="600" fill="#9ca3af" font-size="18" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
