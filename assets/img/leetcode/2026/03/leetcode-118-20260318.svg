<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 118 Pascal triangle row transition diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2238"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 118 · Pascal's Triangle</text>
  <text x="56" y="132" fill="#a5b4fc" font-size="26" font-family="Inter,Arial,sans-serif">Row-by-row transition: row[j] = prev[j-1] + prev[j]</text>

  <g transform="translate(170,200)" font-family="JetBrains Mono,Consolas,monospace" font-size="28" fill="#f8fafc" text-anchor="middle">
    <text x="300" y="0">1</text>
    <text x="240" y="60">1</text><text x="360" y="60">1</text>
    <text x="180" y="120">1</text><text x="300" y="120">2</text><text x="420" y="120">1</text>
    <text x="120" y="180">1</text><text x="240" y="180">3</text><text x="360" y="180">3</text><text x="480" y="180">1</text>
    <text x="60" y="240">1</text><text x="180" y="240">4</text><text x="300" y="240">6</text><text x="420" y="240">4</text><text x="540" y="240">1</text>
  </g>

  <g stroke="#60a5fa" stroke-width="3" fill="none" opacity="0.8">
    <path d="M470 320 L530 380"/>
    <path d="M590 320 L530 380"/>
  </g>
  <text x="538" y="405" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">2 + 1 = 3</text>

  <rect x="56" y="530" width="380" height="52" rx="12" fill="#111827" stroke="#374151"/>
  <text x="80" y="564" fill="#f3f4f6" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
