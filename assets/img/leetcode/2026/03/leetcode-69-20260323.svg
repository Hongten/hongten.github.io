<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 69 integer sqrt binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 69 · Sqrt(x)</text>
  <text x="60" y="136" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Binary Search on Integer Answer Space</text>

  <rect x="60" y="180" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="90" y="235" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Search range for x = 27</text>
  <line x1="120" y1="310" x2="1080" y2="310" stroke="#94a3b8" stroke-width="3"/>

  <circle cx="220" cy="310" r="11" fill="#22c55e"/>
  <text x="205" y="345" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">left</text>

  <circle cx="520" cy="310" r="12" fill="#38bdf8"/>
  <text x="495" y="345" fill="#7dd3fc" font-size="22" font-family="Inter,Arial,sans-serif">mid=5</text>
  <text x="465" y="378" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">5 ≤ 27/5 ✓</text>

  <circle cx="860" cy="310" r="11" fill="#f59e0b"/>
  <text x="840" y="345" fill="#fcd34d" font-size="22" font-family="Inter,Arial,sans-serif">right</text>

  <text x="90" y="430" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: largest feasible k with k ≤ x / k</text>
  <text x="90" y="468" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Avoid overflow: compare k and x/k, not k*k and x</text>

  <text x="90" y="525" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Answer for 27: 5</text>
  <text x="980" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
