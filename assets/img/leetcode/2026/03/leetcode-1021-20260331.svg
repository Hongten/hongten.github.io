<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1021 primitive decomposition diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1021: Remove Outermost Parentheses</text>
  <text x="60" y="140" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Primitive decomposition + depth filter</text>

  <rect x="60" y="190" width="1080" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="245" fill="#f8fafc" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Input:  (()())(())</text>

  <text x="90" y="300" fill="#a7f3d0" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Primitive 1: ( ()() )   -&gt; keep inner: ()()</text>
  <text x="90" y="345" fill="#a7f3d0" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Primitive 2: ( () )     -&gt; keep inner: ()</text>

  <line x1="90" y1="375" x2="1110" y2="375" stroke="#334155"/>

  <text x="90" y="420" fill="#fca5a5" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Rule for '(' : append only if depth &gt; 0, then depth++</text>
  <text x="90" y="460" fill="#fca5a5" font-size="22" font-family="JetBrains Mono,Consolas,monospace">Rule for ')' : depth-- first, append only if depth &gt; 0</text>

  <text x="90" y="515" fill="#fde68a" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Output: ()()()</text>
  <text x="900" y="595" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
