<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 166 recurring decimal remainder cycle diagram">
  <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 166: Fraction to Recurring Decimal</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Remainder Position Hashing</text>
  <rect x="70" y="210" width="1060" height="300" rx="16" fill="#111827" stroke="#374151"/>
  <text x="100" y="270" fill="#d1d5db" font-size="26" font-family="JetBrains Mono,Consolas,monospace">1 / 6 = 0.1(6)   |   4 / 333 = 0.(012)</text>
  <text x="100" y="330" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">map[remainder] = index where this remainder first appears</text>
  <text x="100" y="390" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">remainder repeats  =>  cycle starts at recorded index</text>
  <text x="100" y="450" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">insert '(' at first index, append ')' at the end</text>
  <text x="100" y="540" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Use long/int64 to avoid overflow on abs(Integer.MIN_VALUE).</text>
</svg>
