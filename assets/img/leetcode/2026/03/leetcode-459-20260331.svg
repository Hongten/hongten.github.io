<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 459 repeated substring pattern diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 459 · Repeated Substring Pattern</text>
  <rect x="60" y="130" width="1080" height="210" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="185" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">s = "ababab"</text>
  <text x="90" y="225" fill="#e5e7eb" font-size="24" font-family="monospace">[ab][ab][ab]</text>
  <text x="90" y="275" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">period = 2  (n = 6, repeat = 3)</text>
  <rect x="60" y="365" width="1080" height="200" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="420" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Doubling trick:</text>
  <text x="90" y="460" fill="#e5e7eb" font-size="22" font-family="monospace">t = s + s = "abababababab"</text>
  <text x="90" y="500" fill="#e5e7eb" font-size="22" font-family="monospace">mid = t[1:-1] = "bababababa"  contains s ✓</text>
  <text x="90" y="540" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · String / KMP</text>
</svg>
