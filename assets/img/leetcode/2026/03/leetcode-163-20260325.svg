<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 163 Missing Ranges diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 24px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .label{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 22px 'Consolas',monospace;fill:#f8fafc}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 163 · Missing Ranges</text>
  <text x="60" y="130" class="sub">Sentinel Boundary Scan: prev = lower-1, curr = nums[i]/upper+1</text>

  <line x1="100" y1="300" x2="1100" y2="300" stroke="#64748b" stroke-width="4"/>
  <circle cx="180" cy="300" r="10" fill="#22c55e"/>
  <circle cx="420" cy="300" r="10" fill="#22c55e"/>
  <circle cx="760" cy="300" r="10" fill="#22c55e"/>
  <circle cx="1020" cy="300" r="10" fill="#22c55e"/>

  <text x="152" y="345" class="txt">0</text>
  <text x="392" y="345" class="txt">1</text>
  <text x="732" y="345" class="txt">3</text>
  <text x="990" y="345" class="txt">50</text>

  <rect x="240" y="250" width="140" height="100" rx="14" fill="#7c3aed" opacity="0.75"/>
  <text x="265" y="310" class="label">2</text>

  <rect x="500" y="240" width="220" height="120" rx="14" fill="#7c3aed" opacity="0.75"/>
  <text x="540" y="310" class="label">4-&gt;49</text>

  <text x="60" y="470" class="sub">Example: nums = [0,1,3,50], lower = 0, upper = 99</text>
  <text x="60" y="510" class="sub">Missing ranges = ["2", "4-&gt;49", "51-&gt;99"]</text>
</svg>
