<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 99 Recover Binary Search Tree diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 99 · Recover Binary Search Tree</text>
  <text x="60" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Inorder should be sorted; find inversions then swap values</text>

  <rect x="52" y="170" width="1096" height="400" rx="20" fill="#111827" stroke="#334155"/>

  <g transform="translate(120,230)">
    <text x="0" y="0" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Broken inorder:</text>
    <text x="0" y="42" fill="#f1f5f9" font-size="30" font-family="JetBrains Mono,Consolas,monospace">1, 6, 3, 4, 5, 2, 7</text>

    <text x="0" y="112" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Inversions:</text>
    <text x="0" y="154" fill="#f1f5f9" font-size="28" font-family="JetBrains Mono,Consolas,monospace">6 &gt; 3   and   5 &gt; 2</text>

    <text x="0" y="224" fill="#fde68a" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Pick nodes:</text>
    <text x="0" y="266" fill="#f1f5f9" font-size="28" font-family="JetBrains Mono,Consolas,monospace">first = 6, second = 2</text>

    <text x="0" y="336" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Swap values → recovered inorder:</text>
    <text x="0" y="378" fill="#f1f5f9" font-size="30" font-family="JetBrains Mono,Consolas,monospace">1, 2, 3, 4, 5, 6, 7</text>
  </g>

  <text x="60" y="605" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN + 中文 · Java/Go/C++/Python/JavaScript tabs</text>
</svg>
