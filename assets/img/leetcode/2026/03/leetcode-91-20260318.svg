<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 91 Decode Ways dynamic programming transitions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 91 · Decode Ways</text>
  <text x="60" y="135" fill="#94a3b8" font-size="28" font-family="Arial, sans-serif">dp[i] = validOneDigit ? dp[i-1] : 0  +  validTwoDigits ? dp[i-2] : 0</text>

  <rect x="80" y="210" width="240" height="100" rx="14" fill="#1d4ed8" opacity="0.95"/>
  <text x="110" y="250" fill="#ffffff" font-size="28" font-family="Arial, sans-serif">dp[i-2]</text>
  <text x="110" y="285" fill="#bfdbfe" font-size="22" font-family="Arial, sans-serif">two digits 10..26</text>

  <rect x="480" y="210" width="240" height="100" rx="14" fill="#0ea5e9" opacity="0.95"/>
  <text x="510" y="250" fill="#ffffff" font-size="28" font-family="Arial, sans-serif">dp[i-1]</text>
  <text x="510" y="285" fill="#dbeafe" font-size="22" font-family="Arial, sans-serif">one digit 1..9</text>

  <rect x="880" y="210" width="240" height="100" rx="14" fill="#16a34a" opacity="0.95"/>
  <text x="930" y="250" fill="#ffffff" font-size="32" font-family="Arial, sans-serif" font-weight="700">dp[i]</text>
  <text x="930" y="285" fill="#dcfce7" font-size="22" font-family="Arial, sans-serif">ways for prefix</text>

  <line x1="320" y1="260" x2="480" y2="260" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="720" y1="260" x2="880" y2="260" stroke="#38bdf8" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="80" y="390" width="1040" height="170" rx="16" fill="#111827" stroke="#334155"/>
  <text x="110" y="440" fill="#e5e7eb" font-size="28" font-family="Arial, sans-serif">Example: s = "226"</text>
  <text x="110" y="485" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">i=2: "2" valid, "22" valid  → dp[2] = dp[1] + dp[0] = 2</text>
  <text x="110" y="525" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">i=3: "6" valid, "26" valid  → dp[3] = dp[2] + dp[1] = 3</text>
</svg>
