<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 263 prime factor stripping diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="100" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 263: Ugly Number</text>

  <rect x="60" y="150" width="1080" height="420" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="100" y="215" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Prime factor stripping: only 2, 3, 5 are allowed</text>

  <rect x="100" y="250" width="1000" height="80" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="130" y="300" fill="#e5e7eb" font-size="28" font-family="monospace">n = 180  → ÷2 → 90 → ÷3 → 30 → ÷5 → 6 → ÷2 → 3 → ÷3 → 1 ✅</text>

  <rect x="100" y="350" width="1000" height="80" rx="10" fill="#111827" stroke="#4b5563"/>
  <text x="130" y="400" fill="#fca5a5" font-size="28" font-family="monospace">n = 14   → ÷2 → 7 (cannot ÷2/3/5 anymore, remains &gt; 1) ❌</text>

  <text x="100" y="490" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif">Rule: after removing all 2/3/5 factors, result must be exactly 1</text>
  <text x="100" y="535" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文随后</text>
</svg>
