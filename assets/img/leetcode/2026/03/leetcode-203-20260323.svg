<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 203 remove linked list elements diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 203 · Remove Linked List Elements</text>
  <text x="56" y="132" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Dummy head + one pass pointer rewiring</text>

  <rect x="56" y="180" width="1088" height="390" rx="20" fill="#111827" stroke="#374151"/>

  <text x="95" y="240" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">val = 6</text>

  <rect x="95" y="280" width="120" height="60" rx="10" fill="#1f2937" stroke="#86efac"/>
  <text x="124" y="317" fill="#86efac" font-size="26" font-family="monospace">dummy</text>

  <rect x="265" y="280" width="90" height="60" rx="10" fill="#1f2937" stroke="#93c5fd"/>
  <text x="303" y="317" fill="#e5e7eb" font-size="28" font-family="monospace">1</text>

  <rect x="420" y="280" width="90" height="60" rx="10" fill="#7f1d1d" stroke="#fca5a5"/>
  <text x="458" y="317" fill="#fee2e2" font-size="28" font-family="monospace">6</text>

  <rect x="575" y="280" width="90" height="60" rx="10" fill="#7f1d1d" stroke="#fca5a5"/>
  <text x="613" y="317" fill="#fee2e2" font-size="28" font-family="monospace">6</text>

  <rect x="730" y="280" width="90" height="60" rx="10" fill="#1f2937" stroke="#93c5fd"/>
  <text x="768" y="317" fill="#e5e7eb" font-size="28" font-family="monospace">3</text>

  <line x1="215" y1="310" x2="265" y2="310" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="355" y1="310" x2="420" y2="310" stroke="#fca5a5" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="510" y1="310" x2="575" y2="310" stroke="#fca5a5" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="665" y1="310" x2="730" y2="310" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="95" y="405" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">When cur.next.val == val:</text>
  <text x="95" y="445" fill="#93c5fd" font-size="26" font-family="monospace">cur.next = cur.next.next</text>

  <line x1="310" y1="485" x2="730" y2="485" stroke="#86efac" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="360" y="470" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">skip removed nodes</text>

  <text x="860" y="520" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
