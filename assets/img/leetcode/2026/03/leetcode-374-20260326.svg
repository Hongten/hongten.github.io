<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 374 binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:3;rx:14}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .hint{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .arrow{stroke:#94a3b8;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" class="title">LeetCode 374 · Guess Number Higher or Lower</text>
  <text x="70" y="128" class="sub">Binary search by interpreting API feedback: -1 / 1 / 0</text>

  <rect x="90" y="210" width="300" height="120" class="box"/>
  <text x="125" y="258" class="txt">mid = (l + r) / 2</text>
  <text x="132" y="292" class="hint">call guess(mid)</text>

  <rect x="450" y="130" width="300" height="120" class="box"/>
  <text x="520" y="178" class="txt">guess(mid) = -1</text>
  <text x="520" y="212" class="hint">too high → r = mid - 1</text>

  <rect x="450" y="280" width="300" height="120" class="box"/>
  <text x="520" y="328" class="txt">guess(mid) = 1</text>
  <text x="520" y="362" class="hint">too low → l = mid + 1</text>

  <rect x="450" y="430" width="300" height="120" class="box"/>
  <text x="520" y="478" class="txt">guess(mid) = 0</text>
  <text x="548" y="512" class="hint">found answer</text>

  <line x1="390" y1="250" x2="450" y2="190" class="arrow"/>
  <line x1="390" y1="270" x2="450" y2="340" class="arrow"/>
  <line x1="390" y1="290" x2="450" y2="490" class="arrow"/>

  <text x="810" y="260" class="sub">Search space halves each step</text>
  <text x="810" y="305" class="sub">Time: O(log n) · Space: O(1)</text>
</svg>
