<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 733 Flood Fill diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="86" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 733 · Flood Fill</text>
  <text x="56" y="124" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">DFS/BFS region recoloring with 4-direction adjacency</text>

  <g transform="translate(60,170)">
    <rect x="0" y="0" width="500" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
    <text x="20" y="34" fill="#d1d5db" font-size="22" font-family="Inter,Arial,sans-serif">Before</text>

    <g transform="translate(40,70)">
      <rect x="0" y="0" width="70" height="70" fill="#60a5fa"/>
      <rect x="70" y="0" width="70" height="70" fill="#60a5fa"/>
      <rect x="140" y="0" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="0" width="70" height="70" fill="#9ca3af"/>
      <rect x="0" y="70" width="70" height="70" fill="#60a5fa"/>
      <rect x="70" y="70" width="70" height="70" fill="#60a5fa"/>
      <rect x="140" y="70" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="70" width="70" height="70" fill="#f59e0b"/>
      <rect x="0" y="140" width="70" height="70" fill="#9ca3af"/>
      <rect x="70" y="140" width="70" height="70" fill="#60a5fa"/>
      <rect x="140" y="140" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="140" width="70" height="70" fill="#f59e0b"/>
      <rect x="0" y="210" width="70" height="70" fill="#9ca3af"/>
      <rect x="70" y="210" width="70" height="70" fill="#9ca3af"/>
      <rect x="140" y="210" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="210" width="70" height="70" fill="#f59e0b"/>
      <circle cx="35" cy="35" r="16" fill="none" stroke="#22c55e" stroke-width="4"/>
      <text x="300" y="40" fill="#22c55e" font-size="18" font-family="Inter,Arial,sans-serif">start (0,0)</text>
      <text x="300" y="70" fill="#cbd5e1" font-size="18" font-family="Inter,Arial,sans-serif">oldColor = blue</text>
    </g>
  </g>

  <g transform="translate(640,170)">
    <rect x="0" y="0" width="500" height="360" rx="16" fill="#1f2937" stroke="#374151"/>
    <text x="20" y="34" fill="#d1d5db" font-size="22" font-family="Inter,Arial,sans-serif">After (newColor = green)</text>

    <g transform="translate(40,70)">
      <rect x="0" y="0" width="70" height="70" fill="#22c55e"/>
      <rect x="70" y="0" width="70" height="70" fill="#22c55e"/>
      <rect x="140" y="0" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="0" width="70" height="70" fill="#9ca3af"/>
      <rect x="0" y="70" width="70" height="70" fill="#22c55e"/>
      <rect x="70" y="70" width="70" height="70" fill="#22c55e"/>
      <rect x="140" y="70" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="70" width="70" height="70" fill="#f59e0b"/>
      <rect x="0" y="140" width="70" height="70" fill="#9ca3af"/>
      <rect x="70" y="140" width="70" height="70" fill="#22c55e"/>
      <rect x="140" y="140" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="140" width="70" height="70" fill="#f59e0b"/>
      <rect x="0" y="210" width="70" height="70" fill="#9ca3af"/>
      <rect x="70" y="210" width="70" height="70" fill="#9ca3af"/>
      <rect x="140" y="210" width="70" height="70" fill="#9ca3af"/>
      <rect x="210" y="210" width="70" height="70" fill="#f59e0b"/>
      <text x="300" y="40" fill="#22c55e" font-size="18" font-family="Inter,Arial,sans-serif">only connected blue cells changed</text>
      <text x="300" y="70" fill="#cbd5e1" font-size="18" font-family="Inter,Arial,sans-serif">4-direction traversal</text>
    </g>
  </g>
