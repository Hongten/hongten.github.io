<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 415 add strings carry simulation diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 415 · Add Strings</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Right-to-left digit simulation with carry</text>

  <rect x="56" y="180" width="1088" height="380" rx="18" fill="#111827" stroke="#374151"/>

  <text x="120" y="255" fill="#d1d5db" font-size="38" font-family="JetBrains Mono,Consolas,monospace">num1:  4 5 6 7</text>
  <text x="120" y="305" fill="#d1d5db" font-size="38" font-family="JetBrains Mono,Consolas,monospace">num2:    8 9 5</text>
  <line x1="120" y1="322" x2="580" y2="322" stroke="#9ca3af" stroke-width="2"/>
  <text x="120" y="370" fill="#86efac" font-size="38" font-family="JetBrains Mono,Consolas,monospace">sum :  5 4 6 2</text>

  <text x="700" y="250" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Step (right → left):</text>
  <text x="700" y="295" fill="#e5e7eb" font-size="25" font-family="Inter,Arial,sans-serif">7 + 5 + c0 = 12  → write 2, carry 1</text>
  <text x="700" y="335" fill="#e5e7eb" font-size="25" font-family="Inter,Arial,sans-serif">6 + 9 + c1 = 16  → write 6, carry 1</text>
  <text x="700" y="375" fill="#e5e7eb" font-size="25" font-family="Inter,Arial,sans-serif">5 + 8 + c1 = 14  → write 4, carry 1</text>
  <text x="700" y="415" fill="#e5e7eb" font-size="25" font-family="Inter,Arial,sans-serif">4 + 0 + c1 = 5   → write 5, carry 0</text>

  <text x="700" y="485" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Invariant: processed suffix is always correct.</text>
  <text x="700" y="520" fill="#fcd34d" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
