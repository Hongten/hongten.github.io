<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 412 Fizz Buzz divisibility decision diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="96" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 412: Fizz Buzz</text>
  <text x="60" y="142" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Rule order: 15 first, then 3, then 5</text>

  <rect x="80" y="190" width="250" height="90" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="112" y="244" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">i = 1..n</text>

  <rect x="410" y="190" width="260" height="90" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="450" y="244" fill="#f9fafb" font-size="30" font-family="Inter,Arial,sans-serif">i % 15 == 0?</text>

  <rect x="760" y="120" width="330" height="80" rx="14" fill="#065f46" stroke="#10b981"/>
  <text x="850" y="170" fill="#ecfdf5" font-size="30" font-family="Inter,Arial,sans-serif">append "FizzBuzz"</text>

  <rect x="760" y="230" width="330" height="80" rx="14" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="850" y="280" fill="#eff6ff" font-size="30" font-family="Inter,Arial,sans-serif">append "Fizz"</text>

  <rect x="760" y="340" width="330" height="80" rx="14" fill="#78350f" stroke="#f59e0b"/>
  <text x="850" y="390" fill="#fffbeb" font-size="30" font-family="Inter,Arial,sans-serif">append "Buzz"</text>

  <rect x="760" y="450" width="330" height="80" rx="14" fill="#374151" stroke="#9ca3af"/>
  <text x="855" y="500" fill="#f3f4f6" font-size="30" font-family="Inter,Arial,sans-serif">append number</text>

  <rect x="410" y="300" width="260" height="76" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="450" y="348" fill="#f9fafb" font-size="27" font-family="Inter,Arial,sans-serif">else i % 3 == 0?</text>

  <rect x="410" y="410" width="260" height="76" rx="14" fill="#1f2937" stroke="#374151"/>
  <text x="450" y="458" fill="#f9fafb" font-size="27" font-family="Inter,Arial,sans-serif">else i % 5 == 0?</text>

  <path d="M330 235 L410 235" stroke="#9ca3af" stroke-width="4" fill="none"/>
  <path d="M670 235 L760 160" stroke="#10b981" stroke-width="4" fill="none"/>
  <path d="M670 235 L670 338 L760 270" stroke="#60a5fa" stroke-width="4" fill="none"/>
  <path d="M670 338 L760 380" stroke="#f59e0b" stroke-width="4" fill="none"/>
  <path d="M670 448 L760 490" stroke="#9ca3af" stroke-width="4" fill="none"/>

  <text x="70" y="590" fill="#86efac" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
