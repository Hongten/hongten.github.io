<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 454 pair-sum hash counting diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 454 · 4Sum II</text>
  <text x="60" y="135" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Pair-Sum Hash Counting (Meet-in-the-Middle)</text>

  <rect x="60" y="180" width="500" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="225" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">nums1 + nums2</text>
  <text x="90" y="270" fill="#d1fae5" font-size="24" font-family="Inter,Arial,sans-serif">build frequency map:</text>
  <text x="90" y="305" fill="#e5e7eb" font-size="22" font-family="monospace">sumAB -&gt; count</text>
  <text x="90" y="350" fill="#c7d2fe" font-size="22" font-family="monospace">-1 : 2</text>
  <text x="90" y="385" fill="#c7d2fe" font-size="22" font-family="monospace"> 0 : 3</text>
  <text x="90" y="420" fill="#c7d2fe" font-size="22" font-family="monospace"> 2 : 1</text>

  <rect x="640" y="180" width="500" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="670" y="225" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">nums3 + nums4</text>
  <text x="670" y="270" fill="#d1fae5" font-size="24" font-family="Inter,Arial,sans-serif">for each sumCD, lookup</text>
  <text x="670" y="305" fill="#e5e7eb" font-size="24" font-family="monospace">countAB[-sumCD]</text>
  <text x="670" y="355" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">accumulate all matches</text>
  <text x="670" y="395" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Total tuples = answer</text>

  <path d="M560 360 L640 360" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="60" y="590" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
