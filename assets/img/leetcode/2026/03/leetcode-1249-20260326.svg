  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e6edf3" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 1249 · Minimum Remove to Make Valid Parentheses</text>
  <rect x="60" y="140" width="1080" height="130" rx="18" fill="#111a2c" stroke="#3b82f6"/>
