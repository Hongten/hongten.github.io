<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 88 merge sorted array back-pointer diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{fill:#e5e7eb;font:700 44px Inter,Arial,sans-serif}
      .label{fill:#93c5fd;font:600 28px Inter,Arial,sans-serif}
      .txt{fill:#d1d5db;font:500 24px Inter,Arial,sans-serif}
      .cell{fill:#1f2937;stroke:#4b5563;stroke-width:2}
      .good{fill:#22c55e;font:700 24px Inter,Arial,sans-serif}
      .ptr{fill:#f59e0b;font:700 24px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="72" class="title">LeetCode 88: Merge Sorted Array</text>
  <text x="48" y="114" class="label">Two pointers from the back avoid overwrite</text>

  <g transform="translate(60,170)">
    <text x="0" y="-20" class="txt">nums1 (m valid + n buffer): [1, 2, 3, 0, 0, 0]</text>
    <rect class="cell" x="0" y="0" width="150" height="70" rx="10"/><rect class="cell" x="160" y="0" width="150" height="70" rx="10"/><rect class="cell" x="320" y="0" width="150" height="70" rx="10"/><rect class="cell" x="480" y="0" width="150" height="70" rx="10"/><rect class="cell" x="640" y="0" width="150" height="70" rx="10"/><rect class="cell" x="800" y="0" width="150" height="70" rx="10"/>
    <text x="70" y="45" class="txt">1</text><text x="230" y="45" class="txt">2</text><text x="390" y="45" class="txt">3</text><text x="550" y="45" class="txt">0</text><text x="710" y="45" class="txt">0</text><text x="870" y="45" class="txt">0</text>
    <text x="330" y="98" class="ptr">i</text><text x="810" y="98" class="ptr">k</text>

    <text x="0" y="165" class="txt">nums2: [2, 5, 6]</text>
    <rect class="cell" x="0" y="185" width="150" height="70" rx="10"/><rect class="cell" x="160" y="185" width="150" height="70" rx="10"/><rect class="cell" x="320" y="185" width="150" height="70" rx="10"/>
    <text x="70" y="230" class="txt">2</text><text x="230" y="230" class="txt">5</text><text x="390" y="230" class="txt">6</text>
    <text x="380" y="284" class="ptr">j</text>
  </g>

  <text x="60" y="550" class="good">Compare nums1[i] vs nums2[j], place larger at nums1[k], move pointer left.</text>
</svg>