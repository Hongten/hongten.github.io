<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 463 Island Perimeter diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2238"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="92" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 463 · Island Perimeter</text>
  <text x="56" y="132" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Perimeter = 4 × land cells − 2 × shared borders</text>

  <g transform="translate(90,185)">
    <rect x="0" y="0" width="440" height="360" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="36" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">Example Grid</text>

    <g transform="translate(20,56)" font-family="Inter,Arial,sans-serif" font-size="20" text-anchor="middle" dominant-baseline="middle">
      <rect x="0" y="0" width="72" height="72" fill="#1e293b" stroke="#334155"/>
      <rect x="72" y="0" width="72" height="72" fill="#22c55e" stroke="#14532d"/>
      <rect x="144" y="0" width="72" height="72" fill="#1e293b" stroke="#334155"/>
      <rect x="216" y="0" width="72" height="72" fill="#1e293b" stroke="#334155"/>

      <rect x="0" y="72" width="72" height="72" fill="#22c55e" stroke="#14532d"/>
      <rect x="72" y="72" width="72" height="72" fill="#22c55e" stroke="#14532d"/>
      <rect x="144" y="72" width="72" height="72" fill="#22c55e" stroke="#14532d"/>
      <rect x="216" y="72" width="72" height="72" fill="#1e293b" stroke="#334155"/>

      <rect x="0" y="144" width="72" height="72" fill="#1e293b" stroke="#334155"/>
      <rect x="72" y="144" width="72" height="72" fill="#22c55e" stroke="#14532d"/>
      <rect x="144" y="144" width="72" height="72" fill="#1e293b" stroke="#334155"/>
      <rect x="216" y="144" width="72" height="72" fill="#1e293b" stroke="#334155"/>

      <rect x="0" y="216" width="72" height="72" fill="#1e293b" stroke="#334155"/>
      <rect x="72" y="216" width="72" height="72" fill="#22c55e" stroke="#14532d"/>
      <rect x="144" y="216" width="72" height="72" fill="#1e293b" stroke="#334155"/>
      <rect x="216" y="216" width="72" height="72" fill="#1e293b" stroke="#334155"/>
    </g>
  </g>

  <g transform="translate(570,185)">
    <rect x="0" y="0" width="550" height="360" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="24" y="50" fill="#f8fafc" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Counting Method</text>
    <text x="24" y="98" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">land = 7</text>
    <text x="24" y="138" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">shared borders = 6</text>
    <text x="24" y="198" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="700">perimeter = 4 × 7 − 2 × 6 = 16</text>
    <text x="24" y="250" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Only check up + left neighbors while scanning.</text>
    <text x="24" y="292" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">Each shared edge is counted exactly once.</text>
    <text x="24" y="332" fill="#fda4af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
  </g>
</svg>
