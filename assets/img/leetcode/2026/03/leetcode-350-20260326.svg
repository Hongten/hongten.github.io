<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 350 frequency map matching">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="84" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 350 · Intersection of Two Arrays II</text>
  <text x="50" y="124" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Count frequencies, then consume matches</text>

  <rect x="70" y="180" width="460" height="340" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="95" y="220" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">nums1 counts</text>
  <text x="95" y="270" fill="#86efac" font-size="28" font-family="monospace">1 -&gt; 2</text>
  <text x="95" y="315" fill="#86efac" font-size="28" font-family="monospace">2 -&gt; 1</text>
  <text x="95" y="360" fill="#86efac" font-size="28" font-family="monospace">3 -&gt; 1</text>

  <rect x="670" y="180" width="460" height="340" rx="16" fill="#1f2937" stroke="#334155"/>
  <text x="695" y="220" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">scan nums2</text>
  <text x="695" y="270" fill="#fcd34d" font-size="28" font-family="monospace">2 ✓  (2 -&gt; 0)</text>
  <text x="695" y="315" fill="#fcd34d" font-size="28" font-family="monospace">1 ✓  (1 -&gt; 1)</text>
  <text x="695" y="360" fill="#fcd34d" font-size="28" font-family="monospace">1 ✓  (1 -&gt; 0)</text>
  <text x="695" y="405" fill="#fca5a5" font-size="28" font-family="monospace">1 ✗  (count=0)</text>

  <line x1="530" y1="330" x2="670" y2="330" stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>

  <text x="50" y="585" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Result example: [2,1,1]   ·   Author: Tom🦞</text>
</svg>
