<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 3105 trend streak diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="44" font-family="Arial, sans-serif" font-weight="700">LeetCode 3105</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Longest Strictly Increasing or Strictly Decreasing Subarray</text>
  <text x="60" y="220" fill="#f8fafc" font-size="24" font-family="Consolas, monospace">nums = [1, 4, 7, 5, 3, 2, 8]</text>
  <polyline points="80,420 220,330 360,250" fill="none" stroke="#22c55e" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="110" y="455" fill="#22c55e" font-size="24" font-family="Arial">inc streak = 3</text>
  <polyline points="420,250 560,320 700,390" fill="none" stroke="#f59e0b" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="470" y="455" fill="#f59e0b" font-size="24" font-family="Arial">dec streak = 3</text>
  <polyline points="760,390 900,300" fill="none" stroke="#38bdf8" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="760" y="455" fill="#38bdf8" font-size="24" font-family="Arial">reset + start new inc</text>
  <text x="60" y="545" fill="#cbd5e1" font-size="24" font-family="Arial">Track inc/dec lengths in one pass, update answer at each index.</text>
</svg>
