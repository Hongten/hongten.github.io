<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2574 left and right sum differences diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 26px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .label{font:600 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .num{font:700 30px 'Consolas','Menlo',monospace;fill:#f8fafc}
      .small{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
      .badge{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="86" class="title">LeetCode 2574 · Left and Right Sum Differences</text>
  <text x="60" y="126" class="sub">Prefix sum + Total sum (single pass)</text>

  <rect x="60" y="170" width="1080" height="340" rx="20" fill="#0b1220" stroke="#334155"/>

  <text x="100" y="230" class="label">nums:</text>
  <rect x="190" y="198" width="90" height="52" rx="10" fill="#1d4ed8"/><text x="222" y="232" class="num">10</text>
  <rect x="300" y="198" width="90" height="52" rx="10" fill="#0ea5e9"/><text x="334" y="232" class="num">4</text>
  <rect x="410" y="198" width="90" height="52" rx="10" fill="#0ea5e9"/><text x="444" y="232" class="num">8</text>
  <rect x="520" y="198" width="90" height="52" rx="10" fill="#0ea5e9"/><text x="554" y="232" class="num">3</text>

  <text x="100" y="302" class="label">i = 1 (nums[i] = 4)</text>
  <text x="100" y="346" class="small">leftSum = 10</text>
  <text x="330" y="346" class="small">rightSum = total(25) - left(10) - nums[i](4) = 11</text>
  <text x="100" y="390" class="small">answer[i] = |leftSum - rightSum| = |10 - 11| = 1</text>

  <rect x="100" y="424" width="420" height="60" rx="12" fill="#22c55e"/>
  <text x="128" y="463" class="badge">Core formula: right = total - left - nums[i]</text>

  <text x="60" y="575" class="small">Author: Tom🦞 · EN + 中文 bilingual solution with 5-language tabs</text>
</svg>