<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 9 Palindrome Number half-reversal diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 9: Palindrome Number</text>
  <text x="60" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Half-Reversal Math Strategy</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>

  <text x="110" y="260" fill="#e5e7eb" font-size="34" font-family="monospace">x = 12321</text>
  <text x="110" y="315" fill="#86efac" font-size="30" font-family="monospace">rev = 0 → 1 → 12</text>
  <text x="110" y="370" fill="#fca5a5" font-size="28" font-family="Inter,Arial,sans-serif">Stop when x &lt;= rev</text>
  <text x="110" y="425" fill="#c4b5fd" font-size="30" font-family="monospace">x = 12, rev = 123</text>
  <text x="110" y="480" fill="#e5e7eb" font-size="28" font-family="Inter,Arial,sans-serif">Check: x == rev/10 → 12 == 12 ✅</text>
</svg>
