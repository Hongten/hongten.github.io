<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Greedy arrow placement for LeetCode 452">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .axis { stroke: #9fb3c8; stroke-width: 3; }
      .tick { stroke: #63748a; stroke-width: 2; }
      .label { fill: #dbe7f3; font: 18px monospace; }
      .title { fill: #f8fbff; font: 28px sans-serif; font-weight: 700; }
      .hint { fill: #a9bbcf; font: 17px sans-serif; }
      .int1 { fill: #5cc8ff; opacity: 0.85; }
      .int2 { fill: #7ee787; opacity: 0.85; }
      .int3 { fill: #f2cc60; opacity: 0.85; }
      .int4 { fill: #ff9aa2; opacity: 0.9; }
      .arrow { stroke: #ff6b6b; stroke-width: 5; }
      .arrowHead { fill: #ff6b6b; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="420" rx="16"/>
  <text class="title" x="40" y="52">LeetCode 452 · Sort by right endpoint, shoot greedily</text>
  <text class="hint" x="40" y="82">Place each new arrow at the smallest possible end to maximize future overlap.</text>

  <line class="axis" x1="80" y1="330" x2="1120" y2="330"/>
  <g>
    <line class="tick" x1="120" y1="320" x2="120" y2="340"/><text class="label" x="111" y="364">1</text>
    <line class="tick" x1="260" y1="320" x2="260" y2="340"/><text class="label" x="251" y="364">3</text>
    <line class="tick" x1="400" y1="320" x2="400" y2="340"/><text class="label" x="391" y="364">5</text>
    <line class="tick" x1="540" y1="320" x2="540" y2="340"/><text class="label" x="531" y="364">7</text>
    <line class="tick" x1="680" y1="320" x2="680" y2="340"/><text class="label" x="671" y="364">9</text>
    <line class="tick" x1="820" y1="320" x2="820" y2="340"/><text class="label" x="803" y="364">11</text>
    <line class="tick" x1="960" y1="320" x2="960" y2="340"/><text class="label" x="943" y="364">13</text>
  </g>

  <rect class="int1" x="120" y="130" width="420" height="28" rx="8"/>
  <text class="label" x="90" y="149">[1, 7]</text>

  <rect class="int2" x="220" y="180" width="320" height="28" rx="8"/>
  <text class="label" x="190" y="199">[2.5, 7]</text>

  <rect class="int3" x="360" y="230" width="300" height="28" rx="8"/>
  <text class="label" x="330" y="249">[4.5, 9]</text>

  <rect class="int4" x="740" y="140" width="220" height="28" rx="8"/>
  <text class="label" x="710" y="159">[10, 13]</text>

  <line class="arrow" x1="540" y1="90" x2="540" y2="300"/>
  <polygon class="arrowHead" points="540,78 532,94 548,94"/>
  <text class="label" x="555" y="110">Arrow #1 @ 7</text>

  <line class="arrow" x1="960" y1="90" x2="960" y2="300"/>
  <polygon class="arrowHead" points="960,78 952,94 968,94"/>
  <text class="label" x="975" y="110">Arrow #2 @ 13</text>
</svg>
