<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1047 stack elimination diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1047 · Remove Adjacent Duplicates</text>
  <text x="56" y="138" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Stack Simulation (Push if different, Pop if same as top)</text>

  <rect x="56" y="180" width="1088" height="380" rx="18" fill="#0f172a" stroke="#334155"/>

  <text x="84" y="230" fill="#cbd5e1" font-size="24" font-family="JetBrains Mono,Consolas,monospace">Input: abbaca</text>

  <text x="84" y="280" fill="#f8fafc" font-size="22" font-family="JetBrains Mono,Consolas,monospace">a  → [a]</text>
  <text x="84" y="320" fill="#f8fafc" font-size="22" font-family="JetBrains Mono,Consolas,monospace">b  → [a,b]</text>
  <text x="84" y="360" fill="#fca5a5" font-size="22" font-family="JetBrains Mono,Consolas,monospace">b  → pop b  => [a]</text>
  <text x="84" y="400" fill="#f8fafc" font-size="22" font-family="JetBrains Mono,Consolas,monospace">a  → pop a  => []</text>
  <text x="84" y="440" fill="#f8fafc" font-size="22" font-family="JetBrains Mono,Consolas,monospace">c  → [c]</text>
  <text x="84" y="480" fill="#f8fafc" font-size="22" font-family="JetBrains Mono,Consolas,monospace">a  → [c,a]</text>

  <text x="84" y="530" fill="#86efac" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Result: "ca"</text>
  <text x="860" y="530" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
