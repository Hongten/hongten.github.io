<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">LeetCode 149: Max Points on a Line</text>
  <text x="60" y="120" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Slope normalization (dy/dx) + gcd reduction + duplicate counting</text>

  <line x1="180" y1="500" x2="980" y2="180" stroke="#38bdf8" stroke-width="5"/>
  <circle cx="260" cy="468" r="11" fill="#f8fafc"/>
  <circle cx="380" cy="420" r="11" fill="#f8fafc"/>
  <circle cx="500" cy="372" r="11" fill="#f8fafc"/>
  <circle cx="620" cy="324" r="11" fill="#f8fafc"/>
  <circle cx="740" cy="276" r="11" fill="#f8fafc"/>
  <circle cx="860" cy="228" r="11" fill="#f8fafc"/>

  <circle cx="500" cy="372" r="16" fill="none" stroke="#f59e0b" stroke-width="4"/>
  <text x="525" y="366" fill="#fbbf24" font-size="22" font-family="Arial, sans-serif">anchor i</text>

  <line x1="500" y1="372" x2="740" y2="276" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="566" y="315" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">dy = -96, dx = 240</text>
  <text x="566" y="345" fill="#cbd5e1" font-size="20" font-family="Arial, sans-serif">normalize → (-2, 5)</text>

  <rect x="60" y="520" width="1080" height="72" rx="12" fill="#111827" stroke="#334155"/>
  <text x="90" y="565" fill="#e2e8f0" font-size="24" font-family="Arial, sans-serif">For each anchor: best = maxSameSlope + duplicates + 1</text>
</svg>
