<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 38 Count and Say diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 38: Count and Say</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Run-Length Encoding Simulation</text>
  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="255" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">n=1: 1</text>
  <text x="95" y="305" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">n=2: one 1       -&gt; 11</text>
  <text x="95" y="355" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">n=3: two 1s      -&gt; 21</text>
  <text x="95" y="405" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">n=4: one 2 one 1 -&gt; 1211</text>
  <text x="95" y="455" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">n=5: one 1 one 2 two 1s -&gt; 111221</text>
  <text x="95" y="515" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Scan consecutive groups, append count then digit.</text>
</svg>
