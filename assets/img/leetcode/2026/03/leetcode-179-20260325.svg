<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 179 comparator diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <style>
      .t{font-family:'Inter','Segoe UI',Arial,sans-serif;fill:#eaf2ff}
      .m{font-size:34px;font-weight:700}
      .s{font-size:24px;fill:#b7c8ea}
      .b{fill:#111a33;stroke:#7aa2ff;stroke-width:2}
      .k{font-size:28px;font-weight:700;fill:#9fe870}
      .w{font-size:24px;fill:#ffd166}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t m">LeetCode 179 · Largest Number</text>
  <text x="60" y="130" class="t s">Sort by comparing xy vs yx</text>

  <rect x="60" y="180" width="500" height="170" rx="16" class="b"/>
  <text x="90" y="240" class="t s">Compare x = "9", y = "34"</text>
  <text x="90" y="285" class="t k">xy = "934"</text>
  <text x="300" y="285" class="t w">&gt;</text>
  <text x="350" y="285" class="t k">yx = "349"</text>
  <text x="90" y="325" class="t s">So "9" should come before "34"</text>

  <rect x="640" y="180" width="500" height="170" rx="16" class="b"/>
  <text x="670" y="240" class="t s">After custom sort</text>
  <text x="670" y="285" class="t k">["9", "5", "34", "3", "30"]</text>
  <text x="670" y="325" class="t s">Join → "9534330"</text>

  <rect x="60" y="400" width="1080" height="150" rx="16" class="b"/>
  <text x="90" y="460" class="t s">Edge case: if first element is "0", all numbers are zero.</text>
  <text x="90" y="505" class="t k">Return "0" instead of "000..."</text>
</svg>
