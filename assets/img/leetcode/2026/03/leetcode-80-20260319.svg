<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 80 write pointer keeps at most two duplicates">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="80" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 80 · Remove Duplicates from Sorted Array II</text>
  <text x="50" y="120" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Invariant: keep x iff write &lt; 2 OR x != nums[write-2]</text>

  <g transform="translate(60,180)">
    <rect x="0" y="0" width="1080" height="340" rx="16" fill="#1f2937" stroke="#374151"/>

    <text x="30" y="55" fill="#e5e7eb" font-size="28" font-family="monospace">Input: [1, 1, 1, 2, 2, 3]</text>

    <g font-family="monospace" font-size="30">
      <rect x="30" y="90" width="90" height="70" fill="#111827" stroke="#4b5563"/><text x="63" y="136" fill="#f8fafc">1</text>
      <rect x="130" y="90" width="90" height="70" fill="#111827" stroke="#4b5563"/><text x="163" y="136" fill="#f8fafc">1</text>
      <rect x="230" y="90" width="90" height="70" fill="#111827" stroke="#4b5563"/><text x="263" y="136" fill="#f8fafc">1</text>
      <rect x="330" y="90" width="90" height="70" fill="#111827" stroke="#4b5563"/><text x="363" y="136" fill="#f8fafc">2</text>
      <rect x="430" y="90" width="90" height="70" fill="#111827" stroke="#4b5563"/><text x="463" y="136" fill="#f8fafc">2</text>
      <rect x="530" y="90" width="90" height="70" fill="#111827" stroke="#4b5563"/><text x="563" y="136" fill="#f8fafc">3</text>
    </g>

    <line x1="80" y1="200" x2="80" y2="160" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="40" y="235" fill="#34d399" font-size="22" font-family="Inter,Arial,sans-serif">write=0</text>

    <line x1="275" y1="215" x2="275" y2="165" stroke="#f87171" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="206" y="250" fill="#f87171" font-size="20" font-family="Inter,Arial,sans-serif">3rd '1' rejected</text>

    <text x="30" y="300" fill="#86efac" font-size="27" font-family="monospace">Output prefix (k=5): [1, 1, 2, 2, 3]</text>
  </g>

  <text x="60" y="585" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Two pointers · In-place overwrite · Author: Tom🦞</text>
</svg>
