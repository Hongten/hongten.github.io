<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Two Sum hash map flow">
  <defs>
    <style>
      .bg{fill:#0b1020}.card{fill:#121a33;stroke:#2d3b66;stroke-width:2}.txt{fill:#e8ecff;font-family:Arial,sans-serif}.muted{fill:#9fb0e8;font-family:Arial,sans-serif}.accent{fill:#55d6ff}.ok{fill:#58d68d}.warn{fill:#ffd166}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <text class="txt" x="50" y="58" font-size="34" font-weight="700">LeetCode 1 — Two Sum (Hash Map)</text>
  <text class="muted" x="50" y="90" font-size="20">nums = [2, 7, 11, 15], target = 9</text>

  <rect class="card" x="50" y="130" rx="14" ry="14" width="480" height="320"/>
  <text class="txt" x="80" y="175" font-size="24" font-weight="700">Scan Array</text>
  <text class="muted" x="80" y="215" font-size="20">i=0, x=2, need=7 → not found</text>
  <text class="muted" x="80" y="250" font-size="20">store (2 → 0)</text>
  <text class="muted" x="80" y="290" font-size="20">i=1, x=7, need=2 → found index 0</text>
  <text class="ok" x="80" y="330" font-size="22" font-weight="700">answer = [0, 1]</text>
  <text class="warn" x="80" y="370" font-size="18">Only one pass, O(n) time</text>

  <rect class="card" x="650" y="130" rx="14" ry="14" width="500" height="320"/>
  <text class="txt" x="680" y="175" font-size="24" font-weight="700">Hash Map (value → index)</text>
  <rect x="680" y="205" width="440" height="2" fill="#2d3b66"/>
  <text class="muted" x="700" y="245" font-size="22">2  → 0</text>
  <text class="muted" x="700" y="285" font-size="22">7  → 1</text>
  <text class="muted" x="700" y="325" font-size="22">11 → 2</text>
  <text class="muted" x="700" y="365" font-size="22">15 → 3</text>
  <text class="accent" x="700" y="415" font-size="18">Check complement before insert for safety</text>

  <path d="M540 280 L640 280" stroke="#55d6ff" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#55d6ff"/>
    </marker>
  </defs>
</svg>
