<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 97 Interleaving String DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 97 · Interleaving String</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">2D DP: dp[i][j] => s1[0..i) + s2[0..j) can form s3[0..i+j)</text>

  <rect x="60" y="190" width="540" height="360" rx="14" fill="#111827" stroke="#334155"/>
  <text x="80" y="225" fill="#a7f3d0" font-size="22" font-family="monospace">Transition:</text>
  <text x="80" y="258" fill="#cbd5e1" font-size="20" font-family="monospace">dp[i][j] = (dp[i-1][j] and s1[i-1] == s3[i+j-1])</text>
  <text x="80" y="290" fill="#cbd5e1" font-size="20" font-family="monospace">        or (dp[i][j-1] and s2[j-1] == s3[i+j-1])</text>

  <g transform="translate(690,205)">
    <rect x="0" y="0" width="420" height="320" rx="12" fill="#0f172a" stroke="#475569"/>
    <text x="20" y="36" fill="#f8fafc" font-size="22" font-family="Inter,Arial,sans-serif">DP Grid (True path)</text>
    <g font-family="monospace" font-size="22" fill="#e2e8f0">
      <text x="40" y="90">T</text><text x="120" y="90">T</text><text x="200" y="90">F</text><text x="280" y="90">F</text>
      <text x="40" y="150">T</text><text x="120" y="150">T</text><text x="200" y="150">T</text><text x="280" y="150">F</text>
      <text x="40" y="210">F</text><text x="120" y="210">T</text><text x="200" y="210">T</text><text x="280" y="210">T</text>
      <text x="40" y="270">F</text><text x="120" y="270">F</text><text x="200" y="270">T</text><text x="280" y="270">T</text>
    </g>
    <polyline points="50,82 50,142 130,142 130,202 210,202 210,262 290,262" fill="none" stroke="#22d3ee" stroke-width="5"/>
  </g>

  <text x="60" y="590" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
