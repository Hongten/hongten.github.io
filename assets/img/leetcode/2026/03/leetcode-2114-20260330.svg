<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2114 word count diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2114 — Count Spaces + 1</text>
  <rect x="60" y="140" width="1080" height="430" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="210" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Sentence: "alice and bob love leetcode"</text>
  <text x="95" y="265" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Spaces = 4  →  Words = 5</text>
  <text x="95" y="335" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Sentence: "i think so too"</text>
  <text x="95" y="390" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Spaces = 3  →  Words = 4</text>
  <text x="95" y="465" fill="#86efac" font-size="32" font-family="Inter,Arial,sans-serif" font-weight="700">Answer = max(5, 4, ...)</text>
  <text x="95" y="530" fill="#9ca3af" font-size="26" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
