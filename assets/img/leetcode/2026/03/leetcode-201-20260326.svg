<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 201 bitwise common prefix diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{fill:#e2e8f0;font-family:Arial,Helvetica,sans-serif}
      .h{fill:#f8fafc;font-size:42px;font-weight:700}
      .s{fill:#cbd5e1;font-size:27px}
      .m{fill:#93c5fd;font-size:30px;font-weight:700}
      .b{fill:#22d3ee;font-size:34px;font-weight:700}
      .k{fill:#facc15;font-size:28px;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="t h">LeetCode 201 · Bitwise AND of Numbers Range</text>
  <text x="60" y="140" class="t s">Keep only the common high-bit prefix</text>

  <rect x="60" y="190" width="1080" height="360" rx="18" fill="#0b1220" stroke="#334155"/>
  <text x="90" y="245" class="t m">Example: left = 26 (11010), right = 30 (11110)</text>
  <text x="90" y="295" class="t s">Shift 1: 11010 -> 1101, 11110 -> 1111</text>
  <text x="90" y="335" class="t s">Shift 2: 1101  -> 110,  1111  -> 111</text>
  <text x="90" y="375" class="t s">Shift 3: 110   -> 11,   111   -> 11   (meet at common prefix)</text>
  <text x="90" y="430" class="t b">Result = 11 &lt;&lt; 3 = 11000 (24)</text>
  <text x="90" y="485" class="t k">Any varying low bit in [left, right] becomes 0 in AND</text>
</svg>
