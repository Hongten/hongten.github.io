<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2264 Largest 3-Same-Digit Number in String diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="50" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2264 · Largest 3-Same-Digit Number in String</text>
  <text x="50" y="140" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Scan each length-3 window and keep the maximum repeated digit.</text>

  <rect x="50" y="190" width="1100" height="120" rx="16" fill="#111827" stroke="#374151"/>
  <text x="80" y="250" fill="#f9fafb" font-size="34" font-family="JetBrains Mono,Consolas,monospace">num = "6777133339"</text>
  <text x="80" y="300" fill="#a7f3d0" font-size="30" font-family="JetBrains Mono,Consolas,monospace">valid triplets: "777", "333"  →  answer: "777"</text>

  <rect x="50" y="350" width="520" height="220" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="80" y="400" fill="#e2e8f0" font-size="28" font-family="Inter,Arial,sans-serif">Invariant</text>
  <text x="80" y="445" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">best = max digit d seen in any "ddd" window</text>
  <text x="80" y="485" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">if no window exists, return empty string</text>
  <text x="80" y="525" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Time O(n), Space O(1)</text>

  <rect x="620" y="350" width="530" height="220" rx="16" fill="#111827" stroke="#334155"/>
  <text x="650" y="400" fill="#fef08a" font-size="28" font-family="Inter,Arial,sans-serif">Window Check</text>
  <text x="650" y="445" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">for i in [0 .. n-3]:</text>
  <text x="680" y="485" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">if num[i] == num[i+1] == num[i+2]</text>
  <text x="680" y="525" fill="#e5e7eb" font-size="24" font-family="JetBrains Mono,Consolas,monospace">best = max(best, num[i])</text>

  <text x="50" y="610" fill="#94a3b8" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
