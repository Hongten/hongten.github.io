<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 57 Insert Interval merge zones diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 57 · Insert Interval</text>
  <text x="56" y="128" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">One-pass split: Left (no overlap) · Merge zone · Right (no overlap)</text>

  <line x1="80" y1="250" x2="1120" y2="250" stroke="#64748b" stroke-width="4"/>
  <line x1="80" y1="380" x2="1120" y2="380" stroke="#64748b" stroke-width="4"/>

  <rect x="130" y="220" width="180" height="60" rx="10" fill="#1d4ed8"/>
  <text x="148" y="258" fill="#dbeafe" font-size="22" font-family="Inter,Arial,sans-serif">[1,2]</text>

  <rect x="360" y="220" width="280" height="60" rx="10" fill="#334155"/>
  <text x="378" y="258" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">[3,5]  [6,7]</text>

  <rect x="690" y="220" width="180" height="60" rx="10" fill="#334155"/>
  <text x="714" y="258" fill="#cbd5e1" font-size="22" font-family="Inter,Arial,sans-serif">[8,10]</text>

