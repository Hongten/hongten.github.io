  <text x="946" y="258" fill="#dbeafe" font-size="22" font-family="Inter,Arial,sans-serif">[12,16]</text>

  <rect x="430" y="345" width="520" height="70" rx="12" fill="#059669"/>
  <text x="452" y="390" fill="#ecfdf5" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Insert [4,8]  ⇒  merge to [3,10]</text>

  <text x="120" y="470" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Result: [1,2], [3,10], [12,16]</text>
  <text x="120" y="515" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Invariant: keep sorted order; merge only overlap zone.</text>
  <text x="120" y="560" fill="#fca5a5" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
