<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1207 frequency map and unique occurrence validation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#64748b;stroke-width:2;rx:16}
      .lbl{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:500 22px 'Consolas','SFMono-Regular',monospace;fill:#e5e7eb}
      .ok{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#34d399}
      .arrow{stroke:#94a3b8;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 1207 · Unique Number of Occurrences</text>
  <text x="60" y="130" class="sub">Frequency Map + Seen Set</text>

  <rect x="60" y="180" width="320" height="280" class="box"/>
  <text x="85" y="225" class="lbl">Input Array</text>
  <text x="85" y="275" class="txt">arr = [1,2,2,1,1,3]</text>

  <rect x="440" y="180" width="320" height="280" class="box"/>
  <text x="465" y="225" class="lbl">Frequency Map</text>
  <text x="465" y="275" class="txt">1 → 3</text>
  <text x="465" y="315" class="txt">2 → 2</text>
  <text x="465" y="355" class="txt">3 → 1</text>

  <rect x="820" y="180" width="320" height="280" class="box"/>
  <text x="845" y="225" class="lbl">Seen Counts</text>
  <text x="845" y="275" class="txt">{3, 2, 1}</text>
  <text x="845" y="335" class="ok">All unique → true ✅</text>

  <line x1="385" y1="320" x2="430" y2="320" class="arrow"/>
  <line x1="765" y1="320" x2="810" y2="320" class="arrow"/>
</svg>
