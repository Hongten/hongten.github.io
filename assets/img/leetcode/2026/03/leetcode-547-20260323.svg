<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 547 number of provinces DFS connected components diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:20px;fill:#93c5fd}
      .e{stroke:#64748b;stroke-width:4}
      .n1{fill:#334155;stroke:#38bdf8;stroke-width:3}
      .n2{fill:#334155;stroke:#f59e0b;stroke-width:3}
      .lbl{font-size:18px;font-weight:700;fill:#f8fafc}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="t" font-size="36" font-weight="700">LeetCode 547 · Number of Provinces</text>
  <text x="60" y="105" class="m">DFS over adjacency matrix = connected components count</text>

  <line x1="220" y1="230" x2="360" y2="180" class="e"/>
  <line x1="360" y1="180" x2="470" y2="280" class="e"/>
  <line x1="220" y1="230" x2="470" y2="280" class="e"/>

  <line x1="770" y1="220" x2="930" y2="300" class="e"/>

  <circle cx="220" cy="230" r="36" class="n1"/>
  <circle cx="360" cy="180" r="36" class="n1"/>
  <circle cx="470" cy="280" r="36" class="n1"/>

  <circle cx="770" cy="220" r="36" class="n2"/>
  <circle cx="930" cy="300" r="36" class="n2"/>

  <text x="214" y="236" class="lbl">0</text>
  <text x="354" y="186" class="lbl">1</text>
  <text x="464" y="286" class="lbl">2</text>
  <text x="764" y="226" class="lbl">3</text>
  <text x="924" y="306" class="lbl">4</text>

  <text x="170" y="370" class="t" font-size="28" font-weight="700">Province A</text>
  <text x="730" y="370" class="t" font-size="28" font-weight="700">Province B</text>

  <rect x="60" y="430" width="1080" height="140" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="478" class="t" font-size="24">Scan each city i: if unvisited, start DFS(i) and provinces++</text>
  <text x="90" y="518" class="t" font-size="24">All cities reached in one DFS belong to the same province.</text>
</svg>
