<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:34px;font-weight:700}
      .s{font-size:22px;fill:#93c5fd}
      .b{fill:#111827;stroke:#334155;stroke-width:2;rx:16}
      .k{font-size:26px;font-weight:700;fill:#f8fafc}
      .a{font-size:22px;fill:#cbd5e1}
      .x{font-size:40px;font-weight:800;fill:#22d3ee}
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="60" y="80" class="t m">LeetCode 389 · Find the Difference</text>
  <text x="60" y="118" class="t s">XOR cancellation: paired chars disappear, extra char remains</text>

  <rect x="60" y="170" width="500" height="170" class="b"/>
  <text x="90" y="220" class="t k">s = "abcd"</text>
  <text x="90" y="270" class="t a">a ⊕ b ⊕ c ⊕ d</text>

  <rect x="640" y="170" width="500" height="170" class="b"/>
  <text x="670" y="220" class="t k">t = "abcde" (shuffled)</text>
  <text x="670" y="270" class="t a">a ⊕ b ⊕ c ⊕ d ⊕ e</text>

  <text x="560" y="270" class="t x">⊕</text>

  <rect x="250" y="390" width="700" height="160" class="b"/>
  <text x="290" y="455" class="t k">(a⊕a) ⊕ (b⊕b) ⊕ (c⊕c) ⊕ (d⊕d) ⊕ e</text>
  <text x="290" y="505" class="t x">0 ⊕ 0 ⊕ 0 ⊕ 0 ⊕ e = e</text>
</svg>
