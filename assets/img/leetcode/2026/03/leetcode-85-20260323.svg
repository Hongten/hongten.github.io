<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 85 maximal rectangle row to histogram transformation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#e2e8f0}
      .m{font-size:28px;font-weight:700}
      .s{font-size:20px;fill:#cbd5e1}
      .k{fill:#22c55e}
      .z{fill:#334155}
      .h{fill:#60a5fa}
      .a{fill:#f59e0b}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="t m">LeetCode 85 · Maximal Rectangle</text>
  <text x="60" y="105" class="t s">Lift each row into histogram heights, then run monotonic-stack max area.</text>

  <text x="60" y="160" class="t s">Binary Matrix Row i</text>
  <g transform="translate(60,180)">
    <rect x="0" y="0" width="60" height="60" class="k"/><rect x="70" y="0" width="60" height="60" class="k"/><rect x="140" y="0" width="60" height="60" class="z"/><rect x="210" y="0" width="60" height="60" class="k"/><rect x="280" y="0" width="60" height="60" class="k"/>
    <rect x="0" y="70" width="60" height="60" class="k"/><rect x="70" y="70" width="60" height="60" class="k"/><rect x="140" y="70" width="60" height="60" class="k"/><rect x="210" y="70" width="60" height="60" class="k"/><rect x="280" y="70" width="60" height="60" class="z"/>
    <rect x="0" y="140" width="60" height="60" class="z"/><rect x="70" y="140" width="60" height="60" class="k"/><rect x="140" y="140" width="60" height="60" class="k"/><rect x="210" y="140" width="60" height="60" class="k"/><rect x="280" y="140" width="60" height="60" class="k"/>
  </g>

  <text x="470" y="300" class="t m">→</text>

  <text x="560" y="160" class="t s">Histogram Heights</text>
  <g transform="translate(560,420)">
    <rect x="0" y="-180" width="70" height="180" class="h"/>
    <rect x="90" y="-240" width="70" height="240" class="h"/>
    <rect x="180" y="-120" width="70" height="120" class="h"/>
    <rect x="270" y="-180" width="70" height="180" class="h"/>
    <rect x="360" y="-60" width="70" height="60" class="h"/>
    <line x1="-10" y1="0" x2="450" y2="0" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <rect x="900" y="230" width="230" height="150" rx="14" class="a" opacity="0.85"/>
  <text x="920" y="280" class="t m" style="font-size:24px;fill:#111827">Max Area</text>
  <text x="920" y="320" class="t m" style="font-size:40px;fill:#111827">= 6</text>
  <text x="920" y="350" class="t s" style="fill:#111827">(height 2 × width 3)</text>
</svg>
