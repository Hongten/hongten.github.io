<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 287 Floyd cycle detection diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a1f35"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="48" y="70" fill="#e5e7eb" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 287 · Find the Duplicate Number</text>
  <text x="48" y="110" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Array as linked list: i -> nums[i], duplicate value = cycle entrance</text>

  <g font-family="Inter,Arial,sans-serif" font-size="20" fill="#111827" text-anchor="middle">
    <circle cx="120" cy="250" r="34" fill="#fde68a"/><text x="120" y="257">0</text>
    <circle cx="260" cy="250" r="34" fill="#bfdbfe"/><text x="260" y="257">3</text>
    <circle cx="400" cy="250" r="34" fill="#bfdbfe"/><text x="400" y="257">1</text>
    <circle cx="540" cy="250" r="34" fill="#bfdbfe"/><text x="540" y="257">4</text>
    <circle cx="680" cy="250" r="34" fill="#fca5a5"/><text x="680" y="257">2</text>
    <circle cx="820" cy="250" r="34" fill="#bfdbfe"/><text x="820" y="257">5</text>

    <line x1="154" y1="250" x2="226" y2="250" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="294" y1="250" x2="366" y2="250" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="434" y1="250" x2="506" y2="250" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="574" y1="250" x2="646" y2="250" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="714" y1="250" x2="786" y2="250" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

    <path d="M 854 250 C 980 250, 980 430, 680 430 C 540 430, 520 340, 646 275" fill="none" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <text x="680" y="470" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif" text-anchor="middle">Cycle entrance = duplicate number (2)</text>

  <g font-family="Inter,Arial,sans-serif" font-size="22" fill="#d1fae5">
    <text x="70" y="560">Phase 1: slow = nums[slow], fast = nums[nums[fast]] → meet in cycle</text>
    <text x="70" y="595">Phase 2: reset slow to start, move both 1 step → meet at duplicate</text>
  </g>
</svg>
