<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 173 inorder stack iterator diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="50" y="80" fill="#e5e7eb" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 173 · Binary Search Tree Iterator</text>
  <text x="50" y="120" fill="#93c5fd" font-size="26" font-family="Inter,Arial,sans-serif">Lazy inorder traversal with a stack (left spine invariant)</text>
  <text x="50" y="155" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>

  <rect x="50" y="190" width="720" height="380" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="80" y="230" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">BST (inorder = sorted)</text>

  <circle cx="380" cy="280" r="28" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="371" y="288" fill="#e2e8f0" font-size="20" font-family="Inter,Arial,sans-serif">7</text>

  <circle cx="270" cy="360" r="26" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="262" y="367" fill="#e2e8f0" font-size="19" font-family="Inter,Arial,sans-serif">3</text>

  <circle cx="500" cy="360" r="26" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="492" y="367" fill="#e2e8f0" font-size="19" font-family="Inter,Arial,sans-serif">15</text>

  <circle cx="460" cy="450" r="24" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="452" y="457" fill="#e2e8f0" font-size="18" font-family="Inter,Arial,sans-serif">9</text>

  <circle cx="560" cy="450" r="24" fill="#0b1220" stroke="#60a5fa" stroke-width="2"/>
  <text x="550" y="457" fill="#e2e8f0" font-size="18" font-family="Inter,Arial,sans-serif">20</text>

  <line x1="360" y1="298" x2="286" y2="343" stroke="#60a5fa" stroke-width="2"/>
  <line x1="402" y1="298" x2="484" y2="343" stroke="#60a5fa" stroke-width="2"/>
  <line x1="490" y1="383" x2="468" y2="426" stroke="#60a5fa" stroke-width="2"/>
  <line x1="512" y1="383" x2="552" y2="427" stroke="#60a5fa" stroke-width="2"/>

  <rect x="810" y="210" width="340" height="330" rx="16" fill="#111827" stroke="#374151"/>
  <text x="840" y="250" fill="#cbd5e1" font-size="24" font-family="Inter,Arial,sans-serif">Stack (top at right)</text>

  <rect x="845" y="285" width="80" height="48" rx="8" fill="#1e293b" stroke="#64748b"/>
  <text x="879" y="316" fill="#f8fafc" font-size="22" font-family="Inter,Arial,sans-serif">7</text>

  <rect x="935" y="285" width="80" height="48" rx="8" fill="#1e293b" stroke="#64748b"/>
  <text x="968" y="316" fill="#f8fafc" font-size="22" font-family="Inter,Arial,sans-serif">3</text>

  <path d="M1015 309 L1080 309" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1085" y="316" fill="#93c5fd" font-size="18" font-family="Inter,Arial,sans-serif">next()</text>

  <text x="845" y="380" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">1) pop top = current min</text>
  <text x="845" y="415" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">2) push left chain of right child</text>
  <text x="845" y="450" fill="#e5e7eb" font-size="20" font-family="Inter,Arial,sans-serif">3) hasNext = stack not empty</text>

  <text x="50" y="605" fill="#94a3b8" font-size="18" font-family="Inter,Arial,sans-serif">Amortized O(1) next · O(h) space</text>
</svg>
