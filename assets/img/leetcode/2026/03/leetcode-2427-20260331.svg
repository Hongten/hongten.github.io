<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2427 GCD divisor counting diagram">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2427: Number of Common Factors</text>
  <text x="60" y="140" fill="#93c5fd" font-size="30" font-family="Inter,Arial,sans-serif">Core reduction: common factors of (a, b) = divisors of gcd(a, b)</text>

  <rect x="70" y="190" width="1060" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="100" y="250" fill="#f8fafc" font-size="30" font-family="Inter,Arial,sans-serif">Example: a = 12, b = 18</text>
  <text x="100" y="300" fill="#86efac" font-size="30" font-family="Inter,Arial,sans-serif">gcd(12, 18) = 6</text>
  <text x="100" y="350" fill="#fcd34d" font-size="28" font-family="Inter,Arial,sans-serif">Divisors of 6: 1, 2, 3, 6  →  answer = 4</text>
  <text x="100" y="410" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Enumerate d from 1..sqrt(g), count pair (d, g/d)</text>
  <text x="100" y="460" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">If d*d == g, count once (avoid double counting)</text>
  <text x="100" y="520" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
