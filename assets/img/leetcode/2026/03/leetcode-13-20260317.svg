<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:400 26px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .box{fill:#111827;stroke:#38bdf8;stroke-width:2;rx:14}
      .t{font:700 34px monospace;fill:#f8fafc}
      .small{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#7dd3fc}
      .plus{font:700 34px monospace;fill:#22c55e}
      .minus{font:700 34px monospace;fill:#f97316}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 13 · Roman to Integer</text>
  <text x="60" y="130" class="sub">Rule: scan from right — smaller before larger means subtract</text>

  <rect x="70" y="190" width="140" height="90" class="box"/>
  <text x="118" y="248" class="t">M</text>
  <text x="235" y="248" class="plus">+1000</text>

  <rect x="370" y="190" width="140" height="90" class="box"/>
  <text x="418" y="248" class="t">C</text>
  <text x="535" y="248" class="minus">-100</text>

  <rect x="670" y="190" width="140" height="90" class="box"/>
  <text x="718" y="248" class="t">M</text>
  <text x="835" y="248" class="plus">+1000</text>

  <text x="70" y="345" class="small">Example: MCMXCIV = 1000 - 100 + 1000 - 10 + 100 - 1 + 5 = 1994</text>

  <rect x="70" y="390" width="1060" height="170" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="100" y="445" class="sub">Subtractive pairs:</text>
  <text x="390" y="445" class="t">IV  IX  XL  XC  CD  CM</text>
  <text x="100" y="505" class="sub">Decision at each char:</text>
  <text x="430" y="505" class="t">cur &lt; prev ? subtract : add</text>
</svg>
