<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 735 asteroid collision stack diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .title{font:700 40px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#bfdbfe}
      .box{fill:#1e293b;stroke:#93c5fd;stroke-width:2;rx:12}
      .txt{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .label{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .arrow{stroke:#fbbf24;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 735 · Asteroid Collision</text>
  <text x="60" y="130" class="sub">Stack keeps right-moving survivors; left-moving asteroid resolves collisions in a loop</text>

  <text x="80" y="210" class="label">Input stream:</text>
  <rect class="box" x="240" y="170" width="90" height="60"/><text x="275" y="210" class="txt">5</text>
  <rect class="box" x="350" y="170" width="90" height="60"/><text x="375" y="210" class="txt">10</text>
  <rect class="box" x="460" y="170" width="90" height="60"/><text x="492" y="210" class="txt">-5</text>

  <line class="arrow" x1="560" y1="200" x2="700" y2="200"/>
  <text x="720" y="210" class="label">collide with stack top</text>

  <text x="80" y="330" class="label">Survivor stack (top on right):</text>
  <rect class="box" x="420" y="290" width="90" height="60"/><text x="455" y="330" class="txt">5</text>
  <rect class="box" x="530" y="290" width="90" height="60"/><text x="555" y="330" class="txt">10</text>
  <text x="640" y="330" class="label">-5 destroyed (|10| &gt; |5|)</text>

  <text x="80" y="470" class="label">Collision rule:</text>
  <text x="260" y="470" class="sub">while (curr &lt; 0 &amp;&amp; top &gt; 0) compare |top| vs |curr|, pop or destroy</text>

  <text x="80" y="560" class="sub">Example result: [5, 10]</text>
</svg>
