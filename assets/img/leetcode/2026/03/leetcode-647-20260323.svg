<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">LeetCode 647 center expansion diagram</title>
  <desc id="desc">Odd and even palindrome center expansion over string ababa.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .t{font-family:Arial,sans-serif;fill:#e2e8f0}.m{font-size:28px;font-weight:700}.s{font-size:18px;fill:#93c5fd}
      .c{fill:#1f2937;stroke:#475569;stroke-width:2}.h{fill:#334155;stroke:#60a5fa;stroke-width:3}
      .a{stroke:#22d3ee;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>
  <text x="40" y="58" class="t m">LeetCode 647 · Expand Around Center</text>
  <text x="40" y="90" class="t s">Count palindromic substrings by expanding from each odd/even center</text>

  <g transform="translate(140,170)">
    <rect class="c" x="0" y="0" width="90" height="90" rx="10"/><rect class="c" x="100" y="0" width="90" height="90" rx="10"/>
    <rect class="h" x="200" y="0" width="90" height="90" rx="10"/><rect class="h" x="300" y="0" width="90" height="90" rx="10"/>
    <rect class="c" x="400" y="0" width="90" height="90" rx="10"/><text class="t m" x="35" y="58">a</text><text class="t m" x="135" y="58">b</text><text class="t m" x="235" y="58">a</text><text class="t m" x="335" y="58">b</text><text class="t m" x="435" y="58">a</text>
    <text class="t s" x="175" y="130">odd center (i,i)</text>
    <path class="a" d="M245 -20 C245 -70 345 -70 345 -20"/>
  </g>

  <g transform="translate(140,310)">
    <rect class="c" x="0" y="0" width="90" height="70" rx="10"/><rect class="h" x="100" y="0" width="90" height="70" rx="10"/>
    <rect class="h" x="190" y="0" width="90" height="70" rx="10"/><rect class="c" x="280" y="0" width="90" height="70" rx="10"/>
    <text class="t" x="132" y="45" font-size="30" font-weight="700">aa</text>
    <text class="t s" x="390" y="45">even center (i,i+1) also required</text>
  </g>
</svg>
