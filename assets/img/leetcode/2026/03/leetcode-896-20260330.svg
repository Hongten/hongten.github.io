<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 896 monotonic array direction-check diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="98" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 896: Monotonic Array</text>
  <text x="56" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Single Pass Direction Validation</text>

  <rect x="56" y="190" width="520" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="84" y="232" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">Non-decreasing check (inc)</text>
  <polyline points="90,460 170,430 250,400 330,380 410,350 490,320 550,300" fill="none" stroke="#34d399" stroke-width="6"/>
  <circle cx="90" cy="460" r="6" fill="#34d399"/>
  <circle cx="170" cy="430" r="6" fill="#34d399"/>
  <circle cx="250" cy="400" r="6" fill="#34d399"/>
  <circle cx="330" cy="380" r="6" fill="#34d399"/>
  <circle cx="410" cy="350" r="6" fill="#34d399"/>
  <circle cx="490" cy="320" r="6" fill="#34d399"/>
  <circle cx="550" cy="300" r="6" fill="#34d399"/>

  <rect x="624" y="190" width="520" height="340" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="652" y="232" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Non-increasing check (dec)</text>
  <polyline points="660,300 740,325 820,355 900,380 980,410 1060,440 1120,460" fill="none" stroke="#f87171" stroke-width="6"/>
  <circle cx="660" cy="300" r="6" fill="#f87171"/>
  <circle cx="740" cy="325" r="6" fill="#f87171"/>
  <circle cx="820" cy="355" r="6" fill="#f87171"/>
  <circle cx="900" cy="380" r="6" fill="#f87171"/>
  <circle cx="980" cy="410" r="6" fill="#f87171"/>
  <circle cx="1060" cy="440" r="6" fill="#f87171"/>
  <circle cx="1120" cy="460" r="6" fill="#f87171"/>

  <text x="56" y="588" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">If both inc and dec become false during scan → not monotonic</text>
</svg>
