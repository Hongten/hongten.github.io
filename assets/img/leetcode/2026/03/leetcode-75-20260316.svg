<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 75 Dutch National Flag partition">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 26px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .idx { font: 600 20px 'Consolas', monospace; fill: #e2e8f0; }
      .note { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" class="title">LeetCode 75 · Sort Colors</text>
  <text x="60" y="130" class="sub">One-pass Dutch National Flag: 0 | 1 | unknown | 2</text>

  <rect x="80" y="220" width="240" height="120" rx="16" fill="#93c5fd"/>
  <rect x="320" y="220" width="260" height="120" rx="16" fill="#86efac"/>
  <rect x="580" y="220" width="260" height="120" rx="16" fill="#fde68a"/>
  <rect x="840" y="220" width="280" height="120" rx="16" fill="#fca5a5"/>

  <text x="170" y="290" class="label">0-zone</text>
  <text x="405" y="290" class="label">1-zone</text>
  <text x="645" y="290" class="label">unknown</text>
  <text x="940" y="290" class="label">2-zone</text>

  <line x1="320" y1="370" x2="320" y2="440" stroke="#38bdf8" stroke-width="5"/>
  <polygon points="320,360 310,380 330,380" fill="#38bdf8"/>
  <text x="290" y="470" class="idx">low</text>

  <line x1="580" y1="370" x2="580" y2="440" stroke="#fbbf24" stroke-width="5"/>
  <polygon points="580,360 570,380 590,380" fill="#fbbf24"/>
  <text x="548" y="470" class="idx">mid</text>

  <line x1="840" y1="370" x2="840" y2="440" stroke="#fb7185" stroke-width="5"/>
  <polygon points="840,360 830,380 850,380" fill="#fb7185"/>
  <text x="800" y="470" class="idx">high</text>

  <text x="80" y="545" class="note">nums[mid] == 0 → swap(low, mid), low++, mid++</text>
  <text x="80" y="580" class="note">nums[mid] == 1 → mid++   |   nums[mid] == 2 → swap(mid, high), high--</text>
</svg>
