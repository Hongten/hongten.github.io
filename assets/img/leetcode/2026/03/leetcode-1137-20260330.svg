<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1137 tribonacci rolling dynamic programming diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="58" y="95" fill="#e5e7eb" font-size="46" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1137 · N-th Tribonacci Number</text>
  <text x="58" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Rolling DP: Tn = T(n-1) + T(n-2) + T(n-3)</text>

  <rect x="58" y="195" width="1084" height="355" rx="20" fill="#1f2937" stroke="#374151"/>

  <rect x="105" y="255" width="250" height="110" rx="14" fill="#0f172a" stroke="#64748b"/>
  <text x="140" y="300" fill="#fbbf24" font-size="30" font-family="JetBrains Mono,Consolas,monospace">a = T(n-3)</text>

  <rect x="405" y="255" width="250" height="110" rx="14" fill="#0f172a" stroke="#64748b"/>
  <text x="440" y="300" fill="#34d399" font-size="30" font-family="JetBrains Mono,Consolas,monospace">b = T(n-2)</text>

  <rect x="705" y="255" width="250" height="110" rx="14" fill="#0f172a" stroke="#64748b"/>
  <text x="740" y="300" fill="#60a5fa" font-size="30" font-family="JetBrains Mono,Consolas,monospace">c = T(n-1)</text>

  <text x="220" y="440" fill="#e5e7eb" font-size="34" font-family="Inter,Arial,sans-serif">next = a + b + c</text>
  <text x="220" y="485" fill="#a7f3d0" font-size="30" font-family="Inter,Arial,sans-serif">shift: a←b, b←c, c←next</text>
  <text x="58" y="590" fill="#9ca3af" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞 · EN first, 中文 second</text>
</svg>
