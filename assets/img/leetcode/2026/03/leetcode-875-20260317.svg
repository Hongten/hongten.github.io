<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 875 binary search eating speed feasibility diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="90" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 875 · Koko Eating Bananas</text>
  <text x="60" y="132" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Binary Search on Answer (Minimum Feasible Speed)</text>

  <rect x="60" y="180" width="1080" height="380" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="90" y="230" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Search range: k ∈ [1, max(piles)]</text>

  <line x1="110" y1="300" x2="1060" y2="300" stroke="#9ca3af" stroke-width="4"/>
  <circle cx="260" cy="300" r="18" fill="#f59e0b"/>
  <circle cx="520" cy="300" r="18" fill="#f59e0b"/>
  <circle cx="760" cy="300" r="18" fill="#22c55e"/>
  <circle cx="980" cy="300" r="18" fill="#22c55e"/>
  <text x="216" y="340" fill="#fcd34d" font-size="22" font-family="Inter,Arial,sans-serif">too slow</text>
  <text x="715" y="340" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">feasible</text>

  <rect x="90" y="380" width="1020" height="140" rx="12" fill="#111827" stroke="#374151"/>
  <text x="120" y="430" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">hours(k) = Σ ceil(pile / k)</text>
  <text x="120" y="470" fill="#93c5fd" font-size="22" font-family="Inter,Arial,sans-serif">If hours(k) ≤ h: move right = mid; else move left = mid + 1</text>
  <text x="120" y="505" fill="#86efac" font-size="22" font-family="Inter,Arial,sans-serif">Find first green point = minimum feasible speed</text>
</svg>
