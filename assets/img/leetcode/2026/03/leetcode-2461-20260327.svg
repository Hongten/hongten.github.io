<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 2461 fixed-size distinct-window diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 2461 · Sliding Window + Frequency Map</text>
  <text x="60" y="145" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Maximum Sum of Distinct Subarrays With Length K</text>

  <rect x="70" y="220" width="1060" height="280" rx="16" fill="#1f2937" stroke="#374151"/>
  <text x="95" y="265" fill="#fbbf24" font-size="24" font-family="Inter,Arial,sans-serif">Example: nums = [1,5,4,2,9,9,9], k = 3</text>

  <rect x="95" y="300" width="120" height="72" rx="10" fill="#334155"/><text x="135" y="345" fill="#e5e7eb" font-size="30" font-family="monospace">1</text>
  <rect x="225" y="300" width="120" height="72" rx="10" fill="#334155"/><text x="265" y="345" fill="#e5e7eb" font-size="30" font-family="monospace">5</text>
  <rect x="355" y="300" width="120" height="72" rx="10" fill="#334155"/><text x="395" y="345" fill="#e5e7eb" font-size="30" font-family="monospace">4</text>
  <rect x="485" y="300" width="120" height="72" rx="10" fill="#22c55e"/><text x="525" y="345" fill="#052e16" font-size="30" font-family="monospace" font-weight="700">2</text>
  <rect x="615" y="300" width="120" height="72" rx="10" fill="#22c55e"/><text x="655" y="345" fill="#052e16" font-size="30" font-family="monospace" font-weight="700">9</text>
  <rect x="745" y="300" width="120" height="72" rx="10" fill="#22c55e"/><text x="785" y="345" fill="#052e16" font-size="30" font-family="monospace" font-weight="700">9</text>
  <rect x="875" y="300" width="120" height="72" rx="10" fill="#334155"/><text x="915" y="345" fill="#e5e7eb" font-size="30" font-family="monospace">9</text>

  <text x="95" y="410" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Valid window needs both: length = k and distinct count = k</text>
  <text x="95" y="448" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Best valid window: [5,4,2] => sum = 11</text>
  <text x="95" y="486" fill="#9ca3af" font-size="22" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
