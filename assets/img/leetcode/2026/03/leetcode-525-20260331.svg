<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 525 prefix balance diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="88" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 525 · Contiguous Array</text>
  <text x="56" y="130" fill="#9ca3af" font-size="25" font-family="Inter,Arial,sans-serif">Prefix balance + earliest index hashing</text>

  <rect x="56" y="170" width="1088" height="390" rx="18" fill="#111827" stroke="#374151"/>

  <text x="88" y="220" fill="#93c5fd" font-size="24" font-family="Consolas,Monaco,monospace">nums:      [0, 1, 0, 0, 1, 1, 0]</text>
  <text x="88" y="256" fill="#86efac" font-size="24" font-family="Consolas,Monaco,monospace">value:     [-1,+1,-1,-1,+1,+1,-1]</text>
  <text x="88" y="292" fill="#fca5a5" font-size="24" font-family="Consolas,Monaco,monospace">balance:   [-1, 0,-1,-2,-1, 0,-1]</text>

  <text x="88" y="346" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Same balance reappears ⇒ subarray sum is 0 (equal #0 and #1)</text>

  <line x1="88" y1="386" x2="1110" y2="386" stroke="#374151"/>
  <text x="88" y="430" fill="#fcd34d" font-size="23" font-family="Inter,Arial,sans-serif">firstIndex[0] = -1</text>
  <text x="88" y="468" fill="#fcd34d" font-size="23" font-family="Inter,Arial,sans-serif">firstIndex[-1] = 0</text>
  <text x="88" y="506" fill="#fcd34d" font-size="23" font-family="Inter,Arial,sans-serif">At i = 5, balance = 0 again ⇒ length = 5 - (-1) = 6</text>

  <text x="780" y="540" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif" font-weight="700">Answer: 6</text>
  <text x="960" y="600" fill="#9ca3af" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
