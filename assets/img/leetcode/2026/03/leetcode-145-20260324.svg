<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 145 postorder traversal diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2440"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
    <style>
      .title { font: 700 44px Inter, Arial, sans-serif; fill: #e5e7eb; }
      .sub { font: 500 24px Inter, Arial, sans-serif; fill: #93c5fd; }
      .node { fill: #111827; stroke: #9ca3af; stroke-width: 2; }
      .txt { font: 700 28px Inter, Arial, sans-serif; fill: #f9fafb; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #6b7280; stroke-width: 3; }
      .visit { stroke: #f59e0b; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .label { font: 700 26px Inter, Arial, sans-serif; fill: #fbbf24; }
      .order { font: 600 28px Inter, Arial, sans-serif; fill: #86efac; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="48" y="70" class="title">LeetCode 145 — Binary Tree Postorder Traversal</text>
  <text x="48" y="108" class="sub">Iterative (one stack + prev): left → right → root</text>

  <line x1="420" y1="240" x2="300" y2="340" class="edge"/>
  <line x1="420" y1="240" x2="540" y2="340" class="edge"/>
  <line x1="540" y1="340" x2="660" y2="430" class="edge"/>

  <circle cx="420" cy="220" r="42" class="node"/>
  <text x="420" y="220" class="txt">1</text>

  <circle cx="300" cy="360" r="42" class="node"/>
  <text x="300" y="360" class="txt">2</text>

  <circle cx="540" cy="360" r="42" class="node"/>
  <text x="540" y="360" class="txt">3</text>

  <circle cx="660" cy="450" r="42" class="node"/>
  <text x="660" y="450" class="txt">4</text>

  <path d="M300 410 C300 490, 560 500, 540 410" class="visit"/>
  <path d="M540 410 C560 470, 645 500, 660 494" class="visit"/>
  <path d="M660 406 C650 330, 500 245, 458 232" class="visit"/>

  <text x="770" y="305" class="label">Visit Order:</text>
  <text x="770" y="350" class="order">2 → 4 → 3 → 1</text>
  <text x="770" y="410" class="sub">prev pointer decides</text>
  <text x="770" y="444" class="sub">when right subtree is done.</text>

  <rect x="760" y="470" width="370" height="96" rx="16" fill="#111827" stroke="#374151"/>
  <text x="782" y="508" class="sub">Rule:</text>
  <text x="782" y="542" class="sub">if node.right is null or == prev,</text>
  <text x="782" y="572" class="sub">pop and append node value.</text>
</svg>
