<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 24 pair swap diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="56" y="84" fill="#e2e8f0" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 24 · Swap Nodes in Pairs</text>
  <text x="56" y="126" fill="#93c5fd" font-size="24" font-family="Inter,Arial,sans-serif">Dummy-head iterative pointer rewiring</text>

  <text x="70" y="190" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Before</text>
  <circle cx="180" cy="180" r="32" fill="#1e293b" stroke="#93c5fd" stroke-width="2"/>
  <text x="173" y="188" fill="#e5e7eb" font-size="26" font-family="monospace">a</text>
  <circle cx="320" cy="180" r="32" fill="#1e293b" stroke="#86efac" stroke-width="2"/>
  <text x="313" y="188" fill="#e5e7eb" font-size="26" font-family="monospace">b</text>
  <circle cx="500" cy="180" r="32" fill="#1e293b" stroke="#fca5a5" stroke-width="2"/>
  <text x="458" y="188" fill="#e5e7eb" font-size="18" font-family="monospace">next</text>
  <line x1="212" y1="180" x2="286" y2="180" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="352" y1="180" x2="466" y2="180" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="70" y="360" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">After</text>
  <circle cx="180" cy="350" r="32" fill="#1e293b" stroke="#86efac" stroke-width="2"/>
  <text x="173" y="358" fill="#e5e7eb" font-size="26" font-family="monospace">b</text>
  <circle cx="320" cy="350" r="32" fill="#1e293b" stroke="#93c5fd" stroke-width="2"/>
  <text x="313" y="358" fill="#e5e7eb" font-size="26" font-family="monospace">a</text>
  <circle cx="500" cy="350" r="32" fill="#1e293b" stroke="#fca5a5" stroke-width="2"/>
  <text x="458" y="358" fill="#e5e7eb" font-size="18" font-family="monospace">next</text>
  <line x1="212" y1="350" x2="286" y2="350" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="352" y1="350" x2="466" y2="350" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="650" y="170" width="500" height="250" rx="16" fill="#111827" stroke="#334155"/>
  <text x="680" y="220" fill="#a7f3d0" font-size="24" font-family="Inter,Arial,sans-serif">Rewire order:</text>
  <text x="680" y="265" fill="#e5e7eb" font-size="22" font-family="monospace">1) a.next = b.next</text>
  <text x="680" y="305" fill="#e5e7eb" font-size="22" font-family="monospace">2) b.next = a</text>
  <text x="680" y="345" fill="#e5e7eb" font-size="22" font-family="monospace">3) prev.next = b</text>
  <text x="680" y="385" fill="#93c5fd" font-size="20" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
