<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 1252 row and column parity flip diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="52" y="86" fill="#e5e7eb" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="700">LeetCode 1252 · Cells With Odd Values in a Matrix</text>
  <text x="52" y="130" fill="#93c5fd" font-size="28" font-family="Inter,Arial,sans-serif">Row/Column parity toggles → count odd cells directly</text>

  <rect x="72" y="180" width="430" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="102" y="225" fill="#e5e7eb" font-size="24" font-family="Inter,Arial,sans-serif">Example m=3, n=4</text>

  <rect x="112" y="255" width="320" height="240" fill="#0b1220" stroke="#334155"/>
  <g fill="#1e293b" stroke="#475569">
    <rect x="112" y="255" width="80" height="80"/>
    <rect x="192" y="255" width="80" height="80"/>
    <rect x="272" y="255" width="80" height="80"/>
    <rect x="352" y="255" width="80" height="80"/>
    <rect x="112" y="335" width="80" height="80"/>
    <rect x="192" y="335" width="80" height="80"/>
    <rect x="272" y="335" width="80" height="80"/>
    <rect x="352" y="335" width="80" height="80"/>
    <rect x="112" y="415" width="80" height="80"/>
    <rect x="192" y="415" width="80" height="80"/>
    <rect x="272" y="415" width="80" height="80"/>
    <rect x="352" y="415" width="80" height="80"/>
  </g>

  <rect x="112" y="335" width="320" height="80" fill="#14532d" fill-opacity="0.45"/>
  <rect x="192" y="255" width="80" height="240" fill="#7c2d12" fill-opacity="0.45"/>
  <text x="444" y="377" fill="#86efac" font-size="20" font-family="Inter,Arial,sans-serif">odd row</text>
  <text x="210" y="522" fill="#fdba74" font-size="20" font-family="Inter,Arial,sans-serif">odd col</text>

  <rect x="560" y="180" width="570" height="360" rx="18" fill="#1f2937" stroke="#374151"/>
  <text x="592" y="236" fill="#e5e7eb" font-size="30" font-family="Inter,Arial,sans-serif">Formula</text>
  <text x="592" y="292" fill="#cbd5e1" font-size="28" font-family="JetBrains Mono,Consolas,monospace">odd = rOdd * (n - cOdd) + (m - rOdd) * cOdd</text>
  <text x="592" y="352" fill="#93c5fd" font-size="25" font-family="Inter,Arial,sans-serif">Track parity only, no full matrix simulation</text>
  <text x="592" y="410" fill="#86efac" font-size="24" font-family="Inter,Arial,sans-serif">Time: O(k + m + n) · Space: O(m + n)</text>
  <text x="592" y="470" fill="#fca5a5" font-size="24" font-family="Inter,Arial,sans-serif">Author: Tom🦞</text>
</svg>
