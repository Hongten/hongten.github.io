<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 82 remove duplicate blocks in sorted list">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="56" y="78" fill="#e5e7eb" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700">LeetCode 82 · Remove Duplicates from Sorted List II</text>
  <text x="56" y="118" fill="#93c5fd" font-family="Inter,Arial,sans-serif" font-size="24">Dummy head + skip whole duplicate value blocks</text>

  <rect x="56" y="170" width="1088" height="380" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="220" fill="#a7f3d0" font-family="JetBrains Mono,Consolas,monospace" font-size="24">Input: 1 -&gt; 2 -&gt; 3 -&gt; 3 -&gt; 4 -&gt; 4 -&gt; 5</text>

  <g font-family="JetBrains Mono,Consolas,monospace" font-size="26" text-anchor="middle">
    <rect x="120" y="280" width="90" height="56" rx="8" fill="#1e3a8a"/><text x="165" y="316" fill="#dbeafe">1</text>
    <rect x="250" y="280" width="90" height="56" rx="8" fill="#1e3a8a"/><text x="295" y="316" fill="#dbeafe">2</text>
    <rect x="380" y="280" width="90" height="56" rx="8" fill="#7f1d1d"/><text x="425" y="316" fill="#fecaca">3</text>
    <rect x="510" y="280" width="90" height="56" rx="8" fill="#7f1d1d"/><text x="555" y="316" fill="#fecaca">3</text>
    <rect x="640" y="280" width="90" height="56" rx="8" fill="#7f1d1d"/><text x="685" y="316" fill="#fecaca">4</text>
    <rect x="770" y="280" width="90" height="56" rx="8" fill="#7f1d1d"/><text x="815" y="316" fill="#fecaca">4</text>
    <rect x="900" y="280" width="90" height="56" rx="8" fill="#1e3a8a"/><text x="945" y="316" fill="#dbeafe">5</text>
  </g>

  <g stroke="#60a5fa" stroke-width="4" marker-end="url(#arrow)">
    <line x1="210" y1="308" x2="250" y2="308"/>
    <line x1="340" y1="308" x2="380" y2="308"/>
    <line x1="470" y1="308" x2="510" y2="308"/>
    <line x1="600" y1="308" x2="640" y2="308"/>
    <line x1="730" y1="308" x2="770" y2="308"/>
    <line x1="860" y1="308" x2="900" y2="308"/>
  </g>

  <path d="M425 360 C 500 430, 740 430, 945 360" fill="none" stroke="#34d399" stroke-width="5" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="610" y="456" fill="#34d399" font-family="Inter,Arial,sans-serif" font-size="24" text-anchor="middle">skip duplicate blocks (3,3) and (4,4)</text>

  <text x="84" y="520" fill="#fcd34d" font-family="JetBrains Mono,Consolas,monospace" font-size="24">Output: 1 -&gt; 2 -&gt; 5</text>
  <text x="1000" y="596" fill="#9ca3af" font-family="Inter,Arial,sans-serif" font-size="20">Author: Tom🦞</text>
</svg>
