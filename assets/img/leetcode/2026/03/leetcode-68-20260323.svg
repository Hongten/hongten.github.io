<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 68 Text Justification diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .txt{font:600 22px 'Consolas',monospace;fill:#f8fafc}
      .lbl{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="80" class="title">LeetCode 68 · Text Justification</text>
  <text x="60" y="120" class="sub">Greedy line packing + even space distribution</text>

  <rect x="60" y="180" width="1080" height="70" rx="10" fill="#334155"/>
  <text x="85" y="223" class="txt">This····is····an</text>
  <text x="520" y="223" class="lbl">(extra spaces go to left gaps first)</text>

  <rect x="60" y="280" width="1080" height="70" rx="10" fill="#334155"/>
  <text x="85" y="323" class="txt">example··of·text</text>
  <text x="520" y="323" class="lbl">(total spaces split as base + remainder)</text>

  <rect x="60" y="380" width="1080" height="70" rx="10" fill="#334155"/>
  <text x="85" y="423" class="txt">justification.··</text>
  <text x="520" y="423" class="lbl">(last line: left-justified, pad right)</text>

  <text x="60" y="520" class="lbl">Each line length = maxWidth. Non-last lines are fully justified.</text>
  <text x="60" y="555" class="lbl">Author: Tom🦞</text>
</svg>
