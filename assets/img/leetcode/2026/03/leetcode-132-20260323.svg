<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 132 min-cut palindrome partition DP diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 26px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 600 24px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .mono { font: 600 24px 'JetBrains Mono', Consolas, monospace; fill: #f8fafc; }
      .tiny { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="48" y="40" width="1104" height="550" rx="24" fill="#0b1220" stroke="#334155"/>

  <text x="86" y="110" class="title">LeetCode 132 · Palindrome Partitioning II</text>
  <text x="86" y="150" class="sub">Min Cut DP + Palindrome Table</text>

  <rect x="86" y="186" width="320" height="48" rx="12" fill="url(#chip)" opacity="0.9"/>
  <text x="106" y="218" class="label" fill="#0b1220">s = "aabcb"</text>

  <text x="86" y="280" class="label">Palindrome table says:</text>
  <text x="86" y="320" class="mono">"aa" ✓   "bcb" ✓   "aabcb" ✗</text>

  <text x="86" y="380" class="label">Best partition:</text>
  <text x="86" y="420" class="mono">"aa" | "bcb"</text>

  <text x="86" y="480" class="label">Cut DP transition:</text>
  <text x="86" y="520" class="mono">dp[i] = min(dp[j-1] + 1), if s[j..i] is palindrome</text>

  <text x="86" y="565" class="tiny">Answer: min cuts = 1</text>
</svg>
