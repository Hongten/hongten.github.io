<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><rect width="1200" height="630" fill="#0f172a"/><text x="60" y="90" fill="#e2e8f0" font-size="46" font-family="Arial" font-weight="700">LeetCode 116</text><text x="60" y="135" fill="#93c5fd" font-size="30" font-family="Arial">Populating Next Right Pointers in Each Node</text><g stroke="#64748b" stroke-width="4" fill="#334155"><circle cx="380" cy="220" r="34"/><circle cx="260" cy="330" r="34"/><circle cx="500" cy="330" r="34"/><circle cx="180" cy="440" r="34"/><circle cx="340" cy="440" r="34"/><circle cx="420" cy="440" r="34"/><circle cx="580" cy="440" r="34"/><line x1="365" y1="248" x2="280" y2="304"/><line x1="395" y1="248" x2="480" y2="304"/><line x1="245" y1="358" x2="195" y2="410"/><line x1="275" y1="358" x2="325" y2="410"/><line x1="485" y1="358" x2="435" y2="410"/><line x1="515" y1="358" x2="565" y2="410"/></g><g fill="#e2e8f0" font-size="22" font-family="Arial" text-anchor="middle"><text x="380" y="228">1</text><text x="260" y="338">2</text><text x="500" y="338">3</text><text x="180" y="448">4</text><text x="340" y="448">5</text><text x="420" y="448">6</text><text x="580" y="448">7</text></g><g stroke="#22d3ee" stroke-width="5"><line x1="295" y1="330" x2="465" y2="330"/><line x1="215" y1="440" x2="305" y2="440"/><line x1="375" y1="440" x2="385" y2="440"/><line x1="455" y1="440" x2="545" y2="440"/></g><text x="700" y="310" fill="#22d3ee" font-size="32" font-family="Arial" font-weight="700">next pointers</text><text x="700" y="355" fill="#cbd5e1" font-size="26" font-family="Arial">left.next = right</text><text x="700" y="395" fill="#cbd5e1" font-size="26" font-family="Arial">right.next = next.left</text></svg>