<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .sub{font:500 24px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}
      .node{fill:#334155;stroke:#94a3b8;stroke-width:2}
      .txt{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle;dominant-baseline:middle}
      .line{stroke:#64748b;stroke-width:3}
      .label{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#fcd34d}
      .lca{fill:#7c3aed;stroke:#c4b5fd;stroke-width:3}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="70" class="title">LeetCode 235 · Lowest Common Ancestor of a BST</text>
  <text x="60" y="110" class="sub">Find first split point using BST order</text>
  <line x1="600" y1="200" x2="420" y2="300" class="line"/>
  <line x1="600" y1="200" x2="780" y2="300" class="line"/>
  <line x1="420" y1="300" x2="320" y2="400" class="line"/>
  <line x1="420" y1="300" x2="500" y2="400" class="line"/>
  <line x1="780" y1="300" x2="700" y2="400" class="line"/>
  <line x1="780" y1="300" x2="900" y2="400" class="line"/>
  <circle cx="600" cy="200" r="36" class="node"/>
  <circle cx="420" cy="300" r="36" class="lca"/>
  <circle cx="780" cy="300" r="36" class="node"/>
  <circle cx="320" cy="400" r="32" class="node"/>
  <circle cx="500" cy="400" r="32" class="node"/>
  <circle cx="700" cy="400" r="32" class="node"/>
  <circle cx="900" cy="400" r="32" class="node"/>
  <text x="600" y="200" class="txt">6</text>
  <text x="420" y="300" class="txt">2</text>
  <text x="780" y="300" class="txt">8</text>
  <text x="320" y="400" class="txt">0</text>
  <text x="500" y="400" class="txt">4</text>
  <text x="700" y="400" class="txt">7</text>
  <text x="900" y="400" class="txt">9</text>
  <text x="220" y="530" class="label">p = 2</text>
  <text x="980" y="530" class="label">q = 8</text>
  <text x="520" y="530" class="label">LCA = 6 (split point)</text>
</svg>
