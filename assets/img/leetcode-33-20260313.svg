<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeetCode 33 rotated sorted array binary search diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .sub { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #93c5fd; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .num { font: 700 28px 'Consolas', monospace; fill: #f8fafc; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="90" class="title">LeetCode 33 · Search in Rotated Sorted Array</text>
  <text x="70" y="130" class="sub">Binary Search with Ordered Half Detection · O(log n)</text>

  <g transform="translate(70,210)">
    <text x="0" y="-30" class="label">nums = [4, 5, 6, 7, 0, 1, 2], target = 0</text>

    <g>
      <rect x="0" y="0" width="130" height="90" rx="10" fill="#334155" stroke="#64748b"/>
      <text x="65" y="58" text-anchor="middle" class="num">4</text>
      <text x="65" y="118" text-anchor="middle" class="label">0</text>
    </g>
    <g transform="translate(145,0)">
      <rect x="0" y="0" width="130" height="90" rx="10" fill="#334155" stroke="#64748b"/>
      <text x="65" y="58" text-anchor="middle" class="num">5</text>
      <text x="65" y="118" text-anchor="middle" class="label">1</text>
    </g>
    <g transform="translate(290,0)">
      <rect x="0" y="0" width="130" height="90" rx="10" fill="#334155" stroke="#64748b"/>
      <text x="65" y="58" text-anchor="middle" class="num">6</text>
      <text x="65" y="118" text-anchor="middle" class="label">2</text>
    </g>
    <g transform="translate(435,0)">
      <rect x="0" y="0" width="130" height="90" rx="10" fill="#1d4ed8" stroke="#93c5fd" stroke-width="3"/>
      <text x="65" y="58" text-anchor="middle" class="num">7</text>
      <text x="65" y="118" text-anchor="middle" class="label">mid=3</text>
    </g>
    <g transform="translate(580,0)">
      <rect x="0" y="0" width="130" height="90" rx="10" fill="#16a34a" stroke="#86efac" stroke-width="3"/>
      <text x="65" y="58" text-anchor="middle" class="num">0</text>
      <text x="65" y="118" text-anchor="middle" class="label">target</text>
    </g>
    <g transform="translate(725,0)">
      <rect x="0" y="0" width="130" height="90" rx="10" fill="#334155" stroke="#64748b"/>
      <text x="65" y="58" text-anchor="middle" class="num">1</text>
      <text x="65" y="118" text-anchor="middle" class="label">5</text>
    </g>
    <g transform="translate(870,0)">
      <rect x="0" y="0" width="130" height="90" rx="10" fill="#334155" stroke="#64748b"/>
      <text x="65" y="58" text-anchor="middle" class="num">2</text>
      <text x="65" y="118" text-anchor="middle" class="label">6</text>
    </g>

    <path d="M500 155 C540 195, 630 195, 670 155" fill="none" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="500" y="220" class="label">Left half [4..7] is sorted, target not inside → search right half</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
