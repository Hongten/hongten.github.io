<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeetCode 128 longest consecutive sequence hash-set expansion diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1d2a52"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="60" y="95" fill="#e8f1ff" font-size="48" font-family="Inter,Segoe UI,Arial" font-weight="700">LeetCode 128 · Longest Consecutive Sequence</text>
  <text x="60" y="140" fill="#b9c8ff" font-size="28" font-family="Inter,Segoe UI,Arial">HashSet · Start-Only Expansion · O(n)</text>

  <rect x="60" y="200" width="1080" height="320" rx="20" fill="#111a33" stroke="#3a4f8f"/>
  <text x="90" y="250" fill="#9fc2ff" font-size="24" font-family="Consolas,Monaco,monospace">nums = [100, 4, 200, 1, 3, 2]</text>

  <g font-family="Consolas,Monaco,monospace" font-size="28" text-anchor="middle">
    <rect x="120" y="300" width="110" height="70" rx="10" fill="#2a3f78"/><text x="175" y="345" fill="#eaf0ff">100</text>
    <rect x="260" y="300" width="110" height="70" rx="10" fill="#2a3f78"/><text x="315" y="345" fill="#eaf0ff">1</text>
    <rect x="400" y="300" width="110" height="70" rx="10" fill="#2a3f78"/><text x="455" y="345" fill="#eaf0ff">2</text>
    <rect x="540" y="300" width="110" height="70" rx="10" fill="#2a3f78"/><text x="595" y="345" fill="#eaf0ff">3</text>
    <rect x="680" y="300" width="110" height="70" rx="10" fill="#2a3f78"/><text x="735" y="345" fill="#eaf0ff">4</text>
    <rect x="820" y="300" width="110" height="70" rx="10" fill="#2a3f78"/><text x="875" y="345" fill="#eaf0ff">200</text>
  </g>

  <path d="M315 390 L735 390" stroke="#ffd166" stroke-width="6" stroke-linecap="round"/>
  <text x="525" y="435" fill="#ffd166" font-size="30" font-family="Inter,Segoe UI,Arial" text-anchor="middle" font-weight="700">Longest chain: 1 → 2 → 3 → 4 (len = 4)</text>

  <text x="60" y="585" fill="#89a3da" font-size="24" font-family="Inter,Segoe UI,Arial">Only start from x when (x-1) is absent in set, then expand x+1, x+2 ...</text>
</svg>