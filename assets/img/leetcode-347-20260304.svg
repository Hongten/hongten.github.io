<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="LeetCode 347 bucket sort diagram">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .card { fill: #111a2e; stroke: #2a3b66; stroke-width: 2; rx: 14; }
      .title { fill: #e8eefc; font: 700 34px 'Segoe UI', Arial, sans-serif; }
      .text { fill: #cbd7f5; font: 500 22px 'Segoe UI', Arial, sans-serif; }
      .mono { fill: #9ec1ff; font: 600 20px 'Consolas', 'Courier New', monospace; }
      .accent { fill: #67e8f9; }
      .arrow { stroke: #67e8f9; stroke-width: 3; marker-end: url(#m); }
      .bucket { fill: #17233f; stroke: #32508f; stroke-width: 2; rx: 10; }
      .k { fill: #22c55e; font: 700 24px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 z" fill="#67e8f9" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="620"/>
  <text class="title" x="50" y="60">LeetCode 347 — Top K Frequent Elements</text>

  <rect class="card" x="45" y="95" width="360" height="210"/>
  <text class="text" x="70" y="140">Input nums:</text>
  <text class="mono" x="70" y="178">[1,1,1,2,2,3],  k = 2</text>
  <text class="text" x="70" y="225">Frequency map:</text>
  <text class="mono" x="70" y="262">1→3, 2→2, 3→1</text>

  <line class="arrow" x1="410" y1="200" x2="520" y2="200"/>

  <rect class="card" x="530" y="95" width="625" height="420"/>
  <text class="text" x="555" y="140">Buckets by frequency index</text>

  <rect class="bucket" x="560" y="170" width="560" height="70"/>
  <text class="mono" x="585" y="214">freq = 3  →  [1]</text>

  <rect class="bucket" x="560" y="255" width="560" height="70"/>
  <text class="mono" x="585" y="299">freq = 2  →  [2]</text>

  <rect class="bucket" x="560" y="340" width="560" height="70"/>
  <text class="mono" x="585" y="384">freq = 1  →  [3]</text>

  <line class="arrow" x1="840" y1="430" x2="840" y2="500"/>
  <text class="text" x="690" y="540">Scan from high freq to low, collect first k elements</text>
  <text class="k" x="760" y="575">Result: [1, 2]</text>
</svg>
