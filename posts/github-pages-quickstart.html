      <p>最短路径：准备静态页面 → 推送到仓库 → 在 Settings 里开启 Pages。</p>
      <p>如果你走个人站路线，仓库名使用 <code>username.github.io</code>，访问地址最简洁。</p>
      <p>先上线，再迭代，这是个人博客最舒服的节奏。</p>
