      <h1>在 OpenClaw 上做状态通知，踩了哪些坑？</h1>
      <div class="meta">2026-03-04</div>
      <span class="tag">OpenClaw</span><span class="tag">Automation</span>
      <p>一开始把轮询频率拉到 1 秒，看起来“实时”，实际上容易造成任务并发与误报。</p>
      <p>后来把策略改成：合理轮询 + 防并发锁 + 状态防抖 + 严格状态迁移判断，结果稳定很多。</p>
      <p>经验是：告警系统最重要的不是“快”，而是“准”。</p>
